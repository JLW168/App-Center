<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>SaleTrack Pro | Pad Edition</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap');
        
        :root {
            --water-blue: #0f172a;
            --growth-emerald: #10b981;
            --flow-blue: #2563eb;
            --bg-soft: #f4f7fa;
        }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            background-color: var(--bg-soft); 
            color: #1e293b;
            overscroll-behavior-y: contain;
            user-select: none;
        }
        
        /* Bottom Nav Styling */
        .bottom-nav-active { 
            color: var(--flow-blue); 
            background: #eff6ff; 
        }
        .bottom-nav-active i { transform: translateY(-4px); transition: transform 0.3s ease; }

        /* Card Design */
        .pad-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 10px 25px -5px rgba(0, 0, 0, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.8);
        }

        /* Loading Spinner */
        .spinner { 
            border: 3px solid rgba(37, 99, 235, 0.1); 
            width: 32px; 
            height: 32px; 
            border-radius: 50%; 
            border-left-color: var(--flow-blue); 
            animation: spin 1s linear infinite; 
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        
        .safe-bottom { padding-bottom: env(safe-area-inset-bottom); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        input, select { font-size: 16px !important; }
        
        /* Animation */
        @keyframes slideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }
        .animate-slide-up { animation: slideUp 0.3s ease-out; }
    </style>
</head>
<body class="min-h-screen">

    <!-- Top Status Header -->
    <header class="bg-white/90 backdrop-blur-xl border-b sticky top-0 z-40">
        <div class="max-w-5xl mx-auto px-6 h-14 flex justify-between items-center">
            <div class="flex items-center gap-2">
                <div class="w-2.5 h-2.5 rounded-full bg-slate-300" id="statusDot"></div>
                <span class="text-[10px] font-bold uppercase tracking-widest text-slate-400" id="statusLabel">Initializing...</span>
            </div>
            <div class="flex items-center gap-2">
                <i data-lucide="waves" class="w-4 h-4 text-blue-600"></i>
                <h1 class="text-sm font-bold tracking-tight">SaleTrack Pro</h1>
            </div>
            <div class="w-6"></div>
        </div>
    </header>

    <main class="max-w-5xl mx-auto px-4 pt-6 pb-32">
        
        <!-- Dashboard Widgets -->
        <section id="statsGrid" class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
            <div class="pad-card p-5 border-l-4 border-l-blue-500 animate-pulse bg-slate-50 h-24"></div>
            <div class="pad-card p-5 border-l-4 border-l-emerald-500 animate-pulse bg-slate-50 h-24"></div>
            <div class="pad-card p-5 border-l-4 border-l-amber-500 animate-pulse bg-slate-50 h-24"></div>
            <div class="pad-card p-5 border-l-4 border-l-slate-500 animate-pulse bg-slate-50 h-24"></div>
        </section>

        <!-- Filters & Actions -->
        <section id="actionPanel" class="pad-card p-4 mb-6 sticky top-16 z-30">
            <div class="flex flex-col md:flex-row gap-4">
                <div class="flex-1 grid grid-cols-2 gap-3" id="salesFilters">
                    <select id="filterSeller" onchange="App.ui.render()" class="bg-slate-50 border-none rounded-xl p-3 text-sm font-bold focus:ring-2 focus:ring-blue-500">
                        <option value="all">All Sellers</option>
                    </select>
                    <select id="filterPeriod" onchange="App.ui.handlePeriodChange()" class="bg-slate-50 border-none rounded-xl p-3 text-sm font-bold focus:ring-2 focus:ring-blue-500">
                        <option value="all">All History</option>
                        <option value="today">Today</option>
                        <option value="yesterday">Yesterday</option>
                        <option value="this_week">This Week</option>
                        <option value="month">Select Month</option>
                    </select>
                </div>
                <div id="monthPickerWrapper" class="hidden">
                    <input type="month" id="filterMonth" onchange="App.ui.render()" class="w-full bg-slate-50 border-none rounded-xl p-3 text-sm font-bold">
                </div>
                <div class="flex-1 relative">
                    <input type="text" id="globalSearch" oninput="App.ui.render()" placeholder="Search records..." class="w-full bg-slate-50 border-none rounded-xl p-3 pl-10 text-sm focus:ring-2 focus:ring-blue-500">
                    <i data-lucide="search" class="w-4 h-4 absolute left-3.5 top-3.5 text-slate-400"></i>
                </div>
                <button onclick="App.ui.handleCreateNew()" class="bg-blue-600 active:scale-95 transition-transform text-white font-bold p-3 rounded-xl flex items-center justify-center gap-2 shadow-lg shadow-blue-200">
                    <i data-lucide="plus-circle" class="w-5 h-5"></i>
                    <span id="addNewBtnLabel">New Sale</span>
                </button>
            </div>
        </section>

        <!-- Main Data View -->
        <div class="pad-card overflow-hidden min-h-[400px]">
            <div id="loadingState" class="flex flex-col items-center justify-center py-32 text-slate-400">
                <div class="spinner mb-4"></div>
                <p class="text-[10px] font-bold uppercase tracking-widest" id="loaderText">Accessing Cloud Intelligence...</p>
            </div>
            
            <div id="tableContainer" class="hidden overflow-x-auto">
                <!-- Content Injected -->
            </div>
        </div>
    </main>

    <!-- Bottom Navigation Bar -->
    <nav class="fixed bottom-0 left-0 right-0 bg-white/80 backdrop-blur-2xl border-t z-50 safe-bottom">
        <div class="max-w-xl mx-auto px-6 h-20 flex justify-between items-center">
            <button onclick="App.switchTab('sales')" id="tab-sales" class="flex flex-col items-center gap-1.5 px-4 py-2 rounded-2xl transition-all text-slate-400 tab-btn bottom-nav-active">
                <i data-lucide="layout-grid" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold uppercase">Sales</span>
            </button>
            <button onclick="App.switchTab('products')" id="tab-products" class="flex flex-col items-center gap-1.5 px-4 py-2 rounded-2xl transition-all text-slate-400 tab-btn">
                <i data-lucide="package" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold uppercase">Inventory</span>
            </button>
            <button onclick="App.switchTab('sellers')" id="tab-sellers" class="flex flex-col items-center gap-1.5 px-4 py-2 rounded-2xl transition-all text-slate-400 tab-btn">
                <i data-lucide="users-2" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold uppercase">Staff</span>
            </button>
            <button onclick="App.switchTab('customers')" id="tab-customers" class="flex flex-col items-center gap-1.5 px-4 py-2 rounded-2xl transition-all text-slate-400 tab-btn">
                <i data-lucide="contact-2" class="w-6 h-6"></i>
                <span class="text-[10px] font-bold uppercase">Clients</span>
            </button>
        </div>
    </nav>

    <!-- Modals -->
    <div id="saleModal" class="fixed inset-0 z-[100] flex items-end md:items-center justify-center hidden">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="App.ui.closeModal('saleModal')"></div>
        <div class="bg-white w-full max-w-2xl rounded-t-[2.5rem] md:rounded-[2.5rem] shadow-2xl relative z-10 overflow-hidden flex flex-col max-h-[95vh] animate-slide-up">
            <div class="px-8 py-6 border-b flex justify-between items-center bg-slate-50/50">
                <h3 class="text-xl font-bold text-slate-800" id="saleModalTitle">Sale Record</h3>
                <button onclick="App.ui.closeModal('saleModal')" class="p-2.5 bg-slate-100 rounded-2xl"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <form id="saleForm" class="p-8 space-y-6 overflow-y-auto">
                <input type="hidden" id="saleId">
                <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Date</label>
                        <input type="date" id="saleDate" required class="w-full bg-slate-50 border-none rounded-2xl p-4 font-bold">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Client</label>
                        <select id="saleCustomer" required class="w-full bg-slate-50 border-none rounded-2xl p-4 font-bold"></select>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Product</label>
                        <select id="saleProduct" onchange="App.ui.onProductSelect()" required class="w-full bg-slate-50 border-none rounded-2xl p-4 font-bold"></select>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Seller</label>
                        <select id="saleSeller" required class="w-full bg-slate-50 border-none rounded-2xl p-4 font-bold"></select>
                    </div>
                    <div class="grid grid-cols-2 gap-4">
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Price ($)</label>
                            <input type="number" id="salePrice" step="0.01" oninput="App.ui.recalcTotal()" required class="w-full bg-slate-50 border-none rounded-2xl p-4 font-bold">
                        </div>
                        <div class="space-y-1.5">
                            <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Qty</label>
                            <input type="number" id="saleQty" min="1" value="1" oninput="App.ui.recalcTotal()" required class="w-full bg-slate-50 border-none rounded-2xl p-4 font-bold">
                        </div>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Total Amount</label>
                        <input type="text" id="saleTotal" readonly class="w-full bg-blue-50 border-none rounded-2xl p-4 font-bold text-blue-700 text-xl">
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Status</label>
                        <select id="saleStatus" required class="w-full bg-slate-50 border-none rounded-2xl p-4 font-bold">
                            <option value="Paid">Paid</option>
                            <option value="Unpaid">Unpaid</option>
                        </select>
                    </div>
                    <div class="space-y-1.5">
                        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-1">Driver</label>
                        <input type="text" id="saleDriver" placeholder="Driver name" class="w-full bg-slate-50 border-none rounded-2xl p-4 font-bold">
                    </div>
                </div>
                <div class="pt-6 pb-12 md:pb-0">
                    <button type="submit" class="w-full bg-emerald-600 active:bg-emerald-700 text-white font-bold py-5 rounded-[1.5rem] shadow-xl shadow-emerald-100 flex items-center justify-center gap-2">
                        <i data-lucide="check-circle" class="w-5 h-5"></i> Commit Record
                    </button>
                </div>
            </form>
        </div>
    </div>

    <!-- Generic Modal -->
    <div id="entityModal" class="fixed inset-0 z-[100] flex items-end md:items-center justify-center hidden">
        <div class="absolute inset-0 bg-slate-900/60 backdrop-blur-sm" onclick="App.ui.closeModal('entityModal')"></div>
        <div class="bg-white w-full max-w-md rounded-t-[2.5rem] md:rounded-[2.5rem] shadow-2xl relative z-10 p-8 space-y-6">
            <h3 class="text-xl font-bold text-slate-800" id="entityModalTitle">Manage Entry</h3>
            <form id="entityForm" class="space-y-6">
                <input type="hidden" id="entityId">
                <div id="entityFields" class="space-y-5"></div>
                <button type="submit" class="w-full bg-blue-600 text-white font-bold py-5 rounded-[1.5rem] shadow-lg">Synchronize Now</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, doc, addDoc, updateDoc, deleteDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        const App = {
            config: {
                firebase: typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
                    apiKey: "AIzaSyAYb0HKLnEUuhrVcQlXACsxFk28w99qAkc",
                    authDomain: "onsale-product.firebaseapp.com",
                    projectId: "onsale-product",
                    storageBucket: "onsale-product.firebasestorage.app",
                    messagingSenderId: "837098663012",
                    appId: "1:837098663012:web:cb61b9bd7f99ec4d6e8371"
                },
                appId: typeof __app_id !== 'undefined' ? __app_id : 'onsale-product'
            },

            state: {
                activeTab: 'sales',
                store: { products: [], sellers: [], customers: [], sales: [] },
                isAuthResolved: false
            },

            async init() {
                const firebaseApp = initializeApp(this.config.firebase);
                this.auth = getAuth(firebaseApp);
                this.db = getFirestore(firebaseApp);
                
                this.bindEvents();
                await this.handleAuth();
            },

            bindEvents() {
                document.getElementById('saleForm').onsubmit = (e) => this.services.saveSale(e);
                document.getElementById('entityForm').onsubmit = (e) => this.services.saveEntity(e);
            },

            async handleAuth() {
                const authenticate = async () => {
                    if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                        try {
                            return await signInWithCustomToken(this.auth, __initial_auth_token);
                        } catch (e) {
                            console.warn("Custom token failed, falling back to anonymous.");
                        }
                    }
                    return await signInAnonymously(this.auth);
                };

                onAuthStateChanged(this.auth, (user) => {
                    if (user) {
                        this.state.isAuthResolved = true;
                        this.ui.updateStatus('success', 'Sync Active');
                        this.startListeners();
                    } else {
                        this.ui.updateStatus('error', 'Connecting...');
                    }
                });

                try {
                    await authenticate();
                } catch (err) {
                    this.ui.updateStatus('error', 'Auth Failed');
                    this.ui.toast('Authentication Error', true);
                }
            },

            startListeners() {
                ['products', 'sellers', 'customers', 'sales'].forEach(col => {
                    const path = `/artifacts/${this.config.appId}/public/data/${col}`;
                    const collRef = collection(this.db, ...path.split('/').filter(Boolean));
                    
                    onSnapshot(collRef, (snapshot) => {
                        this.state.store[col] = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
                        this.ui.render();
                    }, (err) => {
                        console.error(`Snapshot error for ${col}:`, err);
                        if (err.code === 'permission-denied') {
                            this.ui.updateStatus('error', 'Denied Access');
                        }
                    });
                });
            },

            switchTab(tab) {
                this.state.activeTab = tab;
                document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('bottom-nav-active', 'text-blue-600'));
                const btn = document.getElementById(`tab-${tab}`);
                if (btn) btn.classList.add('bottom-nav-active');
                this.ui.render();
            },

            services: {
                getPath(col, id = null) {
                    let p = `/artifacts/${App.config.appId}/public/data/${col}`;
                    if (id) p += `/${id}`;
                    return p.split('/').filter(Boolean);
                },

                async saveSale(e) {
                    e.preventDefault();
                    if (!App.state.isAuthResolved) return;
                    const sid = document.getElementById('saleId').value;
                    const data = {
                        date: document.getElementById('saleDate').value,
                        customerId: document.getElementById('saleCustomer').value,
                        productId: document.getElementById('saleProduct').value,
                        sellerId: document.getElementById('saleSeller').value,
                        price: parseFloat(document.getElementById('salePrice').value),
                        qty: parseInt(document.getElementById('saleQty').value),
                        total: parseFloat(document.getElementById('saleTotal').value),
                        status: document.getElementById('saleStatus').value,
                        driver: document.getElementById('saleDriver').value,
                        updatedAt: Date.now()
                    };
                    try {
                        if (sid) await updateDoc(doc(App.db, ...this.getPath('sales', sid)), data);
                        else await addDoc(collection(App.db, ...this.getPath('sales')), data);
                        App.ui.closeModal('saleModal');
                        App.ui.toast('Cloud Synchronized');
                    } catch (err) { App.ui.toast('Sync Error', true); }
                },

                async saveEntity(e) {
                    e.preventDefault();
                    if (!App.state.isAuthResolved) return;
                    const type = App.state.activeTab;
                    const id = document.getElementById('entityId').value;
                    const data = {};
                    document.querySelectorAll('#entityFields input').forEach(i => data[i.id.replace('en_', '')] = i.value);
                    try {
                        if (id) await updateDoc(doc(App.db, ...this.getPath(type, id)), data);
                        else await addDoc(collection(App.db, ...this.getPath(type)), data);
                        App.ui.closeModal('entityModal');
                        App.ui.toast('Database Updated');
                    } catch (err) { App.ui.toast('Error Saving', true); }
                },

                async delete(col, id) {
                    if (!confirm('Permanently remove from cloud?')) return;
                    try { await deleteDoc(doc(App.db, ...this.getPath(col, id))); App.ui.toast('Removed'); }
                    catch (err) { App.ui.toast('Delete Failed', true); }
                }
            },

            ui: {
                render() {
                    const loader = document.getElementById('loadingState');
                    if (loader) loader.classList.add('hidden');
                    document.getElementById('tableContainer').classList.remove('hidden');
                    this.updateStats();
                    this.updateActionPanel();
                    const tab = App.state.activeTab;
                    if (tab === 'sales') this.renderSales();
                    else this.renderGeneric(tab);
                    this.populateSelectors();
                    if (typeof lucide !== 'undefined') lucide.createIcons();
                },

                updateActionPanel() {
                    const tab = App.state.activeTab;
                    document.getElementById('salesFilters').style.display = tab === 'sales' ? 'grid' : 'none';
                    document.getElementById('addNewBtnLabel').innerText = `Add ${tab.slice(0, -1)}`;
                },

                updateStats() {
                    const sales = App.state.store.sales;
                    const total = sales.reduce((a, c) => a + (parseFloat(c.total) || 0), 0);
                    const paid = sales.filter(s => s.status === 'Paid').reduce((a, c) => a + (parseFloat(c.total) || 0), 0);
                    const unpaid = total - paid;
                    const data = [
                        { l: 'Revenue Flow', v: `$${total.toFixed(2)}`, p: 'border-l-blue-400' },
                        { l: 'Successful Paid', v: `$${paid.toFixed(2)}`, p: 'border-l-emerald-400' },
                        { l: 'Pending Debt', v: `$${unpaid.toFixed(2)}`, p: 'border-l-amber-400' },
                        { l: 'Record Count', v: sales.length, p: 'border-l-slate-400' }
                    ];
                    document.getElementById('statsGrid').innerHTML = data.map(d => `
                        <div class="pad-card p-5 border-l-4 ${d.p}">
                            <p class="text-[9px] font-bold text-slate-400 uppercase tracking-widest mb-1">${d.l}</p>
                            <h3 class="text-xl font-bold text-slate-900">${d.v}</h3>
                        </div>
                    `).join('');
                },

                renderSales() {
                    const search = (document.getElementById('globalSearch')?.value || '').toLowerCase();
                    const sellerF = document.getElementById('filterSeller').value;
                    const periodF = document.getElementById('filterPeriod').value;
                    const monthF = document.getElementById('filterMonth').value;

                    let list = [...App.state.store.sales];
                    if (sellerF !== 'all') list = list.filter(s => s.sellerId === sellerF);
                    const now = new Date(); now.setHours(0,0,0,0);
                    if (periodF === 'today') list = list.filter(s => new Date(s.date).getTime() === now.getTime());
                    else if (periodF === 'month' && monthF) list = list.filter(s => s.date.startsWith(monthF));
                    if (search) {
                        list = list.filter(s => {
                            const c = App.state.store.customers.find(x => x.id === s.customerId)?.name || '';
                            const p = App.state.store.products.find(x => x.id === s.productId)?.name || '';
                            return c.toLowerCase().includes(search) || p.toLowerCase().includes(search);
                        });
                    }

                    let html = `
                        <table class="w-full text-left text-sm border-collapse min-w-[700px]">
                            <thead class="bg-slate-50 text-slate-500 uppercase text-[9px] font-bold border-b">
                                <tr>
                                    <th class="px-6 py-4">Date</th>
                                    <th class="px-6 py-4">Client</th>
                                    <th class="px-6 py-4">Product</th>
                                    <th class="px-6 py-4">Total</th>
                                    <th class="px-6 py-4">Status</th>
                                    <th class="px-6 py-4 text-right">Edit</th>
                                </tr>
                            </thead>
                            <tbody class="divide-y">
                    `;
                    list.sort((a,b) => new Date(b.date) - new Date(a.date)).forEach(s => {
                        const c = App.state.store.customers.find(x => x.id === s.customerId)?.name || 'Guest';
                        const p = App.state.store.products.find(x => x.id === s.productId)?.name || '-';
                        html += `
                            <tr class="active:bg-slate-50">
                                <td class="px-6 py-5 font-bold">${s.date}</td>
                                <td class="px-6 py-5 font-bold text-slate-700">${c}</td>
                                <td class="px-6 py-5 font-bold text-blue-900">${p} <span class="text-xs opacity-40 ml-1">x${s.qty}</span></td>
                                <td class="px-6 py-5 font-bold font-mono text-slate-900">$${parseFloat(s.total).toFixed(2)}</td>
                                <td class="px-6 py-5">
                                    <span class="px-2.5 py-1 rounded-full text-[9px] font-bold uppercase ${s.status === 'Paid' ? 'bg-emerald-100 text-emerald-700' : 'bg-amber-100 text-amber-700'}">${s.status}</span>
                                </td>
                                <td class="px-6 py-5 text-right">
                                    <div class="flex justify-end gap-2">
                                        <button onclick="App.ui.editSale('${s.id}')" class="p-2.5 bg-slate-50 rounded-xl"><i data-lucide="edit-3" class="w-4 h-4 text-slate-400"></i></button>
                                        <button onclick="App.services.delete('sales', '${s.id}')" class="p-2.5 bg-red-50 rounded-xl"><i data-lucide="trash-2" class="w-4 h-4 text-red-400"></i></button>
                                    </div>
                                </td>
                            </tr>
                        `;
                    });
                    document.getElementById('tableContainer').innerHTML = html + `</tbody></table>`;
                },

                renderGeneric(type) {
                    const data = App.state.store[type];
                    const fields = { products: ['name', 'price'], sellers: ['name', 'phone'], customers: ['name', 'contact', 'address'] }[type];
                    let html = `<table class="w-full text-left text-sm border-collapse">
                        <thead class="bg-slate-50 text-slate-500 uppercase text-[9px] font-bold border-b">
                            <tr>${fields.map(f => `<th class="px-6 py-4">${f}</th>`).join('')}<th class="px-6 py-4 text-right">Action</th></tr>
                        </thead><tbody class="divide-y">`;
                    data.forEach(item => {
                        html += `<tr>${fields.map(f => `<td class="px-6 py-5 font-bold text-slate-700">${f === 'price' ? '$' + parseFloat(item[f]).toFixed(2) : item[f] || '-'}</td>`).join('')}
                            <td class="px-6 py-5 text-right flex justify-end gap-2">
                                <button onclick="App.ui.editEntity('${item.id}')" class="text-blue-600 font-bold px-2">Edit</button>
                                <button onclick="App.services.delete('${type}', '${item.id}')" class="text-red-500 font-bold px-2">Delete</button>
                            </td></tr>`;
                    });
                    document.getElementById('tableContainer').innerHTML = html + `</tbody></table>`;
                },

                handleCreateNew() {
                    if (App.state.activeTab === 'sales') {
                        document.getElementById('saleForm').reset();
                        document.getElementById('saleId').value = '';
                        document.getElementById('saleDate').valueAsDate = new Date();
                        this.openModal('saleModal');
                    } else { this.openEntityModal(); }
                },

                openEntityModal(id = null) {
                    const tab = App.state.activeTab;
                    document.getElementById('entityId').value = id || '';
                    const config = { products: [{ n: 'name', l: 'Name' }, { n: 'price', l: 'Price', t: 'number' }], sellers: [{ n: 'name', l: 'Name' }, { n: 'phone', l: 'Phone' }], customers: [{ n: 'name', l: 'Name' }, { n: 'contact', l: 'Contact' }, { n: 'address', l: 'Address' }] }[tab];
                    document.getElementById('entityFields').innerHTML = config.map(f => `<div class="space-y-1.5"><label class="text-[9px] font-bold text-slate-400 uppercase tracking-widest">${f.l}</label><input id="en_${f.n}" type="${f.t || 'text'}" step="0.01" class="w-full bg-slate-50 border-none rounded-2xl p-4 font-bold"></div>`).join('');
                    if (id) { const item = App.state.store[tab].find(x => x.id === id); if(item) config.forEach(f => document.getElementById(`en_${f.n}`).value = item[f.n] || ''); }
                    this.openModal('entityModal');
                },

                editSale(id) {
                    const s = App.state.store.sales.find(x => x.id === id);
                    if (!s) return;
                    const mapping = { saleId: 'id', saleDate: 'date', saleCustomer: 'customerId', saleProduct: 'productId', saleSeller: 'sellerId', salePrice: 'price', saleQty: 'qty', saleStatus: 'status', saleDriver: 'driver' };
                    Object.keys(mapping).forEach(k => document.getElementById(k).value = s[mapping[k]] || '');
                    this.recalcTotal();
                    this.openModal('saleModal');
                },

                editEntity(id) { this.openEntityModal(id); },
                onProductSelect() { 
                    const p = App.state.store.products.find(x => x.id === document.getElementById('saleProduct').value); 
                    if (p) { document.getElementById('salePrice').value = p.price; this.recalcTotal(); } 
                },
                recalcTotal() { 
                    const p = parseFloat(document.getElementById('salePrice').value) || 0; 
                    const q = parseInt(document.getElementById('saleQty').value) || 0; 
                    document.getElementById('saleTotal').value = (p * q).toFixed(2); 
                },
                
                populateSelectors() {
                    const c = [ { id: 'saleProduct', d: App.state.store.products, l: 'Product' }, { id: 'saleCustomer', d: App.state.store.customers, l: 'Client' }, { id: 'saleSeller', d: App.state.store.sellers, l: 'Seller' } ];
                    c.forEach(sel => { const el = document.getElementById(sel.id); const v = el.value; el.innerHTML = `<option value="">${sel.l}</option>` + sel.d.map(i => `<option value="${i.id}">${i.name}</option>`).join(''); el.value = v; });
                    const f = document.getElementById('filterSeller'); const fv = f.value; f.innerHTML = '<option value="all">Sellers</option>' + App.state.store.sellers.map(s => `<option value="${s.id}">${s.name}</option>`).join(''); f.value = fv;
                },

                handlePeriodChange() { document.getElementById('monthPickerWrapper').style.display = document.getElementById('filterPeriod').value === 'month' ? 'block' : 'none'; this.render(); },
                updateStatus(type, text) { 
                    const label = document.getElementById('statusLabel');
                    const dot = document.getElementById('statusDot');
                    if(label) label.innerText = text; 
                    if(dot) dot.className = `w-2.5 h-2.5 rounded-full ${type === 'success' ? 'bg-emerald-500 shadow-[0_0_8px_rgba(16,185,129,0.5)]' : 'bg-red-500 shadow-[0_0_8px_rgba(239,68,68,0.5)]'}`; 
                },
                openModal(id) { document.getElementById(id).classList.remove('hidden'); },
                closeModal(id) { document.getElementById(id).classList.add('hidden'); },
                toast(msg, err = false) { const t = document.createElement('div'); t.className = `fixed top-20 left-1/2 -translate-x-1/2 px-8 py-4 rounded-2xl text-white text-[10px] font-bold shadow-2xl z-[200] ${err ? 'bg-red-500' : 'bg-slate-900'} transition-all`; t.innerText = msg; document.body.appendChild(t); setTimeout(() => t.remove(), 2500); }
            }
        };

        App.init();
        window.App = App;
    </script>
</body>
</html>
