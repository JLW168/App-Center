<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>New Application Boilerplate</title>
    
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Google Fonts (Khmer & English) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Moul&family=Siemreap&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Battambang', 'Siemreap', 'sans-serif'],
                        display: ['Moul', 'Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- React & Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

    <!-- Custom Theme Styles (Retained from Original App) -->
    <style>
        @import url('https://rsms.me/inter/inter.css');
        html, body { 
            font-family: 'Inter', 'Battambang', 'Siemreap', sans-serif;
            overflow-x: hidden; 
            overscroll-behavior-x: none;
        }
        
        .font-khmer-header { font-family: 'Moul', cursive; }

        /* Splash Screen */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0f172a; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease-out, visibility 0.5s;
        }
        .splash-loader {
            width: 48px; height: 48px;
            border: 5px solid #3b82f6; border-bottom-color: transparent;
            border-radius: 50%; display: inline-block;
            box-sizing: border-box; animation: rotation 1s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Forms */
        .input, .select {
            margin-top: 0.25rem; display: block; width: 100%; padding: 0.5rem 0.75rem;
            border-width: 1px; border-color: #475569; border-radius: 0.375rem;
            background-color: #334155; color: #f1f5f9; outline: none;
        }
        .input:focus, .select:focus { border-color: #2563eb; ring: 1px; ring-color: #2563eb; }
        .input[disabled], .select[disabled] { background-color: #475569; opacity: 0.7; cursor: not-allowed; }

        /* Animations & Scrollbar */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 0.6s ease-out forwards; }
        
        .skeleton {
            background: linear-gradient(to right, #334155 8%, #475569 18%, #334155 33%);
            background-size: 800px 104px; animation: shimmer 2s infinite linear; border-radius: 0.75rem;
        }
        @keyframes shimmer { 0% { background-position: -800px 0; } 100% { background-position: 800px 0; } }

        .custom-scrollbar { -webkit-overflow-scrolling: touch; scrollbar-width: thin; scrollbar-color: #475569 #1e293b; }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; height: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #1e293b; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #475569; border-radius: 20px; }
    </style>
</head>
<body class="bg-slate-900 text-slate-300">
    <div id="splash-screen">
        <span class="splash-loader"></span>
        <h2 style="color: white; font-weight: 600;">Loading App...</h2>
    </div>

    <div id="root"></div>

    <!-- Firebase SDK (v11) -->
    <script type="module">
        import { initializeApp, deleteApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword, signInAnonymously, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, serverTimestamp, getDocs, writeBatch, enableIndexedDbPersistence, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseSDK = {
            initializeApp, deleteApp, getAuth, getFirestore, collection, onSnapshot,
            doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, serverTimestamp,
            signInWithEmailAndPassword, onAuthStateChanged, signOut, getDocs, writeBatch,
            enableIndexedDbPersistence, setDoc, createUserWithEmailAndPassword, signInAnonymously, signInWithCustomToken
        };
    </script>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, createContext, useContext, memo, useRef } = React;

        // === 1. FIREBASE SETUP ===
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyAYb0HKLnEUuhrVcQlXACsxFk28w99qAkc",
            authDomain: "onsale-product.firebaseapp.com",
            projectId: "onsale-product",
            storageBucket: "onsale-product.firebasestorage.app",
            messagingSenderId: "837098663012",
            appId: "1:837098663012:web:cb61b9bd7f99ec4d6e8371"
        };
        
        // MODIFIED: Changed the default ID to a clean, professional name for your database
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'onsale-crm-app';
        
        // NEW: Detect if we are running in the Chat Preview (Test Mode) or Locally (Live)
        const isTestEnv = typeof __firebase_config !== 'undefined';

        const FirebaseContext = createContext(null);
        const useFirebase = () => useContext(FirebaseContext);

        const FirebaseProvider = ({ children }) => {
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);
            const [currentUser, setCurrentUser] = useState(null);
            const [userProfile, setUserProfile] = useState(() => {
                try { return JSON.parse(localStorage.getItem('app_user_profile')) || null; } catch(e) { return null; }
            });
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                try {
                    const { initializeApp, getFirestore, getAuth, onAuthStateChanged, enableIndexedDbPersistence, signInAnonymously, signInWithCustomToken } = window.firebaseSDK;
                    const app = initializeApp(firebaseConfig);
                    const dbInstance = getFirestore(app);
                    enableIndexedDbPersistence(dbInstance).catch(console.warn);
                    const authInstance = getAuth(app);
                    
                    setAuth(authInstance); setDb(dbInstance);
                    
                    const initAuth = async () => {
                        try {
                            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                                await signInWithCustomToken(authInstance, __initial_auth_token);
                            } else {
                                await signInAnonymously(authInstance);
                            }
                        } catch (e) {
                            console.error("Auth init error:", e);
                            setLoading(false);
                        }
                    };
                    
                    initAuth();

                    return onAuthStateChanged(authInstance, (user) => {
                        setCurrentUser(user);
                        if (!user) {
                            setUserProfile(null); localStorage.removeItem('app_user_profile'); setLoading(false);
                        } else {
                            // If anon, we might not have a profile, just stop loading
                            if (user.isAnonymous) {
                                setUserProfile({ name: 'Anonymous User', role: 'Staff' });
                                setLoading(false);
                            }
                        }
                    });
                } catch (error) { console.error("Firebase init error:", error); setLoading(false); } 
            }, []);

            useEffect(() => {
                if (!db || !currentUser || currentUser.isAnonymous) return;
                
                // IMPORTANT: Use the correct path based on instructions
                // Private user data goes to: /artifacts/{appId}/users/{userId}/{collectionName}
                const { collection, onSnapshot } = window.firebaseSDK;
                const userRef = collection(db, 'artifacts', appId, 'users', currentUser.uid, 'profile');
                
                return onSnapshot(userRef, (snapshot) => {
                    if (!snapshot.empty) {
                        const profileData = { id: snapshot.docs[0].id, ...snapshot.docs[0].data() };
                        setUserProfile(profileData);
                        localStorage.setItem('app_user_profile', JSON.stringify(profileData));
                    } else {
                        // Fallback profile if none exists in the specific path yet
                         setUserProfile({ name: currentUser.email || 'User', role: 'Staff', uid: currentUser.uid });
                    }
                    setLoading(false);
                }, (err) => { 
                    console.error("Profile fetch error:", err); 
                    // Fallback to allow app to load even if profile read fails
                    setUserProfile({ name: currentUser.email || 'User', role: 'Staff', uid: currentUser.uid });
                    setLoading(false); 
                });
            }, [db, currentUser]);

            return <FirebaseContext.Provider value={{ db, auth, currentUser, userProfile, loading }}>{children}</FirebaseContext.Provider>;
        };

        // === 2. GLOBAL DATA CONTEXT ===
        const AppDataContext = createContext(null);
        const useAppData = () => useContext(AppDataContext);

        const AppDataProvider = ({ children }) => {
            const { db, currentUser } = useFirebase();
            const [systemConfig, setSystemConfig] = useState({ appName: 'My New App' });
            const [isLoading, setIsLoading] = useState(true);

            useEffect(() => {
                if(!db || !currentUser) {
                    setIsLoading(false);
                    return;
                }
                const { collection, onSnapshot } = window.firebaseSDK;
                
                // IMPORTANT: Fetch global config from the public path
                // /artifacts/{appId}/public/data/{collectionName}
                const configRef = collection(db, 'artifacts', appId, 'public', 'data', 'systemConfig');
                
                const unsub = onSnapshot(configRef, (snapshot) => {
                    if (!snapshot.empty) {
                        const globalDoc = snapshot.docs.find(d => d.id === 'global');
                        if (globalDoc) {
                             setSystemConfig(globalDoc.data());
                        }
                    }
                    setIsLoading(false);
                }, (err) => {
                    console.error("System config error:", err);
                    setIsLoading(false);
                });
                return () => unsub();
            }, [db, currentUser]);

            return <AppDataContext.Provider value={{ systemConfig, isLoading }}>{children}</AppDataContext.Provider>;
        };

        // === 3. UI KIT (Reusable Components) ===
        const Card = memo(({ children, className = '' }) => (<div className={`bg-slate-800/50 p-4 sm:p-6 rounded-lg shadow-lg border border-slate-700 ${className}`}>{children}</div>));
        const CardTitle = memo(({ children }) => (<h2 className="text-2xl font-semibold text-slate-100 mb-4 pb-4 border-b border-slate-700">{children}</h2>));
        const PageHeader = memo(({ title, children }) => (
            <div className="flex flex-wrap gap-4 justify-between items-center mb-6">
                <h3 className="text-xl font-semibold text-slate-100">{title}</h3>
                <div className="flex flex-wrap gap-4 items-center">{children}</div>
            </div>
        ));
        const Button = memo(({ children, onClick, variant = 'primary', icon, disabled = false, type = 'button', className = '' }) => {
            const base = 'font-medium rounded-lg shadow-sm transition-colors flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed';
            const variants = {
                primary: 'bg-blue-600 text-white hover:bg-blue-700 px-4 py-2',
                secondary: 'bg-slate-600 text-slate-200 hover:bg-slate-500 px-4 py-2',
                danger: 'bg-red-600 text-white hover:bg-red-700 px-4 py-2',
                success: 'bg-green-600 text-white hover:bg-green-700 px-4 py-2',
            };
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`${base} ${variants[variant] || variants.primary} ${className}`}>
                    {icon && <i className={`fas ${icon}`}></i>} {children}
                </button>
            );
        });

        const Modal = ({ isOpen, onClose, children, maxWidth = "max-w-2xl" }) => { 
            if (!isOpen) return null; 
            return ReactDOM.createPortal(
                <div className="fixed inset-0 z-[60] overflow-y-auto bg-black bg-opacity-75 flex items-center justify-center p-4">
                    <div className={`relative bg-slate-800 rounded-lg shadow-2xl w-full ${maxWidth} border border-slate-600 flex flex-col max-h-[85vh]`}>
                        {children}
                    </div>
                </div>, document.body
            ); 
        };
        const ModalHeader = ({ title, onClose }) => (<div className="p-5 border-b border-slate-700 flex justify-between"><h3 className="text-xl font-semibold">{title}</h3><button onClick={onClose} className="text-slate-400 hover:text-white"><i className="fas fa-times"></i></button></div>);
        const ModalBody = ({ children }) => (<div className="p-6 flex-1 overflow-y-auto custom-scrollbar">{children}</div>);
        const ModalFooter = ({ children }) => (<div className="p-4 bg-slate-900/50 border-t border-slate-700 flex justify-end gap-3">{children}</div>);

        // === NEW: SECURE FIRESTORE COLLECTION HOOK ===
        const useCollection = (collectionName) => {
            const { db, currentUser } = useFirebase();
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            useEffect(() => {
                if (!db || !currentUser) return;
                
                const { collection, onSnapshot } = window.firebaseSDK;
                // STRICT RULE 1: Public data path
                const ref = collection(db, 'artifacts', appId, 'public', 'data', collectionName);
                
                const unsub = onSnapshot(ref, (snapshot) => {
                    const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    // STRICT RULE 2: Sort in memory (Newest first)
                    docs.sort((a, b) => {
                        const timeA = a.createdAt?.toMillis?.() || 0;
                        const timeB = b.createdAt?.toMillis?.() || 0;
                        return timeB - timeA;
                    });
                    setData(docs);
                    setLoading(false);
                    setError(null);
                }, (err) => {
                    console.error(`Error fetching ${collectionName}:`, err);
                    // NEW: Capture and format permission errors gracefully
                    setError(err.code === 'permission-denied' ? 'Permission Denied: Your database is locked.' : err.message);
                    setLoading(false);
                });
                
                return () => unsub();
            }, [db, currentUser, collectionName]);

            return { data, loading, error };
        };

        // === NEW: CUSTOMER MODAL COMPONENT ===
        const CustomerModal = ({ isOpen, onClose, customer }) => {
            const { db, currentUser } = useFirebase();
            const [formData, setFormData] = useState({
                name: '', contactPerson: '', phone: '', type: 'Retail', status: 'Active', address: '', lat: '', lng: '', notes: ''
            });
            const [isSaving, setIsSaving] = useState(false);
            const [isGettingGPS, setIsGettingGPS] = useState(false);

            useEffect(() => {
                if (customer) {
                    setFormData({ ...customer });
                } else {
                    setFormData({ name: '', contactPerson: '', phone: '', type: 'Retail', status: 'Active', address: '', lat: '', lng: '', notes: '' });
                }
            }, [customer, isOpen]);

            const handleChange = (e) => setFormData({ ...formData, [e.target.name]: e.target.value });

            const handleGetLocation = () => {
                setIsGettingGPS(true);
                if ("geolocation" in navigator) {
                    navigator.geolocation.getCurrentPosition(
                        (position) => {
                            setFormData(prev => ({ ...prev, lat: position.coords.latitude, lng: position.coords.longitude }));
                            setIsGettingGPS(false);
                        },
                        (error) => {
                            alert("Error getting location. Please ensure GPS permissions are allowed.");
                            setIsGettingGPS(false);
                        },
                        { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                    );
                } else {
                    alert("Geolocation is not supported by this browser.");
                    setIsGettingGPS(false);
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setIsSaving(true);
                const { collection, doc, addDoc, updateDoc, serverTimestamp } = window.firebaseSDK;
                const collectionRef = collection(db, 'artifacts', appId, 'public', 'data', 'customers');

                try {
                    if (customer?.id) {
                        await updateDoc(doc(collectionRef, customer.id), { ...formData, updatedAt: serverTimestamp() });
                    } else {
                        await addDoc(collectionRef, { 
                            ...formData, 
                            createdBy: currentUser.uid, 
                            createdAt: serverTimestamp(),
                            updatedAt: serverTimestamp()
                        });
                    }
                    onClose();
                } catch (error) {
                    console.error("Error saving customer:", error);
                    alert("Failed to save customer.");
                } finally {
                    setIsSaving(false);
                }
            };

            return (
                <Modal isOpen={isOpen} onClose={onClose} maxWidth="max-w-3xl">
                    {/* FIX: Added 'overflow-hidden' to ensure the form respects the modal's maximum height and allows the body to scroll */}
                    <form onSubmit={handleSubmit} className="flex flex-col h-full overflow-hidden">
                        <ModalHeader title={customer ? "Edit Customer" : "Add New Customer"} onClose={onClose} />
                        <ModalBody>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div className="md:col-span-2">
                                    <label className="text-sm text-emerald-400 font-bold">Business / Shop Name *</label>
                                    <input name="name" value={formData.name} onChange={handleChange} className="input border-emerald-500/30 focus:border-emerald-500" required placeholder="e.g., Dara Supermarket" />
                                </div>
                                <div>
                                    <label className="text-sm text-slate-400">Contact Person</label>
                                    <input name="contactPerson" value={formData.contactPerson} onChange={handleChange} className="input" placeholder="Owner or Manager Name" />
                                </div>
                                <div>
                                    <label className="text-sm text-slate-400">Phone Number *</label>
                                    <input name="phone" value={formData.phone} onChange={handleChange} className="input" required placeholder="012 345 678" />
                                </div>
                                <div>
                                    <label className="text-sm text-slate-400">Customer Type</label>
                                    <select name="type" value={formData.type} onChange={handleChange} className="select font-bold">
                                        <option value="Retail">Retail Store</option>
                                        <option value="Wholesale">Wholesaler / Distributor</option>
                                        <option value="Prospect">Prospect / Lead</option>
                                    </select>
                                </div>
                                <div>
                                    <label className="text-sm text-slate-400">Status</label>
                                    <select name="status" value={formData.status} onChange={handleChange} className="select font-bold">
                                        <option value="Active">Active</option>
                                        <option value="Inactive">Inactive</option>
                                    </select>
                                </div>
                                <div className="md:col-span-2">
                                    <label className="text-sm text-slate-400">Address</label>
                                    <textarea name="address" value={formData.address} onChange={handleChange} className="input" rows="2" placeholder="Street, Sangkat, Khan..."></textarea>
                                </div>
                                
                                {/* GPS Location Section */}
                                <div className="md:col-span-2 bg-slate-900/50 p-4 rounded-lg border border-slate-700">
                                    <div className="flex justify-between items-center mb-3">
                                        <label className="text-sm font-bold text-amber-400"><i className="fas fa-map-marker-alt mr-2"></i>GPS Location</label>
                                        <Button type="button" variant="secondary" onClick={handleGetLocation} disabled={isGettingGPS} className="text-xs px-3 py-1">
                                            {isGettingGPS ? <i className="fas fa-spinner fa-spin"></i> : <><i className="fas fa-crosshairs mr-1"></i> Get Current Location</>}
                                        </Button>
                                    </div>
                                    <div className="grid grid-cols-2 gap-4">
                                        <div>
                                            <label className="text-xs text-slate-500">Latitude</label>
                                            <input name="lat" value={formData.lat} onChange={handleChange} className="input text-sm font-mono text-slate-300" placeholder="e.g., 11.5564" readOnly />
                                        </div>
                                        <div>
                                            <label className="text-xs text-slate-500">Longitude</label>
                                            <input name="lng" value={formData.lng} onChange={handleChange} className="input text-sm font-mono text-slate-300" placeholder="e.g., 104.9282" readOnly />
                                        </div>
                                    </div>
                                </div>

                                <div className="md:col-span-2">
                                    <label className="text-sm text-slate-400">Notes / Remarks</label>
                                    <textarea name="notes" value={formData.notes} onChange={handleChange} className="input" rows="2" placeholder="Any special instructions or details..."></textarea>
                                </div>
                            </div>
                        </ModalBody>
                        <ModalFooter>
                            <Button type="button" variant="secondary" onClick={onClose}>Cancel</Button>
                            <Button type="submit" variant="primary" className="bg-emerald-600 hover:bg-emerald-700" disabled={isSaving}>
                                {isSaving ? 'Saving...' : 'Save Customer'}
                            </Button>
                        </ModalFooter>
                    </form>
                </Modal>
            );
        };

        // === NEW: CUSTOMERS PAGE COMPONENT ===
        const CustomersPage = () => {
            // MODIFIED: Destructure the new error state
            const { data: customers, loading, error } = useCollection('customers');
            const [searchTerm, setSearchTerm] = useState('');
            const [filterType, setFilterType] = useState('All');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingCustomer, setEditingCustomer] = useState(null);

            const filteredCustomers = useMemo(() => {
                return customers.filter(c => {
                    const matchesSearch = c.name?.toLowerCase().includes(searchTerm.toLowerCase()) || c.phone?.includes(searchTerm);
                    const matchesType = filterType === 'All' || c.type === filterType;
                    return matchesSearch && matchesType;
                });
            }, [customers, searchTerm, filterType]);

            const handleOpenModal = (customer = null) => {
                setEditingCustomer(customer);
                setIsModalOpen(true);
            };

            return (
                <div className="space-y-6">
                    <PageHeader title="Customer Directory">
                        <Button variant="primary" icon="fa-plus" onClick={() => handleOpenModal()} className="bg-emerald-600 hover:bg-emerald-700">Add Customer</Button>
                    </PageHeader>

                    {/* NEW: Graceful Error Display Banner */}
                    {error && (
                        <div className="bg-red-900/30 border border-red-500/50 p-4 rounded-lg flex items-start gap-4 animate-fade-in mb-4">
                            <i className="fas fa-shield-alt text-2xl text-red-400 mt-1"></i>
                            <div>
                                <h4 className="text-red-400 font-bold text-lg">Database Connection Blocked</h4>
                                <p className="text-slate-300 text-sm mt-1">{error}</p>
                                <p className="text-slate-400 text-xs mt-2">
                                    To fix this, go to your Firebase Console (<strong>onsale-product</strong>) &gt; Firestore Database &gt; Rules, and set them to <code className="bg-black/50 px-1 py-0.5 rounded text-red-300 font-mono">allow read, write: if true;</code>
                                </p>
                            </div>
                        </div>
                    )}

                    {/* Filters & Search */}
                    <div className="bg-slate-800/50 p-4 rounded-lg border border-slate-700 flex flex-col sm:flex-row gap-4">
                        <div className="flex-1 relative">
                            <i className="fas fa-search absolute left-3 top-3 text-slate-500"></i>
                            <input 
                                type="text" 
                                placeholder="Search by name or phone..." 
                                value={searchTerm} 
                                onChange={(e) => setSearchTerm(e.target.value)}
                                className="input !mt-0 pl-10"
                            />
                        </div>
                        <select value={filterType} onChange={(e) => setFilterType(e.target.value)} className="select !mt-0 sm:w-48 font-bold text-emerald-400">
                            <option value="All">All Types</option>
                            <option value="Retail">Retail</option>
                            <option value="Wholesale">Wholesale</option>
                            <option value="Prospect">Prospect</option>
                        </select>
                    </div>

                    {/* Customer Cards Grid */}
                    {loading ? (
                        <div className="text-center py-12"><i className="fas fa-spinner fa-spin text-4xl text-emerald-500"></i></div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-3 gap-4">
                            {filteredCustomers.length === 0 ? (
                                <div className="col-span-full text-center py-12 text-slate-500 bg-slate-800/30 rounded-lg border border-slate-700 border-dashed">
                                    <i className="fas fa-store-slash text-4xl mb-3 opacity-50"></i>
                                    <p>No customers found.</p>
                                </div>
                            ) : (
                                filteredCustomers.map(customer => (
                                    <div key={customer.id} className="bg-slate-800 border border-slate-700 rounded-xl p-5 shadow-lg hover:border-emerald-500/50 transition-all flex flex-col group relative overflow-hidden">
                                        <div className={`absolute top-0 right-0 w-16 h-16 -mr-8 -mt-8 rounded-full opacity-20 transition-transform group-hover:scale-150 ${
                                            customer.type === 'Retail' ? 'bg-blue-500' : customer.type === 'Wholesale' ? 'bg-purple-500' : 'bg-amber-500'
                                        }`}></div>
                                        
                                        <div className="flex justify-between items-start mb-4 relative z-10">
                                            <div className="pr-4">
                                                <h4 className="font-bold text-lg text-white leading-tight">{customer.name}</h4>
                                                <p className="text-sm text-emerald-400 mt-0.5"><i className="fas fa-user-circle mr-1"></i> {customer.contactPerson || 'N/A'}</p>
                                            </div>
                                            <span className={`px-2 py-1 text-[10px] uppercase font-bold rounded-full border shadow-sm shrink-0 ${
                                                customer.status === 'Active' ? 'bg-emerald-900/50 text-emerald-400 border-emerald-700/50' : 'bg-slate-900/50 text-slate-400 border-slate-700/50'
                                            }`}>
                                                {customer.status}
                                            </span>
                                        </div>

                                        <div className="space-y-2 mb-4 flex-1 text-sm relative z-10">
                                            <p className="text-slate-300 flex items-center gap-2"><i className="fas fa-phone text-slate-500 w-4"></i> {customer.phone}</p>
                                            <p className="text-slate-300 flex items-start gap-2"><i className="fas fa-map-marker-alt text-slate-500 w-4 mt-1"></i> <span className="line-clamp-2">{customer.address || 'No address provided'}</span></p>
                                            <p className="text-slate-400 flex items-center gap-2"><i className="fas fa-tag text-slate-500 w-4"></i> {customer.type}</p>
                                            
                                            {(customer.lat && customer.lng) && (
                                                <p className="text-amber-400/80 text-xs mt-2 inline-flex items-center bg-amber-900/20 px-2 py-1 rounded border border-amber-900/30">
                                                    <i className="fas fa-satellite-dish mr-1"></i> GPS Pinned
                                                </p>
                                            )}
                                        </div>

                                        <div className="pt-3 border-t border-slate-700 flex justify-end gap-2 relative z-10">
                                            {(customer.lat && customer.lng) && (
                                                <a href={`https://www.google.com/maps/search/?api=1&query=${customer.lat},${customer.lng}`} target="_blank" rel="noopener noreferrer" className="px-3 py-1.5 rounded bg-blue-900/30 hover:bg-blue-600 text-blue-400 hover:text-white transition-colors text-xs font-bold border border-blue-800/50 flex items-center shadow-md">
                                                    <i className="fas fa-directions mr-1"></i> Map
                                                </a>
                                            )}
                                            <button onClick={() => handleOpenModal(customer)} className="px-3 py-1.5 rounded bg-slate-700 hover:bg-emerald-600 text-slate-300 hover:text-white transition-colors text-xs font-bold shadow-md flex items-center">
                                                <i className="fas fa-edit mr-1"></i> Edit
                                            </button>
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    )}
                    
                    <CustomerModal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} customer={editingCustomer} />
                </div>
            );
        };

        // === 4. MODULE DEFINITIONS ===
        // MODIFIED: Updated modules for Outdoor Sales & Customer Tracking
        const APP_MODULES = [
            { key: 'dashboard', label: 'Dashboard', icon: 'fa-chart-pie', color: 'text-blue-500', bg: 'bg-blue-500/10' },
            { key: 'customers', label: 'Customers', icon: 'fa-store', color: 'text-emerald-500', bg: 'bg-emerald-500/10' },
            { key: 'visits', label: 'GPS Visits', icon: 'fa-map-location-dot', color: 'text-amber-500', bg: 'bg-amber-500/10' },
            { key: 'orders', label: 'Sales Orders', icon: 'fa-file-invoice-dollar', color: 'text-purple-500', bg: 'bg-purple-500/10' },
            { key: 'products', label: 'Products', icon: 'fa-box-open', color: 'text-cyan-500', bg: 'bg-cyan-500/10' },
            { key: 'settings', label: 'Settings', icon: 'fa-sliders', color: 'text-slate-400', bg: 'bg-slate-500/10' }
        ];

        // === 5. AUTH & LOGIN PAGE ===
        const LoginPage = () => {
            const { auth } = useFirebase();
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                if(!auth) return;
                setLoading(true);
                try {
                    await window.firebaseSDK.signInWithEmailAndPassword(auth, email, password);
                } catch(err) {
                    alert("Login Failed: " + err.message);
                    setLoading(false);
                }
            };

            return (
                <div className="flex items-center justify-center min-h-screen bg-slate-900">
                    <div className="w-full max-w-md p-8 bg-slate-800 rounded-2xl shadow-lg border border-slate-700 text-center">
                        <i className="fas fa-rocket text-5xl text-blue-500 mb-4"></i>
                        <h2 className="text-3xl font-bold text-white">App Boilerplate</h2>
                        <p className="text-slate-400 mt-2 mb-8">Sign in to your workspace</p>
                        
                        <form onSubmit={handleLogin} className="space-y-4">
                            <input type="email" placeholder="Email" className="input py-3" value={email} onChange={e=>setEmail(e.target.value)} required />
                            <input type="password" placeholder="Password" className="input py-3" value={password} onChange={e=>setPassword(e.target.value)} required />
                            <Button type="submit" className="w-full py-3 mt-4" disabled={loading}>
                                {loading ? <i className="fas fa-spinner fa-spin"></i> : 'Sign In'}
                            </Button>
                        </form>
                    </div>
                </div>
            );
        };

        // === 6. MAIN APP SHELL & ROUTING ===
        const AppContent = () => {
            const { userProfile, loading, auth } = useFirebase();
            const { systemConfig } = useAppData();
            const [activePage, setActivePage] = useState('dashboard');
            const [isLaunchPadOpen, setIsLaunchPadOpen] = useState(true);
            const [isProfileOpen, setIsProfileOpen] = useState(false);
            
            // Remove splash when ready
            useEffect(() => {
                if (!loading) {
                    const splash = document.getElementById('splash-screen');
                    if (splash) { splash.style.opacity = '0'; setTimeout(() => splash.remove(), 500); }
                }
            }, [loading]);

            if (loading) return null; // Splash handles visual loading
            if (!userProfile) return <LoginPage />; // Fallback login

            // MODIFIED: Updated routing for Sales modules
            const renderPage = () => {
                switch(activePage) {
                    case 'dashboard': return <Card><CardTitle>Sales Dashboard</CardTitle><p className="text-slate-400">Overview of today's sales, active field reps, and targets.</p></Card>;
                    case 'customers': return <CustomersPage />;
                    case 'visits': return <Card><CardTitle>Field Visits (GPS)</CardTitle><p className="text-slate-400">Track sales rep check-ins at customer locations.</p></Card>;
                    case 'orders': return <Card><CardTitle>Sales Orders</CardTitle><p className="text-slate-400">Record and track outdoor sales transactions.</p></Card>;
                    case 'products': return <Card><CardTitle>Product Catalog</CardTitle><p className="text-slate-400">Manage your inventory, SKUs, and pricing.</p></Card>;
                    case 'settings': return <Card><CardTitle>System Settings</CardTitle><p className="text-slate-400">Configure app preferences, user roles, and global rules.</p></Card>;
                    default: return <Card><CardTitle>404</CardTitle><p>Module not found.</p></Card>;
                }
            };

            return (
                <div className="flex h-screen bg-[#0f172a] text-slate-300 font-sans overflow-hidden">
                    
                    {/* SYSTEM LAUNCHPAD (MENU) */}
                    {isLaunchPadOpen && (
                        <div className="fixed inset-0 z-50 flex flex-col animate-fade-in bg-[#0f172a]">
                            <header className="px-6 py-5 flex justify-between items-center z-30">
                                <div className="flex items-center gap-3">
                                    <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-indigo-600 flex items-center justify-center">
                                        <i className="fas fa-layer-group text-white text-lg"></i>
                                    </div>
                                    <h1 className="text-xl font-bold text-white">{systemConfig?.appName || 'App Boilerplate'}</h1>
                                </div>
                                <button onClick={() => setIsLaunchPadOpen(false)} className="text-slate-400 hover:text-white"><i className="fas fa-times text-xl"></i></button>
                            </header>
                            <div className="flex-1 overflow-y-auto px-6 pb-20">
                                <div className="max-w-5xl mx-auto grid grid-cols-3 sm:grid-cols-4 md:grid-cols-6 gap-4">
                                    {APP_MODULES.map(module => (
                                        <button key={module.key} onClick={() => { setActivePage(module.key); setIsLaunchPadOpen(false); }} className="group flex flex-col items-center gap-3 w-full">
                                            <div className={`w-full aspect-square rounded-[28px] flex items-center justify-center bg-[#1E293B] border border-slate-700/50 shadow-lg group-hover:bg-[#253045] transition-all`}>
                                                <i className={`fas ${module.icon} text-4xl ${module.color}`}></i>
                                            </div>
                                            <span className="text-xs font-semibold text-slate-400 group-hover:text-white">{module.label}</span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MAIN WORKSPACE */}
                    <div className="flex-1 flex flex-col min-w-0">
                        {/* Header */}
                        <header className="px-6 py-4 flex justify-between items-center bg-slate-900/80 border-b border-slate-800 z-40 backdrop-blur-md">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setIsLaunchPadOpen(true)} className="p-2 rounded-lg text-slate-400 hover:text-white">
                                    <i className="fas fa-bars text-xl"></i>
                                </button>
                                <span className="font-bold text-white flex items-center">
                                    {systemConfig?.appName || 'App Boilerplate'}
                                    {/* NEW: Visual indicator so you always know which database you are writing to! */}
                                    {isTestEnv && (
                                        <span className="ml-3 text-[10px] uppercase font-bold tracking-wider px-2 py-1 rounded bg-amber-500/20 text-amber-400 border border-amber-500/50 shadow-sm">
                                            Test Database
                                        </span>
                                    )}
                                </span>
                            </div>
                            
                            <div className="relative">
                                <button onClick={() => setIsProfileOpen(!isProfileOpen)} className="w-10 h-10 rounded-full bg-slate-800 border border-slate-700 flex items-center justify-center text-white font-bold">
                                    {userProfile?.name?.charAt(0) || 'U'}
                                </button>
                                {isProfileOpen && (
                                    <div className="absolute right-0 mt-2 w-48 bg-slate-800 rounded-lg shadow-xl py-2 border border-slate-700">
                                        <div className="px-4 pb-2 border-b border-slate-700 mb-2">
                                            <p className="text-xs text-slate-400">Signed in as</p>
                                            <p className="text-sm font-bold text-white truncate">{userProfile?.name || 'User'}</p>
                                        </div>
                                        <button onClick={() => window.firebaseSDK.signOut(auth)} className="w-full text-left px-4 py-2 text-sm text-red-400 hover:bg-slate-700">
                                            <i className="fas fa-sign-out-alt mr-2"></i> Logout
                                        </button>
                                    </div>
                                )}
                            </div>
                        </header>

                        {/* Content Area */}
                        <main className="flex-1 overflow-y-auto p-6 bg-[#0f172a]">
                            <div className="max-w-7xl mx-auto animate-fade-in">
                                {renderPage()}
                            </div>
                        </main>
                    </div>

                </div>
            );
        };

        // === 7. INITIALIZATION ===
        const App = () => (
            <FirebaseProvider>
                <AppDataProvider>
                    <AppContent />
                </AppDataProvider>
            </FirebaseProvider>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
