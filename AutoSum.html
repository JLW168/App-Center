<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ABA PayWay Transaction System</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM (UMD) -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel (Standalone) for running React in the browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Recharts (Depends on prop-types) -->
    <script src="https://unpkg.com/prop-types/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.1.12/umd/Recharts.js"></script>
    
    <!-- Phosphor Icons -->
    <script src="https://unpkg.com/@phosphor-icons/web"></script>
</head>
<body class="bg-slate-50 text-slate-900 font-sans">
    
    <div id="root"></div>

    <!-- The 'data-type="module"' attribute tells Babel to parse ES module imports -->
    <script type="text/babel" data-type="module">
        import { initializeApp, deleteApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
        import { getFirestore, collection, doc, setDoc, onSnapshot, updateDoc, deleteDoc, writeBatch } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

        const { useState, useEffect, useMemo, createContext, useContext, useCallback } = React;
        const { LineChart, Line, BarChart, Bar, XAxis, YAxis, CartesianGrid, Tooltip: RechartsTooltip, ResponsiveContainer } = window.Recharts;

        // --- FIREBASE CONFIGURATION ---
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
          apiKey: "AIzaSyB6wMOAPUR2o3cjNWX56PDQezL39NVtDzM",
          authDomain: "telegramtrans-6d984.firebaseapp.com",
          projectId: "telegramtrans-6d984",
          storageBucket: "telegramtrans-6d984.firebasestorage.app",
          messagingSenderId: "955477138700",
          appId: "1:955477138700:web:fd1d2c98ada9c2ee093d29",
          measurementId: "G-VS8GVJ93CP"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'aba-payway-sys';

        // --- CONTEXTS ---
        const ToastContext = createContext(null);
        const AppContext = createContext(null);

        // --- TOAST PROVIDER ---
        const ToastProvider = ({ children }) => {
          const [toasts, setToasts] = useState([]);

          const addToast = useCallback((message, type = 'success') => {
            const id = Date.now();
            setToasts(prev => [...prev, { id, message, type }]);
            setTimeout(() => {
              setToasts(prev => prev.filter(t => t.id !== id));
            }, 5000);
          }, []);

          return (
            <ToastContext.Provider value={addToast}>
              {children}
              <div className="fixed bottom-4 right-4 z-50 flex flex-col gap-2 pointer-events-none">
                {toasts.map(t => (
                  <div key={t.id} className={`flex items-center gap-2 px-4 py-3 rounded-lg shadow-lg text-white pointer-events-auto transition-all transform translate-y-0 opacity-100 ${
                    t.type === 'error' ? 'bg-red-500' : t.type === 'warning' ? 'bg-amber-500' : 'bg-emerald-500'
                  }`}>
                    {t.type === 'error' ? <i className="ph ph-warning-circle text-xl"></i> : <i className="ph ph-check-circle text-xl"></i>}
                    <span className="font-medium text-sm">{t.message}</span>
                  </div>
                ))}
              </div>
            </ToastContext.Provider>
          );
        };

        const useToast = () => useContext(ToastContext);

        // --- TELEGRAM PARSER UTILS ---
        const parseAbaMessage = (text, telegramDate) => {
          if (!text || (!text.includes('via ABA PAY') && !text.includes('ABA PAY'))) return null;

          try {
            const cleanText = text.replace(/\n/g, ' ').replace(/\s+/g, ' ');

            const amountMatch = cleanText.match(/(\$|៛)\s*([0-9,.]+)/);
            if (!amountMatch) return null;
            const currency = amountMatch[1] === '$' ? 'USD' : 'KHR';
            const amount = parseFloat(amountMatch[2].replace(/,/g, ''));

            const customerMatch = cleanText.match(/paid by (.*?)\s*\(\*(\d+)\)/i);
            const customer = customerMatch ? customerMatch[1].trim() : 'Unknown';
            const account = customerMatch ? customerMatch[2] : '';

            const dateMatch = cleanText.match(/on\s+([A-Za-z]+\s+\d+)/i);
            const timeMatch = cleanText.match(/(\d{1,2}:\d{2}\s*[AM|PM|am|pm]{2})/i);
            
            const merchantMatch = cleanText.match(/at\s+(.*?)\s+(?:Trx|Trx\.|Transaction)/i);
            const merchant = merchantMatch ? merchantMatch[1].trim() : 'Unknown';

            const trxMatch = cleanText.match(/Trx\.?\s*ID\s*(\d+)/i);
            const trxId = trxMatch ? trxMatch[1] : `UNK-${Date.now()}`;

            const apvMatch = cleanText.match(/APV\s*(\d+)/i);
            const apv = apvMatch ? apvMatch[1] : '';

            return {
              currency,
              amount,
              customer,
              account,
              merchant,
              trxId,
              apv,
              dateStr: dateMatch ? dateMatch[1] : '',
              timeStr: timeMatch ? timeMatch[1] : '',
              timestamp: telegramDate ? telegramDate * 1000 : Date.now(),
              status: 'success'
            };
          } catch (err) {
            console.error("Parsing error:", err);
            return null;
          }
        };

        // --- MAIN APP COMPONENT ---
        const AppContent = () => {
          const [user, setUser] = useState(null);
          const [activeTab, setActiveTab] = useState('dashboard');
          const [isSidebarOpen, setSidebarOpen] = useState(true);
          const [isLoading, setIsLoading] = useState(true);
          const addToast = useToast();

          // App Data State
          const [transactions, setTransactions] = useState([]);
          const [shops, setShops] = useState([]);
          const [settings, setSettings] = useState({ autoSync: true });
          const [isSyncing, setIsSyncing] = useState(false);

          // Advanced Sync State
          const [isSyncModalOpen, setIsSyncModalOpen] = useState(false);
          const [syncParams, setSyncParams] = useState({ shopId: 'ALL', fromDate: '', toDate: '' });

          // 1. Authenticate (Rule 3)
          useEffect(() => {
            const initAuth = async () => {
              try {
                // Allows seamless Canvas previews if a token is provided, 
                // but restricts general public access without a valid login.
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token && !auth.currentUser) {
                  await signInWithCustomToken(auth, __initial_auth_token);
                }
              } catch (err) {
                console.error("Auth Error:", err);
              }
            };
            initAuth();

            const unsubscribe = onAuthStateChanged(auth, (usr) => {
              setUser(usr);
              setIsLoading(false);
            });
            return () => unsubscribe();
          }, []);

          // 2. Fetch Data (Rules 1 & 2 - Simple Collections)
          useEffect(() => {
            if (!user) return;

            // Fetch Settings
            const settingsRef = collection(db, 'artifacts', appId, 'public', 'data', 'settings');
            const unsubSettings = onSnapshot(settingsRef, (snap) => {
              let sysSettings = { autoSync: false };
              snap.forEach(doc => {
                if (doc.id === 'system') sysSettings = { ...sysSettings, ...doc.data() };
              });
              setSettings(sysSettings);
            }, (err) => console.error(err));

            // Fetch Shops
            const shopsRef = collection(db, 'artifacts', appId, 'public', 'data', 'shops');
            const unsubShops = onSnapshot(shopsRef, (snap) => {
              const fetchedShops = [];
              snap.forEach(doc => fetchedShops.push({ id: doc.id, ...doc.data() }));
              setShops(fetchedShops);
            }, (err) => console.error(err));

            // Fetch Transactions
            const txRef = collection(db, 'artifacts', appId, 'public', 'data', 'transactions');
            const unsubTx = onSnapshot(txRef, (snap) => {
              const txs = [];
              snap.forEach(doc => txs.push({ id: doc.id, ...doc.data() }));
              // Sort in memory (newest first)
              txs.sort((a, b) => b.timestamp - a.timestamp);
              setTransactions(txs);
              setIsLoading(false);
            }, (err) => console.error(err));

            return () => {
              unsubSettings();
              unsubShops();
              unsubTx();
            };
          }, [user]);

          // 3. Telegram Sync Logic
          const syncTelegram = useCallback(async (options = { manual: false }) => {
            if (shops.length === 0) {
              if (options.manual) addToast("Please add a Shop with a Bot Token first.", "warning");
              return;
            }
            if (isSyncing) return;
            
            setIsSyncing(true);
            let totalImported = 0;
            let totalSkipped = 0;

            const targetShops = options.shopId && options.shopId !== 'ALL' 
                ? shops.filter(s => s.id === options.shopId)
                : shops;

            const fromTime = options.fromDate ? new Date(options.fromDate).getTime() : null;
            const toTime = options.toDate ? new Date(options.toDate).getTime() : null;

            try {
              const batch = writeBatch(db);
              const txRef = collection(db, 'artifacts', appId, 'public', 'data', 'transactions');

              for (const shop of targetShops) {
                if (!shop.botToken) continue;

                try {
                  const response = await fetch(`https://api.telegram.org/bot${shop.botToken}/getUpdates?offset=${(shop.lastUpdateId || 0) + 1}`);
                  const data = await response.json();

                  if (!data.ok) {
                    console.error(`Error syncing shop ${shop.name}:`, data.description);
                    continue;
                  }

                  const updates = data.result;
                  if (updates.length === 0) continue;

                  let newHighestUpdateId = shop.lastUpdateId || 0;

                  for (const update of updates) {
                    newHighestUpdateId = Math.max(newHighestUpdateId, update.update_id);
                    
                    const message = update.message || update.channel_post;
                    if (!message || !message.text) continue;

                    // Filter by requested date range using Telegram's exact timestamp
                    if (fromTime || toTime) {
                        const msgTime = message.date * 1000;
                        if (fromTime && msgTime < fromTime) continue;
                        if (toTime && msgTime > toTime) continue;
                    }

                    const parsedData = parseAbaMessage(message.text, message.date);
                    if (parsedData) {
                      const isDuplicate = transactions.some(t => t.trxId === parsedData.trxId);
                      if (!isDuplicate) {
                        const newDocRef = doc(txRef);
                        batch.set(newDocRef, {
                          ...parsedData,
                          shopId: shop.id,
                          shopName: shop.name,
                          telegramUpdateId: update.update_id,
                          telegramMessageId: message.message_id,
                          importedAt: Date.now()
                        });
                        totalImported++;
                      } else {
                        totalSkipped++;
                      }
                    }
                  }

                  if (newHighestUpdateId > (shop.lastUpdateId || 0)) {
                    const shopRef = doc(db, 'artifacts', appId, 'public', 'data', 'shops', shop.id);
                    batch.update(shopRef, { lastUpdateId: newHighestUpdateId });
                  }
                } catch (shopErr) {
                  console.error(`Network error syncing shop ${shop.name}:`, shopErr);
                }
              }

              if (totalImported > 0 || totalSkipped > 0) {
                 await batch.commit();
                 addToast(`Imported: ${totalImported} | Duplicates Skipped: ${totalSkipped}`, "success");
              } else {
                 if (options.manual) addToast("Parsed updates, but no new transactions found.", "success");
              }

            } catch (err) {
              console.error(err);
              if (options.manual) addToast(`Sync failed: ${err.message}`, "error");
            } finally {
              setIsSyncing(false);
            }
          }, [shops, transactions, addToast, isSyncing, db]);

          // Auto Sync Loop
          useEffect(() => {
            let interval;
            if (settings.autoSync && shops.length > 0) {
              interval = setInterval(() => syncTelegram({ manual: false }), 15000); // Poll every 15s
            }
            return () => clearInterval(interval);
          }, [settings.autoSync, shops, syncTelegram]);

          // Helper functions for UI
          const formatMoney = (amount, currency) => {
            return currency === 'USD' 
              ? new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(amount)
              : `៛${new Intl.NumberFormat('en-US').format(amount)}`;
          };

          const formatDate = (timestamp) => {
            if (!timestamp) return 'N/A';
            const d = new Date(timestamp);
            return d.toLocaleString('en-US', { month: 'short', day: 'numeric', year: 'numeric', hour: '2-digit', minute: '2-digit' });
          };

          const navItems = [
            { id: 'dashboard', label: 'Dashboard', iconClass: 'ph ph-squares-four' },
            { id: 'transactions', label: 'Transactions', iconClass: 'ph ph-receipt' },
            { id: 'reports', label: 'Reports', iconClass: 'ph ph-chart-bar' },
            { id: 'shops', label: 'Shops & Branches', iconClass: 'ph ph-storefront' },
            { id: 'settings', label: 'Settings', iconClass: 'ph ph-gear' },
          ];

          const handleLogout = async () => {
            try {
              await signOut(auth);
              addToast("Logged out successfully", "success");
            } catch (err) {
              addToast(`Logout failed: ${err.message}`, "error");
            }
          };

          if (isLoading) {
            return (
              <div className="min-h-screen bg-slate-50 flex items-center justify-center">
                <div className="flex flex-col items-center gap-4">
                  <i className="ph ph-arrows-clockwise text-blue-600 animate-spin text-[2.5rem]"></i>
                  <p className="text-slate-500 font-medium animate-pulse">Loading Workspace...</p>
                </div>
              </div>
            );
          }

          if (!user) {
            return <LoginView />;
          }

          return (
            <AppContext.Provider value={{ transactions, shops, settings, db, user, formatMoney, formatDate, syncTelegram, isSyncing }}>
              <div className="min-h-screen bg-slate-50/50 flex font-sans text-slate-900">
                
                {/* SIDEBAR */}
                <aside className={`${isSidebarOpen ? 'w-64' : 'w-20'} bg-white border-r border-slate-200 transition-all duration-300 flex flex-col fixed h-full z-20 shadow-sm`}>
                  <div className="h-16 flex items-center justify-between px-4 border-b border-slate-100">
                    <div className={`flex items-center gap-2 overflow-hidden transition-all ${isSidebarOpen ? 'opacity-100' : 'opacity-0 w-0'}`}>
                      <div className="w-8 h-8 rounded-lg bg-blue-600 text-white flex items-center justify-center font-bold text-lg">A</div>
                      <span className="font-bold text-slate-800 whitespace-nowrap">ABA PayWay</span>
                    </div>
                    <button onClick={() => setSidebarOpen(!isSidebarOpen)} className="p-1.5 text-slate-400 hover:text-slate-600 hover:bg-slate-100 rounded-md">
                      <i className="ph ph-list text-xl"></i>
                    </button>
                  </div>
                  <nav className="flex-1 p-3 space-y-1 overflow-y-auto">
                    {navItems.map((item) => (
                      <button
                        key={item.id}
                        onClick={() => setActiveTab(item.id)}
                        className={`w-full flex items-center gap-3 px-3 py-2.5 rounded-lg transition-colors ${
                          activeTab === item.id 
                            ? 'bg-blue-50 text-blue-700 font-semibold' 
                            : 'text-slate-600 hover:bg-slate-100 hover:text-slate-900'
                        }`}
                      >
                        <i className={`${item.iconClass} text-xl ${activeTab === item.id ? 'text-blue-600' : 'text-slate-400'}`}></i>
                        {isSidebarOpen && <span>{item.label}</span>}
                      </button>
                    ))}
                  </nav>
                  <div className="p-4 border-t border-slate-100">
                    <button onClick={handleLogout} className="w-full flex items-center gap-3 px-3 py-2.5 rounded-lg text-red-600 hover:bg-red-50 transition-colors">
                      <i className="ph ph-sign-out text-xl"></i>
                      {isSidebarOpen && <span className="font-medium">Logout</span>}
                    </button>
                  </div>
                </aside>

                {/* MAIN CONTENT */}
                <main className={`flex-1 flex flex-col transition-all duration-300 ${isSidebarOpen ? 'ml-64' : 'ml-20'}`}>
                  {/* HEADER */}
                  <header className="h-16 bg-white border-b border-slate-200 sticky top-0 z-10 flex items-center justify-between px-6 shadow-sm">
                    <div className="flex items-center gap-4">
                      <h1 className="text-xl font-bold text-slate-800 capitalize">
                        {activeTab.replace('-', ' ')}
                      </h1>
                    </div>
                    <div className="flex items-center gap-4">
                      <button 
                        onClick={() => setIsSyncModalOpen(true)}
                        disabled={isSyncing}
                        className={`flex items-center gap-2 px-4 py-2 rounded-lg text-sm font-medium transition-all ${
                          isSyncing 
                          ? 'bg-slate-100 text-slate-400 cursor-not-allowed' 
                          : 'bg-blue-50 text-blue-700 hover:bg-blue-100'
                        }`}
                      >
                        <i className={`ph ph-arrows-clockwise text-base ${isSyncing ? 'animate-spin' : ''}`}></i>
                        {isSyncing ? 'Syncing...' : 'Advanced Sync'}
                      </button>
                      <div className="h-8 w-px bg-slate-200"></div>
                      <button className="p-2 text-slate-400 hover:bg-slate-100 rounded-full relative">
                        <i className="ph ph-bell text-xl"></i>
                        <span className="absolute top-1 right-1 w-2 h-2 bg-red-500 rounded-full"></span>
                      </button>
                      <div className="flex items-center gap-2 pl-2">
                        <div className="w-8 h-8 rounded-full bg-slate-200 flex items-center justify-center text-slate-600 font-medium border border-slate-300">
                          {user?.uid?.substring(0, 2).toUpperCase() || 'AD'}
                        </div>
                      </div>
                    </div>
                  </header>

                  {/* DYNAMIC CONTENT */}
                  <div className="flex-1 p-6 overflow-y-auto">
                    {activeTab === 'dashboard' && <DashboardView />}
                    {activeTab === 'transactions' && <TransactionsView />}
                    {activeTab === 'reports' && <ReportsView />}
                    {activeTab === 'settings' && <SettingsView />}
                    {activeTab === 'shops' && <ShopsView />}
                  </div>
                </main>

                {/* ADVANCED SYNC MODAL */}
                {isSyncModalOpen && (
                  <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-[100] p-4">
                    <div className="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden animate-in fade-in zoom-in-95 duration-200">
                      <div className="flex justify-between items-center p-4 border-b border-slate-100 bg-slate-50">
                        <h3 className="font-bold text-lg text-slate-800">Advanced Sync</h3>
                        <button onClick={() => setIsSyncModalOpen(false)} className="text-slate-400 hover:text-slate-600">
                          <i className="ph ph-x text-xl"></i>
                        </button>
                      </div>
                      <div className="p-5 space-y-4">
                        <div className="bg-blue-50 text-blue-700 text-xs p-3 rounded-lg flex gap-2">
                          <i className="ph ph-info mt-0.5 text-sm"></i>
                          <p>Telegram Bot API fetches recent unacknowledged messages (usually last 24h). Setting older dates filters available messages, but cannot retrieve cleared history.</p>
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-slate-700 mb-1">Select Shop</label>
                          <select 
                            value={syncParams.shopId}
                            onChange={(e) => setSyncParams({...syncParams, shopId: e.target.value})}
                            className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm bg-white"
                          >
                            <option value="ALL">All Shops</option>
                            {shops.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                          </select>
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                          <div>
                            <label className="block text-sm font-medium text-slate-700 mb-1">From Date & Time</label>
                            <input 
                              type="datetime-local" 
                              value={syncParams.fromDate}
                              onChange={(e) => setSyncParams({...syncParams, fromDate: e.target.value})}
                              className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm"
                            />
                          </div>
                          <div>
                            <label className="block text-sm font-medium text-slate-700 mb-1">To Date & Time</label>
                            <input 
                              type="datetime-local" 
                              value={syncParams.toDate}
                              onChange={(e) => setSyncParams({...syncParams, toDate: e.target.value})}
                              className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm"
                            />
                          </div>
                        </div>
                      </div>
                      <div className="p-4 flex justify-end gap-3 border-t border-slate-100">
                        <button type="button" onClick={() => setIsSyncModalOpen(false)} className="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 rounded-lg transition-colors">
                          Cancel
                        </button>
                        <button 
                          onClick={() => {
                            setIsSyncModalOpen(false);
                            syncTelegram({ manual: true, ...syncParams });
                          }} 
                          className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors flex items-center gap-2"
                        >
                          <i className="ph ph-arrows-clockwise text-base"></i> Run Sync
                        </button>
                      </div>
                    </div>
                  </div>
                )}
              </div>
            </AppContext.Provider>
          );
        };

        // --- SUB-VIEWS ---

        const DashboardView = () => {
          const { transactions, formatMoney } = useContext(AppContext);

          // Compute stats in memory
          const stats = useMemo(() => {
            const today = new Date();
            today.setHours(0, 0, 0, 0);

            let todayUSD = 0, todayKHR = 0, count = 0;
            
            transactions.forEach(t => {
              if (t.timestamp >= today.getTime()) {
                count++;
                if (t.currency === 'USD') todayUSD += t.amount;
                if (t.currency === 'KHR') todayKHR += t.amount;
              }
            });

            return { todayUSD, todayKHR, count, totalCount: transactions.length };
          }, [transactions]);

          // Chart Data preparation
          const chartData = useMemo(() => {
            const days = {};
            // Last 7 days
            for (let i = 6; i >= 0; i--) {
              const d = new Date();
              d.setDate(d.getDate() - i);
              days[d.toLocaleDateString('en-US', { weekday: 'short' })] = { name: d.toLocaleDateString('en-US', { weekday: 'short' }), USD: 0, count: 0 };
            }

            transactions.forEach(t => {
              const dateKey = new Date(t.timestamp).toLocaleDateString('en-US', { weekday: 'short' });
              if (days[dateKey]) {
                if (t.currency === 'USD') days[dateKey].USD += t.amount;
                days[dateKey].count += 1;
              }
            });

            return Object.values(days);
          }, [transactions]);

          return (
            <div className="space-y-6">
              {/* Stats Row */}
              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <StatCard title="Today's USD" value={formatMoney(stats.todayUSD, 'USD')} iconClass="ph ph-currency-dollar" color="blue" />
                <StatCard title="Today's KHR" value={formatMoney(stats.todayKHR, 'KHR')} iconClass="ph ph-wallet" color="emerald" />
                <StatCard title="Today's Transactions" value={stats.count.toString()} iconClass="ph ph-receipt" color="indigo" />
                <StatCard title="Total Processed" value={stats.totalCount.toString()} iconClass="ph ph-check-circle" color="slate" />
              </div>

              {/* Charts Row */}
              <div className="grid grid-cols-1 lg:grid-cols-3 gap-6">
                <div className="lg:col-span-2 bg-white rounded-xl shadow-sm border border-slate-200 p-6">
                  <div className="flex justify-between items-center mb-6">
                    <h3 className="font-bold text-slate-800">Revenue Trend (Last 7 Days)</h3>

        const TransactionsView = () => {
          const { transactions, formatMoney, formatDate } = useContext(AppContext);
          const [searchTerm, setSearchTerm] = useState('');
          const [currencyFilter, setCurrencyFilter] = useState('ALL');
          const [page, setPage] = useState(1);
          const limit = 15;

          // In-memory filter (Rule 2)
          const filteredTxs = useMemo(() => {
            return transactions.filter(t => {
              const matchSearch = 
                t.customer.toLowerCase().includes(searchTerm.toLowerCase()) || 
                t.trxId.includes(searchTerm) ||
                t.amount.toString().includes(searchTerm);
              const matchCurrency = currencyFilter === 'ALL' || t.currency === currencyFilter;
              return matchSearch && matchCurrency;
            });
          }, [transactions, searchTerm, currencyFilter]);

          const paginatedTxs = filteredTxs.slice((page - 1) * limit, page * limit);
          const totalPages = Math.ceil(filteredTxs.length / limit);

          return (
            <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden flex flex-col h-full">
              {/* Toolbar */}
              <div className="p-4 border-b border-slate-200 flex flex-col sm:flex-row gap-4 justify-between items-center bg-slate-50/50">
                <div className="relative w-full sm:w-96">
                  <i className="ph ph-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                  <input 
                    type="text" 
                    placeholder="Search Trx ID, Customer, Amount..." 
                    value={searchTerm}
                    onChange={(e) => {setSearchTerm(e.target.value); setPage(1);}}
                    className="w-full pl-10 pr-4 py-2 rounded-lg border border-slate-200 focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 transition-all text-sm"
                  />
                </div>
                <div className="flex gap-2 w-full sm:w-auto">
                  <select 
                    value={currencyFilter} 
                    onChange={(e) => {setCurrencyFilter(e.target.value); setPage(1);}}
                    className="px-3 py-2 border border-slate-200 rounded-lg text-sm bg-white outline-none focus:border-blue-500"
                  >
                    <option value="ALL">All Currencies</option>
                    <option value="USD">USD ($)</option>
                    <option value="KHR">KHR (៛)</option>
                  </select>
                  <button className="flex items-center gap-2 px-3 py-2 border border-slate-200 rounded-lg text-sm bg-white hover:bg-slate-50 transition-colors">
                    <i className="ph ph-funnel text-base"></i> Filters
                  </button>
                </div>
              </div>

              {/* Table */}
              <div className="overflow-x-auto flex-1">
                <table className="w-full text-left text-sm whitespace-nowrap">
                  <thead className="bg-slate-50 text-slate-500 font-medium border-b border-slate-200 sticky top-0 z-10">
                    <tr>
                      <th className="px-6 py-4">Transaction ID / Date</th>
                      <th className="px-6 py-4">Customer</th>
                      <th className="px-6 py-4">Merchant (Shop)</th>
                      <th className="px-6 py-4 text-right">Amount</th>
                      <th className="px-6 py-4 text-center">Status</th>
                    </tr>
                  </thead>
                  <tbody className="divide-y divide-slate-100">
                    {paginatedTxs.length === 0 ? (
                      <tr>
                        <td colSpan="5" className="px-6 py-12 text-center text-slate-500">
                          <i className="ph ph-receipt text-5xl mx-auto block w-fit text-slate-300 mb-3"></i>
                          <p className="font-medium text-slate-700">No transactions found</p>
                          <p className="text-sm">Try adjusting your search or sync Telegram messages.</p>
                        </td>
                      </tr>
                    ) : (
                      paginatedTxs.map((tx) => (
                        <tr key={tx.id} className="hover:bg-slate-50/50 transition-colors group">
                          <td className="px-6 py-3">
                            <div className="font-medium text-slate-800">{tx.trxId}</div>
                            <div className="text-xs text-slate-500 flex items-center gap-1 mt-0.5">
                              <i className="ph ph-clock text-xs"></i> {formatDate(tx.timestamp)}
                            </div>
                          </td>
                          <td className="px-6 py-3">
                            <div className="font-medium text-slate-700">{tx.customer}</div>
                            {tx.account && <div className="text-xs text-slate-400">Acc: *{tx.account}</div>}
                          </td>
                          <td className="px-6 py-3 text-slate-600">{tx.merchant}</td>
                          <td className="px-6 py-3 text-right">
                            <span className={`font-bold ${tx.currency === 'USD' ? 'text-blue-600' : 'text-emerald-600'}`}>
                              {formatMoney(tx.amount, tx.currency)}
                            </span>
                          </td>
                          <td className="px-6 py-3 text-center">
                            <span className="inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium bg-emerald-50 text-emerald-700 border border-emerald-200/50">
                              <i className="ph ph-check-circle text-xs"></i> Success
                            </span>
                          </td>
                        </tr>
                      ))
                    )}
                  </tbody>
                </table>
              </div>

              {/* Pagination */}
              <div className="p-4 border-t border-slate-200 flex items-center justify-between bg-white">
                <span className="text-sm text-slate-500">
                  Showing <span className="font-medium text-slate-700">{(page - 1) * limit + (filteredTxs.length > 0 ? 1 : 0)}</span> to <span className="font-medium text-slate-700">{Math.min(page * limit, filteredTxs.length)}</span> of <span className="font-medium text-slate-700">{filteredTxs.length}</span>
                </span>
                <div className="flex gap-1">
                  <button 
                    disabled={page === 1}
                    onClick={() => setPage(p => p - 1)}
                    className="px-3 py-1.5 border border-slate-200 rounded text-sm disabled:opacity-50 hover:bg-slate-50"
                  >
                    Prev
                  </button>
                  <button 
                    disabled={page >= totalPages}
                    onClick={() => setPage(p => p + 1)}
                    className="px-3 py-1.5 border border-slate-200 rounded text-sm disabled:opacity-50 hover:bg-slate-50"
                  >
                    Next
                  </button>
                </div>
              </div>
            </div>
          );
        };

        const ReportsView = () => {
          const { transactions, formatMoney } = useContext(AppContext);
          const [dateRange, setDateRange] = useState('today');

          const reportData = useMemo(() => {
            let filtered = [...transactions];
            const now = new Date();
            
            if (dateRange === 'today') {
              const start = new Date(now.setHours(0,0,0,0)).getTime();
              filtered = filtered.filter(t => t.timestamp >= start);
            } else if (dateRange === 'week') {
              const start = new Date(now.setDate(now.getDate() - 7)).getTime();
              filtered = filtered.filter(t => t.timestamp >= start);
            } else if (dateRange === 'month') {
              const start = new Date(now.setMonth(now.getMonth() - 1)).getTime();
              filtered = filtered.filter(t => t.timestamp >= start);
            }

            let usdTotal = 0, khrTotal = 0, count = filtered.length;
            let highest = 0;

            filtered.forEach(t => {
              if (t.currency === 'USD') {
                usdTotal += t.amount;
                if (t.amount > highest) highest = t.amount;
              }
              if (t.currency === 'KHR') khrTotal += t.amount;
            });

            return { usdTotal, khrTotal, count, avgUsd: count ? usdTotal / count : 0, highest, raw: filtered };
          }, [transactions, dateRange]);

          const generateCSV = () => {
            const headers = ['Date', 'Transaction ID', 'Customer', 'Account', 'Amount', 'Currency', 'Merchant', 'APV'];
            const rows = reportData.raw.map(t => [
              new Date(t.timestamp).toLocaleString(),
              t.trxId, t.customer, t.account, t.amount, t.currency, t.merchant, t.apv
            ]);
            const csvContent = "data:text/csv;charset=utf-8," + [headers.join(','), ...rows.map(e => e.join(','))].join("\n");
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", `payway_report_${dateRange}.csv`);
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
          };

          return (
            <div className="space-y-6">
              <div className="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <div className="flex gap-2">
                  {['today', 'week', 'month', 'all'].map(range => (
                    <button
                      key={range}
                      onClick={() => setDateRange(range)}
                      className={`px-4 py-2 rounded-lg text-sm font-medium capitalize transition-colors ${
                        dateRange === range ? 'bg-blue-600 text-white shadow-sm' : 'text-slate-600 hover:bg-slate-100'
                      }`}
                    >
                      {range === 'all' ? 'All Time' : `This ${range}`}
                    </button>
                  ))}
                </div>
                <button onClick={generateCSV} className="flex items-center gap-2 px-4 py-2 bg-slate-900 text-white rounded-lg text-sm font-medium hover:bg-slate-800 transition-colors">
                  <i className="ph ph-download-simple text-base"></i> Export CSV
                </button>
              </div>

              <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                <div className="bg-gradient-to-br from-blue-600 to-blue-700 rounded-xl p-6 text-white shadow-md">
                  <p className="text-blue-100 text-sm font-medium mb-1">Total USD Volume</p>
                  <h3 className="text-3xl font-bold">{formatMoney(reportData.usdTotal, 'USD')}</h3>
                </div>
                <div className="bg-gradient-to-br from-emerald-600 to-emerald-700 rounded-xl p-6 text-white shadow-md">
                  <p className="text-emerald-100 text-sm font-medium mb-1">Total KHR Volume</p>
                  <h3 className="text-3xl font-bold">{formatMoney(reportData.khrTotal, 'KHR')}</h3>
                </div>
                <div className="bg-white rounded-xl p-6 border border-slate-200 shadow-sm">
                  <p className="text-slate-500 text-sm font-medium mb-1">Transactions</p>
                  <h3 className="text-3xl font-bold text-slate-800">{reportData.count}</h3>
                </div>
                <div className="bg-white rounded-xl p-6 border border-slate-200 shadow-sm">
                  <p className="text-slate-500 text-sm font-medium mb-1">Highest Payment (USD)</p>
                  <h3 className="text-3xl font-bold text-slate-800">{formatMoney(reportData.highest, 'USD')}</h3>
                </div>
              </div>
            </div>
          );
        };

        const SettingsView = () => {
          const { settings, db, shops } = useContext(AppContext);
          const addToast = useToast();
          const [localSettings, setLocalSettings] = useState({ autoSync: true });
          const [isSavingSystem, setIsSavingSystem] = useState(false);

          // User Management State
          const [users, setUsers] = useState([]);
          const [isUserModalOpen, setIsUserModalOpen] = useState(false);
          const [editingUser, setEditingUser] = useState(null);
          const [userToDelete, setUserToDelete] = useState(null);
          const [isSavingUser, setIsSavingUser] = useState(false);
          const [showPassword, setShowPassword] = useState(false);
          
          const [userForm, setUserForm] = useState({
            name: '', email: '', password: '', role: 'Staff', shopId: '', note: ''
          });

          // Fetch System Settings
          useEffect(() => {
            if (settings) {
              setLocalSettings({ autoSync: settings.autoSync ?? true });
            }
          }, [settings]);

          // Fetch Users
          useEffect(() => {
            const usersRef = collection(db, 'artifacts', appId, 'public', 'data', 'users');
            const unsubUsers = onSnapshot(usersRef, (snap) => {
              const fetchedUsers = [];
              snap.forEach(doc => fetchedUsers.push({ id: doc.id, ...doc.data() }));
              setUsers(fetchedUsers);
            }, (err) => console.error("Error fetching users:", err));
            return () => unsubUsers();
          }, [db]);

          const handleSaveSystemSettings = async () => {
            setIsSavingSystem(true);
            try {
              const setRef = doc(collection(db, 'artifacts', appId, 'public', 'data', 'settings'), 'system');
              await setDoc(setRef, localSettings, { merge: true });
              addToast("Settings saved successfully", "success");
            } catch (err) {
              addToast(err.message, "error");
            } finally {
              setIsSavingSystem(false);
            }
          };

          const handleOpenUserModal = (user = null) => {
            if (user) {
              setEditingUser(user);
              setUserForm({ 
                name: user.name, 
                email: user.email, 
                password: '', // Hidden on edit
                role: user.role || 'Staff', 
                shopId: user.shopId || '', 
                note: user.note || '' 
              });
            } else {
              setEditingUser(null);
              setUserForm({ name: '', email: '', password: '', role: 'Staff', shopId: '', note: '' });
            }
            setShowPassword(false);
            setIsUserModalOpen(true);
          };

          const handleSaveUser = async (e) => {
            e.preventDefault();
            setIsSavingUser(true);
            try {
              const usersCollection = collection(db, 'artifacts', appId, 'public', 'data', 'users');

              if (editingUser) {
                // Update existing user profile (Note: password/email changes require Admin SDK or re-auth, so we only update profile)
                const docRef = doc(usersCollection, editingUser.id);
                await updateDoc(docRef, {
                  name: userForm.name,
                  role: userForm.role,
                  shopId: userForm.shopId,
                  note: userForm.note,
                  updatedAt: Date.now()
                });
                addToast("User profile updated successfully", "success");
              } else {
                // Create New User in Firebase Auth without logging out current user
                let newUid = crypto.randomUUID();
                let secondaryApp;
                try {
                  // Initialize a temporary secondary app to handle registration
                  secondaryApp = initializeApp(firebaseConfig, `SecondaryApp_${Date.now()}`);
                  const secondaryAuth = getAuth(secondaryApp);
                  const userCred = await createUserWithEmailAndPassword(secondaryAuth, userForm.email, userForm.password);
                  newUid = userCred.user.uid;
                  await secondaryAuth.signOut();
                  await deleteApp(secondaryApp);
                } catch (authErr) {
                  if (secondaryApp) await deleteApp(secondaryApp);
                  throw new Error(`Authentication Error: ${authErr.message}`);
                }

                // Save profile to Firestore
                const newDocRef = doc(usersCollection, newUid);
                await setDoc(newDocRef, {
                  name: userForm.name,
                  email: userForm.email,
                  role: userForm.role,
                  shopId: userForm.shopId,
                  note: userForm.note,
                  createdAt: Date.now()
                });
                addToast("User created successfully", "success");
              }
              setIsUserModalOpen(false);
            } catch (err) {
              addToast(err.message, "error");
            } finally {
              setIsSavingUser(false);
            }
          };

          const confirmDeleteUser = async () => {
            if (!userToDelete) return;
            try {
              await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'users', userToDelete.id));
              addToast("User deleted successfully", "success");
              setUserToDelete(null);
            } catch (err) {
              addToast(err.message, "error");
            }
          };

          return (
            <div className="space-y-6">
              {/* SYSTEM CONFIGURATION */}
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                  <div>
                    <h2 className="text-base font-bold text-slate-800">System Integration</h2>
                    <p className="text-xs text-slate-500">Configure global synchronization settings.</p>
                  </div>
                  <button 
                    onClick={handleSaveSystemSettings}
                    disabled={isSavingSystem}
                    className="px-4 py-2 bg-slate-900 text-white rounded-lg text-sm font-medium hover:bg-slate-800 transition-colors disabled:opacity-50"
                  >
                    {isSavingSystem ? 'Saving...' : 'Save Config'}
                  </button>
                </div>
                
                <div className="p-6">
                  <div className="flex items-center gap-3 bg-white p-4 rounded-lg border border-slate-200 max-w-lg">
                    <input 
                      type="checkbox" 
                      id="autoSync"
                      checked={localSettings.autoSync}
                      onChange={(e) => setLocalSettings({...localSettings, autoSync: e.target.checked})}
                      className="w-5 h-5 text-blue-600 rounded border-slate-300 focus:ring-blue-500 cursor-pointer"
                    />
                    <div>
                      <label htmlFor="autoSync" className="font-medium text-slate-800 block cursor-pointer">Enable Auto-Sync Polling</label>
                      <span className="text-xs text-slate-500">Automatically check for new messages across all shops every 15 seconds.</span>
                    </div>
                  </div>
                </div>
              </div>

              {/* USER MANAGEMENT */}
              <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="p-4 border-b border-slate-200 flex justify-between items-center bg-slate-50">
                  <div>
                    <h2 className="text-base font-bold text-slate-800">User Management</h2>
                    <p className="text-xs text-slate-500">Manage system access, roles, and shop assignments.</p>
                  </div>
                  <button 
                    onClick={() => handleOpenUserModal()}
                    className="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors"
                  >
                    <i className="ph ph-user-plus text-base"></i> Add New User
                  </button>
                </div>

                <div className="overflow-x-auto">
                  <table className="w-full text-left text-sm whitespace-nowrap">
                    <thead className="bg-white text-slate-500 font-medium border-b border-slate-200">
                      <tr>
                        <th className="px-6 py-4">User Info</th>
                        <th className="px-6 py-4">Role</th>
                        <th className="px-6 py-4">Shop Assigned</th>
                        <th className="px-6 py-4">Note</th>
                        <th className="px-6 py-4 text-right">Actions</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {users.length === 0 ? (
                        <tr>
                          <td colSpan="5" className="px-6 py-12 text-center text-slate-500">
                            <i className="ph ph-users text-[3rem] mx-auto block w-fit text-slate-300 mb-3"></i>
                            <p className="font-medium text-slate-700">No users found</p>
                            <p className="text-sm">Click "Add New User" to register a team member.</p>
                          </td>
                        </tr>
                      ) : (
                        users.map((u) => {
                          const assignedShop = shops.find(s => s.id === u.shopId);
                          return (
                            <tr key={u.id} className="hover:bg-slate-50/50 transition-colors group">
                              <td className="px-6 py-3">
                                <div className="font-medium text-slate-800">{u.name}</div>
                                <div className="text-xs text-slate-500">{u.email}</div>
                              </td>
                              <td className="px-6 py-3">
                                <span className={`inline-flex items-center px-2 py-1 rounded-md text-xs font-medium border ${
                                  u.role === 'Admin' ? 'bg-purple-50 text-purple-700 border-purple-200' :
                                  u.role === 'Shop Manager' ? 'bg-blue-50 text-blue-700 border-blue-200' :
                                  'bg-slate-100 text-slate-700 border-slate-200'
                                }`}>
                                  {u.role}
                                </span>
                              </td>
                              <td className="px-6 py-3 text-slate-600">
                                {assignedShop ? assignedShop.name : <span className="text-slate-400 italic">None / All Shops</span>}
                              </td>
                              <td className="px-6 py-3 text-slate-600 truncate max-w-[200px]">{u.note || '-'}</td>
                              <td className="px-6 py-3 text-right">
                                <div className="flex justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                  <button onClick={() => handleOpenUserModal(u)} className="p-1.5 text-blue-600 hover:bg-blue-50 rounded-md transition-colors" title="Edit User">
                                    <i className="ph ph-pencil-simple text-base"></i>
                                  </button>
                                  <button onClick={() => setUserToDelete(u)} className="p-1.5 text-red-600 hover:bg-red-50 rounded-md transition-colors" title="Delete User">
                                    <i className="ph ph-trash text-base"></i>
                                  </button>
                                </div>
                              </td>
                            </tr>
                          )
                        })
                      )}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* USER ADD/EDIT MODAL */}
              {isUserModalOpen && (
                <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-50 p-4">
                  <div className="bg-white rounded-xl shadow-xl w-full max-w-lg overflow-hidden animate-in fade-in zoom-in-95 duration-200">
                    <div className="flex justify-between items-center p-4 border-b border-slate-100 bg-slate-50">
                      <h3 className="font-bold text-lg text-slate-800">{editingUser ? 'Edit User Profile' : 'Register New User'}</h3>
                      <button onClick={() => setIsUserModalOpen(false)} className="text-slate-400 hover:text-slate-600">
                        <i className="ph ph-x text-xl"></i>
                      </button>
                    </div>
                    
                    <form onSubmit={handleSaveUser} className="p-5 space-y-4">
                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                          <label className="block text-sm font-medium text-slate-700 mb-1">Full Name *</label>
                          <input 
                            type="text" required value={userForm.name}
                            onChange={(e) => setUserForm({...userForm, name: e.target.value})}
                            className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm"
                            placeholder="John Doe"
                          />
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-slate-700 mb-1">Email Address *</label>
                          <input 
                            type="email" required value={userForm.email}
                            disabled={!!editingUser}
                            onChange={(e) => setUserForm({...userForm, email: e.target.value})}
                            className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm disabled:bg-slate-100 disabled:text-slate-500"
                            placeholder="john@example.com"
                          />
                        </div>
                      </div>

                      {!editingUser && (
                        <div>
                          <label className="block text-sm font-medium text-slate-700 mb-1">Password *</label>
                          <div className="relative">
                            <input 
                              type={showPassword ? 'text' : 'password'} required value={userForm.password}
                              onChange={(e) => setUserForm({...userForm, password: e.target.value})}
                              className="w-full pl-3 pr-10 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm"
                              placeholder="Minimum 6 characters" minLength="6"
                            />
                            <button 
                              type="button" onClick={() => setShowPassword(!showPassword)}
                              className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 focus:outline-none"
                            >
                              <i className={`ph ${showPassword ? 'ph-eye' : 'ph-eye-closed'} text-lg`}></i>
                            </button>
                          </div>
                        </div>
                      )}

                      <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                          <label className="block text-sm font-medium text-slate-700 mb-1">Role *</label>
                          <select 
                            value={userForm.role}
                            onChange={(e) => setUserForm({...userForm, role: e.target.value})}
                            className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm bg-white"
                          >
                            <option value="Staff">Staff</option>
                            <option value="Shop Manager">Shop Manager</option>
                            <option value="Admin">Admin</option>
                          </select>
                        </div>
                        <div>
                          <label className="block text-sm font-medium text-slate-700 mb-1">Shop Assigned</label>
                          <select 
                            value={userForm.shopId}
                            onChange={(e) => setUserForm({...userForm, shopId: e.target.value})}
                            className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm bg-white"
                          >
                            <option value="">-- None / All Shops --</option>
                            {shops.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                          </select>
                        </div>
                      </div>

                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Note (Optional)</label>
                        <textarea 
                          rows="2" value={userForm.note}
                          onChange={(e) => setUserForm({...userForm, note: e.target.value})}
                          className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm"
                          placeholder="E.g., Morning shift, emergency contact, etc."
                        />
                      </div>

                      <div className="pt-4 flex justify-end gap-3 border-t border-slate-100">
                        <button type="button" onClick={() => setIsUserModalOpen(false)} className="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 rounded-lg transition-colors">
                          Cancel
                        </button>
                        <button type="submit" disabled={isSavingUser} className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors flex items-center gap-2 disabled:opacity-50">
                          {isSavingUser ? <i className="ph ph-spinner animate-spin text-base"></i> : <i className="ph ph-floppy-disk text-base"></i>}
                          {isSavingUser ? 'Saving...' : (editingUser ? 'Update Profile' : 'Register User')}
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              )}

              {/* DELETE CONFIRMATION MODAL */}
              {userToDelete && (
                <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-50 p-4">
                  <div className="bg-white rounded-xl shadow-xl w-full max-w-sm overflow-hidden animate-in fade-in zoom-in-95 duration-200">
                    <div className="p-5 flex flex-col items-center text-center">
                      <div className="w-12 h-12 rounded-full bg-red-100 text-red-600 flex items-center justify-center mb-4">
                        <i className="ph ph-warning text-2xl"></i>
                      </div>
                      <h3 className="font-bold text-lg text-slate-800 mb-1">Delete User?</h3>
                      <p className="text-sm text-slate-500 mb-6">
                        Are you sure you want to remove <span className="font-semibold text-slate-700">{userToDelete.name}</span>? They will lose access to the system immediately.
                      </p>
                      <div className="flex gap-3 w-full">
                        <button onClick={() => setUserToDelete(null)} className="flex-1 px-4 py-2 bg-slate-100 text-slate-700 rounded-lg font-medium hover:bg-slate-200 transition-colors">
                          Cancel
                        </button>
                        <button onClick={confirmDeleteUser} className="flex-1 px-4 py-2 bg-red-600 text-white rounded-lg font-medium hover:bg-red-700 transition-colors">
                          Yes, Delete
                        </button>
                      </div>
                    </div>
                  </div>
                </div>
              )}

            </div>
          );
        };

        // --- SHOPS VIEW ---
        const ShopsView = () => {
          const { db, shops } = useContext(AppContext);
          const addToast = useToast();
          const [isModalOpen, setIsModalOpen] = useState(false);
          const [editingShop, setEditingShop] = useState(null);
          
          const [formData, setFormData] = useState({ name: '', botToken: '', note: '' });

          const maskToken = (token) => {
            if (!token) return 'No Token';
            if (token.length < 15) return '***';
            return `${token.substring(0, 6)}...${token.substring(token.length - 4)}`;
          };

          const handleOpenModal = (shop = null) => {
            if (shop) {
              setEditingShop(shop);
              setFormData({ name: shop.name, botToken: shop.botToken, note: shop.note || '' });
            } else {
              setEditingShop(null);
              setFormData({ name: '', botToken: '', note: '' });
            }
            setIsModalOpen(true);
          };

          const handleSave = async (e) => {
            e.preventDefault();
            try {
              const shopsCollection = collection(db, 'artifacts', appId, 'public', 'data', 'shops');
              
              if (editingShop) {
                const docRef = doc(shopsCollection, editingShop.id);
                await updateDoc(docRef, { ...formData });
                addToast("Shop updated successfully");
              } else {
                const newDocRef = doc(shopsCollection);
                await setDoc(newDocRef, { ...formData, lastUpdateId: 0, createdAt: Date.now() });
                addToast("Shop added successfully");
              }
              setIsModalOpen(false);
            } catch (err) {
              addToast(err.message, "error");
            }
          };

          const handleDelete = async (id) => {
            if (window.confirm("Are you sure you want to delete this shop? Transactions associated with this shop will remain in history.")) {
              try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'shops', id));
                addToast("Shop deleted successfully", "success");
              } catch (err) {
                addToast(err.message, "error");
              }
            }
          };

          return (
            <div className="space-y-6">
              <div className="flex justify-between items-center bg-white p-4 rounded-xl shadow-sm border border-slate-200">
                <div>
                  <h2 className="text-lg font-bold text-slate-800">Shops & Branches</h2>
                  <p className="text-sm text-slate-500">Manage multiple locations and their Telegram bots.</p>
                </div>
                <button 
                  onClick={() => handleOpenModal()} 
                  className="flex items-center gap-2 px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors"
                >
                  <i className="ph ph-plus text-base"></i> Add Shop
                </button>
              </div>

              <div className="bg-white rounded-xl shadow-sm border border-slate-200 overflow-hidden">
                <div className="overflow-x-auto">
                  <table className="w-full text-left text-sm whitespace-nowrap">
                    <thead className="bg-slate-50 text-slate-500 font-medium border-b border-slate-200">
                      <tr>
                        <th className="px-6 py-4">Shop Name</th>
                        <th className="px-6 py-4">Telegram Bot Token</th>
                        <th className="px-6 py-4">Note</th>
                        <th className="px-6 py-4 text-right">Actions</th>
                      </tr>
                    </thead>
                    <tbody className="divide-y divide-slate-100">
                      {shops.length === 0 ? (
                        <tr>
                          <td colSpan="4" className="px-6 py-12 text-center text-slate-500">
                            <i className="ph ph-storefront text-[4rem] mx-auto block w-fit text-slate-300 mb-3"></i>
                            <p className="font-medium text-slate-700">No shops added yet</p>
                            <p className="text-sm">Click "Add Shop" to create your first branch and connect its bot.</p>
                          </td>
                        </tr>
                      ) : (
                        shops.map((shop) => (
                          <tr key={shop.id} className="hover:bg-slate-50/50 transition-colors group">
                            <td className="px-6 py-4 font-medium text-slate-800">
                              <div className="flex items-center gap-3">
                                <div className="w-8 h-8 rounded-full bg-blue-100 text-blue-600 flex items-center justify-center font-bold">
                                  {shop.name.charAt(0).toUpperCase()}
                                </div>
                                {shop.name}
                              </div>
                            </td>
                            <td className="px-6 py-4 font-mono text-xs text-slate-500">
                              {maskToken(shop.botToken)}
                            </td>
                            <td className="px-6 py-4 text-slate-600 truncate max-w-[200px]">{shop.note || '-'}</td>
                            <td className="px-6 py-4 text-right">
                              <div className="flex justify-end gap-2 opacity-0 group-hover:opacity-100 transition-opacity">
                                <button 
                                  onClick={() => handleOpenModal(shop)}
                                  className="p-1.5 text-blue-600 hover:bg-blue-50 rounded-md transition-colors"
                                  title="Edit Shop"
                                >
                                  <i className="ph ph-pencil-simple text-base"></i>
                                </button>
                                <button 
                                  onClick={() => handleDelete(shop.id)}
                                  className="p-1.5 text-red-600 hover:bg-red-50 rounded-md transition-colors"
                                  title="Delete Shop"
                                >
                                  <i className="ph ph-trash text-base"></i>
                                </button>
                              </div>
                            </td>
                          </tr>
                        ))
                      )}
                    </tbody>
                  </table>
                </div>
              </div>

              {/* Modal */}
              {isModalOpen && (
                <div className="fixed inset-0 bg-slate-900/50 flex items-center justify-center z-50 p-4">
                  <div className="bg-white rounded-xl shadow-xl w-full max-w-md overflow-hidden animate-in fade-in zoom-in-95 duration-200">
                    <div className="flex justify-between items-center p-4 border-b border-slate-100">
                      <h3 className="font-bold text-lg text-slate-800">{editingShop ? 'Edit Shop' : 'Add New Shop'}</h3>
                      <button onClick={() => setIsModalOpen(false)} className="text-slate-400 hover:text-slate-600">
                        <i className="ph ph-x text-xl"></i>
                      </button>
                    </div>
                    
                    <form onSubmit={handleSave} className="p-4 space-y-4">
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Shop Name *</label>
                        <input 
                          type="text" 
                          required
                          value={formData.name}
                          onChange={(e) => setFormData({...formData, name: e.target.value})}
                          className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm"
                          placeholder="e.g. Solaris Cafe - BKK1"
                        />
                      </div>
                      
                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Telegram Bot Token *</label>
                        <input 
                          type="text" 
                          required
                          value={formData.botToken}
                          onChange={(e) => setFormData({...formData, botToken: e.target.value})}
                          className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm font-mono"
                          placeholder="123456789:ABCdefGHIjklmNOPQRstuvWXYZ"
                        />
                        <p className="text-xs text-slate-500 mt-1">Make sure the bot is added to the shop's transaction group.</p>
                      </div>

                      <div>
                        <label className="block text-sm font-medium text-slate-700 mb-1">Note (Optional)</label>
                        <textarea 
                          rows="2"
                          value={formData.note}
                          onChange={(e) => setFormData({...formData, note: e.target.value})}
                          className="w-full px-3 py-2 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm"
                          placeholder="Location details, manager name, etc."
                        />
                      </div>

                      <div className="pt-4 flex justify-end gap-3 border-t border-slate-100">
                        <button 
                          type="button" 
                          onClick={() => setIsModalOpen(false)}
                          className="px-4 py-2 text-sm font-medium text-slate-600 hover:bg-slate-50 rounded-lg transition-colors"
                        >
                          Cancel
                        </button>
                        <button 
                          type="submit" 
                          className="px-4 py-2 bg-blue-600 text-white rounded-lg text-sm font-medium hover:bg-blue-700 transition-colors flex items-center gap-2"
                        >
                          <i className="ph ph-floppy-disk text-base"></i> Save Shop
                        </button>
                      </div>
                    </form>
                  </div>
                </div>
              )}
            </div>
          );
        };

        const LoginView = () => {
          const [email, setEmail] = useState('');
          const [password, setPassword] = useState('');
          const [showPassword, setShowPassword] = useState(false);
          const [isLoggingIn, setIsLoggingIn] = useState(false);
          const addToast = useToast();

          const handleLogin = async (e) => {
            e.preventDefault();
            setIsLoggingIn(true);
            try {
              await signInWithEmailAndPassword(auth, email, password);
              addToast("Logged in successfully", "success");
            } catch (err) {
              console.error(err);
              addToast("Invalid email or password", "error");
            } finally {
              setIsLoggingIn(false);
            }
          };

          return (
            <div className="min-h-screen bg-slate-50 flex items-center justify-center p-4 w-full h-full fixed inset-0 z-[200]">
              <div className="bg-white rounded-2xl shadow-xl w-full max-w-md overflow-hidden border border-slate-200">
                <div className="p-8 text-center bg-blue-600 text-white">
                  <div className="w-16 h-16 rounded-2xl bg-white/20 flex items-center justify-center mx-auto mb-4 backdrop-blur-sm border border-white/30">
                    <i className="ph ph-shield-check text-4xl"></i>
                  </div>
                  <h2 className="text-2xl font-bold">ABA PayWay System</h2>
                  <p className="text-blue-100 text-sm mt-2">Sign in to access your workspace</p>
                </div>
                <div className="p-8">
                  <form onSubmit={handleLogin} className="space-y-5">
                    <div>
                      <label className="block text-sm font-medium text-slate-700 mb-1">Email Address</label>
                      <div className="relative">
                        <i className="ph ph-envelope absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                        <input 
                          type="email" required
                          value={email} onChange={(e) => setEmail(e.target.value)}
                          className="w-full pl-10 pr-4 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm bg-slate-50 focus:bg-white transition-colors"
                          placeholder="admin@example.com"
                        />
                      </div>
                    </div>
                    <div>
                      <label className="block text-sm font-medium text-slate-700 mb-1">Password</label>
                      <div className="relative">
                        <i className="ph ph-lock-key absolute left-3 top-1/2 -translate-y-1/2 text-slate-400 text-lg"></i>
                        <input 
                          type={showPassword ? 'text' : 'password'} required
                          value={password} onChange={(e) => setPassword(e.target.value)}
                          className="w-full pl-10 pr-10 py-2.5 border border-slate-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500/20 focus:border-blue-500 text-sm bg-slate-50 focus:bg-white transition-colors"
                          placeholder="••••••••"
                        />
                        <button 
                          type="button" onClick={() => setShowPassword(!showPassword)}
                          className="absolute right-3 top-1/2 -translate-y-1/2 text-slate-400 hover:text-slate-600 focus:outline-none"
                        >
                          <i className={`ph ${showPassword ? 'ph-eye' : 'ph-eye-closed'} text-lg`}></i>
                        </button>
                      </div>
                    </div>
                    <button 
                      type="submit" disabled={isLoggingIn}
                      className="w-full py-2.5 px-4 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-semibold transition-colors disabled:opacity-50 flex justify-center items-center gap-2 mt-2"
                    >
                      {isLoggingIn ? <i className="ph ph-spinner animate-spin text-lg"></i> : <i className="ph ph-sign-in text-lg"></i>}
                      {isLoggingIn ? 'Authenticating...' : 'Sign In'}
                    </button>
                  </form>
                </div>
              </div>
            </div>
          );
        };

        // --- ROOT RENDER ---
        const App = () => {
          return (
            <ToastProvider>
              <AppContent />
            </ToastProvider>
          );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
