<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Telegram Payment Summarizer</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Lucide Icons for React -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <style>
        body { background-color: #f3f4f6; font-family: system-ui, -apple-system, sans-serif; }
        .glass-panel { background: rgba(255, 255, 255, 0.95); backdrop-filter: blur(10px); border: 1px solid rgba(255, 255, 255, 0.2); }
        .spinner { border: 3px solid rgba(255,255,255,0.3); border-radius: 50%; border-top-color: #3b82f6; animation: spin 1s ease-in-out infinite; width: 24px; height: 24px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div id="root"></div>

    <!-- Firebase SDKs -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithCustomToken, signInAnonymously, onAuthStateChanged, createUserWithEmailAndPassword, signInWithEmailAndPassword, signOut } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // Your web app's Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyBRJYM63cVE_VA1UuQyuemPwKA-jB93RHU",
            authDomain: "banktransation-d1775.firebaseapp.com",
            projectId: "banktransation-d1775",
            storageBucket: "banktransation-d1775.firebasestorage.app",
            messagingSenderId: "578044587639",
            appId: "1:578044587639:web:14653ea7218ef56f4ea072",
            measurementId: "G-6M6EXYNF7V"
        };
        
        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // Expose Firebase modules to window for React to use
        window.firebaseConfig = firebaseConfig;
        window.initializeApp = initializeApp;
        window.getAuth = getAuth;
        window.FirebaseAuth = auth;
        window.FirebaseDB = db;
        window.signInAnonymously = signInAnonymously;
        window.onAuthStateChanged = onAuthStateChanged;
        window.createUserWithEmailAndPassword = createUserWithEmailAndPassword;
        window.signInWithEmailAndPassword = signInWithEmailAndPassword;
        window.signOut = signOut;
        window.collection = collection;
        window.onSnapshot = onSnapshot;
        window.doc = doc;
        window.setDoc = setDoc;
        window.deleteDoc = deleteDoc;
    </script>

    <script type="text/babel">
        const { useState, useEffect, createElement } = React;
        
        // Helper to use Lucide icons in React without build tools
        const Icon = ({ name, className }) => {
            if (!window.lucide || !window.lucide.icons[name]) return null;
            const iconNode = window.lucide.icons[name];
            
            const createSvgElement = (node, index = 0) => {
                const [tag, attrs, children] = node;
                const props = { ...attrs, key: index, className };
                
                return createElement(
                    tag, 
                    props, 
                    children ? children.map((child, i) => createSvgElement(child, i)) : null
                );
            };
            
            return createSvgElement([
                'svg', 
                { ...iconNode.attrs, width: "24", height: "24", strokeWidth: "2", stroke: "currentColor", fill: "none", strokeLinecap: "round", strokeLinejoin: "round" }, 
                iconNode.children
            ]);
        };

        function App() {
            // Auth State
            const [isAuthReady, setIsAuthReady] = useState(false);
            const [isLoginMode, setIsLoginMode] = useState(true);
            const [authEmail, setAuthEmail] = useState('');
            const [authPassword, setAuthPassword] = useState('');
            const [authError, setAuthError] = useState('');

            const [user, setUser] = useState(null);
            const [shops, setShops] = useState([]);
            const [staff, setStaff] = useState([]); // Array to hold Users
            const [selectedShopId, setSelectedShopId] = useState('');
            
            // Tab & Role State
            const [activeTab, setActiveTab] = useState('dashboard');
            const [currentUserRole, setCurrentUserRole] = useState('Admin'); // Dropdown to simulate user logins

            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isUserModalOpen, setIsUserModalOpen] = useState(false);
            const [transactions, setTransactions] = useState([]);
            const [summary, setSummary] = useState({ khr: 0, usd: 0 });
            const [manualText, setManualText] = useState('');
            const [statusMsg, setStatusMsg] = useState({ text: '', type: '' });
            const [isLoading, setIsLoading] = useState(false);

            // Modal Form State (Shop)
            const [editingShopId, setEditingShopId] = useState(null);
            const [newShopName, setNewShopName] = useState('');
            const [newShopToken, setNewShopToken] = useState('');
            const [newShopNote, setNewShopNote] = useState('');

            // Modal Form State (User)
            const [editingUserId, setEditingUserId] = useState(null);
            const [newUserName, setNewUserName] = useState('');
            const [newUserShop, setNewUserShop] = useState('');
            const [newUserEmail, setNewUserEmail] = useState('');
            const [newUserPassword, setNewUserPassword] = useState('');
            const [newUserRole, setNewUserRole] = useState('Cashier');

            // 1. Initialize Firebase Auth
            useEffect(() => {
                if (!window.FirebaseAuth) return;
                
                const unsubscribe = window.onAuthStateChanged(window.FirebaseAuth, (user) => {
                    console.log("Auth State Changed. User is:", user ? user.uid : "null");
                    setUser(user);
                    setIsAuthReady(true);
                });
                return () => unsubscribe();
            }, []);

            // Auth Handlers
            const handleAuthSubmit = async (e) => {
                e.preventDefault();
                setAuthError('');
                setIsLoading(true);
                try {
                    if (isLoginMode) {
                        await window.signInWithEmailAndPassword(window.FirebaseAuth, authEmail, authPassword);
                    } else {
                        await window.createUserWithEmailAndPassword(window.FirebaseAuth, authEmail, authPassword);
                    }
                } catch (error) {
                    setAuthError(error.message.replace('Firebase: ', ''));
                } finally {
                    setIsLoading(false);
                }
            };

            const handleLogout = async () => {
                try {
                    await window.signOut(window.FirebaseAuth);
                } catch (error) {
                    console.error("Logout Error:", error);
                }
            };

            // 2. Load Shops from Firestore
            useEffect(() => {
                if (!user || !window.FirebaseDB) {
                    console.log("Waiting for user auth or DB connection before loading shops...");
                    return;
                }

                console.log("Loading shops for user:", user.uid);
                // Simplified database path: users/{uid}/shops
                const shopsRef = window.collection(window.FirebaseDB, 'users', user.uid, 'shops');
                
                const unsubscribe = window.onSnapshot(shopsRef, (snapshot) => {
                    console.log("Firestore Snapshot received. Docs count:", snapshot.size);
                    const loadedShops = snapshot.docs.map(doc => ({
                        id: doc.id,
                        ...doc.data()
                    }));
                    setShops(loadedShops);
                    if (loadedShops.length > 0 && !selectedShopId) {
                        setSelectedShopId(loadedShops[0].id);
                    }
                }, (error) => {
                    console.error("Firestore error:", error.code, error.message);
                    if (error.code === 'permission-denied') {
                        showStatus("Database permission denied. Check Firestore Rules.", "error");
                    } else {
                        showStatus(`Failed to load shops: ${error.message}`, "error");
                    }
                });

                return () => unsubscribe();
            }, [user]);

            // 3. Load Staff Users from Firestore
            useEffect(() => {
                if (!user || !window.FirebaseDB) return;
                const staffRef = window.collection(window.FirebaseDB, 'users', user.uid, 'staff');
                const unsubscribe = window.onSnapshot(staffRef, (snapshot) => {
                    const loadedStaff = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setStaff(loadedStaff);
                }, (error) => console.error("Error loading staff:", error));
                return () => unsubscribe();
            }, [user]);

            // Utility to show status messages
            const showStatus = (text, type = 'info') => {
                setStatusMsg({ text, type });
                setTimeout(() => setStatusMsg({ text: '', type: '' }), 5000);
            };

            // Process text block into transactions
            const processText = (textBlock) => {
                if (!textBlock.trim()) return;

                const lines = textBlock.split('\n');
                let totalUSD = 0;
                let totalKHR = 0;
                let parsedList = [];

                lines.forEach(line => {
                    if (!line.trim()) return;

                    // Regex specific to the provided ABA format
                    const usdMatch = line.match(/(?:\$|USD)\s*([\d,]+(?:\.\d+)?)/i);
                    const khrMatch = line.match(/(?:៛|KHR)\s*([\d,]+(?:\.\d+)?)/i);
                    const nameMatch = line.match(/paid by\s+([^(]+)/i); 
                    
                    let name = nameMatch ? nameMatch[1].trim() : 'Unknown Sender';

                    if (usdMatch) {
                        let val = parseFloat(usdMatch[1].replace(/,/g, ''));
                        totalUSD += val;
                        parsedList.push({ id: crypto.randomUUID(), type: 'USD', amount: val, name: name, raw: line });
                    } else if (khrMatch) {
                        let val = parseFloat(khrMatch[1].replace(/,/g, ''));
                        totalKHR += val;
                        parsedList.push({ id: crypto.randomUUID(), type: 'KHR', amount: val, name: name, raw: line });
                    }
                });

                setTransactions(parsedList);
                setSummary({ khr: totalKHR, usd: totalUSD });
                showStatus(`Processed ${parsedList.length} transactions successfully!`, 'success');
            };

            // Fetch from Telegram API
            const fetchFromTelegram = async () => {
                const shop = shops.find(s => s.id === selectedShopId);
                if (!shop || !shop.token) {
                    showStatus("Please select a shop with a valid Bot API Token.", "error");
                    return;
                }

                setIsLoading(true);
                setStatusMsg({ text: 'Fetching from Telegram...', type: 'info' });

                try {
                    const response = await fetch(`https://api.telegram.org/bot${shop.token}/getUpdates`);
                    const data = await response.json();

                    if (!data.ok) {
                        throw new Error(data.description || "Failed to fetch from Telegram");
                    }

                    const updates = data.result || [];
                    if (updates.length === 0) {
                        showStatus("No recent updates found in Bot history (Max 24h).", "error");
                        setIsLoading(false);
                        return;
                    }

                    let combinedText = [];
                    
                    // Safely extract text from all possible message types
                    updates.forEach(update => {
                        const msg = update.message || update.channel_post || update.edited_message || update.edited_channel_post;
                        if (msg) {
                            const text = msg.text || msg.caption;
                            if (text) combinedText.push(text);
                        }
                    });

                    if (combinedText.length === 0) {
                        showStatus(`Bot saw ${updates.length} updates, but none contained text. (Check Privacy Mode!)`, "error");
                    } else {
                        const fullText = combinedText.join('\n');
                        setManualText(fullText); // Populate text area so user can see what was fetched
                        processText(fullText);
                    }

                } catch (error) {
                    console.error(error);
                    showStatus(error.message, "error");
                } finally {
                    setIsLoading(false);
                }
            };

            // Save new shop to Firestore
            const saveShop = async (e) => {
                e.preventDefault();
                if (!user || !newShopName || !newShopToken) {
                     showStatus("Missing required fields or user not authenticated.", "error");
                     return;
                }

                const shopId = editingShopId || crypto.randomUUID();
                const shopRef = window.doc(window.FirebaseDB, 'users', user.uid, 'shops', shopId);
                
                try {
                    await window.setDoc(shopRef, {
                        name: newShopName,
                        token: newShopToken,
                        note: newShopNote,
                        ...(editingShopId ? {} : { createdAt: new Date().toISOString() }) // Keep original date if editing
                    }, { merge: true });
                    
                    setIsModalOpen(false);
                    setEditingShopId(null);
                    setNewShopName('');
                    setNewShopToken('');
                    setNewShopNote('');
                    if (!editingShopId) setSelectedShopId(shopId);
                    showStatus(editingShopId ? "Shop updated successfully!" : "Shop saved securely to cloud!", "success");
                } catch (error) {
                    console.error("Save error:", error);
                    showStatus("Failed to save shop.", "error");
                }
            };

            // Setup Edit Shop
            const openEditShop = (shop) => {
                setEditingShopId(shop.id);
                setNewShopName(shop.name);
                setNewShopToken(shop.token);
                setNewShopNote(shop.note || '');
                setIsModalOpen(true);
            };

            // Delete shop
            const deleteShop = async (id) => {
                if (!user) return;
                const shopRef = window.doc(window.FirebaseDB, 'users', user.uid, 'shops', id);
                try {
                    await window.deleteDoc(shopRef);
                    if (selectedShopId === id) setSelectedShopId('');
                    showStatus("Shop deleted.", "success");
                } catch (error) {
                    console.error("Delete error:", error);
                }
            };

            // Setup Edit User
            const openEditUser = (staffMember) => {
                setEditingUserId(staffMember.id);
                setNewUserName(staffMember.name);
                setNewUserEmail(staffMember.email);
                setNewUserShop(staffMember.shopId || '');
                setNewUserRole(staffMember.role);
                setNewUserPassword(''); // Passwords cannot be updated this way easily in UI
                setIsUserModalOpen(true);
            };

            // Delete User
            const deleteUser = async (id) => {
                if (!user) return;
                const staffRef = window.doc(window.FirebaseDB, 'users', user.uid, 'staff', id);
                try {
                    await window.deleteDoc(staffRef);
                    showStatus("User removed successfully.", "success");
                } catch (error) {
                    console.error("Delete user error:", error);
                }
            };

            // Save new user to Firebase Auth and Firestore
            const saveUser = async (e) => {
                e.preventDefault();
                if (!user || !newUserName || !newUserEmail || !newUserRole) {
                    showStatus("Please fill all required fields.", "error");
                    return;
                }

                // If editing, skip Auth creation and update profile
                if (editingUserId) {
                    try {
                        const staffRef = window.doc(window.FirebaseDB, 'users', user.uid, 'staff', editingUserId);
                        await window.setDoc(staffRef, {
                            name: newUserName,
                            shopId: newUserShop,
                            email: newUserEmail,
                            role: newUserRole,
                        }, { merge: true });
                        
                        setIsUserModalOpen(false);
                        setEditingUserId(null);
                        setNewUserName('');
                        setNewUserShop('');
                        setNewUserEmail('');
                        setNewUserPassword('');
                        showStatus(`User ${newUserName} updated successfully!`, "success");
                    } catch (error) {
                        showStatus(`Failed to update user: ${error.message}`, "error");
                    }
                    return;
                }

                if (!newUserPassword) {
                    showStatus("Password is required for new users.", "error");
                    return;
                }

                try {
                    setStatusMsg({ text: 'Creating user securely...', type: 'info' });
                    
                    // Create a secondary app instance to register the new user without logging the current Admin out
                    const tempApp = window.initializeApp(window.firebaseConfig, "TempApp_" + Date.now());
                    const tempAuth = window.getAuth(tempApp);
                    
                    const userCred = await window.createUserWithEmailAndPassword(tempAuth, newUserEmail, newUserPassword);
                    const newUid = userCred.user.uid;
                    
                    // Immediately sign out the temp session
                    await tempAuth.signOut();

                    // Save the user's profile metadata to the current Admin's Firestore database
                    const staffRef = window.doc(window.FirebaseDB, 'users', user.uid, 'staff', newUid);
                    await window.setDoc(staffRef, {
                        name: newUserName,
                        shopId: newUserShop,
                        email: newUserEmail,
                        role: newUserRole,
                        createdAt: new Date().toISOString()
                    });
                    
                    setIsUserModalOpen(false);
                    setEditingUserId(null);
                    setNewUserName('');
                    setNewUserShop('');
                    setNewUserEmail('');
                    setNewUserPassword('');
                    setNewUserRole('Cashier');
                    showStatus(`User ${newUserName} registered successfully!`, "success");
                } catch (error) {
                    console.error("Add User error:", error);
                    showStatus(`Failed to create user: ${error.message}`, "error");
                }
            };

            // Wait for Firebase to check authentication state
            if (!isAuthReady) {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center">
                        <div className="spinner"></div>
                    </div>
                );
            }

            // Render Login/Register Page if no user is signed in
            if (!user) {
                return (
                    <div className="min-h-screen bg-gray-50 flex items-center justify-center p-4">
                        <div className="glass-panel w-full max-w-md p-8 rounded-2xl shadow-xl border border-gray-100 bg-white">
                            <div className="flex flex-col items-center mb-8">
                                <div className="w-16 h-16 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center mb-4">
                                    <Icon name="Calculator" className="w-8 h-8" />
                                </div>
                                <h2 className="text-2xl font-bold text-gray-900">Telegram Pay Summary</h2>
                                <p className="text-gray-500 mt-2 text-sm">{isLoginMode ? 'Welcome back! Please login.' : 'Create your admin account.'}</p>
                            </div>

                            {authError && (
                                <div className="mb-4 p-3 bg-red-50 border border-red-100 text-red-700 text-sm rounded-lg flex items-start gap-2">
                                    <Icon name="AlertCircle" className="w-5 h-5 flex-shrink-0" />
                                    <span>{authError}</span>
                                </div>
                            )}

                            <form onSubmit={handleAuthSubmit} className="space-y-5">
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Email Address</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                            <Icon name="Mail" className="w-5 h-5" />
                                        </div>
                                        <input 
                                            type="email" 
                                            required 
                                            value={authEmail}
                                            onChange={(e) => setAuthEmail(e.target.value)}
                                            className="w-full pl-10 p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                                            placeholder="you@example.com"
                                        />
                                    </div>
                                </div>
                                <div>
                                    <label className="block text-sm font-medium text-gray-700 mb-1">Password</label>
                                    <div className="relative">
                                        <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-gray-400">
                                            <Icon name="Lock" className="w-5 h-5" />
                                        </div>
                                        <input 
                                            type="password" 
                                            required
                                            minLength="6"
                                            value={authPassword}
                                            onChange={(e) => setAuthPassword(e.target.value)}
                                            className="w-full pl-10 p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                                            placeholder="••••••••"
                                        />
                                    </div>
                                </div>
                                <button 
                                    type="submit" 
                                    disabled={isLoading}
                                    className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-2.5 rounded-lg transition-colors flex justify-center items-center gap-2 disabled:opacity-50"
                                >
                                    {isLoading ? <div className="spinner !w-5 !h-5 !border-2"></div> : isLoginMode ? 'Sign In' : 'Create Account'}
                                </button>
                            </form>

                            <div className="mt-6 text-center text-sm">
                                <span className="text-gray-500">{isLoginMode ? "Don't have an account?" : "Already have an account?"}</span>
                                <button 
                                    onClick={() => { setIsLoginMode(!isLoginMode); setAuthError(''); }}
                                    className="ml-2 text-blue-600 font-medium hover:underline focus:outline-none"
                                >
                                    {isLoginMode ? 'Register' : 'Sign In'}
                                </button>
                            </div>
                        </div>
                    </div>
                );
            }

            return (
                <div className="min-h-screen bg-gray-50 pb-12">
                    {/* Header */}
                    <header className="bg-blue-600 text-white p-4 shadow-md">
                        <div className="max-w-6xl mx-auto flex justify-between items-center">
                            <div className="flex items-center gap-2">
                                <Icon name="Calculator" className="w-6 h-6" />
                                <h1 className="text-xl font-bold">Telegram Pay Summary</h1>
                            </div>
                            
                            {/* Simulator for User Logins / Roles & Logout */}
                            <div className="flex items-center gap-4">
                                <div className="text-sm bg-blue-700 px-3 py-1.5 rounded-lg flex items-center gap-2 border border-blue-500 hidden sm:flex">
                                    <span className="opacity-80">View As Role:</span>
                                    <select 
                                        value={currentUserRole} 
                                        onChange={(e) => setCurrentUserRole(e.target.value)}
                                        className="bg-transparent text-white font-medium outline-none cursor-pointer"
                                    >
                                        <option value="Admin" className="text-black">Admin</option>
                                        <option value="Shop Manager" className="text-black">Shop Manager</option>
                                        <option value="Cashier" className="text-black">Cashier</option>
                                    </select>
                                </div>
                                <button 
                                    onClick={handleLogout}
                                    className="text-sm bg-blue-800 hover:bg-blue-900 px-3 py-1.5 rounded-lg transition-colors flex items-center gap-2 border border-blue-900"
                                >
                                    <Icon name="LogOut" className="w-4 h-4" />
                                    Logout
                                </button>
                            </div>
                        </div>
                    </header>

                    <main className="max-w-6xl mx-auto mt-6 px-4">
                        
                        {/* Tab Navigation */}
                        <div className="flex border-b border-gray-200 mb-6 gap-2">
                            <button 
                                onClick={() => setActiveTab('dashboard')} 
                                className={`px-4 py-2.5 font-medium text-sm rounded-t-lg transition-colors flex items-center gap-2 ${activeTab === 'dashboard' ? 'bg-white border-t border-l border-r border-gray-200 text-blue-600' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-100'}`}
                            >
                                <Icon name="LayoutDashboard" className="w-4 h-4" /> Dashboard
                            </button>
                            <button 
                                onClick={() => setActiveTab('shops')} 
                                className={`px-4 py-2.5 font-medium text-sm rounded-t-lg transition-colors flex items-center gap-2 ${activeTab === 'shops' ? 'bg-white border-t border-l border-r border-gray-200 text-blue-600' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-100'}`}
                            >
                                <Icon name="Store" className="w-4 h-4" /> Manage Shops
                            </button>
                            <button 
                                onClick={() => setActiveTab('users')} 
                                className={`px-4 py-2.5 font-medium text-sm rounded-t-lg transition-colors flex items-center gap-2 ${activeTab === 'users' ? 'bg-white border-t border-l border-r border-gray-200 text-blue-600' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-100'}`}
                            >
                                <Icon name="Users" className="w-4 h-4" /> Manage Users
                            </button>
                        </div>

                        {/* Status Alert (Global) */}
                        {statusMsg.text && (
                            <div className={`mb-6 p-4 rounded-lg flex items-start gap-3 shadow-sm ${statusMsg.type === 'error' ? 'bg-red-50 text-red-800 border border-red-100' : statusMsg.type === 'success' ? 'bg-green-50 text-green-800 border border-green-100' : 'bg-blue-50 text-blue-800 border border-blue-100'}`}>
                                <Icon name={statusMsg.type === 'error' ? 'AlertCircle' : 'Info'} className="w-5 h-5 flex-shrink-0 mt-0.5" />
                                <p className="text-sm font-medium">{statusMsg.text}</p>
                            </div>
                        )}

                        {/* DASHBOARD TAB (Existing Layout) */}
                        {activeTab === 'dashboard' && (
                            <div className="grid grid-cols-1 md:grid-cols-3 gap-6">
                                {/* Left Column: Controls & Input */}
                                <div className="md:col-span-1 space-y-6">
                                    {/* Fetch Controls */}
                                    <div className="glass-panel p-6 rounded-xl shadow-sm">
                                        <h2 className="text-lg font-semibold mb-4 flex items-center gap-2">
                                            <Icon name="Bot" className="w-5 h-5 text-blue-600" /> Bot Sync
                                        </h2>
                                        
                                        <div className="space-y-4">
                                            <div>
                                                <label className="block text-sm font-medium text-gray-700 mb-1">Select Shop Location</label>
                                                <select 
                                                    value={selectedShopId} 
                                                    onChange={(e) => setSelectedShopId(e.target.value)}
                                                    className="w-full p-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white"
                                                >
                                                    <option value="" disabled>Select a shop...</option>
                                                    {shops.map(shop => (
                                                        <option key={shop.id} value={shop.id}>{shop.name}</option>
                                                    ))}
                                                </select>
                                            </div>
                                            
                                            <button 
                                                onClick={fetchFromTelegram}
                                                disabled={isLoading || shops.length === 0}
                                                className="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-lg transition-colors flex justify-center items-center gap-2 disabled:opacity-50"
                                            >
                                                {isLoading ? <div className="spinner"></div> : <><Icon name="Download" className="w-5 h-5" /> Fetch Recent</>}
                                            </button>
                                        </div>
                                    </div>

                                    {/* Manual Input Fallback */}
                                    <div className="glass-panel p-6 rounded-xl shadow-sm">
                                        <h2 className="text-lg font-semibold mb-4 flex items-center gap-2">
                                            <Icon name="ClipboardPaste" className="w-5 h-5 text-blue-600" /> Manual Paste
                                        </h2>
                                        <textarea
                                            value={manualText}
                                            onChange={(e) => setManualText(e.target.value)}
                                            placeholder="Paste Telegram messages here if bot fetch fails..."
                                            className="w-full h-40 p-3 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none text-sm font-mono"
                                        ></textarea>
                                        <button 
                                            onClick={() => processText(manualText)}
                                            className="w-full mt-3 bg-gray-800 hover:bg-gray-900 text-white font-semibold py-2 px-4 rounded-lg transition-colors"
                                        >
                                            Process Text
                                        </button>
                                    </div>
                                </div>

                                {/* Right Column: Results */}
                                <div className="md:col-span-2 space-y-6">
                                    {/* Summary Cards */}
                                    <div className="grid grid-cols-2 gap-4">
                                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                                            <div>
                                                <p className="text-sm text-gray-500 font-medium uppercase tracking-wider mb-1">Total KHR</p>
                                                <h3 className="text-3xl font-bold text-gray-900">៛{summary.khr.toLocaleString()}</h3>
                                            </div>
                                            <div className="w-12 h-12 bg-green-100 text-green-600 rounded-full flex items-center justify-center">
                                                <Icon name="Banknote" className="w-6 h-6" />
                                            </div>
                                        </div>
                                        <div className="bg-white p-6 rounded-xl shadow-sm border border-gray-100 flex items-center justify-between">
                                            <div>
                                                <p className="text-sm text-gray-500 font-medium uppercase tracking-wider mb-1">Total USD</p>
                                                <h3 className="text-3xl font-bold text-gray-900">${summary.usd.toLocaleString(undefined, {minimumFractionDigits: 2, maximumFractionDigits: 2})}</h3>
                                            </div>
                                            <div className="w-12 h-12 bg-blue-100 text-blue-600 rounded-full flex items-center justify-center">
                                                <Icon name="DollarSign" className="w-6 h-6" />
                                            </div>
                                        </div>
                                    </div>

                                    {/* Transactions List */}
                                    <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                                        <div className="px-6 py-4 border-b border-gray-100 bg-gray-50">
                                            <h2 className="font-semibold text-gray-800">Detected Transactions ({transactions.length})</h2>
                                        </div>
                                        {transactions.length === 0 ? (
                                            <div className="p-8 text-center text-gray-400">
                                                <Icon name="Inbox" className="w-12 h-12 mx-auto mb-3 opacity-50" />
                                                <p>No transactions parsed yet.</p>
                                            </div>
                                        ) : (
                                            <ul className="divide-y divide-gray-100 max-h-[500px] overflow-y-auto">
                                                {transactions.map(trx => (
                                                    <li key={trx.id} className="p-4 hover:bg-gray-50 flex items-center justify-between group">
                                                        <div className="flex flex-col">
                                                            <span className="font-medium text-gray-900">{trx.name}</span>
                                                            <span className="text-xs text-gray-500 truncate max-w-md">{trx.raw}</span>
                                                        </div>
                                                        <span className={`font-bold whitespace-nowrap ${trx.type === 'USD' ? 'text-blue-600' : 'text-green-600'}`}>
                                                            {trx.type === 'USD' ? '$' : '៛'}{trx.amount.toLocaleString(undefined, {minimumFractionDigits: trx.type==='USD'?2:0})}
                                                        </span>
                                                    </li>
                                                ))}
                                            </ul>
                                        )}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* SHOPS TAB */}
                        {activeTab === 'shops' && (
                            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                                <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                                    <h2 className="font-semibold text-gray-800 flex items-center gap-2">
                                        <Icon name="Store" className="w-5 h-5 text-blue-600" /> Shop Locations
                                    </h2>
                                    {['Admin', 'Shop Manager'].includes(currentUserRole) && (
                                        <button 
                                            onClick={() => { setEditingShopId(null); setNewShopName(''); setNewShopToken(''); setNewShopNote(''); setIsModalOpen(true); }}
                                            className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2"
                                        >
                                            <Icon name="Plus" className="w-4 h-4" /> Add Shop
                                        </button>
                                    )}
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-white border-b border-gray-100 text-sm text-gray-500 uppercase tracking-wider">
                                                <th className="p-4 font-medium">Shop Name</th>
                                                <th className="p-4 font-medium">Bot API Token</th>
                                                <th className="p-4 font-medium">Notes</th>
                                                <th className="p-4 font-medium text-right">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {shops.length === 0 ? (
                                                <tr><td colSpan="4" className="p-8 text-center text-gray-400">No shops found.</td></tr>
                                            ) : shops.map(shop => (
                                                <tr key={shop.id} className="hover:bg-gray-50">
                                                    <td className="p-4 font-medium text-gray-900">{shop.name}</td>
                                                    <td className="p-4 text-gray-500 font-mono text-xs">
                                                        {shop.token ? `••••${shop.token.slice(-4)}` : 'N/A'}
                                                    </td>
                                                    <td className="p-4 text-gray-500 text-sm">{shop.note || '-'}</td>
                                                    <td className="p-4 flex justify-end gap-3">
                                                        {['Admin', 'Shop Manager'].includes(currentUserRole) ? (
                                                            <>
                                                                <button onClick={() => openEditShop(shop)} className="text-blue-500 hover:text-blue-700 transition-colors" title="Edit">
                                                                    <Icon name="Edit" className="w-4 h-4" />
                                                                </button>
                                                                <button onClick={() => deleteShop(shop.id)} className="text-red-500 hover:text-red-700 transition-colors" title="Delete">
                                                                    <Icon name="Trash2" className="w-4 h-4" />
                                                                </button>
                                                            </>
                                                        ) : (
                                                            <span className="text-xs text-gray-400 italic bg-gray-100 px-2 py-1 rounded">Read Only</span>
                                                        )}
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}

                        {/* USERS TAB */}
                        {activeTab === 'users' && (
                            <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
                                <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center bg-gray-50">
                                    <h2 className="font-semibold text-gray-800 flex items-center gap-2">
                                        <Icon name="Users" className="w-5 h-5 text-blue-600" /> User Directory
                                    </h2>
                                    {['Admin', 'Shop Manager'].includes(currentUserRole) && (
                                        <button 
                                            onClick={() => { setEditingUserId(null); setNewUserName(''); setNewUserEmail(''); setNewUserShop(''); setNewUserRole('Cashier'); setNewUserPassword(''); setIsUserModalOpen(true); }}
                                            className="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded-lg text-sm font-medium transition-colors flex items-center gap-2"
                                        >
                                            <Icon name="UserPlus" className="w-4 h-4" /> Add User
                                        </button>
                                    )}
                                </div>
                                <div className="overflow-x-auto">
                                    <table className="w-full text-left border-collapse">
                                        <thead>
                                            <tr className="bg-white border-b border-gray-100 text-sm text-gray-500 uppercase tracking-wider">
                                                <th className="p-4 font-medium">Name</th>
                                                <th className="p-4 font-medium">Email</th>
                                                <th className="p-4 font-medium">Role</th>
                                                <th className="p-4 font-medium">Assigned Shop</th>
                                                <th className="p-4 font-medium text-right">Actions</th>
                                            </tr>
                                        </thead>
                                        <tbody className="divide-y divide-gray-100">
                                            {staff.length === 0 ? (
                                                <tr><td colSpan="5" className="p-8 text-center text-gray-400">No users found.</td></tr>
                                            ) : staff.map(member => {
                                                const assignedShop = shops.find(s => s.id === member.shopId);
                                                return (
                                                    <tr key={member.id} className="hover:bg-gray-50">
                                                        <td className="p-4 font-medium text-gray-900">{member.name}</td>
                                                        <td className="p-4 text-gray-500 text-sm">{member.email}</td>
                                                        <td className="p-4">
                                                            <span className={`px-2 py-1 rounded-full text-xs font-medium ${
                                                                member.role === 'Admin' ? 'bg-purple-100 text-purple-800' :
                                                                member.role === 'Shop Manager' ? 'bg-blue-100 text-blue-800' :
                                                                'bg-green-100 text-green-800'
                                                            }`}>
                                                                {member.role}
                                                            </span>
                                                        </td>
                                                        <td className="p-4 text-gray-500 text-sm">{assignedShop ? assignedShop.name : 'All (Admin)'}</td>
                                                        <td className="p-4 flex justify-end gap-3">
                                                            {['Admin', 'Shop Manager'].includes(currentUserRole) ? (
                                                                <>
                                                                    <button onClick={() => openEditUser(member)} className="text-blue-500 hover:text-blue-700 transition-colors" title="Edit">
                                                                        <Icon name="Edit" className="w-4 h-4" />
                                                                    </button>
                                                                    <button onClick={() => deleteUser(member.id)} className="text-red-500 hover:text-red-700 transition-colors" title="Delete">
                                                                        <Icon name="Trash2" className="w-4 h-4" />
                                                                    </button>
                                                                </>
                                                            ) : (
                                                                <span className="text-xs text-gray-400 italic bg-gray-100 px-2 py-1 rounded">Read Only</span>
                                                            )}
                                                        </td>
                                                    </tr>
                                                );
                                            })}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        )}
                    </main>

                    {/* Add/Edit Shop Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden">
                                <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                                    <h3 className="text-lg font-bold text-gray-900">{editingShopId ? 'Edit Shop' : 'Add New Shop'}</h3>
                                    <button onClick={() => setIsModalOpen(false)} className="text-gray-400 hover:text-gray-600">
                                        <Icon name="X" className="w-5 h-5" />
                                    </button>
                                </div>
                                <form onSubmit={saveShop} className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Shop Name</label>
                                        <input 
                                            type="text" 
                                            required
                                            value={newShopName}
                                            onChange={(e) => setNewShopName(e.target.value)}
                                            placeholder="e.g., Riverside Branch"
                                            className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Bot API Token</label>
                                        <input 
                                            type="text" 
                                            required
                                            value={newShopToken}
                                            onChange={(e) => setNewShopToken(e.target.value)}
                                            placeholder="123456789:ABCdefGHIjklmnoPQRstuvWXYZ"
                                            className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none font-mono text-sm"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Notes (Optional)</label>
                                        <textarea 
                                            value={newShopNote}
                                            onChange={(e) => setNewShopNote(e.target.value)}
                                            placeholder="Manager contact, address, etc."
                                            className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                                        ></textarea>
                                    </div>
                                    
                                    <div className="bg-blue-50 p-3 rounded-lg text-xs text-blue-800 flex gap-2 items-start mt-4">
                                        <Icon name="ShieldCheck" className="w-4 h-4 mt-0.5 flex-shrink-0" />
                                        <p>Your shop data and Bot Token are securely saved to your private cloud storage and are never shared.</p>
                                    </div>

                                    <div className="pt-4 flex justify-end gap-3 border-t mt-6">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="px-4 py-2 text-gray-600 font-medium hover:bg-gray-100 rounded-lg">Cancel</button>
                                        <button type="submit" className="px-4 py-2 bg-blue-600 text-white font-medium hover:bg-blue-700 rounded-lg shadow-sm">{editingShopId ? 'Save Changes' : 'Save Shop'}</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}

                    {/* Add/Edit User Modal */}
                    {isUserModalOpen && (
                        <div className="fixed inset-0 bg-black/50 backdrop-blur-sm flex items-center justify-center z-50 p-4">
                            <div className="bg-white rounded-xl shadow-2xl w-full max-w-md overflow-hidden">
                                <div className="px-6 py-4 border-b border-gray-100 flex justify-between items-center">
                                    <h3 className="text-lg font-bold text-gray-900">{editingUserId ? 'Edit User' : 'Add New User'}</h3>
                                    <button onClick={() => setIsUserModalOpen(false)} className="text-gray-400 hover:text-gray-600">
                                        <Icon name="X" className="w-5 h-5" />
                                    </button>
                                </div>
                                <form onSubmit={saveUser} className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Full Name</label>
                                        <input 
                                            type="text" required
                                            value={newUserName} onChange={(e) => setNewUserName(e.target.value)}
                                            placeholder="e.g., Jane Doe"
                                            className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                                        />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Assign Shop</label>
                                        <select 
                                            value={newUserShop} onChange={(e) => setNewUserShop(e.target.value)}
                                            className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white"
                                        >
                                            <option value="">-- No Specific Shop (Admin) --</option>
                                            {shops.map(shop => (
                                                <option key={shop.id} value={shop.id}>{shop.name}</option>
                                            ))}
                                        </select>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Email</label>
                                        <input 
                                            type="email" required
                                            value={newUserEmail} onChange={(e) => setNewUserEmail(e.target.value)}
                                            placeholder="jane@example.com"
                                            className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                                        />
                                    </div>
                                    
                                    {!editingUserId && (
                                        <div>
                                            <label className="block text-sm font-medium text-gray-700 mb-1">Password (Min 6 chars)</label>
                                            <input 
                                                type="password" required minLength="6"
                                                value={newUserPassword} onChange={(e) => setNewUserPassword(e.target.value)}
                                                placeholder="••••••••"
                                                className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none"
                                            />
                                        </div>
                                    )}

                                    <div>
                                        <label className="block text-sm font-medium text-gray-700 mb-1">Role</label>
                                        <select 
                                            required value={newUserRole} onChange={(e) => setNewUserRole(e.target.value)}
                                            className="w-full p-2.5 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none bg-white"
                                        >
                                            <option value="Admin">Admin</option>
                                            <option value="Shop Manager">Shop Manager</option>
                                            <option value="Cashier">Cashier</option>
                                        </select>
                                    </div>
                                    
                                    <div className="pt-4 flex justify-end gap-3 border-t mt-6">
                                        <button type="button" onClick={() => setIsUserModalOpen(false)} className="px-4 py-2 text-gray-600 font-medium hover:bg-gray-100 rounded-lg">Cancel</button>
                                        <button type="submit" className="px-4 py-2 bg-blue-600 text-white font-medium hover:bg-blue-700 rounded-lg shadow-sm">{editingUserId ? 'Save Changes' : 'Register User'}</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
