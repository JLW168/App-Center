            return (
                <div className="grid md:grid-cols-2 gap-6 max-w-5xl">
                    <BasicList title="Menu Categories" col="categories" data={categories} />
                    <div>
                        <BasicList title="Sugar Levels" col="sugar_options" data={sugarOptions} />
                        <BasicList title="Ice Options" col="ice_options" data={iceOptions} />
                    </div>
                </div>
            );
        }

        function UsersView({ admins, currentUser, shops }) {
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({ name: '', email: '', password: '', role: 'Cashier', shopId: '', shopIds: [], permissions: [], status: 'Active' });
            const [error, setError] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);

            const currentAdmin = admins.find(a => a.id === currentUser?.uid);
            const isSuper = currentAdmin?.role === 'Admin';
            const isManager = currentAdmin?.role === 'Manager';
            const canManageUsers = isSuper || isManager;

            const rolePerms = {
                'Admin': ['pos', 'kds', 'shifts', 'shops', 'products', 'inventory', 'sales', 'customers', 'users'],
                'Manager': ['pos', 'kds', 'shifts', 'inventory', 'sales', 'customers', 'users'],
                'Cashier': ['pos', 'customers'],
                'Kitchen': ['kds', 'inventory'],
                'Barista': ['kds', 'inventory']
            };

            const canManageTarget = (targetUser) => {
                if (isSuper) return true;
                if (isManager) {
                    // Managers can only edit subordinate roles within their own branches
                    const managerShops = currentAdmin?.shopIds?.length > 0 ? currentAdmin.shopIds : [currentAdmin?.shopId];
                    const targetShops = targetUser.shopIds?.length > 0 ? targetUser.shopIds : [targetUser.shopId];
                    const sharesBranch = targetShops.some(id => managerShops.includes(id));
                    
                    return ['Cashier', 'Barista', 'Kitchen'].includes(targetUser.role) && sharesBranch;
                }
                return false;
            };

            const openModal = (user = null) => {
                setError('');
                if (user) {
                    setEditingId(user.id);
                    setFormData({ 
                        name: user.name || '',
                        email: user.email, 
                        password: '', 
                        role: user.role || 'Cashier', 
                        shopId: user.shopId || '',
                        shopIds: user.shopIds || (user.shopId && user.shopId !== 'All' ? [user.shopId] : []),
                        permissions: user.permissions || rolePerms[user.role || 'Cashier'] || [],
                        status: user.status || 'Active'
                    });
                } else {
                    setEditingId(null);
                    setFormData({ 
                        name: '',
                        email: '', 
                        password: '', 
                        role: 'Cashier', 
                        shopId: currentAdmin?.shopId || '',
                        shopIds: currentAdmin?.shopIds?.length > 0 ? currentAdmin.shopIds : (currentAdmin?.shopId && currentAdmin.shopId !== 'All' ? [currentAdmin.shopId] : []),
                        permissions: rolePerms['Cashier'],
                        status: 'Active'
                    });
                }
                setIsModalOpen(true);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setIsProcessing(true);
                const { doc, setDoc, updateDoc, initializeApp, getAuth, createUserWithEmailAndPassword } = window.FirebaseApp;

                try {
                    // Security Check: Prevent Managers from escalating privileges
                    if (isManager && ['Admin', 'Manager'].includes(formData.role)) {
                        throw new Error("Security Violation: Managers cannot assign Admin or Manager roles.");
                    }
                    
                    const finalShopIds = formData.role === 'Admin' ? ['All'] : formData.shopIds;
                    const primaryShopId = formData.role === 'Admin' ? 'All' : (finalShopIds[0] || '');

                    if (editingId) {
                        // UPDATE Existing Staff
                        await updateDoc(doc(db, 'admins', editingId), {
                            name: formData.name,
                            role: formData.role,
                            shopId: primaryShopId,
                            shopIds: finalShopIds,
                            permissions: formData.permissions,
                            status: formData.status
                        });
                    } else {
                        // CREATE New Staff
                        if (formData.role !== 'Admin' && finalShopIds.length === 0) throw new Error("Please assign at least one branch.");
                        if (!formData.password || formData.password.length < 6) throw new Error("Password must be at least 6 characters.");
                        
                        // To prevent the current admin from being logged out by Firebase when creating a new user, 
                        // we isolate the registration inside a secondary, temporary Firebase App instance.
                        const appName = "SecondaryApp_" + Date.now();
                        const secondaryApp = initializeApp(firebaseConfig, appName);
                        const secondaryAuth = getAuth(secondaryApp);
                        
                        const userCred = await createUserWithEmailAndPassword(secondaryAuth, formData.email, formData.password);
                        
                        // Save the user access rules to Firestore 
                        await setDoc(doc(db, 'admins', userCred.user.uid), {
                            name: formData.name,
                            email: userCred.user.email,
                            role: formData.role,
                            shopId: primaryShopId,
                            shopIds: finalShopIds,
                            permissions: formData.permissions,
                            status: formData.status,
                            createdAt: Date.now()
                        });
                        
                        // Clean up secondary auth
                        await window.FirebaseApp.signOut(secondaryAuth);
                    }
                    setIsModalOpen(false);
                } catch (err) {
                    setError(err.message.replace('Firebase: ', ''));
                } finally {
                    setIsProcessing(false);
                }
            };

            const handleDelete = async (id) => {
                if (id === currentUser?.uid) return alert("You cannot revoke your own account.");
                if (confirm("Revoke access for this user? (This removes their system permissions)")) {
                    try {
                        await window.FirebaseApp.deleteDoc(window.FirebaseApp.doc(db, 'admins', id));
                    } catch (err) {
                        alert("Error: " + err.message);
                    }
                }
            };

            return (
                <div className="max-w-5xl">
                    <div className="flex justify-between items-center mb-6">
                        <div>
                            <h2 className="text-2xl font-bold text-stone-800">Staff & Users</h2>
                            <p className="text-stone-500 text-sm mt-1">Manage admin accounts and viewing permissions.</p>
                        </div>
                        {canManageUsers && (
                            <button onClick={() => openModal()} className="bg-stone-900 text-white px-4 py-2 rounded-xl font-bold shadow-md flex items-center hover:bg-stone-800 transition">
                                <i className="fa-solid fa-user-plus mr-2"></i> Add New User
                            </button>
                        )}
                    </div>
                    <div className="bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-sm border-collapse min-w-[700px]">
                                <thead>
                                    <tr className="bg-stone-100 text-stone-700 uppercase tracking-wider border-b border-stone-200">
                                        <th className="p-4 font-bold">Staff Details</th>
                                        <th className="p-4 font-bold">Role & Branch</th>
                                        <th className="p-4 font-bold">Role Access</th>
                                        <th className="p-4 font-bold">Status</th>
                                        {canManageUsers && <th className="p-4 font-bold text-right">Actions</th>}
                                    </tr>
                                </thead>
                                <tbody>
                                    {admins.map(admin => {
                                        const isEditable = canManageTarget(admin);
                                        return (
                                        <tr key={admin.id} className="border-b border-stone-100 hover:bg-stone-50 transition-colors">
                                            <td className="p-4 font-semibold text-stone-800">
                                                {admin.name && <div className="font-bold text-stone-900">{admin.name}</div>}
                                                <div className={admin.name ? "text-stone-500 text-xs font-normal mt-0.5" : ""}>
                                                    {admin.email} 
                                                    {currentUser?.uid === admin.id && <span className="ml-2 bg-amber-100 text-amber-800 text-[10px] px-2 py-0.5 rounded-full uppercase font-bold tracking-wider">You</span>}
                                                </div>
                                            </td>
                                            <td className="p-4">
                                                <div className="font-bold text-stone-800">{admin.role || 'Admin'}</div>
                                                <div className="text-xs text-stone-500 mt-0.5 leading-relaxed">
                                                    {admin.role === 'Admin' || admin.shopId === 'All' 
                                                        ? 'All Branches' 
                                                        : (admin.shopIds && admin.shopIds.length > 0 
                                                            ? admin.shopIds.map(id => shops.find(s=>s.id===id)?.name || 'Unknown').join(', ')
                                                            : (shops.find(s=>s.id===admin.shopId)?.name || 'Unknown Branch'))}
                                                </div>
                                            </td>
                                            <td className="p-4 text-stone-500 text-xs">
                                                <div className="flex flex-wrap gap-1">
                                                    {(admin.permissions || ['All Access']).map(p => (
                                                        <span key={p} className="bg-stone-200 text-stone-600 px-1.5 py-0.5 rounded uppercase font-bold tracking-wider">{p}</span>
                                                    ))}
                                                </div>
                                            </td>
                                            <td className="p-4">
                                                <span className={`px-2 py-1 rounded text-[10px] uppercase font-bold tracking-wider ${(!admin.status || admin.status === 'Active') ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                    {admin.status || 'Active'}
                                                </span>
                                            </td>
                                            {canManageUsers && (
                                                <td className="p-4 text-right">
                                                    {isEditable ? (
                                                        <>
                                                            <button onClick={() => openModal(admin)} className="p-2 text-blue-500 hover:text-blue-700 transition" title="Edit Role"><i className="fa-solid fa-pen"></i></button>
                                                            <button onClick={() => handleDelete(admin.id)} disabled={currentUser?.uid === admin.id} className={`p-2 transition ${currentUser?.uid === admin.id ? 'text-stone-300' : 'text-red-500 hover:text-red-700'}`} title="Revoke Access"><i className="fa-solid fa-trash"></i></button>
                                                        </>
                                                    ) : (
                                                        <span className="text-stone-300 text-xs font-bold uppercase"><i className="fa-solid fa-lock mr-1"></i> Locked</span>
                                                    )}
                                                </td>
                                            )}
                                        </tr>
                                    )})}
                                    {admins.length === 0 && (
                                        <tr><td colSpan={canManageUsers ? "5" : "4"} className="p-4 text-center text-stone-400">No staff records found.</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <form onSubmit={handleSubmit} className="bg-white rounded-3xl w-full max-w-md p-6 shadow-2xl animate-fade-in relative">
                                <button type="button" onClick={() => setIsModalOpen(false)} className="absolute top-4 right-4 text-stone-400 hover:text-stone-700"><i className="fa-solid fa-xmark text-lg"></i></button>
                                <h3 className="text-xl font-bold mb-4">{editingId ? 'Edit Staff Role' : 'Add New Staff'}</h3>
                                
                                {error && <div className="bg-red-50 text-red-600 p-3 rounded-xl text-sm mb-4 border border-red-200 font-medium"><i className="fa-solid fa-triangle-exclamation mr-1.5"></i>{error}</div>}
                                
                                <div className="space-y-4 mb-6">
                                    <div className="grid grid-cols-2 gap-3">
                                        <div>
                                            <label className="block text-sm font-semibold text-stone-700 mb-1">Staff Name *</label>
                                            <input type="text" required placeholder="e.g. John Doe" className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50 text-[16px]" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} autoFocus={!editingId} />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-stone-700 mb-1">Status</label>
                                            <select className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50 text-[16px]" value={formData.status} onChange={e => setFormData({...formData, status: e.target.value})}>
                                                <option value="Active">Active</option>
                                                <option value="Inactive">Inactive (Block Login)</option>
                                            </select>
                                        </div>
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-stone-700 mb-1">Email Address</label>
                                        <input type="email" required disabled={!!editingId} placeholder="staff@solaris.com" className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50 disabled:opacity-60 disabled:cursor-not-allowed text-[16px]" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} />
                                    </div>
                                    {!editingId && (
                                        <div>
                                            <label className="block text-sm font-semibold text-stone-700 mb-1">Password</label>
                                            <input type="password" required placeholder="Minimum 6 characters" className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50 text-[16px]" value={formData.password} onChange={e => setFormData({...formData, password: e.target.value})} />
                                        </div>
                                    )}
                                    <div>
                                        <label className="block text-sm font-semibold text-stone-700 mb-1">Staff Role</label>
                                        <select required className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50 text-[16px]" value={formData.role} onChange={e => {
                                            const newRole = e.target.value;
                                            setFormData({...formData, role: newRole, permissions: rolePerms[newRole] || rolePerms['Cashier']});
                                        }}>
                                            {isSuper && <option value="Admin">Admin (All Access)</option>}
                                            {isSuper && <option value="Manager">Branch Manager</option>}
                                            <option value="Cashier">Cashier</option>
                                            <option value="Barista">Barista</option>
                                            <option value="Kitchen">Kitchen Staff</option>
                                        </select>
                                    </div>
                                    
                                    <div className="animate-fade-in mt-4">
                                        <label className="block text-sm font-semibold text-stone-700 mb-2">Page Assignments & Permissions</label>
                                        <div className="grid grid-cols-2 sm:grid-cols-3 gap-2 p-3 border border-stone-200 rounded-xl bg-stone-50">
                                            {[
                                                { id: 'pos', label: 'POS & Orders' },
                                                { id: 'kds', label: 'Kitchen Screen' },
                                                { id: 'shifts', label: 'Shift Reports' },
                                                { id: 'shops', label: 'Shop Manager' },
                                                { id: 'products', label: 'Menu Editor' },
                                                { id: 'inventory', label: 'Inventory' },
                                                { id: 'sales', label: 'Sales Reports' },
                                                { id: 'customers', label: 'Customer Logs' },
                                                { id: 'users', label: 'Staff & Users' }
                                            ].map(perm => (
                                                <label key={perm.id} className="flex items-center gap-2 p-1.5 cursor-pointer group">
                                                    <input 
                                                        type="checkbox" 
                                                        className="w-4 h-4 accent-amber-600 rounded"
                                                        checked={formData.permissions.includes(perm.id)}
                                                        disabled={formData.role === 'Admin'} // Admins require all permissions
                                                        onChange={(e) => {
                                                            const newPerms = e.target.checked
                                                                ? [...formData.permissions, perm.id]
                                                                : formData.permissions.filter(p => p !== perm.id);
                                                            setFormData({...formData, permissions: newPerms});
                                                        }}
                                                    />
                                                    <span className={`text-xs font-bold transition ${formData.permissions.includes(perm.id) ? 'text-stone-800' : 'text-stone-500 group-hover:text-stone-700'}`}>{perm.label}</span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>

                                    {formData.role !== 'Admin' && (
                                        <div className="animate-fade-in mt-4">
                                            <label className="block text-sm font-semibold text-stone-700 mb-2">Assign Branches (Multi-Select)</label>
                                            <div className="grid grid-cols-2 gap-2 max-h-40 overflow-y-auto p-2 border border-stone-200 rounded-xl bg-stone-50">
                                                {shops.map(s => {
                                                    const canAssign = isSuper || currentAdmin?.shopIds?.includes(s.id) || currentAdmin?.shopId === s.id;
                                                    return (
                                                    <label key={s.id} className={`flex items-center gap-2 p-2 bg-white border rounded-lg transition shadow-sm ${canAssign ? 'cursor-pointer hover:border-amber-400 border-stone-200' : 'opacity-50 cursor-not-allowed border-stone-100'}`}>
                                                        <input 
                                                            type="checkbox" 
                                                            className="w-4 h-4 accent-amber-600 rounded"
                                                            checked={formData.shopIds.includes(s.id)}
                                                            disabled={!canAssign}
                                                            onChange={(e) => {
                                                                const newShopIds = e.target.checked 
                                                                    ? [...formData.shopIds, s.id] 
                                                                    : formData.shopIds.filter(id => id !== s.id);
                                                                setFormData({...formData, shopIds: newShopIds});
                                                            }}
                                                        />
                                                        <span className="text-xs font-bold text-stone-700 line-clamp-1">{s.name}</span>
                                                    </label>
                                                )})}
                                            </div>
                                            {!isSuper && <p className="text-xs text-amber-600 mt-1.5 font-bold"><i className="fa-solid fa-lock mr-1"></i> Locked to branches you manage.</p>}
                                        </div>
                                    )}
                                </div>
                                
                                <div className="flex justify-end gap-2">
                                    <button type="button" onClick={() => setIsModalOpen(false)} className="px-5 py-2.5 rounded-xl font-semibold text-stone-600 hover:bg-stone-200 transition">Cancel</button>
                                    <button type="submit" disabled={isProcessing} className="px-5 py-2.5 rounded-xl font-bold bg-stone-900 text-white hover:bg-stone-800 shadow-md transition disabled:opacity-50">
                                        {isProcessing ? 'Processing...' : 'Save Staff'}
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        function KDSView({ orders, tables, shops, shifts, onBack, currentAdminRecord }) {
            const isSuper = (currentAdminRecord?.role || 'Admin') === 'Admin';
            const canSelectMultiple = isSuper || (currentAdminRecord?.shopIds && currentAdminRecord.shopIds.length > 1);
            const [filterShopId, setFilterShopId] = useState(isSuper ? 'All' : (currentAdminRecord?.shopIds?.[0] || currentAdminRecord?.shopId || 'All'));

            const activeOrders = useMemo(() => {
                return orders.filter(o => 
                    // LOGIC CHANGE: Exclude cancelled explicitly, keep visible if NOT Paid OR if status is NOT Served
                    o.status !== 'Cancelled' &&
                    (o.paymentStatus !== 'Paid' || ['New', 'Preparing', 'Ready'].includes(o.status)) &&
                    (filterShopId === 'All' || o.shopId === filterShopId)
                ).sort((a, b) => a.createdAt - b.createdAt);
            }, [orders, filterShopId]);

            const updateStatus = async (order, newStatus, cancelNote = '') => {
                const { doc, updateDoc } = window.FirebaseApp;
                const updateData = { status: newStatus, staffId: currentAdminRecord?.id };
                if (newStatus === 'Ready' || newStatus === 'Served' || newStatus === 'Cancelled') {
                    updateData.completedAt = Date.now();
                }
                if (newStatus === 'Cancelled' && cancelNote) {
                    updateData.cancelReason = cancelNote;
                }
                await updateDoc(doc(getColRef('orders'), order.id), updateData);
                
                if (newStatus === 'Cancelled' || newStatus === 'Served') {
                    await releaseTableIfNotUsed(order.tableId, order.id, orders);
                }
            };

            const updatePayment = async (orderId, payStatus, payMethod, shopId) => {
                const { doc, updateDoc } = window.FirebaseApp;
                
                const activeShift = shifts?.find(s => s.shopId === shopId && s.status === 'Open');
                
                const updateData = {
                    paymentStatus: payStatus,
                    paymentMethod: payMethod,
                    staffId: currentAdminRecord?.id
                };
                
                if (payStatus === 'Paid' && activeShift) {
                    updateData.shiftId = activeShift.id;
                }

                await updateDoc(doc(getColRef('orders'), orderId), updateData);
            };

            const toggleItemDone = async (order, itemIdx) => {
                const { doc, updateDoc } = window.FirebaseApp;
                const updatedItems = [...order.items];
                updatedItems[itemIdx] = {
                    ...updatedItems[itemIdx],
                    done: !updatedItems[itemIdx].done
                };
                await updateDoc(doc(getColRef('orders'), order.id), { items: updatedItems });
            };

            const statusColors = {
                'New': 'bg-blue-100 border-blue-200 text-blue-800',
                'Preparing': 'bg-amber-100 border-amber-200 text-amber-800',
                'Ready': 'bg-green-100 border-green-200 text-green-800',
                'Served': 'bg-stone-100 border-stone-200 text-stone-500',
                'Cancelled': 'bg-red-100 border-red-200 text-red-800'
            };

            return (
                <div className="h-full flex flex-col">
                    <div className="flex justify-between items-center mb-6 shrink-0">
                        <div>
                            <h2 className="text-2xl font-bold text-stone-800">Kitchen Display System</h2>
                            <p className="text-stone-500 text-sm mt-1">Manage active orders.</p>
                        </div>
                        <div className="flex gap-2 items-center">
                            {canSelectMultiple ? (
                                <select className="border border-stone-300 rounded-xl px-4 py-2 outline-none focus:border-amber-600 bg-white shadow-sm font-bold text-stone-700" value={filterShopId} onChange={e=>setFilterShopId(e.target.value)}>
                                    {isSuper && <option value="All">All Branches</option>}
                                    {shops.filter(s => isSuper || currentAdminRecord?.shopIds?.includes(s.id)).map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                </select>
                            ) : (
                                <div className="bg-amber-100 text-amber-900 px-4 py-2 rounded-xl font-bold border border-amber-300 shadow-sm flex items-center">
                                    <i className="fa-solid fa-location-dot mr-2"></i>
                                    {shops.find(s => s.id === filterShopId)?.name || 'Branch'}
                                </div>
                            )}
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto overflow-x-hidden pb-4 pr-1">
                        <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-4 items-start w-full">
                            {activeOrders.map(order => {
                                const orderShop = shops.find(s => s.id === order.shopId);
                                const shopName = orderShop ? orderShop.name : 'Unknown Branch';
                                
                                return (
                                <div key={order.id} className={`w-full bg-white rounded-2xl shadow-sm border-2 flex flex-col h-fit max-h-[85vh] ${order.status === 'New' ? 'border-blue-400' : order.status === 'Preparing' ? 'border-amber-400' : order.status === 'Ready' ? 'border-green-400' : 'border-stone-300'}`}>
                                    
                                    {/* 1. Shop Name & Live Time */}
                                    <div className={`px-4 py-2 border-b rounded-t-xl flex justify-between items-center shrink-0 ${statusColors[order.status]}`}>
                                        <div className="text-[10px] font-bold uppercase tracking-widest flex items-center gap-1.5"><i className="fa-solid fa-store opacity-70"></i> <span className="truncate max-w-[120px]">{shopName}</span></div>
                                        <LiveOrderTimer createdAt={order.createdAt} completedAt={order.completedAt} status={order.status} />
                                    </div>

                                    {/* 2 & 3. Customer & Order Info */}
                                    <div className="p-4 bg-white shrink-0 space-y-2 border-b border-stone-100">
                                        <div className="flex justify-between items-start gap-2">
                                            <div className="font-bold text-stone-800 truncate">{order.customerName || 'Walk-in'}</div>
                                            <div className="text-xs font-semibold text-stone-500 whitespace-nowrap"><i className="fa-solid fa-phone text-[10px] mr-1"></i> {order.customerPhone || 'N/A'}</div>
                                        </div>
                                        
                                        <div className="flex justify-between items-end">
                                            <div className="flex flex-col gap-1">
                                                <span className={`w-fit px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider ${order.orderType === 'TAKEAWAY' ? 'bg-stone-800 text-white' : 'bg-amber-100 text-amber-800'}`}>
                                                    {order.orderType === 'TAKEAWAY' ? 'Take Away' : `Dine In : Table ${order.tableName}`}
                                                </span>
                                            </div>
                                            <div className="text-right">
                                                <div className="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-0.5">Invoice No.</div>
                                                <div className="font-black text-xl leading-none text-stone-800">{order.queueNo}</div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* 4 & 5. Items List */}
                                    <div className="p-4 flex-1 overflow-y-auto bg-stone-50/50 relative">
                                        {order.notes && <div className="mb-4 bg-red-50 text-red-700 p-3 rounded-xl border border-red-200 text-sm font-bold shadow-sm sticky top-0 z-10"><i className="fa-solid fa-triangle-exclamation mr-1.5"></i> Note: {order.notes}</div>}
                                        
                                        <div className="text-[10px] font-bold text-stone-400 uppercase tracking-wider mb-2 flex justify-between px-1">
                                            <span>Item</span>
                                            <span>Details</span>
                                        </div>
                                        
                                        <ul className="space-y-2.5">
                                            {order.items.map((item, idx) => {
                                                const detailsText = [item.size, item.sugar, item.ice].filter(Boolean).join(' | ');
                                                
                                                return (
                                                <li key={idx} onClick={() => toggleItemDone(order, idx)} className={`p-3 rounded-xl border shadow-sm flex items-start gap-3 cursor-pointer transition select-none ${item.done ? 'bg-green-50 border-green-300 opacity-70 hover:opacity-100' : 'bg-white border-stone-200 hover:border-amber-400'}`}>
                                                    <div className="mt-0.5 shrink-0">
                                                         <i className={`fa-regular ${item.done ? 'fa-square-check text-green-600 text-xl' : 'fa-square text-stone-300 text-xl'}`}></i>
                                                    </div>
                                                    <div className="flex-1 min-w-0">
                                                        <div className={`font-bold text-base leading-tight flex items-start gap-2.5 transition-colors ${item.done ? 'text-stone-500 line-through' : 'text-stone-800'}`}>
                                                            <span className={`w-6 h-6 rounded flex items-center justify-center text-xs shrink-0 shadow-sm transition-colors ${item.done ? 'bg-stone-400 text-white' : 'bg-stone-900 text-white'}`}>{item.quantity}</span> 
                                                            <span className="mt-0.5 truncate">{item.name}</span>
                                                        </div>
                                                        {detailsText && (
                                                            <div className="mt-2 flex">
                                                                <span className={`text-[10px] font-bold px-2 py-0.5 rounded-full border ${item.done ? 'bg-green-100 border-green-200 text-green-800' : 'bg-stone-100 border-stone-200 text-stone-600'}`}>
                                                                    {detailsText}
                                                                </span>
                                                            </div>
                                                        )}
                                                    </div>
                                                </li>
                                            )})}
                                        </ul>
                                    </div>

                                    {/* 6 & 7. Subtotal & Financials */}
                                    <div className="px-4 py-3 bg-white border-t border-stone-200 shrink-0 space-y-3">
                                        <div className="flex justify-between items-center">
                                            <div className="font-bold text-stone-500 text-sm">SubTotal:</div>
                                            <div className="font-black text-amber-600 text-lg">{order.totalAmount.toLocaleString()} ៛</div>
                                        </div>
                                        
                                        <div className="flex justify-between items-center">
                                            <div className="font-bold text-stone-500 text-sm">Status:</div>
                                            <div className={`text-[11px] font-black tracking-wider uppercase px-2 py-1 rounded-lg border shadow-sm ${order.paymentStatus === 'Paid' ? 'bg-green-100 text-green-700 border-green-200' : 'bg-red-100 text-red-700 border-red-200'}`}>
                                                {order.paymentStatus === 'Paid' ? <><i className="fa-solid fa-check-circle mr-1"></i> PAID ({order.paymentMethod})</> : <><i className="fa-solid fa-triangle-exclamation mr-1"></i> UNPAID</>}
                                            </div>
                                        </div>

                                        {/* Immediate Payment Buttons */}
                                        {order.paymentStatus === 'Paid' ? (
                                            <button onClick={() => updatePayment(order.id, 'Unpaid', 'N/A', order.shopId)} className="w-full py-2 bg-stone-100 hover:bg-stone-200 text-stone-600 font-bold rounded-lg text-xs transition border border-stone-200 shadow-sm flex items-center justify-center gap-2" title="Undo Payment">
                                                <i className="fa-solid fa-rotate-left"></i> Revert Payment to Unpaid
                                            </button>
                                        ) : (
                                            <div className="flex gap-2">
                                                <button onClick={() => updatePayment(order.id, 'Paid', 'Cash', order.shopId)} className="flex-1 bg-stone-800 hover:bg-stone-900 text-white font-bold py-2 rounded-lg text-xs transition shadow-md flex items-center justify-center">
                                                    <i className="fa-solid fa-money-bill mr-1.5"></i> Pay Cash
                                                </button>
                                                <button onClick={() => updatePayment(order.id, 'Paid', 'Bank', order.shopId)} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 rounded-lg text-xs transition shadow-md flex items-center justify-center">
                                                    <i className="fa-solid fa-building-columns mr-1.5"></i> Pay Bank
                                                </button>
                                            </div>
                                        )}
                                    </div>

                                    {/* 8. Status Progress */}
                                    <div className="px-4 py-2 bg-stone-50 border-t border-stone-200 shrink-0">
                                        <div className="flex justify-between items-center relative z-10">
                                            <div className="absolute left-0 right-0 top-1/2 h-0.5 bg-stone-200 -z-10 -translate-y-1/2"></div>
                                            {['New', 'Preparing', 'Ready', 'Served'].map((step, i) => {
                                                const currentIdx = ['New', 'Preparing', 'Ready', 'Served'].indexOf(order.status);
                                                const isCompleted = i <= currentIdx;
                                                const isCurrent = i === currentIdx;
                                                return (
                                                    <div key={step} className={`text-[9px] font-bold px-2 py-0.5 rounded-full border shadow-sm transition-colors ${isCurrent ? 'bg-amber-500 border-amber-600 text-white' : isCompleted ? 'bg-stone-800 border-stone-900 text-white' : 'bg-white border-stone-300 text-stone-400'}`}>
                                                        {step}
                                                    </div>
                                                );
                                            })}
                                        </div>
                                    </div>

                                    {/* 9. Action Buttons */}
                                    <div className="p-4 border-t border-stone-200 bg-white rounded-b-xl shrink-0">
                                        {order.status === 'New' && <button onClick={() => updateStatus(order, 'Preparing')} className="w-full py-3.5 bg-blue-100 hover:bg-blue-200 text-blue-800 font-bold rounded-xl transition shadow-sm border border-blue-200 text-sm">Start Preparing</button>}
                                        {order.status === 'Preparing' && <button onClick={() => updateStatus(order, 'Ready')} className="w-full py-3.5 bg-amber-100 hover:bg-amber-200 text-amber-800 font-bold rounded-xl transition shadow-sm border border-amber-200 text-sm">Mark Ready</button>}
                                        {order.status === 'Ready' && <button onClick={() => updateStatus(order, 'Served')} className="w-full py-3.5 bg-green-100 hover:bg-green-200 text-green-800 font-bold rounded-xl transition shadow-md border border-green-200 text-sm"><i className="fa-solid fa-check-double mr-2"></i> Serve Order</button>}
                                        
                                        {['New', 'Preparing'].includes(order.status) && (
                                            <button onClick={() => {
                                                const reason = prompt("Cancel this order? Enter reason (optional):");
                                                if (reason !== null) {
                                                    updateStatus(order, 'Cancelled', reason);
                                                }
                                            }} className="w-full py-2 bg-red-50 hover:bg-red-100 text-red-600 font-bold rounded-xl transition border border-red-200 text-xs mt-2">Cancel Order</button>
                                        )}

                                        {(order.status === 'Served' || order.status === 'Cancelled') && (
                                            <div className="w-full py-3.5 bg-stone-100 text-stone-500 font-bold rounded-xl text-center border border-stone-200 text-sm mt-2">
                                                <i className="fa-solid fa-lock mr-2"></i> {order.status} (Waiting for Payment)
                                            </div>
                                        )}
                                    </div>
                                </div>
                                );
                            })}
                            {activeOrders.length === 0 && (
                                <div className="col-span-full w-full flex flex-col items-center justify-center text-stone-400 mt-20 relative z-0">
                                    <i className="fa-solid fa-fire-burner text-6xl mb-4 opacity-20"></i>
                                    <p className="text-xl font-medium">No active kitchen orders</p>
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function POSView({ orders, products, categories, tables, shops, shifts, sugarOptions, iceOptions, currentAdminRecord }) {
            const isSuper = (currentAdminRecord?.role || 'Admin') === 'Admin';
            const canSelectMultiple = isSuper || (currentAdminRecord?.shopIds && currentAdminRecord.shopIds.length > 1);
            
            const [mode, setMode] = useState('manage'); 
            const [posShopId, setPosShopId] = useState(isSuper ? 'All' : (currentAdminRecord?.shopIds?.[0] || currentAdminRecord?.shopId || 'All'));
            const [cartShopId, setCartShopId] = useState(isSuper ? '' : (currentAdminRecord?.shopIds?.[0] || currentAdminRecord?.shopId));

            const currentShift = useMemo(() => {
                return shifts?.find(s => s.shopId === posShopId && s.status === 'Open');
            }, [shifts, posShopId]);

            const [startingCashInput, setStartingCashInput] = useState('');
            const [openShiftModal, setOpenShiftModal] = useState(false);
            const [closeShiftModal, setCloseShiftModal] = useState(false);
            const [actualCash, setActualCash] = useState('');
            const [actualBank, setActualBank] = useState('');

            // Shift Totals Calculation
            const shiftOrders = useMemo(() => {
                if (!currentShift) return [];
                return orders.filter(o => o.shiftId === currentShift.id && o.paymentStatus === 'Paid');
            }, [orders, currentShift]);

            const cashSales = shiftOrders.filter(o => o.paymentMethod === 'Cash').reduce((s,o)=>s+o.totalAmount,0);
            const bankSales = shiftOrders.filter(o => o.paymentMethod === 'Bank').reduce((s,o)=>s+o.totalAmount,0);
            const expectedCash = (currentShift?.startingCash || 0) + cashSales;
            const expectedBank = bankSales;

            const handleOpenShift = async (e) => {
                e.preventDefault();
                try {
                    const { addDoc, updateDoc, doc } = window.FirebaseApp;
                    
                    // 1. Create the new shift
                    const shiftRef = await addDoc(getColRef('shifts'), {
                        shopId: posShopId,
                        openedBy: currentAdminRecord?.name || currentAdminRecord?.email || 'Unknown',
                        openedAt: Date.now(),
                        startingCash: Number(startingCashInput),
                        status: 'Open'
                    });

                    // --- THE "PRE-SHIFT QUEUE" FIX ---
                    // Catch-up logic: Find any early-bird orders from today that belong 
                    // to this shop but don't have a shift attached yet.
                    const midnight = new Date().setHours(0, 0, 0, 0);
                    const orphanedOrders = orders.filter(o => 
                        o.shopId === posShopId && 
                        o.createdAt >= midnight && 
                        !o.shiftId
                    );

                    // Auto-attach these stranded orders to the brand new shift
                    for (const order of orphanedOrders) {
                        await updateDoc(doc(getColRef('orders'), order.id), {
                            shiftId: shiftRef.id
                        });
                    }
                    // ---------------------------------

                    setStartingCashInput('');
                    setOpenShiftModal(false);
                } catch (err) {
                    alert("Failed to open register: " + err.message);
                }
            };

            const handleCloseShift = async (e) => {
                e.preventDefault();
                try {
                    const cashVar = Number(actualCash) - expectedCash;
                    const bankVar = Number(actualBank) - expectedBank;

                    const { updateDoc, doc } = window.FirebaseApp;
                    await updateDoc(doc(getColRef('shifts'), currentShift.id), {
                        status: 'Closed',
                        closedAt: Date.now(),
                        closedBy: currentAdminRecord?.name || currentAdminRecord?.email || 'Unknown',
                        cashSales,
                        bankSales,
                        totalSales: cashSales + bankSales,
                        expectedCash,
                        actualCash: Number(actualCash),
                        cashVariance: cashVar,
                        expectedBank,
                        actualBank: Number(actualBank),
                        bankVariance: bankVar
                    });
                    setCloseShiftModal(false);
                    setActualCash('');
                    setActualBank('');
                } catch (err) {
                    alert("Failed to close shift: " + err.message);
                }
            };

            useEffect(() => {
                if (shops.length > 0 && !cartShopId && isSuper) {
                    setCartShopId(shops[0].id);
                }
            }, [shops, cartShopId, isSuper]);
            
            // Robust Time Tracking: Calculate Midnight of the current day using precise Timestamps
            const startOfToday = useMemo(() => new Date().setHours(0, 0, 0, 0), []);
            
            const { todayOrders, activeOrders, tableBaseOrders } = useMemo(() => {
                const today = [], active = [], tableBase = [];
                for (let i = 0; i < orders.length; i++) {
                    const o = orders[i];
                    if (posShopId !== 'All' && o.shopId !== posShopId) continue;
                    
                    const isToday = o.createdAt >= startOfToday;
                    const isActive = ['New', 'Preparing', 'Ready'].includes(o.status);
                    
                    if (isToday) today.push(o);
                    if (isActive) active.push(o);
                    if (isToday || isActive) tableBase.push(o);
                }
                return { todayOrders: today, activeOrders: active, tableBaseOrders: tableBase };
            }, [orders, posShopId, startOfToday]);

            const [filterStatus, setFilterStatus] = useState('All');
            const [searchOrderQuery, setSearchOrderQuery] = useState('');

            const displayedOrders = useMemo(() => {
                const searchLower = searchOrderQuery.toLowerCase(); // Optimization: Evaluate once outside the loop
                return tableBaseOrders.filter(o => {
                    const matchStatus = filterStatus === 'All' || o.status === filterStatus;
                    
                    // Crash Protection: Explicitly cast fields to Strings before evaluating
                    const matchSearch = String(o.queueNo || '').toLowerCase().includes(searchLower) || 
                                        String(o.customerName || '').toLowerCase().includes(searchLower) ||
                                        String(o.customerPhone || '').toLowerCase().includes(searchLower) ||
                                        String(o.tableName || '').toLowerCase().includes(searchLower);
                    
                    return matchStatus && matchSearch;
                });
            }, [tableBaseOrders, filterStatus, searchOrderQuery]);

            const updateStatus = async (order, newStatus) => {
                const { doc, updateDoc } = window.FirebaseApp;
                const updateData = { status: newStatus, staffId: currentAdminRecord?.id };
                
                if (newStatus === 'Ready' || newStatus === 'Served' || newStatus === 'Cancelled') {
                    updateData.completedAt = Date.now();
                }

                await updateDoc(doc(getColRef('orders'), order.id), updateData);
                
                if (newStatus === 'Served' || newStatus === 'Cancelled') {
                    await releaseTableIfNotUsed(order.tableId, order.id, orders);
                }
            };

            const updatePayment = async (order, payStatus, payMethod) => {
                const { doc, updateDoc } = window.FirebaseApp;
                
                // CRITICAL FIX: Find the shift based on the ORDER'S shopId, not the currently selected POS filter.
                const targetShift = shifts?.find(s => s.shopId === order.shopId && s.status === 'Open');
                
                const updateData = {
                    paymentStatus: payStatus,
                    paymentMethod: payMethod,
                    staffId: currentAdminRecord?.id
                };
                
                if (payStatus === 'Paid' && targetShift) {
                    updateData.shiftId = targetShift.id;
                }
                
                await updateDoc(doc(getColRef('orders'), order.id), updateData);
            };

            const deleteOrder = async (order) => {
                if (confirm("Are you sure you want to completely delete this order? This cannot be undone.")) {
                    try {
                        const { deleteDoc, doc } = window.FirebaseApp;
                        await deleteDoc(doc(db, 'orders', order.id));
                        await releaseTableIfNotUsed(order.tableId, order.id, orders);
                    } catch (err) {
                        alert("Error deleting order: " + err.message);
                    }
                }
            };

            const statusColors = {
                'New': 'bg-blue-100 text-blue-800',
                'Preparing': 'bg-amber-100 text-amber-800',
                'Ready': 'bg-green-100 text-green-800',
                'Served': 'bg-stone-100 text-stone-500',
                'Cancelled': 'bg-red-100 text-red-800'
            };

            const formatDateTime = (timestamp) => {
                const d = new Date(timestamp);
                const day = String(d.getDate()).padStart(2, '0');
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const year = String(d.getFullYear()).slice(-2);
                let hrs = d.getHours();
                const ampm = hrs >= 12 ? 'pm' : 'am';
                hrs = hrs % 12 || 12;
                const mins = String(d.getMinutes()).padStart(2, '0');
                return `${day}-${month}-${year} | ${hrs}:${mins} ${ampm}`;
            };

            const [cart, setCart] = useState([]);
            const [customerName, setCustomerName] = useState('');
            const [activeCategory, setActiveCategory] = useState('All');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [selectedItemForOptions, setSelectedItemForOptions] = useState(null);

            const filteredProducts = useMemo(() => {
                if (!products) return [];
                return products.filter(p => (activeCategory === 'All' || p.category === activeCategory) && p.isAvailable);
            }, [products, activeCategory]);

            const handleSizeClick = (product, size, price) => {
                if (product.hasSugarOption || product.hasIceOption) {
                    const defaultSugar = sugarOptions?.length > 0 ? sugarOptions[0].name : '100%';
                    const defaultIce = iceOptions?.length > 0 ? iceOptions[0].name : 'Normal Ice';
                    setSelectedItemForOptions({ 
                        product, 
                        size, 
                        price, 
                        sugar: product.hasSugarOption ? defaultSugar : null,
                        ice: product.hasIceOption ? defaultIce : null
                    });
                } else {
                    addToCart(product, size, price, null, null);
                }
            };

            const addToCart = (product, size, price, sugar, ice, editCartIndex = undefined) => {
                setCart(prev => {
                    if (editCartIndex !== undefined) {
                        const newCart = [...prev];
                        const existingIndex = newCart.findIndex((item, idx) => 
                            idx !== editCartIndex && item.productId === product.id && item.size === size && item.sugar === sugar && item.ice === ice
                        );
                        
                        if (existingIndex >= 0) {
                            newCart[existingIndex] = { ...newCart[existingIndex], quantity: newCart[existingIndex].quantity + newCart[editCartIndex].quantity };
                            newCart.splice(editCartIndex, 1);
                        } else {
                            newCart[editCartIndex] = { ...newCart[editCartIndex], size, price, sugar, ice };
                        }
                        return newCart;
                    }

                    const existingIndex = prev.findIndex(item => item.productId === product.id && item.size === size && item.sugar === sugar && item.ice === ice);
                    if (existingIndex >= 0) {
                        const newCart = [...prev];
                        // BUG FIX: Prevent direct state mutation
                        newCart[existingIndex] = { ...newCart[existingIndex], quantity: newCart[existingIndex].quantity + 1 };
                        return newCart;
                    }
                    return [...prev, { productId: product.id, name: product.name, size, price: price || 0, quantity: 1, image: product.image, sugar, ice }];
                });
            };

            const handleEditCartItem = (idx) => {
                const item = cart[idx];
                const product = products.find(p => p.id === item.productId);
                const hasMultipleSizes = product && product.priceSmall > 0 && product.priceLarge > 0;
                
                if (product && (product.hasSugarOption || product.hasIceOption || hasMultipleSizes)) {
                    const defaultSugar = sugarOptions?.length > 0 ? sugarOptions[0].name : '100%';
                    const defaultIce = iceOptions?.length > 0 ? iceOptions[0].name : 'Normal Ice';
                    setSelectedItemForOptions({ 
                        product, 
                        size: item.size, 
                        price: item.price, 
                        sugar: item.sugar || (product.hasSugarOption ? defaultSugar : null),
                        ice: item.ice || (product.hasIceOption ? defaultIce : null),
                        editCartIndex: idx
                    });
                }
            };

            const updateCartQty = (idx, delta) => {
                setCart(prev => {
                    const newCart = [...prev];
                    // BUG FIX: Prevent direct state mutation
                    newCart[idx] = { ...newCart[idx], quantity: newCart[idx].quantity + delta };
                    if (newCart[idx].quantity <= 0) newCart.splice(idx, 1);
                    return newCart;
                });
            };

            const cartTotal = cart.reduce((sum, item) => sum + ((item.price || 0) * item.quantity), 0);

            const handleCheckout = async (targetStatus, payStatus, payMethod) => {
                if (cart.length === 0) return;
                setIsSubmitting(true);
                
                const { addDoc, doc, runTransaction } = window.FirebaseApp;
                
                const today = getTodayString();
                
                // TAX DEPT FORMAT: Extract last 3 alphanumeric characters of the shop name
                const targetShop = shops.find(s => s.id === cartShopId) || { name: 'UNK', id: 'UNKNOWN' };
                const cleanShopName = targetShop.name.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
                const shopPrefix = cleanShopName.length >= 3 ? cleanShopName.slice(-3) : cleanShopName.padStart(3, 'X');

                // SECURE FIREBASE TRANSACTION: Guaranteed Sequential Invoice Numbers
                let queueString;
                try {
                    const counterRef = doc(db, 'invoice_counters', targetShop.id);
                    const nextSeq = await runTransaction(db, async (transaction) => {
                        const counterDoc = await transaction.get(counterRef);
                        let nextVal = 1;
                        if (counterDoc.exists()) {
                            nextVal = (counterDoc.data().currentValue || 0) + 1;
                            transaction.update(counterRef, { currentValue: nextVal });
                        } else {
                            transaction.set(counterRef, { currentValue: nextVal });
                        }
                        return nextVal;
                    });
                    queueString = `${shopPrefix}-${nextSeq.toString().padStart(5, '0')}`;
                } catch (err) {
                    console.error("Transaction failed, using fallback:", err);
                    const shopOrders = orders.filter(o => o.shopId === cartShopId);
                    const highestQueue = shopOrders.length > 0 ? Math.max(...shopOrders.map(o => parseInt(String(o.queueNo).split('-')[1]) || 0)) : 0;
                    queueString = `${shopPrefix}-${(highestQueue + 1).toString().padStart(5, '0')}`;
                }

                const cartTargetShift = shifts?.find(s => s.shopId === cartShopId && s.status === 'Open');

                // Snapshot the cart state before we clear it instantly
                const currentCart = [...cart];
                const currentTotal = cartTotal;

                const orderData = {
                    shiftId: cartTargetShift ? cartTargetShift.id : null,
                    staffId: currentAdminRecord?.id,
                    userId: currentAdminRecord?.id,
                    queueNo: queueString,
                    orderType: 'TAKEAWAY', 
                    tableId: 'Walk-in',
                    items: currentCart,
                    totalAmount: currentTotal,
                    status: targetStatus, 
                    paymentStatus: payStatus,
                    paymentMethod: payMethod,
                    dateString: today,
                    createdAt: Date.now()
                };

                if (targetStatus === 'Served' || targetStatus === 'Cancelled') {
                    orderData.completedAt = Date.now();
                }

                // OPTIMISTIC UI UPDATE: Clear POS Register Instantly
                if (navigator.vibrate) navigator.vibrate([30, 30]);
                setCart([]);
                setCustomerName('');
                setMode('manage');
                setIsSubmitting(false);

                // BACKGROUND SYNC: Fire and Forget Database operations
                Promise.resolve().then(async () => {
                    try {
                        await addDoc(getColRef('orders'), orderData);
                        deductInventory(currentCart, products, cartShopId, queueString);
                    } catch (err) {
                        console.error("POS Checkout failed in background:", err);
                    }
                });
            };

            if (mode === 'pos') {
                return (
                    <div className="h-full flex flex-col md:flex-row gap-6 pb-20 md:pb-0 relative">
                        
                        {/* SHIFT LOCK OVERLAYS */}
                        {posShopId === 'All' && (
                            <div className="absolute inset-0 bg-stone-100/80 backdrop-blur-sm z-40 flex items-center justify-center rounded-2xl border border-stone-200">
                                <div className="bg-white p-8 rounded-3xl shadow-xl text-center max-w-sm">
                                    <i className="fa-solid fa-store text-5xl text-stone-300 mb-4"></i>
                                    <h3 className="text-xl font-bold text-stone-800 mb-2">Select a Branch</h3>
                                    <p className="text-stone-500 mb-6">You must select a specific branch from the dropdown above to open the POS register.</p>
                                    <button onClick={() => setMode('manage')} className="w-full bg-stone-900 text-white font-bold py-3 rounded-xl hover:bg-stone-800">Go Back</button>
                                </div>
                            </div>
                        )}

                        <div className="flex-1 flex flex-col overflow-hidden bg-white rounded-2xl shadow-sm border border-stone-200">
                            <div className="p-4 border-b border-stone-200 bg-stone-50 flex justify-between items-center shrink-0">
                                <h3 className="font-bold text-stone-800"><i className="fa-solid fa-mug-hot mr-2 text-amber-600"></i> Menu Items</h3>
                                <button onClick={() => setMode('manage')} className="text-sm font-bold text-stone-500 hover:text-stone-800 px-3 py-1.5 bg-white border border-stone-200 rounded-lg transition"><i className="fa-solid fa-arrow-left mr-1"></i> Back to Orders</button>
                            </div>
                            <div className="p-3 flex gap-2 overflow-x-auto no-scrollbar border-b border-stone-100 shrink-0">
                                <button onClick={() => setActiveCategory('All')} className={`px-4 py-1.5 rounded-full text-sm font-semibold whitespace-nowrap transition ${activeCategory === 'All' ? 'bg-stone-900 text-white shadow-md' : 'bg-stone-100 text-stone-600 hover:bg-stone-200'}`}>All</button>
                                {categories?.map(c => (
                                    <button key={c.id} onClick={() => setActiveCategory(c.name)} className={`px-4 py-1.5 rounded-full text-sm font-semibold whitespace-nowrap transition ${activeCategory === c.name ? 'bg-stone-900 text-white shadow-md' : 'bg-stone-100 text-stone-600 hover:bg-stone-200'}`}>{c.name}</button>
                                ))}
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 grid grid-cols-2 lg:grid-cols-3 gap-3 content-start">
                                {filteredProducts.map(p => (
                                    <div key={p.id} className="border border-stone-200 rounded-2xl p-3 flex flex-col hover:border-amber-400 hover:shadow-md transition bg-white h-full">
                                        <div className="mb-2">
                                            <h3 className="font-bold text-stone-800 text-sm leading-tight line-clamp-2">{p.name}</h3>
                                        </div>
                                        
                                        <div className="flex flex-row gap-2.5 mt-auto">
                                            <div className="w-16 h-16 rounded-xl bg-stone-100 shrink-0 overflow-hidden relative">
                                                {p.image ? <img src={p.image} className="w-full h-full object-cover absolute inset-0" alt={p.name} loading="lazy" decoding="async" /> : <i className="fa-solid fa-image text-xl text-stone-300 w-full h-full flex items-center justify-center absolute inset-0"></i>}
                                            </div>
                                            <div className="flex-1 flex flex-col justify-end gap-1.5 min-w-0">
                                                {p.priceSmall > 0 && (
                                                    <button onClick={() => handleSizeClick(p, 'S', p.priceSmall)} className="w-full flex items-center justify-between px-1.5 py-1.5 rounded-lg border text-[10px] sm:text-xs font-bold transition-colors border-amber-300 bg-amber-100 text-amber-900 hover:bg-amber-200 shadow-sm">
                                                        <span>S</span><span className="truncate ml-0.5">{p.priceSmall.toLocaleString()} ៛</span>
                                                    </button>
                                                )}
                                                {p.priceLarge > 0 && (
                                                    <button onClick={() => handleSizeClick(p, 'L', p.priceLarge)} className="w-full flex items-center justify-between px-1.5 py-1.5 rounded-lg border text-[10px] sm:text-xs font-bold transition-colors border-amber-300 bg-amber-100 text-amber-900 hover:bg-amber-200 shadow-sm">
                                                        <span>L</span><span className="truncate ml-0.5">{p.priceLarge.toLocaleString()} ៛</span>
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        
                        <div className="w-full md:w-80 lg:w-96 bg-white rounded-2xl shadow-sm border border-stone-200 flex flex-col shrink-0 h-full">
                            <div className="p-4 border-b border-stone-200 bg-stone-50 font-bold text-stone-800 flex justify-between items-center">
                                <div><i className="fa-solid fa-cart-shopping mr-2 text-amber-600"></i> Current Order</div>
                                {!currentShift && posShopId !== 'All' && (
                                    <button onClick={() => setOpenShiftModal(true)} className="text-xs bg-green-100 text-green-700 px-2 py-1 rounded font-bold hover:bg-green-200 transition shadow-sm">
                                        <i className="fa-solid fa-lock-open mr-1"></i> Open Shift
                                    </button>
                                )}
                                {currentShift && (
                                    <button onClick={() => setCloseShiftModal(true)} className="text-xs bg-red-100 text-red-700 px-2 py-1 rounded font-bold hover:bg-red-200 transition shadow-sm">
                                        <i className="fa-solid fa-lock mr-1"></i> Close Shift
                                    </button>
                                )}
                            </div>
                            <div className="p-4 border-b border-stone-100 shrink-0 bg-white space-y-3">
                                {canSelectMultiple ? (
                                    <select className="w-full border border-stone-300 rounded-xl px-4 py-2.5 text-[16px] outline-none focus:border-amber-500 bg-stone-50 font-medium" value={cartShopId} onChange={e=>setCartShopId(e.target.value)}>
                                        <option value="" disabled>Select Branch...</option>
                                        {shops.filter(s => isSuper || currentAdminRecord?.shopIds?.includes(s.id)).map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                    </select>
                                ) : (
                                    <div className="w-full border border-stone-300 rounded-xl px-4 py-2.5 bg-stone-100 font-medium text-stone-500">
                                        Branch: {shops.find(s=>s.id===cartShopId)?.name || 'Unknown'}
                                    </div>
                                )}
                                <input type="text" placeholder="Customer Name (Walk-in)" className="w-full border border-stone-300 rounded-xl px-4 py-2.5 text-[16px] outline-none focus:border-amber-500 bg-stone-50" value={customerName} onChange={e=>setCustomerName(e.target.value)} />
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-3">
                                {cart.map((item, idx) => (
                                    <div key={idx} className="flex justify-between items-center text-sm border-b border-stone-50 pb-3">
                                        <div className="flex-1 pr-2">
                                            <div className="font-bold text-stone-800 leading-tight">{item.name}</div>
                                            <div className="flex flex-wrap items-center gap-1 mt-0.5">
                                                {(() => {
                                                    const product = products.find(p => p.id === item.productId);
                                                    const hasMultiSize = product && product.priceSmall > 0 && product.priceLarge > 0;
                                                    const isEditable = product && (product.hasSugarOption || product.hasIceOption || hasMultiSize);
                                                    
                                                    const modifiersText = [item.sugar, item.ice].filter(Boolean).join(' | ');
                                                    
                                                    if (isEditable) {
                                                        return (
                                                            <button 
                                                                onClick={() => handleEditCartItem(idx)} 
                                                                className="group flex items-center gap-1.5 text-[10px] font-bold text-amber-700 bg-amber-50 border border-amber-200 hover:bg-amber-100 hover:border-amber-300 pl-0.5 pr-2 py-0.5 rounded-full transition-all shadow-sm"
                                                                title="Click to edit size or options"
                                                            >
                                                                <span className="bg-amber-200/50 text-amber-900 px-1.5 py-0.5 rounded-full uppercase tracking-wider">
                                                                    {item.size}
                                                                </span>

        function InventoryView({ ingredients, shops, currentAdminRecord }) {
