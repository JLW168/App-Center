                                    {categories?.map(c => (
                                        <button key={c.id} onClick={() => setActiveCategory(c.name)} className={`px-4 py-1.5 rounded-full text-sm font-semibold whitespace-nowrap transition ${activeCategory === c.name ? 'bg-stone-900 text-white shadow-md' : 'bg-stone-100 text-stone-600 hover:bg-stone-200'}`}>{c.name}</button>
                                    ))}
                                </div>
                                <div className="flex-1 overflow-y-auto p-4 grid grid-cols-2 lg:grid-cols-3 gap-3 content-start">
                                    {filteredProducts.map(p => (
                                        <div key={p.id} className="border border-stone-200 rounded-2xl p-3 flex flex-col hover:border-amber-400 hover:shadow-md transition bg-white h-full">
                                            <div className="mb-2">
                                                <h3 className="font-bold text-stone-800 text-sm leading-tight line-clamp-2">{p.name}</h3>

                                            <div className="flex flex-row gap-2.5 mt-auto">
                                                <div className="w-16 h-16 rounded-xl bg-stone-100 shrink-0 overflow-hidden relative">
                                                    {p.image ? <img src={p.image} className="w-full h-full object-cover absolute inset-0" alt={p.name} loading="lazy" decoding="async" /> : <i className="fa-solid fa-image text-xl text-stone-300 w-full h-full flex items-center justify-center absolute inset-0"></i>}
                                                </div>
                                                <div className="flex-1 flex flex-col justify-end gap-1.5 min-w-0">
                                                    {p.priceSmall > 0 && (
                                                        <button onClick={() => handleSizeClick(p, 'S', p.priceSmall)} className="w-full flex items-center justify-between px-1.5 py-1.5 rounded-lg border text-[10px] sm:text-xs font-bold transition-colors border-amber-300 bg-amber-100 text-amber-900 hover:bg-amber-200 shadow-sm">
                                                            <span>S</span><span className="truncate ml-0.5">{p.priceSmall.toLocaleString()} ៛</span>

                                                    {p.priceLarge > 0 && (
                                                        <button onClick={() => handleSizeClick(p, 'L', p.priceLarge)} className="w-full flex items-center justify-between px-1.5 py-1.5 rounded-lg border text-[10px] sm:text-xs font-bold transition-colors border-amber-300 bg-amber-100 text-amber-900 hover:bg-amber-200 shadow-sm">
                                                            <span>L</span><span className="truncate ml-0.5">{p.priceLarge.toLocaleString()} ៛</span>
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                            
                            <div className="w-full md:w-80 lg:w-96 bg-white rounded-2xl shadow-sm border border-stone-200 flex flex-col shrink-0 h-full">
                                <div className="p-4 border-b border-stone-200 bg-stone-50 font-bold text-stone-800 flex justify-between items-center">
                                    <div><i className="fa-solid fa-cart-shopping mr-2 text-amber-600"></i> Current Order</div>
                                    {!currentShift && posShopId !== 'All' && (
                                        <button onClick={() => setOpenShiftModal(true)} className="text-xs bg-green-100 text-green-700 px-2 py-1 rounded font-bold hover:bg-green-200 transition shadow-sm">

                                </div>
                                <div className="p-4 border-b border-stone-100 shrink-0 bg-white space-y-3">
                                    {canSelectMultiple ? (
                                        <select className="w-full border border-stone-300 rounded-xl px-4 py-2.5 text-[16px] outline-none focus:border-amber-500 bg-stone-50 font-medium" value={cartShopId} onChange={e=>setCartShopId(e.target.value)}>
                                            <option value="" disabled>Select Branch...</option>
                                            {shops.filter(s => isSuper || allowedShopIds.includes('All') || allowedShopIds.includes(s.id)).map(s => <option key={s.id} value={s.id}>{s.name}</option>)}

                                        {(customerPhone && customerData) && (

                                            <div className="bg-amber-50 rounded-xl p-2.5 border border-amber-200">

                                        {(customerPhone && String(customerPhone).replace(/\D/g, '').length >= 8 && !customerData && !isCheckingPhone) && (

                                    {processedCart.map((item, idx) => (

                                            <div className="flex justify-between opacity-50"><span>Starting Float:</span> <span>0 ៛</span></div>
                                            <div className="flex justify-between"><span>Bank Sales:</span> <span>{bankSales.toLocaleString()} ៛</span></div>
                                            <div className="flex justify-between font-bold border-t border-stone-200 pt-2 text-stone-800">
                                                <span>Expected Bank:</span> <span>{expectedBank.toLocaleString()} ៛</span>
                                            </div>
                                        </div>
                                        <div className="mt-2">
                                            <label className="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-1">Actual Bank Total *</label>
                                            <input type="number" required className="w-full border border-stone-300 rounded-lg px-3 py-2 outline-none focus:border-blue-500 font-bold text-lg" value={actualBank} onChange={e=>setActualBank(e.target.value)} />
                                            {actualBank !== '' && (
                                                <div className={`text-xs font-bold mt-1.5 text-right ${Number(actualBank) === expectedBank ? 'text-green-600' : 'text-red-500'}`}>
                                                    Variance: {(Number(actualBank) - expectedBank).toLocaleString()} ៛
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                <button type="submit" className="w-full bg-stone-900 text-white font-bold py-3.5 rounded-xl hover:bg-stone-800 shadow-lg transition">
                                    Confirm & Close Shift
                                </button>
                            </form>
                        </div>
                    )}

                    {/* TABLE MANAGER MODAL */}
                    {showTableManager && (
                        <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl w-full max-w-5xl max-h-[90vh] flex flex-col shadow-2xl animate-fade-in relative">
                                <div className="p-6 border-b border-stone-200 bg-stone-50 flex justify-between items-center shrink-0 rounded-t-3xl">
                                    <div>
                                        <h3 className="text-xl font-black text-stone-900">Table Management</h3>
                                        <p className="text-sm font-medium text-stone-500 mt-1">Branch: {posShopId === 'All' ? 'All Branches' : shops.find(s=>s.id === posShopId)?.name}</p>
                                    </div>
                                    <button onClick={() => setShowTableManager(false)} className="w-8 h-8 rounded-full bg-stone-200 flex items-center justify-center text-stone-600 hover:bg-stone-300 transition">
                                        <i className="fa-solid fa-xmark"></i>
                                    </button>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto p-6 bg-stone-100">
                                    <div className="grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-5 gap-4">
                                        {tables.filter(t => posShopId === 'All' || t.shopId === posShopId).map(t => (
                                            <div key={t.id} className="bg-white p-4 rounded-2xl border border-stone-200 shadow-sm flex flex-col justify-between items-center relative overflow-hidden group">
                                                <div className={`absolute top-0 left-0 w-full h-1 ${t.status === 'Available' ? 'bg-green-500' : 'bg-red-500'}`}></div>
                                                <i className="fa-solid fa-chair text-3xl text-stone-200 mb-2 mt-2"></i>
                                                <div className="font-bold text-lg text-stone-800">Table {t.name}</div>
                                                {posShopId === 'All' && (
                                                    <div className="text-[10px] text-stone-400 font-bold uppercase tracking-wider mb-2 text-center">
                                                        {shops.find(s => s.id === t.shopId)?.name || 'Unknown'}
                                                    </div>
                                                )}
                                                <button 
                                                    onClick={async () => {
                                                        const newStatus = t.status === 'Available' ? 'Occupied' : 'Available';
                                                        try {
                                                            const { doc, updateDoc } = window.FirebaseApp;
                                                            await updateDoc(doc(db, 'tables', t.id), { status: newStatus });
                                                        } catch (e) {
                                                            console.error("Error toggling table status", e);
                                                        }
                                                    }}
                                                    className={`mt-auto px-3 py-1.5 rounded-lg text-[10px] font-bold uppercase tracking-wider transition-all border shadow-sm w-full text-center ${t.status === 'Available' ? 'bg-green-50 text-green-700 border-green-200 hover:bg-green-100' : 'bg-red-50 text-red-700 border-red-200 hover:bg-red-100'}`}
                                                    title="Click to toggle table status manually"
                                                >
                                                    <i className="fa-solid fa-rotate mr-1"></i> {t.status}
                                                </button>
                                            </div>
                                        ))}
                                        {tables.filter(t => posShopId === 'All' || t.shopId === posShopId).length === 0 && (
                                            <div className="col-span-full text-center py-10 text-stone-400 font-medium">No tables found for this branch.</div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {showSetupModal && (
                        <SetupModal 
                            sessionInfo={{ customerPhone, customerName, customerSex: 'M' }}
                            bypassPin={true}
                            onSubmit={(e, data) => {
                                if (e) e.preventDefault();
                                setCustomerPhone(data.phone);
                                setCustomerName(data.name);
                                setShowSetupModal(false);
                            }}
                            onClose={() => setShowSetupModal(false)}
                        />
                    )}
                </>
            );
        }

        function InventoryView({ ingredients, shops, currentAdminRecord }) {
            const isSuper = (currentAdminRecord?.role || 'Admin') === 'Admin';
            const canSelectMultiple = isSuper || (currentAdminRecord?.shopIds && currentAdminRecord.shopIds.length > 1);
            const initialShop = isSuper ? '' : (currentAdminRecord?.shopIds?.[0] || currentAdminRecord?.shopId);
            const [filterShop, setFilterShop] = useState(initialShop);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({ name: '', ingredientCode: '', unit: '', conversionUnit: '', conversionRate: '', usageS: '', usageL: '', costPerUnit: '', enableUsageS: false, enableUsageL: false, note: '' });
            const [editingId, setEditingId] = useState(null);

            // Smart Restock State
            const [restockModalOpen, setRestockModalOpen] = useState(false);
            const [restockData, setRestockData] = useState({ id: null, name: '', qty: '', cost: '' });

            // History State
            const [historyTab, setHistoryTab] = useState('stock');
            const [logs, setLogs] = useState([]);
            const [logFilter, setLogFilter] = useState('today');
            const [manualInputs, setManualInputs] = useState({});

            useEffect(() => {
                if (shops.length > 0 && !filterShop && isSuper) setFilterShop(shops[0].id);
            }, [shops, filterShop, isSuper]);

            // Fetch History Logs
            useEffect(() => {
                if (historyTab !== 'logs') return;
                const { onSnapshot, collection, query, orderBy, limit } = window.FirebaseApp;
                // Added a limit to the logs query to prevent massive reads
                const q = query(collection(db, 'inventory_logs'), orderBy('timestamp', 'desc'), limit(150));
                
                const unsub = onSnapshot(q, snap => {
                    const parsedLogs = [];
                    snap.docs.forEach(d => {
                        const data = d.data();
                        // Parse aggregated batch logs
                        if (data.entries && Array.isArray(data.entries)) {
                            data.entries.forEach((entry, idx) => {
                                parsedLogs.push({ id: `${d.id}-${idx}`, ...data, ingredientId: entry.ingredientId, amount: entry.amount });
                            });
                        } else {
                            // Support legacy single logs
                            parsedLogs.push({ id: d.id, ...data });
                        }
                    });
                    setLogs(parsedLogs);
                });
                return () => unsub();
            }, [historyTab]);

            // Auto-generate Ingredient Code when opening Add Modal
            useEffect(() => {
                if (isModalOpen && !editingId && !formData.ingredientCode) {
                    let maxSeq = 0;
                    ingredients.forEach(i => {
                        if (i.ingredientCode && i.ingredientCode.startsWith('IPC-')) {
                            const seq = parseInt(i.ingredientCode.split('-')[1], 10);
                            if (!isNaN(seq) && seq > maxSeq) {
                                maxSeq = seq;
                            }
                        }
                    });
                    const nextSeq = Math.max(maxSeq, ingredients.length) + 1;
                    const newCode = `IPC-${String(nextSeq).padStart(3, '0')}`;
                    setFormData(prev => ({ ...prev, ingredientCode: newCode }));
                }
            }, [isModalOpen, editingId, ingredients]);

            const filteredLogs = useMemo(() => {
                let result = logs;
                if (filterShop && filterShop !== 'All') {
                    result = result.filter(l => l.shopId === filterShop);
                }
                
                const now = new Date();
                const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
                
                if (logFilter === 'today') {
                    result = result.filter(l => l.timestamp >= startOfToday);
                } else if (logFilter === 'yesterday') {
                    const startOfYesterday = startOfToday - (24 * 60 * 60 * 1000);
                    result = result.filter(l => l.timestamp >= startOfYesterday && l.timestamp < startOfToday);
                } else if (logFilter === 'week') {
                    const weekAgo = startOfToday - (7 * 24 * 60 * 60 * 1000);
                    result = result.filter(l => l.timestamp >= weekAgo);
                } else if (logFilter === 'month') {
                    const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
                    result = result.filter(l => l.timestamp >= startOfMonth);
                }
                
                return result.sort((a, b) => b.timestamp - a.timestamp);
            }, [logs, filterShop, logFilter]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!isSuper) return;
                const { doc, updateDoc, addDoc } = window.FirebaseApp;
                const data = { 
                    name: formData.name, 
                    ingredientCode: formData.ingredientCode || '',
                    unit: formData.unit,
                    conversionUnit: formData.conversionUnit || '',
                    conversionRate: Number(formData.conversionRate || 1),
                    usageS: formData.enableUsageS ? Number(formData.usageS || 0) : 0,
                    usageL: formData.enableUsageL ? Number(formData.usageL || 0) : 0,
                    costPerUnit: Number(formData.costPerUnit || 0),
                    note: formData.note || ''
                };
                if (editingId) await updateDoc(doc(getColRef('ingredients'), editingId), data);
                else await addDoc(getColRef('ingredients'), { ...data, stockByShop: {} });
                setIsModalOpen(false);
            };

            const del = async (id) => {
                if (isSuper && confirm("Delete this ingredient globally from all branches?")) {
                    const { deleteDoc, doc } = window.FirebaseApp;
                    await deleteDoc(doc(db, 'ingredients', id));
                }
            };

            const adjustStock = async (id, amount) => {
                if (!filterShop || filterShop === 'All') return alert("Please select a specific shop branch first.");
                const { doc, updateDoc, increment, addDoc, collection } = window.FirebaseApp;
                await updateDoc(doc(getColRef('ingredients'), id), {
                    [`stockByShop.${filterShop}`]: increment(amount)
                });
                
                await addDoc(collection(db, 'inventory_logs'), {
                    ingredientId: id,
                    shopId: filterShop,
                    amount: amount,
                    type: 'Adjustment',
                    reference: 'Manual Adjustment',
                    timestamp: Date.now()
                });
            };

            const handleQuickRestock = (id, delta) => {
                adjustStock(id, delta);
            };

            const handleManualRestock = (id, newTotal, currentTotal) => {
                const diff = Number(newTotal) - Number(currentTotal);
                if (diff !== 0 && !isNaN(diff)) {
                    adjustStock(id, diff);
                }
            };

            const handleRestockSubmit = async (e) => {
                e.preventDefault();
                if (!filterShop || filterShop === 'All') return alert("Please select a specific shop branch first.");
                const { doc, updateDoc, increment, addDoc, collection } = window.FirebaseApp;
                
                const ing = ingredients.find(i => i.id === restockData.id);
                const rate = ing ? (Number(ing.conversionRate) || 1) : 1;

                const baseUnitsPurchased = Number(restockData.qty);
                const totalCost = Number(restockData.cost);
                
                // CRITICAL FIX: Multiply Base Units by Conversion Rate to add correct actual stock
                const stockToAdd = baseUnitsPurchased * rate;
                const costPerUnit = baseUnitsPurchased > 0 ? (totalCost / baseUnitsPurchased) : 0;

                await updateDoc(doc(getColRef('ingredients'), restockData.id), {
                    [`stockByShop.${filterShop}`]: increment(stockToAdd),
                    costPerUnit: costPerUnit
                });
                
                await addDoc(collection(db, 'inventory_logs'), {
                    ingredientId: restockData.id,
                    shopId: filterShop,
                    amount: stockToAdd, // Log actual units added
                    cost: totalCost,
                    type: 'Restock',
                    reference: 'Smart Restock',
                    timestamp: Date.now()
                });

                setRestockModalOpen(false);
            };

            return (
                <div className="max-w-6xl h-full flex flex-col">
                    <div className="flex gap-2 mb-6 border-b border-stone-200 pb-2 shrink-0">
                        <button onClick={() => setHistoryTab('stock')} className={`px-5 py-2 font-bold transition-colors ${historyTab === 'stock' ? 'text-amber-600 border-b-2 border-amber-600' : 'text-stone-500 hover:text-stone-800'}`}>Current Stock</button>
                        <button onClick={() => setHistoryTab('logs')} className={`px-5 py-2 font-bold transition-colors ${historyTab === 'logs' ? 'text-amber-600 border-b-2 border-amber-600' : 'text-stone-500 hover:text-stone-800'}`}>Usage History</button>
                    </div>

                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 shrink-0">
                        <div>
                            <h2 className="text-2xl font-bold">{historyTab === 'stock' ? 'Inventory Management' : 'Stock Usage History'}</h2>
                            <p className="text-sm text-stone-500 mt-1">{historyTab === 'stock' ? 'Track branch-specific ingredient stock.' : 'Review restocks and order deductions over time.'}</p>
                        </div>
                        <div className="flex gap-2 w-full sm:w-auto">
                            {historyTab === 'logs' && (
                                <select className="border border-stone-300 rounded-xl px-4 py-2 outline-none focus:border-amber-600 bg-white font-medium text-stone-600" value={logFilter} onChange={e=>setLogFilter(e.target.value)}>
                                    <option value="today">Today</option>
                                    <option value="yesterday">Yesterday</option>
                                    <option value="week">Last 7 Days</option>
                                    <option value="month">This Month</option>
                                    <option value="all">All Time</option>
                                </select>
                            )}
                            
                            {canSelectMultiple ? (
                                <select className="border border-stone-300 rounded-xl px-4 py-2 outline-none focus:border-amber-600 bg-white font-bold text-stone-700 flex-1 sm:flex-none" value={filterShop} onChange={e=>setFilterShop(e.target.value)}>
                                    <option value="" disabled>Select Branch...</option>
                                    {shops.filter(s => isSuper || currentAdminRecord?.shopIds?.includes(s.id)).map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                </select>
                            ) : (
                                <div className="bg-amber-100 text-amber-900 px-4 py-2 rounded-xl font-bold border border-amber-300 shadow-sm flex items-center">
                                    <i className="fa-solid fa-location-dot mr-2"></i>
                                    {shops.find(s => s.id === filterShop)?.name || 'Branch'}
                                </div>
                            )}
                            {isSuper && historyTab === 'stock' && (
                                <button onClick={() => { setFormData({ name: '', ingredientCode: '', unit: '', conversionUnit: '', conversionRate: '', usageS: '', usageL: '', costPerUnit: '', enableUsageS: false, enableUsageL: false, note: '' }); setEditingId(null); setIsModalOpen(true); }} className="bg-stone-900 text-white px-4 py-2 rounded-xl font-bold shadow-md whitespace-nowrap">
                                    <i className="fa-solid fa-plus mr-2"></i> Add Item
                                </button>
                            )}
                        </div>
                    </div>

                    {historyTab === 'stock' ? (
                        <div className="bg-white rounded-2xl border shadow-sm p-4 flex-1 overflow-auto">
                            <table className="w-full min-w-[900px] text-left text-sm border-collapse border border-stone-300">
                                <thead>
                                    <tr className="text-stone-700 uppercase tracking-wider bg-stone-100">
                                        <th className="p-3 font-bold border border-stone-300">Ingredient Details</th>
                                        <th className="p-3 font-bold border border-stone-300 text-center bg-amber-50">Branch Stock & Restock</th>
                                        <th className="p-3 font-bold border border-stone-300">Smart Yield Calculation</th>
                                        {isSuper && <th className="p-3 font-bold border border-stone-300 text-right">Global Actions</th>}
                                    </tr>
                                </thead>
                                <tbody>
                                    {ingredients.map(ing => {
                                        const currentStock = ing.stockByShop?.[filterShop] || 0;
                                        const yieldS = ing.usageS ? Math.floor(currentStock / ing.usageS) : '-';
                                        const yieldL = ing.usageL ? Math.floor(currentStock / ing.usageL) : '-';
                                        return (
                                            <tr key={ing.id} className="hover:bg-stone-50 bg-white">
                                                <td className="p-3 border border-stone-300">
                                                    <div className="font-bold text-stone-800 text-base">{ing.name}</div>
                                                    <div className="text-xs text-stone-500 font-medium mt-1 flex items-center gap-1.5 flex-wrap">
                                                        {ing.ingredientCode && <span className="bg-amber-100 text-amber-800 px-1.5 py-0.5 rounded border border-amber-200 uppercase font-bold">{ing.ingredientCode}</span>}
                                                        <span className="bg-stone-100 px-1.5 py-0.5 rounded border border-stone-200">Unit: {ing.unit}</span>
                                                        <span className="bg-green-50 text-green-700 px-1.5 py-0.5 rounded border border-green-200">Cost: {(ing.costPerUnit || 0).toLocaleString()} ៛/{ing.unit}</span>
                                                    </div>
                                                </td>
                                                <td className="p-3 border border-stone-300 text-center bg-amber-50/30">
                                                    <div className="flex flex-col items-center justify-center">
                                                        <div className="text-[10px] font-bold text-stone-500 uppercase tracking-wider mb-1">
                                                            Base Unit ({ing.unit})
                                                        </div>
                                                        <div className="flex items-center justify-center bg-white border border-stone-300 rounded-lg shadow-sm overflow-hidden mb-1">
                                                            <button 
                                                                onClick={() => handleQuickRestock(ing.id, -(Number(ing.conversionRate) || 1))} 
                                                                className="w-10 h-10 flex items-center justify-center text-stone-600 hover:bg-red-50 hover:text-red-600 transition bg-stone-100"
                                                                title={`Subtract 1 ${ing.unit} (${Number(ing.conversionRate) || 1} ${ing.conversionUnit || ing.unit})`}
                                                            >
                                                                <i className="fa-solid fa-minus"></i>
                                                            </button>
                                                            <input 
                                                                type="number"
                                                                step="any" 
                                                                value={manualInputs[ing.id] !== undefined ? manualInputs[ing.id] : parseFloat((currentStock / (Number(ing.conversionRate) || 1)).toFixed(4))}
                                                                onChange={(e) => setManualInputs({...manualInputs, [ing.id]: e.target.value})}
                                                                onBlur={(e) => {
                                                                    if (e.target.value !== '') {
                                                                        const newTotalConverted = Number(e.target.value) * (Number(ing.conversionRate) || 1);
                                                                        handleManualRestock(ing.id, newTotalConverted, currentStock);
                                                                    }
                                                                    const updated = {...manualInputs};
                                                                    delete updated[ing.id];
                                                                    setManualInputs(updated);
                                                                }}
                                                                onKeyDown={(e) => { if (e.key === 'Enter') e.target.blur(); }}
                                                                className="w-20 h-10 text-center font-black text-lg text-stone-800 outline-none border-x border-stone-200 bg-stone-50 focus:bg-white"
                                                            />
                                                            <button 
                                                                onClick={() => handleQuickRestock(ing.id, (Number(ing.conversionRate) || 1))} 
                                                                className="w-10 h-10 flex items-center justify-center text-stone-600 hover:bg-green-50 hover:text-green-600 transition bg-stone-100"
                                                                title={`Add 1 ${ing.unit} (${Number(ing.conversionRate) || 1} ${ing.conversionUnit || ing.unit})`}
                                                            >
                                                                <i className="fa-solid fa-plus"></i>
                                                            </button>
                                                        </div>
                                                        <div className="text-[10px] text-stone-500 font-bold mb-2">
                                                            = {currentStock.toLocaleString(undefined, {maximumFractionDigits: 2})} {ing.conversionUnit || ing.unit} (Total)
                                                        </div>
                                                        <button onClick={() => { 
                                                            if (!ing.conversionRate || Number(ing.conversionRate) <= 0) {
                                                                alert(`Please edit "${ing.name}" globally and set its 'Convert Unit (Recipe Usage)' before using Smart Restock.`);
                                                                return;
                                                            }
                                                            setRestockData({ id: ing.id, name: ing.name, qty: '', cost: '' }); 
                                                            setRestockModalOpen(true); 
                                                        }} className="px-3 py-1.5 text-[10px] font-bold bg-amber-200 text-amber-800 hover:bg-amber-300 rounded shadow-sm transition uppercase tracking-wider w-full max-w-[120px]"><i className="fa-solid fa-box-open mr-1"></i> Smart Restock</button>
                                                    </div>
                                                </td>
                                                <td className="p-3 border border-stone-300 bg-stone-50/50">
                                                    <div className="flex flex-col gap-2 text-xs w-56">
                                                        <div className="flex justify-between items-center bg-white px-3 py-1.5 rounded-lg border border-stone-200 shadow-sm">
                                                            <span className="font-bold text-stone-600">S Cup ({ing.usageS || 0}{ing.conversionUnit || ing.unit}):</span>
                                                            <span className={`font-black ${yieldS > 10 || yieldS === '-' ? 'text-stone-800' : 'text-red-600'}`}>{yieldS} cups</span>
                                                        </div>
                                                        <div className="flex justify-between items-center bg-white px-3 py-1.5 rounded-lg border border-stone-200 shadow-sm">
                                                            <span className="font-bold text-stone-600">L Cup ({ing.usageL || 0}{ing.conversionUnit || ing.unit}):</span>
                                                            <span className={`font-black ${yieldL > 10 || yieldL === '-' ? 'text-stone-800' : 'text-red-600'}`}>{yieldL} cups</span>
                                                        </div>
                                                    </div>
                                                </td>
                                                {isSuper && (
                                                    <td className="p-3 border border-stone-300 text-right">
                                                        <button onClick={() => { setFormData({name: ing.name, ingredientCode: ing.ingredientCode||'', unit: ing.unit, conversionUnit: ing.conversionUnit||'', conversionRate: ing.conversionRate||'', usageS: ing.usageS||'', usageL: ing.usageL||'', costPerUnit: ing.costPerUnit||'', enableUsageS: !!ing.usageS, enableUsageL: !!ing.usageL, note: ing.note||''}); setEditingId(ing.id); setIsModalOpen(true); }} className="p-2 text-blue-500 hover:text-blue-700 transition" title="Edit Global Item"><i className="fa-solid fa-pen"></i></button>
                                                        <button onClick={() => del(ing.id)} className="p-2 text-red-500 hover:text-red-700 transition" title="Delete Global Item"><i className="fa-solid fa-trash"></i></button>
                                                    </td>
                                                )}
                                            </tr>
                                        );
                                    })}
                                    {ingredients.length === 0 && <tr><td colSpan="4" className="text-center py-6 text-stone-400 border border-stone-300">No ingredients added yet.</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    ) : (
                        <div className="bg-white rounded-2xl border shadow-sm p-4 flex-1 overflow-auto">
                            <table className="w-full min-w-[800px] text-left text-sm border-collapse border border-stone-300">
                                <thead>
                                    <tr className="text-stone-700 uppercase tracking-wider bg-stone-100">
                                        <th className="p-3 font-bold border border-stone-300">Date & Time</th>
                                        <th className="p-3 font-bold border border-stone-300">Ingredient</th>
                                        <th className="p-3 font-bold border border-stone-300">Type</th>
                                        <th className="p-3 font-bold border border-stone-300">Amount</th>
                                        <th className="p-3 font-bold border border-stone-300">Reference</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredLogs.map(log => {
                                        const ing = ingredients.find(i => i.id === log.ingredientId);
                                        
                                        // FIX: Use conversionUnit for usage amounts to exactly match the Product Modal value set
                                        const unit = ing ? (ing.conversionUnit || ing.unit) : '';
                                        const ingName = ing ? ing.name : 'Deleted Item';
                                        
                                        let typeColor = 'bg-stone-100 text-stone-700';
                                        let amtColor = 'text-stone-800';
                                        if (log.type === 'Restock') { typeColor = 'bg-green-100 text-green-700'; amtColor = 'text-green-600'; }
                                        if (log.type === 'Usage') { typeColor = 'bg-red-100 text-red-700'; amtColor = 'text-red-500'; }
                                        if (log.type === 'Adjustment') { typeColor = 'bg-amber-100 text-amber-700'; amtColor = 'text-amber-600'; }

                                        return (
                                            <tr key={log.id} className="hover:bg-stone-50 bg-white transition-colors">
                                                <td className="p-3 border border-stone-300 font-medium text-stone-600">{new Date(log.timestamp).toLocaleString()}</td>

        function ProductsView({ products, categories, ingredients, sugarOptions, iceOptions, currentAdminRecord, shops }) {

            const [formData, setFormData] = useState({ name: '', productCode: '', category: '', costSmall: '', priceSmall: '', costLarge: '', priceLarge: '', barcodeSmall: '', barcodeLarge: '', image: '', isAvailable: true, visibilityMode: 'All', availableShopIds: [], description: '', hasSugarOption: false, hasIceOption: false, recipe: [], isNewProduct: false, newProductEffectiveDate: getTodayString(), newProductDuration: 7 });
            const [editingId, setEditingId] = useState(null);

            // --- Image Crop States ---
            const [selectedImageSrc, setSelectedImageSrc] = useState(null);
            const [cropModalOpen, setCropModalOpen] = useState(false);
            const [zoom, setZoom] = useState(1);
            const [offset, setOffset] = useState({ x: 0, y: 0 });
            const [isDragging, setIsDragging] = useState(false);
            const [dragStart, setDragStart] = useState({ x: 0, y: 0 });
            
            const imageRef = useRef(null);
            const canvasRef = useRef(null);

            // Auto-generate Product Code when opening Add Modal
            useEffect(() => {
                if (isModalOpen && !editingId && !formData.productCode) {
                    // Find the highest existing SLR- sequence number
                    let maxSeq = 0;
                    products.forEach(p => {
                        if (p.productCode && p.productCode.startsWith('SLR-')) {
                            const seq = parseInt(p.productCode.split('-')[1], 10);
                            if (!isNaN(seq) && seq > maxSeq) {
                                maxSeq = seq;
                            }
                        }
                    });
                    // Fallback to array length if no structured codes exist yet
                    const nextSeq = Math.max(maxSeq, products.length) + 1;
                    const newCode = `SLR-${String(nextSeq).padStart(3, '0')}`;
                    setFormData(prev => ({ ...prev, productCode: newCode }));
                }
            }, [isModalOpen, editingId, products]);

            const handleFileChange = (e) => {
                if (e.target.files && e.target.files.length > 0) {
                    const reader = new FileReader();
                    reader.onload = (e) => {
                        setSelectedImageSrc(e.target.result);
                        setZoom(1);
                        setOffset({ x: 0, y: 0 });
                        setCropModalOpen(true);
                    };
                    reader.readAsDataURL(e.target.files[0]);
                }
            };

            const handleMouseDown = (e) => {
                setIsDragging(true);
                setDragStart({ x: e.clientX - offset.x, y: e.clientY - offset.y });
            };
            const handleTouchStart = (e) => {
                setIsDragging(true);
                setDragStart({ x: e.touches[0].clientX - offset.x, y: e.touches[0].clientY - offset.y });
            };

            const handleMouseMove = (e) => {
                if (isDragging) {
                    setOffset({ x: e.clientX - dragStart.x, y: e.clientY - dragStart.y });
                }
            };
            const handleTouchMove = (e) => {
                if (isDragging) {
                    setOffset({ x: e.touches[0].clientX - dragStart.x, y: e.touches[0].clientY - dragStart.y });
                }
            };

            const handleMouseUp = () => setIsDragging(false);

            const filteredProductsList = useMemo(() => {
                const searchLower = (searchQuery || '').toLowerCase();
                return products.filter(p => {
                    const matchName = (p.name || '').toLowerCase().includes(searchLower);
                    const matchCode = (p.productCode || '').toLowerCase().includes(searchLower);
                    return matchName || matchCode;
                });
            }, [products, searchQuery]);

            const recalcCosts = (currentFormData, newRecipe) => {
                let cS = 0;
                let cL = 0;
                newRecipe.forEach(r => {
                    const ing = ingredients.find(i => i.id === r.ingredientId);
                    if (ing && ing.costPerUnit) {
                        const rate = Number(ing.conversionRate) || 1;
                        const costPerRecipeUnit = (ing.conversionUnit && rate > 0) ? (Number(ing.costPerUnit) / rate) : Number(ing.costPerUnit);
                        
                        if (r.qtyS) cS += (Number(r.qtyS) * costPerRecipeUnit);
                        if (r.qtyL) cL += (Number(r.qtyL) * costPerRecipeUnit);
                    }
                });
                
                setFormData({
                    ...currentFormData, 
                    recipe: newRecipe,
                    costSmall: cS > 0 ? Math.round(cS) : currentFormData.costSmall,
                    costLarge: cL > 0 ? Math.round(cL) : currentFormData.costLarge
                });
            };

            const generateCroppedImage = () => {
                if (!imageRef.current || !canvasRef.current) return;
                
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                
                // Final output size increased to 250px for better quality
                const SIZE = 250; 
                canvas.width = SIZE;
                canvas.height = SIZE;

                const image = imageRef.current;
                
                // BUG FIX: Must use natural dimensions, not CSS-rendered dimensions
                const natWidth = image.naturalWidth;
                const natHeight = image.naturalHeight;
                
                if (!natWidth || !natHeight) return; // Prevent saving empty image if not loaded

                const minDim = Math.min(natWidth, natHeight);
                
                // Base scale to cover the output area based on the smallest dimension
                const baseScale = SIZE / minDim;
                const totalScale = baseScale * zoom;

                // Calculate center points
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;

                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.save();
                ctx.translate(cx, cy); // Move to center
                
                // Map screen drag pixels to canvas coordinate system
                const offsetScale = SIZE / 256;
                ctx.translate(offset.x * offsetScale, offset.y * offsetScale);
                
                ctx.scale(totalScale, totalScale);
                // Draw image centered at the origin
                ctx.drawImage(image, -natWidth / 2, -natHeight / 2);
                ctx.restore();

                const finalDataUrl = canvas.toDataURL('image/webp', 0.85);
                setFormData({ ...formData, image: finalDataUrl });
                setCropModalOpen(false);
                setSelectedImageSrc(null);
            };

                e.preventDefault();
                if (!isSuper) return;
                const { doc, updateDoc, addDoc } = window.FirebaseApp;
                
                // Process unified recipe back into Small and Large arrays
                const recipeSmall = (formData.recipe || []).map(r => ({ ingredientId: r.ingredientId, qty: Number(r.qtyS) })).filter(r => r.ingredientId && r.qty > 0);
                const recipeLarge = (formData.recipe || []).map(r => ({ ingredientId: r.ingredientId, qty: Number(r.qtyL) })).filter(r => r.ingredientId && r.qty > 0);

                const dataToSave = { 
                    name: formData.name,
                    productCode: formData.productCode,
                    category: formData.category,
                    image: formData.image,
                    isAvailable: formData.visibilityMode !== 'Hidden',
                    visibilityMode: formData.visibilityMode,
                    availableShopIds: formData.visibilityMode === 'Specific' ? formData.availableShopIds : [],

                    hasIceOption: formData.hasIceOption,
                    costSmall: Number(formData.costSmall || 0),

                    costLarge: Number(formData.costLarge || 0), 
                    priceLarge: Number(formData.priceLarge || 0),

                    recipeLarge: recipeLarge,
                    isNewProduct: !!formData.isNewProduct,
                    newProductEffectiveDate: formData.newProductEffectiveDate || '',
                    newProductDuration: Number(formData.newProductDuration || 7),
                    updatedAt: Date.now() 
                };

                if (editingId) await updateDoc(doc(getColRef('products'), editingId), dataToSave);
                else await addDoc(getColRef('products'), { ...dataToSave, createdAt: Date.now() });
                setIsModalOpen(false);
            };

            const del = async (id) => { 
                if (isSuper && confirm("Delete?")) {
                    try {
                        const { deleteDoc, doc } = window.FirebaseApp;
                        await deleteDoc(doc(db, 'products', id));
                    } catch (err) {
                        alert("Error deleting product: " + err.message);
                    }
                } 
            };

            return (
                <div className="max-w-6xl">
                    <div className="flex gap-2 mb-6 border-b border-stone-200 pb-2">
                        <button onClick={() => setActiveTab('products')} className={`px-5 py-2 font-bold transition-colors ${activeTab === 'products' ? 'text-amber-600 border-b-2 border-amber-600' : 'text-stone-500 hover:text-stone-800'}`}>Product List</button>

                    </div>

                    {activeTab === 'products' && (
                        <div className="animate-fade-in">
                            <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4">
                                <div>
                                    <h2 className="text-2xl font-bold">Products</h2>
                                    <p className="text-sm text-stone-500 mt-1">Manage your menu items and prices.</p>
                                </div>
                                <div className="flex flex-col sm:flex-row gap-2 w-full md:w-auto">

        function SalesView({ orders, shops, currentAdminRecord, admins }) {
            const isSuper = (currentAdminRecord?.role || 'Admin') === 'Admin';
            const canSelectMultiple = isSuper || (currentAdminRecord?.shopIds && currentAdminRecord.shopIds.length > 1);
            const [filter, setFilter] = useState('today'); 
            const [filterShopId, setFilterShopId] = useState(isSuper ? 'All' : (currentAdminRecord?.shopIds?.[0] || currentAdminRecord?.shopId || 'All'));
            
            // State for the Month & Year picker
            const [customMonth, setCustomMonth] = useState(() => {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            });
            
            // Smart Filter States
            const [filterStaff, setFilterStaff] = useState('All');
            const [filterPayment, setFilterPayment] = useState('All');
            const [searchQuery, setSearchQuery] = useState('');
            
            // OPTIMIZATION: On-Demand Historical Data Fetching
            const [historicalOrders, setHistoricalOrders] = useState([]);
            const [isFetchingHistory, setIsFetchingHistory] = useState(false);

            useEffect(() => {
                // If filtering for today, the live limited snapshot from MainApp is sufficient.
                if (filter === 'today') return;

                const fetchHistory = async () => {
                    setIsFetchingHistory(true);
                    const { getDocs, query, where, collection } = window.FirebaseApp;
                    const now = new Date();
                    let startTime = 0;
                    let endTime = now.getTime();

                    // Calculate timestamp ranges based on selected filter
                    if (filter === 'yesterday') {
                        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                        startTime = today.getTime() - (24 * 60 * 60 * 1000);
                        endTime = today.getTime();
                    } else if (filter === 'week' || filter === 'last_week') {
                        startTime = now.getTime() - (14 * 24 * 60 * 60 * 1000); // Fetch two weeks for buffer
                    } else if (filter === 'this_month' || filter === 'last_month') {
                        startTime = new Date(now.getFullYear(), now.getMonth() - 1, 1).getTime(); // Fetch 2 months buffer
                    } else if (filter === 'custom_month' && customMonth) {
                        const [year, month] = customMonth.split('-');
                        startTime = new Date(year, month - 1, 1).getTime();
                        endTime = new Date(year, month, 1).getTime();
                    }

                    try {
                        const q = query(
                            collection(db, 'orders'), 
                            where('createdAt', '>=', startTime),
                            where('createdAt', '<', endTime)
                        );
                        const snap = await getDocs(q);
                        setHistoricalOrders(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    } catch(err) {
                        console.error("Failed to fetch historical sales", err);
                    } finally {
                        setIsFetchingHistory(false);
                    }
                };
                
                fetchHistory();
            }, [filter, customMonth, filterShopId]);
            
            const filteredOrders = useMemo(() => {
                const now = new Date();
                // Get precise midnight to avoid rolling 24-hour overlap bugs
                const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());

                // Use the live orders array for 'today', otherwise use the fetched historical array
                const sourceData = filter === 'today' ? orders : historicalOrders;
                const searchLower = searchQuery.toLowerCase();

                return sourceData.filter(o => {
                    const matchShop = filterShopId === 'All' || o.shopId === filterShopId;
                    if (!matchShop) return false;
                    
                    const orderDate = new Date(o.createdAt);
                    let matchDate = false;

                    if (filter === 'today') {
                        matchDate = orderDate >= startOfToday;
                    } else if (filter === 'yesterday') {
                        const startOfYesterday = new Date(startOfToday);
                        startOfYesterday.setDate(startOfYesterday.getDate() - 1);
                        matchDate = orderDate >= startOfYesterday && orderDate < startOfToday;
                    } else if (filter === 'week') {
                        const weekAgo = new Date(now);
                        weekAgo.setDate(now.getDate() - 7);
                        matchDate = orderDate >= weekAgo;
                    } else if (filter === 'last_week') {
                        const twoWeeksAgo = new Date(now);
                        twoWeeksAgo.setDate(now.getDate() - 14);
                        const oneWeekAgo = new Date(now);
                        oneWeekAgo.setDate(now.getDate() - 7);
                        matchDate = orderDate >= twoWeeksAgo && orderDate < oneWeekAgo;
                    } else if (filter === 'this_month' || filter === 'month') {
                        const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
                        matchDate = orderDate >= startOfMonth;
                    } else if (filter === 'last_month') {
                        const startOfLastMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);
                        const startOfThisMonth = new Date(now.getFullYear(), now.getMonth(), 1);
                        matchDate = orderDate >= startOfLastMonth && orderDate < startOfThisMonth;
                    } else if (filter === 'custom_month') {
                        if (customMonth) {
                            const [year, month] = customMonth.split('-');
                            const startOfCustom = new Date(year, month - 1, 1);
                            const endOfCustom = new Date(year, month, 1); // 1st of the next month
                            matchDate = orderDate >= startOfCustom && orderDate < endOfCustom;
                        } else {
                            matchDate = true;
                        }
                    }
                    
                    if (!matchDate) return false;

                    // Smart Filter: Staff Match
                    const staffId = o.staffId || o.userId;
                    const isSelfOrder = !admins?.find(a => a.id === staffId);
                    const matchStaff = filterStaff === 'All' || (filterStaff === 'Self-Order' ? isSelfOrder : staffId === filterStaff);
                    if (!matchStaff) return false;

                    // Smart Filter: Payment Match
                    let matchPayment = true;
                    if (filterPayment === 'Paid') matchPayment = o.paymentStatus === 'Paid';
                    else if (filterPayment === 'Unpaid') matchPayment = o.paymentStatus !== 'Paid';
                    else if (filterPayment === 'Cash') matchPayment = o.paymentStatus === 'Paid' && o.paymentMethod === 'Cash';
                    else if (filterPayment === 'Bank') matchPayment = o.paymentStatus === 'Paid' && o.paymentMethod === 'Bank';
                    if (!matchPayment) return false;

                    // Smart Filter: Search Match (Customer, Phone, Table, Queue/Invoice)
                    if (searchLower) {
                        const cName = String(o.customerName || 'Walk-in').toLowerCase();
                        const cPhone = String(o.customerPhone || '').toLowerCase();
                        const cTable = String(o.tableName || '').toLowerCase();
                        const cQueue = String(o.queueNo || '').toLowerCase();
                        if (!cName.includes(searchLower) && !cPhone.includes(searchLower) && !cTable.includes(searchLower) && !cQueue.includes(searchLower)) {
                            return false;
                        }
                    }
                    
                    return true;
                });
            }, [orders, historicalOrders, filter, filterShopId, customMonth, filterStaff, filterPayment, searchQuery, admins]);

            const { totalRevenue, cashRevenue, bankRevenue, pendingRevenue } = useMemo(() => {
                let total = 0, cash = 0, bank = 0, pending = 0;
                for (let i = 0; i < filteredOrders.length; i++) {
                    const o = filteredOrders[i];
                    if (o.paymentStatus === 'Paid') {
                        total += o.totalAmount;
                        if (o.paymentMethod === 'Cash') cash += o.totalAmount;
                        else if (o.paymentMethod === 'Bank') bank += o.totalAmount;
                    } else if (o.status !== 'Cancelled') {
                        pending += o.totalAmount;
                    }
                }
                return { totalRevenue: total, cashRevenue: cash, bankRevenue: bank, pendingRevenue: pending };
            }, [filteredOrders]);

            const formatSalesDateTime = (timestamp) => {
                const d = new Date(timestamp);
                const day = String(d.getDate()).padStart(2, '0');
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const year = String(d.getFullYear()).slice(-2);
                let hrs = d.getHours();
                const ampm = hrs >= 12 ? 'PM' : 'AM';
                hrs = hrs % 12 || 12;
                const mins = String(d.getMinutes()).padStart(2, '0');
                const secs = String(d.getSeconds()).padStart(2, '0');
                return `${day}-${month}-${year} | ${hrs}:${mins}:${secs} ${ampm}`;
            };

            const exportCSV = () => {
                const headers = "Date_Time,Shop_Name,Staff_Name,Invoice,Table,Customer,Phone,Items,Total,Redeemed_Points,Promotions,Payment_Status,Payment_Method,Order_Status\n";
                const rows = filteredOrders.map(o => {
                    const shopName = shops.find(s => s.id === o.shopId)?.name || 'Unknown';
                    const staffName = admins?.find(a => a.id === (o.staffId || o.userId))?.name || 'Self-Order';
                    const promos = [...new Set(o.items?.map(i => i.promoName).filter(Boolean))].join('; ');
                    const itemsList = o.items?.map(i => `${i.quantity}x ${i.name}`).join(' | ') || '';
                    return `"${formatSalesDateTime(o.createdAt)}","${shopName}","${staffName}","${o.queueNo}","${o.tableName}","${o.customerName || 'Walk-in'}","${o.customerPhone || 'N/A'}","${itemsList}",${o.totalAmount},${o.redeemedPoints || 0},"${promos}","${o.paymentStatus || 'Unpaid'}","${o.paymentMethod || 'N/A'}","${o.status}"`;
                }).join("\n");
                const blob = new Blob([headers + rows], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `sales_report_${filter}.csv`;
                link.click();
            };

            const statusColors = {
                'New': 'bg-blue-100 text-blue-800',
                'Preparing': 'bg-amber-100 text-amber-800',
                'Ready': 'bg-green-100 text-green-800',
                'Served': 'bg-stone-100 text-stone-500',
                'Cancelled': 'bg-red-100 text-red-800'
            };

            const updateStatus = async (order, newStatus) => {
                const { doc, updateDoc } = window.FirebaseApp;
                const updateData = { status: newStatus, staffId: currentAdminRecord?.id };
                
                if (newStatus === 'Ready' || newStatus === 'Served' || newStatus === 'Cancelled') {
                    updateData.completedAt = Date.now();
                }
                
                if (newStatus === 'Cancelled') {
                    const reason = prompt("Cancel reason (optional):");
                    if (reason) updateData.cancelReason = reason;
                }

                await updateDoc(doc(db, 'orders', order.id), updateData);
                setHistoricalOrders(prev => prev.map(o => o.id === order.id ? { ...o, ...updateData } : o));
            };

            const updatePayment = async (order, payStatus, payMethod) => {
                const { doc, updateDoc } = window.FirebaseApp;
                const updateData = {
                    paymentStatus: payStatus,
                    paymentMethod: payMethod,
                    staffId: currentAdminRecord?.id
                };
                
                await updateDoc(doc(db, 'orders', order.id), updateData);
                setHistoricalOrders(prev => prev.map(o => o.id === order.id ? { ...o, ...updateData } : o));

            const deleteOrder = async (order) => {

        function CustomersView({ orders, shops, currentAdminRecord }) {
            const isSuper = (currentAdminRecord?.role || 'Admin') === 'Admin';
            const [activeTab, setActiveTab] = useState('directory');
            const [reportTab, setReportTab] = useState('points');
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCustomer, setSelectedCustomer] = useState(null);
            
            const [globalPoints, setGlobalPoints] = useState({ pointsEnabled: false, spendAmount: 4000, pointsEarned: 1 });
            
            // NEW: States for PIN Management
            const [realCustomers, setRealCustomers] = useState([]);
            const [pinResetData, setPinResetData] = useState(null);

            // Fetch Global Points Config
            useEffect(() => {
                const { doc, getDoc } = window.FirebaseApp;
                getDoc(doc(db, 'loyalty_settings', 'global_points')).then(snap => {
                    if (snap.exists()) setGlobalPoints(snap.data());
                }).catch(e => console.warn(e));
            }, []);

            // NEW: Fetch Secure Customer Database to sync PINs
            useEffect(() => {
                const { onSnapshot, collection } = window.FirebaseApp;
                const unsub = onSnapshot(collection(db, 'customers'), snap => {
                    setRealCustomers(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
                return () => unsub();
            }, []);

            // Aggregate raw orders into Customer Profiles
            const customersData = useMemo(() => {
                const map = new Map();
                
                // Pre-fill map with registered customers to access secure PIN data
                realCustomers.forEach(c => {
                    if (!c.phone) return;
                    map.set(c.phone, {
                        id: c.id,
                        phone: c.phone,
                        name: c.name || 'Unknown',
                        pin: c.pin || null,
                        totalSpent: 0,
                        totalRedeemed: 0,
                        orderCount: 0,
                        lastVisit: c.createdAt || 0,
                        lastShopId: null,
                        orders: [],
                        shopBreakdown: {}
                    });
                });

                orders.forEach(o => {
                    if (!o.customerPhone || o.customerPhone === 'N/A') return; // Skip walk-ins without a phone
                    
                    if (!map.has(o.customerPhone)) {
                        map.set(o.customerPhone, {
                            id: null, // Legacy order without a secure profile
                            phone: o.customerPhone,
                            name: o.customerName || 'Unknown',
                            pin: null,
                            totalSpent: 0,
                            totalRedeemed: 0,
                            orderCount: 0,
                            lastVisit: o.createdAt,
                            lastShopId: o.shopId,
                            orders: [],
                            shopBreakdown: {}
                        });
                    }
                    
                    const c = map.get(o.customerPhone);
                    c.totalSpent += o.totalAmount;
                    if (o.redeemedPoints) c.totalRedeemed += o.redeemedPoints;
                    c.orderCount += 1;
                    if (o.createdAt > c.lastVisit) {
                        c.lastVisit = o.createdAt;
                        c.lastShopId = o.shopId;
                    }
                    
                    // Keep the latest known name if the customer hasn't locked in a profile yet
                    if (!c.id && o.customerName && o.customerName !== 'Unknown' && o.createdAt >= c.lastVisit) {
                        c.name = o.customerName;
                    }
                    
                    if (!c.shopBreakdown[o.shopId]) {
                        c.shopBreakdown[o.shopId] = { count: 0, spent: 0 };
                    }
                    c.shopBreakdown[o.shopId].count += 1;
                    c.shopBreakdown[o.shopId].spent += o.totalAmount;
                    
                    c.orders.push(o);
                });
                
                // Sort by most recent visit
                return Array.from(map.values()).sort((a, b) => b.lastVisit - a.lastVisit);
            }, [orders, realCustomers]);

            const filteredCustomers = useMemo(() => {
                const searchLower = (searchQuery || '').toLowerCase(); // Optimization: Evaluate once
                const cleanSearch = searchLower.replace(/\D/g, ''); // Extract just numbers for phone matching
                
                return customersData.filter(c => {
                    const safeName = c.name || '';
                    const safePhone = c.phone || '';
                    const cleanPhone = safePhone.replace(/\D/g, '');
                    return safeName.toLowerCase().includes(searchLower) || cleanPhone.includes(cleanSearch);
                });
            }, [customersData, searchQuery]);

            // Loyalty Sub-Reports Logic
            const redemptions = useMemo(() => {
                return orders.filter(o => o.status !== 'Cancelled' && o.redeemedPoints && o.redeemedPoints > 0).sort((a,b) => b.createdAt - a.createdAt);
            }, [orders]);

            const promoUsages = useMemo(() => {
                const usages = [];
                orders.forEach(o => {
                    if (o.status === 'Cancelled') return;

                        for (let i = 0; i < customer.orders.length; i += 400) {
