        const resizeImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const SIZE = 200; 
                        canvas.width = SIZE;
                        canvas.height = SIZE;
                        const ctx = canvas.getContext('2d');
                        
                        const minDim = Math.min(img.width, img.height);
                        const startX = (img.width - minDim) / 2;
                        const startY = (img.height - minDim) / 2;
                        
                        ctx.drawImage(img, startX, startY, minDim, minDim, 0, 0, SIZE, SIZE);
                        resolve(canvas.toDataURL('image/webp', 0.4));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        };

        const getTodayString = () => {
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        // Phone Number Formatting & Validation for Cambodian Operators
        const formatPhoneNumber = (value) => {
            if (!value) return '';
            const cleaned = String(value).replace(/\D/g, '');
            const truncated = cleaned.slice(0, 10); // Max 10 digits
            if (truncated.length > 6) return `${truncated.slice(0, 3)} ${truncated.slice(3, 6)} ${truncated.slice(6)}`;
            if (truncated.length > 3) return `${truncated.slice(0, 3)} ${truncated.slice(3)}`;
            return truncated;
        };

        const validateCambodianPhone = (phone) => {
            const cleaned = String(phone).replace(/\D/g, '');
            if (cleaned.length < 9 || cleaned.length > 10) return { isValid: false, message: "Must be exactly 9 or 10 digits." };
            
            const prefix = cleaned.slice(0, 3);
            const valid9 = ['010','015','016','069','070','081','086','087','093','098', '011','012','014','017','061','077','078','079','085','089','092','095','099', '060','066','067','068','090'];
            const valid10 = ['096', '012','076','092', '031','071','088','097'];
            
            if (cleaned.length === 9 && !valid9.includes(prefix)) return { isValid: false, message: `Invalid 9-digit prefix: ${prefix}` };
            if (cleaned.length === 10 && !valid10.includes(prefix)) return { isValid: false, message: `Invalid 10-digit prefix: ${prefix}` };
            
            return { isValid: true };
        };

        // Ray-Casting Algorithm for Polygon Geofencing (Territory Map)
        const isPointInPolygon = (point, vs) => {
            let x = point.lng, y = point.lat;
            let inside = false;
            for (let i = 0, j = vs.length - 1; i < vs.length; j = i++) {
                let xi = Number(vs[i].lng), yi = Number(vs[i].lat);
                let xj = Number(vs[j].lng), yj = Number(vs[j].lat);
                let intersect = ((yi > y) != (yj > y)) && (x < (xj - xi) * (y - yi) / (yj - yi) + xi);
                if (intersect) inside = !inside;
            }
            return inside;
        };

        // Standard Haversine formula to calculate accurate distances between coordinates
        const calculateDistance = (lat1, lon1, lat2, lon2) => {
            const R = 6371e3; // Earth radius in meters
            const p1 = lat1 * Math.PI/180;
            const p2 = lat2 * Math.PI/180;
            const dp = (lat2-lat1) * Math.PI/180;
            const dl = (lon2-lon1) * Math.PI/180;
            const a = Math.sin(dp/2) * Math.sin(dp/2) + Math.cos(p1) * Math.cos(p2) * Math.sin(dl/2) * Math.sin(dl/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; // Distance in meters
        };

        const deductInventory = async (cart, products, orderShopId, orderQueueNo) => {
            const { doc, increment, collection, writeBatch } = window.FirebaseApp;
            const stockUpdates = {}; 

            cart.forEach(item => {
                const product = products.find(p => p.id === item.productId);
                if (product) {
                    const recipe = item.size === 'S' ? product.recipeSmall : product.recipeLarge;
                    if (recipe && Array.isArray(recipe)) {
                        recipe.forEach(ing => {
                            if (ing.ingredientId && ing.qty) {
                                if (!stockUpdates[ing.ingredientId]) stockUpdates[ing.ingredientId] = 0;
                                stockUpdates[ing.ingredientId] += (ing.qty * item.quantity);
                            }
                        });
                    }
                }
            });

            if (!orderShopId || orderShopId === 'UNKNOWN' || orderShopId === 'TAKEAWAY') return;

            // OPTIMIZATION: Write-Heavy Loop Fix using Firestore Batch
            // Groups all inventory deductions and a single aggregate log into ONE atomic network request.
            const batch = writeBatch(db);
            const logEntries = [];

            for (const [ingredientId, amount] of Object.entries(stockUpdates)) {
                batch.update(doc(db, 'ingredients', ingredientId), {
                    [`stockByShop.${orderShopId}`]: increment(-amount)
                });
                
                logEntries.push({ ingredientId, amount: -amount });
            }
            
            // Add a single aggregated log for the entire order instead of N individual logs
            if (logEntries.length > 0) {
                const logRef = doc(collection(db, 'inventory_logs'));
                batch.set(logRef, {
                    shopId: orderShopId,
                    type: 'Usage',
                    reference: `Order ${orderQueueNo || 'Unknown'}`,
                    timestamp: Date.now(),
                    entries: logEntries
                });
            }
            
            await batch.commit().catch(err => console.warn("Batch inventory deduction failed", err));
        };

        const releaseTableIfNotUsed = async (tableId, currentOrderId, allOrders) => {
            if (!tableId || tableId === 'Walk-in' || tableId === 'TAKEAWAY') return;
            const otherActive = allOrders.find(o => o.tableId === tableId && o.id !== currentOrderId && ['New', 'Preparing', 'Ready'].includes(o.status));
            if (!otherActive) {
                try {
                    const { doc, updateDoc } = window.FirebaseApp;
                    await updateDoc(doc(db, 'tables', tableId), { status: 'Available' });
                } catch (e) {}
            }
        };

        // --- Root & Data Fetching ---
        function RootApp() {
            const [isReady, setIsReady] = useState(!!window.FirebaseApp);
            
            useEffect(() => {
                const handleReady = () => setIsReady(true);
                if (!isReady) window.addEventListener('firebase-loaded', handleReady);
                return () => window.removeEventListener('firebase-loaded', handleReady);
            }, [isReady]);

            if (!isReady) return <div className="flex h-screen items-center justify-center text-stone-500 font-medium"><i className="fa-solid fa-spinner fa-spin mr-2"></i> Connecting...</div>;

            initializeFirebase();
            return <MainApp />;
        }

        // --- PWA Add To Home Screen Prompt ---
        function AddToHomeScreenPrompt() {
            const [showPrompt, setShowPrompt] = useState(false);
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [isIOS, setIsIOS] = useState(false);

            useEffect(() => {
                // 1. Check if already installed / running as standalone
                const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone || document.referrer.includes('android-app://');
                
                // 2. Check if user previously dismissed the prompt
                const isDismissed = localStorage.getItem('solaris_a2hs_dismissed');

                if (isStandalone || isDismissed) return;

                // 3. Detect iOS Safari
                const ua = window.navigator.userAgent;
                const isIPad = !!ua.match(/iPad/i);
                const isIPhone = !!ua.match(/iPhone/i);
                const isIOSDevice = isIPad || isIPhone;
                setIsIOS(isIOSDevice);

                // Show instruction prompt for iOS after a slight delay
                if (isIOSDevice) {
                    const timer = setTimeout(() => setShowPrompt(true), 2500);
                    return () => clearTimeout(timer);
                }

                // 4. Catch Android/Chrome native install prompt
                const handleBeforeInstallPrompt = (e) => {
                    e.preventDefault(); // Prevent standard mini-infobar
                    setDeferredPrompt(e);
                    setShowPrompt(true);
                };

                window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
            }, []);

            const dismissPrompt = () => {
                setShowPrompt(false);
                localStorage.setItem('solaris_a2hs_dismissed', 'true');
            };

            const handleInstallClick = async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') {
                        console.log('User accepted the A2HS prompt');
                    }
                    setDeferredPrompt(null);
                    setShowPrompt(false);
                }
            };

            if (!showPrompt) return null;

            return (
                <div className="fixed bottom-0 left-0 right-0 z-50 p-4 animate-slide-in-bottom pointer-events-none">
                    <div className="max-w-md mx-auto bg-stone-900/95 backdrop-blur-md rounded-3xl p-5 shadow-2xl border border-stone-700 pointer-events-auto flex flex-col gap-4 text-white relative safe-bottom">
                        <button onClick={dismissPrompt} className="absolute top-3 right-4 text-stone-400 hover:text-white transition"><i className="fa-solid fa-xmark text-lg"></i></button>
                        
                        <div className="flex items-start gap-4">
                            <div className="w-14 h-14 rounded-2xl flex items-center justify-center shrink-0 shadow-lg border border-stone-600 overflow-hidden bg-white">
                                <img src="https://i.imgur.com/f10UvD6.jpeg" alt="Solaris Cafe" className="w-full h-full object-cover" decoding="async" />
                            </div>
                            <div className="pr-4">
                                <h4 className="font-bold text-lg leading-tight">Install Solaris Cafe</h4>
                                <p className="text-stone-300 text-xs mt-1 leading-relaxed">Add our app to your home screen for a faster, full-screen ordering experience.</p>
                            </div>
                        </div>

                        {isIOS ? (
                            <div className="bg-white/10 rounded-xl p-3 text-sm text-stone-200 flex items-center justify-center gap-3">
                                <span>Tap</span>
                                <span className="bg-white text-blue-500 w-7 h-7 rounded flex items-center justify-center shadow"><i className="fa-solid fa-arrow-up-from-bracket text-xs"></i></span>
                                <span>then <strong>Add to Home Screen</strong></span>
                            </div>
                        ) : (
                            <button onClick={handleInstallClick} className="w-full bg-amber-500 text-stone-900 font-bold py-3.5 rounded-xl hover:bg-amber-400 transition shadow-md">
                                Install App
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        function MainApp() {
            const [view, setView] = useState('customer'); // customer, admin_login, admin_dashboard
            const [user, setUser] = useState(null);
            const [authError, setAuthError] = useState(false);
            
            // REDUNDANCY FIX: Cache Hydration (Instant Paint)
            // Load products and categories from local storage instantly while Firebase syncs in the background.
            // This prevents the 20+ base64 images from blocking the initial page render!
            const [products, setProducts] = useState(() => {
                try { return JSON.parse(localStorage.getItem('solaris_products')) || []; } catch(e) { return []; }
            });
            const [categories, setCategories] = useState(() => {
                try { return JSON.parse(localStorage.getItem('solaris_categories')) || []; } catch(e) { return []; }
            });
            
            const [sugarOptions, setSugarOptions] = useState([]);
            const [iceOptions, setIceOptions] = useState([]);
            const [tables, setTables] = useState([]);
            const [orders, setOrders] = useState([]);
            const [ingredients, setIngredients] = useState([]);
            const [shops, setShops] = useState([]);
            const [shifts, setShifts] = useState([]);
            
            // Start loading ONLY if we don't have cached data yet
            const [loadingProducts, setLoadingProducts] = useState(() => !localStorage.getItem('solaris_products'));
            const [loadingCategories, setLoadingCategories] = useState(() => !localStorage.getItem('solaris_categories'));
            const [loadingShops, setLoadingShops] = useState(true);
            const [loadingTables, setLoadingTables] = useState(true);
            
            const isMenuLoading = loadingProducts || loadingCategories;
            const isSetupLoading = loadingShops || loadingTables;

            useEffect(() => {
                const hideAddressBar = () => {
                    setTimeout(() => window.scrollTo(0, 1), 100);
                };
                window.addEventListener('load', hideAddressBar);
                window.addEventListener('orientationchange', hideAddressBar);
                hideAddressBar(); 
                
                return () => {
                    window.removeEventListener('load', hideAddressBar);
                    window.removeEventListener('orientationchange', hideAddressBar);
                };
            }, []);

            useEffect(() => {
                const { signInAnonymously, onAuthStateChanged } = window.FirebaseApp;
                const initAuth = async () => { 
                    try { 
                        if (!auth.currentUser) await signInAnonymously(auth); 
                    } catch (err) {
                        console.error("Firebase Auth Error", err);
                        // Catch iOS Chrome MDM blocks or strict network failures
                        setAuthError(true);
                    } 
                };
                initAuth();
                const unsub = onAuthStateChanged(auth, setUser);
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const { onSnapshot } = window.FirebaseApp;

                // PRIORITY 1: Customer Catalog (Fast Paint)
                // We turn off the loading skeleton the exact millisecond the products arrive.
                // This guarantees the customer is instantly allowed to browse the menu.
                const unsubP = onSnapshot(getColRef('products'), snap => {
                    const freshProducts = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.updatedAt-a.updatedAt);
                    setProducts(freshProducts);
                    localStorage.setItem('solaris_products', JSON.stringify(freshProducts)); // Cache for instant load next time
                    setLoadingProducts(false); 
                });
                
                const unsubC = onSnapshot(getColRef('categories'), snap => {
                    const freshCats = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>a.order-b.order);
                    setCategories(freshCats);
                    localStorage.setItem('solaris_categories', JSON.stringify(freshCats));
                    setLoadingCategories(false);
                });
                const unsubS = onSnapshot(getColRef('sugar_options'), snap => setSugarOptions(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>a.order-b.order)));
                const unsubI = onSnapshot(getColRef('ice_options'), snap => setIceOptions(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>a.order-b.order)));
                
                const unsubT = onSnapshot(getColRef('tables'), snap => {
                    setTables(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLoadingTables(false);
                });
                
                // REDUNDANCY FIX: Do not load heavy staff/kitchen data for customers. 
                // Only load if the user is actively viewing the admin dashboard.
                let unsubInv, unsubShifts;
                if (view === 'admin_dashboard') {
                    unsubInv = onSnapshot(getColRef('ingredients'), snap => setIngredients(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                    unsubShifts = onSnapshot(getColRef('shifts'), snap => setShifts(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                }
                
                const unsubShops = onSnapshot(getColRef('shops'), snap => {
                    setShops(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLoadingShops(false);
                });
                
                // PRIORITY 2: Heavy Order History (Background Sync)
                // This loads silently in the background. The user is never blocked waiting for this.
                let unsubO;
                if (view === 'customer') {
                    // CRITICAL REDUNDANCY FIX: Stop downloading the entire restaurant's daily orders!
                    // Only download active orders tied to THIS specific device's session.
                    // This prevents downloading hundreds of other people's orders in the background.
                    const { query, where } = window.FirebaseApp;
                    const q = query(getColRef('orders'), where('userId', '==', user.uid));
                    unsubO = onSnapshot(q, snap => {
                        setOrders(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.createdAt-a.createdAt));
                    });
                } else {
                    // OPTIMIZATION: The "Read-Heavy" Sinkhole Fix
                    // Instead of downloading the ENTIRE lifetime history of the cafe on every refresh,
                    // we strictly limit the live listener to the 200 most recent orders.
                    const { query, orderBy, limit } = window.FirebaseApp;
                    const q = query(getColRef('orders'), orderBy('createdAt', 'desc'), limit(200));
                    unsubO = onSnapshot(q, snap => {
                        setOrders(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.createdAt-a.createdAt));
                    });
                }

        function TerritoryMapEditor({ initialTerritory, initialLat, initialLng, onChange }) {
            const mapRef = useRef(null);
            const mapInstance = useRef(null);
            const polygonInstance = useRef(null);
            const markers = useRef([]);
            const [points, setPoints] = useState(() => {
                if (initialTerritory && initialTerritory.trim() !== '') {
                    try {
                        const parsed = JSON.parse(initialTerritory);
                        return Array.isArray(parsed) ? parsed : [];
                    } catch (err) {
                        return [];
                    }
                }
                return [];
            });

            useEffect(() => {
                if (!mapInstance.current && mapRef.current) {
                    let center = [11.5564, 104.9282]; // Default to Phnom Penh
                    if (initialLat && initialLng) {
                        center = [Number(initialLat), Number(initialLng)];
                    }
                    if (points.length > 0) {
                        center = [points[0].lat, points[0].lng];
                    }

                    // Initialize Map
                    mapInstance.current = window.L.map(mapRef.current).setView(center, 14);
                    window.L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
                        attribution: '© OpenStreetMap'
                    }).addTo(mapInstance.current);

                    // Add a center marker for the shop itself if lat/lng are provided
                    if (initialLat && initialLng) {
                        window.L.marker([Number(initialLat), Number(initialLng)]).addTo(mapInstance.current)
                            .bindPopup('Shop Branch Location').openPopup();
                    }

                    // Map Click Event to Add Boundary Points
                    mapInstance.current.on('click', (e) => {
                        const newPoint = { lat: e.latlng.lat, lng: e.latlng.lng };
                        setPoints(prev => {
                            const updated = [...prev, newPoint];
                            onChange(JSON.stringify(updated));
                            return updated;
                        });
                    });
                }
                
                return () => {
                    if (mapInstance.current) {
                        mapInstance.current.remove();
                        mapInstance.current = null;
                    }
                };
            }, []); // Initialize once

            // Re-draw polygon whenever points change
            useEffect(() => {
                if (!mapInstance.current) return;
                
                if (polygonInstance.current) mapInstance.current.removeLayer(polygonInstance.current);
                markers.current.forEach(m => mapInstance.current.removeLayer(m));
                markers.current = [];

                if (points.length > 0) {
                    const latlngs = points.map(p => [p.lat, p.lng]);
                    // Draw shape
                    polygonInstance.current = window.L.polygon(latlngs, {color: '#d97706', fillColor: '#f59e0b', fillOpacity: 0.3}).addTo(mapInstance.current);
                    
                    // Draw vertex nodes
                    points.forEach((p, idx) => {
                        const marker = window.L.circleMarker([p.lat, p.lng], {radius: 4, color: '#b45309', fillColor: 'white', fillOpacity: 1}).addTo(mapInstance.current);
                        markers.current.push(marker);
                    });
                }
            }, [points]);

            const handleClear = () => { setPoints([]); onChange(''); };
            const handleUndo = () => { 
                setPoints(prev => {
                    const updated = prev.slice(0, -1);
                    onChange(updated.length ? JSON.stringify(updated) : '');
                    return updated;
                });
            };

            return (
                <div className="mt-4 border-t border-stone-200 pt-4">
                    <div className="flex justify-between items-center mb-2">
                        <label className="block text-sm font-semibold text-stone-700">Territory Boundary (Visual Map)</label>
                        <div className="flex gap-2">
                            <button type="button" onClick={handleUndo} disabled={points.length === 0} className="text-xs bg-stone-200 px-3 py-1.5 rounded-lg text-stone-700 hover:bg-stone-300 disabled:opacity-50 font-bold transition"><i className="fa-solid fa-rotate-left mr-1"></i>Undo</button>
                            <button type="button" onClick={handleClear} disabled={points.length === 0} className="text-xs bg-red-100 px-3 py-1.5 rounded-lg text-red-700 hover:bg-red-200 disabled:opacity-50 font-bold transition"><i className="fa-solid fa-trash mr-1"></i>Clear</button>
                        </div>
                    </div>
                    <div style={{isolate: 'isolate'}} className="w-full h-[300px] rounded-xl border-2 border-stone-300 overflow-hidden relative z-0 shadow-inner">
                        <div ref={mapRef} className="absolute inset-0"></div>
                    </div>
                    <p className="text-xs text-stone-500 mt-2 font-medium leading-tight"><i className="fa-solid fa-hand-pointer mr-1 text-amber-500"></i>Click directly on the map to drop pins and outline the delivery zone. The shape auto-closes.</p>
                </div>
            );
        }

        function LiveOrderTimer({ createdAt, completedAt, status }) {
            const [elapsed, setElapsed] = useState(0);

            useEffect(() => {
                const calc = () => {
                    const end = (status === 'Ready' || status === 'Served' || status === 'Cancelled') && completedAt ? completedAt : Date.now();
                    setElapsed(Math.max(0, Math.floor((end - createdAt) / 1000)));
                };
                calc();

                if (status === 'Ready' || status === 'Served' || status === 'Cancelled') return;

                const timer = setInterval(calc, 1000);
                return () => clearInterval(timer);
            }, [createdAt, completedAt, status]);

            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            const timeStr = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            
            let colorClass = "bg-stone-100 text-stone-600 border-stone-200";
            if (status === 'Served' || status === 'Ready') colorClass = "bg-green-50 text-green-700 border-green-200";
            else if (status === 'Cancelled') colorClass = "bg-red-50 text-red-700 border-red-200";
            else if (elapsed > 1800) colorClass = "bg-red-100 text-red-800 border-red-300 animate-pulse"; 
            else if (elapsed > 900) colorClass = "bg-amber-100 text-amber-800 border-amber-300"; 

            return (
                <div className={`flex items-center gap-1.5 text-[10px] font-bold px-2 py-0.5 rounded border ${colorClass}`}>
                    <i className={`fa-solid ${status === 'Served' || status === 'Ready' ? 'fa-check-double' : status === 'Cancelled' ? 'fa-ban' : 'fa-clock'}`}></i>
                    {timeStr}
                </div>
            );
        }

        function OrderProgressBar({ status }) {
            if (status === 'Cancelled') {
                return <div className="text-red-500 font-bold mt-4 p-3 bg-red-50 rounded-lg border border-red-200 text-center"><i className="fa-solid fa-ban mr-2"></i>Order Cancelled</div>;
            }

            const steps = [
                { id: 'New', label: 'Received', icon: 'fa-receipt' },
                { id: 'Preparing', label: 'Preparing', icon: 'fa-fire-burner' },
                { id: 'Ready', label: 'Ready', icon: 'fa-bell' },
                { id: 'Served', label: 'Completed', icon: 'fa-check-double' }
            ];

            const currentIdx = steps.findIndex(s => s.id === status);
            const activeIdx = currentIdx === -1 ? 0 : currentIdx;

            return (
                <div className="mt-5 relative">
                    <div className="absolute top-4 left-4 right-4 h-1 bg-stone-200 rounded-full"></div>
                    <div className="absolute top-4 left-4 h-1 bg-amber-500 rounded-full transition-all duration-500" style={{ width: `${(activeIdx / (steps.length - 1)) * 100}%` }}></div>

                    <div className="flex justify-between relative z-10">
                        {steps.map((step, idx) => {
                            const isCompleted = idx <= activeIdx;
                            const isCurrent = idx === activeIdx;
                            return (
                                <div key={step.id} className="flex flex-col items-center">
                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center border-2 transition-colors duration-300 ${isCompleted ? 'bg-amber-500 border-amber-500 text-white shadow-md' : 'bg-white border-stone-300 text-stone-400'}`}>

                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function SetupModal({ sessionInfo, onSubmit, onClose, bypassPin = false }) {

            const [name, setName] = useState(sessionInfo.customerName || '');
            const [sex, setSex] = useState(sessionInfo.customerSex || 'M');
            
            const [isExisting, setIsExisting] = useState(false);
            const [pastCustomerName, setPastCustomerName] = useState('');
            const [isCheckingPhone, setIsCheckingPhone] = useState(false);

            // --- NEW PIN SECURITY STATES ---
            const [pin, setPin] = useState('');
            const [dbPin, setDbPin] = useState(null);
            const [customerId, setCustomerId] = useState(null);
            const [pinError, setPinError] = useState('');

            useEffect(() => {
                const checkPhone = async () => {
                    const cleanedPhone = String(phone).replace(/\D/g, '');
                    if (!cleanedPhone || cleanedPhone.length < 8) {
                        setIsExisting(false);
                        setPastCustomerName('');
                        setName('');
                        setDbPin(null);
                        setCustomerId(null);
                        setPin('');
                        setPinError('');
                        return;
                    }
                    
                    setIsCheckingPhone(true);
                    setPinError('');
                    try {
                        const { query, where, getDocs, limit, collection } = window.FirebaseApp;
                        
                        // 1. Live Search via dedicated Customers Database
                        const qCust = query(collection(db, 'customers'), where('phone', '==', phone), limit(1));
                        const snapCust = await getDocs(qCust);
                        
                        if (!snapCust.empty) {
                            const data = snapCust.docs[0].data();
                            setIsExisting(true);
                            setPastCustomerName(data.name);
                            setDbPin(data.pin || null);
                            setCustomerId(snapCust.docs[0].id);
                            if (!name) setName(data.name);
                        } else {
                            // 2. Fallback check from existing raw Orders
                            const qOrd = query(collection(db, 'orders'), where('customerPhone', '==', phone), limit(1));
                            const snapOrd = await getDocs(qOrd);
                            if (!snapOrd.empty) {
                                const data = snapOrd.docs[0].data();
                                if (data.customerName) {
                                    setIsExisting(true);
                                    setPastCustomerName(data.customerName);
                                    setDbPin(null);
                                    setCustomerId(null);
                                    if (!name) setName(data.customerName);
                                }
                            } else {
                                setIsExisting(false);
                                setPastCustomerName('');
                                setDbPin(null);
                                setCustomerId(null);
                            }
                        }
                    } catch (err) {
                        console.warn("Phone check failed:", err);
                    } finally {
                        setIsCheckingPhone(false);
                    }
                };

                const timeoutId = setTimeout(checkPhone, 500);
                return () => clearTimeout(timeoutId);
            }, [phone]);

                e.preventDefault();
                setPinError('');

                if (!phone) return alert("Please enter your phone number.");
                
                const phoneValidation = validateCambodianPhone(phone);
                if (!phoneValidation.isValid) return alert(`Invalid Phone: ${phoneValidation.message}\nPlease enter a valid Cambodian mobile number.`);

                // PIN Validation (Skipped if bypassPin is true)
                const cleanPin = pin.replace(/\D/g, '');
                
                if (!bypassPin) {
                    if (isExisting && dbPin && cleanPin !== dbPin) {
                        setPinError("Incorrect PIN. Please try again.");
                        return;
                    }
                    if (String(phone).replace(/\D/g, '').length >= 9 && !isExisting && cleanPin.length !== 4) {
                         setPinError("PIN must be exactly 4 digits.");
                         return;
                    }
                }

                if (!isExisting && !name) return alert("Please enter your name.");

                const finalName = isExisting && pastCustomerName ? pastCustomerName : name;

                // SAVE / UPDATE CUSTOMER SECURITY RECORD
                try {
                    const { addDoc, doc, updateDoc, collection } = window.FirebaseApp;
                    
                    if (!isExisting || (isExisting && !customerId)) {
                        // Create brand new customer document with PIN
                        await addDoc(collection(db, 'customers'), {
                            phone: phone,
                            name: finalName,
                            sex: sex,
                            pin: bypassPin ? null : cleanPin, // Don't save a pin if bypassing
                            createdAt: Date.now(),
                            lastVisit: Date.now()
                        });
                    } else if (isExisting && !dbPin && customerId && !bypassPin) {
                        // Legacy Migration: Update old customer doc with the newly created PIN
                        await updateDoc(doc(db, 'customers', customerId), {
                            pin: cleanPin
                        });
                    }
                } catch (err) {
                    console.warn("Failed to save customer record:", err);
                }

                onSubmit(e, { phone, name: finalName, sex });
            };

            return (
                <div className="fixed top-0 left-0 w-full h-[100dvh] bg-stone-900/80 backdrop-blur-sm z-[100] flex flex-col items-center justify-center p-4 sm:p-6 overflow-y-auto">

                        <div className="text-center mb-6">
                            <div className="w-16 h-16 bg-amber-100 text-amber-600 rounded-full flex items-center justify-center mx-auto mb-3 shadow-inner">
                                <i className="fa-solid fa-user-astronaut text-2xl"></i>
                            </div>
                            <h2 className="text-2xl font-black text-stone-900 mb-1">Login / Register</h2>
                            <p className="text-stone-500 text-sm font-medium">Identify yourself to start ordering.</p>
                        </div>
                        
                        <div className="space-y-4 mb-8">
                            <div>
                                <label className="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-2 ml-1">Phone Number</label>
                                <div className="relative">
                                    <i className="fa-solid fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-stone-400"></i>
                                    <input type="tel" required placeholder="012 345 678" className="w-full border border-stone-300 rounded-xl pl-11 pr-4 py-3 outline-none focus:border-amber-600 bg-stone-50 focus:bg-white text-[16px] font-bold transition-colors shadow-sm" value={phone} onChange={e => setPhone(formatPhoneNumber(e.target.value))} autoFocus />
                                </div>
                                {isCheckingPhone && <p className="text-xs text-stone-400 mt-1.5 animate-pulse ml-1"><i className="fa-solid fa-spinner fa-spin mr-1"></i> Searching database...</p>}
                            </div>
                            
                            {String(phone).replace(/\D/g, '').length >= 9 && isExisting && (
                                <div className="animate-fade-in space-y-4">
                                    <div className="text-sm font-bold text-green-700 bg-green-50 p-4 rounded-xl border border-green-200 flex items-center shadow-sm">
                                        <i className="fa-solid fa-face-smile mr-2 text-green-500 text-lg"></i> Welcome back, {pastCustomerName}!
                                    </div>
                                    
                                    {!bypassPin && (
                                        <div>
                                            <label className="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-2 ml-1">
                                                {dbPin ? 'Enter Your 4-Digit PIN' : 'Create a 4-Digit PIN (New Security Update)'}
