            const initialShop = isSuper ? '' : (currentAdminRecord?.shopIds?.[0] || currentAdminRecord?.shopId);
            const [filterShop, setFilterShop] = useState(initialShop);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({ name: '', unit: '', conversionUnit: '', conversionRate: '', usageS: '', usageL: '', costPerUnit: '', enableUsageS: false, enableUsageL: false, note: '' });
            const [editingId, setEditingId] = useState(null);

            // Smart Restock State
            const [restockModalOpen, setRestockModalOpen] = useState(false);
            const [restockData, setRestockData] = useState({ id: null, name: '', qty: '', cost: '' });

            // History State
            const [historyTab, setHistoryTab] = useState('stock');
            const [logs, setLogs] = useState([]);
            const [logFilter, setLogFilter] = useState('today');
            const [manualInputs, setManualInputs] = useState({});

            useEffect(() => {
                if (shops.length > 0 && !filterShop && isSuper) setFilterShop(shops[0].id);
            }, [shops, filterShop, isSuper]);

            // Fetch History Logs
            useEffect(() => {
                if (historyTab !== 'logs') return;
                const { onSnapshot, collection, query, orderBy, limit } = window.FirebaseApp;
                // Added a limit to the logs query to prevent massive reads
                const q = query(collection(db, 'inventory_logs'), orderBy('timestamp', 'desc'), limit(150));
                
                const unsub = onSnapshot(q, snap => {
                    const parsedLogs = [];
                    snap.docs.forEach(d => {
                        const data = d.data();
                        // Parse aggregated batch logs
                        if (data.entries && Array.isArray(data.entries)) {
                            data.entries.forEach((entry, idx) => {
                                parsedLogs.push({ id: `${d.id}-${idx}`, ...data, ingredientId: entry.ingredientId, amount: entry.amount });
                            });
                        } else {
                            // Support legacy single logs
                            parsedLogs.push({ id: d.id, ...data });
                        }
                    });
                    setLogs(parsedLogs);
                });
                return () => unsub();
            }, [historyTab]);

            const filteredLogs = useMemo(() => {
                let result = logs;
                if (filterShop && filterShop !== 'All') {
                    result = result.filter(l => l.shopId === filterShop);
                }
                
                const now = new Date();
                const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate()).getTime();
                
                if (logFilter === 'today') {
                    result = result.filter(l => l.timestamp >= startOfToday);
                } else if (logFilter === 'yesterday') {
                    const startOfYesterday = startOfToday - (24 * 60 * 60 * 1000);
                    result = result.filter(l => l.timestamp >= startOfYesterday && l.timestamp < startOfToday);
                } else if (logFilter === 'week') {
                    const weekAgo = startOfToday - (7 * 24 * 60 * 60 * 1000);
                    result = result.filter(l => l.timestamp >= weekAgo);
                } else if (logFilter === 'month') {
                    const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
                    result = result.filter(l => l.timestamp >= startOfMonth);
                }
                
                return result.sort((a, b) => b.timestamp - a.timestamp);
            }, [logs, filterShop, logFilter]);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!isSuper) return;
                const { doc, updateDoc, addDoc } = window.FirebaseApp;
                const data = { 
                    name: formData.name, 
                    unit: formData.unit,
                    conversionUnit: formData.conversionUnit || '',
                    conversionRate: Number(formData.conversionRate || 1),
                    usageS: formData.enableUsageS ? Number(formData.usageS || 0) : 0,
                    usageL: formData.enableUsageL ? Number(formData.usageL || 0) : 0,
                    costPerUnit: Number(formData.costPerUnit || 0),
                    note: formData.note || ''
                };
                if (editingId) await updateDoc(doc(getColRef('ingredients'), editingId), data);
                else await addDoc(getColRef('ingredients'), { ...data, stockByShop: {} });
                setIsModalOpen(false);
            };

            const del = async (id) => {
                if (isSuper && confirm("Delete this ingredient globally from all branches?")) {
                    const { deleteDoc, doc } = window.FirebaseApp;
                    await deleteDoc(doc(db, 'ingredients', id));
                }
            };

            const adjustStock = async (id, amount) => {
                if (!filterShop || filterShop === 'All') return alert("Please select a specific shop branch first.");
                const { doc, updateDoc, increment, addDoc, collection } = window.FirebaseApp;
                await updateDoc(doc(getColRef('ingredients'), id), {
                    [`stockByShop.${filterShop}`]: increment(amount)
                });
                
                await addDoc(collection(db, 'inventory_logs'), {
                    ingredientId: id,
                    shopId: filterShop,
                    amount: amount,
                    type: 'Adjustment',
                    reference: 'Manual Adjustment',
                    timestamp: Date.now()
                });
            };

            const handleQuickRestock = (id, delta) => {
                adjustStock(id, delta);
            };

            const handleManualRestock = (id, newTotal, currentTotal) => {
                const diff = Number(newTotal) - Number(currentTotal);
                if (diff !== 0 && !isNaN(diff)) {
                    adjustStock(id, diff);
                }
            };

            const handleRestockSubmit = async (e) => {
                e.preventDefault();
                if (!filterShop || filterShop === 'All') return alert("Please select a specific shop branch first.");
                const { doc, updateDoc, increment, addDoc, collection } = window.FirebaseApp;
                
                const ing = ingredients.find(i => i.id === restockData.id);
                const rate = ing ? (Number(ing.conversionRate) || 1) : 1;

                const baseUnitsPurchased = Number(restockData.qty);
                const totalCost = Number(restockData.cost);
                
                // CRITICAL FIX: Multiply Base Units by Conversion Rate to add correct actual stock
                const stockToAdd = baseUnitsPurchased * rate;
                const costPerUnit = baseUnitsPurchased > 0 ? (totalCost / baseUnitsPurchased) : 0;

                await updateDoc(doc(getColRef('ingredients'), restockData.id), {
                    [`stockByShop.${filterShop}`]: increment(stockToAdd),
                    costPerUnit: costPerUnit
                });
                
                await addDoc(collection(db, 'inventory_logs'), {
                    ingredientId: restockData.id,
                    shopId: filterShop,
                    amount: stockToAdd, // Log actual units added
                    cost: totalCost,
                    type: 'Restock',
                    reference: 'Smart Restock',
                    timestamp: Date.now()
                });

                setRestockModalOpen(false);
            };

            return (
                <div className="max-w-6xl h-full flex flex-col">
                    <div className="flex gap-2 mb-6 border-b border-stone-200 pb-2 shrink-0">

                        <button onClick={() => setHistoryTab('logs')} className={`px-5 py-2 font-bold transition-colors ${historyTab === 'logs' ? 'text-amber-600 border-b-2 border-amber-600' : 'text-stone-500 hover:text-stone-800'}`}>Usage History</button>
                    </div>

                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 gap-4 shrink-0">
                        <div>
                            <h2 className="text-2xl font-bold">{historyTab === 'stock' ? 'Inventory Management' : 'Stock Usage History'}</h2>
                            <p className="text-sm text-stone-500 mt-1">{historyTab === 'stock' ? 'Track branch-specific ingredient stock.' : 'Review restocks and order deductions over time.'}</p>

                        <div className="flex gap-2 w-full sm:w-auto">
                            {historyTab === 'logs' && (
                                <select className="border border-stone-300 rounded-xl px-4 py-2 outline-none focus:border-amber-600 bg-white font-medium text-stone-600" value={logFilter} onChange={e=>setLogFilter(e.target.value)}>
                                    <option value="today">Today</option>
                                    <option value="yesterday">Yesterday</option>
                                    <option value="week">Last 7 Days</option>
                                    <option value="month">This Month</option>
                                    <option value="all">All Time</option>
                                </select>
                            )}
                            
                            {canSelectMultiple ? (
                                <select className="border border-stone-300 rounded-xl px-4 py-2 outline-none focus:border-amber-600 bg-white font-bold text-stone-700 flex-1 sm:flex-none" value={filterShop} onChange={e=>setFilterShop(e.target.value)}>
                                    <option value="" disabled>Select Branch...</option>
                                    {shops.filter(s => isSuper || currentAdminRecord?.shopIds?.includes(s.id)).map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                </select>
                            ) : (
                                <div className="bg-amber-100 text-amber-900 px-4 py-2 rounded-xl font-bold border border-amber-300 shadow-sm flex items-center">
                                    <i className="fa-solid fa-location-dot mr-2"></i>
                                    {shops.find(s => s.id === filterShop)?.name || 'Branch'}
                                </div>
                            )}
                            {isSuper && historyTab === 'stock' && (
                                <button onClick={() => { setFormData({ name: '', unit: '', conversionUnit: '', conversionRate: '', usageS: '', usageL: '', costPerUnit: '', enableUsageS: false, enableUsageL: false, note: '' }); setEditingId(null); setIsModalOpen(true); }} className="bg-stone-900 text-white px-4 py-2 rounded-xl font-bold shadow-md whitespace-nowrap">
                                    <i className="fa-solid fa-plus mr-2"></i> Add Item
                                </button>
                            )}
                        </div>
                    </div>

                    {historyTab === 'stock' ? (
                        <div className="bg-white rounded-2xl border shadow-sm p-4 flex-1 overflow-auto">
                            <table className="w-full min-w-[900px] text-left text-sm border-collapse border border-stone-300">
                                <thead>
                                    <tr className="text-stone-700 uppercase tracking-wider bg-stone-100">
                                        <th className="p-3 font-bold border border-stone-300">Ingredient Details</th>
                                        <th className="p-3 font-bold border border-stone-300 text-center bg-amber-50">Branch Stock & Restock</th>
                                        <th className="p-3 font-bold border border-stone-300">Smart Yield Calculation</th>
                                        {isSuper && <th className="p-3 font-bold border border-stone-300 text-right">Global Actions</th>}
                                    </tr>
                                </thead>
                                <tbody>
                                    {ingredients.map(ing => {
                                        const currentStock = ing.stockByShop?.[filterShop] || 0;
                                        const yieldS = ing.usageS ? Math.floor(currentStock / ing.usageS) : '-';
                                        const yieldL = ing.usageL ? Math.floor(currentStock / ing.usageL) : '-';
                                        return (
                                            <tr key={ing.id} className="hover:bg-stone-50 bg-white">
                                                <td className="p-3 border border-stone-300">
                                                    <div className="font-bold text-stone-800 text-base">{ing.name}</div>
                                                    <div className="text-xs text-stone-500 font-medium mt-1">
                                                        <span className="bg-stone-100 px-1.5 py-0.5 rounded border border-stone-200 mr-2">Unit: {ing.unit}</span>
                                                        <span className="bg-green-50 text-green-700 px-1.5 py-0.5 rounded border border-green-200">Cost: {(ing.costPerUnit || 0).toLocaleString()} ៛/{ing.unit}</span>
                                                    </div>
                                                </td>
                                                <td className="p-3 border border-stone-300 text-center bg-amber-50/30">
                                                    <div className="flex flex-col items-center justify-center">
                                                        <div className="flex items-center justify-center bg-white border border-stone-300 rounded-lg shadow-sm overflow-hidden mb-2">
                                                            <button 
                                                                onClick={() => handleQuickRestock(ing.id, -(Number(ing.conversionRate) || 1))} 
                                                                className="w-10 h-10 flex items-center justify-center text-stone-600 hover:bg-red-50 hover:text-red-600 transition bg-stone-100"
                                                                title={`Subtract 1 ${ing.unit} (${Number(ing.conversionRate) || 1} ${ing.conversionUnit || ing.unit})`}
                                                            >
                                                                <i className="fa-solid fa-minus"></i>
                                                            </button>

                                                                    delete updated[ing.id];
                                                                    setManualInputs(updated);
                                                                }}

                                                            />
                                                            <button 
                                                                onClick={() => handleQuickRestock(ing.id, (Number(ing.conversionRate) || 1))} 
                                                                className="w-10 h-10 flex items-center justify-center text-stone-600 hover:bg-green-50 hover:text-green-600 transition bg-stone-100"
                                                                title={`Add 1 ${ing.unit} (${Number(ing.conversionRate) || 1} ${ing.conversionUnit || ing.unit})`}
                                                            >
                                                                <i className="fa-solid fa-plus"></i>
                                                            </button>

                                                    </div>
                                                </td>
                                                <td className="p-3 border border-stone-300 bg-stone-50/50">
                                                    <div className="flex flex-col gap-2 text-xs w-56">
                                                        <div className="flex justify-between items-center bg-white px-3 py-1.5 rounded-lg border border-stone-200 shadow-sm">
                                                            <span className="font-bold text-stone-600">S Cup ({ing.usageS || 0}{ing.conversionUnit || ing.unit}):</span>
                                                            <span className={`font-black ${yieldS > 10 || yieldS === '-' ? 'text-stone-800' : 'text-red-600'}`}>{yieldS} cups</span>
                                                        </div>
                                                        <div className="flex justify-between items-center bg-white px-3 py-1.5 rounded-lg border border-stone-200 shadow-sm">
                                                            <span className="font-bold text-stone-600">L Cup ({ing.usageL || 0}{ing.conversionUnit || ing.unit}):</span>
                                                            <span className={`font-black ${yieldL > 10 || yieldL === '-' ? 'text-stone-800' : 'text-red-600'}`}>{yieldL} cups</span>
                                                        </div>
                                                    </div>
                                                </td>
                                                {isSuper && (
                                                    <td className="p-3 border border-stone-300 text-right">
                                                        <button onClick={() => { setFormData({name: ing.name, unit: ing.unit, conversionUnit: ing.conversionUnit||'', conversionRate: ing.conversionRate||'', usageS: ing.usageS||'', usageL: ing.usageL||'', costPerUnit: ing.costPerUnit||'', enableUsageS: !!ing.usageS, enableUsageL: !!ing.usageL, note: ing.note||''}); setEditingId(ing.id); setIsModalOpen(true); }} className="p-2 text-blue-500 hover:text-blue-700 transition" title="Edit Global Item"><i className="fa-solid fa-pen"></i></button>
                                                        <button onClick={() => del(ing.id)} className="p-2 text-red-500 hover:text-red-700 transition" title="Delete Global Item"><i className="fa-solid fa-trash"></i></button>
                                                    </td>
                                                )}
                                            </tr>
                                        );
                                    })}
                                    {ingredients.length === 0 && <tr><td colSpan="4" className="text-center py-6 text-stone-400 border border-stone-300">No ingredients added yet.</td></tr>}
                                </tbody>
                            </table>
                        </div>
                    ) : (
                        <div className="bg-white rounded-2xl border shadow-sm p-4 flex-1 overflow-auto">
                            <table className="w-full min-w-[800px] text-left text-sm border-collapse border border-stone-300">
                                <thead>
                                    <tr className="text-stone-700 uppercase tracking-wider bg-stone-100">
                                        <th className="p-3 font-bold border border-stone-300">Date & Time</th>
                                        <th className="p-3 font-bold border border-stone-300">Ingredient</th>
                                        <th className="p-3 font-bold border border-stone-300">Type</th>
                                        <th className="p-3 font-bold border border-stone-300">Amount</th>
                                        <th className="p-3 font-bold border border-stone-300">Reference</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredLogs.map(log => {
                                        const ing = ingredients.find(i => i.id === log.ingredientId);
                                        const unit = ing ? ing.unit : '';
                                        const ingName = ing ? ing.name : 'Deleted Item';
                                        
                                        let typeColor = 'bg-stone-100 text-stone-700';
                                        let amtColor = 'text-stone-800';
                                        if (log.type === 'Restock') { typeColor = 'bg-green-100 text-green-700'; amtColor = 'text-green-600'; }
                                        if (log.type === 'Usage') { typeColor = 'bg-red-100 text-red-700'; amtColor = 'text-red-500'; }
                                        if (log.type === 'Adjustment') { typeColor = 'bg-amber-100 text-amber-700'; amtColor = 'text-amber-600'; }

                                        return (
                                            <tr key={log.id} className="hover:bg-stone-50 bg-white transition-colors">
                                                <td className="p-3 border border-stone-300 font-medium text-stone-600">{new Date(log.timestamp).toLocaleString()}</td>
                                                <td className="p-3 border border-stone-300 font-bold text-stone-800">{ingName}</td>
                                                <td className="p-3 border border-stone-300">
                                                    <span className={`px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider ${typeColor}`}>{log.type}</span>
                                                </td>
                                                <td className="p-3 border border-stone-300">
                                                    <span className={`font-black ${amtColor}`}>
                                                        {log.amount > 0 && log.type !== 'Usage' ? '+' : ''}{log.amount.toLocaleString()} {unit}
                                                    </span>
                                                    {log.cost && <div className="text-[10px] text-stone-400 mt-1">Cost: {log.cost.toLocaleString()} ៛</div>}
                                                </td>
                                                <td className="p-3 border border-stone-300 text-stone-500 font-medium">
                                                    {log.reference}
                                                </td>
                                            </tr>
                                        );
                                    })}
                                    {filteredLogs.length === 0 && (
                                        <tr><td colSpan="5" className="text-center py-10 text-stone-400 border border-stone-300 font-medium">No usage history found for this period.</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    )}

                    {restockModalOpen && (
                        <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <form onSubmit={handleRestockSubmit} className="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl animate-fade-in relative">
                                <button type="button" onClick={() => setRestockModalOpen(false)} className="absolute top-4 right-4 text-stone-400 hover:text-stone-700"><i className="fa-solid fa-xmark text-lg"></i></button>
                                <h3 className="text-xl font-bold mb-1">Smart Restock</h3>
                                <p className="text-sm font-medium text-amber-600 mb-6"><i className="fa-solid fa-box-open mr-1"></i> {restockData.name} ({shops.find(s=>s.id===filterShop)?.name})</p>
                                
                                <div className="space-y-4 mb-6">
                                    {(() => {
                                        const ing = ingredients.find(i => i.id === restockData.id);
                                        const unitLabel = ing ? ing.unit : 'Base Unit';
                                        return (
                                            <div>
                                                <label className="block text-sm font-semibold text-stone-700 mb-1">Quantity Added (in {unitLabel})</label>
                                                <input type="number" step="any" required placeholder="e.g. 10" className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50 text-[16px]" value={restockData.qty} onChange={e => {
                                                    const newQty = e.target.value;
                                                    // Auto-calculate cost based on Base Unit Cost, but allow user to edit if supplier prices change
                                                    const autoCost = ing && newQty !== '' ? Math.round(Number(newQty) * Number(ing.costPerUnit || 0)) : restockData.cost;
                                                    setRestockData({...restockData, qty: newQty, cost: autoCost});
                                                }} autoFocus />
                                            </div>
                                        );
                                    })()}
                                    <div>
                                        <label className="block text-sm font-semibold text-stone-700 mb-1">Total Cost (៛)</label>
                                        <input type="number" required placeholder="e.g. 20000" className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50 text-[16px]" value={restockData.cost} onChange={e => setRestockData({...restockData, cost: e.target.value})} />
                                    </div>
                                    {restockData.qty > 0 && (
                                        <div className="bg-green-50 text-green-800 p-3 rounded-xl border border-green-200 text-sm font-bold flex flex-col gap-2">
                                            {(() => {
                                                const ing = ingredients.find(i => i.id === restockData.id);
                                                const rate = ing ? (Number(ing.conversionRate) || 1) : 1;
                                                const baseUnitsPurchased = Number(restockData.qty);
                                                const stockToAdd = baseUnitsPurchased * rate;
                                                const unitCost = restockData.cost > 0 ? (restockData.cost / baseUnitsPurchased) : 0;
                                                
                                                return (
                                                    <>
                                                        <div className="flex justify-between items-center text-lg">
                                                            <span>Total Stock to Add:</span>
                                                            <span className="font-black text-green-700">+{stockToAdd.toLocaleString()} {ing?.conversionUnit || ing?.unit}</span>

                                                            <span>{unitCost.toFixed(2)} ៛</span>
                                                        </div>
                                                    </>

                    reader.onload = (e) => {
                        setSelectedImageSrc(e.target.result);
                        setZoom(1);
                        setOffset({ x: 0, y: 0 });
                        setCropModalOpen(true);
                    };
                    reader.readAsDataURL(e.target.files[0]);
                }
            };

            const handleMouseDown = (e) => {
                setIsDragging(true);
                setDragStart({ x: e.clientX - offset.x, y: e.clientY - offset.y });
            };
            const handleTouchStart = (e) => {
                setIsDragging(true);
                setDragStart({ x: e.touches[0].clientX - offset.x, y: e.touches[0].clientY - offset.y });
            };

            const handleMouseMove = (e) => {
                if (isDragging) {
                    setOffset({ x: e.clientX - dragStart.x, y: e.clientY - dragStart.y });
                }
            };
            const handleTouchMove = (e) => {
                if (isDragging) {
                    setOffset({ x: e.touches[0].clientX - dragStart.x, y: e.touches[0].clientY - dragStart.y });
                }
            };

            const handleMouseUp = () => setIsDragging(false);

                let cS = 0;
                let cL = 0;
                newRecipe.forEach(r => {
                    const ing = ingredients.find(i => i.id === r.ingredientId);
                    if (ing && ing.costPerUnit) {
                        const rate = Number(ing.conversionRate) || 1;
                        const costPerRecipeUnit = (ing.conversionUnit && rate > 0) ? (Number(ing.costPerUnit) / rate) : Number(ing.costPerUnit);
                        
                        if (r.qtyS) cS += (Number(r.qtyS) * costPerRecipeUnit);
                        if (r.qtyL) cL += (Number(r.qtyL) * costPerRecipeUnit);

                setFormData({
                    ...currentFormData, 
                    recipe: newRecipe,
                    costSmall: cS > 0 ? Math.round(cS) : currentFormData.costSmall,
                    costLarge: cL > 0 ? Math.round(cL) : currentFormData.costLarge
                });
            };

            const generateCroppedImage = () => {
                if (!imageRef.current || !canvasRef.current) return;
                
                const canvas = canvasRef.current;
                const ctx = canvas.getContext('2d');
                
                // Final output size increased to 250px for better quality
                const SIZE = 250; 
                canvas.width = SIZE;
                canvas.height = SIZE;

                const image = imageRef.current;
                
                // BUG FIX: Must use natural dimensions, not CSS-rendered dimensions
                const natWidth = image.naturalWidth;
                const natHeight = image.naturalHeight;
                
                if (!natWidth || !natHeight) return; // Prevent saving empty image if not loaded

                const minDim = Math.min(natWidth, natHeight);
                
                // Base scale to cover the output area based on the smallest dimension
                const baseScale = SIZE / minDim;
                const totalScale = baseScale * zoom;

                // Calculate center points
                const cx = canvas.width / 2;
                const cy = canvas.height / 2;

                ctx.fillStyle = '#fff';
                ctx.fillRect(0, 0, canvas.width, canvas.height);

                ctx.save();
                ctx.translate(cx, cy); // Move to center
                
                // Map screen drag pixels to canvas coordinate system
                const offsetScale = SIZE / 256;
                ctx.translate(offset.x * offsetScale, offset.y * offsetScale);
                
                ctx.scale(totalScale, totalScale);
                // Draw image centered at the origin
                ctx.drawImage(image, -natWidth / 2, -natHeight / 2);
                ctx.restore();

                const finalDataUrl = canvas.toDataURL('image/webp', 0.85);

        function SalesView({ orders, shops, currentAdminRecord, admins }) {
            const isSuper = (currentAdminRecord?.role || 'Admin') === 'Admin';
            const canSelectMultiple = isSuper || (currentAdminRecord?.shopIds && currentAdminRecord.shopIds.length > 1);
            const [filter, setFilter] = useState('today'); 
            const [filterShopId, setFilterShopId] = useState(isSuper ? 'All' : (currentAdminRecord?.shopIds?.[0] || currentAdminRecord?.shopId || 'All'));
            
            // State for the Month & Year picker
            const [customMonth, setCustomMonth] = useState(() => {
                const d = new Date();
                return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}`;
            });
            
            // Smart Filter States
            const [filterStaff, setFilterStaff] = useState('All');
            const [filterPayment, setFilterPayment] = useState('All');
            const [searchQuery, setSearchQuery] = useState('');
            
            // OPTIMIZATION: On-Demand Historical Data Fetching
            const [historicalOrders, setHistoricalOrders] = useState([]);
            const [isFetchingHistory, setIsFetchingHistory] = useState(false);

            useEffect(() => {
                // If filtering for today, the live limited snapshot from MainApp is sufficient.
                if (filter === 'today') return;

                const fetchHistory = async () => {
                    setIsFetchingHistory(true);
                    const { getDocs, query, where, collection } = window.FirebaseApp;
                    const now = new Date();
                    let startTime = 0;
                    let endTime = now.getTime();

                    // Calculate timestamp ranges based on selected filter
                    if (filter === 'yesterday') {
                        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                        startTime = today.getTime() - (24 * 60 * 60 * 1000);
                        endTime = today.getTime();
                    } else if (filter === 'week' || filter === 'last_week') {
                        startTime = now.getTime() - (14 * 24 * 60 * 60 * 1000); // Fetch two weeks for buffer
                    } else if (filter === 'this_month' || filter === 'last_month') {
                        startTime = new Date(now.getFullYear(), now.getMonth() - 1, 1).getTime(); // Fetch 2 months buffer
                    } else if (filter === 'custom_month' && customMonth) {
                        const [year, month] = customMonth.split('-');
                        startTime = new Date(year, month - 1, 1).getTime();
                        endTime = new Date(year, month, 1).getTime();
                    }

                    try {
                        const q = query(
                            collection(db, 'orders'), 
                            where('createdAt', '>=', startTime),
                            where('createdAt', '<', endTime)
                        );
                        const snap = await getDocs(q);
                        setHistoricalOrders(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    } catch(err) {
                        console.error("Failed to fetch historical sales", err);
                    } finally {
                        setIsFetchingHistory(false);
                    }
                };
                
                fetchHistory();
            }, [filter, customMonth, filterShopId]);
            
            const filteredOrders = useMemo(() => {
                const now = new Date();
                // Get precise midnight to avoid rolling 24-hour overlap bugs
                const startOfToday = new Date(now.getFullYear(), now.getMonth(), now.getDate());

                // Use the live orders array for 'today', otherwise use the fetched historical array
                const sourceData = filter === 'today' ? orders : historicalOrders;
                const searchLower = searchQuery.toLowerCase();

                return sourceData.filter(o => {
                    const matchShop = filterShopId === 'All' || o.shopId === filterShopId;
                    if (!matchShop) return false;
                    
                    const orderDate = new Date(o.createdAt);
                    let matchDate = false;

                    if (filter === 'today') {
                        matchDate = orderDate >= startOfToday;
                    } else if (filter === 'yesterday') {
                        const startOfYesterday = new Date(startOfToday);
                        startOfYesterday.setDate(startOfYesterday.getDate() - 1);
                        matchDate = orderDate >= startOfYesterday && orderDate < startOfToday;
                    } else if (filter === 'week') {
                        const weekAgo = new Date(now);
                        weekAgo.setDate(now.getDate() - 7);
                        matchDate = orderDate >= weekAgo;
                    } else if (filter === 'last_week') {
                        const twoWeeksAgo = new Date(now);
                        twoWeeksAgo.setDate(now.getDate() - 14);
                        const oneWeekAgo = new Date(now);
                        oneWeekAgo.setDate(now.getDate() - 7);
                        matchDate = orderDate >= twoWeeksAgo && orderDate < oneWeekAgo;
                    } else if (filter === 'this_month' || filter === 'month') {
                        const startOfMonth = new Date(now.getFullYear(), now.getMonth(), 1);
                        matchDate = orderDate >= startOfMonth;
                    } else if (filter === 'last_month') {
                        const startOfLastMonth = new Date(now.getFullYear(), now.getMonth() - 1, 1);
                        const startOfThisMonth = new Date(now.getFullYear(), now.getMonth(), 1);
                        matchDate = orderDate >= startOfLastMonth && orderDate < startOfThisMonth;
                    } else if (filter === 'custom_month') {
                        if (customMonth) {
                            const [year, month] = customMonth.split('-');
                            const startOfCustom = new Date(year, month - 1, 1);
                            const endOfCustom = new Date(year, month, 1); // 1st of the next month
                            matchDate = orderDate >= startOfCustom && orderDate < endOfCustom;
                        } else {
                            matchDate = true;
                        }
                    }
                    
                    if (!matchDate) return false;

                    // Smart Filter: Staff Match
                    const staffId = o.staffId || o.userId;
                    const isSelfOrder = !admins?.find(a => a.id === staffId);
                    const matchStaff = filterStaff === 'All' || (filterStaff === 'Self-Order' ? isSelfOrder : staffId === filterStaff);
                    if (!matchStaff) return false;

                    // Smart Filter: Payment Match
                    let matchPayment = true;
                    if (filterPayment === 'Paid') matchPayment = o.paymentStatus === 'Paid';
                    else if (filterPayment === 'Unpaid') matchPayment = o.paymentStatus !== 'Paid';
                    else if (filterPayment === 'Cash') matchPayment = o.paymentStatus === 'Paid' && o.paymentMethod === 'Cash';
                    else if (filterPayment === 'Bank') matchPayment = o.paymentStatus === 'Paid' && o.paymentMethod === 'Bank';
                    if (!matchPayment) return false;

                    // Smart Filter: Search Match (Customer, Phone, Table, Queue/Invoice)
                    if (searchLower) {
                        const cName = String(o.customerName || 'Walk-in').toLowerCase();
                        const cPhone = String(o.customerPhone || '').toLowerCase();
                        const cTable = String(o.tableName || '').toLowerCase();
                        const cQueue = String(o.queueNo || '').toLowerCase();
                        if (!cName.includes(searchLower) && !cPhone.includes(searchLower) && !cTable.includes(searchLower) && !cQueue.includes(searchLower)) {
                            return false;
                        }
                    }
                    
                    return true;
                });

                        if (o.paymentMethod === 'Cash') cash += o.totalAmount;
                        else if (o.paymentMethod === 'Bank') bank += o.totalAmount;

                const year = String(d.getFullYear()).slice(-2);
                let hrs = d.getHours();
                const ampm = hrs >= 12 ? 'PM' : 'AM';
                hrs = hrs % 12 || 12;
                const mins = String(d.getMinutes()).padStart(2, '0');
                const secs = String(d.getSeconds()).padStart(2, '0');
                return `${day}-${month}-${year} | ${hrs}:${mins}:${secs} ${ampm}`;

            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCustomer, setSelectedCustomer] = useState(null);

            // Aggregate raw orders into Customer Profiles
            const customersData = useMemo(() => {
                const map = new Map();
                orders.forEach(o => {
                    if (!o.customerPhone || o.customerPhone === 'N/A') return; // Skip walk-ins without a phone
                    
                    if (!map.has(o.customerPhone)) {
                        map.set(o.customerPhone, {
                            phone: o.customerPhone,
                            name: o.customerName || 'Unknown',
                            totalSpent: 0,
                            orderCount: 0,
                            lastVisit: o.createdAt,
                            orders: []
                        });
                    }
                    
                    const c = map.get(o.customerPhone);
                    c.totalSpent += o.totalAmount;
                    c.orderCount += 1;
                    if (o.createdAt > c.lastVisit) c.lastVisit = o.createdAt;
                    
                    // Keep the latest known name
                    if (o.customerName && o.customerName !== 'Unknown' && o.createdAt >= c.lastVisit) {
                        c.name = o.customerName;
                    }
                    
                    c.orders.push(o);

                // Sort by most recent visit

                                                    View Invoices
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                    {filteredCustomers.length === 0 && (
                                        <tr><td colSpan="5" className="text-center py-10 text-stone-400 border border-stone-300 font-medium">No customers found.</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Customer Invoice Modal */}
                    {selectedCustomer && (
                        <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl w-full max-w-2xl h-[85vh] flex flex-col shadow-2xl animate-fade-in relative">
                                <div className="p-6 border-b border-stone-200 bg-stone-50 flex justify-between items-center shrink-0 rounded-t-3xl">
                                    <div>
                                        <h3 className="text-xl font-black text-stone-900">{selectedCustomer.name}'s History</h3>
                                        <p className="text-sm font-medium text-stone-500 mt-1">{selectedCustomer.phone}</p>
                                    </div>
                                    <button onClick={() => setSelectedCustomer(null)} className="w-8 h-8 rounded-full bg-stone-200 flex items-center justify-center text-stone-600 hover:bg-stone-300 transition">
                                        <i className="fa-solid fa-xmark"></i>
                                    </button>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto p-6 bg-stone-100 space-y-4">
                                    {selectedCustomer.orders.length === 0 && (
                                        <div className="text-center py-10 text-stone-400">All invoices deleted.</div>
                                    )}
                                    {/* Sort individual customer orders by date descending */}
                                    {selectedCustomer.orders.sort((a,b) => b.createdAt - a.createdAt).map(order => (
                                        <div key={order.id} className="bg-white border border-stone-200 rounded-2xl p-5 shadow-sm">
                                            <div className="flex justify-between items-start mb-3 border-b border-stone-100 pb-3">
                                                <div>
                                                    <div className="font-bold text-stone-800 mb-1">Queue: {order.queueNo}</div>
                                                    <div className="text-xs font-semibold text-stone-400">
                                                        {new Date(order.createdAt).toLocaleString()}
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <div className="font-black text-amber-600 text-lg">{order.totalAmount.toLocaleString()} ៛</div>
                                                    <div className={`inline-block px-2 py-0.5 mt-1 rounded text-[10px] font-bold uppercase tracking-wider ${order.status === 'Served' ? 'bg-green-100 text-green-700' : order.status === 'Cancelled' ? 'bg-red-100 text-red-700' : 'bg-stone-100 text-stone-600'}`}>
                                                        {order.status}
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            <div className="mb-4">
                                                <ul className="text-sm space-y-1.5 text-stone-700 font-medium">
                                                    {order.items.map((i, idx) => (
                                                        <li key={idx} className="flex justify-between">
                                                            <span><b className="text-amber-800 bg-amber-50 px-1 rounded border border-amber-200 mr-2">{i.quantity}x</b> {i.name}</span>
                                                            <span className="text-stone-400 text-xs">{(i.price * i.quantity).toLocaleString()} ៛</span>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>

                                            <div className="flex justify-end pt-3 border-t border-stone-50">
                                                <button onClick={() => deleteInvoice(order.id)} className="text-red-500 hover:text-red-700 text-xs font-bold px-3 py-1.5 bg-red-50 hover:bg-red-100 rounded transition flex items-center gap-2">
                                                    <i className="fa-solid fa-trash"></i> Delete Record
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootApp />);
    </script>

    <!-- Service Worker Registration for Offline Caching & Background Sync -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('ServiceWorker registered successfully with scope: ', registration.scope);
                        
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    console.log('Background Sync Complete: New app version is ready.');
                                }
                            });
                        });
                    })
                    .catch((error) => console.log('ServiceWorker registration failed: ', error));
            });
        }
    </script>
</body>
</html>
