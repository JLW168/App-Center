                'Manager': ['pos', 'kds', 'shifts', 'inventory', 'sales', 'customers', 'users'],
                'Cashier': ['pos', 'customers'],
                'Kitchen': ['kds', 'inventory'],
                'Barista': ['kds', 'inventory']
            }), []);

            const availablePages = useMemo(() => [
                { id: 'pos', label: 'POS & Orders' },
                { id: 'kds', label: 'Kitchen Display' },
                { id: 'shifts', label: 'Shift Reports' },
                { id: 'shops', label: 'Branch Management' },
                { id: 'products', label: 'Menu & Products' },
                { id: 'inventory', label: 'Inventory' },
                { id: 'sales', label: 'Sales Reports' },
                { id: 'customers', label: 'CRM & Customers' },
                { id: 'users', label: 'Staff Management' }
            ], []);

            const [formData, setFormData] = useState({ name: '', email: '', password: '', role: 'Cashier', shopId: '', permissions: rolePerms['Cashier'] });
            const [isProcessing, setIsProcessing] = useState(false);
            
            const filteredAdmins = useMemo(() => {
                return admins.filter(a => {
                    const searchLower = searchQuery.toLowerCase();
                    const matchSearch = a.name?.toLowerCase().includes(searchLower) || a.email?.toLowerCase().includes(searchLower);
                    return matchSearch;
                });
            }, [admins, searchQuery]);

            const toggleStatus = async (adminId, currentStatus) => {
                if (!isSuper) return alert("Only System Admins can modify staff status.");
                if (adminId === currentUser.uid) return alert("You cannot deactivate your own account.");
                if (confirm(`Are you sure you want to ${currentStatus === 'Active' ? 'deactivate' : 'activate'} this staff account?`)) {
                    try {
                        const { doc, updateDoc } = window.FirebaseApp;
                        await updateDoc(doc(db, 'admins', adminId), { status: currentStatus === 'Active' ? 'Inactive' : 'Active' });
                    } catch (err) {
                        alert("Error updating status: " + err.message);
                    }
                }
            };

            const deleteUser = async (adminId) => {
                if (!isSuper) return alert("Only System Admins can delete staff.");
                if (adminId === currentUser.uid) return alert("You cannot delete your own account.");
                if (confirm("Permanently delete this staff record?")) {
                    try {
                        const { deleteDoc, doc } = window.FirebaseApp;
                        await deleteDoc(doc(db, 'admins', adminId));
                    } catch (err) {
                        alert("Error deleting user: " + err.message);
                    }
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!isSuper) return;
                
                if (formData.role !== 'Admin' && !formData.shopId) {
                    return alert('Please select a Branch for this staff member.');
                }
                
                setIsProcessing(true);
                try {
                    const { doc, updateDoc, setDoc, initializeApp, getAuth, createUserWithEmailAndPassword } = window.FirebaseApp;
                    
                    const dataToSave = {
                        name: formData.name,
                        role: formData.role,
                        shopId: formData.role === 'Admin' ? 'All' : formData.shopId,
                        permissions: formData.permissions || [],
                    };

                    if (editingId) {
                        await updateDoc(doc(db, 'admins', editingId), dataToSave);
                    } else {
                        // Create new auth user without logging out current admin
                        const secondaryApp = initializeApp(firebaseConfig, `SecondaryApp_${Date.now()}`);
                        const secondaryAuth = getAuth(secondaryApp);
                        
                        const userCred = await createUserWithEmailAndPassword(secondaryAuth, formData.email, formData.password);
                        
                        await setDoc(doc(db, 'admins', userCred.user.uid), {
                            ...dataToSave,
                            email: formData.email,
                            status: 'Active',
                            createdAt: Date.now()
                        });
                        
                        // Clean up secondary auth
                        await window.FirebaseApp.signOut(secondaryAuth);
                    }
                    
                    setIsModalOpen(false);
                } catch (err) {
                    alert("Error: " + err.message.replace('Firebase: ', ''));
                } finally {
                    setIsProcessing(false);
                }
            };

            return (
                <div className="max-w-6xl h-full flex flex-col">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 shrink-0">
                        <div>
                            <h2 className="text-2xl font-bold text-stone-800">Staff Management</h2>
                            <p className="text-sm text-stone-500 font-medium mt-1">View and manage staff accounts and permissions.</p>
                        </div>
                        <div className="flex flex-col sm:flex-row gap-2 w-full md:w-auto">
                            <div className="relative w-full sm:w-72">
                                <i className="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-stone-400"></i>
                                <input type="text" placeholder="Search staff..." className="w-full border border-stone-300 rounded-xl pl-9 pr-4 py-2 outline-none focus:border-amber-600 bg-white shadow-sm text-sm" value={searchQuery} onChange={e=>setSearchQuery(e.target.value)} />
                            </div>
                            {isSuper && (
                                <button onClick={() => { setFormData({ name: '', email: '', password: '', role: 'Cashier', shopId: '', permissions: rolePerms['Cashier'] }); setEditingId(null); setIsModalOpen(true); }} className="bg-stone-900 text-white px-4 py-2 rounded-xl font-bold shadow-md whitespace-nowrap">
                                    <i className="fa-solid fa-plus mr-2"></i> Add Staff
                                </button>
                            )}
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-stone-200 flex-1 overflow-hidden flex flex-col">
                        <div className="flex-1 overflow-auto p-4">
                            <table className="w-full min-w-[800px] text-left text-sm border-collapse border border-stone-300">
                                <thead>
                                    <tr className="bg-stone-100 text-stone-700 uppercase tracking-wider border-b border-stone-300">
                                        <th className="p-3 font-bold border border-stone-300">Staff Member</th>
                                        <th className="p-3 font-bold border border-stone-300">Role & Branch</th>
                                        <th className="p-3 font-bold border border-stone-300">Status</th>
                                        <th className="p-3 font-bold border border-stone-300">Joined</th>
                                        {isSuper && <th className="p-3 font-bold text-right border border-stone-300">Actions</th>}
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredAdmins.map(admin => {
                                        const shopName = admin.shopId === 'All' ? 'All Branches' : (shops.find(s => s.id === admin.shopId)?.name || 'Unknown');
                                        return (
                                            <tr key={admin.id} className="hover:bg-stone-50 transition-colors bg-white">
                                                <td className="p-3 border border-stone-300">
                                                    <div className="font-bold text-stone-900 text-base flex items-center gap-2">
                                                        {admin.name} {admin.id === currentUser?.uid && <span className="text-[10px] bg-amber-100 text-amber-800 px-2 py-0.5 rounded font-bold uppercase">You</span>}
                                                    </div>
                                                    <div className="text-stone-500 font-medium text-xs mt-0.5">{admin.email}</div>
                                                </td>
                                                <td className="p-3 border border-stone-300">
                                                    <div className="font-bold text-stone-700">{admin.role}</div>
                                                    <div className="text-xs text-stone-500 mt-1 flex items-center gap-1"><i className="fa-solid fa-store text-stone-400"></i> {shopName}</div>
                                                </td>
                                                <td className="p-3 border border-stone-300">
                                                    <span className={`px-2 py-1 rounded text-[10px] font-bold uppercase tracking-wider ${admin.status === 'Active' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                                        {admin.status || 'Active'}
                                                    </span>
                                                </td>
                                                <td className="p-3 border border-stone-300 text-stone-500 font-medium">
                                                    {admin.createdAt ? new Date(admin.createdAt).toLocaleDateString() : 'N/A'}
                                                </td>
                                                {isSuper && (
                                                    <td className="p-3 border border-stone-300 text-right">
                                                        <div className="flex justify-end gap-2">
                                                            <button onClick={() => { setFormData({ name: admin.name||'', email: admin.email||'', role: admin.role||'Cashier', shopId: admin.shopId||'', password: '', permissions: admin.permissions || rolePerms[admin.role] || [] }); setEditingId(admin.id); setIsModalOpen(true); }} className="px-3 py-1.5 bg-blue-50 text-blue-600 hover:bg-blue-100 rounded text-xs font-bold transition" title="Edit Staff">
                                                                <i className="fa-solid fa-pen"></i>
                                                            </button>
                                                            <button onClick={() => toggleStatus(admin.id, admin.status || 'Active')} className={`px-3 py-1.5 rounded text-xs font-bold transition ${admin.status === 'Inactive' ? 'bg-green-50 text-green-600 hover:bg-green-100' : 'bg-amber-50 text-amber-600 hover:bg-amber-100'}`} title={admin.status === 'Inactive' ? 'Reactivate' : 'Deactivate'}>
                                                                {admin.status === 'Inactive' ? <i className="fa-solid fa-check"></i> : <i className="fa-solid fa-ban"></i>}
                                                            </button>
                                                            <button onClick={() => deleteUser(admin.id)} className="px-3 py-1.5 bg-red-50 text-red-600 hover:bg-red-100 rounded text-xs font-bold transition" title="Delete Staff">
                                                                <i className="fa-solid fa-trash"></i>
                                                            </button>
                                                        </div>
                                                    </td>
                                                )}
                                            </tr>
                                        );
                                    })}
                                    {filteredAdmins.length === 0 && (
                                        <tr><td colSpan={isSuper ? "5" : "4"} className="text-center py-10 text-stone-400 border border-stone-300 font-medium">No staff members found.</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* ADD/EDIT USER MODAL */}
                    {isModalOpen && isSuper && (
                        <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <form onSubmit={handleSubmit} className="bg-white rounded-3xl w-full max-w-md p-6 shadow-2xl animate-fade-in relative">
                                <button type="button" onClick={() => setIsModalOpen(false)} className="absolute top-4 right-4 text-stone-400 hover:text-stone-700"><i className="fa-solid fa-xmark text-lg"></i></button>
                                <h3 className="text-xl font-bold mb-4">{editingId ? 'Edit Staff Member' : 'Add New Staff Member'}</h3>
                                
                                <div className="space-y-4 mb-6">
                                    <div>
                                        <label className="block text-sm font-semibold text-stone-700 mb-1">Full Name</label>
                                        <input type="text" required placeholder="e.g. Jane Doe" className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50 text-[16px]" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} autoFocus />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-stone-700 mb-1">Email Address</label>
                                        <input type="email" required placeholder="e.g. staff@solaris.cafe" disabled={!!editingId} className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50 text-[16px] disabled:opacity-50 disabled:cursor-not-allowed" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} />
                                        {editingId && <p className="text-xs text-stone-400 mt-1">Email cannot be changed after creation.</p>}
                                    </div>
                                    {!editingId && (
                                        <div>
                                            <label className="block text-sm font-semibold text-stone-700 mb-1">Temporary Password</label>
                                            <input type="password" required minLength="6" placeholder="Min 6 characters" className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50 text-[16px]" value={formData.password} onChange={e => setFormData({...formData, password: e.target.value})} />
                                        </div>
                                    )}
                                    <div>
                                        <label className="block text-sm font-semibold text-stone-700 mb-1">System Role (Preset Template)</label>
                                        <select required className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50 text-[16px]" value={formData.role} onChange={e => setFormData({...formData, role: e.target.value, permissions: rolePerms[e.target.value] || []})}>
                                            <option value="Admin">System Admin (Full Access)</option>
                                            <option value="Manager">Branch Manager</option>
                                            <option value="Cashier">Cashier</option>
                                            <option value="Barista">Barista</option>
                                            <option value="Kitchen">Kitchen Staff</option>
                                        </select>
                                    </div>
                                    {formData.role !== 'Admin' && (
                                        <div className="animate-fade-in">
                                            <label className="block text-sm font-semibold text-stone-700 mb-1">Assigned Branch</label>
                                            <select required className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50 text-[16px]" value={formData.shopId} onChange={e => setFormData({...formData, shopId: e.target.value})}>
                                                <option value="" disabled>Select Branch...</option>
                                                {shops.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                            </select>
                                        </div>
                                    )}
                                    
                                    <div className="mt-4 pt-4 border-t border-stone-200">
                                        <label className="block text-sm font-semibold text-stone-700 mb-2">Custom Page Permissions</label>
                                        <div className="grid grid-cols-2 gap-2 max-h-40 overflow-y-auto pr-1 no-scrollbar">
                                            {availablePages.map(page => (
                                                <label key={page.id} className={`flex items-center gap-2 p-2 bg-white border rounded-lg transition shadow-sm cursor-pointer hover:border-amber-400 ${formData.permissions.includes(page.id) ? 'border-amber-400 bg-amber-50/30' : 'border-stone-200'}`}>
                                                    <input 
                                                        type="checkbox" 
                                                        className="w-4 h-4 accent-amber-600 rounded cursor-pointer" 
                                                        checked={formData.permissions.includes(page.id)}
                                                        onChange={(e) => {
                                                            const newPerms = e.target.checked 
                                                                ? [...formData.permissions, page.id] 
                                                                : formData.permissions.filter(p => p !== page.id);
                                                            setFormData({...formData, permissions: newPerms});
                                                        }}
                                                    />
                                                    <span className="text-xs font-bold text-stone-700 line-clamp-1">{page.label}</span>
                                                </label>
                                            ))}
                                        </div>
                                    </div>
                                </div>
                                
                                <div className="flex justify-end gap-2 pt-2 border-t border-stone-100">
                                    <button type="button" onClick={() => setIsModalOpen(false)} className="px-5 py-2.5 rounded-xl font-semibold text-stone-600 hover:bg-stone-200 transition">Cancel</button>
                                    <button type="submit" disabled={isProcessing} className="px-5 py-2.5 rounded-xl font-bold bg-stone-900 text-white hover:bg-stone-800 shadow-md transition disabled:opacity-50 flex items-center justify-center min-w-[120px]">
                                        {isProcessing ? <i className="fa-solid fa-spinner fa-spin"></i> : (editingId ? 'Save Changes' : 'Create Staff')}
                                    </button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }
        // ==========================================

        function KDSView({ orders, tables, shops, shifts, products, ingredients, onBack, currentAdminRecord }) {
            const isSuper = (currentAdminRecord?.role || 'Admin') === 'Admin';
            const allowedShopIds = currentAdminRecord?.shopIds || (currentAdminRecord?.shopId ? [currentAdminRecord.shopId] : []);
            const canSelectMultiple = isSuper || allowedShopIds.includes('All') || allowedShopIds.length > 1;
            const [filterShop, setFilterShop] = useState(isSuper || allowedShopIds.includes('All') ? 'All' : allowedShopIds[0]);
            
            // FIX: Auto-sync default shop selection when user profile data finishes loading asynchronously
            useEffect(() => {
                if (currentAdminRecord && currentAdminRecord.role !== 'Admin') {
                    setFilterShop(prev => {
                        const allowedIds = currentAdminRecord.shopIds || (currentAdminRecord.shopId ? [currentAdminRecord.shopId] : []);
                        if (prev === 'All' && !allowedIds.includes('All')) {
                            return allowedIds[0] || 'All';
                        }
                        if (prev !== 'All' && !allowedIds.includes('All') && !allowedIds.includes(prev)) {
                            return allowedIds[0] || 'All';
                        }
                        return prev;
                    });
                }
            }, [currentAdminRecord]);

            // Screen Wake Lock State
            const [isAwake, setIsAwake] = useState(false);
            const wakeLockRef = useRef(null);

            // Recipe Modal State
            const [viewingRecipe, setViewingRecipe] = useState(null);
            
            // KDS Claim Modal State
            const [claimOrder, setClaimOrder] = useState(null);
            const [isClaiming, setIsClaiming] = useState(false);

            // NEW: Fetch Global Points for Loyalty Calculation
            const [globalPoints, setGlobalPoints] = useState(null);
            useEffect(() => {
                const { doc, getDoc } = window.FirebaseApp;
                getDoc(doc(db, 'loyalty_settings', 'global_points')).then(snap => {
                    if (snap.exists()) setGlobalPoints(snap.data());
                }).catch(e => console.warn(e));
            }, []);

            const getLoyalty = (phone) => {
                if (!phone || phone === 'N/A' || !globalPoints?.pointsEnabled) return null;
                let spent = 0;
                let redeemed = 0;
                orders.forEach(o => {
                    if (o.customerPhone === phone && o.status !== 'Cancelled') {
                        spent += o.totalAmount;
                        if (o.redeemedPoints) redeemed += o.redeemedPoints;
                    }
                });
                const earnedPts = Math.floor(spent / (globalPoints.spendAmount || 4000)) * (globalPoints.pointsEarned || 1);
                const activePts = Math.max(0, earnedPts - redeemed);
                const freeClaims = Math.floor(activePts / (globalPoints.redeemPoints || 10));
                return { activePts, freeClaims };
            };

            // Keep screen awake while KDS is open
            useEffect(() => {
                const requestWakeLock = async () => {
                    if ('wakeLock' in navigator) {
                        try {
                            wakeLockRef.current = await navigator.wakeLock.request('screen');
                            setIsAwake(true);
                            wakeLockRef.current.addEventListener('release', () => {
                                setIsAwake(false);
                            });
                        } catch (err) {
                            console.warn('Wake Lock error:', err);
                            setIsAwake(false);
                        }
                    }
                };

                requestWakeLock();

                const handleVisibilityChange = () => {
                    if (document.visibilityState === 'visible') {
                        requestWakeLock();
                    }
                };

                document.addEventListener('visibilitychange', handleVisibilityChange);

                return () => {
                    document.removeEventListener('visibilitychange', handleVisibilityChange);
                    if (wakeLockRef.current) {
                        wakeLockRef.current.release().catch(() => {});
                        wakeLockRef.current = null;
                    }
                };
            }, []);

            // UPDATE: Keep 'Served' orders visible on KDS if the payment is not yet paid
            const activeOrders = orders.filter(o => 
                (filterShop === 'All' || o.shopId === filterShop) && 
                (
                    ['New', 'Preparing', 'Ready'].includes(o.status) || 
                    (o.status === 'Served' && o.paymentStatus !== 'Paid')
                )
            ).sort((a,b) => a.createdAt - b.createdAt);

            // Added Missing Dependencies for the new KDS Card Template
            const statusColors = {
                'New': 'bg-blue-50 text-blue-800 border-blue-200',
                'Preparing': 'bg-amber-50 text-amber-800 border-amber-200',
                'Ready': 'bg-emerald-50 text-emerald-800 border-emerald-200',
                'Served': 'bg-stone-50 text-stone-500 border-stone-200',
                'Cancelled': 'bg-red-50 text-red-800 border-red-200'
            };

            const updateStatus = async (order, newStatus, reason = '') => {
                const { doc, updateDoc } = window.FirebaseApp;
                const updateData = { status: newStatus };
                if (newStatus === 'Ready' || newStatus === 'Served' || newStatus === 'Cancelled') {
                    updateData.completedAt = Date.now();
                }
                
                // AUTO-PAY 0៛ ORDERS: Clear it instantly when the kitchen serves it
                if (newStatus === 'Served' && order.totalAmount === 0 && order.paymentStatus !== 'Paid') {
                    updateData.paymentStatus = 'Paid';
                    updateData.paymentMethod = 'Free Claim';
                    
                    const targetShift = shifts?.find(s => s.shopId === order.shopId && s.status === 'Open');
                    if (targetShift) updateData.shiftId = targetShift.id;
                }
                
                if (reason) updateData.cancelReason = reason;
                await updateDoc(doc(getColRef('orders'), order.id), updateData);
            };

            const updatePayment = async (orderId, payStatus, payMethod, shopId) => {
                const { doc, updateDoc } = window.FirebaseApp;
                const targetShift = shifts?.find(s => s.shopId === shopId && s.status === 'Open');
                const updateData = {
                    paymentStatus: payStatus,
                    paymentMethod: payMethod,
                    staffId: currentAdminRecord?.id
                };
                if (payStatus === 'Paid' && targetShift) {
                    updateData.shiftId = targetShift.id;
                }
                await updateDoc(doc(getColRef('orders'), orderId), updateData);
            };

            const toggleItemDone = async (order, idx) => {
                const { doc, updateDoc } = window.FirebaseApp;
                const newItems = [...order.items];
                newItems[idx].done = !newItems[idx].done;
                await updateDoc(doc(getColRef('orders'), order.id), { items: newItems });
            };

            const handleKDSClaim = async (product, size) => {
                if (isClaiming) return;
                setIsClaiming(true);
                try {
                    const { doc, updateDoc } = window.FirebaseApp;
                    const newItems = [...claimOrder.items, {
                        productId: product.id,
                        name: product.name,
                        size: size,
                        price: 0,
                        quantity: 1,
                        paidQuantity: 0,
                        freeQuantity: 1,
                        redeemedQty: 1,
                        promoName: 'Loyalty Reward (KDS)',
                        done: false
                    }];
                    const ptsToDeduct = globalPoints?.redeemPoints || 10;
                    const newPoints = (claimOrder.redeemedPoints || 0) + ptsToDeduct;
                    const newNames = claimOrder.redeemedItemName ? `${claimOrder.redeemedItemName}, 1x ${product.name}` : `1x ${product.name}`;

                    // 1. Deduct Inventory (using the globally available deductInventory)
                    const fakeCart = [{productId: product.id, quantity: 1, size: size}];
                    await deductInventory(fakeCart, products, claimOrder.shopId, claimOrder.queueNo);

                    // 2. Update Order with new items and points
                    await updateDoc(doc(getColRef('orders'), claimOrder.id), {
                        items: newItems,
                        redeemedPoints: newPoints,
                        redeemedItemName: newNames
                    });

                    setClaimOrder(null);
                } catch (err) {
                    console.error("Failed to claim product:", err);
                    alert("Failed to claim product: " + err.message);
                } finally {
                    setIsClaiming(false);
                }
            };

            return (
                <div className="h-full flex flex-col">
                    <div className="flex justify-between items-center mb-4">
                        <h2 className="text-2xl font-bold flex items-center">
                           Welcome KDS!
                            {isAwake && <i className="fa-solid fa-eye text-amber-500 ml-3 text-sm animate-pulse" title="Screen Wake Lock Active (Screen will not sleep)"></i>}
                        </h2>
                        {canSelectMultiple ? (
                            <select className="border border-stone-300 rounded-xl px-4 py-2 font-bold outline-none" value={filterShop} onChange={e=>setFilterShop(e.target.value)}>
                                {(isSuper || allowedShopIds.includes('All')) && <option value="All">All Branches</option>}
                                {shops.filter(s => isSuper || allowedShopIds.includes('All') || allowedShopIds.includes(s.id)).map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                            </select>
                        ) : (
                            <div className="bg-amber-100 text-amber-900 px-4 py-2 rounded-xl font-bold border border-amber-300 shadow-sm flex items-center">
                                <i className="fa-solid fa-location-dot mr-2"></i>
                                {shops.find(s => s.id === filterShop)?.name || 'Branch'}
                            </div>
                        )}
                    </div>
                    <div className="flex-1 overflow-x-auto flex gap-4 pb-4 px-2 items-start no-scrollbar">
                        {activeOrders.map(order => {
                            const targetShop = shops?.find(s => s.id === order.shopId);
                            const shopName = targetShop?.name || 'Unknown Branch';
                            // DYNAMIC RADIUS FIX: Use the specific shop's radius, fallback to 3000 if not set
                            const shopRadius = targetShop?.radius ? Number(targetShop.radius) : 3000;

                            return (
                            <div key={order.id} className={`shrink-0 min-w-[320px] max-w-[360px] w-full bg-white rounded-2xl shadow-sm border flex flex-col h-fit max-h-[85vh] ${order.status === 'New' ? 'border-blue-300 ring-1 ring-blue-100' : order.status === 'Preparing' ? 'border-amber-300 ring-1 ring-amber-100' : order.status === 'Ready' ? 'border-emerald-300 ring-1 ring-emerald-100' : 'border-stone-200'}`}>
                                
                                {/* 1. Shop Name & Live Time Header */}
                                <div className={`px-4 py-2.5 border-b rounded-t-xl flex justify-between items-center shrink-0 ${statusColors[order.status]}`}>
                                    <div className="text-[11px] font-semibold uppercase tracking-wider flex items-center gap-1.5">
                                        <i className="fa-solid fa-store opacity-60"></i> 
                                        <span className="truncate max-w-[120px]">{shopName}</span>
                                        {order.customerDistance !== undefined && order.customerDistance !== null ? (
                                            <span className={`px-1.5 py-0.5 rounded text-[9px] font-bold tracking-tight shadow-sm ${order.customerDistance > shopRadius ? 'bg-red-500 text-white animate-pulse border border-red-600' : 'bg-white/50 text-stone-700 border border-stone-200/50'}`} title={`Customer distance from branch (Limit: ${shopRadius}m)`}>
                                                <i className="fa-solid fa-location-arrow mr-0.5"></i>
                                                {order.customerDistance > 1000 ? (order.customerDistance/1000).toFixed(1) + 'km' : Math.round(order.customerDistance) + 'm'}
                                            </span>
                                        ) : (
                                            <span className="px-1.5 py-0.5 rounded text-[9px] font-bold tracking-tight shadow-sm bg-stone-200/80 text-stone-500 border border-stone-300" title="GPS Location Denied or Unavailable">
                                                <i className="fa-solid fa-location-crosshairs mr-0.5 opacity-50"></i> No GPS
                                            </span>
                                        )}
                                    </div>
                                    <LiveOrderTimer createdAt={order.createdAt} completedAt={order.completedAt} status={order.status} />
                                </div>

                                {/* 2 & 3. Customer & Order Info */}
                                <div className="p-4 bg-white shrink-0 space-y-3 border-b border-stone-100">
                                    <div className="flex flex-col gap-2">
                                        <div className="font-medium text-stone-800 text-lg flex items-center flex-wrap gap-x-2 gap-y-1">
                                            <span>{order.customerName || 'Walk-in'}</span>
                                            
                                            {order.customerPhone && order.customerPhone !== 'N/A' && (
                                                <>
                                                    <span className="text-stone-300">|</span>
                                                    <a href={`tel:${order.customerPhone.replace(/\D/g, '')}`} className="text-stone-500 hover:text-amber-600 transition flex items-center text-sm font-bold bg-stone-50 px-2 py-0.5 rounded border border-stone-200 shadow-sm" title="Click to call customer">
                                                        <i className="fa-solid fa-phone text-[10px] mr-1.5 opacity-60"></i> {order.customerPhone}
                                                    </a>
                                                </>
                                            )}

                                            {(() => {
                                                const loyalty = getLoyalty(order.customerPhone);
                                                if (!loyalty) return null;
                                                return (
                                                    <>
                                                        <span className="text-stone-300">|</span>
                                                        <span className="text-amber-600 font-bold text-sm">{loyalty.activePts}P</span>
                                                        <span className="text-stone-300">|</span>
                                                        {loyalty.freeClaims > 0 ? (
                                                            <button onClick={() => setClaimOrder(order)} className="text-rose-600 font-bold text-sm bg-rose-50 px-2 py-0.5 rounded hover:bg-rose-100 transition shadow-sm border border-rose-200 cursor-pointer active:scale-95 flex items-center gap-1">
                                                                <i className="fa-solid fa-gift"></i> {loyalty.freeClaims} Claim
                                                            </button>
                                                        ) : (
                                                            <span className="text-rose-400 font-bold text-sm"><i className="fa-solid fa-gift mr-1"></i> {loyalty.freeClaims}</span>
                                                        )}
                                                    </>
                                                );
                                            })()}
                                        </div>
                                    </div>
                                    
                                    <div className="flex justify-between items-end">
                                        <div className="flex flex-col gap-1">
                                            <span className={`w-fit px-2.5 py-1 rounded-md text-[11px] font-medium tracking-wide ${order.orderType === 'TAKEAWAY' ? 'bg-stone-800 text-white' : 'bg-indigo-50 text-indigo-700 border border-indigo-100'}`}>
                                                {order.orderType === 'TAKEAWAY' ? 'Take Away' : `Dine In : Table ${order.tableName}`}
                                            </span>
                                        </div>
                                        <div className="text-right">
                                            <div className="text-[10px] text-stone-400 uppercase tracking-widest mb-0.5">Invoice No.</div>
                                            <div className="font-medium text-xl leading-none text-stone-800">{order.queueNo}</div>
                                        </div>
                                    </div>
                                </div>

                                {/* 4 & 5. Items List (Scrollable Area) */}
                                <div className="p-4 flex-1 overflow-y-auto bg-stone-50/30 relative">
                                    {order.notes && (
                                        <div className="mb-4 bg-red-50 text-red-700 p-3 rounded-xl border border-red-100 text-sm shadow-sm sticky top-0 z-10">
                                            <i className="fa-solid fa-triangle-exclamation mr-1.5 opacity-80"></i> Note: {order.notes}
                                        </div>
                                    )}
                                    
                                    <ul className="space-y-2">
                                        {order.items.map((item, idx) => {
                                            const detailsText = [item.size, item.sugar, item.ice].filter(Boolean).join(' • ');
                                            const product = products?.find(p => p.id === item.productId);
                                            const hasRecipe = product && ((product.recipeSmall?.length > 0 && item.size === 'S') || (product.recipeLarge?.length > 0 && item.size === 'L'));

                                            return (
                                            <li key={idx} className={`p-3 rounded-xl border flex items-center gap-3 transition select-none ${item.done ? 'bg-stone-100/80 border-stone-200 opacity-60' : 'bg-white border-stone-200 hover:border-amber-300 shadow-sm'}`}>
                                                <div className="shrink-0 flex items-center justify-center cursor-pointer" onClick={() => toggleItemDone(order, idx)}>
                                                    <i className={`fa-regular ${item.done ? 'fa-square-check text-stone-400 text-xl' : 'fa-square text-stone-300 text-xl'}`}></i>
                                                </div>
                                                <div className="flex-1 min-w-0 flex items-center gap-2 cursor-pointer" onClick={() => toggleItemDone(order, idx)}>
                                                    <span className={`w-6 h-6 rounded flex items-center justify-center text-xs shrink-0 transition-colors font-medium ${item.done ? 'bg-stone-300 text-stone-600' : 'bg-amber-100 text-amber-800 border border-amber-200'}`}>
                                                        {item.quantity}
                                                    </span> 
                                                    <div className="flex-1 truncate">
                                                        <span className={`text-[15px] transition-colors ${item.done ? 'text-stone-500 line-through' : 'text-stone-800 font-medium'}`}>
                                                            {item.name}
                                                        </span>
                                                        {detailsText && (
                                                            <span className={`ml-2 text-[12px] ${item.done ? 'text-stone-400' : 'text-stone-500'}`}>
                                                                ({detailsText})
                                                            </span>
                                                        )}
                                                        {item.promoName && (
                                                            <div className="mt-1">
                                                                <span className="inline-flex items-center text-[10px] font-black bg-rose-100 text-rose-700 px-2 py-0.5 rounded border border-rose-200 shadow-sm uppercase tracking-wider">
                                                                    <i className="fa-solid fa-gift mr-1.5"></i> Promo: {item.promoName}
                                                                </span>
                                                            </div>
                                                        )}
                                                    </div>
                                                </div>
                                                {hasRecipe && (
                                                    <button 
                                                        className="w-8 h-8 rounded-full flex items-center justify-center text-stone-400 hover:bg-amber-100 hover:text-amber-600 transition ml-auto shrink-0"
                                                        onMouseEnter={() => setViewingRecipe({ product, size: item.size })}
                                                        onMouseLeave={() => setViewingRecipe(null)}
                                                        onTouchStart={(e) => { e.preventDefault(); setViewingRecipe({ product, size: item.size }); }}
                                                        onTouchEnd={(e) => { e.preventDefault(); setViewingRecipe(null); }}
                                                    >
                                                        <i className="fa-solid fa-blender"></i>
                                                    </button>
                                                )}
                                            </li>
                                        )})}
                                    </ul>
                                </div>

                                {/* 6 & 7. Subtotal & Financials */}
                                <div className="px-4 py-3.5 bg-white border-t border-stone-100 shrink-0 space-y-3">
                                    <div className="flex justify-between items-center">
                                        <div className="text-stone-500 text-sm">SubTotal:</div>
                                        <div className="font-medium text-amber-600 text-lg">{order.totalAmount.toLocaleString()} ៛</div>
                                    </div>
                                    
                                    <div className="flex justify-between items-center">
                                        <div className="text-stone-500 text-sm">Status:</div>
                                        <div className={`text-[11px] tracking-wider uppercase px-2.5 py-1 rounded-md border ${order.paymentStatus === 'Paid' ? 'bg-emerald-50 text-emerald-700 border-emerald-200' : order.totalAmount === 0 ? 'bg-amber-50 text-amber-700 border-amber-200' : 'bg-rose-50 text-rose-700 border-rose-200'}`}>
                                            {order.paymentStatus === 'Paid' ? <><i className="fa-solid fa-check-circle mr-1 opacity-80"></i> PAID ({order.paymentMethod})</> : order.totalAmount === 0 ? <><i className="fa-solid fa-gift mr-1 opacity-80"></i> FREE CLAIM</> : <><i className="fa-solid fa-circle-exclamation mr-1 opacity-80"></i> UNPAID</>}
                                        </div>
                                    </div>

                                    {/* Immediate Payment Buttons */}
                                    {order.paymentStatus === 'Paid' ? (
                                        <button onClick={() => updatePayment(order.id, 'Unpaid', 'N/A', order.shopId)} className="w-full py-2 bg-stone-50 hover:bg-stone-100 text-stone-600 rounded-lg text-xs transition border border-stone-200 flex items-center justify-center gap-2" title="Undo Payment">
                                            <i className="fa-solid fa-rotate-left opacity-70"></i> Revert Payment to Unpaid
                                        </button>
                                    ) : order.totalAmount === 0 ? (
                                        <div className="w-full py-2 bg-amber-50 text-amber-600 rounded-lg text-xs border border-amber-100 flex items-center justify-center gap-2 font-medium">
                                            <i className="fa-solid fa-wand-magic-sparkles"></i> Auto-pays when served
                                        </div>
                                    ) : (
                                        <div className="flex gap-2 mt-1">
                                            <button onClick={() => updatePayment(order.id, 'Paid', 'Cash', order.shopId)} className="flex-1 bg-stone-100 hover:bg-stone-200 text-stone-700 border border-stone-200 py-2 rounded-lg text-sm transition flex items-center justify-center font-medium">
                                                <i className="fa-solid fa-money-bill mr-2 opacity-60"></i> Cash
                                            </button>
                                            <button onClick={() => updatePayment(order.id, 'Paid', 'Bank', order.shopId)} className="flex-1 bg-blue-50 hover:bg-blue-100 text-blue-700 border border-blue-200 py-2 rounded-lg text-sm transition flex items-center justify-center font-medium">
                                                <i className="fa-solid fa-building-columns mr-2 opacity-60"></i> Bank
                                            </button>
                                        </div>
                                    )}

                                        {['New', 'Preparing', 'Ready', 'Served'].map((step, i) => {
                                            const currentIdx = ['New', 'Preparing', 'Ready', 'Served'].indexOf(order.status);
                                            const isCompleted = i <= currentIdx;
                                            const isCurrent = i === currentIdx;
                                            return (
                                                <div key={step} className={`text-[10px] px-2 py-0.5 rounded-full border transition-colors ${isCurrent ? 'bg-amber-500 border-amber-600 text-white font-medium shadow-sm' : isCompleted ? 'bg-stone-500 border-stone-600 text-white' : 'bg-white border-stone-300 text-stone-400'}`}>
                                                    {step}
                                                </div>
                                            );
                                        })}
                                    </div>
                                </div>

                                {/* 9. Action Buttons */}
                                <div className="p-4 border-t border-stone-200 bg-white rounded-b-xl shrink-0">
                                    {order.status === 'New' && <button onClick={() => updateStatus(order, 'Preparing')} className="w-full py-3 bg-blue-50 hover:bg-blue-100 text-blue-700 rounded-xl transition border border-blue-200 text-sm font-medium">Start Preparing</button>}
                                    {order.status === 'Preparing' && <button onClick={() => updateStatus(order, 'Ready')} className="w-full py-3 bg-amber-50 hover:bg-amber-100 text-amber-700 rounded-xl transition border border-amber-200 text-sm font-medium">Mark Ready</button>}
                                    {order.status === 'Ready' && <button onClick={() => updateStatus(order, 'Served')} className="w-full py-3 bg-emerald-50 hover:bg-emerald-100 text-emerald-700 rounded-xl transition border border-emerald-200 text-sm font-medium"><i className="fa-solid fa-check-double mr-2 opacity-80"></i> Serve Order</button>}
                                    
                                    {['New', 'Preparing'].includes(order.status) && (
                                        <button onClick={() => {
                                            const reason = prompt("Cancel this order? Enter reason (optional):");
                                            if (reason !== null) {
                                                updateStatus(order, 'Cancelled', reason);
                                            }
                                        }} className="w-full py-2 bg-white hover:bg-red-50 text-red-600 rounded-xl transition border border-transparent hover:border-red-200 text-[13px] mt-2">Cancel Order</button>
                                    )}

                                    {(order.status === 'Served' || order.status === 'Cancelled') && (
                                        <div className="w-full py-3 bg-stone-50 text-stone-500 rounded-xl text-center border border-stone-200 text-sm mt-2">
                                            <i className="fa-solid fa-lock mr-2 opacity-60"></i> {order.status} (Waiting for Payment)
                                        </div>
                                    )}
                                </div>
                            </div>
                            );
                        })}
                        {activeOrders.length === 0 && <div className="m-auto text-stone-400 font-bold text-xl flex flex-col items-center"><i className="fa-solid fa-mug-hot text-5xl mb-4 opacity-50"></i> No active orders</div>}
                    </div>

                    {/* Floating Recipe Modal */}
                    {viewingRecipe && (
                        <div className="fixed top-1/2 left-1/2 -translate-x-1/2 -translate-y-1/2 bg-stone-900/95 backdrop-blur-md text-white p-5 rounded-2xl shadow-[0_0_50px_rgba(0,0,0,0.5)] z-[100] w-[90%] max-w-sm pointer-events-none animate-fade-in border border-stone-700">
                            <div className="flex items-center gap-3 mb-4 pb-3 border-b border-stone-700">
                                <div className="w-10 h-10 rounded-full bg-amber-500/20 text-amber-400 flex items-center justify-center shrink-0">
                                    <i className="fa-solid fa-blender"></i>
                                </div>
                                <div>
                                    <h4 className="font-bold text-lg leading-tight">{viewingRecipe.product.name}</h4>
                                    <span className="text-xs text-stone-400 font-medium uppercase tracking-wider">Size: {viewingRecipe.size === 'S' ? 'Small' : viewingRecipe.size === 'L' ? 'Large' : viewingRecipe.size}</span>
                                </div>
                            </div>
                            
                            {(() => {
                                const recipeArr = viewingRecipe.size === 'S' ? viewingRecipe.product.recipeSmall : viewingRecipe.product.recipeLarge;
                                if (!recipeArr || recipeArr.length === 0) return <div className="text-stone-400 italic text-sm text-center py-4 bg-stone-800/50 rounded-xl">No recipe linked for this size.</div>;
                                
                                return (
                                    <ul className="space-y-2.5">
                                        {recipeArr.map((r, i) => {
                                            const ing = ingredients?.find(ing => ing.id === r.ingredientId);
                                            const unit = ing ? (ing.conversionUnit || ing.unit) : '';
                                            return (
                                                <li key={i} className="flex justify-between items-center text-sm bg-stone-800/50 px-3 py-2 rounded-xl border border-stone-700/50">
                                                    <span className="font-medium text-stone-200">{ing ? ing.name : 'Unknown Ingredient'}</span>
                                                    <span className="font-black text-amber-400 text-base">{r.qty} <span className="text-[10px] text-stone-400 font-bold ml-0.5">{unit}</span></span>
                                                </li>
                                            );
                                        })}
                                    </ul>
                                );
                            })()}
                        </div>
                    )}

                    {/* Floating Claim Reward Modal */}
                    {claimOrder && (
                        <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-[110] flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl w-full max-w-md shadow-2xl animate-fade-in relative flex flex-col max-h-[85vh]">
                                <div className="p-5 border-b border-stone-200 flex justify-between items-center bg-stone-50 rounded-t-3xl shrink-0">
                                    <div>
                                        <h3 className="text-xl font-bold text-stone-900 flex items-center"><i className="fa-solid fa-gift text-rose-500 mr-2"></i> Claim Free Product</h3>
                                        <p className="text-sm font-medium text-stone-500 mt-1">For: {claimOrder.customerName || 'Walk-in'}</p>
                                    </div>
                                    <button onClick={() => setClaimOrder(null)} className="w-8 h-8 rounded-full bg-stone-200 flex items-center justify-center text-stone-600 hover:bg-stone-300 transition">
                                        <i className="fa-solid fa-xmark"></i>
                                    </button>
                                </div>
                                <div className="p-5 overflow-y-auto flex-1 bg-stone-100">
                                    <div className="mb-4 bg-rose-50 border border-rose-200 text-rose-800 p-3 rounded-xl shadow-sm text-sm font-medium">
                                        <i className="fa-solid fa-circle-info mr-1.5"></i>
                                        Select an eligible product to add to this order for free. This instantly deducts <b>{globalPoints?.redeemPoints || 10} points</b>.
                                    </div>
                                    
                                    <div className="space-y-3">
                                        {products.filter(p => globalPoints?.redeemableCategories?.includes(p.category) && p.isAvailable !== false && p.visibilityMode !== 'Hidden').map(p => (
                                            <div key={p.id} className="border border-stone-200 rounded-xl p-3 flex items-center gap-3 bg-white hover:border-rose-300 transition shadow-sm">
                                                <div className="w-12 h-12 rounded-lg bg-stone-50 overflow-hidden shrink-0 border border-stone-200">
                                                    {p.image ? <img src={p.image} className="w-full h-full object-cover" /> : <i className="fa-solid fa-image text-stone-300 w-full h-full flex items-center justify-center"></i>}
                                                </div>
                                                <div className="flex-1 min-w-0">
                                                    <div className="font-bold text-stone-800 text-sm truncate">{p.name}</div>
                                                    <div className="text-[10px] text-stone-500 uppercase tracking-wider font-bold">{p.category}</div>
                                                </div>
                                                <div className="flex flex-col gap-1.5 shrink-0">
                                                    {p.priceSmall > 0 && <button onClick={() => handleKDSClaim(p, 'S')} disabled={isClaiming} className="text-[10px] bg-rose-50 text-rose-700 hover:bg-rose-600 hover:text-white border border-rose-200 px-3 py-1.5 rounded-lg font-bold transition shadow-sm active:scale-95 disabled:opacity-50">Claim S</button>}
                                                    {p.priceLarge > 0 && <button onClick={() => handleKDSClaim(p, 'L')} disabled={isClaiming} className="text-[10px] bg-rose-50 text-rose-700 hover:bg-rose-600 hover:text-white border border-rose-200 px-3 py-1.5 rounded-lg font-bold transition shadow-sm active:scale-95 disabled:opacity-50">Claim L</button>}
                                                </div>
                                            </div>
                                        ))}
                                        {products.filter(p => globalPoints?.redeemableCategories?.includes(p.category) && p.isAvailable !== false && p.visibilityMode !== 'Hidden').length === 0 && (
                                            <div className="text-center py-6 text-stone-500 font-medium">No eligible products available for claiming.</div>
                                        )}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function CategoriesView({ categories, sugarOptions, iceOptions, isSuper }) {
            const [modalOpen, setModalOpen] = useState(false);
            const [modalType, setModalType] = useState(''); 
            const [inputValue, setInputValue] = useState('');
            const [orderValue, setOrderValue] = useState(0);
            const [editingId, setEditingId] = useState(null);

            const handleAddClick = (type) => {
                setModalType(type);
                setInputValue('');
                setEditingId(null);
                
                // Automatically suggest the next available order number
                if (type === 'category') setOrderValue(categories.length + 1);
                else if (type === 'sugar') setOrderValue(sugarOptions.length + 1);
                else if (type === 'ice') setOrderValue(iceOptions.length + 1);
                
                setModalOpen(true);
            };

            const handleEditClick = (type, item) => {
                setModalType(type);
                setInputValue(item.name);
                setOrderValue(item.order ?? 0);
                setEditingId(item.id);
                setModalOpen(true);
            };

            const handleModalSubmit = async (e) => {
                e.preventDefault();
                if (!inputValue.trim()) return;

                const { addDoc, doc, updateDoc } = window.FirebaseApp;
                try {
                    const colName = modalType === 'category' ? 'categories' : (modalType === 'sugar' ? 'sugar_options' : 'ice_options');
                    if (editingId) {
                        await updateDoc(doc(db, colName, editingId), { name: inputValue, order: Number(orderValue) });
                    } else {
                        await addDoc(getColRef(colName), { name: inputValue, order: Number(orderValue) });
                    }
                    setModalOpen(false);
                } catch (err) {
                    console.error("Failed to save item:", err);
                }
            };

            return (
                <div className="animate-fade-in space-y-6 max-w-4xl">
                    <div className="bg-white p-6 rounded-2xl border shadow-sm">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-lg font-bold text-stone-800"><i className="fa-solid fa-tags mr-2 text-amber-500"></i> Categories</h3>
                            {isSuper && <button onClick={() => handleAddClick('category')} className="bg-stone-900 text-white px-3 py-1.5 rounded-lg text-sm font-bold shadow"><i className="fa-solid fa-plus mr-1"></i> Add</button>}
                        </div>
                        <div className="flex flex-wrap gap-2">
                            {categories.map(c => (
                                <div key={c.id} className="bg-stone-100 border border-stone-200 px-4 py-2 rounded-full text-sm font-bold text-stone-700 flex items-center gap-3">
                                    <span className="text-[10px] bg-stone-300 text-stone-700 px-1.5 py-0.5 rounded font-black">#{c.order ?? 0}</span>
                                    {c.name} 
                                    {isSuper && (
                                        <div className="flex items-center gap-2 pl-2 border-l border-stone-300 ml-1">
                                            <i onClick={()=>handleEditClick('category', c)} className="fa-solid fa-pen cursor-pointer text-stone-400 hover:text-blue-500 transition" title="Edit"></i>
                                            <i onClick={()=>{ if(confirm('Delete?')) window.FirebaseApp.deleteDoc(window.FirebaseApp.doc(db, 'categories', c.id))}} className="fa-solid fa-times cursor-pointer text-stone-400 hover:text-red-500 transition" title="Delete"></i>
                                        </div>
                                    )}
                                </div>
                            ))}
                        </div>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-2xl border shadow-sm">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-lg font-bold text-stone-800"><i className="fa-solid fa-cubes-stacked mr-2 text-stone-400"></i> Sugar Levels</h3>
                                {isSuper && <button onClick={() => handleAddClick('sugar')} className="bg-stone-100 hover:bg-stone-200 text-stone-700 px-3 py-1.5 rounded-lg text-sm font-bold shadow-sm transition"><i className="fa-solid fa-plus"></i></button>}
                            </div>
                            <div className="flex flex-col gap-2">
                                {sugarOptions.map(c => (
                                    <div key={c.id} className="bg-stone-50 border border-stone-200 px-4 py-2 rounded-lg text-sm font-bold text-stone-700 flex justify-between items-center">
                                        <div className="flex items-center gap-2">
                                            <span className="text-[10px] bg-stone-200 text-stone-600 px-1.5 py-0.5 rounded font-black">#{c.order ?? 0}</span>
                                            {c.name} 
                                        </div>
                                        {isSuper && (
                                            <div className="flex gap-3">
                                                <i onClick={()=>handleEditClick('sugar', c)} className="fa-solid fa-pen cursor-pointer text-stone-400 hover:text-blue-500 transition" title="Edit"></i>
                                                <i onClick={()=>{ if(confirm('Delete?')) window.FirebaseApp.deleteDoc(window.FirebaseApp.doc(db, 'sugar_options', c.id))}} className="fa-solid fa-trash cursor-pointer text-stone-400 hover:text-red-500 transition" title="Delete"></i>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>

                        <div className="bg-white p-6 rounded-2xl border shadow-sm">
                            <div className="flex justify-between items-center mb-4">
                                <h3 className="text-lg font-bold text-stone-800"><i className="fa-solid fa-snowflake mr-2 text-blue-400"></i> Ice Levels</h3>
                                {isSuper && <button onClick={() => handleAddClick('ice')} className="bg-stone-100 hover:bg-stone-200 text-stone-700 px-3 py-1.5 rounded-lg text-sm font-bold shadow-sm transition"><i className="fa-solid fa-plus"></i></button>}
                            </div>
                            <div className="flex flex-col gap-2">
                                {iceOptions.map(c => (
                                    <div key={c.id} className="bg-blue-50 border border-blue-100 px-4 py-2 rounded-lg text-sm font-bold text-blue-800 flex justify-between items-center">
                                        <div className="flex items-center gap-2">
                                            <span className="text-[10px] bg-blue-200 text-blue-800 px-1.5 py-0.5 rounded font-black">#{c.order ?? 0}</span>
                                            {c.name} 
                                        </div>
                                        {isSuper && (
                                            <div className="flex gap-3">
                                                <i onClick={()=>handleEditClick('ice', c)} className="fa-solid fa-pen cursor-pointer text-blue-400 hover:text-blue-600 transition" title="Edit"></i>
                                                <i onClick={()=>{ if(confirm('Delete?')) window.FirebaseApp.deleteDoc(window.FirebaseApp.doc(db, 'ice_options', c.id))}} className="fa-solid fa-trash cursor-pointer text-blue-400 hover:text-red-500 transition" title="Delete"></i>
                                            </div>
                                        )}
                                    </div>
                                ))}
                            </div>
                        </div>
                    </div>

                    {modalOpen && (
                        <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <form onSubmit={handleModalSubmit} className="bg-white rounded-3xl w-full max-w-sm p-6 shadow-2xl animate-fade-in relative">
                                <button type="button" onClick={() => setModalOpen(false)} className="absolute top-4 right-4 text-stone-400 hover:text-stone-700"><i className="fa-solid fa-xmark text-lg"></i></button>
                                <h3 className="text-xl font-bold mb-4">
                                    {editingId ? 'Edit ' : 'Add '}
                                    {modalType === 'category' ? 'Category' : modalType === 'sugar' ? 'Sugar Level' : 'Ice Level'}
                                </h3>
                                <div className="mb-4">
                                    <label className="block text-sm font-semibold text-stone-700 mb-1">Name *</label>
                                    <input type="text" required placeholder={modalType === 'category' ? 'e.g. Coffee, Tea...' : modalType === 'sugar' ? 'e.g. 50%, Less Sugar...' : 'e.g. Normal Ice, No Ice...'} className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50 text-[16px]" value={inputValue} onChange={e => setInputValue(e.target.value)} autoFocus />
                                </div>
                                <div className="mb-6">
                                    <label className="block text-sm font-semibold text-stone-700 mb-1">Sorting Order Number *</label>
                                    <input type="number" required placeholder="e.g. 1" className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50 text-[16px]" value={orderValue} onChange={e => setOrderValue(e.target.value)} />
                                    <p className="text-xs text-stone-400 mt-1.5"><i className="fa-solid fa-circle-info mr-1"></i> Lower numbers appear first on the menu.</p>
                                </div>
                                <div className="flex justify-end gap-2">
                                    <button type="button" onClick={() => setModalOpen(false)} className="px-5 py-2.5 rounded-xl font-semibold text-stone-600 hover:bg-stone-200 transition">Cancel</button>
                                    <button type="submit" className="px-5 py-2.5 rounded-xl font-bold bg-stone-900 text-white hover:bg-stone-800 shadow-md transition">{editingId ? 'Save Changes' : 'Add'}</button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootApp />);
    </script>

    <!-- Service Worker Registration for Offline Caching & Background Sync -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('ServiceWorker registered successfully with scope: ', registration.scope);
                        
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    console.log('Background Sync Complete: New app version is ready.');
                                }
                            });
                        });
                    })
                    .catch((error) => console.log('ServiceWorker registration failed: ', error));
            });
        }
    </script>
</body>
</html>
