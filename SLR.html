                                        <input type="email" required disabled={!!editingId} placeholder="staff@solaris.com" className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50 disabled:opacity-60 disabled:cursor-not-allowed text-[16px]" value={formData.email} onChange={e => setFormData({...formData, email: e.target.value})} />
                                    </div>
                                    {!editingId && (
                                        <div>
                                            <label className="block text-sm font-semibold text-stone-700 mb-1">Password</label>
                                            <input type="password" required placeholder="Minimum 6 characters" className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50 text-[16px]" value={formData.password} onChange={e => setFormData({...formData, password: e.target.value})} />
                                        </div>
                                    )}
                                    <div>
                                        <label className="block text-sm font-semibold text-stone-700 mb-1">Staff Role</label>
                                        <select required className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50 text-[16px]" value={formData.role} onChange={e => setFormData({...formData, role: e.target.value})}>
                                            <option value="Admin">Admin (All Access)</option>
                                            <option value="Manager">Branch Manager</option>
                                            <option value="Cashier">Cashier</option>
                                            <option value="Barista">Barista</option>
                                            <option value="Kitchen">Kitchen Staff</option>
                                        </select>
                                    </div>
                                    {formData.role !== 'Admin' && (
                                        <div className="animate-fade-in">
                                            <label className="block text-sm font-semibold text-stone-700 mb-1">Assign Branch</label>
                                            <select required className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50 text-[16px]" value={formData.shopId} onChange={e => setFormData({...formData, shopId: e.target.value})}>
                                                <option value="" disabled>Select Branch...</option>

                                        {isProcessing ? 'Processing...' : 'Save Staff'}

                            </form>

        function KDSView({ orders, tables, shops, onBack, currentAdminRecord }) {
            const isSuper = (currentAdminRecord?.role || 'Admin') === 'Admin';
            const [filterShopId, setFilterShopId] = useState(isSuper ? 'All' : (currentAdminRecord?.shopId || 'All'));

            const activeOrders = useMemo(() => {
                return orders.filter(o => 
                    ['New', 'Preparing', 'Ready'].includes(o.status) &&
                    (filterShopId === 'All' || o.shopId === filterShopId)
                ).sort((a, b) => a.createdAt - b.createdAt);
            }, [orders, filterShopId]);

            const updateStatus = async (orderId, newStatus) => {
                const { doc, updateDoc } = window.FirebaseApp;
                const updateData = { status: newStatus };
                if (newStatus === 'Ready' || newStatus === 'Served' || newStatus === 'Cancelled') {
                    updateData.completedAt = Date.now();
                }
                await updateDoc(doc(getColRef('orders'), orderId), updateData);
            };

            const updatePayment = async (orderId, payStatus, payMethod) => {
                const { doc, updateDoc } = window.FirebaseApp;
                await updateDoc(doc(getColRef('orders'), orderId), {
                    paymentStatus: payStatus,
                    paymentMethod: payMethod
                });
            };

            const toggleItemDone = async (order, itemIdx) => {
                const { doc, updateDoc } = window.FirebaseApp;
                const updatedItems = [...order.items];
                updatedItems[itemIdx] = {
                    ...updatedItems[itemIdx],
                    done: !updatedItems[itemIdx].done
                };
                await updateDoc(doc(getColRef('orders'), order.id), { items: updatedItems });
            };

            const statusBorders = {
                'New': 'border-blue-500',
                'Preparing': 'border-amber-500',
                'Ready': 'border-green-500'
            };

            const statusBadges = {
                'New': 'bg-blue-100 text-blue-800 border-blue-200',
                'Preparing': 'bg-amber-100 text-amber-800 border-amber-200',
                'Ready': 'bg-green-100 text-green-800 border-green-200'
            };

            return (
                <div className="h-full flex flex-col">
                    {/* Header */}
                    <div className="flex justify-between items-center mb-6 shrink-0">
                        <div>
                            <h2 className="text-2xl font-bold text-stone-800">Kitchen Display System</h2>
                            <p className="text-stone-500 text-sm mt-1">Manage active orders.</p>
                        </div>

                                    {shops.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                </select>

                                    <i className="fa-solid fa-location-dot mr-2"></i>

                    {/* Grid Layout Container */}
                    <div className="flex-1 overflow-y-auto pb-4 pr-1">
                        {activeOrders.length === 0 ? (
                            <div className="w-full flex flex-col items-center justify-center text-stone-400 h-full min-h-[300px] bg-white rounded-2xl border-2 border-dashed border-stone-200">
                                <i className="fa-solid fa-check-double text-5xl mb-4 opacity-30 text-green-500"></i>
                                <p className="font-bold text-xl text-stone-600">Kitchen is clear!</p>
                                <p className="text-sm mt-1">No active orders right now.</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-5 items-start">
                                {activeOrders.map(order => {
                                    const orderShop = shops.find(s => s.id === order.shopId);
                                    const shopName = orderShop ? orderShop.name : 'Unknown Branch';
                                    
                                    return (
                                    <div key={order.id} className={`bg-white rounded-2xl shadow-sm border-t-4 border-x border-b border-stone-200 flex flex-col overflow-hidden transition-all hover:shadow-md ${statusBorders[order.status]}`}>
                                        {/* Clean Header */}
                                        <div className="p-4 border-b border-stone-100 flex justify-between items-start bg-stone-50/50">
                                            <div>
                                                <div className="text-[10px] font-bold text-stone-400 uppercase tracking-widest mb-1 flex items-center gap-1">
                                                    <i className="fa-solid fa-store"></i> {shopName}
                                                </div>
                                                <div className="font-black text-3xl text-stone-800 leading-none mb-1.5">{order.queueNo}</div>
                                                <div className={`inline-block px-2 py-0.5 rounded text-[10px] font-bold uppercase tracking-wider ${order.orderType === 'TAKEAWAY' ? 'bg-stone-800 text-white' : 'bg-amber-100 text-amber-800'}`}>
                                                    {order.orderType === 'TAKEAWAY' ? 'Take Away' : `Table ${order.tableName}`}
                                                </div>
                                            </div>
                                            <div className="flex flex-col items-end gap-2">
                                                <span className={`px-2 py-0.5 rounded border text-[10px] font-bold uppercase tracking-wider ${statusBadges[order.status]}`}>
                                                    {order.status}
                                                </span>
                                                <LiveOrderTimer createdAt={order.createdAt} completedAt={order.completedAt} status={order.status} />
                                            </div>
                                        </div>

                                        {/* Order Items */}
                                        <div className="p-4 flex-1 bg-white">
                                            {order.notes && (
                                                <div className="mb-4 bg-amber-50 text-amber-800 p-3 rounded-xl border border-amber-200 text-sm font-bold shadow-sm flex items-start gap-2">
                                                    <i className="fa-solid fa-note-sticky mt-0.5 text-amber-500"></i>
                                                    <span>{order.notes}</span>
                                                </div>
                                            )}
                                            <div className="space-y-3">
                                                {order.items.map((item, idx) => (
                                                    <div key={idx} onClick={() => toggleItemDone(order, idx)} className={`group p-3 rounded-xl border flex items-start gap-3 cursor-pointer transition-all select-none ${item.done ? 'bg-stone-50 border-stone-200 opacity-60 hover:opacity-80' : 'bg-white border-stone-200 hover:border-amber-400 hover:shadow-sm'}`}>
                                                        <div className="mt-0.5">
                                                             <i className={`fa-regular ${item.done ? 'fa-square-check text-green-500 text-xl' : 'fa-square text-stone-300 text-xl group-hover:text-amber-400 transition-colors'}`}></i>
                                                        </div>
                                                        <div className="flex-1">
                                                            <div className={`font-bold text-base flex items-start gap-2.5 transition-colors ${item.done ? 'text-stone-500 line-through' : 'text-stone-800'}`}>
                                                                <span className={`px-2 py-0.5 rounded-md flex items-center justify-center text-sm shadow-sm transition-colors border ${item.done ? 'bg-stone-200 text-stone-500 border-stone-300' : 'bg-stone-800 text-white border-stone-900'}`}>{item.quantity}x</span> 
                                                                <span className="leading-tight mt-0.5">{item.name}</span>
                                                            </div>
                                                            <div className={`text-[11px] font-semibold mt-2 flex flex-wrap gap-1.5 transition-colors ${item.done ? 'text-stone-400' : 'text-stone-500'}`}>
                                                                <span className="bg-stone-100 px-1.5 py-0.5 rounded border border-stone-200">Size: {item.size}</span>
                                                                {item.sugar && <span className="bg-stone-100 px-1.5 py-0.5 rounded border border-stone-200">Sugar: {item.sugar}</span>}
                                                                {item.ice && <span className="bg-stone-100 px-1.5 py-0.5 rounded border border-stone-200">Ice: {item.ice}</span>}
                                                            </div>
                                                        </div>
                                                    </div>
                                                ))}
                                            </div>
                                        </div>

                                        {/* Action Footer */}
                                        <div className="p-4 bg-stone-50 border-t border-stone-100 flex flex-col gap-3">
                                            {/* Payment Status Bar */}
                                            <div className="flex items-center justify-between bg-white px-3 py-2 rounded-lg border border-stone-200 shadow-sm">
                                                <div className="flex items-center gap-2">
                                                    {order.paymentStatus === 'Paid' ? (
                                                        <><i className="fa-solid fa-circle-check text-green-500"></i> <span className="text-xs font-bold text-stone-700">Paid ({order.paymentMethod})</span></>
                                                    ) : (
                                                        <><i className="fa-solid fa-triangle-exclamation text-red-500"></i> <span className="text-xs font-bold text-red-600">Unpaid</span></>
                                                    )}
                                                </div>
                                                
                                                {/* Quick Payment Toggles for KDS */}
                                                {order.paymentStatus === 'Paid' ? (
                                                    <button onClick={() => updatePayment(order.id, 'Unpaid', 'N/A')} className="text-[10px] font-bold text-stone-400 hover:text-stone-600 transition" title="Undo Payment">UNDO</button>
                                                ) : (
                                                    <div className="flex gap-1.5">
                                                        <button onClick={() => updatePayment(order.id, 'Paid', 'Cash')} className="px-2 py-1 bg-stone-100 border border-stone-200 hover:bg-stone-200 text-stone-600 rounded text-[10px] font-bold transition">CASH</button>
                                                        <button onClick={() => updatePayment(order.id, 'Paid', 'Bank')} className="px-2 py-1 bg-blue-50 border border-blue-200 hover:bg-blue-100 text-blue-600 rounded text-[10px] font-bold transition">BANK</button>
                                                    </div>
                                                )}
                                            </div>

                                            {/* Main Status Actions */}
                                            <div className="grid grid-cols-2 gap-2">
                                                {order.status === 'New' && <button onClick={() => updateStatus(order.id, 'Preparing')} className="col-span-2 bg-amber-500 hover:bg-amber-600 text-white font-bold py-3 rounded-xl transition shadow-sm">Start Preparing</button>}
                                                {order.status === 'Preparing' && (
                                                    <>
                                                        <button onClick={() => updateStatus(order.id, 'New')} className="bg-stone-200 hover:bg-stone-300 text-stone-700 font-bold py-3 rounded-xl transition">Undo</button>
                                                        <button onClick={() => updateStatus(order.id, 'Ready')} className="bg-green-500 hover:bg-green-600 text-white font-bold py-3 rounded-xl transition shadow-sm">Mark Ready</button>
                                                    </>
                                                )}
                                                {order.status === 'Ready' && (
                                                    <>
                                                        <button onClick={() => updateStatus(order.id, 'Preparing')} className="bg-stone-200 hover:bg-stone-300 text-stone-700 font-bold py-3 rounded-xl transition">Undo</button>
                                                        <button 
                                                            onClick={() => updateStatus(order.id, 'Served')} 
                                                            disabled={order.paymentStatus !== 'Paid'}
                                                            className={`font-bold py-3 rounded-xl transition shadow-sm ${order.paymentStatus === 'Paid' ? 'bg-stone-800 hover:bg-stone-900 text-white' : 'bg-stone-200 text-stone-400 cursor-not-allowed border border-stone-300'}`}
                                                        >
                                                            {order.paymentStatus === 'Paid' ? 'Serve & Clear' : 'Awaiting Pay'}
                                                        </button>
                                                    </>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                )})}
                            </div>
                        )}
                    </div>
                </div>
            );
        }

        function POSView({ orders, products, categories, tables, shops, sugarOptions, iceOptions, currentAdminRecord }) {
            const isSuper = (currentAdminRecord?.role || 'Admin') === 'Admin';
            const [mode, setMode] = useState('manage'); 
            const [posShopId, setPosShopId] = useState(isSuper ? 'All' : (currentAdminRecord?.shopId || 'All'));
            const [cartShopId, setCartShopId] = useState(isSuper ? '' : currentAdminRecord?.shopId);

            useEffect(() => {
                if (shops.length > 0 && !cartShopId && isSuper) {
                    setCartShopId(shops[0].id);
                }
            }, [shops, cartShopId, isSuper]);
            
            // Robust Time Tracking: Calculate Midnight of the current day using precise Timestamps
            const startOfToday = new Date().setHours(0, 0, 0, 0);
            
            const shopFilteredOrders = useMemo(() => {
                return orders.filter(o => posShopId === 'All' || o.shopId === posShopId);
            }, [orders, posShopId]);

            // 1. Today's Metrics: Every order placed after midnight today
            const todayOrders = shopFilteredOrders.filter(o => o.createdAt >= startOfToday);
            
            // 2. Active Orders Tracker: All active items right now (even if placed right before midnight)
            const activeOrders = shopFilteredOrders.filter(o => ['New', 'Preparing', 'Ready'].includes(o.status));
            
            // 3. Table Base Data: Show ALL of today's orders (including Served/Cancelled) PLUS any older active orders
            const tableBaseOrders = shopFilteredOrders.filter(o => o.createdAt >= startOfToday || ['New', 'Preparing', 'Ready'].includes(o.status));
            
            const [filterStatus, setFilterStatus] = useState('All');
            const [searchOrderQuery, setSearchOrderQuery] = useState('');

            const displayedOrders = useMemo(() => {
                return tableBaseOrders.filter(o => {
                    const matchStatus = filterStatus === 'All' || o.status === filterStatus;
                    const searchLower = searchOrderQuery.toLowerCase();
                    
                    // Crash Protection: Explicitly cast fields to Strings before evaluating
                    const matchSearch = String(o.queueNo || '').toLowerCase().includes(searchLower) || 
                                        String(o.customerName || '').toLowerCase().includes(searchLower) ||
                                        String(o.customerPhone || '').toLowerCase().includes(searchLower) ||
                                        String(o.tableName || '').toLowerCase().includes(searchLower);
                    
                    return matchStatus && matchSearch;
                });
            }, [tableBaseOrders, filterStatus, searchOrderQuery]);

            const updateStatus = async (order, newStatus) => {
                const { doc, updateDoc } = window.FirebaseApp;
                const updateData = { status: newStatus };
                
                if (newStatus === 'Ready' || newStatus === 'Served' || newStatus === 'Cancelled') {
                    updateData.completedAt = Date.now();
                }

                await updateDoc(doc(getColRef('orders'), order.id), updateData);
                
                if (newStatus === 'Served' || newStatus === 'Cancelled') {
                    await releaseTableIfNotUsed(order.tableId, order.id, orders);
                }
            };

            const updatePayment = async (order, payStatus, payMethod) => {
                const { doc, updateDoc } = window.FirebaseApp;
                await updateDoc(doc(getColRef('orders'), order.id), {
                    paymentStatus: payStatus,
                    paymentMethod: payMethod
                });
            };

            const deleteOrder = async (order) => {
                if (confirm("Are you sure you want to completely delete this order? This cannot be undone.")) {
                    try {
                        const { deleteDoc, doc } = window.FirebaseApp;
                        await deleteDoc(doc(db, 'orders', order.id));
                        await releaseTableIfNotUsed(order.tableId, order.id, orders);
                    } catch (err) {
                        alert("Error deleting order: " + err.message);
                    }
                }
            };

            const statusColors = {
                'New': 'bg-blue-100 text-blue-800',
                'Preparing': 'bg-amber-100 text-amber-800',
                'Ready': 'bg-green-100 text-green-800',
                'Served': 'bg-stone-100 text-stone-500',
                'Cancelled': 'bg-red-100 text-red-800'
            };

            const formatDateTime = (timestamp) => {
                const d = new Date(timestamp);
                const day = String(d.getDate()).padStart(2, '0');
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const year = String(d.getFullYear()).slice(-2);
                let hrs = d.getHours();
                const ampm = hrs >= 12 ? 'pm' : 'am';
                hrs = hrs % 12 || 12;
                const mins = String(d.getMinutes()).padStart(2, '0');
                return `${day}-${month}-${year} | ${hrs}:${mins} ${ampm}`;
            };

            const [cart, setCart] = useState([]);
            const [customerName, setCustomerName] = useState('');
            const [activeCategory, setActiveCategory] = useState('All');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [selectedItemForOptions, setSelectedItemForOptions] = useState(null);

            const filteredProducts = useMemo(() => {
                if (!products) return [];
                return products.filter(p => (activeCategory === 'All' || p.category === activeCategory) && p.isAvailable);
            }, [products, activeCategory]);

            const handleSizeClick = (product, size, price) => {
                if (product.hasSugarOption || product.hasIceOption) {
                    const defaultSugar = sugarOptions?.length > 0 ? sugarOptions[0].name : '100%';
                    const defaultIce = iceOptions?.length > 0 ? iceOptions[0].name : 'Normal Ice';
                    setSelectedItemForOptions({ 
                        product, 
                        size, 
                        price, 
                        sugar: product.hasSugarOption ? defaultSugar : null,
                        ice: product.hasIceOption ? defaultIce : null
                    });
                } else {
                    addToCart(product, size, price, null, null);
                }
            };

            const addToCart = (product, size, price, sugar, ice) => {
                setCart(prev => {
                    const existingIndex = prev.findIndex(item => item.productId === product.id && item.size === size && item.sugar === sugar && item.ice === ice);
                    if (existingIndex >= 0) {
                        const newCart = [...prev];
                        newCart[existingIndex].quantity += 1;
                        return newCart;
                    }
                    return [...prev, { productId: product.id, name: product.name, size, price, quantity: 1, image: product.image, sugar, ice }];
                });
            };

            const updateCartQty = (idx, delta) => {
                setCart(prev => {
                    const newCart = [...prev];
                    newCart[idx].quantity += delta;
                    if (newCart[idx].quantity <= 0) newCart.splice(idx, 1);
                    return newCart;
                });
            };

            const cartTotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            const handleCheckout = async (targetStatus, payStatus, payMethod) => {
                if (cart.length === 0) return;
                setIsSubmitting(true);
                const { addDoc } = window.FirebaseApp;
                
                const today = getTodayString();
                const highestQueue = todayOrders.length > 0 ? Math.max(...todayOrders.map(o => parseInt(String(o.queueNo).split('-')[1]) || 0)) : 0;
                const queueString = `A-${(highestQueue + 1).toString().padStart(3, '0')}`;

                const orderData = {
                    queueNo: queueString,
                    orderType: 'TAKEAWAY', 
                    tableId: 'Walk-in',
                    tableName: 'Walk-in',
                    shopId: cartShopId || 'UNKNOWN',
                    customerName: customerName || 'Walk-in',
                    customerPhone: 'N/A', 
                    notes: '',
                    items: cart,
                    totalAmount: cartTotal,
                    status: targetStatus, 
                    paymentStatus: payStatus,
                    paymentMethod: payMethod,
                    dateString: today,
                    createdAt: Date.now()
                };

                if (targetStatus === 'Served' || targetStatus === 'Cancelled') {
                    orderData.completedAt = Date.now();
                }

                try {
                    await addDoc(getColRef('orders'), orderData);
                    await deductInventory(cart, products, cartShopId);
                    
                    setCart([]);
                    setCustomerName('');
                    setMode('manage');
                } catch (err) {
                    console.error("POS Checkout failed:", err);
                    alert("Checkout Blocked by Firebase!\n\nError: " + err.message + "\n\nFix: You must update your Firestore Security Rules to allow writes.");
                } finally {
                    setIsSubmitting(false);
                }
            };

            if (mode === 'pos') {
                return (
                    <div className="h-full flex flex-col md:flex-row gap-6 pb-20 md:pb-0 relative">
                        <div className="flex-1 flex flex-col overflow-hidden bg-white rounded-2xl shadow-sm border border-stone-200">
                            <div className="p-4 border-b border-stone-200 bg-stone-50 flex justify-between items-center shrink-0">
                                <h3 className="font-bold text-stone-800"><i className="fa-solid fa-mug-hot mr-2 text-amber-600"></i> Menu Items</h3>
                                <button onClick={() => setMode('manage')} className="text-sm font-bold text-stone-500 hover:text-stone-800 px-3 py-1.5 bg-white border border-stone-200 rounded-lg transition"><i className="fa-solid fa-arrow-left mr-1"></i> Back to Orders</button>
                            </div>
                            <div className="p-3 flex gap-2 overflow-x-auto no-scrollbar border-b border-stone-100 shrink-0">
                                <button onClick={() => setActiveCategory('All')} className={`px-4 py-1.5 rounded-full text-sm font-semibold whitespace-nowrap transition ${activeCategory === 'All' ? 'bg-stone-900 text-white shadow-md' : 'bg-stone-100 text-stone-600 hover:bg-stone-200'}`}>All</button>
                                {categories?.map(c => (
                                    <button key={c.id} onClick={() => setActiveCategory(c.name)} className={`px-4 py-1.5 rounded-full text-sm font-semibold whitespace-nowrap transition ${activeCategory === c.name ? 'bg-stone-900 text-white shadow-md' : 'bg-stone-100 text-stone-600 hover:bg-stone-200'}`}>{c.name}</button>
                                ))}
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 grid grid-cols-2 lg:grid-cols-3 gap-3 content-start">
                                {filteredProducts.map(p => (
                                    <div key={p.id} className="border border-stone-200 rounded-xl p-3 flex flex-col hover:border-amber-400 hover:shadow-md transition bg-white h-full">
                                        <div className="font-bold text-sm text-stone-800 leading-tight mb-3 line-clamp-2">{p.name}</div>
                                        <div className="mt-auto flex flex-col gap-2">
                                            {p.priceSmall > 0 && <button onClick={()=>handleSizeClick(p, 'S', p.priceSmall)} className="w-full py-2 bg-amber-100 hover:bg-amber-200 text-amber-900 rounded-lg text-xs font-bold border border-amber-300 flex justify-between px-3 transition shadow-sm"><span>S</span><span>{p.priceSmall.toLocaleString()} ៛</span></button>}
                                            {p.priceLarge > 0 && <button onClick={()=>handleSizeClick(p, 'L', p.priceLarge)} className="w-full py-2 bg-amber-100 hover:bg-amber-200 text-amber-900 rounded-lg text-xs font-bold border border-amber-300 flex justify-between px-3 transition shadow-sm"><span>L</span><span>{p.priceLarge.toLocaleString()} ៛</span></button>}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                        
                        <div className="w-full md:w-80 lg:w-96 bg-white rounded-2xl shadow-sm border border-stone-200 flex flex-col shrink-0 h-full">
                            <div className="p-4 border-b border-stone-200 bg-stone-50 font-bold text-stone-800"><i className="fa-solid fa-cart-shopping mr-2 text-amber-600"></i> Current Order</div>
                            <div className="p-4 border-b border-stone-100 shrink-0 bg-white space-y-3">
                                {isSuper ? (
                                    <select className="w-full border border-stone-300 rounded-xl px-4 py-2.5 text-[16px] outline-none focus:border-amber-500 bg-stone-50 font-medium" value={cartShopId} onChange={e=>setCartShopId(e.target.value)}>
                                        <option value="" disabled>Select Branch...</option>
                                        {shops.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                    </select>
                                ) : (
                                    <div className="w-full border border-stone-300 rounded-xl px-4 py-2.5 bg-stone-100 font-medium text-stone-500">
                                        Branch: {shops.find(s=>s.id===cartShopId)?.name || 'Unknown'}
                                    </div>
                                )}
                                <input type="text" placeholder="Customer Name (Walk-in)" className="w-full border border-stone-300 rounded-xl px-4 py-2.5 text-[16px] outline-none focus:border-amber-500 bg-stone-50" value={customerName} onChange={e=>setCustomerName(e.target.value)} />
                            </div>
                            <div className="flex-1 overflow-y-auto p-4 space-y-3">
                                {cart.map((item, idx) => (
                                    <div key={idx} className="flex justify-between items-center text-sm border-b border-stone-50 pb-3">
                                        <div className="flex-1 pr-2">
                                            <div className="font-bold text-stone-800 leading-tight">{item.name}</div>
                                            <div className="text-xs font-medium text-stone-500 mt-0.5">Size: {item.size} {item.sugar && `| ${item.sugar}`} {item.ice && `| ${item.ice}`}</div>
                                            <div className="text-amber-600 font-bold mt-0.5">{(item.price * item.quantity).toLocaleString()} ៛</div>
                                        </div>
                                        <div className="flex items-center gap-2 bg-stone-100 rounded-lg p-1 border border-stone-200 shadow-sm shrink-0">
                                            <button onClick={() => updateCartQty(idx, -1)} className="w-7 h-7 flex items-center justify-center text-stone-600 hover:bg-white rounded shadow-sm transition"><i className="fa-solid fa-minus text-[10px]"></i></button>
                                            <span className="w-5 text-center font-bold">{item.quantity}</span>
                                            <button onClick={() => updateCartQty(idx, 1)} className="w-7 h-7 flex items-center justify-center text-stone-600 hover:bg-white rounded shadow-sm transition"><i className="fa-solid fa-plus text-[10px]"></i></button>
                                        </div>
                                    </div>
                                ))}
                                {cart.length === 0 && <div className="text-center text-stone-400 py-10 text-sm flex flex-col items-center justify-center h-full"><i className="fa-solid fa-basket-shopping text-4xl mb-3 opacity-30 block"></i>Register is empty</div>}
                            </div>
                            <div className="p-4 bg-stone-50 border-t border-stone-200 shrink-0 rounded-b-2xl">
                                <div className="flex justify-between font-black text-xl mb-4 text-stone-800">
                                    <span>Total</span><span>{cartTotal.toLocaleString()} ៛</span>
                                </div>
                                <div className="grid grid-cols-3 gap-2">
                                    <button onClick={()=>handleCheckout('Preparing', 'Unpaid', 'N/A')} disabled={isSubmitting || cart.length === 0} className="w-full bg-stone-700 text-white font-bold py-3 rounded-xl hover:bg-stone-800 disabled:opacity-50 text-[11px] shadow flex flex-col items-center justify-center leading-tight transition">
                                        <span>Send KDS</span>
                                        <span className="text-[9px] font-medium opacity-80 mt-1 uppercase tracking-wider text-amber-300"><i className="fa-solid fa-clock mr-1"></i>Pay Later</span>
                                    </button>
                                    <button onClick={()=>handleCheckout('Preparing', 'Paid', 'Cash')} disabled={isSubmitting || cart.length === 0} className="w-full bg-amber-600 text-white font-bold py-3 rounded-xl hover:bg-amber-700 disabled:opacity-50 text-[11px] shadow flex flex-col items-center justify-center leading-tight transition">
                                        <span>Pay Cash</span>
                                        <span className="text-[9px] font-medium opacity-80 mt-1 uppercase tracking-wider text-white"><i className="fa-solid fa-money-bill mr-1"></i>& Send</span>
                                    </button>
                                    <button onClick={()=>handleCheckout('Preparing', 'Paid', 'Bank')} disabled={isSubmitting || cart.length === 0} className="w-full bg-blue-600 text-white font-bold py-3 rounded-xl hover:bg-blue-700 disabled:opacity-50 text-[11px] shadow flex flex-col items-center justify-center leading-tight transition">
                                        <span>Pay Bank</span>
                                        <span className="text-[9px] font-medium opacity-80 mt-1 uppercase tracking-wider text-white"><i className="fa-solid fa-building-columns mr-1"></i>& Send</span>
                                    </button>
                                </div>
                            </div>
                        </div>

                        {/* Used the newly extracted Customize Modal */}
                        {selectedItemForOptions && (
                            <CustomizeModal 
                                selectedItem={selectedItemForOptions}
                                sugarOptions={sugarOptions}
                                iceOptions={iceOptions}
                                onClose={() => setSelectedItemForOptions(null)}
                                onAddToCart={addToCart}
                            />
                        )}
                    </div>
                );
            }

            return (
                <div className="h-full flex flex-col">
                    <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 shrink-0 gap-4">
                        <h2 className="text-2xl font-bold text-stone-800">POS & Orders</h2>
                        <div className="flex items-center gap-3 w-full sm:w-auto">
                            {isSuper ? (
                                <select className="border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-white shadow-sm font-bold text-stone-700 w-full sm:w-auto" value={posShopId} onChange={e=>setPosShopId(e.target.value)}>
                                    <option value="All">All Branches</option>
                                    {shops.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                </select>
                            ) : (
                                <div className="bg-amber-100 text-amber-900 px-4 py-2 rounded-xl font-bold border border-amber-300 shadow-sm flex items-center">
                                    <i className="fa-solid fa-location-dot mr-2"></i>
                                    {shops.find(s=>s.id===currentAdminRecord?.shopId)?.name || 'Branch'}
                                </div>
                            )}
                            <button onClick={() => setMode('pos')} className="bg-amber-600 text-white px-5 py-2.5 rounded-xl font-bold hover:bg-amber-700 transition shadow-md flex items-center gap-2 whitespace-nowrap">
                                <i className="fa-solid fa-cash-register"></i> New Walk-in
                            </button>
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6 shrink-0">
                        <div className="bg-white p-4 rounded-2xl shadow-sm border border-stone-200">
                            <p className="text-stone-500 text-sm font-medium mb-1">Today's Sales (Collected)</p>
                            <p className="text-2xl font-bold text-green-600">{todayOrders.filter(o=>o.paymentStatus==='Paid').reduce((s,o)=>s+o.totalAmount,0).toLocaleString()} ៛</p>
                        </div>
                        <div className="bg-white p-4 rounded-2xl shadow-sm border border-stone-200">

                                            <span className="text-sm font-medium text-stone-500">{viewingProduct.category}</span>
                                        </div>
                                        <span className={`px-2.5 py-1 text-xs font-bold rounded-lg ${viewingProduct.isAvailable ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                            {viewingProduct.isAvailable ? 'Available' : 'Hidden'}
                                        </span>
                                    </div>
                                    
                                    {viewingProduct.description && (
                                        <p className="text-stone-600 text-sm mt-3 bg-stone-50 p-3 rounded-xl border border-stone-100">{viewingProduct.description}</p>
                                    )}
                                    
                                    <div className="mt-5 grid grid-cols-2 gap-3">
                                        {viewingProduct.priceSmall > 0 && (
                                            <div className="bg-stone-50 p-3 rounded-xl border border-stone-100">
                                                <p className="text-xs text-stone-400 font-bold uppercase tracking-wider mb-1">Small Size</p>
                                                <p className="font-black text-amber-600">{viewingProduct.priceSmall.toLocaleString()} ៛</p>
                                            </div>
                                        )}
                                        <div className="mt-5 flex gap-2">
                                            {viewingProduct.hasSugarOption && <span className="bg-stone-900 text-white px-3 py-1.5 rounded-lg text-xs font-bold"><i className="fa-solid fa-cubes-stacked mr-1.5"></i>Sugar Options</span>}
                                            {viewingProduct.hasIceOption && <span className="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold"><i className="fa-solid fa-snowflake mr-1.5"></i>Ice Options</span>}
                                        </div>
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {isModalOpen && isSuper && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                            <form onSubmit={handleSubmit} className="bg-white p-6 rounded-2xl w-full max-w-md max-h-[90vh] overflow-y-auto space-y-3 shadow-2xl animate-fade-in">
                                <h3 className="font-bold text-lg">{editingId ? 'Edit Product' : 'Add Product'}</h3>
                                <input type="text" required placeholder="Name" className="w-full border rounded p-2 text-[16px]" value={formData.name} onChange={e=>setFormData({...formData, name: e.target.value})}/>
                                <select className="w-full border rounded p-2 text-[16px]" value={formData.category} onChange={e=>setFormData({...formData, category: e.target.value})}>
                                    <option value="" disabled>Select Category</option>
                                    {categories.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}
                                </select>
                                <div className="grid grid-cols-2 gap-3 bg-stone-50 p-3 rounded-lg border border-stone-200">
                                    <div className="space-y-2">
                                        <label className="text-xs font-bold text-stone-500 uppercase tracking-wider">Size S</label>
                                        <input type="number" step="100" placeholder="Price" className="w-full border rounded p-2 text-[16px]" value={formData.priceSmall} onChange={e=>setFormData({...formData, priceSmall: e.target.value})}/>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-xs font-bold text-stone-500 uppercase tracking-wider">Size L</label>
                                        <input type="number" step="100" placeholder="Price" className="w-full border rounded p-2 text-[16px]" value={formData.priceLarge} onChange={e=>setFormData({...formData, priceLarge: e.target.value})}/>
                                    </div>
                                </div>
                                <textarea placeholder="Description" className="w-full border rounded p-2 text-[16px]" value={formData.description} onChange={e=>setFormData({...formData, description: e.target.value})}></textarea>
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="space-y-1">
                                        <label className="block text-xs font-bold text-stone-700">Sugar Customization</label>
                                        <select className="w-full border rounded p-2 bg-stone-50 text-[16px]" value={formData.hasSugarOption ? 'true' : 'false'} onChange={e=>setFormData({...formData, hasSugarOption: e.target.value==='true'})}><option value="false">Off</option><option value="true">On</option></select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="block text-xs font-bold text-stone-700">Ice Customization</label>
                                        <select className="w-full border rounded p-2 bg-stone-50 text-[16px]" value={formData.hasIceOption ? 'true' : 'false'} onChange={e=>setFormData({...formData, hasIceOption: e.target.value==='true'})}><option value="false">Off</option><option value="true">On</option></select>
                                    </div>
                                </div>
                                <input type="file" accept="image/*" onChange={handleUpload} className="w-full border rounded p-2 text-[16px]"/>
                                <select className="w-full border rounded p-2 text-[16px]" value={formData.isAvailable?'true':'false'} onChange={e=>setFormData({...formData, isAvailable: e.target.value==='true'})}>
                                    <option value="true">Available</option><option value="false">Hidden</option>
                                </select>
                                <div className="flex justify-end gap-2 pt-2">
                                    <button type="button" onClick={()=>setIsModalOpen(false)} className="px-4 py-2 border rounded hover:bg-stone-100 transition">Cancel</button>
                                    <button type="submit" className="px-4 py-2 bg-stone-900 text-white rounded hover:bg-stone-800 transition">Save</button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        function SalesView({ orders, shops, currentAdminRecord }) {
            const isSuper = (currentAdminRecord?.role || 'Admin') === 'Admin';
            const [filter, setFilter] = useState('today'); 
            const [filterShopId, setFilterShopId] = useState(isSuper ? 'All' : (currentAdminRecord?.shopId || 'All'));
            
            const filteredOrders = useMemo(() => {
                const now = new Date();
                return orders.filter(o => {
                    const matchShop = filterShopId === 'All' || o.shopId === filterShopId;
                    
                    const orderDate = new Date(o.createdAt);
                    let matchDate = true;
                    if (filter === 'today') matchDate = orderDate.toDateString() === now.toDateString();
                    else if (filter === 'week') {
                        const weekAgo = new Date(); weekAgo.setDate(now.getDate() - 7);
                        matchDate = orderDate >= weekAgo;
                    }
                    else if (filter === 'month') matchDate = orderDate.getMonth() === now.getMonth() && orderDate.getFullYear() === now.getFullYear();
                    
                    return matchShop && matchDate;
                });
            }, [orders, filter, filterShopId]);

            const paidOrders = filteredOrders.filter(o => o.paymentStatus === 'Paid');
            const totalRevenue = paidOrders.reduce((s,o) => s + o.totalAmount, 0);
            const cashRevenue = paidOrders.filter(o => o.paymentMethod === 'Cash').reduce((s,o) => s + o.totalAmount, 0);
            const bankRevenue = paidOrders.filter(o => o.paymentMethod === 'Bank').reduce((s,o) => s + o.totalAmount, 0);
            const pendingRevenue = filteredOrders.filter(o => o.paymentStatus !== 'Paid' && o.status !== 'Cancelled').reduce((s,o) => s + o.totalAmount, 0);

            const exportCSV = () => {
                const headers = "Date,Type,Queue,Table,Customer,Phone,Total,Payment_Status,Payment_Method,Order_Status\n";
                const rows = filteredOrders.map(o => `${new Date(o.createdAt).toLocaleString()},${o.orderType || 'DINE_IN'},${o.queueNo},${o.tableName},"${o.customerName}",${o.customerPhone || 'N/A'},${o.totalAmount},${o.paymentStatus || 'Unpaid'},${o.paymentMethod || 'N/A'},${o.status}`).join("\n");
                const blob = new Blob([headers + rows], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `sales_report_${filter}.csv`;
                link.click();
            };

            return (
                <div id="printable-area">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 no-print gap-4">
                        <h2 className="text-2xl font-bold">Sales Report</h2>
                        <div className="flex flex-wrap gap-2 w-full md:w-auto">
                            {isSuper ? (
                                <select className="border rounded-lg px-3 py-2 bg-white outline-none font-bold text-stone-700 flex-1 md:flex-none" value={filterShopId} onChange={e=>setFilterShopId(e.target.value)}>
                                    <option value="All">All Branches</option>
                                    {shops.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                </select>
                            ) : (
                                <div className="bg-amber-100 text-amber-900 px-4 py-2 rounded-lg font-bold border border-amber-300 shadow-sm flex items-center">
                                    <i className="fa-solid fa-location-dot mr-2"></i> {shops.find(s => s.id === currentAdminRecord?.shopId)?.name}
                                </div>
                            )}
                            <select className="border rounded-lg px-3 py-2 bg-white outline-none flex-1 md:flex-none" value={filter} onChange={e=>setFilter(e.target.value)}>
                                <option value="today">Today</option>
                                <option value="week">Last 7 Days</option>
                                <option value="month">This Month</option>
                            </select>
                            <button onClick={exportCSV} className="bg-green-600 text-white px-4 py-2 rounded-lg font-semibold"><i className="fa-solid fa-file-csv mr-2"></i> CSV</button>
                            <button onClick={() => window.print()} className="bg-stone-900 text-white px-4 py-2 rounded-lg font-semibold"><i className="fa-solid fa-file-pdf mr-2"></i> Print PDF</button>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
                        <div className="bg-white p-4 rounded-2xl shadow-sm border border-stone-200">
                            <p className="text-stone-500 text-sm font-medium">Total Revenue (Paid)</p>
                            <p className="text-2xl font-bold text-green-600 mt-1">{totalRevenue.toLocaleString()} ៛</p>
                        </div>
                        <div className="bg-white p-4 rounded-2xl shadow-sm border border-stone-200">
                            <p className="text-stone-500 text-sm font-medium">Cash Collections</p>
                            <p className="text-2xl font-bold text-stone-900 mt-1">{cashRevenue.toLocaleString()} ៛</p>
                        </div>
                        <div className="bg-white p-4 rounded-2xl shadow-sm border border-stone-200">
                            <p className="text-stone-500 text-sm font-medium">Bank Transfers</p>
                            <p className="text-2xl font-bold text-blue-600 mt-1">{bankRevenue.toLocaleString()} ៛</p>
                        </div>
                        <div className="bg-white p-4 rounded-2xl shadow-sm border border-red-200 bg-red-50/30">
                            <p className="text-red-700 text-sm font-medium">Pending (Unpaid)</p>
                            <p className="text-2xl font-bold text-red-600 mt-1">{pendingRevenue.toLocaleString()} ៛</p>
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl border shadow-sm overflow-auto">
                        <table className="w-full min-w-[800px] text-left text-sm border-collapse border border-stone-300">
                            <thead>
                                <tr className="text-stone-700 uppercase tracking-wider bg-stone-100">
                                    <th className="p-3 font-bold border border-stone-300">Date</th>
                                    <th className="p-3 font-bold border border-stone-300">Queue / Table</th>
                                    <th className="p-3 font-bold border border-stone-300">Total</th>
                                    <th className="p-3 font-bold border border-stone-300">Payment</th>
                                    <th className="p-3 font-bold border border-stone-300">Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filteredOrders.map(o => (
                                    <tr key={o.id} className="hover:bg-stone-50 bg-white">
                                        <td className="p-3 border border-stone-300 align-top">{new Date(o.createdAt).toLocaleString()}</td>
                                        <td className="p-3 border border-stone-300 align-top">
                                            <span className="font-semibold">{o.queueNo}</span>
                                            <span className="text-xs text-stone-500 ml-2">Tbl: {o.tableName}</span>
                                        </td>
                                        <td className="p-3 border border-stone-300 align-top font-bold">{o.totalAmount.toLocaleString()} ៛</td>
                                        <td className="p-3 border border-stone-300 align-top">
                                            {o.paymentStatus === 'Paid' ? (
                                                <span className="text-[10px] font-bold uppercase tracking-wider bg-green-100 text-green-700 px-2 py-1 rounded">Paid ({o.paymentMethod})</span>
                                            ) : (
                                                <span className="text-[10px] font-bold uppercase tracking-wider bg-red-100 text-red-700 px-2 py-1 rounded">Unpaid</span>
                                            )}
                                        </td>
                                        <td className="p-3 border border-stone-300 align-top">{o.status}</td>
                                    </tr>
                                ))}
                                {filteredOrders.length === 0 && <tr><td colSpan="5" className="text-center py-4 text-stone-400 border border-stone-300">No sales found.</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        function CustomersView({ orders }) {
            const [searchQuery, setSearchQuery] = useState('');
            const [selectedCustomer, setSelectedCustomer] = useState(null);

            // Aggregate raw orders into Customer Profiles
            const customersData = useMemo(() => {
                const map = new Map();
                orders.forEach(o => {
                    if (!o.customerPhone || o.customerPhone === 'N/A') return; // Skip walk-ins without a phone
                    
                    if (!map.has(o.customerPhone)) {
                        map.set(o.customerPhone, {
                            phone: o.customerPhone,
                            name: o.customerName || 'Unknown',
                            totalSpent: 0,
                            orderCount: 0,
                            lastVisit: o.createdAt,
                            orders: []
                        });
                    }
                    
                    const c = map.get(o.customerPhone);
                    c.totalSpent += o.totalAmount;
                    c.orderCount += 1;
                    if (o.createdAt > c.lastVisit) c.lastVisit = o.createdAt;
                    
                    // Keep the latest known name
                    if (o.customerName && o.customerName !== 'Unknown' && o.createdAt >= c.lastVisit) {
                        c.name = o.customerName;
                    }
                    
                    c.orders.push(o);
                });
                
                // Sort by most recent visit
                return Array.from(map.values()).sort((a, b) => b.lastVisit - a.lastVisit);
            }, [orders]);

            const filteredCustomers = customersData.filter(c => 
                c.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                c.phone.includes(searchQuery)
            );

            const deleteInvoice = async (orderId) => {
                if (confirm("Are you sure you want to permanently delete this invoice? This action cannot be undone.")) {
                    try {
                        const { deleteDoc, doc } = window.FirebaseApp;
                        await deleteDoc(doc(db, 'orders', orderId));
                        
                        // If we have a selected customer, we need to artificially update their modal view
                        if (selectedCustomer) {
                            setSelectedCustomer(prev => ({
                                ...prev,
                                orders: prev.orders.filter(o => o.id !== orderId)
                            }));
                        }
                    } catch (err) {
                        alert("Error deleting invoice: " + err.message);
                    }
                }
            };

            return (
                <div className="max-w-6xl h-full flex flex-col">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center mb-6 gap-4 shrink-0">
                        <div>
                            <h2 className="text-2xl font-bold text-stone-800">Customer Logs & CRM</h2>
                            <p className="text-sm text-stone-500 font-medium mt-1">Track regulars, lifetime value, and order history.</p>
                        </div>
                        <div className="relative w-full md:w-72">
                            <i className="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-stone-400"></i>
                            <input 
                                type="text" 
                                placeholder="Search by name or phone..." 
                                className="w-full border border-stone-300 rounded-xl pl-9 pr-4 py-2 outline-none focus:border-amber-600 bg-white shadow-sm text-sm" 
                                value={searchQuery} 
                                onChange={e=>setSearchQuery(e.target.value)} 
                            />
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl shadow-sm border border-stone-200 flex-1 overflow-hidden flex flex-col">
                        <div className="flex-1 overflow-auto p-4">
                            <table className="w-full min-w-[800px] text-left text-sm border-collapse border border-stone-300">
                                <thead>
                                    <tr className="bg-stone-100 text-stone-700 uppercase tracking-wider border-b border-stone-300">
                                        <th className="p-3 font-bold border border-stone-300">Customer Info</th>
                                        <th className="p-3 font-bold border border-stone-300">Lifetime Value</th>
                                        <th className="p-3 font-bold border border-stone-300">Total Visits</th>
                                        <th className="p-3 font-bold border border-stone-300">Last Visit</th>
                                        <th className="p-3 font-bold text-right border border-stone-300">Actions</th>
                                    </tr>
                                </thead>
                                <tbody>
                                    {filteredCustomers.map(customer => (
                                        <tr key={customer.phone} className="hover:bg-amber-50 transition-colors bg-white">
                                            <td className="p-3 border border-stone-300">
                                                <div className="font-bold text-stone-900 text-base">{customer.name}</div>
                                                <div className="text-stone-500 font-medium text-xs mt-0.5"><i className="fa-solid fa-phone mr-1"></i>{customer.phone}</div>
                                            </td>
                                            <td className="p-3 border border-stone-300 font-black text-amber-700">
                                                {customer.totalSpent.toLocaleString()} ៛
                                            </td>
                                            <td className="p-3 border border-stone-300 font-bold text-stone-700">
                                                {customer.orderCount} Orders
                                            </td>
                                            <td className="p-3 border border-stone-300 text-stone-500 font-medium">
                                                {new Date(customer.lastVisit).toLocaleDateString()}
                                            </td>
                                            <td className="p-3 border border-stone-300 text-right">
                                                <button onClick={() => setSelectedCustomer(customer)} className="px-4 py-2 bg-stone-900 text-white rounded-lg text-xs font-bold hover:bg-stone-800 transition shadow-sm">
                                                    View Invoices
                                                </button>
                                            </td>
                                        </tr>
                                    ))}
                                    {filteredCustomers.length === 0 && (
                                        <tr><td colSpan="5" className="text-center py-10 text-stone-400 border border-stone-300 font-medium">No customers found.</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Customer Invoice Modal */}
                    {selectedCustomer && (
                        <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl w-full max-w-2xl h-[85vh] flex flex-col shadow-2xl animate-fade-in relative">
                                <div className="p-6 border-b border-stone-200 bg-stone-50 flex justify-between items-center shrink-0 rounded-t-3xl">
                                    <div>
                                        <h3 className="text-xl font-black text-stone-900">{selectedCustomer.name}'s History</h3>
                                        <p className="text-sm font-medium text-stone-500 mt-1">{selectedCustomer.phone}</p>
                                    </div>
                                    <button onClick={() => setSelectedCustomer(null)} className="w-8 h-8 rounded-full bg-stone-200 flex items-center justify-center text-stone-600 hover:bg-stone-300 transition">
                                        <i className="fa-solid fa-xmark"></i>
                                    </button>
                                </div>
                                
                                <div className="flex-1 overflow-y-auto p-6 bg-stone-100 space-y-4">
                                    {selectedCustomer.orders.length === 0 && (
                                        <div className="text-center py-10 text-stone-400">All invoices deleted.</div>
                                    )}
                                    {/* Sort individual customer orders by date descending */}
                                    {selectedCustomer.orders.sort((a,b) => b.createdAt - a.createdAt).map(order => (
                                        <div key={order.id} className="bg-white border border-stone-200 rounded-2xl p-5 shadow-sm">
                                            <div className="flex justify-between items-start mb-3 border-b border-stone-100 pb-3">
                                                <div>
                                                    <div className="font-bold text-stone-800 mb-1">Queue: {order.queueNo}</div>
                                                    <div className="text-xs font-semibold text-stone-400">
                                                        {new Date(order.createdAt).toLocaleString()}
                                                    </div>
                                                </div>
                                                <div className="text-right">
                                                    <div className="font-black text-amber-600 text-lg">{order.totalAmount.toLocaleString()} ៛</div>
                                                    <div className={`inline-block px-2 py-0.5 mt-1 rounded text-[10px] font-bold uppercase tracking-wider ${order.status === 'Served' ? 'bg-green-100 text-green-700' : order.status === 'Cancelled' ? 'bg-red-100 text-red-700' : 'bg-stone-100 text-stone-600'}`}>
                                                        {order.status}
                                                    </div>
                                                </div>
                                            </div>
                                            
                                            <div className="mb-4">
                                                <ul className="text-sm space-y-1.5 text-stone-700 font-medium">
                                                    {order.items.map((i, idx) => (
                                                        <li key={idx} className="flex justify-between">
                                                            <span><b className="text-amber-800 bg-amber-50 px-1 rounded border border-amber-200 mr-2">{i.quantity}x</b> {i.name}</span>
                                                            <span className="text-stone-400 text-xs">{(i.price * i.quantity).toLocaleString()} ៛</span>
                                                        </li>
                                                    ))}
                                                </ul>
                                            </div>

                                            <div className="flex justify-end pt-3 border-t border-stone-50">
                                                <button onClick={() => deleteInvoice(order.id)} className="text-red-500 hover:text-red-700 text-xs font-bold px-3 py-1.5 bg-red-50 hover:bg-red-100 rounded transition flex items-center gap-2">
                                                    <i className="fa-solid fa-trash"></i> Delete Record
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootApp />);
    </script>

    <!-- Service Worker Registration for Offline Caching & Background Sync -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('ServiceWorker registered successfully with scope: ', registration.scope);
                        
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    console.log('Background Sync Complete: New app version is ready.');
                                }
                            });
                        });
                    })
                    .catch((error) => console.log('ServiceWorker registration failed: ', error));
            });
        }
    </script>
</body>
</html>
