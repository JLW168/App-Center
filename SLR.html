<body class="bg-stone-50 font-sans text-stone-900">
    <div id="root">

    <!-- Firebase Init -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, initializeFirestore, persistentLocalCache, persistentMultipleTabManager, collection, doc, setDoc, getDocs, onSnapshot, addDoc, updateDoc, deleteDoc, increment } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        window.FirebaseApp = {
            initializeApp, getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, 
            onAuthStateChanged, signOut, signInAnonymously,
            getFirestore, initializeFirestore, persistentLocalCache, persistentMultipleTabManager, 
            collection, doc, setDoc, getDocs, onSnapshot, 
            addDoc, updateDoc, deleteDoc, increment
        };
        window.dispatchEvent(new Event('firebase-loaded'));
    </script>

    <!-- React App -->
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyADedJwnXvUv3bK_OBkzzbOw82L8QuAC8Q",
            authDomain: "solaris-1f4cb.firebaseapp.com",
            projectId: "solaris-1f4cb",
            storageBucket: "solaris-1f4cb.firebasestorage.app",
            messagingSenderId: "372761640969",
            appId: "1:372761640969:web:91f24d3f7a93babd6cf8d8",
            measurementId: "G-VR3L5HWHFD"
        };

        let app, auth, db, getColRef;

        function initializeFirebase() {
            if (app) return;
            const { initializeApp, getAuth, getFirestore, initializeFirestore, persistentLocalCache, persistentMultipleTabManager, collection } = window.FirebaseApp;
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            
            try {
                db = initializeFirestore(app, {
                    localCache: persistentLocalCache({ tabManager: persistentMultipleTabManager() })
                });
                console.log("Firestore initialized (Persistent Cache Mode).");
            } catch (err) {
                console.warn("Failed to initialize persistent cache, falling back to standard: ", err);
                db = getFirestore(app); 
            }
            
            getColRef = (colName) => collection(db, colName);
        }

        const resizeImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const SIZE = 200; 
                        canvas.width = SIZE;
                        canvas.height = SIZE;
                        const ctx = canvas.getContext('2d');
                        
                        const minDim = Math.min(img.width, img.height);
                        const startX = (img.width - minDim) / 2;
                        const startY = (img.height - minDim) / 2;
                        
                        ctx.drawImage(img, startX, startY, minDim, minDim, 0, 0, SIZE, SIZE);
                        resolve(canvas.toDataURL('image/webp', 0.4));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        };

        const getTodayString = () => {
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        const deductInventory = async (cart, products, orderShopId) => {
            const { doc, updateDoc, increment } = window.FirebaseApp;
            const stockUpdates = {}; 

            cart.forEach(item => {
                const product = products.find(p => p.id === item.productId);
                if (product) {
                    const recipe = item.size === 'S' ? product.recipeSmall : product.recipeLarge;
                    if (recipe && Array.isArray(recipe)) {
                        recipe.forEach(ing => {
                            if (ing.ingredientId && ing.qty) {
                                if (!stockUpdates[ing.ingredientId]) stockUpdates[ing.ingredientId] = 0;
                                stockUpdates[ing.ingredientId] += (ing.qty * item.quantity);
                            }
                        });
                    }
                }
            });

            if (!orderShopId || orderShopId === 'UNKNOWN' || orderShopId === 'TAKEAWAY') return;

            for (const [ingredientId, amount] of Object.entries(stockUpdates)) {
                try {
                    await updateDoc(doc(db, 'ingredients', ingredientId), {
                        [`stockByShop.${orderShopId}`]: increment(-amount)
                    });
                } catch (err) {
                    console.warn("Failed to deduct stock for ", ingredientId, err);
                }
            }
        };

        const releaseTableIfNotUsed = async (tableId, currentOrderId, allOrders) => {
            if (!tableId || tableId === 'Walk-in' || tableId === 'TAKEAWAY') return;
            const otherActive = allOrders.find(o => o.tableId === tableId && o.id !== currentOrderId && ['New', 'Preparing', 'Ready'].includes(o.status));
            if (!otherActive) {
                try {
                    const { doc, updateDoc } = window.FirebaseApp;
                    await updateDoc(doc(db, 'tables', tableId), { status: 'Available' });
                } catch (e) {}
            }
        };

        // --- Root & Data Fetching ---
        function RootApp() {
            const [isReady, setIsReady] = useState(!!window.FirebaseApp);
            
            useEffect(() => {
                const handleReady = () => setIsReady(true);
                if (!isReady) window.addEventListener('firebase-loaded', handleReady);
                return () => window.removeEventListener('firebase-loaded', handleReady);
            }, [isReady]);

            if (!isReady) return <div className="flex h-screen items-center justify-center text-stone-500 font-medium"><i className="fa-solid fa-spinner fa-spin mr-2"></i> Connecting...</div>;

            initializeFirebase();
            return <MainApp />;
        }

        // --- PWA Add To Home Screen Prompt ---
        function AddToHomeScreenPrompt() {
            const [showPrompt, setShowPrompt] = useState(false);
            const [deferredPrompt, setDeferredPrompt] = useState(null);
            const [isIOS, setIsIOS] = useState(false);

            useEffect(() => {
                // 1. Check if already installed / running as standalone
                const isStandalone = window.matchMedia('(display-mode: standalone)').matches || window.navigator.standalone || document.referrer.includes('android-app://');
                
                // 2. Check if user previously dismissed the prompt
                const isDismissed = localStorage.getItem('solaris_a2hs_dismissed');

                if (isStandalone || isDismissed) return;

                // 3. Detect iOS Safari
                const ua = window.navigator.userAgent;
                const isIPad = !!ua.match(/iPad/i);
                const isIPhone = !!ua.match(/iPhone/i);
                const isIOSDevice = isIPad || isIPhone;
                setIsIOS(isIOSDevice);

                // Show instruction prompt for iOS after a slight delay
                if (isIOSDevice) {
                    const timer = setTimeout(() => setShowPrompt(true), 2500);
                    return () => clearTimeout(timer);
                }

                // 4. Catch Android/Chrome native install prompt
                const handleBeforeInstallPrompt = (e) => {
                    e.preventDefault(); // Prevent standard mini-infobar
                    setDeferredPrompt(e);
                    setShowPrompt(true);
                };

                window.addEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
                return () => window.removeEventListener('beforeinstallprompt', handleBeforeInstallPrompt);
            }, []);

            const dismissPrompt = () => {
                setShowPrompt(false);
                localStorage.setItem('solaris_a2hs_dismissed', 'true');
            };

            const handleInstallClick = async () => {
                if (deferredPrompt) {
                    deferredPrompt.prompt();
                    const { outcome } = await deferredPrompt.userChoice;
                    if (outcome === 'accepted') {
                        console.log('User accepted the A2HS prompt');
                    }
                    setDeferredPrompt(null);
                    setShowPrompt(false);
                }
            };

            if (!showPrompt) return null;

            return (
                <div className="fixed bottom-0 left-0 right-0 z-50 p-4 animate-slide-in-bottom pointer-events-none">
                    <div className="max-w-md mx-auto bg-stone-900/95 backdrop-blur-md rounded-3xl p-5 shadow-2xl border border-stone-700 pointer-events-auto flex flex-col gap-4 text-white relative safe-bottom">
                        <button onClick={dismissPrompt} className="absolute top-3 right-4 text-stone-400 hover:text-white transition"><i className="fa-solid fa-xmark text-lg"></i></button>
                        
                        <div className="flex items-start gap-4">
                            <div className="w-14 h-14 rounded-2xl flex items-center justify-center shrink-0 shadow-lg border border-stone-600 overflow-hidden bg-white">
                                <img src="https://i.imgur.com/f10UvD6.jpeg" alt="Solaris Cafe" className="w-full h-full object-cover" decoding="async" />
                            </div>
                            <div className="pr-4">
                                <h4 className="font-bold text-lg leading-tight">Install Solaris Cafe</h4>
                                <p className="text-stone-300 text-xs mt-1 leading-relaxed">Add our app to your home screen for a faster, full-screen ordering experience.</p>
                            </div>
                        </div>

                        {isIOS ? (
                            <div className="bg-white/10 rounded-xl p-3 text-sm text-stone-200 flex items-center justify-center gap-3">
                                <span>Tap</span>
                                <span className="bg-white text-blue-500 w-7 h-7 rounded flex items-center justify-center shadow"><i className="fa-solid fa-arrow-up-from-bracket text-xs"></i></span>
                                <span>then <strong>Add to Home Screen</strong></span>
                            </div>
                        ) : (
                            <button onClick={handleInstallClick} className="w-full bg-amber-500 text-stone-900 font-bold py-3.5 rounded-xl hover:bg-amber-400 transition shadow-md">
                                Install App
                            </button>
                        )}
                    </div>
                </div>
            );
        }

        function MainApp() {
            const [view, setView] = useState('customer'); // customer, admin_login, admin_dashboard
            const [user, setUser] = useState(null);
            
            const [products, setProducts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [sugarOptions, setSugarOptions] = useState([]);
            const [iceOptions, setIceOptions] = useState([]);
            const [tables, setTables] = useState([]);
            const [orders, setOrders] = useState([]);
            const [ingredients, setIngredients] = useState([]);
            const [shops, setShops] = useState([]);
            
            const [loadingProducts, setLoadingProducts] = useState(true);
            const [loadingShops, setLoadingShops] = useState(true);
            const [loadingTables, setLoadingTables] = useState(true);
            const loading = loadingProducts || loadingShops || loadingTables;

            useEffect(() => {
                const hideAddressBar = () => {
                    setTimeout(() => window.scrollTo(0, 1), 100);
                };
                window.addEventListener('load', hideAddressBar);
                window.addEventListener('orientationchange', hideAddressBar);
                hideAddressBar(); 
                
                return () => {
                    window.removeEventListener('load', hideAddressBar);
                    window.removeEventListener('orientationchange', hideAddressBar);
                };
            }, []);

            useEffect(() => {
                const { signInAnonymously, onAuthStateChanged } = window.FirebaseApp;
                const initAuth = async () => { 
                    try { 
                        if (!auth.currentUser) await signInAnonymously(auth); 
                    } catch (err) {
                        console.error("Firebase Auth Error", err);
                    } 
                };
                initAuth();
                const unsub = onAuthStateChanged(auth, setUser);
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const { onSnapshot } = window.FirebaseApp;

                // PRIORITY 1: Customer Catalog (Fast Paint)
                // We turn off the loading skeleton the exact millisecond the products arrive.
                // This guarantees the customer is instantly allowed to browse the menu.
                const unsubP = onSnapshot(getColRef('products'), snap => {
                    setProducts(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.updatedAt-a.updatedAt));
                    setLoadingProducts(false); 
                });
                
                const unsubC = onSnapshot(getColRef('categories'), snap => setCategories(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>a.order-b.order)));
                const unsubS = onSnapshot(getColRef('sugar_options'), snap => setSugarOptions(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>a.order-b.order)));
                const unsubI = onSnapshot(getColRef('ice_options'), snap => setIceOptions(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>a.order-b.order)));
                
                const unsubT = onSnapshot(getColRef('tables'), snap => {
                    setTables(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLoadingTables(false);
                });
                
                const unsubInv = onSnapshot(getColRef('ingredients'), snap => setIngredients(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                
                const unsubShops = onSnapshot(getColRef('shops'), snap => {
                    setShops(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                    setLoadingShops(false);
                });
                
                // PRIORITY 2: Heavy Order History (Background Sync)
                // This loads silently in the background. The user is never blocked waiting for this.
                const unsubO = onSnapshot(getColRef('orders'), snap => {
                    setOrders(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.createdAt-a.createdAt));
                });

                return () => { unsubP(); unsubC(); unsubS(); unsubI(); unsubT(); unsubO(); unsubInv(); unsubShops(); };
            }, [user]);

            return (
                <div className="min-h-screen">
                    {view === 'customer' && <CustomerPortal products={products} categories={categories} tables={tables} orders={orders} shops={shops} currentUser={user} isLoading={loading} sugarOptions={sugarOptions} iceOptions={iceOptions} onAdminClick={() => setView(user && !user.isAnonymous ? 'admin_dashboard' : 'admin_login')} />}
                    {view === 'admin_login' && <AdminLogin shops={shops} onBack={() => setView('customer')} onLogin={() => setView('admin_dashboard')} />}
                    {view === 'admin_dashboard' && <AdminDashboard products={products} categories={categories} tables={tables} orders={orders} ingredients={ingredients} shops={shops} currentUser={user} sugarOptions={sugarOptions} iceOptions={iceOptions} onLogout={() => { window.FirebaseApp.signOut(auth).then(() => setView('customer')); }} onBack={() => setView('customer')} />}
                    
                    <AddToHomeScreenPrompt />
                </div>
            );
        }

        // ==========================================
        //         SHARED UI COMPONENTS
        // ==========================================

        function LiveOrderTimer({ createdAt, completedAt, status }) {
            const [elapsed, setElapsed] = useState(0);

            useEffect(() => {
                const calc = () => {
                    const end = (status === 'Ready' || status === 'Served' || status === 'Cancelled') && completedAt ? completedAt : Date.now();
                    setElapsed(Math.max(0, Math.floor((end - createdAt) / 1000)));
                };
                calc();

                if (status === 'Ready' || status === 'Served' || status === 'Cancelled') return;

                const timer = setInterval(calc, 1000);
                return () => clearInterval(timer);
            }, [createdAt, completedAt, status]);

            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            const timeStr = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            
            let colorClass = "bg-stone-100 text-stone-600 border-stone-200";
            if (status === 'Served' || status === 'Ready') colorClass = "bg-green-50 text-green-700 border-green-200";
            else if (status === 'Cancelled') colorClass = "bg-red-50 text-red-700 border-red-200";
            else if (elapsed > 1800) colorClass = "bg-red-100 text-red-800 border-red-300 animate-pulse"; 
            else if (elapsed > 900) colorClass = "bg-amber-100 text-amber-800 border-amber-300"; 

            return (
                <div className={`flex items-center gap-1.5 text-[10px] font-bold px-2 py-0.5 rounded border ${colorClass}`}>
                    <i className={`fa-solid ${status === 'Served' || status === 'Ready' ? 'fa-check-double' : status === 'Cancelled' ? 'fa-ban' : 'fa-clock'}`}></i>
                    {timeStr}
                </div>
            );
        }

        function OrderProgressBar({ status }) {
            if (status === 'Cancelled') {
                return <div className="text-red-500 font-bold mt-4 p-3 bg-red-50 rounded-lg border border-red-200 text-center"><i className="fa-solid fa-ban mr-2"></i>Order Cancelled</div>;
            }

            const steps = [
                { id: 'New', label: 'Received', icon: 'fa-receipt' },
                { id: 'Preparing', label: 'Preparing', icon: 'fa-fire-burner' },
                { id: 'Ready', label: 'Ready', icon: 'fa-bell' },
                { id: 'Served', label: 'Completed', icon: 'fa-check-double' }
            ];

            const currentIdx = steps.findIndex(s => s.id === status);
            const activeIdx = currentIdx === -1 ? 0 : currentIdx;

            return (
                <div className="mt-5 relative">
                    <div className="absolute top-4 left-4 right-4 h-1 bg-stone-200 rounded-full"></div>
                    <div className="absolute top-4 left-4 h-1 bg-amber-500 rounded-full transition-all duration-500" style={{ width: `${(activeIdx / (steps.length - 1)) * 100}%` }}></div>

                    <div className="flex justify-between relative z-10">
                        {steps.map((step, idx) => {
                            const isCompleted = idx <= activeIdx;
                            const isCurrent = idx === activeIdx;
                            return (
                                <div key={step.id} className="flex flex-col items-center">
                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center border-2 transition-colors duration-300 ${isCompleted ? 'bg-amber-500 border-amber-500 text-white shadow-md' : 'bg-white border-stone-300 text-stone-400'}`}>
                                        <i className={`fa-solid ${step.icon} text-xs`}></i>
                                    </div>
                                    <span className={`text-[10px] mt-1.5 font-bold ${isCurrent ? 'text-amber-600' : isCompleted ? 'text-stone-800' : 'text-stone-400'}`}>{step.label}</span>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function CustomizeModal({ selectedItem, sugarOptions, iceOptions, onClose, onAddToCart }) {
            const [sugar, setSugar] = useState(selectedItem.sugar);
            const [ice, setIce] = useState(selectedItem.ice);

            // Dynamic fallbacks to prevent crashes if the database collections are currently empty
            const sugarList = sugarOptions?.length > 0 ? sugarOptions.map(o => o.name) : ['0%', '30%', '50%', '70%', '100%'];
            const iceList = iceOptions?.length > 0 ? iceOptions.map(o => o.name) : ['Normal Ice', 'Less Ice', 'No Ice', 'Hot'];

            return (
                <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-fade-in">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-xl font-bold text-stone-900">Customize Item</h3>
                            <button onClick={onClose} className="text-stone-400 hover:text-stone-700"><i className="fa-solid fa-xmark text-xl"></i></button>
                        </div>
                        <div className="mb-6">
                            <p className="font-bold text-stone-800">{selectedItem.product.name} ({selectedItem.size})</p>
                            
                            {selectedItem.sugar !== null && (
                                <div className="mt-4">
                                    <p className="text-sm font-semibold text-stone-700 mb-2">Select Sugar Level</p>
                                    <div className="flex flex-wrap gap-2">
                                        {sugarList.map(level => (
                                            <button 
                                                key={level}
                                                onClick={() => setSugar(level)}
                                                className={`px-4 py-2 rounded-xl text-sm font-bold border transition ${sugar === level ? 'bg-amber-600 border-amber-600 text-white' : 'bg-white border-stone-300 text-stone-600 hover:border-amber-400'}`}
                                            >
                                                {level}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {selectedItem.ice !== null && (
                                <div className="mt-6">
                                    <p className="text-sm font-semibold text-stone-700 mb-2">Select Ice Level</p>
                                    <div className="flex flex-wrap gap-2">
                                        {iceList.map(level => (
                                            <button 
                                                key={level}
                                                onClick={() => setIce(level)}
                                                className={`px-4 py-2 rounded-xl text-sm font-bold border transition ${ice === level ? 'bg-blue-600 border-blue-600 text-white' : 'bg-white border-stone-300 text-stone-600 hover:border-blue-400'}`}
                                            >
                                                {level}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                        <button 
                            onClick={() => { 
                                onAddToCart(selectedItem.product, selectedItem.size, selectedItem.price, sugar, ice); 
                                onClose(); 
                            }} 
                            className="w-full bg-stone-900 text-white py-3.5 rounded-xl font-bold hover:bg-stone-800 transition shadow-md"
                        >
                            Add to Cart - {selectedItem.price.toLocaleString()} ៛
                        </button>
                    </div>
                </div>
            );
        }

        function OrderSuccessView({ order, sessionInfo, setSessionInfo, onTrackOrder, onNewOrder }) {
            return (
                <div className="min-h-screen bg-stone-50 flex items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md text-center">
                        <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                            <i className="fa-solid fa-check text-4xl"></i>
                        </div>

        // ==========================================
        // GEOLOCATION & BRANCH AUTO-DETECTION

        function calculateDistance(lat1, lon1, lat2, lon2) {
            const R = 6371e3; // Earth radius in meters
            const φ1 = lat1 * Math.PI/180;
            const φ2 = lat2 * Math.PI/180;
            const Δφ = (lat2-lat1) * Math.PI/180;
            const Δλ = (lon2-lon1) * Math.PI/180;

            const a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                      Math.cos(φ1) * Math.cos(φ2) *
                      Math.sin(Δλ/2) * Math.sin(Δλ/2);
            const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c; // Distance in meters
        }

        function AutoBranchLocator({ shops, onShopDetected, onSkip }) {
            const [status, setStatus] = useState('locating'); // 'locating', 'denied', 'not_found'

            useEffect(() => {
                if (!navigator.geolocation) {
                    setStatus('denied');
                    return;
                }

                navigator.geolocation.getCurrentPosition(
                    (position) => {
                        const userLat = position.coords.latitude;
                        const userLng = position.coords.longitude;
                        
                        let nearestShop = null;
                        let shortestDistance = Infinity;

                        shops.forEach(shop => {
                            if (shop.lat && shop.lng) {
                                const dist = calculateDistance(userLat, userLng, parseFloat(shop.lat), parseFloat(shop.lng));
                                if (dist < shortestDistance) {
                                    shortestDistance = dist;
                                    nearestShop = shop;
                                }
                            }
                        });

                        // Check if nearest shop is within 500 meters
                        if (nearestShop && shortestDistance <= 500) {
                            onShopDetected(nearestShop);
                        } else {
                            setStatus('not_found');
                        }
                    },
                    (error) => {
                        console.warn("Geolocation error:", error);
                        setStatus('denied');
                    },
                    { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
                );
            }, [shops, onShopDetected]);

            return (
                <div className="fixed inset-0 bg-stone-900/90 backdrop-blur-md z-[60] flex items-center justify-center p-4">
                    <div className="bg-white rounded-3xl p-8 w-full max-w-sm shadow-2xl flex flex-col items-center text-center animate-fade-in relative overflow-hidden border border-stone-200">

                                </div>
                            </>

                        {status === 'denied' && (

                                    Choose Branch Manually

                        {status === 'not_found' && (
                            <div className="animate-fade-in w-full">
                                <div className="w-20 h-20 bg-stone-100 rounded-full flex items-center justify-center mb-6 mx-auto">

                                                                {item.quantity}x {item.name}
                                                            </span>
                                                        ))}
                                                    </div>
                                                    <button onClick={() => onReorder(order)} className="w-full py-2.5 bg-stone-100 hover:bg-stone-200 text-stone-800 rounded-xl text-sm font-bold transition flex items-center justify-center gap-2">
                                                        <i className="fa-solid fa-rotate-left"></i> Re-order Items
                                                    </button>
                                                </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        //         CUSTOMER PORTAL MAIN
        function CustomerPortal({ products, categories, tables, orders, shops, currentUser, isLoading, sugarOptions, iceOptions, onAdminClick }) {
            const [activeCategory, setActiveCategory] = useState('All');
            const [searchQuery, setSearchQuery] = useState('');
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [submittedOrder, setSubmittedOrder] = useState(null);
            
            const [selectedItemForOptions, setSelectedItemForOptions] = useState(null);

            const queryParams = new URLSearchParams(window.location.search);
            const tableIdParam = queryParams.get('table');
            const shopIdParam = queryParams.get('shop');
            
            const [qrError, setQrError] = useState('');

            const detectedShop = useMemo(() => {
                if (!shopIdParam) return null;
                return shops.find(s => s.id === shopIdParam || s.shopCode === shopIdParam);
            }, [shopIdParam, shops]);

            const qrDetectedTable = useMemo(() => {
                if (!tableIdParam) return null;
                return tables.find(t => 
                    (t.id === tableIdParam || t.name === tableIdParam) && 
                    (!detectedShop || t.shopId === detectedShop.id)
                );
            }, [tableIdParam, tables, detectedShop]);

            useEffect(() => {
                if (isLoading) return;
                let errorMsg = '';
                if (shopIdParam && !detectedShop) {
                    errorMsg = "Invalid QR Code: Shop branch not found or inactive.";
                } else if (tableIdParam && !qrDetectedTable) {
                    errorMsg = "Invalid QR Code: Table not found or doesn't belong to this branch.";
                }
                setQrError(errorMsg);
            }, [isLoading, shopIdParam, tableIdParam, detectedShop, qrDetectedTable]);

            // Added sessionTimestamp to track when the session was created
            const [sessionInfo, setSessionInfo] = useState({
                isSetup: false,
                mode: qrDetectedTable ? 'QR' : null, 
                tableId: qrDetectedTable ? qrDetectedTable.id : null,
                tableName: qrDetectedTable ? qrDetectedTable.name : null,
                shopId: qrDetectedTable ? qrDetectedTable.shopId : (detectedShop ? detectedShop.id : null),
                customerName: '',
                customerPhone: '',
                sessionTimestamp: Date.now() 
            });

            // Auto-sync sessionInfo when shop/table completely finishes loading
            useEffect(() => {
                if (!isLoading && !sessionInfo.isSetup) {
                    setSessionInfo(prev => ({
                        ...prev,
                        mode: qrDetectedTable ? 'QR' : prev.mode,
                        tableId: qrDetectedTable ? qrDetectedTable.id : prev.tableId,
                        tableName: qrDetectedTable ? qrDetectedTable.name : prev.tableName,
                        shopId: qrDetectedTable ? qrDetectedTable.shopId : (detectedShop ? detectedShop.id : prev.shopId)
                    }));
                }
            }, [isLoading, qrDetectedTable, detectedShop, sessionInfo.isSetup]);

            const [showSetupModal, setShowSetupModal] = useState(false);
            const [cartNotes, setCartNotes] = useState('');
            const [isTrackerOpen, setIsTrackerOpen] = useState(false);
            const [phoneSearchQuery, setPhoneSearchQuery] = useState('');
            const [customMessage, setCustomMessage] = useState('');

            // Effect to monitor session timeout
            useEffect(() => {
                if (!sessionInfo.isSetup) return; // Only monitor active setups
                
                const checkTimeout = () => {
                    const thirtyMinutes = 30 * 60 * 1000;
                    if (Date.now() - sessionInfo.sessionTimestamp > thirtyMinutes) {
                        // KICK OUT logic
                        setSessionInfo({
                            isSetup: false,
                            mode: null,
                            tableId: null,
                            tableName: null,
                            customerName: '',
                            customerPhone: '',
                            sessionTimestamp: Date.now()
                        });
                        setCart([]); // Clear cart
                        setCustomMessage("Session expired. Please scan QR or start over.");
                        setTimeout(() => setCustomMessage(''), 5000);
                        setShowSetupModal(true); // Force them to set up again
                    }
                };

                const interval = setInterval(checkTimeout, 60000); // Check every minute
                return () => clearInterval(interval);
            }, [sessionInfo.isSetup, sessionInfo.sessionTimestamp]);

            useEffect(() => {
                if (qrDetectedTable && !sessionInfo.isSetup && !qrError) {
                    setShowSetupModal(true);
                }
            }, [qrDetectedTable, sessionInfo.isSetup, qrError]);

            if (qrError) {
                return (
                    <div className="min-h-screen bg-stone-50 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md text-center border-t-4 border-red-500">
                            <i className="fa-solid fa-triangle-exclamation text-red-500 text-5xl mb-4"></i>
                            <h2 className="text-xl font-bold text-stone-900 mb-2">QR Code Invalid</h2>
                            <p className="text-stone-500 font-medium text-sm mb-6 bg-stone-50 p-3 rounded-lg border border-stone-200">{qrError}</p>
                            <button onClick={() => window.location.href = window.location.pathname} className="w-full bg-stone-900 text-white font-bold py-3.5 rounded-xl hover:bg-stone-800 transition shadow-md">Go to Main Menu</button>
                        </div>
                    </div>
                );
            }

            const myActiveOrders = useMemo(() => {
                return orders.filter(o => {
                    const isMyAuth = currentUser && o.userId === currentUser.uid;
                    const isMyPhone = phoneSearchQuery && o.customerPhone === phoneSearchQuery;
                    return (isMyAuth || isMyPhone) && !['Served', 'Cancelled'].includes(o.status);
                }).sort((a, b) => b.createdAt - a.createdAt);
            }, [orders, currentUser, phoneSearchQuery]);

            const myPastOrders = useMemo(() => {
                return orders.filter(o => {
                    const isMyAuth = currentUser && o.userId === currentUser.uid;
                    const isMyPhone = phoneSearchQuery && o.customerPhone === phoneSearchQuery;
                    return (isMyAuth || isMyPhone) && ['Served', 'Cancelled'].includes(o.status);
                }).sort((a, b) => b.createdAt - a.createdAt).slice(0, 15);
            }, [orders, currentUser, phoneSearchQuery]);

            const filteredProducts = useMemo(() => {
                return products.filter(p => {
                    const matchesSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesCategory = activeCategory === 'All' || p.category === activeCategory;
                    return matchesSearch && matchesCategory && p.isAvailable;
                });
            }, [products, searchQuery, activeCategory]);

            const handleSizeClick = (product, size, price) => {
                if (!sessionInfo.isSetup) {
                    if (!sessionInfo.mode) {
                        setSessionInfo(prev => ({ ...prev, mode: 'DINE_IN' }));
                    }
                    setShowSetupModal(true);
                    return;
                }
                if (product.hasSugarOption || product.hasIceOption) {
                    const defaultSugar = sugarOptions?.length > 0 ? sugarOptions[0].name : '100%';
                    const defaultIce = iceOptions?.length > 0 ? iceOptions[0].name : 'Normal Ice';
                    setSelectedItemForOptions({ 
                        product, size, price, 
                        sugar: product.hasSugarOption ? defaultSugar : null,
                        ice: product.hasIceOption ? defaultIce : null
                    });
                } else {
                    addToCart(product, size, price, null, null);
                }
            };

            const addToCart = (product, size, price, sugar, ice) => {
                // Update timestamp on interaction to prevent timeout while ordering
                setSessionInfo(prev => ({...prev, sessionTimestamp: Date.now()}));
                setCart(prev => {
                    const existingIndex = prev.findIndex(item => item.productId === product.id && item.size === size && item.sugar === sugar && item.ice === ice);
                    if (existingIndex >= 0) {
                        const newCart = [...prev];
                        newCart[existingIndex].quantity += 1;
                        return newCart;
                    }
                    return [...prev, { productId: product.id, name: product.name, size, price, quantity: 1, image: product.image, sugar, ice }];
                });
            };

            const updateCartQty = (idx, delta) => {
                setSessionInfo(prev => ({...prev, sessionTimestamp: Date.now()}));
                setCart(prev => {
                    const newCart = [...prev];
                    newCart[idx].quantity += delta;
                    if (newCart[idx].quantity <= 0) newCart.splice(idx, 1);
                    return newCart;
                });
            };

            const cartTotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            const handleSetupSubmit = (e, resolvedData) => {
                if (e) e.preventDefault();
                
                if (resolvedData) {
                    setSessionInfo(prev => ({ 
                        ...prev, 
                        customerPhone: resolvedData.phone, 
                        customerName: resolvedData.name, 
                        isSetup: true,
                        sessionTimestamp: Date.now()
                    }));
                } else {
                    setSessionInfo(prev => ({ ...prev, isSetup: true, sessionTimestamp: Date.now() }));
                }
                setShowSetupModal(false);
            };
            
            const handleSwitchMode = async (newMode) => {
                if (newMode === 'DINE_IN') {
                    setSessionInfo({...sessionInfo, mode: 'DINE_IN', tableId: null, tableName: null, shopId: detectedShop ? detectedShop.id : null, sessionTimestamp: Date.now()});
                    setShowSetupModal(true);
                } else if (newMode === 'TAKEAWAY') {
                    if (sessionInfo.tableId && sessionInfo.tableId !== 'TAKEAWAY') {
                        try {
                            const { doc, updateDoc } = window.FirebaseApp;
                            await updateDoc(doc(getColRef('tables'), sessionInfo.tableId), { status: 'Available' });
                        } catch(err) {
                            console.warn("Could not release table: ", err);
                        }
                    }
                    setCustomMessage("Thanks to see you again soon! ☕");
                    setTimeout(() => setCustomMessage(''), 3500);
                    
                    setSessionInfo({...sessionInfo, mode: 'TAKEAWAY', tableId: 'TAKEAWAY', tableName: 'Take Away', shopId: detectedShop ? detectedShop.id : null, sessionTimestamp: Date.now()});
                }
            };
            
            const handleReorder = (order) => {
                setCart(order.items.map(item => ({...item}))); 
                setSessionInfo(prev => ({
                    ...prev,
                    customerName: order.customerName || prev.customerName,
                    customerPhone: order.customerPhone || prev.customerPhone,
                    mode: order.orderType === 'TAKEAWAY' ? 'TAKEAWAY' : 'DINE_IN',
                    tableId: order.tableId || prev.tableId,
                    tableName: order.tableName || prev.tableName,
                    shopId: order.shopId || prev.shopId,
                    isSetup: true,
                    sessionTimestamp: Date.now()
                }));
                setIsTrackerOpen(false);
                setIsCartOpen(true); 
            };

            const handleCheckout = async (e) => {
                e.preventDefault();
                if (cart.length === 0 || !sessionInfo.isSetup) return;
                setIsSubmitting(true);

                const { addDoc, updateDoc, doc } = window.FirebaseApp;
                const today = getTodayString();
                
                const todaysOrders = orders.filter(o => o.dateString === today);
                const highestQueue = todaysOrders.length > 0 
                    ? Math.max(...todaysOrders.map(o => parseInt(String(o.queueNo).split('-')[1]) || 0)) 
                    : 0;
                const queueString = `A-${(highestQueue + 1).toString().padStart(3, '0')}`;

                const actualOrderType = (sessionInfo.mode === 'QR' || sessionInfo.mode === 'DINE_IN') ? 'DINE_IN' : 'TAKEAWAY';

                const orderData = {
                    userId: currentUser ? currentUser.uid : null,
                    queueNo: queueString,
                    orderType: actualOrderType,
                    tableId: sessionInfo.tableId || 'TAKEAWAY',
                    tableName: sessionInfo.tableName || 'Take Away',
                    shopId: sessionInfo.shopId || 'UNKNOWN',
                    customerName: sessionInfo.customerName,
                    customerPhone: sessionInfo.customerPhone,
                    notes: cartNotes,
                    items: cart,
                    totalAmount: cartTotal,
                    status: 'New', 
                    paymentStatus: 'Unpaid',
                    paymentMethod: 'N/A',
                    dateString: today,
                    createdAt: Date.now()
                };

                try {
                    await addDoc(getColRef('orders'), orderData);
                    await deductInventory(cart, products, sessionInfo.shopId);
                    
                    if (actualOrderType === 'DINE_IN' && sessionInfo.tableId) {
                        try {
                            await updateDoc(doc(getColRef('tables'), sessionInfo.tableId), { status: 'Occupied' });
                        } catch(err) {
                            console.warn("Could not update table status: ", err);
                        }
                    }

                    setSubmittedOrder(orderData);
                    setCart([]);
                    setIsCartOpen(false);
                    // Reset timestamp upon successful checkout
                    setSessionInfo(prev => ({...prev, sessionTimestamp: Date.now()}));
                } catch (err) {
                    console.error("Order submission failed:", err);
                    alert("Submission Blocked by Firebase!\n\nError: " + err.message + "\n\nFix: You must update your Firestore Security Rules to allow writes.");
                } finally {
                    setIsSubmitting(false);
                }
            };

            if (submittedOrder) {
                return (
                    <OrderSuccessView 
                        order={submittedOrder} 
                        sessionInfo={sessionInfo}
                        setSessionInfo={setSessionInfo}
                        onTrackOrder={() => {
                            setSubmittedOrder(null);
                            setIsTrackerOpen(true);
                        }}
                        onNewOrder={() => {
                            setSubmittedOrder(null);
                            setSessionInfo(prev => ({...prev, sessionTimestamp: Date.now()}));
                        }}
                    />
                );
            }

            return (
                <div className="pb-28 lg:pb-8 relative min-h-screen bg-stone-50">
                    {/* Floating Toast Message */}
                    {customMessage && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 bg-stone-900/95 backdrop-blur text-white px-6 py-3 rounded-full shadow-2xl z-50 flex items-center gap-3 border border-stone-700 animate-fade-in">
                            <i className="fa-solid fa-heart text-amber-500"></i>
                            <span className="font-bold text-sm tracking-wide whitespace-nowrap">{customMessage}</span>
                        </div>
                    )}
                    
                    {/* Header Banner */}
                    <div className="relative h-48 sm:h-64 bg-stone-900 w-full overflow-hidden flex-shrink-0">
                        <button 
                            onClick={() => setIsTrackerOpen(true)}
                            className="absolute top-4 right-4 z-20 bg-stone-900/80 backdrop-blur text-white px-4 py-2 rounded-full text-sm font-bold shadow-lg border border-stone-700 hover:bg-stone-800 transition"
                        >
                            <i className="fa-solid fa-satellite-dish mr-2 text-amber-500"></i> Track Order
                        </button>

                        <img src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&q=80&w=2000" alt="Cafe" className="w-full h-full object-cover opacity-50" decoding="async" />
                        <div className="absolute inset-0 flex flex-col items-center justify-center text-white px-4 text-center">
                            <h1 className="text-3xl sm:text-4xl font-bold tracking-tight drop-shadow-md">Solaris Cafe</h1>
                            
                            {sessionInfo.isSetup ? (
                                <div className="mt-4 flex flex-wrap justify-center gap-2">
                                    <span className="bg-amber-600/90 backdrop-blur px-4 py-1.5 rounded-full text-sm font-bold shadow-lg flex items-center">
                                        <i className={`fa-solid ${sessionInfo.mode === 'TAKEAWAY' ? 'fa-bag-shopping' : 'fa-location-dot'} mr-2`}></i>
                                        {sessionInfo.mode === 'TAKEAWAY' ? 'Take Away' : `Table ${sessionInfo.tableName}`}
                                    </span>
                                    
                                    {sessionInfo.mode === 'TAKEAWAY' && (
                                        <button 
                                            onClick={() => handleSwitchMode('DINE_IN')} 
                                            className="bg-indigo-600/90 hover:bg-indigo-700 backdrop-blur text-white px-4 py-1.5 rounded-full text-sm font-bold shadow-lg flex items-center active:scale-95 transition-all"
                                        >
                                            <i className="fa-solid fa-chair mr-2"></i> Switch to Dine-In
                                        </button>
                                    )}

                                    <span className="bg-stone-800/90 backdrop-blur px-4 py-1.5 rounded-full text-sm font-bold shadow-lg flex items-center">
                                        <i className="fa-solid fa-user mr-2"></i> {sessionInfo.customerName}
                                    </span>
                                </div>
                            ) : (
                                <div className="mt-4 flex flex-wrap justify-center gap-3">
                                    {qrDetectedTable ? (
                                        <button onClick={() => setShowSetupModal(true)} className="bg-amber-600/90 hover:bg-amber-500 backdrop-blur px-6 py-2.5 rounded-full text-sm font-bold shadow-lg transition animate-pulse">
                                            Tap to Start Table {qrDetectedTable.name} Order
                                        </button>
                                    ) : (
                                        <>
                                            <button onClick={() => { setSessionInfo({...sessionInfo, mode: 'DINE_IN'}); setShowSetupModal(true); }} className="bg-amber-600/90 hover:bg-amber-500 backdrop-blur px-6 py-2 rounded-full text-sm font-bold shadow-lg transition border border-amber-500/50">
                                                <i className="fa-solid fa-utensils mr-2"></i> Dine In Self Order
                                            </button>
                                            <button onClick={() => { setSessionInfo({...sessionInfo, mode: 'TAKEAWAY', tableId: 'TAKEAWAY', tableName: 'Take Away'}); setShowSetupModal(true); }} className="bg-stone-800/90 hover:bg-stone-700 backdrop-blur px-6 py-2 rounded-full text-sm font-bold shadow-lg transition border border-stone-600/50">
                                                <i className="fa-solid fa-bag-shopping mr-2"></i> Take Away
                                            </button>
                                        </>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-4 sm:px-6 -mt-6 relative z-10 flex flex-col lg:flex-row gap-6 items-start">
                        {/* LEFT SIDE: Menu Items (expands to fill space on desktop) */}
                        <div className="flex-1 w-full min-w-0">
                            {/* Search & Filter */}
                            <div className="bg-white p-2 rounded-2xl shadow-lg flex items-center mb-6 border border-stone-100">
                                <i className="fa-solid fa-magnifying-glass text-stone-400 ml-3 mr-2"></i>
                                <input type="text" placeholder="Search menu..." className="flex-1 py-2 px-2 outline-none text-[16px]" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                            </div>

                            <div className="flex gap-3 overflow-x-auto no-scrollbar mb-6 pb-2">
                            {isLoading ? (
                                Array.from({length: 5}).map((_, i) => (
                                    <div key={`skel-cat-${i}`} className="whitespace-nowrap px-8 py-5 rounded-full bg-stone-200 animate-pulse shrink-0"></div>
                                ))
                            ) : (
                                <>
                                    <button onClick={() => setActiveCategory('All')} className={`whitespace-nowrap px-5 py-2 rounded-full text-sm font-semibold transition ${activeCategory === 'All' ? 'bg-stone-900 text-white shadow-md' : 'bg-white text-stone-600 border border-stone-200 hover:bg-stone-100'}`}>All</button>
                                    {categories.map(cat => (
                                        <button key={cat.id} onClick={() => setActiveCategory(cat.name)} className={`whitespace-nowrap px-5 py-2 rounded-full text-sm font-semibold transition ${activeCategory === cat.name ? 'bg-stone-900 text-white shadow-md' : 'bg-white text-stone-600 border border-stone-200 hover:bg-stone-100'}`}>{cat.name}</button>
                                    ))}
                                </>
                            )}
                        </div>

                        {/* Product Grid */}
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-3 xl:grid-cols-3 gap-3 sm:gap-4">
                            {isLoading ? (
                                Array.from({length: 6}).map((_, i) => (
                                    <div key={`skel-prod-${i}`} className="bg-white rounded-2xl p-3 flex flex-col shadow-sm border border-stone-100 animate-pulse h-full">
                                        <div className="h-4 bg-stone-200 rounded w-3/4 mb-1.5"></div>
                                        <div className="h-3 bg-stone-200 rounded w-1/2 mb-auto"></div>
                                        
                                        <div className="flex flex-row gap-2.5 mt-3 pt-1">
                                            <div className="w-16 h-16 sm:w-20 sm:h-20 rounded-xl bg-stone-200 shrink-0"></div>
                                            <div className="flex-1 flex flex-col justify-end gap-1.5">
                                                <div className="h-6 sm:h-7 bg-stone-200 rounded-lg w-full"></div>
                                                <div className="h-6 sm:h-7 bg-stone-200 rounded-lg w-full"></div>
                                            </div>
                                        </div>
                                    </div>
                                ))
                            ) : filteredProducts.length > 0 ? (
                                filteredProducts.map(product => (
                                    <div key={product.id} className="bg-white rounded-2xl overflow-hidden shadow-sm border border-stone-100 hover:shadow-md flex flex-col p-3 transition-all h-full">
                                        <div className="mb-2">
                                            <h3 className="font-bold text-stone-800 text-sm sm:text-base leading-tight line-clamp-2">{product.name}</h3>
                                            {product.description && <p className="text-[9px] sm:text-[10px] text-stone-500 line-clamp-1 mt-0.5">{product.description}</p>}
                                        </div>
                                        
                                        <div className="flex flex-row gap-2.5 mt-auto">
                                            <div className="w-16 h-16 sm:w-20 sm:h-20 rounded-xl bg-stone-100 shrink-0 overflow-hidden relative">
                                                {product.image ? <img src={product.image} className="w-full h-full object-cover absolute inset-0" alt={product.name} loading="lazy" decoding="async" /> : <i className="fa-solid fa-image text-xl text-stone-300 w-full h-full flex items-center justify-center absolute inset-0"></i>}
                                            </div>
                                            <div className="flex-1 flex flex-col justify-end gap-1.5 min-w-0">
                                                {product.priceSmall > 0 && (
                                                    <button onClick={() => handleSizeClick(product, 'S', product.priceSmall)} className="w-full flex items-center justify-between px-1.5 py-1 sm:px-2 sm:py-1.5 rounded-lg border text-[10px] sm:text-xs font-bold transition-colors border-amber-300 bg-amber-100 text-amber-900 hover:bg-amber-200 shadow-sm">
                                                        <span>S</span><span className="truncate ml-0.5">{product.priceSmall.toLocaleString()} ៛</span>
                                                    </button>
                                                )}
                                                {product.priceLarge > 0 && (
                                                    <button onClick={() => handleSizeClick(product, 'L', product.priceLarge)} className="w-full flex items-center justify-between px-1.5 py-1 sm:px-2 sm:py-1.5 rounded-lg border text-[10px] sm:text-xs font-bold transition-colors border-amber-300 bg-amber-100 text-amber-900 hover:bg-amber-200 shadow-sm">
                                                        <span>L</span><span className="truncate ml-0.5">{product.priceLarge.toLocaleString()} ៛</span>
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))
                            ) : (
                                <div className="col-span-2 md:col-span-3 lg:col-span-3 xl:col-span-3 text-center py-10 text-stone-400 font-medium">
                                    <i className="fa-solid fa-mug-hot text-4xl mb-3 opacity-30 block"></i>
                                    No products found in this category.
                                </div>
                            )}
                        </div>
                    </div>

                    {/* RIGHT SIDE: Desktop Split POS-Style Cart (Hidden on Mobile) */}
                        <div className="hidden lg:flex w-[22rem] xl:w-96 flex-col shrink-0 bg-white rounded-2xl shadow-xl border border-stone-200 sticky top-6 h-[calc(100vh-3rem)] overflow-hidden">
                            <div className="p-4 border-b border-stone-200 bg-stone-50 font-bold text-stone-800 flex items-center">
                                <i className="fa-solid fa-cart-shopping mr-2 text-amber-600"></i> Current Order
                            </div>
                            
                            <div className="flex-1 overflow-y-auto p-4 space-y-4">
                                {/* Session info block */}
                                {!sessionInfo.isSetup ? (
                                    <div className="bg-amber-50 p-4 rounded-xl border border-amber-200 text-center shadow-sm">
                                        <i className="fa-solid fa-circle-info text-amber-500 text-3xl mb-3 block mt-2"></i>
                                        <p className="text-sm text-amber-800 font-bold mb-3">Please setup your details to order.</p>
                                        <button onClick={() => setShowSetupModal(true)} className="w-full bg-amber-600 text-white font-bold py-2.5 rounded-lg hover:bg-amber-700 shadow-md transition">Setup Info</button>
                                    </div>
                                ) : (
                                    <div className="bg-stone-50 p-4 rounded-xl border border-stone-200 shadow-sm relative">
                                        <div className="flex justify-between items-center mb-1">
                                            <span className="text-xs font-bold text-stone-400 uppercase tracking-wider">Ordering As</span>
                                            <span className="text-[10px] font-bold bg-amber-100 text-amber-800 px-2 py-0.5 rounded uppercase tracking-wider">{sessionInfo.mode === 'TAKEAWAY' ? 'Take Away' : 'Dine In'}</span>
                                        </div>
                                        <p className="font-bold text-stone-800 text-sm">{sessionInfo.customerName} <span className="font-normal text-stone-500 text-xs">({sessionInfo.customerPhone})</span></p>

        function AdminLogin({ shops, onBack, onLogin }) {
            const [isRegistering, setIsRegistering] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [secretCode, setSecretCode] = useState('');
            const [role, setRole] = useState('Manager');
            const [shopId, setShopId] = useState('');
            const [error, setError] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                const { signInWithEmailAndPassword, createUserWithEmailAndPassword, setDoc, doc } = window.FirebaseApp;
                try {
                    if (isRegistering) {
                        if (secretCode !== 'JL1688') {
                            setError('Invalid secret registration code.');
                            return;
                        }
                        if (role !== 'Admin' && !shopId) {
                            setError('Please select a Shop Branch for this staff member.');
                            return;
                        }

                        const userCred = await createUserWithEmailAndPassword(auth, email, password);
                        
                        const rolePerms = {
                            'Admin': ['pos', 'kds', 'shops', 'products', 'inventory', 'sales', 'customers', 'users'],
                            'Manager': ['pos', 'kds', 'inventory', 'sales', 'customers'],
                            'Cashier': ['pos', 'customers'],
                            'Kitchen': ['kds', 'inventory'],
                            'Barista': ['kds', 'inventory']
                        };

                        try {
                            await setDoc(doc(getColRef('admins'), userCred.user.uid), {
                                email: userCred.user.email,
                                role: role,
                                shopId: role === 'Admin' ? 'All' : shopId,
                                permissions: rolePerms[role] || rolePerms['Cashier'], 
                                createdAt: Date.now()
                            });
                        } catch (dbErr) {
                            console.error("Could not save to admins collection", dbErr);
                        }
                    } else {
                        await signInWithEmailAndPassword(auth, email, password);
                    }
                    onLogin();
                } catch (err) { 
                    setError(err.message.replace('Firebase: ', '')); 
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-stone-100 p-4">
                    <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md">
                        <button onClick={onBack} className="mb-6 text-stone-400 hover:text-stone-700"><i className="fa-solid fa-arrow-left"></i> Back to Menu</button>
                        <h2 className="text-2xl font-bold mb-6">{isRegistering ? 'Create Staff Account' : 'Staff Login'}</h2>
                        {error && <div className="bg-red-50 text-red-600 p-3 rounded-lg mb-4 text-sm">{error}</div>}
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <input type="email" placeholder="Email" required className="w-full border rounded-xl px-4 py-3 outline-none focus:border-amber-600" value={email} onChange={e=>setEmail(e.target.value)} />
                            <input type="password" placeholder="Password" required className="w-full border rounded-xl px-4 py-3 outline-none focus:border-amber-600" value={password} onChange={e=>setPassword(e.target.value)} />
                            
                            {isRegistering && (
                                <div className="space-y-4 border-t border-stone-200 pt-4 mt-2">
                                    <select required className="w-full border rounded-xl px-4 py-3 outline-none focus:border-amber-600 bg-stone-50" value={role} onChange={e=>setRole(e.target.value)}>
                                        <option value="Admin">Admin (All Access)</option>
                                        <option value="Manager">Branch Manager</option>
                                        <option value="Cashier">Cashier</option>
                                        <option value="Barista">Barista</option>
                                        <option value="Kitchen">Kitchen Staff</option>
                                    </select>
                                    
                                    {role !== 'Admin' && (
                                        <select required className="w-full border rounded-xl px-4 py-3 outline-none focus:border-amber-600 bg-stone-50" value={shopId} onChange={e=>setShopId(e.target.value)}>
                                            <option value="" disabled>Assign to Shop...</option>
                                            {shops.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}
                                        </select>
                                    )}

                                    <input 
                                        type="password" 
                                        placeholder="Admin Registration Code" 
                                        required 
                                        className="w-full border rounded-xl px-4 py-3 outline-none focus:border-amber-600 bg-stone-50" 
                                        value={secretCode} 
                                        onChange={e=>setSecretCode(e.target.value)} 
                                    />
                                </div>
                            )}
                            
                            <button type="submit" className="w-full bg-stone-900 text-white py-3.5 rounded-xl font-bold mt-2 shadow-md">
                                {isRegistering ? 'Create Account' : 'Login'}
                            </button>
                        </form>

                        <div className="mt-6 text-center">
                            <button 
                                type="button"
                                onClick={() => { setIsRegistering(!isRegistering); setError(''); setSecretCode(''); }}
                                className="text-sm text-amber-600 hover:text-amber-700 font-semibold"
                            >
                                {isRegistering ? 'Already have an account? Sign In' : 'Need to register? Create Admin'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function UsersView({ admins, currentUser, shops }) {
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingId, setEditingId] = useState(null);
            const [formData, setFormData] = useState({ email: '', password: '', role: 'Cashier', shopId: '' });
            const [error, setError] = useState('');
            const [isProcessing, setIsProcessing] = useState(false);

            const currentAdmin = admins.find(a => a.id === currentUser?.uid);
            const isSuper = currentAdmin?.role === 'Admin';

            const rolePerms = {
                'Admin': ['pos', 'kds', 'shops', 'products', 'inventory', 'sales', 'customers', 'users'],
                'Manager': ['pos', 'kds', 'inventory', 'sales', 'customers'],
                'Cashier': ['pos', 'customers'],
                'Kitchen': ['kds', 'inventory'],
                'Barista': ['kds', 'inventory']
            };

            const openModal = (user = null) => {
                setError('');
                if (user) {
                    setEditingId(user.id);
                    setFormData({ email: user.email, password: '', role: user.role || 'Cashier', shopId: user.shopId || '' });
                } else {
                    setEditingId(null);
                    setFormData({ email: '', password: '', role: 'Cashier', shopId: '' });
                }
                setIsModalOpen(true);
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setIsProcessing(true);
                const { doc, setDoc, updateDoc, initializeApp, getAuth, createUserWithEmailAndPassword } = window.FirebaseApp;

                try {
                    if (editingId) {
                        // UPDATE Existing Staff (Auth cannot be updated client-side easily, so we only update Firestore Role/Branch)
                        await updateDoc(doc(db, 'admins', editingId), {
                            role: formData.role,
                            shopId: formData.role === 'Admin' ? 'All' : formData.shopId,
                            permissions: rolePerms[formData.role] || rolePerms['Cashier']
                        });
                    } else {
                        // CREATE New Staff
                        if (formData.role !== 'Admin' && !formData.shopId) throw new Error("Please select a branch.");
                        if (!formData.password || formData.password.length < 6) throw new Error("Password must be at least 6 characters.");
                        
                        // To prevent the current admin from being logged out by Firebase when creating a new user, 
                        // we isolate the registration inside a secondary, temporary Firebase App instance.
                        const appName = "SecondaryApp_" + Date.now();
                        const secondaryApp = initializeApp(firebaseConfig, appName);
                        const secondaryAuth = getAuth(secondaryApp);
                        
                        const userCred = await createUserWithEmailAndPassword(secondaryAuth, formData.email, formData.password);
                        
                        // Save the user access rules to Firestore 
                        await setDoc(doc(db, 'admins', userCred.user.uid), {
                            email: userCred.user.email,
                            role: formData.role,
                            shopId: formData.role === 'Admin' ? 'All' : formData.shopId,
                            permissions: rolePerms[formData.role] || rolePerms['Cashier'],
                            createdAt: Date.now()
                        });
                        
                        // Clean up secondary auth
                        await window.FirebaseApp.signOut(secondaryAuth);
                    }
                    setIsModalOpen(false);
                } catch (err) {
                    setError(err.message.replace('Firebase: ', ''));
                } finally {
                    setIsProcessing(false);
                }
            };

            const handleDelete = async (id) => {
                if (id === currentUser?.uid) return alert("You cannot revoke your own account.");
                if (confirm("Revoke access for this user? (This removes their system permissions)")) {
                    try {
                        await window.FirebaseApp.deleteDoc(window.FirebaseApp.doc(db, 'admins', id));
                    } catch (err) {
                        alert("Error: " + err.message);
                    }
                }
            };

            return (
                <div className="max-w-5xl">
                    <div className="flex justify-between items-center mb-6">
                        <div>

                        {isSuper && (
                            <button onClick={() => openModal()} className="bg-stone-900 text-white px-4 py-2 rounded-xl font-bold shadow-md flex items-center hover:bg-stone-800 transition">
                                <i className="fa-solid fa-user-plus mr-2"></i> Add New User

                    <div className="bg-white rounded-2xl shadow-sm border border-stone-200 overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left text-sm border-collapse min-w-[700px]">
                                <thead>
                                    <tr className="bg-stone-100 text-stone-700 uppercase tracking-wider border-b border-stone-200">
                                        <th className="p-4 font-bold">Staff Details</th>
                                        <th className="p-4 font-bold">Role & Branch</th>
                                        <th className="p-4 font-bold">Role Access</th>
                                        <th className="p-4 font-bold">Status</th>
                                        {isSuper && <th className="p-4 font-bold text-right">Actions</th>}
                                    </tr>
                                </thead>
                                <tbody>
                                    {admins.map(admin => (
                                        <tr key={admin.id} className="border-b border-stone-100 hover:bg-stone-50 transition-colors">
                                            <td className="p-4 font-semibold text-stone-800">
                                                {admin.email} 
                                                {currentUser?.uid === admin.id && <span className="ml-2 bg-amber-100 text-amber-800 text-[10px] px-2 py-0.5 rounded-full uppercase font-bold tracking-wider">You</span>}
                                            </td>
                                            <td className="p-4">
                                                <div className="font-bold text-stone-800">{admin.role || 'Admin'}</div>
                                                <div className="text-xs text-stone-500 mt-0.5">{admin.shopId === 'All' ? 'All Branches' : (shops.find(s=>s.id===admin.shopId)?.name || 'Unknown Branch')}</div>
                                            </td>
                                            <td className="p-4 text-stone-500 text-xs">
                                                <div className="flex flex-wrap gap-1">
                                                    {(admin.permissions || ['All Access']).map(p => (
                                                        <span key={p} className="bg-stone-200 text-stone-600 px-1.5 py-0.5 rounded uppercase font-bold tracking-wider">{p}</span>
                                                    ))}
                                                </div>
                                            </td>
                                            <td className="p-4"><span className="bg-green-100 text-green-700 px-2 py-1 rounded text-[10px] uppercase font-bold tracking-wider">Active</span></td>
                                            {isSuper && (
                                                <td className="p-4 text-right">
                                                    <button onClick={() => openModal(admin)} className="p-2 text-blue-500 hover:text-blue-700 transition" title="Edit Role"><i className="fa-solid fa-pen"></i></button>
                                                    <button onClick={() => handleDelete(admin.id)} disabled={currentUser?.uid === admin.id} className={`p-2 transition ${currentUser?.uid === admin.id ? 'text-stone-300' : 'text-red-500 hover:text-red-700'}`} title="Revoke Access"><i className="fa-solid fa-trash"></i></button>
                                                </td>
                                            )}
                                        </tr>
                                    ))}
                                    {admins.length === 0 && (
                                        <tr><td colSpan={isSuper ? "5" : "4"} className="p-4 text-center text-stone-400">No staff records found.</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <form onSubmit={handleSubmit} className="bg-white rounded-3xl w-full max-w-md p-6 shadow-2xl animate-fade-in relative">
                                <button type="button" onClick={() => setIsModalOpen(false)} className="absolute top-4 right-4 text-stone-400 hover:text-stone-700"><i className="fa-solid fa-xmark text-lg"></i></button>

                                {error && <div className="bg-red-50 text-red-600 p-3 rounded-xl text-sm mb-4 border border-red-200 font-medium"><i className="fa-solid fa-triangle-exclamation mr-1.5"></i>{error}</div>}
                                
                                <div className="space-y-4 mb-6">
