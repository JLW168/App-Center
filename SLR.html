                                <button onClick={onBack} className="w-10 h-10 rounded-full bg-white hover:bg-stone-100 text-stone-600 flex items-center justify-center transition border border-stone-200 shadow-sm" title="Exit to Store">
                                    <i className="fa-solid fa-store"></i>
                                </button>
                                <button onClick={onLogout} className="w-10 h-10 rounded-full bg-red-50 hover:bg-red-100 text-red-600 flex items-center justify-center transition border border-red-200 shadow-sm" title="Sign Out">
                                    <i className="fa-solid fa-power-off"></i>
                                </button>
                            </div>
                        </div>

                        {/* App Icon Grid (3 cols on mobile, 5 on desktop) */}
                        <div className="flex-1 w-full max-w-6xl mx-auto px-6 md:px-12 pb-12 relative z-10 overflow-y-auto no-scrollbar">
                            <div className="grid grid-cols-3 lg:grid-cols-5 gap-x-4 gap-y-8 sm:gap-x-8 sm:gap-y-10 mt-4">
                                {allowedNavs.map(n => (
                                    <button 
                                        key={n.id} 
                                        onClick={() => setActiveTab(n.id)} 
                                        className="flex flex-col items-center group active:scale-90 transition-all duration-300 outline-none"
                                    >
                                        <div className="relative">
                                            <div className={`w-20 h-20 sm:w-24 sm:h-24 md:w-28 md:h-28 rounded-3xl bg-gradient-to-br ${n.color} shadow-lg ${n.shadow} flex items-center justify-center text-white text-3xl sm:text-4xl md:text-5xl mb-3 border border-white/40 group-hover:shadow-[0_20px_40px_-15px_rgba(0,0,0,0.2)] group-hover:scale-110 group-hover:-translate-y-2 group-hover:brightness-110 group-hover:ring-4 group-hover:ring-amber-500/30 transition-all duration-500 ease-[cubic-bezier(0.34,1.56,0.64,1)] relative overflow-hidden`}>
                                                {/* Apple-style gloss effect */}
                                                <div className="absolute inset-0 bg-gradient-to-b from-white/30 to-transparent opacity-40 group-hover:opacity-80 transition-opacity duration-300 h-1/2"></div>
                                                <i className={`fa-solid ${n.icon} relative z-10 drop-shadow-md group-hover:scale-110 transition-transform duration-500 ease-[cubic-bezier(0.34,1.56,0.64,1)]`}></i>
                                            </div>
                                            {n.id === 'kds' && activeOrdersCount > 0 && (
                                                <div className="absolute -top-2 -right-2 sm:-top-3 sm:-right-3 w-7 h-7 sm:w-8 sm:h-8 bg-red-500 text-white rounded-full flex items-center justify-center text-[10px] sm:text-xs font-black shadow-lg border-2 border-white animate-bounce z-20 group-hover:-translate-y-2 group-hover:scale-110 transition-transform duration-500">
                                                    {activeOrdersCount > 99 ? '99+' : activeOrdersCount}
                                                </div>
                                            )}
                                        </div>
                                        <span className="text-xs sm:text-sm font-semibold text-stone-500 group-hover:text-stone-900 group-hover:-translate-y-1 transition-all duration-300 tracking-wide">{n.label}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                        
                        <div className="text-center pb-6 text-stone-400 text-[10px] uppercase tracking-widest font-bold">
                            Solaris Operating System v1.0
                        </div>
                    </div>
                );
            }

            // --- RENDER 2: Active App Workspace ---
            const activeNavInfo = navs.find(n => n.id === activeTab);
            
            return (
                <div className="flex flex-col h-screen bg-stone-100 overflow-hidden">
                    {/* Unified Top App Header */}
                    <div className="bg-stone-900 text-white p-3 sm:p-4 flex justify-between items-center shrink-0 z-30 shadow-md safe-top">
                        <div className="flex items-center gap-3">
                            <button onClick={() => setActiveTab('launchpad')} className="text-stone-300 hover:text-white bg-white/10 hover:bg-white/20 p-2 sm:px-4 sm:py-2 rounded-xl transition flex items-center gap-2 text-sm font-bold shadow-inner">
                                <i className="fa-solid fa-grip"></i> <span className="hidden sm:inline">Launchpad</span>
                            </button>
                            {activeNavInfo && (
                                <div className="flex items-center gap-2 text-stone-300">
                                    <i className="fa-solid fa-chevron-right text-[10px] opacity-50"></i>
                                    <span className="font-bold flex items-center text-white text-lg tracking-tight">
                                        <i className={`fa-solid ${activeNavInfo.icon} text-amber-500 mr-2`}></i>
                                        {activeNavInfo.label}
                                    </span>
                                </div>
                            )}
                        </div>
                        <div className="flex items-center gap-2">
                             <button onClick={onBack} className="text-stone-400 hover:text-white bg-stone-800 p-2 rounded-lg transition" title="Exit to Store">
                                <i className="fa-solid fa-store"></i>
                            </button>
                        </div>
                    </div>
                    
                    {/* App Content Window */}
                    <main className="p-4 md:p-8 flex-1 overflow-y-auto relative h-full">
                        {activeTab === 'pos' && <POSView orders={orders} products={products} categories={categories} tables={tables} shops={shops} shifts={shifts} sugarOptions={sugarOptions} iceOptions={iceOptions} currentAdminRecord={currentAdminRecord} admins={admins} />}
                        {activeTab === 'kds' && <KDSView orders={orders} tables={tables} shops={shops} shifts={shifts} products={products} ingredients={ingredients} onBack={() => setActiveTab('pos')} currentAdminRecord={currentAdminRecord} />}
                        {activeTab === 'shifts' && <ShiftReportsView shifts={shifts} shops={shops} currentAdminRecord={currentAdminRecord} />}
                        {activeTab === 'shops' && <ShopsView shops={shops} tables={tables} products={products} categories={categories} currentAdminRecord={currentAdminRecord} />}
                        {activeTab === 'products' && <ProductsView products={products} categories={categories} ingredients={ingredients} sugarOptions={sugarOptions} iceOptions={iceOptions} currentAdminRecord={currentAdminRecord} shops={shops} />}
                        {activeTab === 'inventory' && <InventoryView ingredients={ingredients} shops={shops} currentAdminRecord={currentAdminRecord} />}
                        {activeTab === 'sales' && <SalesView orders={orders} shops={shops} currentAdminRecord={currentAdminRecord} admins={admins} />}
                        {activeTab === 'customers' && <CustomersView orders={orders} shops={shops} currentAdminRecord={currentAdminRecord} />}
                        {activeTab === 'users' && <UsersView admins={admins} currentUser={currentUser} shops={shops} />}
                    </main>
                </div>
            );
        }

        function ShopsView({ shops, tables, products, categories, currentAdminRecord }) {
            const isSuper = (currentAdminRecord?.role || 'Admin') === 'Admin';
            const [activeTab, setActiveTab] = useState('branches');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({ name: '', brandingName: '', phone: '', location: '', lat: '', lng: '', radius: '', territory: '', forbiddenDistance: '', sessionDuration: 30 });
            const [editingId, setEditingId] = useState(null);
            const [qrShop, setQrShop] = useState(null);

            // FIX: Added missing state and handler for the embedded Tables tab
            const [filterShop, setFilterShop] = useState(isSuper ? 'All' : (currentAdminRecord?.shopIds?.[0] || currentAdminRecord?.shopId || 'All'));

            // --- NEW: Table Modal States to fix blocked prompt() ---
            const [tableModalOpen, setTableModalOpen] = useState(false);
            const [newTableName, setNewTableName] = useState('');

            // --- NEW: Edit Table States ---
            const [editTableModalOpen, setEditTableModalOpen] = useState(false);
            const [editTableId, setEditTableId] = useState(null);
            const [editTableName, setEditTableName] = useState('');

            // --- REVISED: LOYALTY & PROMOTIONS STATE ---
            const [globalPoints, setGlobalPoints] = useState({
                pointsEnabled: false, spendAmount: 4000, pointsEarned: 1, redeemPoints: 10, redeemableCategories: []
            });
            const [allPromotions, setAllPromotions] = useState([]);
            const [isLoyaltyLoading, setIsLoyaltyLoading] = useState(true);
            
            // --- NEW: PROMO MODAL STATES ---
            const [promoModalOpen, setPromoModalOpen] = useState(false);
            const [editingPromoIndex, setEditingPromoIndex] = useState(null);
            const [promoFormData, setPromoFormData] = useState({ 
                id: '', shopId: '', name: '', type: 'BOGO', requiredQty: 1, rewardQty: 1, discountValue: 0, 
                isActive: true, startDate: getTodayString(), endDate: '', applicableProductIds: [], note: '' 
            });
            const [promoSearchText, setPromoSearchText] = useState('');

            useEffect(() => {
                if (activeTab === 'loyalty') {
                    const fetchLoyalty = async () => {
                        setIsLoyaltyLoading(true);
                        const { doc, getDoc, collection, getDocs } = window.FirebaseApp;
                        try {
                            // Fetch Global Points Config
                            const ptsSnap = await getDoc(doc(db, 'loyalty_settings', 'global_points'));
                            if (ptsSnap.exists()) {
                                const data = ptsSnap.data();
                                setGlobalPoints({
                                    ...data,
                                    redeemableCategories: data.redeemableCategories || []
                                });
                            }

                            // Fetch All Promotions across all Branches
                            const promosSnap = await getDocs(collection(db, 'loyalty_settings'));
                            let loadedPromos = [];
                            promosSnap.forEach(d => {
                                if (d.id !== 'global_points') {
                                    const data = d.data();
                                    if (data.promotions) {
                                        data.promotions.forEach(p => loadedPromos.push({ ...p, shopId: d.id }));
                                    }
                                }
                            });
                            setAllPromotions(loadedPromos);
                        } catch(e) { console.warn("Failed to fetch loyalty settings."); }
                        setIsLoyaltyLoading(false);
                    };
                    fetchLoyalty();
                }
            }, [activeTab]);

            const saveGlobalPoints = async (newPoints) => {
                setGlobalPoints(newPoints);
                if (!isSuper) return;
                const { doc, setDoc } = window.FirebaseApp;
                try {
                    await setDoc(doc(db, 'loyalty_settings', 'global_points'), newPoints);
                } catch(e) { console.warn(e); }
            };

            const openAddPromoModal = () => {
                setPromoFormData({ id: Date.now().toString(), shopId: filterShop === 'All' ? '' : filterShop, name: '', type: 'BOGO', requiredQty: 1, rewardQty: 1, discountValue: 0, isActive: true, startDate: getTodayString(), endDate: '', applicableProductIds: [], note: '' });
                setEditingPromoIndex(null);
                setPromoSearchText('');
                setPromoModalOpen(true);
            };

            const openEditPromoModal = (promo) => {
                setPromoFormData(promo);
                setEditingPromoIndex(promo.id);
                setPromoSearchText('');
                setPromoModalOpen(true);
            };

            const savePromoModal = async (e) => {
                e.preventDefault();
                if (!promoFormData.shopId) return alert("Please select a branch.");
                
                const { doc, getDoc, setDoc } = window.FirebaseApp;
                try {
                    const shopRef = doc(db, 'loyalty_settings', promoFormData.shopId);
                    const snap = await getDoc(shopRef);
                    let shopData = snap.exists() ? snap.data() : { promotions: [] };
                    let promos = shopData.promotions || [];
                    
                    const promoToSave = { ...promoFormData };
                    delete promoToSave.shopId; // Keep DB document clean

                    if (editingPromoIndex !== null) {
                        const idx = promos.findIndex(p => p.id === promoFormData.id);
                        if (idx >= 0) promos[idx] = promoToSave;
                        else promos.push(promoToSave);
                    } else {
                        promos.push(promoToSave);
                    }

                    // Save directly to Firestore! No more main screen save button needed.
                    await setDoc(shopRef, { ...shopData, promotions: promos });
                    
                    setAllPromotions(prev => {
                        const others = prev.filter(p => p.id !== promoFormData.id);
                        return [...others, { ...promoToSave, shopId: promoFormData.shopId }];
                    });
                    
                    setPromoModalOpen(false);
                } catch (err) {
                    alert("Failed to save promotion: " + err.message);
                }
            };

            const deletePromo = async (promo) => {
                if (confirm('Delete this promotion?')) {
                    const { doc, getDoc, setDoc } = window.FirebaseApp;
                    try {
                        const shopRef = doc(db, 'loyalty_settings', promo.shopId);
                        const snap = await getDoc(shopRef);
                        if (snap.exists()) {
                            let shopData = snap.data();
                            shopData.promotions = (shopData.promotions || []).filter(p => p.id !== promo.id);
                            await setDoc(shopRef, shopData);
                        }
                        setAllPromotions(prev => prev.filter(p => p.id !== promo.id));
                    } catch(e) { alert(e.message); }
                }
            };
            // --- END LOYALTY LOGIC ---

            // --- NEW: Table Management Functions ---
            const handleAddTable = () => {
                if (!filterShop || filterShop === 'All') {
                    return alert("Please select a specific branch to add a table to.");
                }
                setNewTableName('');
                setTableModalOpen(true);
            };

            const submitNewTable = async (e) => {
                e.preventDefault();
                if (!filterShop || filterShop === 'All') return;
                try {
                    const { addDoc } = window.FirebaseApp;
                    await addDoc(getColRef('tables'), {
                        name: newTableName,
                        shopId: filterShop,
                        status: 'Available',
                        createdAt: Date.now()
                    });
                    setTableModalOpen(false);
                    setNewTableName('');
                } catch (err) {
                    alert("Failed to add table: " + err.message);
                }
            };

            const submitEditTable = async (e) => {
                e.preventDefault();
                if (!editTableId) return;
                try {
                    const { doc, updateDoc } = window.FirebaseApp;
                    await updateDoc(doc(db, 'tables', editTableId), {
                        name: editTableName,
                        updatedAt: Date.now()
                    });
                    setEditTableModalOpen(false);
                    setEditTableId(null);
                    setEditTableName('');
                } catch (err) {
                    alert("Failed to rename table: " + err.message);
                }
            };

            const toggleTableStatus = async (id, currentStatus) => {
                const newStatus = currentStatus === 'Available' ? 'Occupied' : 'Available';
                try {
                    const { doc, updateDoc } = window.FirebaseApp;
                    await updateDoc(doc(db, 'tables', id), { status: newStatus });
                } catch (e) {
                    console.error("Error toggling table status", e);
                }
            };
            // --- END TABLE LOGIC ---

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!isSuper) return; // Role safety check

                let parsedTerritory = [];
                if (formData.territory && formData.territory.trim() !== '') {
                    try {
                        parsedTerritory = JSON.parse(formData.territory);
                        if (!Array.isArray(parsedTerritory)) throw new Error("Must be a JSON array.");
                    } catch (err) {
                        alert("Invalid Territory JSON Format. Please enter a valid array of coordinates, e.g., [{\"lat\":11,\"lng\":104}]");
                        return;
                    }
                }

                const { doc, updateDoc, addDoc } = window.FirebaseApp;
                const shopCode = formData.name.toLowerCase().replace(/[^a-z0-9]/g, '');
                
                const data = { 
                    name: formData.name, 
                    brandingName: formData.brandingName || '',
                    phone: formData.phone || '',
                    location: formData.location, 
                    lat: formData.lat, 
                    lng: formData.lng,
                    radius: formData.radius ? Number(formData.radius) : '',
                    forbiddenDistance: formData.forbiddenDistance ? Number(formData.forbiddenDistance) : '',
                    sessionDuration: formData.sessionDuration ? Number(formData.sessionDuration) : 30,
                    territory: parsedTerritory,
                    shopCode: shopCode,
                    shopStatus: 'Active',
                    updatedAt: Date.now()
                };
                if (editingId) {
                    await updateDoc(doc(getColRef('shops'), editingId), data);
                } else {
                    const docRef = await addDoc(getColRef('shops'), { ...data, createdAt: Date.now() });
                    const qrUrl = `https://jlw168.github.io/App-Center/solariscafe.html?shop=${docRef.id}`;
                    await updateDoc(docRef, { shopQrUrl: qrUrl });
                }
                setIsModalOpen(false);
            };

            const del = async (id) => {
                if (isSuper && confirm("Delete this shop branch?")) {
                    const { deleteDoc, doc } = window.FirebaseApp;
                    await deleteDoc(doc(db, 'shops', id));
                }
            };

            return (
                <div className="max-w-6xl">
                    <div className="flex gap-2 mb-6 border-b border-stone-200 pb-2 overflow-x-auto no-scrollbar">
                        <button onClick={() => setActiveTab('branches')} className={`px-5 py-2 font-bold whitespace-nowrap transition-colors ${activeTab === 'branches' ? 'text-amber-600 border-b-2 border-amber-600' : 'text-stone-500 hover:text-stone-800'}`}>Shop Branches</button>
                        <button onClick={() => setActiveTab('tables')} className={`px-5 py-2 font-bold whitespace-nowrap transition-colors ${activeTab === 'tables' ? 'text-amber-600 border-b-2 border-amber-600' : 'text-stone-500 hover:text-stone-800'}`}>Table List</button>
                        <button onClick={() => setActiveTab('loyalty')} className={`px-5 py-2 font-bold whitespace-nowrap transition-colors ${activeTab === 'loyalty' ? 'text-amber-600 border-b-2 border-amber-600' : 'text-stone-500 hover:text-stone-800'}`}>Loyalty & Promos</button>
                    </div>

                    {activeTab === 'branches' && (
                        <div className="animate-fade-in">
                            <div className="flex justify-between items-center mb-6">
                                <div>
                                    <h2 className="text-2xl font-bold">Shop Branches</h2>
                                    <p className="text-sm text-stone-500 mt-1">Manage multiple store locations.</p>
                                </div>
                                {isSuper && (
                                    <button onClick={() => { setFormData({ name: '', brandingName: '', phone: '', location: '', lat: '', lng: '', radius: '', territory: '', forbiddenDistance: '', sessionDuration: 30 }); setEditingId(null); setIsModalOpen(true); }} className="bg-stone-900 text-white px-4 py-2 rounded-xl font-bold shadow-md">
                                        <i className="fa-solid fa-plus mr-2"></i> Add Shop
                                    </button>
                                )}
                            </div>

                            <div className="bg-white rounded-2xl border shadow-sm p-4 overflow-auto">
                                <table className="w-full min-w-[700px] text-left text-sm border-collapse border border-stone-300">
                                    <thead>
                                        <tr className="text-stone-700 uppercase tracking-wider bg-stone-100">
                                            <th className="p-3 font-bold border border-stone-300">Shop Name</th>
                                            <th className="p-3 font-bold border border-stone-300">Location Details</th>
                                            <th className="p-3 font-bold border border-stone-300 text-center">Coordinates</th>
                                            <th className="p-3 font-bold border border-stone-300 text-center">Session Limit</th>
                                            <th className="p-3 font-bold border border-stone-300 text-center">Block Radius</th>
                                            <th className="p-3 font-bold border border-stone-300 text-right">Actions</th>
                                        </tr>
                                    </thead>
                                    <tbody>
                                        {shops.map(shop => (
                                            <tr key={shop.id} className="hover:bg-stone-50 bg-white">
                                                <td className="p-3 border border-stone-300 font-bold text-stone-800">
                                                    {shop.name}
                                                    {shop.phone && <div className="text-xs text-stone-500 font-medium mt-1"><i className="fa-solid fa-phone mr-1 opacity-70"></i>{shop.phone}</div>}
                                                </td>
                                                <td className="p-3 border border-stone-300 font-medium text-stone-600">{shop.location}</td>
                                                <td className="p-3 border border-stone-300 text-center text-stone-500 text-xs">
                                                    {shop.lat && shop.lng ? `${shop.lat}, ${shop.lng}` : 'N/A'}
                                                    {shop.radius ? <div className="text-[10px] text-amber-600 font-bold mt-0.5">Radius: {shop.radius}m</div> : null}
                                                </td>
                                                <td className="p-3 border border-stone-300 text-center font-bold text-stone-600">
                                                    {shop.sessionDuration ? `${shop.sessionDuration} mins` : '30 mins'}
                                                </td>
                                                <td className="p-3 border border-stone-300 text-center font-bold text-stone-600">
                                                    {shop.forbiddenDistance ? `${shop.forbiddenDistance}m` : <span className="text-stone-400 italic font-normal">N/A</span>}
                                                </td>
                                                <td className="p-3 border border-stone-300 text-right">
                                                    <button onClick={() => setQrShop(shop)} className="p-2 text-stone-500 hover:text-stone-800 transition" title="View QR Code"><i className="fa-solid fa-qrcode text-lg"></i></button>
                                                    {isSuper && (
                                                        <>
                                                            <button onClick={() => { setFormData({ ...shop, brandingName: shop.brandingName || '', phone: shop.phone || '', radius: shop.radius || '', forbiddenDistance: shop.forbiddenDistance || '', sessionDuration: shop.sessionDuration || 30, territory: shop.territory && shop.territory.length > 0 ? JSON.stringify(shop.territory) : '' }); setEditingId(shop.id); setIsModalOpen(true); }} className="p-2 text-blue-500 hover:text-blue-700 transition" title="Edit Shop"><i className="fa-solid fa-pen"></i></button>
                                                            <button onClick={() => del(shop.id)} className="p-2 text-red-500 hover:text-red-700 transition" title="Delete Shop"><i className="fa-solid fa-trash"></i></button>
                                                        </>
                                                    )}
                                                </td>
                                            </tr>
                                        ))}
                                        {shops.length === 0 && <tr><td colSpan="6" className="text-center py-6 text-stone-400 border border-stone-300">No shops added yet.</td></tr>}
                                    </tbody>
                                </table>
                            </div>

                            {isModalOpen && isSuper && (
                                <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                                    <form onSubmit={handleSubmit} className="bg-white rounded-3xl w-full max-w-lg max-h-[90vh] overflow-y-auto p-6 shadow-2xl animate-fade-in relative">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="absolute top-4 right-4 text-stone-400 hover:text-stone-700"><i className="fa-solid fa-xmark text-lg"></i></button>
                                        <h3 className="text-xl font-bold mb-4">{editingId ? 'Edit Shop' : 'Add New Shop'}</h3>
                                        <div className="space-y-4 mb-6">
                                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                                <div>
                                                    <label className="block text-sm font-semibold text-stone-700 mb-1">Shop Name *</label>
                                                    <input type="text" required placeholder="e.g. Solaris BKK1" className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50 text-[16px]" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} autoFocus />
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-semibold text-stone-700 mb-1">Branding Name</label>
                                                    <input type="text" placeholder="e.g. Solaris Cafe" className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50 text-[16px]" value={formData.brandingName || ''} onChange={e => setFormData({...formData, brandingName: e.target.value})} />
                                                </div>
                                            </div>
                                            <div>
                                                <label className="block text-sm font-semibold text-stone-700 mb-1">Phone Number</label>
                                                <input type="tel" placeholder="e.g. 012 345 678" className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50 text-[16px]" value={formData.phone || ''} onChange={e => setFormData({...formData, phone: e.target.value})} />
                                            </div>
                                            <div>
                                                <label className="block text-sm font-semibold text-stone-700 mb-1">Location / Address</label>
                                                <textarea placeholder="e.g. St 288, BKK1..." className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50 text-[16px]" value={formData.location} onChange={e => setFormData({...formData, location: e.target.value})}></textarea>
                                            </div>
                                            <div className="grid grid-cols-2 gap-3">
                                                <div>
                                                    <label className="block text-sm font-semibold text-stone-700 mb-1">Latitude</label>
                                                    <input type="number" step="any" placeholder="e.g. 11.5564" className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50 text-[16px]" value={formData.lat} onChange={e => setFormData({...formData, lat: e.target.value})} />
                                                </div>
                                                <div>
                                                    <label className="block text-sm font-semibold text-stone-700 mb-1">Longitude</label>
                                                    <input type="number" step="any" placeholder="e.g. 104.9282" className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50 text-[16px]" value={formData.lng} onChange={e => setFormData({...formData, lng: e.target.value})} />
                                                </div>
                                            </div>
                                            <div className="grid grid-cols-2 gap-3 mt-4">

                                            <select className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-rose-400 bg-white font-bold text-stone-800 shadow-sm" value={promoFormData.isActive ? 'true' : 'false'} onChange={e => setPromoFormData({...promoFormData, isActive: e.target.value === 'true'})}>
                                                <option value="true">Active (Visible)</option>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">

                                            <input type="text" required placeholder="e.g. Summer Special 20%" className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-rose-400 bg-white font-bold shadow-sm" value={promoFormData.name} onChange={e => setPromoFormData({...promoFormData, name: e.target.value})} autoFocus />

                                            <label className="block text-sm font-semibold text-stone-700 mb-1">Note / Description</label>

                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                        <div>
                                            <label className="block text-sm font-semibold text-stone-700 mb-1">Start Date *</label>
                                            <input type="date" required className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-rose-400 bg-white font-bold shadow-sm" value={promoFormData.startDate} onChange={e => setPromoFormData({...promoFormData, startDate: e.target.value})} />
                                        </div>
                                        <div>
                                            <label className="block text-sm font-semibold text-stone-700 mb-1">End Date</label>
                                            <input type="date" className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-rose-400 bg-white font-bold shadow-sm" value={promoFormData.endDate || ''} onChange={e => setPromoFormData({...promoFormData, endDate: e.target.value})} />
                                            <p className="text-[10px] text-stone-400 mt-1">Leave empty for ongoing promotions.</p>
                                        </div>
                                    </div>

                                    {/* Promotion Logic Config */}
                                    <div className="bg-rose-50 p-4 rounded-xl border border-rose-100 shadow-sm mt-2">
                                        <label className="block text-sm font-bold text-rose-800 mb-3">Promotion Type & Reward Logic</label>
                                        <div className="flex flex-col sm:flex-row gap-3">
                                            <select className="border border-stone-300 rounded-lg px-3 py-2 text-sm font-bold text-stone-700 outline-none focus:border-rose-400 bg-white shadow-sm" value={promoFormData.type} onChange={e=>setPromoFormData({...promoFormData, type: e.target.value})}>
                                                <option value="BOGO">Buy X Get Y Free</option>

                                            {promoFormData.type === 'BOGO' && (
                                                <div className="flex items-center gap-2 text-sm font-bold text-rose-900">
                                                    <span>Buy</span>
                                                    <input type="number" min="1" className="w-16 border border-stone-300 rounded-lg px-2 py-1.5 text-center outline-none focus:border-rose-400 bg-white shadow-sm" value={promoFormData.requiredQty} onChange={e=>setPromoFormData({...promoFormData, requiredQty: Number(e.target.value)})} />
                                                    <span>Get</span>
                                                    <input type="number" min="1" className="w-16 border border-stone-300 rounded-lg px-2 py-1.5 text-center outline-none focus:border-rose-400 bg-white shadow-sm" value={promoFormData.rewardQty} onChange={e=>setPromoFormData({...promoFormData, rewardQty: Number(e.target.value)})} />
                                                    <span>Free</span>
                                                </div>
                                            )}
                                            {promoFormData.type === 'DISCOUNT_PCT' && (
                                                <div className="flex items-center gap-2 text-sm font-bold text-rose-900">
                                                    <span>Discount</span>
                                                    <input type="number" min="1" max="100" className="w-20 border border-stone-300 rounded-lg px-2 py-1.5 text-center text-rose-600 font-black outline-none focus:border-rose-400 bg-white shadow-sm" value={promoFormData.discountValue} onChange={e=>setPromoFormData({...promoFormData, discountValue: Number(e.target.value)})} />
                                                    <span>% Off</span>
                                                </div>
                                            )}
                                            {promoFormData.type === 'DISCOUNT_FIXED' && (
                                                <div className="flex items-center gap-2 text-sm font-bold text-rose-900">
                                                    <span>Discount</span>
                                                    <input type="number" min="100" step="100" className="w-24 border border-stone-300 rounded-lg px-2 py-1.5 text-center text-rose-600 font-black outline-none focus:border-rose-400 bg-white shadow-sm" value={promoFormData.discountValue} onChange={e=>setPromoFormData({...promoFormData, discountValue: Number(e.target.value)})} />
                                                    <span>៛ Off</span>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {/* Applicable Products */}
                                    <div className="bg-stone-50 p-4 rounded-xl border border-stone-200 mt-2">
                                        <label className="block text-sm font-semibold text-stone-800 mb-1">Promo Products / Scope</label>
                                        <p className="text-xs text-stone-500 mb-3 font-medium">Leave empty to apply to <b className="text-stone-700">all products globally</b>.</p>
                                        
                                        <div className="flex flex-wrap gap-2 mb-3 min-h-[32px]">
                                            {promoFormData.applicableProductIds?.map(id => {
                                                const p = products?.find(prod => prod.id === id);
                                                if (!p) return null;
                                                return (
                                                    <div key={id} className="bg-white border border-stone-300 text-stone-700 px-2 py-1 rounded-lg text-xs font-bold flex items-center gap-2 shadow-sm">
                                                        <span>{p.name} {p.productCode ? `(${p.productCode})` : ''}</span>
                                                        <button type="button" onClick={() => {
                                                            const newIds = promoFormData.applicableProductIds.filter(pid => pid !== id);
                                                            setPromoFormData({...promoFormData, applicableProductIds: newIds});
                                                        }} className="text-stone-400 hover:text-red-500 w-5 h-5 flex items-center justify-center rounded-full hover:bg-red-50 transition"><i className="fa-solid fa-xmark"></i></button>
                                                    </div>
                                                );
                                            })}
                                            {(!promoFormData.applicableProductIds || promoFormData.applicableProductIds.length === 0) && (
                                                <span className="text-xs italic text-stone-400 flex items-center h-8">Global Promotion Applied</span>
                                            )}
                                        </div>

                                        <div className="relative">
                                            <i className="fa-solid fa-magnifying-glass absolute left-3 top-1/2 -translate-y-1/2 text-stone-400 text-xs"></i>
                                            <input 
                                                type="text" 
                                                placeholder="Search to add specific products..." 
                                                className="w-full border border-stone-300 rounded-lg pl-8 pr-3 py-2 text-sm outline-none focus:border-rose-400 bg-white font-medium shadow-sm"
                                                value={promoSearchText}
                                                onChange={e => setPromoSearchText(e.target.value)}
                                            />
                                            
                                            {promoSearchText.trim().length > 0 && (
                                                <div className="absolute z-20 mt-1 w-full bg-white border border-stone-200 rounded-lg shadow-xl max-h-48 overflow-y-auto">
                                                    {products?.filter(p => {
                                                        const term = promoSearchText.toLowerCase();
                                                        const matches = p.name.toLowerCase().includes(term) || (p.productCode && p.productCode.toLowerCase().includes(term));
                                                        const notSelected = !(promoFormData.applicableProductIds || []).includes(p.id);
                                                        return matches && notSelected;
                                                    }).slice(0, 10).map(p => (
                                                        <button 
                                                            key={p.id}
                                                            type="button"
                                                            onClick={() => {
                                                                const newIds = [...(promoFormData.applicableProductIds || []), p.id];
                                                                setPromoFormData({...promoFormData, applicableProductIds: newIds});
                                                                setPromoSearchText(''); 
                                                            }}
                                                            className="w-full text-left px-3 py-2 hover:bg-rose-50 border-b border-stone-100 last:border-0 flex justify-between items-center transition"
                                                        >
                                                            <div>
                                                                <div className="text-sm font-bold text-stone-800">{p.name}</div>
                                                                {p.productCode && <div className="text-[10px] text-stone-500 uppercase font-medium">{p.productCode}</div>}
                                                            </div>
                                                            <i className="fa-solid fa-plus text-rose-500 text-xs bg-white border border-rose-200 shadow-sm w-6 h-6 rounded flex items-center justify-center"></i>
                                                        </button>
                                                    ))}
                                                    {products?.filter(p => {
                                                        const term = promoSearchText.toLowerCase();
                                                        const matches = p.name.toLowerCase().includes(term) || (p.productCode && p.productCode.toLowerCase().includes(term));
                                                        const notSelected = !(promoFormData.applicableProductIds || []).includes(p.id);
                                                        return matches && notSelected;
                                                    }).length === 0 && (
                                                        <div className="p-3 text-xs text-stone-500 text-center font-medium">No matching items to add.</div>
                                                    )}
                                                </div>
                                            )}
                                        </div>
                                    </div>
                                </div>

                                <div className="flex justify-end pt-4 border-t border-stone-100">
                                    <div className="flex gap-2">
                                        <button type="button" onClick={() => setPromoModalOpen(false)} className="px-5 py-2.5 rounded-xl font-semibold text-stone-600 hover:bg-stone-200 transition">Cancel</button>
                                        <button type="submit" className="px-5 py-2.5 rounded-xl font-bold bg-stone-900 text-white hover:bg-stone-800 shadow-md transition flex items-center">
                                            <i className="fa-solid fa-save mr-2 text-amber-500"></i> Save Promotion
                                        </button>
                                    </div>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        function POSView({ orders, products, categories, tables, shops, shifts, sugarOptions, iceOptions, currentAdminRecord, admins }) {
            const isSuper = (currentAdminRecord?.role || 'Admin') === 'Admin';
            const allowedShopIds = currentAdminRecord?.shopIds || (currentAdminRecord?.shopId ? [currentAdminRecord.shopId] : []);
            const canSelectMultiple = isSuper || allowedShopIds.includes('All') || allowedShopIds.length > 1;
            
            const [mode, setMode] = useState('manage'); 
            const [posShopId, setPosShopId] = useState(isSuper || allowedShopIds.includes('All') ? 'All' : allowedShopIds[0]);
            const [cartShopId, setCartShopId] = useState(isSuper || allowedShopIds.includes('All') ? '' : allowedShopIds[0]);

            const [cartMode, setCartMode] = useState('TAKEAWAY');
            const [cartTableId, setCartTableId] = useState('');
            const [cartTableName, setCartTableName] = useState('');

            const [allPromotions, setAllPromotions] = useState([]);
            const [showTableManager, setShowTableManager] = useState(false);
            
            // FIX: Custom Alert and Confirm Modals to prevent silent Iframe execution blocks
            const [posError, setPosError] = useState('');
            const [confirmAction, setConfirmAction] = useState(null);

            useEffect(() => {
                const { onSnapshot, collection } = window.FirebaseApp;
                const unsub = onSnapshot(collection(db, 'loyalty_settings'), snap => {
                    let loaded = [];
                    snap.docs.forEach(d => {
                        if (d.id !== 'global_points') {
                            const data = d.data();
                            if (data.promotions) {
                                data.promotions.forEach(p => loaded.push({ ...p, shopId: d.id }));
                            }
                        }
                    });
                    setAllPromotions(loaded);
                });
                return () => unsub();
            }, []);

            const currentShift = useMemo(() => {
                return shifts?.find(s => s.shopId === posShopId && s.status === 'Open');
            }, [shifts, posShopId]);

            const [startingCashInput, setStartingCashInput] = useState('');
            const [openShiftModal, setOpenShiftModal] = useState(false);
            const [closeShiftModal, setCloseShiftModal] = useState(false);
            const [actualCash, setActualCash] = useState('');
            const [actualBank, setActualBank] = useState('');

            // Shift Totals Calculation
            const shiftOrders = useMemo(() => {
                if (!currentShift) return [];
                return orders.filter(o => o.shiftId === currentShift.id && o.paymentStatus === 'Paid');
            }, [orders, currentShift]);

            const cashSales = shiftOrders.filter(o => o.paymentMethod === 'Cash').reduce((s,o)=>s+o.totalAmount,0);
            const bankSales = shiftOrders.filter(o => o.paymentMethod === 'Bank').reduce((s,o)=>s+o.totalAmount,0);
            const expectedCash = (currentShift?.startingCash || 0) + cashSales;
            const expectedBank = bankSales;

            const handleOpenShift = async (e) => {
                e.preventDefault();
                try {
                    const { addDoc, updateDoc, doc } = window.FirebaseApp;
                    
                    const targetShopId = cartShopId || posShopId;
                    
                    // 1. Create the new shift
                    const shiftRef = await addDoc(getColRef('shifts'), {
                        shopId: targetShopId,
                        openedBy: currentAdminRecord?.name || currentAdminRecord?.email || 'Unknown',
                        openedAt: Date.now(),
                        startingCash: Number(startingCashInput),
                        status: 'Open'
                    });

                    // --- THE "PRE-SHIFT QUEUE" FIX ---
                    // Catch-up logic: Find any early-bird orders from today that belong 
                    // to this shop but don't have a shift attached yet.
                    const midnight = new Date().setHours(0, 0, 0, 0);
                    const orphanedOrders = orders.filter(o => 
                        o.shopId === targetShopId && 
                        o.createdAt >= midnight && 
                        !o.shiftId
                    );

                    // Auto-attach these stranded orders to the brand new shift
                    for (const order of orphanedOrders) {
                        await updateDoc(doc(getColRef('orders'), order.id), {
                            shiftId: shiftRef.id
                        });
                    }
                    // ---------------------------------

                    setStartingCashInput('');
                    setOpenShiftModal(false);
                    setMode('pos');
                } catch (err) {
                    setPosError("Failed to open register: " + err.message);
                }
            };

            const handleCloseShift = async (e) => {
                e.preventDefault();
                try {
                    const cashVar = Number(actualCash) - expectedCash;
                    const bankVar = Number(actualBank) - expectedBank;

                    const { updateDoc, doc } = window.FirebaseApp;
                    await updateDoc(doc(getColRef('shifts'), currentShift.id), {
                        status: 'Closed',
                        closedAt: Date.now(),
                        closedBy: currentAdminRecord?.name || currentAdminRecord?.email || 'Unknown',
                        cashSales,
                        bankSales,
                        totalSales: cashSales + bankSales,
                        expectedCash,
                        actualCash: Number(actualCash),
                        cashVariance: cashVar,
                        expectedBank,
                        actualBank: Number(actualBank),
                        bankVariance: bankVar
                    });
                    setCloseShiftModal(false);
                    setActualCash('');
                    setActualBank('');
                } catch (err) {
                    setPosError("Failed to close shift: " + err.message);
                }
            };

            useEffect(() => {
                if (shops.length > 0 && !cartShopId && isSuper) {
                    setCartShopId(shops[0].id);
                }
            }, [shops, cartShopId, isSuper]);

            useEffect(() => {
                setCartTableId('');
                setCartTableName('');
            }, [cartShopId]);
            
            // Robust Time Tracking: Calculate Midnight of the current day using precise Timestamps
            const startOfToday = useMemo(() => new Date().setHours(0, 0, 0, 0), []);
            
            const { todayOrders, activeOrders, tableBaseOrders } = useMemo(() => {
                const today = [], active = [], tableBase = [];
                for (let i = 0; i < orders.length; i++) {
                    const o = orders[i];
                    if (posShopId !== 'All' && o.shopId !== posShopId) continue;
                    
                    const isToday = o.createdAt >= startOfToday;
                    const isActive = ['New', 'Preparing', 'Ready'].includes(o.status);
                    
                    if (isToday) today.push(o);
                    if (isActive) active.push(o);
                    if (isToday || isActive) tableBase.push(o);
                }
                return { todayOrders: today, activeOrders: active, tableBaseOrders: tableBase };
            }, [orders, posShopId, startOfToday]);

            const [filterStatus, setFilterStatus] = useState('All');
            const [searchOrderQuery, setSearchOrderQuery] = useState('');

            // Added Report Filters
            const [dateFilter, setDateFilter] = useState('today');
            const [customDate, setCustomDate] = useState('');
            const [historicalOrders, setHistoricalOrders] = useState([]);
            const [isFetchingHistory, setIsFetchingHistory] = useState(false);

            useEffect(() => {
                if (dateFilter === 'today') return;

                const fetchHistory = async () => {
                    setIsFetchingHistory(true);
                    const { getDocs, query, where, collection } = window.FirebaseApp;
                    const now = new Date();
                    let startTime = 0;
                    let endTime = now.getTime();

                    if (dateFilter === 'yesterday') {
                        const today = new Date(now.getFullYear(), now.getMonth(), now.getDate());
                        startTime = today.getTime() - (24 * 60 * 60 * 1000);
                        endTime = today.getTime();
                    } else if (dateFilter === 'this_week') {
                        startTime = now.getTime() - (7 * 24 * 60 * 60 * 1000);
                    } else if (dateFilter === 'last_week') {
                        startTime = now.getTime() - (14 * 24 * 60 * 60 * 1000);
                        endTime = now.getTime() - (7 * 24 * 60 * 60 * 1000);
                    } else if (dateFilter === 'this_month') {
                        startTime = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
                    } else if (dateFilter === 'last_month') {
                        startTime = new Date(now.getFullYear(), now.getMonth() - 1, 1).getTime();
                        endTime = new Date(now.getFullYear(), now.getMonth(), 1).getTime();
                    } else if (dateFilter === 'this_year') {
                        startTime = new Date(now.getFullYear(), 0, 1).getTime();
                    } else if (dateFilter === 'last_year') {
                        startTime = new Date(now.getFullYear() - 1, 0, 1).getTime();
                        endTime = new Date(now.getFullYear(), 0, 1).getTime();
                    } else if (dateFilter === 'custom_date' && customDate) {
                        const [year, month, day] = customDate.split('-');
                        startTime = new Date(year, month - 1, day).getTime();
                        endTime = startTime + (24 * 60 * 60 * 1000);
                    }

                    try {
                        const q = query(
                            collection(db, 'orders'),
                            where('createdAt', '>=', startTime),
                            where('createdAt', '<', endTime)
                        );
                        const snap = await getDocs(q);
                        setHistoricalOrders(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.createdAt-a.createdAt));
                    } catch(err) {
                        console.error("Failed to fetch historical orders", err);
                    } finally {
                        setIsFetchingHistory(false);
                    }
                };
                fetchHistory();
            }, [dateFilter, customDate]);

            const displayedOrders = useMemo(() => {
                const sourceData = dateFilter === 'today' ? tableBaseOrders : historicalOrders;
                const searchLower = searchOrderQuery.toLowerCase();

                return sourceData.filter(o => {
                    // Enforce the shop filter for historical orders
                    if (dateFilter !== 'today' && posShopId !== 'All' && o.shopId !== posShopId) return false;

                    const matchStatus = filterStatus === 'All' || o.status === filterStatus;
                    const matchSearch = String(o.queueNo || '').toLowerCase().includes(searchLower) ||
                                        String(o.customerName || '').toLowerCase().includes(searchLower) ||
                                        String(o.customerPhone || '').toLowerCase().includes(searchLower) ||
                                        String(o.tableName || '').toLowerCase().includes(searchLower);
                    
                    return matchStatus && matchSearch;
                });
            }, [tableBaseOrders, historicalOrders, filterStatus, searchOrderQuery, dateFilter, posShopId]);

            const updateStatus = async (order, newStatus) => {
                const { doc, updateDoc } = window.FirebaseApp;
                const updateData = { status: newStatus, staffId: currentAdminRecord?.id };
                
                if (newStatus === 'Ready' || newStatus === 'Served' || newStatus === 'Cancelled') {
                    updateData.completedAt = Date.now();
                }

                await updateDoc(doc(getColRef('orders'), order.id), updateData);
                
                if (newStatus === 'Served' || newStatus === 'Cancelled') {
                    await releaseTableIfNotUsed(order.tableId, order.id, orders);
                }
            };

            const updatePayment = async (order, payStatus, payMethod) => {
                const { doc, updateDoc } = window.FirebaseApp;
                
                // CRITICAL FIX: Find the shift based on the ORDER'S shopId, not the currently selected POS filter.
                const targetShift = shifts?.find(s => s.shopId === order.shopId && s.status === 'Open');
                
                const updateData = {
                    paymentStatus: payStatus,
                    paymentMethod: payMethod,
                    staffId: currentAdminRecord?.id
                };
                
                if (payStatus === 'Paid' && targetShift) {
                    updateData.shiftId = targetShift.id;
                }
                
                await updateDoc(doc(getColRef('orders'), order.id), updateData);
            };

            const deleteOrder = async (order) => {
                setConfirmAction({
                    message: "Are you sure you want to completely delete this order? This cannot be undone.",
                    onConfirm: async () => {
                        try {
                            const { deleteDoc, doc } = window.FirebaseApp;
                            await deleteDoc(doc(db, 'orders', order.id));
                            await releaseTableIfNotUsed(order.tableId, order.id, orders);
                        } catch (err) {
                            setPosError("Error deleting order: " + err.message);
                        }
                        setConfirmAction(null);
                    }
                });
            };

            const statusColors = {
                'New': 'bg-blue-100 text-blue-800',
                'Preparing': 'bg-amber-100 text-amber-800',
                'Ready': 'bg-green-100 text-green-800',
                'Served': 'bg-stone-100 text-stone-500',
                'Cancelled': 'bg-red-100 text-red-800'
            };

            const formatDateTime = (timestamp) => {
                const d = new Date(timestamp);
                const day = String(d.getDate()).padStart(2, '0');
                const month = String(d.getMonth() + 1).padStart(2, '0');
                const year = String(d.getFullYear()).slice(-2);
                let hrs = d.getHours();
                const ampm = hrs >= 12 ? 'pm' : 'am';
                hrs = hrs % 12 || 12;
                const mins = String(d.getMinutes()).padStart(2, '0');
                return `${day}-${month}-${year} | ${hrs}:${mins} ${ampm}`;
            };

            const [cart, setCart] = useState([]);
            const [customerName, setCustomerName] = useState('');
            const [activeCategory, setActiveCategory] = useState('All');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [selectedItemForOptions, setSelectedItemForOptions] = useState(null);

            const [customerPhone, setCustomerPhone] = useState('');
            const [isCheckingPhone, setIsCheckingPhone] = useState(false);
            const [customerData, setCustomerData] = useState(null);

            const [showSetupModal, setShowSetupModal] = useState(false);
            
            // NEW: Fetch Global Points for Loyalty Calculation
            const [globalPoints, setGlobalPoints] = useState(null);
            useEffect(() => {
                const { doc, getDoc } = window.FirebaseApp;
                getDoc(doc(db, 'loyalty_settings', 'global_points')).then(snap => {
                    if (snap.exists()) setGlobalPoints(snap.data());
                }).catch(e => console.warn(e));
            }, []);

            const customerLoyalty = useMemo(() => {
                if (!customerPhone || !globalPoints?.pointsEnabled) return null;
                let spent = 0;
                let redeemed = 0;
                orders.forEach(o => {
                    if (o.customerPhone === customerPhone && o.status !== 'Cancelled') {
                        spent += o.totalAmount;
                        if (o.redeemedPoints) redeemed += o.redeemedPoints;
                    }
                });
                const earnedPts = Math.floor(spent / (globalPoints.spendAmount || 4000)) * (globalPoints.pointsEarned || 1);
                const activePts = Math.max(0, earnedPts - redeemed);
                const freeClaims = Math.floor(activePts / (globalPoints.redeemPoints || 10));
                return { activePts, freeClaims };
            }, [orders, customerPhone, globalPoints]);

            useEffect(() => {
                const checkPhone = async () => {
                    const cleanedPhone = String(customerPhone).replace(/\D/g, '');
                    if (!cleanedPhone || cleanedPhone.length < 8) {
                        setCustomerData(null);
                        return;
                    }
                    
                    setIsCheckingPhone(true);
                    try {
                        const { query, where, getDocs, limit, collection } = window.FirebaseApp;
                        const qCust = query(collection(db, 'customers'), where('phone', '==', customerPhone), limit(1));
                        const snapCust = await getDocs(qCust);
                        
                        if (!snapCust.empty) {
                            const data = snapCust.docs[0].data();
                            setCustomerData({ id: snapCust.docs[0].id, ...data });
                            if (!customerName) setCustomerName(data.name);
                        } else {
                            setCustomerData(null);
                        }
                    } catch (err) {
                        console.warn("Phone check failed:", err);
                    } finally {
                        setIsCheckingPhone(false);
                    }
                };
                const timeoutId = setTimeout(checkPhone, 500);
                return () => clearTimeout(timeoutId);
            }, [customerPhone]);

            const filteredProducts = useMemo(() => {
                if (!products) return [];
                return products.filter(p => {
                    const matchesCategory = activeCategory === 'All' || p.category === activeCategory;
                    if (!matchesCategory) return false;
                    
                    // Phase 3: Smart Storefront Logic (POS View)
                    if (p.isAvailable === false || p.visibilityMode === 'Hidden') return false;
                    
                    if (p.visibilityMode === 'Specific') {
                        // Strict filter based on the branch the cashier is currently targeting
                        if (!cartShopId || !p.availableShopIds || !p.availableShopIds.includes(cartShopId)) {
                            return false;
                        }
                    }
                    
                    return true;
                });
            }, [products, activeCategory, cartShopId]);

            const handleSizeClick = (product, size, price) => {
                if (product.hasSugarOption || product.hasIceOption) {
                    const defaultSugar = sugarOptions?.length > 0 ? (sugarOptions.find(o => Number(o.order) === 1)?.name || sugarOptions[0].name) : '100%';
                    const defaultIce = iceOptions?.length > 0 ? (iceOptions.find(o => Number(o.order) === 1)?.name || iceOptions[0].name) : 'Normal Ice';
                    setSelectedItemForOptions({ 
                        product, 
                        size, 
                        price, 
                        sugar: product.hasSugarOption ? defaultSugar : null,
                        ice: product.hasIceOption ? defaultIce : null
                    });
                } else {
                    addToCart(product, size, price, null, null);
                }
            };

            const addToCart = (product, size, price, sugar, ice, editCartIndex = undefined) => {
                setCart(prev => {
                    if (editCartIndex !== undefined) {
                        const newCart = [...prev];
                        const existingIndex = newCart.findIndex((item, idx) => 
                            idx !== editCartIndex && item.productId === product.id && item.size === size && item.sugar === sugar && item.ice === ice
                        );
                        
                        if (existingIndex >= 0) {
                            newCart[existingIndex] = { ...newCart[existingIndex], quantity: newCart[existingIndex].quantity + newCart[editCartIndex].quantity };
                            newCart.splice(editCartIndex, 1);
                        } else {
                            newCart[editCartIndex] = { ...newCart[editCartIndex], size, price, sugar, ice };
                        }
                        return newCart;
                    }

                    const existingIndex = prev.findIndex(item => item.productId === product.id && item.size === size && item.sugar === sugar && item.ice === ice);
                    if (existingIndex >= 0) {
                        const newCart = [...prev];
                        // BUG FIX: Prevent direct state mutation
                        newCart[existingIndex] = { ...newCart[existingIndex], quantity: newCart[existingIndex].quantity + 1 };
                        return newCart;
                    }
                    return [...prev, { productId: product.id, name: product.name, size, price: price || 0, quantity: 1, image: product.image, sugar, ice }];
                });
            };

            const handleEditCartItem = (idx) => {
                const item = cart[idx];
                const product = products.find(p => p.id === item.productId);
                const hasMultipleSizes = product && product.priceSmall > 0 && product.priceLarge > 0;
                
                if (product && (product.hasSugarOption || product.hasIceOption || hasMultipleSizes)) {
                    const defaultSugar = sugarOptions?.length > 0 ? (sugarOptions.find(o => Number(o.order) === 1)?.name || sugarOptions[0].name) : '100%';
                    const defaultIce = iceOptions?.length > 0 ? (iceOptions.find(o => Number(o.order) === 1)?.name || iceOptions[0].name) : 'Normal Ice';
                    setSelectedItemForOptions({ 
                        product, 
                        size: item.size, 
                        price: item.price, 
                        sugar: item.sugar || (product.hasSugarOption ? defaultSugar : null),
                        ice: item.ice || (product.hasIceOption ? defaultIce : null),
                        editCartIndex: idx
                    });
                }
            };

            const updateCartQty = (idx, delta) => {
                setCart(prev => {
                    const newCart = [...prev];
                    // BUG FIX: Prevent direct state mutation
                    newCart[idx] = { ...newCart[idx], quantity: newCart[idx].quantity + delta };
                    if (newCart[idx].quantity <= 0) newCart.splice(idx, 1);
                    return newCart;
                });
            };

            const { processedCart, cartTotal } = useMemo(() => {
                let total = 0;
                const todayStr = getTodayString();
                
                const activePromos = allPromotions.filter(p => p.shopId === cartShopId && p.isActive && (!p.startDate || p.startDate <= todayStr) && (!p.endDate || p.endDate >= todayStr));

                const processed = cart.map(item => {
                    const promo = activePromos.find(p => !p.applicableProductIds || p.applicableProductIds.length === 0 || p.applicableProductIds.includes(item.productId));
                    
                    let effectiveUnitPrice = item.price;
                    let lineTotal = item.price * item.quantity;
                    let promoName = null;
                    let freeQty = 0;
                    let totalQtyForKDS = item.quantity;

                    if (promo) {
                        promoName = promo.name;
                        if (promo.type === 'DISCOUNT_PCT') {
                            const discountAmt = item.price * (promo.discountValue / 100);
                            effectiveUnitPrice = item.price - discountAmt;
                            lineTotal = effectiveUnitPrice * item.quantity;
                        } else if (promo.type === 'DISCOUNT_FIXED') {
                            effectiveUnitPrice = Math.max(0, item.price - promo.discountValue);
                            lineTotal = effectiveUnitPrice * item.quantity;
                        } else if (promo.type === 'BOGO') {
                            freeQty = Math.floor(item.quantity / promo.requiredQty) * promo.rewardQty;
                            totalQtyForKDS = item.quantity + freeQty;
                            if (freeQty > 0) {
                                promoName = `${promo.name} (+${freeQty} Free)`;
                            }
                        }
                    }

                    total += lineTotal;

                    return {
                        ...item,
                        originalPrice: item.price,
                        effectiveUnitPrice,
                        lineTotal,
                        quantity: totalQtyForKDS, 
                        paidQuantity: item.quantity, 
                        freeQuantity: freeQty,
                        promoName
                    };
                });

                return { processedCart: processed, cartTotal: total };
            }, [cart, allPromotions, cartShopId]);

            const handleCheckout = async (targetStatus, payStatus, payMethod) => {
                if (cart.length === 0) return;
                setIsSubmitting(true);
                
                const { setDoc, updateDoc, doc, runTransaction } = window.FirebaseApp;
                
                const today = getTodayString();
                
                // TAX DEPT FORMAT: Extract last 3 alphanumeric characters of the shop name
                const targetShop = shops.find(s => s.id === cartShopId) || { name: 'UNK', id: 'UNKNOWN' };
                const cleanShopName = targetShop.name.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
                const shopPrefix = cleanShopName.length >= 3 ? cleanShopName.slice(-3) : cleanShopName.padStart(3, 'X');

                // OPTIMISTIC QUEUE GENERATION FOR INSTANT UI
                const shopOrders = orders.filter(o => o.shopId === cartShopId);
                const highestQueue = shopOrders.length > 0 ? Math.max(...shopOrders.map(o => parseInt(String(o.queueNo).split('-')[1]) || 0)) : 0;
                const optimisticQueueNo = `${shopPrefix}-${(highestQueue + 1).toString().padStart(9, '0')}`;

                const cartTargetShift = shifts?.find(s => s.shopId === cartShopId && s.status === 'Open');

                // Snapshot the processed cart state
                const currentCart = [...processedCart];
                const currentTotal = cartTotal;

                const orderData = {
                    shiftId: cartTargetShift ? cartTargetShift.id : null,
                    staffId: currentAdminRecord?.id,
                    userId: customerData ? customerData.id : (currentAdminRecord?.id || null),
                    queueNo: optimisticQueueNo,
                    orderType: cartMode, 
                    tableId: cartMode === 'DINE_IN' ? cartTableId : 'Walk-in',
                    tableName: cartMode === 'DINE_IN' ? cartTableName : 'Take Away',
                    customerName: customerName || 'Walk-in',
                    customerPhone: customerPhone || '',
                    items: currentCart,
                    totalAmount: currentTotal,
                    status: targetStatus, 
                    paymentStatus: payStatus,
                    paymentMethod: payMethod,
                    dateString: today,
                    createdAt: Date.now()
                };

                if (targetStatus === 'Served' || targetStatus === 'Cancelled') {
                    orderData.completedAt = Date.now();
                }

                // OPTIMISTIC UI UPDATE: Clear POS Register Instantly
                if (navigator.vibrate) navigator.vibrate([30, 30]);
                setCart([]);
                setCustomerName('');
                setCustomerPhone('');
                setCustomerData(null);
                setCartMode('TAKEAWAY');
                setCartTableId('');
                setCartTableName('');
                setMode('manage');
                setIsSubmitting(false);

                // KDS PERFORMANCE FIX: Push the order to the database INSTANTLY.
                // Do not wait for the invoice transaction to finish before showing it to the kitchen!
                const newOrderRef = doc(getColRef('orders'));
                const instantOrderPromise = setDoc(newOrderRef, orderData);

                // BACKGROUND SYNC: Fire and Forget Database operations
                Promise.resolve().then(async () => {
                    try {
                        await instantOrderPromise; // Wait for initial save to finish

                        // Auto-create new customer if phone provided but not found
                        if (customerPhone && !customerData) {
                            const cleanPhone = String(customerPhone).replace(/\D/g, '');
                            if (cleanPhone.length >= 8) {
                                try {
                                    const { addDoc, collection } = window.FirebaseApp;
                                    await addDoc(collection(db, 'customers'), {
                                        phone: customerPhone,
                                        name: customerName || 'Walk-in',
                                        createdAt: Date.now(),
                                        lastVisit: Date.now()
                                    });
                                } catch (err) {
                                    console.warn("Failed to auto-create customer:", err);
                                }
                            }
                        }

                        // SECURE FIREBASE TRANSACTION IN BACKGROUND
                        let finalQueueString = optimisticQueueNo;
                        try {
                            const counterRef = doc(db, 'invoice_counters', targetShop.id);
                            const nextSeq = await runTransaction(db, async (transaction) => {
                                const counterDoc = await transaction.get(counterRef);
                                let nextVal = 1;
                                if (counterDoc.exists()) {
                                    nextVal = (counterDoc.data().currentValue || 0) + 1;
                                    transaction.update(counterRef, { currentValue: nextVal });
                                } else {
                                    transaction.set(counterRef, { currentValue: nextVal });
                                }
                                return nextVal;
                            });
                            finalQueueString = `${shopPrefix}-${nextSeq.toString().padStart(9, '0')}`;
                        } catch (err) {
                            console.warn("Transaction failed, using fallback:", err);
                        }

                        // If the transaction found a newer sequence, silently update the ticket queue number
                        if (finalQueueString !== optimisticQueueNo) {
                            await updateDoc(newOrderRef, { queueNo: finalQueueString });
                        }

                        // Run parallel operations
                        await Promise.all([
                            deductInventory(currentCart, products, cartShopId, finalQueueString),
                            (cartMode === 'DINE_IN' && cartTableId) 
                                ? updateDoc(doc(getColRef('tables'), cartTableId), { status: 'Occupied' }).catch(err => console.warn(err))
                                : Promise.resolve()
                        ]);
                    } catch (err) {
                        console.error("POS Checkout failed in background:", err);
                    }
                });
            };

                            <div className="flex-1 flex flex-col overflow-hidden bg-white rounded-2xl shadow-sm border border-stone-200">
