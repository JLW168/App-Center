        // ==========================================
        //         CUSTOMER PORTAL MAIN
        function CustomerPortal({ products, categories, tables, orders, shops, currentUser, isMenuLoading, isSetupLoading, sugarOptions, iceOptions, onAdminClick }) {
            const [activeCategory, setActiveCategory] = useState('All');
            const [searchQuery, setSearchQuery] = useState('');
            
            // REDUNDANCY FIX: Lazy load cart from localStorage to survive page refresh
            const [cart, setCart] = useState(() => {
                try {
                    const saved = localStorage.getItem('solaris_cart');
                    return saved ? JSON.parse(saved) : [];
                } catch(e) {
                    return [];
                }
            });
            
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [submittedOrder, setSubmittedOrder] = useState(null);
            
            const [selectedItemForOptions, setSelectedItemForOptions] = useState(null);
            const [customerHistory, setCustomerHistory] = useState([]);
            
            // NATIVE FEEL: Detect network drops instantly
            const [isOffline, setIsOffline] = useState(!navigator.onLine);

            useEffect(() => {
                const handleOffline = () => setIsOffline(true);
                const handleOnline = () => setIsOffline(false);
                window.addEventListener('offline', handleOffline);
                window.addEventListener('online', handleOnline);
                return () => {
                    window.removeEventListener('offline', handleOffline);
                    window.removeEventListener('online', handleOnline);
                };
            }, []);

            const queryParams = new URLSearchParams(window.location.search);
            const tableIdParam = queryParams.get('table');
            const shopIdParam = queryParams.get('shop');
            
            const [qrError, setQrError] = useState('');

            const detectedShop = useMemo(() => {
                if (!shopIdParam) return null;
                return shops.find(s => s.id === shopIdParam || s.shopCode === shopIdParam);
            }, [shopIdParam, shops]);

            const qrDetectedTable = useMemo(() => {
                if (!tableIdParam) return null;
                return tables.find(t => 
                    (t.id === tableIdParam || t.name === tableIdParam) && 
                    (!detectedShop || t.shopId === detectedShop.id)
                );
            }, [tableIdParam, tables, detectedShop]);

            useEffect(() => {
                if (isSetupLoading) return;
                let errorMsg = '';
                if (shopIdParam && !detectedShop) {
                    errorMsg = "Invalid QR Code: Shop branch not found or inactive.";
                } else if (tableIdParam && !qrDetectedTable) {
                    errorMsg = "Invalid QR Code: Table not found or doesn't belong to this branch.";
                }
                setQrError(errorMsg);
            }, [isSetupLoading, shopIdParam, tableIdParam, detectedShop, qrDetectedTable]);

            // REDUNDANCY FIX: Lazy load sessionInfo to preserve identity and table info on refresh
            const [sessionInfo, setSessionInfo] = useState(() => {
                try {
                    const saved = localStorage.getItem('solaris_session');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        // Ensure session hasn't expired (30 mins limit)
                        if (Date.now() - parsed.sessionTimestamp <= 30 * 60 * 1000) {
                            return parsed; // Keep existing session if valid
                        }
                    }
                } catch(e) {}
                
                // Fallback to fresh session
                return {
                    isSetup: false,
                    mode: qrDetectedTable ? 'QR' : null, 
                    tableId: qrDetectedTable ? qrDetectedTable.id : null,
                    tableName: qrDetectedTable ? qrDetectedTable.name : null,
                    shopId: qrDetectedTable ? qrDetectedTable.shopId : (detectedShop ? detectedShop.id : null),
                    customerName: '',
                    customerPhone: '',
                    sessionTimestamp: Date.now() 
                };
            });

            // REDUNDANCY FIX: Sync changes to localStorage continuously
            useEffect(() => {
                localStorage.setItem('solaris_cart', JSON.stringify(cart));
            }, [cart]);

            useEffect(() => {
                localStorage.setItem('solaris_session', JSON.stringify(sessionInfo));
            }, [sessionInfo]);

            // Auto-sync sessionInfo when shop/table completely finishes loading
            useEffect(() => {
                if (!isSetupLoading && !sessionInfo.isSetup) {
                    setSessionInfo(prev => ({
                        ...prev,
                        mode: qrDetectedTable ? 'QR' : prev.mode,
                        tableId: qrDetectedTable ? qrDetectedTable.id : prev.tableId,
                        tableName: qrDetectedTable ? qrDetectedTable.name : prev.tableName,
                        shopId: qrDetectedTable ? qrDetectedTable.shopId : (detectedShop ? detectedShop.id : prev.shopId)
                    }));
                }
            }, [isSetupLoading, qrDetectedTable, detectedShop, sessionInfo.isSetup]);

            const [showSetupModal, setShowSetupModal] = useState(false);
            const [cartNotes, setCartNotes] = useState('');
            const [isTrackerOpen, setIsTrackerOpen] = useState(false);
            const [phoneSearchQuery, setPhoneSearchQuery] = useState('');
            const [customMessage, setCustomMessage] = useState('');
            const toastTimerRef = useRef(null);

            const handleSetupSubmit = (e, data) => {
                if (e) e.preventDefault();
                setSessionInfo(prev => ({
                    ...prev,
                    isSetup: true,
                    customerPhone: data.phone,
                    customerName: data.name,
                    mode: data.mode,
                    shopId: data.shopId,
                    tableId: data.tableId,
                    tableName: data.tableName,
                    sessionTimestamp: Date.now()
                }));
                setShowSetupModal(false);
            };

            const handleSwitchMode = (newMode) => {
                setSessionInfo(prev => ({ ...prev, mode: newMode, tableId: '', tableName: '' }));
                setShowSetupModal(true);
            };

            const getGreeting = () => {
                const hour = new Date().getHours();
                if (hour < 12) return 'Good Morning';
                if (hour < 18) return 'Good Afternoon';
                return 'Good Evening';
            };

            const getCategoryDetails = (catName) => {
                const lower = catName.toLowerCase();
                
                // Custom: Dopamine -> Brain (Healthy brain/focus)
                if (lower.includes('dopamine') || lower.includes('energy') || lower.includes('focus')) return { icon: 'fa-brain', color: 'text-fuchsia-600', bg: 'bg-fuchsia-100' };
                
                // Classic Coffee
                if (lower.includes('coffee') || lower.includes('espresso') || lower.includes('americano')) return { icon: 'fa-mug-hot', color: 'text-amber-800', bg: 'bg-amber-100' };
                
                // Tea & Matcha
                if (lower.includes('tea') || lower.includes('matcha') || lower.includes('kombucha')) return { icon: 'fa-leaf', color: 'text-green-600', bg: 'bg-green-100' };
                
                // Blended / Smoothies
                if (lower.includes('smoothie') || lower.includes('frappe') || lower.includes('blend')) return { icon: 'fa-blender', color: 'text-purple-600', bg: 'bg-purple-100' };
                
                // Cold Drinks / Refreshments
                if (lower.includes('drink') || lower.includes('soda') || lower.includes('juice') || lower.includes('refresh') || lower.includes('water')) return { icon: 'fa-glass-water', color: 'text-cyan-500', bg: 'bg-cyan-100' };
                
                // Milk & Dairy
                if (lower.includes('milk') || lower.includes('latte') || lower.includes('cream')) return { icon: 'fa-bottle-droplet', color: 'text-sky-500', bg: 'bg-sky-100' };
                
                // Food & Bakery
                if (lower.includes('food') || lower.includes('snack') || lower.includes('pastry') || lower.includes('bakery') || lower.includes('bread') || lower.includes('croissant')) return { icon: 'fa-bread-slice', color: 'text-orange-600', bg: 'bg-orange-100' };
                
                // Sweets & Desserts
                if (lower.includes('dessert') || lower.includes('ice cream') || lower.includes('cake') || lower.includes('cookie')) return { icon: 'fa-cookie-bite', color: 'text-pink-500', bg: 'bg-pink-100' };
                
                // Signatures / Specials
                if (lower.includes('signature') || lower.includes('special') || lower.includes('promo')) return { icon: 'fa-crown', color: 'text-yellow-600', bg: 'bg-yellow-100' };
                
                // Default fallback
                return { icon: 'fa-star', color: 'text-stone-600', bg: 'bg-stone-200' };
            };

            // Effect to query past orders based on phone search independently of global orders sync
            useEffect(() => {
                const fetchHistory = async () => {
                    const cleanedQuery = phoneSearchQuery.replace(/\D/g, '');
                    if (!cleanedQuery || cleanedQuery.length < 8) {
                        setCustomerHistory([]);
                        return;
                    }
                    try {
                        const { query, where, getDocs } = window.FirebaseApp;
                        const q = query(getColRef('orders'), where('customerPhone', '==', phoneSearchQuery));
                        const snap = await getDocs(q);
                        const history = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.createdAt-a.createdAt);
                        setCustomerHistory(history);
                    } catch (err) {
                        console.warn("History fetch failed:", err);
                    }
                };

                const timeoutId = setTimeout(fetchHistory, 600);
                return () => clearTimeout(timeoutId);
            }, [phoneSearchQuery]);

            // Effect to monitor session timeout
            useEffect(() => {
                if (!sessionInfo.isSetup) return; // Only monitor active setups
                
                const checkTimeout = () => {
                    const thirtyMinutes = 30 * 60 * 1000;
                    if (Date.now() - sessionInfo.sessionTimestamp > thirtyMinutes) {
                        // KICK OUT logic
                        setSessionInfo({
                            isSetup: false,
                            mode: null,
                            tableId: null,
                            tableName: null,
                            customerName: '',
                            customerPhone: '',
                            sessionTimestamp: Date.now()
                        });
                        setCart([]); // Clear cart
                        setCustomMessage("Session expired. Please scan QR or start over.");
                        setTimeout(() => setCustomMessage(''), 5000);
                        setShowSetupModal(true); // Force them to set up again
                    }
                };

                const interval = setInterval(checkTimeout, 60000); // Check every minute
                return () => clearInterval(interval);
            }, [sessionInfo.isSetup, sessionInfo.sessionTimestamp]);

            useEffect(() => {
                if (qrDetectedTable && !sessionInfo.isSetup && !qrError) {
                    setShowSetupModal(true);
                }
            }, [qrDetectedTable, sessionInfo.isSetup, qrError]);

            if (qrError) {
                return (
                    <div className="min-h-screen bg-stone-50 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md text-center border-t-4 border-red-500">
                            <i className="fa-solid fa-triangle-exclamation text-red-500 text-5xl mb-4"></i>
                            <h2 className="text-xl font-bold text-stone-900 mb-2">QR Code Invalid</h2>
                            <p className="text-stone-500 font-medium text-sm mb-6 bg-stone-50 p-3 rounded-lg border border-stone-200">{qrError}</p>
                            <button onClick={() => window.location.href = window.location.pathname} className="w-full bg-stone-900 text-white font-bold py-3.5 rounded-xl hover:bg-stone-800 transition shadow-md">Go to Main Menu</button>
                        </div>
                    </div>
                );
            }

            const { myActiveOrders, myPastOrders } = useMemo(() => {
                const active = [];
                const pastMap = new Map();
                
                // 1. Process local (today's/active) orders
                orders.forEach(o => {
                    const isMyAuth = currentUser && o.userId === currentUser.uid;
                    const cleanedSearchQuery = phoneSearchQuery.replace(/\D/g, '');
                    const isMyPhone = cleanedSearchQuery && o.customerPhone && o.customerPhone.replace(/\D/g, '') === cleanedSearchQuery;
                    
                    if (isMyAuth || isMyPhone) {
                        if (['Served', 'Cancelled'].includes(o.status)) {
                            pastMap.set(o.id, o);
                        } else {
                            active.push(o);
                        }
                    }
                });
                
                // 2. Add fetched history to past orders
                customerHistory.forEach(o => {
                    if (['Served', 'Cancelled'].includes(o.status)) {
                        pastMap.set(o.id, o);
                    } else if (!active.find(a => a.id === o.id)) {
                        active.push(o); // edge case: active order from history that wasn't in local orders
                    }
                });
                
                return {
                    myActiveOrders: active.sort((a, b) => b.createdAt - a.createdAt),
                    myPastOrders: Array.from(pastMap.values()).sort((a, b) => b.createdAt - a.createdAt).slice(0, 15)
                };
            }, [orders, currentUser, phoneSearchQuery, customerHistory]);

            const filteredProducts = useMemo(() => {
                const searchLower = (searchQuery || '').toLowerCase(); // Optimization: Evaluate once outside the loop
                return products.filter(p => {
                    // CRASH FIX: Added safe fallbacks to prevent undefined.toLowerCase() errors
                    const safeName = p.name || '';
                    const matchesSearch = safeName.toLowerCase().includes(searchLower);
                    const matchesCategory = activeCategory === 'All' || p.category === activeCategory;
                    return matchesSearch && matchesCategory && p.isAvailable;
                });
            }, [products, searchQuery, activeCategory]);

            const handleSizeClick = (product, size, price) => {
                if (!sessionInfo.isSetup) {
                    if (!sessionInfo.mode) {
                        setSessionInfo(prev => ({ ...prev, mode: 'DINE_IN' }));
                    }
                    setShowSetupModal(true);
                    return;
                }
                if (product.hasSugarOption || product.hasIceOption) {
                    const defaultSugar = sugarOptions?.length > 0 ? sugarOptions[0].name : '100%';
                    const defaultIce = iceOptions?.length > 0 ? iceOptions[0].name : 'Normal Ice';
                    setSelectedItemForOptions({ 
                        product, size, price, 
                        sugar: product.hasSugarOption ? defaultSugar : null,
                        ice: product.hasIceOption ? defaultIce : null
                    });
                } else {
                    addToCart(product, size, price, null, null);
                }
            };

            const addToCart = (product, size, price, sugar, ice, editCartIndex = undefined) => {
                // NATIVE FEEL: Subtle physical vibration on mobile phones when adding items
                if (navigator.vibrate) navigator.vibrate(50);
                
                // Update timestamp on interaction to prevent timeout while ordering
                setSessionInfo(prev => ({...prev, sessionTimestamp: Date.now()}));
                setCart(prev => {
                    if (editCartIndex !== undefined) {
                        const newCart = [...prev];
                        // If they altered an item to perfectly match another item in the cart, merge them together
                        const existingIndex = newCart.findIndex((item, idx) => 
                            idx !== editCartIndex && item.productId === product.id && item.size === size && item.sugar === sugar && item.ice === ice
                        );
                        
                        if (existingIndex >= 0) {
                            newCart[existingIndex] = { ...newCart[existingIndex], quantity: newCart[existingIndex].quantity + newCart[editCartIndex].quantity };
                            newCart.splice(editCartIndex, 1);
                        } else {
                            newCart[editCartIndex] = { ...newCart[editCartIndex], size, price, sugar, ice };
                        }
                        return newCart;
                    }

                    const existingIndex = prev.findIndex(item => item.productId === product.id && item.size === size && item.sugar === sugar && item.ice === ice);
                    if (existingIndex >= 0) {
                        const newCart = [...prev];
                        // BUG FIX: Prevent direct state mutation to ensure React triggers a re-render
                        newCart[existingIndex] = { ...newCart[existingIndex], quantity: newCart[existingIndex].quantity + 1 };
                        return newCart;
                    }
                    return [...prev, { productId: product.id, name: product.name, size, price: price || 0, quantity: 1, image: product.image, sugar, ice }];
                });

                if (editCartIndex !== undefined) {
                    setCustomMessage(`Updated options for ${product.name}!`);
                    setTimeout(() => setIsCartOpen(true), 200); // Re-open mobile cart automatically
                } else {
                    setCustomMessage(`Added ${product.name} to cart! ☕`);
                }
                
                if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
                toastTimerRef.current = setTimeout(() => setCustomMessage(''), 2500);
            };

            const handleEditCartItem = (idx) => {
                const item = cart[idx];
                const product = products.find(p => p.id === item.productId);
                const hasMultipleSizes = product && product.priceSmall > 0 && product.priceLarge > 0;
                
                if (product && (product.hasSugarOption || product.hasIceOption || hasMultipleSizes)) {
                    setIsCartOpen(false); // Temporarily close cart to show modal
                    const defaultSugar = sugarOptions?.length > 0 ? sugarOptions[0].name : '100%';
                    const defaultIce = iceOptions?.length > 0 ? iceOptions[0].name : 'Normal Ice';
                    setSelectedItemForOptions({ 
                        product, 
                        size: item.size, 
                        price: item.price, 
                        sugar: item.sugar || (product.hasSugarOption ? defaultSugar : null),
                        ice: item.ice || (product.hasIceOption ? defaultIce : null),
                        editCartIndex: idx
                    });
                }
            };

            const updateCartQty = (idx, delta) => {
                // NATIVE FEEL: Micro-vibration when modifying cart
                if (navigator.vibrate) navigator.vibrate(30);
                
                setSessionInfo(prev => ({...prev, sessionTimestamp: Date.now()}));
                setCart(prev => {
                    const newCart = [...prev];
                    // BUG FIX: Prevent direct state mutation
                    newCart[idx] = { ...newCart[idx], quantity: newCart[idx].quantity + delta };
                    if (newCart[idx].quantity <= 0) newCart.splice(idx, 1);
                    return newCart;
                });
            };

            const handleReorder = (order) => {
                if (navigator.vibrate) navigator.vibrate(50);
                setSessionInfo(prev => ({...prev, sessionTimestamp: Date.now()}));
                
                setCart(prev => {
                    const newCart = [...prev];
                    order.items.forEach(pastItem => {
                        const existingIndex = newCart.findIndex(item => 
                            item.productId === pastItem.productId && 
                            item.size === pastItem.size && 
                            item.sugar === pastItem.sugar && 
                            item.ice === pastItem.ice
                        );
                        if (existingIndex >= 0) {
                            newCart[existingIndex] = { ...newCart[existingIndex], quantity: newCart[existingIndex].quantity + pastItem.quantity };
                        } else {
                            // Strip out any completed/done statuses from the past before putting it in the new cart
                            const { done, ...cleanItem } = pastItem;
                            newCart.push(cleanItem);
                        }
                    });
                    return newCart;
                });
                
                setCustomMessage('Past order added to cart!');
                if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
                toastTimerRef.current = setTimeout(() => setCustomMessage(''), 2500);
                
                setIsTrackerOpen(false);
                
                // Open cart automatically on mobile devices to show the newly added items
                if (window.innerWidth < 1024) {
                    setTimeout(() => setIsCartOpen(true), 300);
                }
            };

            const handleCancelOrder = async (order) => {
                if (order.status !== 'New') {
                    setCustomMessage('Order is already being prepared and cannot be cancelled.');
                    if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
                    toastTimerRef.current = setTimeout(() => setCustomMessage(''), 2500);
                    return;
                }
                
                if (confirm("Are you sure you want to cancel this order?")) {
                    try {
                        const { doc, updateDoc } = window.FirebaseApp;
                        await updateDoc(doc(getColRef('orders'), order.id), {
                            status: 'Cancelled',
                            cancelReason: 'Cancelled by customer',
                            completedAt: Date.now()
                        });
                        
                        await releaseTableIfNotUsed(order.tableId, order.id, orders);
                        
                        setCustomMessage('Order cancelled successfully.');
                        if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
                        toastTimerRef.current = setTimeout(() => setCustomMessage(''), 2500);
                    } catch (err) {
                        console.error("Failed to cancel order:", err);
                        setCustomMessage('Failed to cancel order.');
                    }
                }
            };

            const cartTotal = cart.reduce((sum, item) => sum + ((item.price || 0) * item.quantity), 0);
            const cartItemCount = cart.reduce((count, item) => count + item.quantity, 0);

            const handleCheckout = async (e) => {
                e.preventDefault();
                if (cart.length === 0 || !sessionInfo.isSetup) return;
                
                setIsSubmitting(true);

                const { addDoc, updateDoc, doc, runTransaction } = window.FirebaseApp;
                const today = getTodayString();
                
                // TAX DEPT FORMAT: Extract last 3 alphanumeric characters of the shop name
                const targetShop = shops.find(s => s.id === sessionInfo.shopId) || { name: 'UNK', id: 'UNKNOWN' };
                const cleanShopName = targetShop.name.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
                const shopPrefix = cleanShopName.length >= 3 ? cleanShopName.slice(-3) : cleanShopName.padStart(3, 'X');

                // SECURE FIREBASE TRANSACTION: Guaranteed Sequential Invoice Numbers
                let queueString;
                try {
                    const counterRef = doc(db, 'invoice_counters', targetShop.id);
                    const nextSeq = await runTransaction(db, async (transaction) => {
                        const counterDoc = await transaction.get(counterRef);
                        let nextVal = 1;
                        if (counterDoc.exists()) {
                            nextVal = (counterDoc.data().currentValue || 0) + 1;
                            transaction.update(counterRef, { currentValue: nextVal });
                        } else {
                            transaction.set(counterRef, { currentValue: nextVal });
                        }
                        return nextVal;
                    });
                    queueString = `${shopPrefix}-${nextSeq.toString().padStart(5, '0')}`;
                } catch (err) {
                    console.error("Transaction failed, using fallback:", err);
                    const shopOrders = orders.filter(o => o.shopId === sessionInfo.shopId);
                    const highestQueue = shopOrders.length > 0 ? Math.max(...shopOrders.map(o => parseInt(String(o.queueNo).split('-')[1]) || 0)) : 0;
                    queueString = `${shopPrefix}-${(highestQueue + 1).toString().padStart(5, '0')}`;
                }

                const actualOrderType = (sessionInfo.mode === 'QR' || sessionInfo.mode === 'DINE_IN') ? 'DINE_IN' : 'TAKEAWAY';

                // Snapshot the cart state before we clear it instantly
                const currentCart = [...cart];
                const currentCartTotal = cartTotal;

                const orderData = {
                    userId: currentUser ? currentUser.uid : null,
                    queueNo: queueString,
                    orderType: actualOrderType,
                    tableId: sessionInfo.tableId || 'TAKEAWAY',
                    tableName: sessionInfo.tableName || 'Take Away',
                    shopId: sessionInfo.shopId || 'UNKNOWN',
                    customerName: sessionInfo.customerName,
                    customerPhone: sessionInfo.customerPhone,
                    notes: cartNotes,
                    items: currentCart,
                    totalAmount: currentCartTotal,
                    status: 'New', 
                    paymentStatus: 'Unpaid',
                    paymentMethod: 'N/A',
                    dateString: today,
                    createdAt: Date.now()
                };

                // OPTIMISTIC UI UPDATE: Instant Customer Gratification
                // Trigger subtle haptic vibration on mobile devices
                if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
                
                setSubmittedOrder(orderData);
                setCart([]);
                setIsCartOpen(false);
                setSessionInfo(prev => ({...prev, sessionTimestamp: Date.now()}));
                setIsSubmitting(false);

                // BACKGROUND SYNC: Fire and Forget Database operations
                Promise.resolve().then(async () => {
                    try {
                        await addDoc(getColRef('orders'), orderData);
                        deductInventory(currentCart, products, sessionInfo.shopId, queueString); // Runs independently
                        
                        if (actualOrderType === 'DINE_IN' && sessionInfo.tableId) {
                            updateDoc(doc(getColRef('tables'), sessionInfo.tableId), { status: 'Occupied' }).catch(err => console.warn(err));
                        }
                    } catch (err) {
                        console.error("Background order sync failed:", err);
                    }
                });
            };

            if (submittedOrder) {
                return (
                    <OrderSuccessView 
                        order={submittedOrder} 
                        sessionInfo={sessionInfo}
                        setSessionInfo={setSessionInfo}
                        onTrackOrder={() => {
                            setSubmittedOrder(null);
                            setIsTrackerOpen(true);
                        }}
                        onNewOrder={() => {
                            setSubmittedOrder(null);
                            setSessionInfo(prev => ({...prev, sessionTimestamp: Date.now()}));
                        }}
                    />
                );
            }

            return (
                <div className="pb-28 lg:pb-8 relative min-h-screen bg-stone-50">
                    {/* NATIVE FEEL: Offline Awareness Banner */}
                    {isOffline && (
                        <div className="bg-red-500 text-white text-xs font-bold text-center py-1.5 w-full z-50 fixed top-0 left-0 right-0 flex items-center justify-center gap-2 shadow-md animate-slide-in-top">
                            <i className="fa-solid fa-wifi text-white/70" style={{textDecoration: 'line-through'}}></i> 
                            No Internet Connection. App is running offline.
                        </div>
                    )}
                    
                    {/* Floating Toast Message */}
                    {customMessage && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 bg-stone-900/95 backdrop-blur text-white px-6 py-3 rounded-full shadow-2xl z-50 flex items-center gap-3 border border-stone-700 animate-fade-in transition-all">
                            <i className="fa-solid fa-bell text-amber-500 animate-bounce"></i>
                            <span className="font-bold text-sm tracking-wide whitespace-nowrap">{customMessage}</span>
                        </div>
                    )}
                    
                    {/* Header Banner */}
                    <div className="relative h-56 sm:h-72 bg-stone-900 w-full overflow-hidden flex-shrink-0 group">
                        
                        {/* Smart Greeting - Top Left */}
                        <div className="absolute top-4 left-4 z-20 bg-stone-900/80 backdrop-blur text-amber-400 px-4 py-2 rounded-full text-xs sm:text-sm font-bold shadow-lg border border-amber-500/30 flex items-center gap-2">
                            <i className="fa-regular fa-clock"></i> {getGreeting()}
                        </div>

                        <button 
                            onClick={() => setIsTrackerOpen(true)}
                            className="absolute top-4 right-4 z-20 bg-stone-900/80 backdrop-blur text-white px-4 py-2 rounded-full text-sm font-bold shadow-lg border border-stone-700 hover:bg-stone-800 hover:scale-105 transition-all"
                        >
                            <i className="fa-solid fa-satellite-dish mr-2 text-amber-500 animate-pulse"></i> Track Order
                        </button>

                        <img src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&q=80&w=2000" alt="Cafe" className="w-full h-full object-cover opacity-60 group-hover:scale-105 transition-transform duration-1000" decoding="async" />
                        <div className="absolute inset-0 bg-gradient-to-t from-stone-900 via-stone-900/40 to-transparent flex flex-col items-center justify-center text-white px-4 text-center">
                            <h1 className="text-4xl sm:text-5xl font-black tracking-tight drop-shadow-lg mb-1">Solaris Cafe</h1>
                            
                            {sessionInfo.isSetup ? (
                                <div className="mt-4 flex flex-wrap justify-center gap-2">
                                    <span className="bg-amber-600/90 backdrop-blur px-4 py-1.5 rounded-full text-sm font-bold shadow-lg flex items-center">
                                        <i className={`fa-solid ${sessionInfo.mode === 'TAKEAWAY' ? 'fa-bag-shopping' : 'fa-location-dot'} mr-2`}></i>
                                        {sessionInfo.mode === 'TAKEAWAY' ? 'Take Away' : `Table ${sessionInfo.tableName}`}
                                    </span>
                                    
                                    {sessionInfo.mode === 'TAKEAWAY' && (
                                        <button 
                                            onClick={() => handleSwitchMode('DINE_IN')} 
                                            className="bg-indigo-600/90 hover:bg-indigo-700 backdrop-blur text-white px-4 py-1.5 rounded-full text-sm font-bold shadow-lg flex items-center active:scale-95 transition-all"
                                        >
                                            <i className="fa-solid fa-chair mr-2"></i> Switch to Dine-In
                                        </button>
                                    )}

                                    <span className="bg-stone-800/90 backdrop-blur px-4 py-1.5 rounded-full text-sm font-bold shadow-lg flex items-center">
                                        <i className="fa-solid fa-user mr-2"></i> {sessionInfo.customerName}
                                    </span>
                                </div>
                            ) : (
                                <div className="mt-4 flex flex-wrap justify-center gap-3">
                                    {qrDetectedTable ? (
                                        <button onClick={() => setShowSetupModal(true)} className="bg-amber-600/90 hover:bg-amber-500 backdrop-blur px-6 py-2.5 rounded-full text-sm font-bold shadow-lg transition animate-pulse">
                                            Tap to Start Table {qrDetectedTable.name} Order
                                        </button>
                                    ) : (
                                        <button onClick={() => { setSessionInfo({...sessionInfo, mode: 'TAKEAWAY', tableId: '', tableName: ''}); setShowSetupModal(true); }} className="bg-amber-600/90 hover:bg-amber-500 backdrop-blur px-8 py-3 rounded-full text-base font-black shadow-lg transition border border-amber-500/50 flex items-center hover:scale-105 active:scale-95">
                                            Order Now <i className="fa-solid fa-arrow-right ml-2 text-sm"></i>
                                        </button>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>

                    {/* MAIN CONTENT WRAPPER */}
                    <div className="max-w-[1400px] mx-auto w-full p-4 sm:p-6 flex flex-col lg:flex-row gap-6 lg:gap-8 relative z-10">
                        {/* LEFT SIDE: Menu Area */}
                        <div className="flex-1 min-w-0 flex flex-col">

                            <div className="bg-white p-2 rounded-2xl shadow-lg flex items-center mb-6 border border-stone-100 transition-all hover:shadow-xl focus-within:ring-2 ring-amber-500/20">
                                <i className="fa-solid fa-magnifying-glass text-stone-400 ml-3 mr-2"></i>
                                <input type="text" placeholder="Search menu..." className="flex-1 py-2 px-2 outline-none text-[16px] bg-transparent" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                            </div>

                            <div className="flex gap-3 overflow-x-auto no-scrollbar mb-6 pb-2">
                            {isMenuLoading ? (
                                Array.from({length: 5}).map((_, i) => (
                                    <div key={`skel-cat-${i}`} className="whitespace-nowrap w-24 h-10 rounded-full bg-stone-200 animate-pulse shrink-0"></div>
                                ))
                            ) : (
                                <>
                                    <button onClick={() => setActiveCategory('All')} className={`whitespace-nowrap flex items-center gap-2.5 px-4 py-2 rounded-full text-sm font-semibold transition-all ${activeCategory === 'All' ? 'bg-stone-900 text-white shadow-lg scale-105' : 'bg-white text-stone-600 border border-stone-200 hover:bg-stone-100 hover:border-stone-300'}`}>
                                        <div className={`w-7 h-7 rounded-full flex items-center justify-center transition-colors ${activeCategory === 'All' ? 'bg-white/20 text-white' : 'bg-stone-100 text-stone-500'}`}>
                                            <i className="fa-solid fa-border-all text-xs"></i>
                                        </div>
                                        <span className="pr-1">All</span>
                                    </button>
                                    {categories.map(cat => {
                                        const style = getCategoryDetails(cat.name);
                                        return (
                                            <button key={cat.id} onClick={() => setActiveCategory(cat.name)} className={`whitespace-nowrap flex items-center gap-2.5 px-4 py-2 rounded-full text-sm font-semibold transition-all ${activeCategory === cat.name ? 'bg-stone-900 text-white shadow-lg scale-105' : 'bg-white text-stone-600 border border-stone-200 hover:bg-stone-100 hover:border-stone-300'}`}>
                                                <div className={`w-7 h-7 rounded-full flex items-center justify-center transition-colors ${activeCategory === cat.name ? 'bg-white/20 text-white' : `${style.bg} ${style.color}`}`}>
                                                    <i className={`fa-solid ${style.icon} text-xs`}></i>
                                                </div>
                                                <span className="pr-1">{cat.name}</span>
                                            </button>
                                        );
                                    })}
                                </>
                            )}
                        </div>

                        {/* Product Grid */}
                        <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-3 xl:grid-cols-3 gap-3 sm:gap-4">
                            {isMenuLoading ? (
                                Array.from({length: 6}).map((_, i) => (
                                    <div key={`skel-prod-${i}`} className="bg-white rounded-2xl p-3 flex flex-col shadow-sm border border-stone-100 animate-pulse h-full">
                                        <div className="h-4 bg-stone-200 rounded w-3/4 mb-1.5"></div>
                                        <div className="h-3 bg-stone-200 rounded w-1/2 mb-auto"></div>
                                        
                                        <div className="flex flex-row gap-2.5 mt-3 pt-1">
                                            <div className="w-16 h-16 sm:w-20 sm:h-20 rounded-xl bg-stone-200 shrink-0"></div>
                                            <div className="flex-1 flex flex-col justify-end gap-1.5">
                                                <div className="h-6 sm:h-7 bg-stone-200 rounded-lg w-full"></div>
                                                <div className="h-6 sm:h-7 bg-stone-200 rounded-lg w-full"></div>
                                            </div>
                                        </div>
                                    </div>
                                ))
                            ) : filteredProducts.length > 0 ? (
                                filteredProducts.map(product => (
                                    <div key={product.id} className="group bg-white rounded-2xl overflow-hidden shadow-sm border border-stone-100 hover:shadow-xl hover:border-amber-300 flex flex-col p-3 transition-all duration-300 h-full">
                                        <div className="mb-2">
                                            <h3 className="font-bold text-stone-800 text-sm sm:text-base leading-tight line-clamp-2 group-hover:text-amber-700 transition-colors">{product.name}</h3>
                                            {product.description && <p className="text-[9px] sm:text-[10px] text-stone-500 line-clamp-1 mt-0.5">{product.description}</p>}
                                        </div>
                                        
                                        <div className="flex flex-row gap-2.5 mt-auto">
                                            <div className="w-16 h-16 sm:w-20 sm:h-20 rounded-xl bg-stone-100 shrink-0 overflow-hidden relative">
                                                {/* REDUNDANCY FIX: Lazy load images so the browser only downloads them when scrolled into view */}
                                                {product.image ? <img src={product.image} className="w-full h-full object-cover absolute inset-0 group-hover:scale-110 transition-transform duration-500" alt={product.name} loading="lazy" decoding="async" /> : <i className="fa-solid fa-image text-xl text-stone-300 w-full h-full flex items-center justify-center absolute inset-0"></i>}
                                            </div>
                                            <div className="flex-1 flex flex-col justify-end gap-1.5 min-w-0">
                                                {product.priceSmall > 0 && (
                                                    <button onClick={() => handleSizeClick(product, 'S', product.priceSmall)} className="w-full flex items-center justify-between px-1.5 py-1 sm:px-2 sm:py-1.5 rounded-lg border text-[10px] sm:text-xs font-bold transition-all border-amber-300 bg-amber-100 text-amber-900 hover:bg-amber-500 hover:text-white shadow-sm hover:shadow-md active:scale-95">
                                                        <span>S</span><span className="truncate ml-0.5">{product.priceSmall.toLocaleString()} ៛</span>
                                                    </button>
                                                )}

        function AdminLogin({ shops, onBack, onLogin }) {
            const [isRegistering, setIsRegistering] = useState(false);
            const [name, setName] = useState('');
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                const { signInWithEmailAndPassword, createUserWithEmailAndPassword, setDoc, doc } = window.FirebaseApp;
                try {
                    if (isRegistering) {
                        if (secretCode !== 'JL1688') {
                            setError('Invalid secret registration code.');
                            return;
                        }
                        if (role !== 'Admin' && !shopId) {
                            setError('Please select a Shop Branch for this staff member.');
                            return;
                        }

                        const userCred = await createUserWithEmailAndPassword(auth, email, password);
                        
                        const rolePerms = {
                            'Admin': ['pos', 'kds', 'shifts', 'shops', 'products', 'inventory', 'sales', 'customers', 'users'],
                            'Manager': ['pos', 'kds', 'shifts', 'inventory', 'sales', 'customers', 'users'],
                            'Cashier': ['pos', 'customers'],
                            'Kitchen': ['kds', 'inventory'],
                            'Barista': ['kds', 'inventory']
                        };

                        try {
                            await setDoc(doc(getColRef('admins'), userCred.user.uid), {
                                name: name,
                                email: userCred.user.email,
                                role: role,
                                shopId: role === 'Admin' ? 'All' : shopId,
                                permissions: rolePerms[role] || rolePerms['Cashier'], 
                                status: 'Active',
                                createdAt: Date.now()
                            });
                        } catch (dbErr) {
                            console.error("Could not save to admins collection", dbErr);
                        }
                    } else {
                        const userCred = await signInWithEmailAndPassword(auth, email, password);
                        const { getDoc, doc } = window.FirebaseApp;
                        const userDoc = await getDoc(doc(db, 'admins', userCred.user.uid));
                        if (userDoc.exists() && userDoc.data().status === 'Inactive') {
                            await window.FirebaseApp.signOut(auth);
                            setError('Your account has been deactivated. Please contact an administrator.');

                            <div className="relative">

                                <button type="button" onClick={() => setShowPassword(!showPassword)} className="absolute right-4 top-1/2 -translate-y-1/2 text-stone-400 hover:text-stone-600 focus:outline-none"><i className={`fa-solid ${showPassword ? 'fa-eye-slash' : 'fa-eye'}`}></i></button>

                            {isRegistering && (

                                        <option value="Barista">Barista</option>

                                {isRegistering ? 'Create Account' : 'Login'}

                            >
                                {isRegistering ? 'Already have an account? Sign In' : 'Need to register? Create Admin'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function ShopsView({ shops, tables, currentAdminRecord }) {
            const isSuper = (currentAdminRecord?.role || 'Admin') === 'Admin';
            const [activeTab, setActiveTab] = useState('branches');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({ name: '', location: '', lat: '', lng: '', radius: '', territory: '' });
            const [editingId, setEditingId] = useState(null);
            const [qrShop, setQrShop] = useState(null);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!isSuper) return; // Role safety check

                let parsedTerritory = [];
                if (formData.territory && formData.territory.trim() !== '') {
                    try {
                        parsedTerritory = JSON.parse(formData.territory);
                        if (!Array.isArray(parsedTerritory)) throw new Error("Must be a JSON array.");
                    } catch (err) {
                        alert("Invalid Territory JSON Format. Please enter a valid array of coordinates, e.g., [{\"lat\":11,\"lng\":104}]");
                        return;
                    }
                }

                const { doc, updateDoc, addDoc } = window.FirebaseApp;
                const shopCode = formData.name.toLowerCase().replace(/[^a-z0-9]/g, '');
                
                const data = { 
                    name: formData.name, 
                    location: formData.location, 
                    lat: formData.lat, 
                    lng: formData.lng,
                    radius: formData.radius ? Number(formData.radius) : '',
                    territory: parsedTerritory,
                    shopCode: shopCode,
                    shopStatus: 'Active',
                    updatedAt: Date.now()
                };
                if (editingId) {
                    await updateDoc(doc(getColRef('shops'), editingId), data);
                } else {
                    const docRef = await addDoc(getColRef('shops'), { ...data, createdAt: Date.now() });
                    const qrUrl = `https://jlw168.github.io/App-Center/solariscafe.html?shop=${docRef.id}`;
                    await updateDoc(docRef, { shopQrUrl: qrUrl });
                }
                setIsModalOpen(false);
            };

            const del = async (id) => {
                if (isSuper && confirm("Delete this shop branch?")) {
                    const { deleteDoc, doc } = window.FirebaseApp;
                    await deleteDoc(doc(db, 'shops', id));
                }
            };

            return (

        // Restored TablesView

            const handleAddOrUpdate = async (e) => {

                const { addDoc, updateDoc, doc } = window.FirebaseApp;

                    await updateDoc(doc(getColRef('tables'), editTableId), { name, shopId: shopId || currentAdminRecord.shopId });
                } else {

                setName('');
                setEditTableId(null);

            const toggleTableStatus = async (table) => {
                if (confirm(`Override table status to ${table.status === 'Occupied' ? 'Available' : 'Occupied'}?`)) {
                    const { updateDoc, doc } = window.FirebaseApp;
                    const newStatus = table.status === 'Occupied' ? 'Available' : 'Occupied';
                    await updateDoc(doc(getColRef('tables'), table.id), { status: newStatus });
                }

            const del = async (id) => {

            return (

                            <button onClick={() => { setEditTableId(null); setName(''); setShopId(isSuper ? '' : (currentAdminRecord?.shopIds?.[0] || currentAdminRecord?.shopId)); setIsModalOpen(true); }} className="bg-stone-900 text-white px-4 py-2 rounded-xl font-bold shadow-md"><i className="fa-solid fa-plus mr-2"></i> Add Table</button>

                                    <button onClick={()=>del(t.id)} className="w-7 h-7 flex items-center justify-center bg-red-50 text-red-500 hover:bg-red-100 rounded-md transition shadow-sm" title="Delete Table"><i className="fa-solid fa-trash text-[10px]"></i></button>

                                <h3 className="text-xl font-bold mb-4">{editTableId ? 'Edit Table' : 'Add Table'}</h3>

                                <div className="flex justify-end gap-2">

        // Restored CategoriesView
        function CategoriesView({ categories, sugarOptions, iceOptions, isSuper }) {
            const add = async (col, name, order) => {
                if(!name) return;
                await window.FirebaseApp.addDoc(getColRef(col), { name, order: Number(order) });
            };
            const del = async (col, id) => {
                if(confirm("Delete option?")) await window.FirebaseApp.deleteDoc(window.FirebaseApp.doc(db, col, id));
            };

            const BasicList = ({ title, col, data }) => (
                <div className="bg-white p-4 rounded-2xl border shadow-sm mb-6">
                    <h3 className="font-bold text-lg mb-4">{title}</h3>

                        {data.map(item => (

                                {isSuper && <button onClick={()=>del(col, item.id)} className="text-red-400 hover:text-red-600"><i className="fa-solid fa-trash"></i></button>}

                    {isSuper && (
