                                                const formattedDate = `${day}-${month}-${year} ${hrs}:${mins} ${ampm}`;

                                                return (
                                                <div key={order.id} className="bg-white border border-stone-200 rounded-2xl p-4 shadow-sm opacity-90 hover:opacity-100 transition">
                                                    <div className="flex justify-between items-start mb-2">
                                                        <div>
                                                            <div className="text-xs font-bold text-stone-400 mb-1.5">{formattedDate}</div>
                                                            <div className="font-black text-xl text-stone-800 leading-none mb-1.5">{order.queueNo || 'N/A'}</div>
                                                            <div className="text-xs font-bold text-stone-500 mt-0.5 mb-1 flex items-center gap-1">
                                                                <i className="fa-solid fa-store text-stone-400"></i> {shopName}
                                                            </div>
                                                            <div className="font-bold text-stone-800">{order.items.reduce((s,i)=>s+i.quantity,0)} items • {order.totalAmount.toLocaleString()} ៛</div>
                                                        </div>
                                                        <div className="flex flex-col items-end gap-1">
                                                            <span className={`text-[10px] font-bold px-2 py-0.5 rounded ${order.status === 'Served' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{order.status}</span>
                                                            <span className={`text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider ${order.paymentStatus === 'Paid' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{order.paymentStatus === 'Paid' ? 'Paid' : 'Unpaid'}</span>
                                                            <span className={`text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider ${order.orderType === 'TAKEAWAY' ? 'bg-stone-800 text-white' : 'bg-amber-100 text-amber-800'}`}>
                                                                {order.orderType === 'TAKEAWAY' ? 'Take Away' : `Table ${order.tableName}`}
                                                            </span>
                                                        </div>
                                                    </div>
                                                    <div className="flex flex-wrap gap-1.5 mb-3">
                                                        {order.items.map((item, idx) => (
                                                            <span key={idx} className={`text-[10px] px-2 py-1 rounded border transition-colors ${item.done ? 'bg-green-50 text-green-700 border-green-200 font-bold shadow-sm' : 'bg-stone-100 text-stone-600 border-stone-200'}`}>
                                                                {item.done && <i className="fa-solid fa-check mr-1"></i>}
                                                                {item.quantity}x {item.name}
                                                            </span>
                                                        ))}
                                                    </div>
                                                    <button onClick={() => onReorder(order)} className="w-full py-2.5 bg-stone-100 hover:bg-stone-200 text-stone-800 rounded-xl text-sm font-bold transition flex items-center justify-center gap-2 mt-1">
                                                        <i className="fa-solid fa-rotate-left"></i> Re-order Items
                                                    </button>
                                                </div>
                                                );
                                            })}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        //         CUSTOMER PORTAL MAIN
        function CustomerPortal({ products, categories, tables, orders, shops, currentUser, isMenuLoading, isSetupLoading, sugarOptions, iceOptions, onAdminClick }) {
            const [activeCategory, setActiveCategory] = useState('All');
            const [searchQuery, setSearchQuery] = useState('');
            
            // REDUNDANCY FIX: Lazy load sessionInfo FIRST so we can use it to determine the shop's session duration
            const [sessionInfo, setSessionInfo] = useState(() => {
                try {
                    const saved = localStorage.getItem('solaris_session');
                    if (saved) {
                        const parsed = JSON.parse(saved);
                        // We will perform a strict expiration check later when shops load, 
                        // but for initial load, keep the data.
                        return parsed;
                    }
                } catch(e) {}
                
                // Fallback to fresh session
                return {
                    isSetup: false,
                    mode: 'TAKEAWAY', 
                    tableId: null,
                    tableName: null,
                    shopId: null,
                    customerName: '',
                    customerPhone: '',
                    customerSex: 'M',
                    sessionTimestamp: Date.now() 
                };
            });

            // REDUNDANCY FIX: Lazy load cart from localStorage to survive page refresh
            const [cart, setCart] = useState(() => {
                try {
                    // ZOMBIE CART FIX: Verify session hasn't expired before allowing cart load.
                    // If shops are not loaded yet, fallback to 30 mins (1800000 ms).
                    const savedSession = localStorage.getItem('solaris_session');
                    if (savedSession) {
                        const parsedSession = JSON.parse(savedSession);
                        const targetShop = shops?.find(s => s.id === parsedSession.shopId);
                        const limitMinutes = targetShop?.sessionDuration ? Number(targetShop.sessionDuration) : 30;
                        
                        if (Date.now() - parsedSession.sessionTimestamp > limitMinutes * 60 * 1000) {
                            localStorage.removeItem('solaris_cart'); // Clear zombie cart storage
                            return []; // Load empty cart
                        }
                    }

                    const saved = localStorage.getItem('solaris_cart');
                    return saved ? JSON.parse(saved) : [];
                } catch(e) {
                    return [];
                }
            });
            
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [submittedOrder, setSubmittedOrder] = useState(null);
            
            const [selectedItemForOptions, setSelectedItemForOptions] = useState(null);
            const [customerHistory, setCustomerHistory] = useState([]);
            const [forbiddenError, setForbiddenError] = useState(null);
            
            // NATIVE FEEL: Detect network drops instantly
            const [isOffline, setIsOffline] = useState(!navigator.onLine);

            // SMART GPS LOCATION STATE
            const [nearestShopInfo, setNearestShopInfo] = useState({ shop: null, distance: null, status: 'idle' });
            const [userLocation, setUserLocation] = useState(null);

            const [globalPoints, setGlobalPoints] = useState(null);
            const [customerLoyalty, setCustomerLoyalty] = useState({ activePoints: 0, freeClaims: 0, totalSpent: 0, totalRedeemed: 0 });

            // DYNAMIC BADGES STATE
            const [branchLoyalty, setBranchLoyalty] = useState(null);
            const [topSellers, setTopSellers] = useState([]);

            useEffect(() => {
                const handleOffline = () => setIsOffline(true);
                const handleOnline = () => setIsOffline(false);
                window.addEventListener('offline', handleOffline);
                window.addEventListener('online', handleOnline);
                return () => {
                    window.removeEventListener('offline', handleOffline);
                    window.removeEventListener('online', handleOnline);
                };
            }, []);

            const queryParams = new URLSearchParams(window.location.search);
            const tableIdParam = queryParams.get('table');
            const shopIdParam = queryParams.get('shop');
            
            const [qrError, setQrError] = useState('');

            const detectedShop = useMemo(() => {
                if (!shopIdParam) return null;
                return shops.find(s => s.id === shopIdParam || s.shopCode === shopIdParam);
            }, [shopIdParam, shops]);

            const qrDetectedTable = useMemo(() => {
                if (!tableIdParam) return null;
                return tables.find(t => 
                    (t.id === tableIdParam || t.name === tableIdParam) && 
                    (!detectedShop || t.shopId === detectedShop.id)
                );
            }, [tableIdParam, tables, detectedShop]);

            useEffect(() => {
                if (isSetupLoading) return;
                let errorMsg = '';
                if (shopIdParam && !detectedShop) {
                    errorMsg = "Invalid QR Code: Shop branch not found or inactive.";
                } else if (tableIdParam && !qrDetectedTable) {
                    errorMsg = "Invalid QR Code: Table not found or doesn't belong to this branch.";
                }
                setQrError(errorMsg);
            }, [isSetupLoading, shopIdParam, tableIdParam, detectedShop, qrDetectedTable]);

            // Re-evaluate session validity once shops are loaded
            useEffect(() => {
                if (isSetupLoading || !sessionInfo.isSetup) return;
                
                const targetShop = shops.find(s => s.id === sessionInfo.shopId);
                const limitMinutes = targetShop?.sessionDuration ? Number(targetShop.sessionDuration) : 30;
                
                if (Date.now() - sessionInfo.sessionTimestamp > limitMinutes * 60 * 1000) {
                    setSessionInfo({
                        isSetup: false,
                        mode: 'TAKEAWAY', 
                        tableId: null,
                        tableName: null,
                        shopId: null,
                        customerName: '',
                        customerPhone: '',
                        customerSex: 'M',
                        sessionTimestamp: Date.now()
                    });
                    setCart([]);
                    setCustomMessage("Session expired. Please start over.");
                    setTimeout(() => setCustomMessage(''), 5000);
                    setShowSetupModal(true);
                }
            }, [isSetupLoading, shops]);

            // REDUNDANCY FIX: Sync changes to localStorage continuously
            useEffect(() => {
                localStorage.setItem('solaris_cart', JSON.stringify(cart));
            }, [cart]);

            useEffect(() => {
                localStorage.setItem('solaris_session', JSON.stringify(sessionInfo));
            }, [sessionInfo]);

            // FETCH GLOBAL POINTS CONFIG
            useEffect(() => {
                const fetchGlobalPoints = async () => {
                    try {
                        const { doc, getDoc } = window.FirebaseApp;
                        const snap = await getDoc(doc(db, 'loyalty_settings', 'global_points'));
                        if (snap.exists()) setGlobalPoints(snap.data());
                    } catch(e) { console.warn("Failed to load loyalty settings", e); }
                };
                fetchGlobalPoints();
            }, []);

            // SPARK PLAN OPTIMIZATION: Calculate Specific Customer Loyalty
            useEffect(() => {
                if (!sessionInfo.isSetup || !sessionInfo.customerPhone || !globalPoints?.pointsEnabled) return;

                const { query, where, onSnapshot, collection } = window.FirebaseApp;
                // Only pull orders matching this exact customer to save reads!
                const q = query(collection(db, 'orders'), where('customerPhone', '==', sessionInfo.customerPhone));

                const unsub = onSnapshot(q, snap => {
                    let spent = 0;
                    let redeemed = 0;
                    snap.forEach(d => {
                        const o = d.data();
                        if (o.status !== 'Cancelled') {
                            spent += o.totalAmount;
                        }
                        if (o.status !== 'Cancelled' && o.redeemedPoints) {
                            redeemed += o.redeemedPoints;
                        }
                    });

                    const earned = Math.floor(spent / (globalPoints.spendAmount || 4000)) * (globalPoints.pointsEarned || 1);
                    const active = Math.max(0, earned - redeemed);
                    const free = Math.floor(active / (globalPoints.redeemPoints || 10));

                    setCustomerLoyalty({ activePoints: active, freeClaims: free, totalSpent: spent, totalRedeemed: redeemed });
                });
                return () => unsub();
            }, [sessionInfo.customerPhone, sessionInfo.isSetup, globalPoints]);

            // SMART GPS DETECTION ON MOUNT (Continuous Live Tracking)
            useEffect(() => {
                if (isSetupLoading || shops.length === 0) return;

                let watchId;

                const startLiveTracking = () => {
                    if (!sessionInfo.isSetup && !detectedShop) {
                        setNearestShopInfo(prev => ({ ...prev, status: 'detecting' }));
                    }
                    
                    if (!navigator.geolocation) {
                        if (!sessionInfo.isSetup && !detectedShop) {
                            setNearestShopInfo({ shop: null, distance: null, status: 'error' });
                        }
                        return;
                    }

                    // Critically Evaluated: watchPosition natively updates approx. every second 
                    // and efficiently shuts down when the component unmounts.
                    watchId = navigator.geolocation.watchPosition(
                        (position) => {
                            const userLat = position.coords.latitude;
                            const userLng = position.coords.longitude;
                            const userPoint = { lat: userLat, lng: userLng };
                            
                            // ALWAYS update user location to ensure live validation logic works for returning sessions
                            setUserLocation(userPoint);

                            if (!sessionInfo.isSetup && !detectedShop) {
                                let foundTerritoryShop = null;

                                for (const shop of shops) {
                                    if (shop.territory && Array.isArray(shop.territory) && shop.territory.length > 2) {
                                        if (isPointInPolygon(userPoint, shop.territory)) {
                                            foundTerritoryShop = shop;
                                            break;
                                        }
                                    }
                                }

                                if (foundTerritoryShop) {
                                    setNearestShopInfo({ shop: foundTerritoryShop, distance: 0, status: 'success' });
                                    return;
                                }

                                let closestShop = null;
                                let minDistance = Infinity;

                                shops.forEach(shop => {
                                    if (shop.lat && shop.lng) {
                                        const dist = calculateDistance(userLat, userLng, Number(shop.lat), Number(shop.lng));
                                        if (dist < minDistance) {
                                            minDistance = dist;
                                            closestShop = shop;
                                        }
                                    }
                                });

                                if (closestShop) {
                                    const hasValidRadius = closestShop.radius !== undefined && closestShop.radius !== null && closestShop.radius !== '';
                                    const shopRadius = hasValidRadius ? Number(closestShop.radius) : 2000;
                                    
                                    if (minDistance <= shopRadius) {
                                        setNearestShopInfo({ shop: closestShop, distance: minDistance, status: 'success' });
                                    } else {
                                        setNearestShopInfo({ shop: closestShop, distance: minDistance, status: 'out_of_range' });
                                    }
                                } else {
                                    setNearestShopInfo({ shop: null, distance: null, status: 'error' });
                                }
                            }
                        },
                        (error) => {
                            if (!sessionInfo.isSetup && !detectedShop) {
                                setNearestShopInfo(prev => {
                                    // Prevent flickering error states if we previously succeeded but simply dropped connection for a tick
                                    if (prev.status === 'success' && error.code === error.TIMEOUT) return prev;
                                    return { shop: null, distance: null, status: error.code === error.PERMISSION_DENIED ? 'denied' : 'error' };
                                });
                            }
                        },
                        { enableHighAccuracy: true, timeout: 5000, maximumAge: 0 }
                    );
                };

                // Try silently first if permissions API is supported, otherwise run fallback
                if (navigator.permissions && navigator.permissions.query) {
                    navigator.permissions.query({ name: 'geolocation' }).then((result) => {
                        if (result.state === 'granted' || result.state === 'prompt') {
                            startLiveTracking();
                        } else {
                            if (!sessionInfo.isSetup && !detectedShop) {
                                setNearestShopInfo({ shop: null, distance: null, status: 'denied' });
                            }
                        }
                    }).catch(() => startLiveTracking());
                } else {
                    startLiveTracking();
                }

                return () => {
                    if (watchId !== undefined && navigator.geolocation) {
                        navigator.geolocation.clearWatch(watchId);
                    }
                };
            }, [shops, detectedShop, sessionInfo.isSetup, isSetupLoading]);

            // Auto-sync sessionInfo when shop/table completely finishes loading
            useEffect(() => {
                if (!isSetupLoading && !sessionInfo.isSetup) {
                    setSessionInfo(prev => ({
                        ...prev,
                        mode: qrDetectedTable ? 'QR' : prev.mode,
                        tableId: qrDetectedTable ? qrDetectedTable.id : prev.tableId,
                        tableName: qrDetectedTable ? qrDetectedTable.name : prev.tableName,
                        shopId: qrDetectedTable ? qrDetectedTable.shopId : (detectedShop ? detectedShop.id : prev.shopId)
                    }));
                }
            }, [isSetupLoading, qrDetectedTable, detectedShop, sessionInfo.isSetup]);

            const [showSetupModal, setShowSetupModal] = useState(false);
            const [cartNotes, setCartNotes] = useState('');
            const [isTrackerOpen, setIsTrackerOpen] = useState(false);
            const [phoneSearchQuery, setPhoneSearchQuery] = useState('');
            const [customMessage, setCustomMessage] = useState('');
            const toastTimerRef = useRef(null);

            const handleSetupSubmit = (e, data) => {
                if (e) e.preventDefault();
                setSessionInfo(prev => ({
                    ...prev,
                    isSetup: true,
                    customerPhone: data.phone,
                    customerName: data.name,
                    customerSex: data.sex, // NEW
                    mode: prev.mode || 'TAKEAWAY',
                    shopId: prev.shopId || nearestShopInfo?.shop?.id || (shops.length > 0 ? shops[0].id : ''),
                    sessionTimestamp: Date.now()
                }));
                setShowSetupModal(false);
            };

            const getGreeting = () => {
                const hour = new Date().getHours();
                if (hour < 12) return 'Good Morning';
                if (hour < 18) return 'Good Afternoon';
                return 'Good Evening';
            };

            const getCategoryDetails = (catName) => {
                const lower = catName.toLowerCase();
                
                // Custom: Dopamine -> Brain (Healthy brain/focus)
                if (lower.includes('dopamine') || lower.includes('energy') || lower.includes('focus')) return { icon: 'fa-brain', color: 'text-fuchsia-600', bg: 'bg-fuchsia-100' };
                
                // Relaxing / Calm
                if (lower.includes('relax') || lower.includes('calm') || lower.includes('sleep') || lower.includes('chill')) return { icon: 'fa-spa', color: 'text-indigo-500', bg: 'bg-indigo-100' };
                
                // Classic Coffee
                if (lower.includes('coffee') || lower.includes('espresso') || lower.includes('americano')) return { icon: 'fa-mug-hot', color: 'text-amber-800', bg: 'bg-amber-100' };
                
                // Tea & Matcha
                if (lower.includes('tea') || lower.includes('matcha') || lower.includes('kombucha')) return { icon: 'fa-leaf', color: 'text-green-600', bg: 'bg-green-100' };
                
                // Blended / Smoothies
                if (lower.includes('smoothie') || lower.includes('frappe') || lower.includes('blend')) return { icon: 'fa-blender', color: 'text-purple-600', bg: 'bg-purple-100' };
                
                // Cold Drinks / Refreshments
                if (lower.includes('drink') || lower.includes('soda') || lower.includes('juice') || lower.includes('refresh') || lower.includes('water')) return { icon: 'fa-glass-water', color: 'text-cyan-500', bg: 'bg-cyan-100' };
                
                // Milk & Dairy
                if (lower.includes('milk') || lower.includes('latte') || lower.includes('cream')) return { icon: 'fa-bottle-droplet', color: 'text-sky-500', bg: 'bg-sky-100' };
                
                // Food & Bakery
                if (lower.includes('food') || lower.includes('snack') || lower.includes('pastry') || lower.includes('bakery') || lower.includes('bread') || lower.includes('croissant')) return { icon: 'fa-bread-slice', color: 'text-orange-600', bg: 'bg-orange-100' };
                
                // Sweets & Desserts
                if (lower.includes('dessert') || lower.includes('ice cream') || lower.includes('cake') || lower.includes('cookie')) return { icon: 'fa-cookie-bite', color: 'text-pink-500', bg: 'bg-pink-100' };
                
                // Signatures / Specials
                if (lower.includes('signature') || lower.includes('special') || lower.includes('promo')) return { icon: 'fa-crown', color: 'text-yellow-600', bg: 'bg-yellow-100' };
                
                // Default fallback
                return { icon: 'fa-star', color: 'text-stone-600', bg: 'bg-stone-200' };
            };

            // Effect to query past orders based on phone search independently of global orders sync
            useEffect(() => {
                let unsub = null; // Store unsubscribe function for the live listener

                const fetchHistory = () => {
                    const cleanedQuery = String(phoneSearchQuery).replace(/\D/g, '');
                    if (!cleanedQuery || cleanedQuery.length < 8) {
                        setCustomerHistory([]);
                        return;
                    }
                    try {
                        const { query, where, onSnapshot } = window.FirebaseApp; 
                        const q = query(getColRef('orders'), where('customerPhone', '==', phoneSearchQuery));
                        
                        // Live Sync: Automatically update customer history when KDS staff changes status
                        unsub = onSnapshot(q, snap => {
                            const history = snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.createdAt-a.createdAt);
                            setCustomerHistory(history);
                        });
                    } catch (err) {
                        console.warn("History fetch failed:", err);
                    }
                };

                const timeoutId = setTimeout(fetchHistory, 600);
                
                return () => {
                    clearTimeout(timeoutId);
                    if (unsub) unsub(); // Detach live listener to prevent memory leaks
                };
            }, [phoneSearchQuery]);

            // Effect to monitor session timeout
            useEffect(() => {
                if (!sessionInfo.isSetup) return; // Only monitor active setups
                
                const checkTimeout = () => {
                    const targetShop = shops.find(s => s.id === sessionInfo.shopId);
                    const limitMinutes = targetShop?.sessionDuration ? Number(targetShop.sessionDuration) : 30;
                    const limitMs = limitMinutes * 60 * 1000;

                    if (Date.now() - sessionInfo.sessionTimestamp > limitMs) {
                        // KICK OUT logic
                        setSessionInfo({
                            isSetup: false,
                            // DEFAULT TO TAKEAWAY: Reset to Take Away when session expires
                            mode: 'TAKEAWAY', 
                            tableId: null,
                            tableName: null,
                            customerName: '',
                            customerPhone: '',
                            sessionTimestamp: Date.now()
                        });
                        setCart([]); // Clear cart
                        setCustomMessage("Session expired. Please scan QR or start over.");
                        setTimeout(() => setCustomMessage(''), 5000);
                        setShowSetupModal(true); // Force them to set up again
                    }
                };

                const interval = setInterval(checkTimeout, 60000); // Check every minute
                return () => clearInterval(interval);
            }, [sessionInfo.isSetup, sessionInfo.sessionTimestamp, sessionInfo.shopId, shops]);

            useEffect(() => {
                if (qrDetectedTable && !sessionInfo.isSetup && !qrError) {
                    setShowSetupModal(true);
                }
            }, [qrDetectedTable, sessionInfo.isSetup, qrError]);

            // FETCH DYNAMIC BADGES: Top Sellers & Active Promos
            useEffect(() => {
                // IMPROVEMENT: Strict fallback hierarchy ensures badges display instantly even before GPS lock or Session Login
                const targetShopId = sessionInfo.shopId || (detectedShop ? detectedShop.id : null) || nearestShopInfo?.shop?.id || (shops.length > 0 ? shops[0].id : null);
                if (!targetShopId) return;

                const fetchDynamicBadges = async () => {
                    const { doc, getDoc, collection, query, where, orderBy, limit, getDocs } = window.FirebaseApp;
                    try {
                        // 1. Fetch Loyalty Data
                        const snapLoyalty = await getDoc(doc(db, 'loyalty_settings', targetShopId));
                        if (snapLoyalty.exists()) {
                            setBranchLoyalty(snapLoyalty.data());
                        } else {
                            setBranchLoyalty(null);
                        }

                        // 2. Fetch Top 3 Sellers
                        const qOrders = query(collection(db, 'orders'), where('shopId', '==', targetShopId), orderBy('createdAt', 'desc'), limit(150));
                        const snapOrders = await getDocs(qOrders);
                        const itemCounts = {};
                        snapOrders.docs.forEach(d => {
                            const items = d.data().items || [];
                            items.forEach(item => {
                                itemCounts[item.productId] = (itemCounts[item.productId] || 0) + item.quantity;
                            });
                        });
                        const sorted = Object.entries(itemCounts).sort((a,b) => b[1] - a[1]).slice(0, 3).map(entry => entry[0]);
                        setTopSellers(sorted);
                    } catch(e) {
                        console.warn("Failed fetching dynamic badge data", e);
                    }
                };

                fetchDynamicBadges();
            }, [sessionInfo.shopId, detectedShop, nearestShopInfo?.shop?.id, shops]);

            if (qrError) {
                return (
                    <div className="min-h-screen bg-stone-50 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md text-center border-t-4 border-red-500">
                            <i className="fa-solid fa-triangle-exclamation text-red-500 text-5xl mb-4"></i>
                            <h2 className="text-xl font-bold text-stone-900 mb-2">QR Code Invalid</h2>
                            <p className="text-stone-500 font-medium text-sm mb-6 bg-stone-50 p-3 rounded-lg border border-stone-200">{qrError}</p>
                            <button onClick={() => window.location.href = window.location.pathname} className="w-full bg-stone-900 text-white font-bold py-3.5 rounded-xl hover:bg-stone-800 transition shadow-md">Go to Main Menu</button>
                        </div>
                    </div>
                );
            }

            const { myActiveOrders, myPastOrders } = useMemo(() => {
                const activeMap = new Map();
                const pastMap = new Map();
                
                const processOrder = (o) => {
                    if (['Served', 'Cancelled'].includes(o.status)) {
                        pastMap.set(o.id, o);
                    } else {
                        activeMap.set(o.id, o);
                    }
                };

                // 1. Process local (today's/active) orders tied to current UID
                orders.forEach(o => {
                    const isMyAuth = currentUser && o.userId === currentUser.uid;
                    const cleanedSearchQuery = String(phoneSearchQuery).replace(/\D/g, '');
                    const isMyPhone = cleanedSearchQuery && o.customerPhone && String(o.customerPhone).replace(/\D/g, '') === cleanedSearchQuery;
                    
                    if (isMyAuth || isMyPhone) {
                        processOrder(o);
                    }
                });
                
                // 2. Process Live History from Phone Search
                // Because customerHistory is driven by onSnapshot, whenever KDS updates an order,
                // customerHistory updates -> this useMemo re-runs -> UI updates instantly.
                customerHistory.forEach(o => {
                     processOrder(o);
                });
                
                return {
                    myActiveOrders: Array.from(activeMap.values()).sort((a, b) => b.createdAt - a.createdAt),
                    myPastOrders: Array.from(pastMap.values()).sort((a, b) => b.createdAt - a.createdAt).slice(0, 15)
                };
            }, [orders, currentUser, phoneSearchQuery, customerHistory]);

            const filteredProducts = useMemo(() => {
                const searchLower = (searchQuery || '').toLowerCase(); // Optimization: Evaluate once outside the loop
                // IMPROVEMENT: Match the exact same fallback hierarchy as the dynamic badges
                const targetShopId = sessionInfo.shopId || (detectedShop ? detectedShop.id : null) || nearestShopInfo?.shop?.id || (shops.length > 0 ? shops[0].id : null);
                
                // Pre-calculate active promotions for fast sorting
                const todayStr = getTodayString();
                const activePromos = (branchLoyalty?.promotions || []).filter(p => {
                    if (!p.isActive) return false;
                    if (p.startDate && p.startDate > todayStr) return false;
                    if (p.endDate && p.endDate < todayStr) return false;
                    return true;
                });

                // Pre-calculate New Products for fast sorting
                const todayDate = new Date();
                todayDate.setHours(0,0,0,0);
                const newProductIds = new Set();
                products.forEach(p => {
                    if (p.isNewProduct && p.newProductEffectiveDate && p.newProductDuration) {
                        const effectiveDate = new Date(p.newProductEffectiveDate);
                        const expiryDate = new Date(effectiveDate);
                        expiryDate.setDate(expiryDate.getDate() + p.newProductDuration);
                        if (todayDate >= effectiveDate && todayDate <= expiryDate) {
                            newProductIds.add(p.id);
                        }
                    }
                });
                
                return products.filter(p => {
                    // CRASH FIX: Added safe fallbacks to prevent undefined.toLowerCase() errors
                    const safeName = p.name || '';
                    const safeCode = p.productCode || '';
                    const safeBarcodeS = p.barcodeSmall || '';
                    const safeBarcodeL = p.barcodeLarge || '';
                    
                    const matchesSearch = safeName.toLowerCase().includes(searchLower) || 
                                          safeCode.toLowerCase().includes(searchLower) ||
                                          safeBarcodeS.toLowerCase().includes(searchLower) ||
                                          safeBarcodeL.toLowerCase().includes(searchLower);
                                          
                    const matchesCategory = activeCategory === 'All' || p.category === activeCategory;
                    
                    if (!matchesSearch || !matchesCategory) return false;
                    
                    // Phase 3: Smart Storefront Logic (Customer Portal)
                    if (p.isAvailable === false || p.visibilityMode === 'Hidden') return false;
                    
                    if (p.visibilityMode === 'Specific') {
                        // Strict filter: Match the dynamically resolved targetShopId
                        if (!targetShopId || !p.availableShopIds || !p.availableShopIds.includes(targetShopId)) {
                            return false;
                        }
                    }
                    return true;
                }).sort((a, b) => {
                    // 1. Priority: Hot Sale
                    const aHot = topSellers.includes(a.id) ? 1 : 0;
                    const bHot = topSellers.includes(b.id) ? 1 : 0;
                    if (aHot !== bHot) return bHot - aHot;

                    // 2. Priority: Promotion Active
                    const checkPromo = (p) => activePromos.some(promo => !promo.applicableProductIds || promo.applicableProductIds.length === 0 || promo.applicableProductIds.includes(p.id));
                    const aPromo = checkPromo(a) ? 1 : 0;
                    const bPromo = checkPromo(b) ? 1 : 0;
                    if (aPromo !== bPromo) return bPromo - aPromo;

                    // 3. Priority: New Product
                    const aNew = newProductIds.has(a.id) ? 1 : 0;
                    const bNew = newProductIds.has(b.id) ? 1 : 0;
                    if (aNew !== bNew) return bNew - aNew;

                    // 4. Priority: Category Order Number
                    const aCatOrder = categories.find(c => c.name === a.category)?.order ?? 999;
                    const bCatOrder = categories.find(c => c.name === b.category)?.order ?? 999;
                    if (aCatOrder !== bCatOrder) return aCatOrder - bCatOrder;

                    // 5. Fallback: Alphabetical
                    return (a.name || '').localeCompare(b.name || '');
                });
            }, [products, searchQuery, activeCategory, sessionInfo.shopId, detectedShop, nearestShopInfo?.shop?.id, shops, topSellers, branchLoyalty, categories]);

            const handleSizeClick = (product, size, price) => {
                if (!sessionInfo.isSetup) {
                    if (!sessionInfo.mode) {
                        // DEFAULT TO TAKEAWAY: Changed fallback from DINE_IN to TAKEAWAY
                        setSessionInfo(prev => ({ ...prev, mode: 'TAKEAWAY' }));
                    }
                    setShowSetupModal(true);
                    return;
                }
                if (product.hasSugarOption || product.hasIceOption) {
                    const defaultSugar = sugarOptions?.length > 0 ? (sugarOptions.find(o => Number(o.order) === 1)?.name || sugarOptions[0].name) : '100%';
                    const defaultIce = iceOptions?.length > 0 ? (iceOptions.find(o => Number(o.order) === 1)?.name || iceOptions[0].name) : 'Normal Ice';
                    setSelectedItemForOptions({ 
                        product, size, price, 
                        sugar: product.hasSugarOption ? defaultSugar : null,
                        ice: product.hasIceOption ? defaultIce : null
                    });
                } else {
                    addToCart(product, size, price, null, null);
                }
            };

            const addToCart = (product, size, price, sugar, ice, editCartIndex = undefined) => {
                // NATIVE FEEL: Subtle physical vibration on mobile phones when adding items
                if (navigator.vibrate) navigator.vibrate(50);
                
                // Update timestamp on interaction to prevent timeout while ordering
                setSessionInfo(prev => ({...prev, sessionTimestamp: Date.now()}));
                setCart(prev => {
                    if (editCartIndex !== undefined) {
                        const newCart = [...prev];
                        // If they altered an item to perfectly match another item in the cart, merge them together
                        const existingIndex = newCart.findIndex((item, idx) => 
                            idx !== editCartIndex && item.productId === product.id && item.size === size && item.sugar === sugar && item.ice === ice
                        );
                        
                        if (existingIndex >= 0) {
                            newCart[existingIndex] = { ...newCart[existingIndex], quantity: newCart[existingIndex].quantity + newCart[editCartIndex].quantity };
                            newCart.splice(editCartIndex, 1);
                        } else {
                            newCart[editCartIndex] = { ...newCart[editCartIndex], size, price, sugar, ice };
                        }
                        return newCart;
                    }

                    const existingIndex = prev.findIndex(item => item.productId === product.id && item.size === size && item.sugar === sugar && item.ice === ice);
                    if (existingIndex >= 0) {
                        const newCart = [...prev];
                        // BUG FIX: Prevent direct state mutation to ensure React triggers a re-render
                        newCart[existingIndex] = { ...newCart[existingIndex], quantity: newCart[existingIndex].quantity + 1 };
                        return newCart;
                    }
                    return [...prev, { productId: product.id, name: product.name, size, price: price || 0, quantity: 1, image: product.image, sugar, ice }];
                });

                if (editCartIndex !== undefined) {
                    setCustomMessage(`Updated options for ${product.name}!`);
                    setTimeout(() => setIsCartOpen(true), 200); // Re-open mobile cart automatically
                } else {
                    setCustomMessage(`Added ${product.name} to cart! ☕`);
                }
                
                if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
                toastTimerRef.current = setTimeout(() => setCustomMessage(''), 2500);
            };

            const handleEditCartItem = (idx) => {
                const item = cart[idx];
                const product = products.find(p => p.id === item.productId);
                const hasMultipleSizes = product && product.priceSmall > 0 && product.priceLarge > 0;
                
                if (product && (product.hasSugarOption || product.hasIceOption || hasMultipleSizes)) {
                    setIsCartOpen(false); // Temporarily close cart to show modal
                    const defaultSugar = sugarOptions?.length > 0 ? (sugarOptions.find(o => Number(o.order) === 1)?.name || sugarOptions[0].name) : '100%';
                    const defaultIce = iceOptions?.length > 0 ? (iceOptions.find(o => Number(o.order) === 1)?.name || iceOptions[0].name) : 'Normal Ice';
                    setSelectedItemForOptions({ 
                        product, 
                        size: item.size, 
                        price: item.price, 
                        sugar: item.sugar || (product.hasSugarOption ? defaultSugar : null),
                        ice: item.ice || (product.hasIceOption ? defaultIce : null),
                        editCartIndex: idx
                    });
                }
            };

            const updateCartQty = (idx, delta) => {
                // NATIVE FEEL: Micro-vibration when modifying cart
                if (navigator.vibrate) navigator.vibrate(30);
                
                setSessionInfo(prev => ({...prev, sessionTimestamp: Date.now()}));
                setCart(prev => {
                    const newCart = [...prev];
                    // BUG FIX: Prevent direct state mutation
                    newCart[idx] = { ...newCart[idx], quantity: newCart[idx].quantity + delta };
                    if ((newCart[idx].redeemedQty || 0) > newCart[idx].quantity) {
                        newCart[idx].redeemedQty = newCart[idx].quantity;
                    }
                    if (newCart[idx].quantity <= 0) newCart.splice(idx, 1);
                    return newCart;
                });
            };

            const updateRedeemedQty = (idx, delta) => {
                setCart(prev => {
                    const newCart = [...prev];
                    const currentRedeemed = newCart[idx].redeemedQty || 0;
                    const newRedeemed = Math.max(0, Math.min(newCart[idx].quantity, currentRedeemed + delta));

                    if (delta > 0) {
                        const totalRedeemedInCart = prev.reduce((sum, i) => sum + (i.redeemedQty || 0), 0);
                        if (totalRedeemedInCart >= 1) {
                            setCustomMessage('You can only claim 1 free product per order.');
                            if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
                            toastTimerRef.current = setTimeout(() => setCustomMessage(''), 2500);
                            return prev;
                        }
                    }

                    newCart[idx] = { ...newCart[idx], redeemedQty: newRedeemed };
                    return newCart;
                });
            };

            const handleReorder = (order) => {
                if (navigator.vibrate) navigator.vibrate(50);
                
                setCart(prev => {
                    const newCart = [...prev];
                    order.items.forEach(pastItem => {
                        const existingIndex = newCart.findIndex(item => 
                            item.productId === pastItem.productId && 
                            item.size === pastItem.size && 
                            item.sugar === pastItem.sugar && 
                            item.ice === pastItem.ice
                        );
                        if (existingIndex >= 0) {
                            newCart[existingIndex] = { ...newCart[existingIndex], quantity: newCart[existingIndex].quantity + pastItem.quantity };
                        } else {
                            // Strip out any completed/done statuses from the past before putting it in the new cart
                            const { done, ...cleanItem } = pastItem;
                            newCart.push(cleanItem);
                        }
                    });
                    return newCart;
                });
                
                // BUG FIX: Prioritize the CURRENT branch if they scanned a QR code or are already browsing it.
                // Only fall back to the historical branch if we don't know where they currently are.
                const targetShopId = detectedShop ? detectedShop.id : (sessionInfo.shopId || order.shopId);

                setSessionInfo(prev => {
                    const isAlreadySetup = prev.isSetup;
                    return {
                        ...prev,
                        // PRIVACY FIX: Do NOT overwrite current active session details with the past order details!
                        shopId: targetShopId, 
                        // If not set up, reset mode. If already set up, keep their current table/mode intact.
                        mode: isAlreadySetup ? prev.mode : 'TAKEAWAY', 
                        tableId: isAlreadySetup ? prev.tableId : '',
                        tableName: isAlreadySetup ? prev.tableName : '',
                        sessionTimestamp: Date.now()
                    };
                });
                
                setCustomMessage('Items added to your cart!');
                if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
                toastTimerRef.current = setTimeout(() => setCustomMessage(''), 3000);
                
                setIsTrackerOpen(false);
                
                // If they are already logged in, just open their cart. If not, ask them to login/register.
                if (sessionInfo.isSetup) {
                    setTimeout(() => setIsCartOpen(true), 100);
                } else {
                    setIsCartOpen(false);
                    setTimeout(() => setShowSetupModal(true), 100);
                }
            };

            const handleCancelOrder = async (order) => {
                if (order.status !== 'New') {
                    setCustomMessage('Order is already being prepared and cannot be cancelled.');
                    if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
                    toastTimerRef.current = setTimeout(() => setCustomMessage(''), 2500);
                    return;
                }
                
                if (confirm("Are you sure you want to cancel this order?")) {
                    try {
                        const { doc, updateDoc } = window.FirebaseApp;
                        
                        // OPTIMISTIC UPDATE: Fix stuck button issue for phone-searched orders
                        // Instantly updates the local history state so the button disappears and moves to Past Orders
                        setCustomerHistory(prev => prev.map(o => 
                            o.id === order.id ? { ...o, status: 'Cancelled', cancelReason: 'Cancelled by customer', completedAt: Date.now() } : o
                        ));

                        await updateDoc(doc(getColRef('orders'), order.id), {
                            status: 'Cancelled',
                            cancelReason: 'Cancelled by customer',
                            completedAt: Date.now()
                        });
                        
                        await releaseTableIfNotUsed(order.tableId, order.id, orders);
                        
                        setCustomMessage('Order cancelled successfully.');
                        if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
                        toastTimerRef.current = setTimeout(() => setCustomMessage(''), 2500);
                    } catch (err) {
                        console.error("Failed to cancel order:", err);
                        setCustomMessage('Failed to cancel order.');
                    }
                }
            };

            const { processedCart, cartTotal, cartItemCount } = useMemo(() => {
                let total = 0;
                let count = 0;
                const todayStr = getTodayString();
                
                const activePromos = (branchLoyalty?.promotions || []).filter(p => {
                    if (!p.isActive) return false;
                    if (p.startDate && p.startDate > todayStr) return false;
                    if (p.endDate && p.endDate < todayStr) return false;
                    return true;
                });

                const processed = cart.map(item => {
                    const promo = activePromos.find(p => !p.applicableProductIds || p.applicableProductIds.length === 0 || p.applicableProductIds.includes(item.productId));
                    
                    let effectiveUnitPrice = item.price;
                    let lineTotal = item.price * item.quantity;
                    let promoName = null;
                    let freeQty = 0;
                    let totalQtyForKDS = item.quantity;

                    // Apply Loyalty Claim Override First
                    if (item.redeemedQty > 0) {
                        lineTotal = item.price * (item.quantity - item.redeemedQty);
                        promoName = item.redeemedQty === item.quantity ? 'Loyalty Reward' : `Loyalty Reward (${item.redeemedQty})`;
                        effectiveUnitPrice = item.quantity > 0 ? lineTotal / item.quantity : 0;
                    } 
                    // Fallback to normal promotions if no loyalty claim applied
                    else if (promo) {
                        promoName = promo.name;
                        if (promo.type === 'DISCOUNT_PCT') {
                            const discountAmt = item.price * (promo.discountValue / 100);
                            effectiveUnitPrice = item.price - discountAmt;
                            lineTotal = effectiveUnitPrice * item.quantity;
                        } else if (promo.type === 'DISCOUNT_FIXED') {
                            effectiveUnitPrice = Math.max(0, item.price - promo.discountValue);
                            lineTotal = effectiveUnitPrice * item.quantity;
                        } else if (promo.type === 'BOGO') {
                            freeQty = Math.floor(item.quantity / promo.requiredQty) * promo.rewardQty;
                            totalQtyForKDS = item.quantity + freeQty;
                            if (freeQty > 0) {
                                promoName = `${promo.name} (+${freeQty} Free)`;
                            }
                        }
                    }

                    total += lineTotal;
                    count += item.quantity;

                    return {
                        ...item,
                        originalPrice: item.price,
                        effectiveUnitPrice,
                        lineTotal,
                        quantity: totalQtyForKDS, // Saved to DB as total items
                        paidQuantity: item.quantity, // Used by cart UI
                        freeQuantity: freeQty,
                        promoName
                    };
                });

                return { processedCart: processed, cartTotal: total, cartItemCount: count };
            }, [cart, branchLoyalty]);

            // LIVE DISTANCE & TERRITORY CHECK (Synchronized instantly with Firestore)
            const liveLocationStatus = useMemo(() => {
                const targetShop = shops.find(s => s.id === sessionInfo.shopId);
                if (!targetShop) return { isForbidden: false, distance: null, limit: 0, phone: '' };
                
                let orderDistance = null;
                let inTerritory = false;
                
                if (userLocation) {
                    if (targetShop.territory && Array.isArray(targetShop.territory) && targetShop.territory.length > 2) {
                        inTerritory = isPointInPolygon(userLocation, targetShop.territory);
                    }
                    if (targetShop.lat && targetShop.lng) {
                        orderDistance = calculateDistance(userLocation.lat, userLocation.lng, Number(targetShop.lat), Number(targetShop.lng));
                    }
                }

                const maxDist = Number(targetShop.forbiddenDistance);
                if (maxDist > 0 && !inTerritory) {
                    if (orderDistance === null || orderDistance > maxDist) {
                        return {
                            isForbidden: true,
                            distance: orderDistance,
                            limit: maxDist,
                            phone: targetShop.phone || 'Phone number not available'
                        };
                    }
                }
                return { isForbidden: false, distance: orderDistance, limit: maxDist, phone: '' };
            }, [shops, sessionInfo.shopId, userLocation]);

            const handleCheckout = async (e) => {
                e.preventDefault();
                if (cart.length === 0 || !sessionInfo.isSetup) return;
                
                if (!sessionInfo.shopId) {
                    setCustomMessage('Please select a Branch before ordering.');
                    if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
                    toastTimerRef.current = setTimeout(() => setCustomMessage(''), 3000);
                    return;
                }

                if (sessionInfo.mode === 'DINE_IN' && !sessionInfo.tableId) {
                    setCustomMessage('Please select a Table for Dine-In.');
                    if (toastTimerRef.current) clearTimeout(toastTimerRef.current);
                    toastTimerRef.current = setTimeout(() => setCustomMessage(''), 3000);
                    return;
                }

                setIsSubmitting(true);

                const { setDoc, updateDoc, doc, runTransaction } = window.FirebaseApp;
                const today = getTodayString();
                
                // TAX DEPT FORMAT: Extract last 3 alphanumeric characters of the shop name
                const targetShop = shops.find(s => s.id === sessionInfo.shopId) || { name: 'UNK', id: 'UNKNOWN' };
                const cleanShopName = targetShop.name.replace(/[^a-zA-Z0-9]/g, '').toUpperCase();
                const shopPrefix = cleanShopName.length >= 3 ? cleanShopName.slice(-3) : cleanShopName.padStart(3, 'X');

                // ANTI-FAKE ORDER CHECK (Uses Live Status)
                if (liveLocationStatus.isForbidden) {
                    setIsSubmitting(false);
                    setForbiddenError({
                        distance: liveLocationStatus.distance,
                        limit: liveLocationStatus.limit,
                        phone: liveLocationStatus.phone
                    });
                    return;
                }
                
                // TRACK FAKE ORDERS: Save exact distance to DB
                const orderDistance = liveLocationStatus.distance;

                // OPTIMISTIC QUEUE GENERATION FOR INSTANT UI
                const shopOrders = orders.filter(o => o.shopId === sessionInfo.shopId);
                const highestQueue = shopOrders.length > 0 ? Math.max(...shopOrders.map(o => parseInt(String(o.queueNo).split('-')[1]) || 0)) : 0;
                const optimisticQueueNo = `${shopPrefix}-${(highestQueue + 1).toString().padStart(9, '0')}`;

                const actualOrderType = (sessionInfo.mode === 'QR' || sessionInfo.mode === 'DINE_IN') ? 'DINE_IN' : 'TAKEAWAY';

                // Aggregate Redeemed Points Info
                const currentCart = [...processedCart];
                const totalRedeemedInCart = currentCart.reduce((sum, i) => sum + (i.redeemedQty || 0), 0);
                const pointsToRedeem = totalRedeemedInCart * (globalPoints?.redeemPoints || 10);
                const redeemedItemNames = currentCart.filter(i => i.redeemedQty > 0).map(i => `${i.redeemedQty}x ${i.name}`).join(', ');

                // Snapshot the processed cart state
                const currentCartTotal = cartTotal;

                const orderData = {
                    userId: currentUser ? currentUser.uid : null,
                    queueNo: optimisticQueueNo, // Temporary optimistic view
                    orderType: actualOrderType,
                    tableId: sessionInfo.tableId || 'TAKEAWAY',
                    tableName: sessionInfo.tableName || 'Take Away',
                    shopId: sessionInfo.shopId || 'UNKNOWN',
                    customerName: sessionInfo.customerName,
                    customerPhone: sessionInfo.customerPhone,
                    customerDistance: orderDistance,
                    notes: cartNotes,
                    items: currentCart,
                    totalAmount: currentCartTotal,
                    redeemedPoints: pointsToRedeem > 0 ? pointsToRedeem : null,
                    redeemedItemName: pointsToRedeem > 0 ? redeemedItemNames : null,
                    status: 'New', 
                    paymentStatus: 'Unpaid',
                    paymentMethod: 'N/A',
                    dateString: today,
                    createdAt: Date.now()
                };

                // OPTIMISTIC UI UPDATE: Instant Customer Gratification
                // Trigger subtle haptic vibration on mobile devices
                if (navigator.vibrate) navigator.vibrate([50, 50, 50]);
                
                setSubmittedOrder(orderData);
                setCart([]);
                setIsCartOpen(false);
                setSessionInfo(prev => ({...prev, sessionTimestamp: Date.now()}));
                setIsSubmitting(false);

                // KDS PERFORMANCE FIX: Push the order to the database INSTANTLY.
                // Do not wait for the invoice transaction to finish before showing it to the kitchen!
                const newOrderRef = doc(getColRef('orders'));
                const instantOrderPromise = setDoc(newOrderRef, orderData);

                // BACKGROUND SYNC: Fire and Forget Database operations
                Promise.resolve().then(async () => {
                    try {
                        await instantOrderPromise; // Wait for initial save to finish

                        // SECURE FIREBASE TRANSACTION IN BACKGROUND: Guaranteed Sequential Invoice Numbers
                        let finalQueueString = optimisticQueueNo;
                        try {
                            const counterRef = doc(db, 'invoice_counters', targetShop.id);
                            const nextSeq = await runTransaction(db, async (transaction) => {
                                const counterDoc = await transaction.get(counterRef);
                                let nextVal = 1;
                                if (counterDoc.exists()) {
                                    nextVal = (counterDoc.data().currentValue || 0) + 1;
                                    transaction.update(counterRef, { currentValue: nextVal });
                                } else {
                                    transaction.set(counterRef, { currentValue: nextVal });
                                }
                                return nextVal;
                            });
                            finalQueueString = `${shopPrefix}-${nextSeq.toString().padStart(9, '0')}`;
                        } catch (err) {
                            console.warn("Transaction failed, using fallback:", err);
                        }
                        
                        // If the transaction found a newer sequence, silently update the ticket queue number
                        if (finalQueueString !== optimisticQueueNo) {
                            await updateDoc(newOrderRef, { queueNo: finalQueueString });
                        }

                        // Run all heavy network tasks in parallel
                        await Promise.all([
                            deductInventory(currentCart, products, sessionInfo.shopId, finalQueueString),
                            (actualOrderType === 'DINE_IN' && sessionInfo.tableId) 
                                ? updateDoc(doc(getColRef('tables'), sessionInfo.tableId), { status: 'Occupied' }).catch(err => console.warn(err))
                                : Promise.resolve()
                        ]);
                    } catch (err) {
                        console.error("Background order sync failed:", err);
                    }
                });
            };

            if (submittedOrder) {
                return (
                    <OrderSuccessView 
                        order={submittedOrder} 
                        sessionInfo={sessionInfo}
                        setSessionInfo={setSessionInfo}
                        onTrackOrder={() => {
                            setSubmittedOrder(null);
                            setIsTrackerOpen(true);
                        }}
                        onNewOrder={() => {
                            setSubmittedOrder(null);
                            setSessionInfo(prev => ({...prev, sessionTimestamp: Date.now()}));
                        }}
                    />
                );
            }

            return (
                <div className="pb-28 lg:pb-8 relative min-h-screen bg-stone-50">
                    {/* NATIVE FEEL: Offline Awareness Banner */}
                    {isOffline && (
                        <div className="bg-red-500 text-white text-xs font-bold text-center py-1.5 w-full z-50 fixed top-0 left-0 right-0 flex items-center justify-center gap-2 shadow-md animate-slide-in-top">
                            <i className="fa-solid fa-wifi text-white/70" style={{textDecoration: 'line-through'}}></i> 
                            No Internet Connection. App is running offline.
                        </div>
                    )}
                    
                    {/* Floating Toast Message */}
                    {customMessage && (
                        <div className="fixed top-6 left-1/2 -translate-x-1/2 bg-stone-900/95 backdrop-blur text-white px-6 py-3 rounded-full shadow-2xl z-50 flex items-center gap-3 border border-stone-700 animate-fade-in transition-all">
                            <i className="fa-solid fa-bell text-amber-500 animate-bounce"></i>
                            <span className="font-bold text-sm tracking-wide whitespace-nowrap">{customMessage}</span>
                        </div>
                    )}
                    
                    {/* Header Banner */}
                    <div className="relative h-56 sm:h-72 bg-stone-900 w-full overflow-hidden flex-shrink-0 group">
                        
                        {/* Smart Greeting - Top Left (REVISED) */}
                        <div 
                            onClick={onAdminClick}
                            className="absolute top-4 left-4 z-20 bg-stone-900/80 backdrop-blur text-amber-400 px-4 py-2 rounded-full text-xs sm:text-sm font-bold shadow-lg border border-amber-500/30 flex items-center gap-2 cursor-pointer hover:bg-stone-800 transition select-none"
                            title="Admin Login"
                        >
                            <i className="fa-regular fa-clock"></i> 
                            {getGreeting()}{sessionInfo.isSetup ? `! ${sessionInfo.customerSex === 'F' ? 'Ms.' : 'Mr.'} ${sessionInfo.customerName}` : ''}
                        </div>

                        {/* Tracker Button ONLY - Top Right */}
                        <div className="absolute top-4 right-4 z-20">
                            <button 
                                onClick={() => setIsTrackerOpen(true)}
                                className="bg-stone-900/80 backdrop-blur text-white px-4 py-2 rounded-full text-sm font-bold shadow-lg border border-stone-700 hover:bg-stone-800 hover:scale-105 transition-all"
                            >
                                <i className="fa-solid fa-satellite-dish mr-2 text-amber-500 animate-pulse"></i> Track Order
                            </button>
                        </div>

                        {/* Smart Geolocation & Active Session - Bottom Right */}
                        <div className="absolute bottom-4 right-4 z-20 flex flex-col items-end gap-2">
                            {/* Smart GPS Nearest Branch */}
                            {sessionInfo.isSetup ? (
                                <div className="bg-stone-900/80 backdrop-blur text-white px-3 py-1.5 rounded-full text-[10px] sm:text-xs font-bold shadow-lg border border-stone-700 flex items-center gap-1.5">
                                    <i className="fa-solid fa-location-dot text-green-500"></i> {shops.find(s => s.id === sessionInfo.shopId)?.name || 'Active Session'}
                                </div>
                            ) : detectedShop ? (
                                <div className="bg-stone-900/80 backdrop-blur text-white px-3 py-1.5 rounded-full text-[10px] sm:text-xs font-bold shadow-lg border border-amber-500/50 flex items-center gap-1.5">
                                    <i className="fa-solid fa-qrcode text-amber-500"></i>
                                    Scanned: {detectedShop.name}
                                </div>
                            ) : (
                                <div 
                                    onClick={() => {
