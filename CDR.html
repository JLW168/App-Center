    <!-- External Libraries -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>

    <style>
        body { 
            background-color: #0f172a; 
            font-family: system-ui, -apple-system, sans-serif;
            overflow: hidden;
            overscroll-behavior: none;
            touch-action: pan-x pan-y;
            -webkit-user-select: none;
            user-select: none;
        }
        input, textarea { -webkit-user-select: text; user-select: text; }
        
        @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        .animate-spin { animation: spin 1s linear infinite; }

        .modal-enter { animation: modal-enter 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94) both; }
        @keyframes modal-enter {
            0% { opacity: 0; transform: translateY(20px) scale(0.95); }
            100% { opacity: 1; transform: translateY(0) scale(1); }
        }

        .notification-enter { animation: notification-enter 0.4s ease-out; }
        @keyframes notification-enter {
            from { opacity: 0; transform: translateY(-20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: #1e293b; }
        ::-webkit-scrollbar-thumb { background: #475569; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #64748b; }
    </style>
</head>
<body class="h-full">
    <div id="root" class="h-full"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-app.js";
        import { getFirestore, collection, onSnapshot, doc, addDoc, updateDoc, deleteDoc, Timestamp, getDoc, query, where, orderBy, limit, enableIndexedDbPersistence } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-firestore.js";
        import { getAuth, onAuthStateChanged, signInWithEmailAndPassword, signOut, setPersistence, browserSessionPersistence, browserLocalPersistence } from "https://www.gstatic.com/firebasejs/9.6.10/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyA4upjtl0UFToWSfRZEiEQvwz9ieFLfqhI",
            authDomain: "cashflow-mgr.firebaseapp.com",
            projectId: "cashflow-mgr",
            storageBucket: "cashflow-mgr.appspot.com",
            messagingSenderId: "873891130920",
            appId: "1:873891130920:web:b6b8f0432943c33a930f1d"
        };

        const app = initializeApp(firebaseConfig);
        window.db = getFirestore(app);
        
        enableIndexedDbPersistence(window.db).catch((err) => {
            console.warn('Offline Persistence Error:', err.code);
        });

        window.auth = getAuth(app);
        window.Firebase = {
            Timestamp, onAuthStateChanged, signInWithEmailAndPassword, signOut,
            collection, onSnapshot, doc, addDoc, updateDoc, deleteDoc, getDoc,
            query, where, orderBy, limit, setPersistence, browserSessionPersistence, browserLocalPersistence
        };
    </script>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, createContext, useContext, useRef } = React;
        
        // =================================================================================
        // HELPERS & ICONS
        // =================================================================================
        const getCambodiaISODate = (date = new Date()) => date.toLocaleDateString('en-CA', { timeZone: 'Asia/Phnom_Penh' });
        
        const formatInCambodiaDateOnly = (ts) => {
            if (!ts) return 'N/A';
            const d = ts.toDate ? ts.toDate() : new Date(ts);
            if (isNaN(d)) return 'N/A';
            return d.toLocaleDateString('en-GB', { timeZone: 'Asia/Phnom_Penh' }).split('/').reverse().join('-');
        };

        const createTimestampFromDateAndCurrentTime = (dateString) => {
            const now = new Date();
            const [year, month, day] = dateString.split('-').map(Number);
            const combinedDate = new Date(year, month - 1, day, now.getHours(), now.getMinutes(), now.getSeconds());
            return window.Firebase.Timestamp.fromDate(combinedDate);
        };

        const parseFormattedNumber = (val) => parseFloat(String(val).replace(/,/g, '')) || 0;
        
        const formatInputAsCurrency = (val) => {
            if (!val) return '';
            return String(val).replace(/[^0-9.]/g, '').replace(/\B(?=(\d{3})+(?!\d))/g, ',');
        };

        const formatCurrency = (val, currency = 'KHR') => {
            const num = parseFormattedNumber(val);
            if (currency === 'KHR') {
                return `${num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}៛`;
            }
            return new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', minimumFractionDigits: 2 }).format(num);
        };

        const Icon = React.memo(({ name, size = 16, className = '' }) => {
            const Svg = ({ children, ...props }) => (
                <svg xmlns="http://www.w3.org/2000/svg" width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className} {...props}>{children}</svg>
            );
            const iconMap = {
                AppLogo: <Svg><polygon points="12 2 2 7 12 12 22 7 12 2" /><polyline points="2 17 12 22 22 17" /><polyline points="2 12 12 17 22 12" /></Svg>,
                LoaderCircle: <Svg className={`animate-spin ${className}`}><path d="M21 12a9 9 0 1 1-6.219-8.56" /></Svg>,
                Banknote: <Svg><rect width="20" height="12" x="2" y="6" rx="2"/><circle cx="12" cy="12" r="2"/><path d="M6 12h.01M18 12h.01"/></Svg>,
                CreditCard: <Svg><rect width="20" height="14" x="2" y="5" rx="2"/><line x1="2" x2="22" y1="10" y2="10"/></Svg>,
                Landmark: <Svg><line x1="3" x2="21" y1="22" y2="22"/><line x1="6" x2="6" y1="18" y2="11"/><line x1="10" x2="10" y1="18" y2="11"/><line x1="14" x2="14" y1="18" y2="11"/><line x1="18" x2="18" y1="18" y2="11"/><polygon points="12 2 20 7 4 7"/></Svg>,
                Users: <Svg><path d="M16 21v-2a4 4 0 0 0-4-4H6a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M22 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></Svg>,
                List: <Svg><line x1="8" x2="21" y1="6" y2="6"/><line x1="8" x2="21" y1="12" y2="12"/><line x1="8" x2="21" y1="18" y2="18"/><line x1="3" x2="3.01" y1="6" y2="6"/><line x1="3" x2="3.01" y1="12" y2="12"/><line x1="3" x2="3.01" y1="18" y2="18"/></Svg>,
                X: <Svg><path d="M18 6 6 18"/><path d="m6 6 12 12"/></Svg>,
                CheckCircle: <Svg><path d="M22 11.08V12a10 10 0 1 1-5.93-9.14"/><polyline points="22 4 12 14.01 9 11.01"/></Svg>,
                XCircle: <Svg><circle cx="12" cy="12" r="10"/><path d="m15 9-6 6"/><path d="m9 9 6 6"/></Svg>,
                Plus: <Svg><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></Svg>,
                LogOut: <Svg><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></Svg>,
                FileText: <Svg><path d="M15 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7Z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M16 13H8"/><path d="M16 17H8"/><path d="M10 9H8"/></Svg>,
                Clock: <Svg><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></Svg>, 
                Mail: <Svg><rect width="20" height="16" x="2" y="4" rx="2"/><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/></Svg>,
                Lock: <Svg><rect width="18" height="11" x="3" y="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></Svg>,
                Calendar: <Svg><rect width="18" height="18" x="3" y="4" rx="2" ry="2"/><line x1="16" x2="16" y1="2" y2="6"/><line x1="8" x2="8" y1="2" y2="6"/><line x1="3" x2="21" y1="10" y2="10"/></Svg>,
                Eye: <Svg><path d="M2 12s3-7 10-7 10 7 10 7-3 7-10 7-10-7-10-7z"/><circle cx="12" cy="12" r="3"/></Svg>,
                EyeOff: <Svg><path d="M9.88 9.88a3 3 0 1 0 4.24 4.24"/><path d="M10.73 5.08A10.43 10.43 0 0 1 12 5c7 0 10 7 10 7a13.16 13.16 0 0 1-1.67 2.68"/><path d="M6.61 6.61A13.526 13.526 0 0 0 2 12s3 7 10 7a9.74 9.74 0 0 0 5.39-1.61"/><line x1="2" x2="22" y1="2" y2="22"/></Svg>,
                Trash2: <Svg><path d="M3 6h18"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></Svg>,
                ArrowRightLeft: <Svg><path d="m16 3 4 4-4 4"/><path d="M20 7H4"/><path d="m8 21-4-4 4-4"/><path d="M4 17h16"/></Svg>,
                PenSquare: <Svg><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></Svg>,
                Search: <Svg><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></Svg>,
                Info: <Svg><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></Svg>,
                Download: <Svg><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></Svg>,
            };
            return iconMap[name] || null;
        });

        // =================================================================================
        // UI COMPONENTS
        // =================================================================================
        const Button = ({ children, onClick, variant = 'primary', className = '', icon, disabled, type = 'button', size = 'md' }) => {
            const baseStyle = "rounded-lg font-medium transition-all duration-200 flex items-center gap-2 justify-center disabled:opacity-50 disabled:cursor-not-allowed";
            const sizes = { sm: "px-2 py-1 text-xs", md: "px-4 py-2 text-sm", lg: "px-6 py-3 text-base" };
            const variants = { primary: "bg-blue-600 hover:bg-blue-500 text-white shadow-lg shadow-blue-900/20", secondary: "bg-slate-700 hover:bg-slate-600 text-slate-200 border border-slate-600", danger: "bg-red-600 hover:bg-red-500 text-white", ghost: "bg-transparent hover:bg-slate-800 text-slate-400 hover:text-slate-200" };
            return ( <button type={type} onClick={onClick} disabled={disabled} className={`${baseStyle} ${sizes[size]} ${variants[variant]} ${className}`}> {icon && <Icon name={icon} size={size === 'sm' ? 14 : 18} />} {children} </button> );
        };

        const FormInput = ({ label, name, type = "text", value, onChange, placeholder, required, disabled, className = "", icon, labelIcon }) => ( 
            <div className={`w-full ${className}`}> 
                {label && ( <label htmlFor={name} className="flex items-center gap-2 text-sm font-medium text-slate-400 mb-1.5"> {labelIcon && <span className="text-blue-400 bg-blue-400/10 p-0.5 rounded"><Icon name={labelIcon} size={12} /></span>} {label} {required && <span className="text-red-400">*</span>} </label> )} 
                <div className="relative"> 
                    {icon && <div className="absolute inset-y-0 left-0 pl-3 flex items-center pointer-events-none text-slate-500"><Icon name={icon} size={16} /></div>} 
                    <input type={type} name={name} id={name} value={value} onChange={onChange} placeholder={placeholder} required={required} disabled={disabled} className={`block w-full rounded-lg border-slate-600 bg-slate-700/50 text-slate-200 placeholder-slate-500 focus:border-blue-500 focus:ring-blue-500 sm:text-sm py-2.5 px-3 ${icon ? 'pl-10' : ''} ${disabled ? 'opacity-50 cursor-not-allowed' : ''}`} /> 
                </div> 
            </div> 
        );

        const FormSelect = ({ label, name, value, onChange, options, required, disabled, className = "", labelIcon }) => ( 
            <div className={`w-full ${className}`}> 
                {label && ( <label htmlFor={name} className="flex items-center gap-2 text-sm font-medium text-slate-400 mb-1.5"> {labelIcon && <span className="text-blue-400 bg-blue-400/10 p-0.5 rounded"><Icon name={labelIcon} size={12} /></span>} {label} {required && <span className="text-red-400">*</span>} </label> )} 
                <select name={name} id={name} value={value} onChange={onChange} required={required} disabled={disabled} className={`block w-full rounded-lg border-slate-600 bg-slate-700/50 text-slate-200 focus:border-blue-500 focus:ring-blue-500 sm:text-sm py-2.5 px-3 ${disabled ? 'opacity-50 cursor-not-allowed' : ''}`} > 
                    {options.map((opt, idx) => ( <option key={idx} value={opt.value}>{opt.label}</option> ))} 
                </select> 
            </div> 
        );

        const FormTextarea = ({ label, name, value, onChange, placeholder, rows = 3, required, className = "", labelIcon }) => ( 
            <div className={`w-full ${className}`}> 
                {label && ( <label htmlFor={name} className="flex items-center gap-2 text-sm font-medium text-slate-400 mb-1.5"> {labelIcon && <span className="text-blue-400 bg-blue-400/10 p-0.5 rounded"><Icon name={labelIcon} size={12} /></span>} {label} {required && <span className="text-red-400">*</span>} </label> )} 
                <textarea name={name} id={name} value={value} onChange={onChange} placeholder={placeholder} rows={rows} required={required} className={`block w-full rounded-lg border-slate-600 bg-slate-700/50 text-slate-200 placeholder-slate-500 focus:border-blue-500 focus:ring-blue-500 sm:text-sm py-2 px-3 ${className}`} /> 
            </div> 
        );

        const SmartCurrencyInput = ({ value, onChange, label, name, icon, ...props }) => { 
            const handleChange = (e) => { const raw = e.target.value; if (/[+\-*/]/.test(raw)) { onChange({ target: { name, value: raw } }); } else { onChange({ target: { name, value: formatInputAsCurrency(raw) } }); } }; 
            const handleBlur = (e) => { const raw = e.target.value; if (/[+\-*/]/.test(raw)) { try { const safeMath = raw.replace(/,/g, '').replace(/[^0-9+\-*/().]/g, ''); if (safeMath) { const res = Function('"use strict";return (' + safeMath + ')')(); if (isFinite(res)) { onChange({ target: { name, value: formatInputAsCurrency(String(res)) } }); } } } catch (err) { onChange({ target: { name, value: formatInputAsCurrency(raw) } }); } } else { onChange({ target: { name, value: formatInputAsCurrency(raw) } }); } if (props.onBlur) props.onBlur(e); }; 
            return ( 
                <div className="w-full"> 
                    {label && ( <label htmlFor={name} className="flex items-center gap-2 text-sm font-medium text-slate-300 mb-1.5"> {icon && <span className="text-blue-400 bg-blue-400/10 p-0.5 rounded"><Icon name={icon} size={12} /></span>} {label} </label> )} 
                    <input name={name} id={name} value={value} onChange={handleChange} onBlur={handleBlur} placeholder="0" className="block w-full px-3 py-2 bg-slate-700 border-transparent text-slate-200 rounded-md shadow-sm placeholder-slate-400 focus:outline-none focus:ring-2 focus:ring-blue-500 sm:text-sm ring-1 ring-inset ring-slate-600 font-mono" {...props} /> 
                </div> 
            ); 
        };

        const LiveFormatInput = React.memo(({ value, onChange, name, label, ...props }) => {
            const handleChange = useCallback((e) => {
                let sanitized = e.target.value.replace(/(?!^-)[^0-9.]/g, '');
                const parts = sanitized.split('.');
                if (parts.length > 2) sanitized = parts[0] + '.' + parts.slice(1).join('');
                onChange({ target: { name, value: sanitized } });
            }, [onChange, name]);

            const formatForDisplay = (val) => {
                if (val === null || val === undefined || val === '') return '';
                const stringVal = String(val);
                if (stringVal === '-') return '-';
                const isNegative = stringVal.startsWith('-');
                const absoluteVal = isNegative ? stringVal.substring(1) : stringVal;
                const [integerPart, decimalPart] = absoluteVal.split('.');
                const formattedIntegerPart = integerPart ? new Intl.NumberFormat('en-US').format(integerPart) : '';
                let result = isNegative ? '-' + formattedIntegerPart : formattedIntegerPart;
                if (decimalPart !== undefined) return `${result}.${decimalPart}`;
                if (absoluteVal.endsWith('.')) return `${result}.`;
                return result;
            };

            return <FormInput label={label} name={name} value={formatForDisplay(value)} onChange={handleChange} placeholder="0" {...props}/>;
        });

        const Card = ({ children, className = "" }) => ( <div className={`bg-slate-800/50 border border-slate-700 rounded-lg shadow-lg p-6 ${className}`}> {children} </div> );
        
        const CategoryCard = ({ title, icon, color = "default", children, className = "" }) => {
            const themes = {
                default: { border: 'border-slate-700', bg: 'bg-slate-800/50', iconBg: 'bg-slate-700', iconText: 'text-slate-300', headerBg: 'bg-slate-800/80' },
                blue: { border: 'border-blue-500/20', bg: 'bg-blue-500/5', iconBg: 'bg-blue-500/10', iconText: 'text-blue-400', headerBg: 'bg-blue-900/20' },
                emerald: { border: 'border-emerald-500/20', bg: 'bg-emerald-500/5', iconBg: 'bg-emerald-500/10', iconText: 'text-emerald-400', headerBg: 'bg-emerald-900/20' },
                cyan: { border: 'border-cyan-500/20', bg: 'bg-cyan-500/5', iconBg: 'bg-cyan-500/10', iconText: 'text-cyan-400', headerBg: 'bg-cyan-900/20' },
                amber: { border: 'border-amber-500/20', bg: 'bg-amber-500/5', iconBg: 'bg-amber-500/10', iconText: 'text-amber-400', headerBg: 'bg-amber-900/20' },
                violet: { border: 'border-violet-500/20', bg: 'bg-violet-500/5', iconBg: 'bg-violet-500/10', iconText: 'text-violet-400', headerBg: 'bg-violet-900/20' },
            };
            const s = themes[color] || themes.default;

            return (
                <div className={`rounded-xl border ${s.border} ${s.bg} overflow-hidden flex flex-col ${className}`}>
                    <div className={`px-4 py-3 border-b ${s.border} ${s.headerBg} flex items-center gap-3`}>
                        <div className={`p-1.5 rounded-lg ${s.iconBg} ${s.iconText} ring-1 ring-inset ring-white/5`}>
                            <Icon name={icon} size={16} />
                        </div>
                        <span className={`text-xs font-bold uppercase tracking-widest ${s.iconText}`}>{title}</span>
                    </div>
                    <div className="p-4 flex-grow">
                        {children}
                    </div>
                </div>
            );
        };

        const Modal = ({ children, onClose, title, size = 'xl' }) => {
            const sizeClasses = { sm: 'max-w-sm', md: 'max-w-md', lg: 'max-w-lg', xl: 'max-w-xl', '2xl': 'max-w-2xl', '4xl': 'max-w-4xl' };
            return (
                <div className="fixed inset-0 bg-black/70 flex items-center justify-center z-50 p-4 backdrop-blur-sm">
                    <div className={`bg-slate-800 rounded-lg shadow-xl w-full ${sizeClasses[size]} max-h-[90vh] flex flex-col modal-enter border border-slate-700`}>
                        <header className="flex justify-between items-center p-4 border-b border-slate-700">
                            {typeof title === 'string' ? <h3 className="text-lg font-semibold text-slate-100">{title}</h3> : title}
                            <Button variant="ghost" onClick={onClose} className="p-1 rounded-full !text-slate-400 hover:!text-slate-100" icon="X" />
                        </header>
                        <div className="p-6 overflow-y-auto">{children}</div>
                    </div>
                </div>
            );
        };

        const ConfirmationModal = React.memo(({ title, message, onConfirm, onClose, isSubmitting, confirmVariant = 'primary', confirmText = 'Confirm' }) => (
            <Modal title={title} onClose={onClose} size="sm">
                <div className="space-y-4">
                    <p className="text-sm text-slate-300">{message}</p>
                    <div className="flex justify-end gap-4">
                        <Button onClick={onClose} variant="secondary">Cancel</Button>
                        <Button onClick={onConfirm} disabled={isSubmitting} variant={confirmVariant} className="w-28" icon={isSubmitting ? "LoaderCircle" : null}>
                            {isSubmitting ? '' : confirmText}
                        </Button>
                    </div>
                </div>
            </Modal>
        ));

        // =================================================================================
        // CONTEXT & PROVIDERS
        // =================================================================================
        const AuthContext = createContext();
        const DataContext = createContext();
        const NotificationContext = createContext();

        const useAuth = () => useContext(AuthContext);
        const useData = () => useContext(DataContext);
        const useNotification = () => useContext(NotificationContext);

        const NotificationProvider = ({ children }) => {
            const [notification, setNotification] = useState(null);
            const timeoutRef = useRef(null);

            const showNotification = useCallback((message, type = 'success', duration = 3000) => {
                if (timeoutRef.current) clearTimeout(timeoutRef.current);
                setNotification({ message, type, id: Date.now() });
                timeoutRef.current = setTimeout(() => setNotification(null), duration);
            }, []);

            return (
                <NotificationContext.Provider value={{ showNotification }}>
                    {children}
                    {notification && (
                        <div className={`fixed top-5 right-5 z-[100] flex items-center w-full max-w-xs p-4 space-x-4 rounded-lg shadow-lg border notification-enter ${notification.type === 'success' ? 'text-green-200 bg-slate-800 border-green-500' : 'text-red-200 bg-slate-800 border-red-500'}`}>
                            <div className="flex-shrink-0">{notification.type === 'success' ? <Icon name="CheckCircle" className="text-green-400" /> : <Icon name="XCircle" className="text-red-400" />}</div>
                            <div className="pl-4 text-sm font-medium">{notification.message}</div>
                            <button onClick={() => setNotification(null)} className="ml-auto -mx-1.5 -my-1.5 text-slate-400 hover:text-slate-100 rounded-lg p-1.5 hover:bg-slate-700">
                                <Icon name="X" size={20} />
                            </button>
                        </div>
                    )}
                </NotificationContext.Provider>
            );
        };

        const AuthProvider = ({ children }) => {
            const [user, setUser] = useState(null);
            const [userData, setUserData] = useState(null);
            const [isLoading, setIsLoading] = useState(true);
            const { showNotification } = useNotification();

            useEffect(() => {
                const { onAuthStateChanged, signOut, doc, getDoc } = window.Firebase;
                const unsubscribe = onAuthStateChanged(window.auth, async (firebaseUser) => {
                    if (firebaseUser) {
                        const userDocRef = doc(window.db, "employees", firebaseUser.uid);
                        try {
                            const userDocSnap = await getDoc(userDocRef);
                            if (userDocSnap.exists()) {
                                const userDataFromDb = userDocSnap.data();
                                if (userDataFromDb.status === 'Inactive') {
                                    showNotification("Account is Inactive. Please contact admin.", "error");
                                    await signOut(window.auth);
                                } else {
                                    setUser(firebaseUser);
                                    setUserData({ uid: firebaseUser.uid, ...userDataFromDb });
                                }
                            } else {
                                showNotification("Access denied. User profile not found.", "error");
                                await signOut(window.auth);
                            }
                        } catch (error) {
                            showNotification("Error fetching user profile.", "error");
                            await signOut(window.auth);
                        }
                    } else {
                        setUser(null);
                        setUserData(null);
                    }
                    setIsLoading(false);
                });
                return () => unsubscribe();
            }, [showNotification]);

            return <AuthContext.Provider value={{ user, userData, isLoading }}>{children}</AuthContext.Provider>;
        };

        const DataProvider = ({ children }) => {
            const { user, userData } = useAuth();
            
            const useCollection = (collectionName, queryConstraints = []) => {
                const [data, setData] = useState([]);
                const constraintsKey = JSON.stringify(queryConstraints.map(c => ({ type: c.type, field: c.field, op: c.op, val: typeof c.val?.toMillis === 'function' ? c.val.toMillis() : c.val })));

                useEffect(() => {
                    if (!user) { setData([]); return; };
                    const { collection, onSnapshot, query, where, orderBy, limit } = window.Firebase;
                    let colRef = collection(window.db, collectionName);
                    let q = colRef;

                    if (queryConstraints && queryConstraints.length > 0) {
                        const firestoreConstraints = queryConstraints.map(c => {
                            if (c.type === 'where') return where(c.field, c.op, c.val);
                            if (c.type === 'orderBy') return orderBy(c.field, c.dir);
                            if (c.type === 'limit') return limit(c.val);
                            return null;
                        }).filter(Boolean);
                        q = query(colRef, ...firestoreConstraints);
                    }

                    const unsubscribe = onSnapshot(q, (snapshot) => {
                        setData(snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() })));
                    });
                    return () => unsubscribe();
                }, [user, collectionName, constraintsKey]); 
                return data;
            };

            const twoYearsAgo = new Date(new Date().getFullYear() - 1, 0, 1);
            const tsTwoYearsAgo = window.Firebase?.Timestamp ? window.Firebase.Timestamp.fromDate(twoYearsAgo) : null;
            const financialDateQuery = tsTwoYearsAgo ? [{ type: 'where', field: 'date', op: '>=', val: tsTwoYearsAgo }] : [];

            // Fetch only necessary minimal collections
            const shops = useCollection('shops');
            const employees = useCollection('employees');
            const businessExpenseCategories = useCollection('businessExpenseCategories');
            const businessExpensesRaw = useCollection('businessExpenses', financialDateQuery);
            const closedMonths = useCollection('closedMonths');

            // Quick AppSettings hook
            const [appSettings, setAppSettings] = useState({ exchangeRate: 4000 });
            useEffect(() => {
                if(!user) return;
                const { doc, onSnapshot } = window.Firebase;
                const unsubscribe = onSnapshot(doc(window.db, "settings", "app"), (docSnap) => {
                    if (docSnap.exists()) setAppSettings(docSnap.data());
                });
                return () => unsubscribe();
            }, [user]);

            // Name mapping
            const mappedData = useMemo(() => {
                const empMap = {};
                employees.forEach(emp => { if (emp.name && emp.nickName) empMap[emp.name] = emp.nickName; });
                const mapNames = (data, empFields) => data.map(item => {
                    let modified = false;
                    const newItem = { ...item };
                    empFields.forEach(f => { if (newItem[f] && empMap[newItem[f]]) { newItem[f] = empMap[newItem[f]]; modified = true; } });
                    return modified ? newItem : item;
                });
                return { businessExpenses: mapNames(businessExpensesRaw, ['recordedBy']) };
            }, [employees, businessExpensesRaw]);

            const checkMonthLock = useCallback((dateValue) => {
                if (!dateValue || !closedMonths) return false;
                let monthStr = '';
                try {
                    if (typeof dateValue === 'string') monthStr = dateValue.slice(0, 7);
                    else if (dateValue.toDate) monthStr = dateValue.toDate().toISOString().slice(0, 7);
                    else if (dateValue instanceof Date) monthStr = dateValue.toISOString().slice(0, 7);
                } catch(e) { return false; }
                return closedMonths.some(cm => cm.month === monthStr);
            }, [closedMonths]);

            const value = { 
                shops, employees, appSettings, userData, checkMonthLock,
                businessCategories: businessExpenseCategories,
                businessExpenses: mappedData.businessExpenses
            };
            
            return <DataContext.Provider value={value}>{children}</DataContext.Provider>;
        };

        // =================================================================================
        // SHARED MODALS
        // =================================================================================
        const BillCounterModal = ({ currency, onClose, onApply }) => {
            const [counts, setCounts] = useState({});
            const denoms = currency === 'KHR' ? [100, 500, 1000, 2000, 5000, 10000, 20000, 50000, 100000] : [1, 2, 5, 10, 20, 50, 100];

            const handleCountChange = (denom, val) => {
                let count = parseInt(val);
                if (isNaN(count) || count < 0) count = 0;
                setCounts(prev => ({ ...prev, [denom]: count }));
            };

            const total = useMemo(() => denoms.reduce((sum, d) => sum + (d * (counts[d] || 0)), 0), [denoms, counts]);
            const handleApply = () => { onApply(total); onClose(); };
            const format = (num) => currency === 'USD' ? new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD', maximumFractionDigits: 0 }).format(num) : new Intl.NumberFormat('en-US').format(num) + '៛';

            return (
                <Modal title={`Bill Counter (${currency})`} onClose={onClose} size="sm">
                    <div className="space-y-4">
                        <div className="bg-slate-900/50 p-4 rounded-xl border border-slate-700 text-center mb-4 sticky top-0 z-10 backdrop-blur-md">
                            <span className="text-xs text-slate-400 uppercase tracking-widest font-bold block mb-1">Total Calculated</span>
                            <span className="text-3xl font-mono font-bold text-white">{format(total)}</span>
                        </div>
                        <div className="grid grid-cols-2 gap-3 max-h-[50vh] overflow-y-auto pr-2 custom-scrollbar">
                            {denoms.map(d => (
                                <div key={d} className="bg-slate-700/30 p-2 rounded-lg border border-slate-700 flex items-center justify-between">
                                    <span className={`font-bold font-mono text-sm ${currency === 'USD' ? 'text-green-400' : 'text-blue-400'}`}>{format(d)}</span>
                                    <div className="flex items-center gap-2">
                                        <span className="text-slate-500 text-xs">x</span>
                                        <input type="number" min="0" value={counts[d] || ''} onChange={(e) => handleCountChange(d, e.target.value)} onKeyDown={(e) => ["-", "+", "e", "E", "."].includes(e.key) && e.preventDefault()} placeholder="0" className="w-16 bg-slate-800 border border-slate-600 rounded px-2 py-1 text-right text-white font-mono focus:border-blue-500 outline-none" />
                                    </div>
                                </div>
                            ))}
                        </div>
                        <div className="flex justify-end gap-3 pt-4 border-t border-slate-700 mt-2">
                            <Button variant="secondary" onClick={onClose}>Cancel</Button>
                            <Button onClick={handleApply} icon="CheckCircle">Apply Total</Button>
                        </div>
                    </div>
                </Modal>
            );
        };

        const DailyExpenseModal = ({ onClose }) => {
            const { shops, businessCategories, userData, checkMonthLock } = useData();
            const { showNotification } = useNotification();
            const { addDoc, collection, Timestamp } = window.Firebase;
            const [isSubmitting, setIsSubmitting] = useState(false);

            const availableShops = useMemo(() => {
                if (!userData) return [];
                if (userData.role === 'Admin' || userData.role === 'Management') return shops;
                return shops.filter(s => userData.shopIds?.includes(s.id));
            }, [shops, userData]);

            const [formData, setFormData] = useState({
                date: getCambodiaISODate(), shop: availableShops[0]?.name || '', itemName: '', category: '', qty: '1', price: '', note: ''
            });

            const quickAddPresets = [
                { label: "Monk's Bowl", category: "Shop Monthly" }, { label: "Snack", category: "Shop Monthly" },
                { label: "Office Stuff", category: "Shop Monthly" }, { label: "Staff", category: "Shop Monthly" },
                { label: "TukTuk", category: "Shop Monthly" }, { label: "Ice", category: "Shop Monthly" },
                { label: "Water", category: "Shop Monthly" }
            ];

            const handleChange = (e) => setFormData(prev => ({ ...prev, [e.target.name]: e.target.value }));
            const handleQuickAdd = (preset) => setFormData(prev => ({ ...prev, itemName: preset.label, category: preset.category }));

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (checkMonthLock(formData.date)) {
                    showNotification("This month is closed and locked. Please contact Admin.", "error"); return;
                }
                if (!formData.shop || !formData.category || !formData.price) {
                    showNotification("Please fill in required fields.", "error"); return;
                }
                
                setIsSubmitting(true);
                try {
                    const amount = parseFormattedNumber(formData.price);
                    const total = amount * parseInt(formData.qty || 1);

                    await addDoc(collection(window.db, "businessExpenses"), {
                        date: createTimestampFromDateAndCurrentTime(formData.date),
                        shop: formData.shop, category: formData.category, itemName: formData.itemName || 'Expense',
                        quantity: parseInt(formData.qty || 1), unitPrice: amount, amountKhr: total, amountUsd: 0, totalAmountKhr: total,
                        note: formData.note, submittedBy: userData.uid, recordedBy: userData.name,
                        createdAt: Timestamp.now(), type: 'Business'
                    });
                    showNotification("Daily expense added!", "success");
                    onClose();
                } catch (error) {
                    showNotification("Failed to save expense.", "error");
                } finally {
                    setIsSubmitting(false);
                }
            };

            return (
                <Modal title="Add Daily Expense" onClose={onClose} size="md">
                    <div className="space-y-4">
                        <div className="flex flex-wrap gap-2 mb-2">
                            {quickAddPresets.map((preset, idx) => (
                                <button key={idx} onClick={() => handleQuickAdd(preset)} className="px-3 py-1 bg-slate-700 hover:bg-blue-600 rounded-full text-xs text-slate-200 transition-colors border border-slate-600">
                                    {preset.label}
                                </button>
                            ))}
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <FormSelect label="Shop" name="shop" value={formData.shop} onChange={handleChange} options={availableShops.map(s => ({value: s.name, label: s.name}))} />
                            <FormInput label="Date" type="date" name="date" value={formData.date} onChange={handleChange} />
                        </div>
                        <div className="grid grid-cols-2 gap-4">
                            <FormInput label="Item Name" name="itemName" value={formData.itemName} onChange={handleChange} placeholder="e.g. Ice" required />
                            <FormSelect label="Category" name="category" value={formData.category} onChange={handleChange} options={businessCategories.map(c => ({value: c.name, label: c.name}))} required />
                        </div>
                        <div className="grid grid-cols-3 gap-4">
                            <FormInput label="Qty" type="number" name="qty" value={formData.qty} onChange={handleChange} />
                            <div className="col-span-2"><LiveFormatInput label="Price (KHR)" name="price" value={formData.price} onChange={handleChange} required /></div>
                        </div>
                        <FormInput label="Note" name="note" value={formData.note} onChange={handleChange} />
                        <div className="flex justify-end gap-3 pt-4 border-t border-slate-700">
                            <Button variant="secondary" onClick={onClose}>Cancel</Button>
                            <Button onClick={handleSubmit} disabled={isSubmitting} icon={isSubmitting ? "LoaderCircle" : "Plus"}>{isSubmitting ? 'Saving...' : 'Add Expense'}</Button>
                        </div>
                    </div>
                </Modal>
            );
        };

        const SummaryCard = React.memo(({ formData, grandTotal, isSubmitting, fixedTime }) => {
            const { userData } = useAuth(); 
            const [currentTime, setCurrentTime] = useState(new Date());

            useEffect(() => {
                if (fixedTime) return;
                const timerId = setInterval(() => setCurrentTime(new Date()), 1000);
                return () => clearInterval(timerId);
            }, [fixedTime]);

            const displayTime = fixedTime || currentTime;
            const formattedDate = useMemo(() => {
                if (!formData.date) return 'N/A';
                const [year, month, day] = formData.date.split('-');
                return `${day}-${month}-${year.slice(-2)}`;
            }, [formData.date]);
            
            const clean = (val) => parseFloat(String(val).replace(/,/g, '')) || 0;
            const cashKhr = clean(formData.cashKhr); const cashUsd = clean(formData.cashUsd);
            const bankKhr = clean(formData.bankKhr); const bankUsd = clean(formData.bankUsd);

            const baseAmt = clean(formData.promoBaseAmount || formData.promoAmount);
            const discVal = parseFloat(formData.promoDisc) || 0;
            const computedPromoAmount = baseAmt * (1 - discVal / 100);

            const formatMoney = (val, currency) => currency === 'USD' ? new Intl.NumberFormat('en-US', { style: 'currency', currency: 'USD' }).format(val) : new Intl.NumberFormat('en-US').format(val);
            const getResponsiveFontSize = (value) => {
                const len = String(value).length;
                if (len > 12) return 'text-[9px] leading-tight';
                if (len > 9) return 'text-[11px] leading-tight';
                if (len > 7) return 'text-xs leading-tight';
                return 'text-sm sm:text-base leading-none';
            };

            return (
                 <div className="bg-[#151c2c] rounded-[2rem] border border-slate-700 shadow-2xl overflow-hidden relative font-sans group">
                     <div className="p-6 pb-4 relative z-10">
                        <div className="flex justify-between items-start">
                            <div>
                                <h3 className="text-sm font-bold text-white tracking-wider mb-2 uppercase">Summary</h3>
                                <div className="flex items-center gap-3 text-slate-400 text-xs font-medium">
                                    <span className="px-2 py-0.5 rounded border border-slate-600 text-blue-400 font-bold uppercase tracking-wider text-[10px]">{formData.shift || 'AM'}</span>
                                     <div className="flex items-center gap-2 font-mono text-[11px] opacity-80 uppercase">
                                        <Icon name="Clock" size={12} />
                                        <span>{formattedDate}</span><span className="text-slate-600">|</span>
                                        <span>{displayTime.toLocaleTimeString('en-US', { timeZone: 'Asia/Phnom_Penh', hour: '2-digit', minute: '2-digit', hour12: true })}</span>
                                    </div>
                                </div>
                            </div>
                            <div className="text-right relative">
                                <div className="absolute top-0 right-0 text-white/[0.03] transform translate-x-2 -translate-y-1 pointer-events-none"><Icon name="FileText" size={80} /></div>
                                <p className="text-[9px] uppercase text-slate-500 font-bold mb-0.5 tracking-widest">SHOP</p>
                                <h2 className="text-base font-bold text-white tracking-tight leading-none mb-1">{formData.shop || 'JLW-???'}</h2>
                                <div className="flex items-center justify-end gap-1.5 text-slate-400 text-xs">
                                     <Icon name="Users" size={12} /><span>{formData.staff || userData?.name || 'User'}</span>
                                </div>
                            </div>
                        </div>
                     </div>
                     <div className="border-t border-slate-700/50 mx-6 mb-6"></div>
                     <div className="px-6 pb-6 space-y-4 relative z-10">
                        <div className="flex gap-4 items-center">
                            <div className="w-12 h-12 rounded-2xl bg-[#1e293b]/50 border border-slate-700/50 flex items-center justify-center text-emerald-400 shrink-0 shadow-lg"><Icon name="Banknote" size={22} /></div>
                            <div className="flex-grow grid grid-cols-2 gap-3">
                                <div className="border border-slate-600 rounded-xl px-3 py-2 bg-transparent relative flex flex-col justify-center h-[52px]">
                                    <p className="text-[9px] font-bold text-slate-400 uppercase leading-none mb-1">KHR</p>
                                    <p className={`font-mono font-bold text-emerald-400 ${getResponsiveFontSize(formatMoney(cashKhr, 'KHR').replace('៛', ''))}`}>{formatMoney(cashKhr, 'KHR').replace('៛', '')} <span className="text-[10px] opacity-70">៛</span></p>
                                </div>
                                <div className="border border-slate-600 rounded-xl px-3 py-2 bg-transparent relative flex flex-col justify-center h-[52px]">
                                    <p className="text-[9px] font-bold text-slate-400 uppercase leading-none mb-1">USD</p>
                                    <p className={`font-mono font-bold text-white ${getResponsiveFontSize(formatMoney(cashUsd, 'USD').replace('$', ''))}`}>{formatMoney(cashUsd, 'USD').replace('$', '')} <span className="text-[10px] opacity-70">$</span></p>
                                </div>
                            </div>
                        </div>
                        <div className="flex gap-4 items-center">
                            <div className="w-12 h-12 rounded-2xl bg-[#1e293b]/50 border border-slate-700/50 flex items-center justify-center text-blue-400 shrink-0 shadow-lg"><Icon name="CreditCard" size={22} /></div>
                            <div className="flex-grow grid grid-cols-2 gap-3">
                                <div className="border border-slate-600 rounded-xl px-3 py-2 bg-transparent relative flex flex-col justify-center h-[52px]">
                                    <p className="text-[9px] font-bold text-slate-400 uppercase leading-none mb-1">KHR</p>
                                    <p className={`font-mono font-bold text-blue-400 ${getResponsiveFontSize(formatMoney(bankKhr, 'KHR').replace('៛', ''))}`}>{formatMoney(bankKhr, 'KHR').replace('៛', '')} <span className="text-[10px] opacity-70">៛</span></p>
                                </div>
                                <div className="border border-slate-600 rounded-xl px-3 py-2 bg-transparent relative flex flex-col justify-center h-[52px]">
                                    <p className="text-[9px] font-bold text-slate-400 uppercase leading-none mb-1">USD</p>
                                    <p className={`font-mono font-bold text-white ${getResponsiveFontSize(formatMoney(bankUsd, 'USD').replace('$', ''))}`}>{formatMoney(bankUsd, 'USD').replace('$', '')} <span className="text-[10px] opacity-70">$</span></p>
                                </div>
                            </div>
                        </div>
                        <div className="flex gap-4 items-center pt-2">
                            <div className="w-12 h-12 rounded-2xl bg-red-500/10 border border-red-500/20 flex items-center justify-center text-red-500 shrink-0 shadow-lg"><Icon name="PieChart" size={22} /></div>
                            <div className="flex-grow">
                                <div className="border border-red-500/30 rounded-xl px-4 py-2 bg-[#0f1420] relative flex justify-between items-center h-[52px]">
                                    <span className="text-xs font-bold text-slate-400 uppercase tracking-wider">Grand Total</span>
                                    <span className="font-mono text-xl font-black text-red-500 tracking-tight">{new Intl.NumberFormat('en-US').format(grandTotal)} <span className="text-sm font-serif">៛</span></span>
                                </div>
                            </div>
                        </div>

                        {formData.promoEnabled && computedPromoAmount > 0 && (
                            <div className="mt-4 pt-4 border-t border-slate-700/50 animate-in slide-in-from-bottom-2 fade-in duration-300">
                                <div className="flex gap-4 items-center">
                                    <div className="w-12 h-12 rounded-2xl bg-violet-500/10 border border-violet-500/20 flex items-center justify-center text-violet-500 shrink-0 shadow-lg"><Icon name="ArrowRightLeft" size={22} /></div>
                                    <div className="flex-grow">
                                        <div className="border border-violet-500/30 rounded-xl px-4 py-2 bg-[#0f1420] relative flex justify-between items-center h-[52px]">
                                            <div className="flex flex-col justify-center">
                                                <span className="text-[10px] font-bold text-slate-400 uppercase tracking-wider leading-tight">Promo Payout</span>
                                                <span className="text-xs text-slate-300 font-semibold leading-tight">{formData.promoPayToShop || 'Select Shop...'}</span>
                                            </div>
                                            <span className="font-mono text-xl font-black text-violet-500 tracking-tight">{new Intl.NumberFormat('en-US').format(computedPromoAmount)} <span className="text-sm font-serif">៛</span></span>
                                        </div>
                                    </div>
                                </div>
                            </div>
                        )}
                        {formData.note && (
                            <div className="mt-2 pt-3 border-t border-slate-700/50">
                                <div className="flex gap-3 items-start p-3 rounded-xl bg-violet-500/5 border border-violet-500/10">
                                    <div className="text-violet-400 mt-0.5 shrink-0"><Icon name="FileText" size={14} /></div>
                                    <div className="flex-grow">
                                        <p className="text-[10px] font-bold text-violet-400 uppercase mb-0.5">Note</p>
                                        <p className="text-xs text-slate-300 italic leading-relaxed break-words">"{formData.note}"</p>
                                    </div>
                                </div>
                            </div>
                        )}
                     </div>
                     {!fixedTime && (
                        <div className="p-6 pt-2 bg-[#151c2c]">
                             <Button type="submit" disabled={isSubmitting} className="w-full py-4 bg-blue-600 hover:bg-blue-500 shadow-lg shadow-blue-600/20 font-bold text-lg rounded-xl transition-all active:scale-[0.98] tracking-wide" icon={isSubmitting ? "LoaderCircle" : null}>
                                {isSubmitting ? 'Submitting...' : 'Submit Report'}
                            </Button>
                        </div>
                     )}
                </div>
            );
        });
        
        const SummaryPreviewModal = ({ isOpen, onClose, formData, grandTotal, submittedAt }) => {
            return (
                <Modal isOpen={isOpen} onClose={onClose} title={<div className="text-center w-full"><h3 className="text-lg font-semibold text-slate-100">Report Submitted</h3><p className="mt-1 text-sm text-slate-400">Please take a screenshot of this summary.</p></div>} size="sm">
                    <div className="p-4 flex-grow bg-slate-900">
                        <SummaryCard formData={formData} grandTotal={grandTotal} isSubmitting={false} fixedTime={submittedAt} />
                    </div>
                     <div className="flex justify-end p-4 border-t border-slate-700">
                         <Button onClick={onClose} variant="primary">Close</Button>
                    </div>
                </Modal>
            );
        };

        // =================================================================================
        // MAIN TABS
        // =================================================================================
        const NewCashDropForm = () => {
            const { shops, appSettings, checkMonthLock } = useData();
            const { userData } = useAuth();
            const { showNotification } = useNotification();
            const { addDoc, collection, Timestamp } = window.Firebase;

            const getInitialState = useCallback(() => ({
                date: new Date().toISOString().split('T')[0],
                shop: (userData?.role === 'Admin' || userData?.role === 'Management') ? (shops[0]?.name || '') : (shops.find(s => userData?.shopIds?.includes(s.id))?.name || ''),
                staff: userData?.name || '', shift: 'AM', actualCashFloat: '',
                cashUsd: '', cashKhr: '', bankUsd: '', bankKhr: '', note: '',
                promoEnabled: false, promoPayToShop: '', promoQtyH: '', promoQtyG: '', promoQtyR: '',
                promoBaseAmount: '', promoAmount: '', promoQty: '', promoDetail: '', promoDisc: '30%',
            }), [shops, userData]);

            const [formData, setFormData] = useState(getInitialState);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [isConfirming, setIsConfirming] = useState(false);
            const [isPreviewing, setIsPreviewing] = useState(false);
            const [isExpenseModalOpen, setIsExpenseModalOpen] = useState(false);
            const [lastSubmittedData, setLastSubmittedData] = useState(null);
            const [billCounterState, setBillCounterState] = useState({ isOpen: false, currency: 'KHR', targetField: '' });
            
            const otherShops = useMemo(() => shops.filter(s => s.name !== formData.shop), [shops, formData.shop]);

            useEffect(() => { setFormData(getInitialState()) }, [getInitialState]);
            
            const handleFormChange = useCallback((e) => {
                const { name, value } = e.target;
                setFormData(prev => {
                    const next = { ...prev, [name]: value };
                    if (['promoQtyH', 'promoQtyG', 'promoQtyR'].includes(name)) {
                        const h = parseInt(next.promoQtyH) || 0; const g = parseInt(next.promoQtyG) || 0; const r = parseInt(next.promoQtyR) || 0;
                        const totalQty = h + g + r;
                        next.promoQty = String(totalQty);
                        const details = [];
                        if (h > 0) details.push(`H=${h}`); if (g > 0) details.push(`G=${g}`); if (r > 0) details.push(`R=${r}`);
                        next.promoDetail = details.join(', ');
                        next.promoBaseAmount = totalQty > 0 ? formatInputAsCurrency(String(totalQty * 4000)) : '';
                    }
                    return next;
                });
            }, []);

            const openBillCounter = (currency, targetField) => setBillCounterState({ isOpen: true, currency, targetField });

            const expectedFloat = useMemo(() => shops.find(s => s.name === formData.shop)?.cashFloat || 0, [shops, formData.shop]);
            const isFloatMatched = useMemo(() => (parseFloat(String(formData.actualCashFloat).replace(/,/g, '')) || 0) === expectedFloat, [formData.actualCashFloat, expectedFloat]);
            const grandTotal = useMemo(() => {
                const clean = (val) => parseFloat(String(val || '0').replace(/,/g, '')) || 0;
                return (clean(formData.cashUsd) + clean(formData.bankUsd)) * (appSettings?.exchangeRate || 4000) + clean(formData.cashKhr) + clean(formData.bankKhr);
            }, [formData, appSettings.exchangeRate]);
            
            const handleAttemptSubmit = (e) => {
                if (e) e.preventDefault();
                if (!formData.shop) { showNotification("Please select a shop.", "error"); return; }
                if (checkMonthLock(formData.date)) { showNotification("Month is closed and locked.", "error"); return; }
                setIsConfirming(true);
            };
            
            const handleConfirmSubmit = useCallback(async () => {
                setIsConfirming(false); setIsSubmitting(true);
                try {
                    const clean = (val) => parseFloat(String(val || '0').replace(/,/g, '')) || 0;
                    const submissionDateTime = new Date(`${formData.date}T${new Date().toTimeString().split(' ')[0]}`);
                    const promoBaseAmt = clean(formData.promoBaseAmount);
                    const computedPromoTotal = promoBaseAmt * (1 - (parseFloat(String(formData.promoDisc || '0').replace(/%/g, '')) || 0) / 100);

                    const submissionData = {
                        ...formData, actualCashFloat: clean(formData.actualCashFloat),
                        cashUsd: clean(formData.cashUsd), cashKhr: clean(formData.cashKhr),
                        bankUsd: clean(formData.bankUsd), bankKhr: clean(formData.bankKhr),
                        grandTotalKhr: grandTotal,
                        promoEnabled: formData.promoEnabled || false, promoPayToShop: formData.promoEnabled ? formData.promoPayToShop : '',
                        promoBaseAmount: formData.promoEnabled ? promoBaseAmt : 0, promoAmount: formData.promoEnabled ? computedPromoTotal : 0,
                        promoQty: formData.promoEnabled ? (parseInt(formData.promoQty) || 1) : 0,
                        promoDetail: formData.promoEnabled ? formData.promoDetail : '', promoDisc: formData.promoEnabled ? formData.promoDisc : '',
                        createdAt: Timestamp.fromDate(submissionDateTime), submittedBy: userData.uid
                    };
                    const docRef = await addDoc(collection(window.db, "cashDrops"), submissionData);

                    if (formData.promoEnabled && computedPromoTotal > 0) {
                        await addDoc(collection(window.db, "businessExpenses"), {
                            date: Timestamp.fromDate(submissionDateTime), shop: formData.shop, category: 'Cross Shop Promo',
                            itemName: `Cross Promo: ${formData.promoDetail || 'Promo Payout'}`, quantity: parseInt(formData.promoQty) || 1,
                            unitPrice: computedPromoTotal / (parseInt(formData.promoQty) || 1), amountKhr: computedPromoTotal, amountUsd: 0, totalAmountKhr: computedPromoTotal,
                            note: 'Cross Promo', promoRefId: docRef.id, submittedBy: userData.uid, recordedBy: userData.name, createdAt: Timestamp.now(), type: 'Business'
                        });
                    }
                    
                    setLastSubmittedData({ formData, grandTotal, submittedAt: submissionDateTime });
                    setIsPreviewing(true); showNotification("Report submitted successfully!", "success");
                } catch (error) { 
                    showNotification("Failed to submit report.", "error");
                } finally { setIsSubmitting(false); }
            }, [formData, grandTotal, userData, addDoc, collection, Timestamp, showNotification]);

            const handleClosePreviewAndReset = useCallback(() => {
                setIsPreviewing(false);
                setLastSubmittedData(null);
                setFormData(getInitialState());
            }, [getInitialState]);

            const availableShops = useMemo(() => (userData?.role === 'Admin' || userData?.role === 'Management') ? shops : shops.filter(s => userData.shopIds?.includes(s.id)), [shops, userData]);
            
            return (
                <>
                    <div className="flex justify-end mb-4">
                        <Button type="button" onClick={() => setIsExpenseModalOpen(true)} variant="secondary" size="sm" icon="CreditCard" className="bg-slate-800 hover:bg-slate-700 text-slate-300 border-slate-700">
                            Add Daily Expense
                        </Button>
                    </div>
                    <form onSubmit={handleAttemptSubmit}>
                        <div className="grid grid-cols-1 lg:grid-cols-3 gap-6 items-start">
                            <div className="lg:col-span-2 space-y-6">
                                <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                    <CategoryCard title="General Information" icon="FileText" color="blue" className="h-full">
                                        <div className="grid grid-cols-2 gap-4 h-full content-center">
                                            <FormSelect label="Shop" labelIcon="Landmark" name="shop" value={formData.shop} onChange={handleFormChange} options={availableShops.map(s => ({value: s.name, label: s.name}))} required />
                                            <FormInput label="Date" labelIcon="Calendar" type="date" name="date" value={formData.date} onChange={handleFormChange} required />
                                            <FormSelect label="Shift" labelIcon="Clock" name="shift" value={formData.shift} onChange={handleFormChange} options={[{value:'AM', label:'AM'}, {value:'PM', label:'PM'}]} />
                                            <FormInput label="Staff" labelIcon="Users" name="staff" value={formData.staff} disabled />
                                        </div>
                                    </CategoryCard>

                                    <CategoryCard title="Opening Verification" icon="Lock" color="amber" className="h-full">
                                        <div className="flex flex-col xl:flex-row h-full justify-center gap-3">
                                            <div className="flex gap-2 items-end flex-grow w-full">
                                                <div className="flex-grow"><SmartCurrencyInput label={`Counted Cash Float (Expected: ${formatCurrency(expectedFloat, 'KHR').replace('៛', '')})`} icon="Banknote" name="actualCashFloat" value={formData.actualCashFloat} onChange={handleFormChange} required /></div>
                                                <Button onClick={() => openBillCounter('KHR', 'actualCashFloat')} className="!px-3 !py-2.5 bg-amber-900/30 text-amber-400 mb-[1px] shrink-0" type="button"><Icon name="List" size={16} /></Button>
                                            </div>
                                            <div className="shrink-0 w-full xl:w-auto flex items-end mb-[1px]">
                                                {formData.actualCashFloat !== '' ? (
                                                    <div className={`w-full xl:w-auto px-3 py-2.5 rounded-lg border flex items-center justify-center gap-1.5 text-sm font-bold whitespace-nowrap ${isFloatMatched ? 'bg-emerald-500/10 border-emerald-500/30 text-emerald-400' : 'bg-red-500/10 border-red-500/30 text-red-400'}`}>
                                                        <Icon name={isFloatMatched ? 'CheckCircle' : 'XCircle'} size={18} /> {isFloatMatched ? 'Matched' : 'Mismatch'}
                                                    </div>
                                                ) : (
                                                    <div className="w-full xl:w-auto px-3 py-2.5 rounded-lg border bg-slate-800/50 border-slate-700 text-slate-500 text-sm font-medium flex items-center justify-center gap-1.5"><Icon name="Info" size={18} /> Pending</div>
                                                )}
                                            </div>
                                        </div>
                                    </CategoryCard>
                                </div>

                                <div className="grid grid-cols-2 gap-4">
                                    <CategoryCard title="Cash Revenue" icon="Banknote" color="emerald" className="col-span-1">
                                        <div className="space-y-3">
                                            <div className="flex gap-2 items-end">
                                                <div className="flex-grow"><SmartCurrencyInput label="KHR" icon="Banknote" name="cashKhr" value={formData.cashKhr} onChange={handleFormChange} /></div>
                                                <Button onClick={() => openBillCounter('KHR', 'cashKhr')} className="!px-3 !py-2.5 bg-emerald-900/30 text-emerald-400 mb-[1px]" type="button"><Icon name="List" size={16} /></Button>
                                            </div>
                                            <div className="flex gap-2 items-end">
                                                <div className="flex-grow"><SmartCurrencyInput label="USD" icon="Banknote" name="cashUsd" value={formData.cashUsd} onChange={handleFormChange} /></div>
                                                <Button onClick={() => openBillCounter('USD', 'cashUsd')} className="!px-3 !py-2.5 bg-emerald-900/30 text-emerald-400 mb-[1px]" type="button"><Icon name="List" size={16} /></Button>
                                            </div>
                                        </div>
                                    </CategoryCard>

                                    <CategoryCard title="Bank / QR" icon="CreditCard" color="cyan" className="col-span-1">
                                        <div className="space-y-3">
                                            <SmartCurrencyInput label="KHR" icon="CreditCard" name="bankKhr" value={formData.bankKhr} onChange={handleFormChange} />
                                            <SmartCurrencyInput label="USD" icon="CreditCard" name="bankUsd" value={formData.bankUsd} onChange={handleFormChange} />
                                        </div>
                                    </CategoryCard>
                                </div>

                                <CategoryCard title="Cross Shop Promotion" icon="ArrowRightLeft" color="violet" className="w-full">
                                    <div className="flex items-center justify-between bg-slate-900/50 p-3 rounded-lg border border-slate-700">
                                        <div className="flex items-center gap-3">
                                            <div className={`p-2 rounded-lg ${formData.promoEnabled ? 'bg-violet-500/20 text-violet-400' : 'bg-slate-800 text-slate-500'}`}><Icon name="ArrowRightLeft" size={18} /></div>
                                            <div>
                                                <h4 className="text-sm font-bold text-white">Enable Promo Payout</h4>
                                                <p className="text-xs text-slate-400">Record a promotion paid to another shop</p>
                                            </div>
                                        </div>
                                        <label className="relative inline-flex items-center cursor-pointer">
                                            <input type="checkbox" className="sr-only peer" checked={formData.promoEnabled} onChange={(e) => handleFormChange({target: {name: 'promoEnabled', value: e.target.checked}})} />
                                            <div className="w-11 h-6 bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-violet-500"></div>
                                        </label>
                                    </div>

                                    {formData.promoEnabled && (
                                        <div className="space-y-4 animate-in fade-in slide-in-from-top-2 duration-300 pt-4 mt-4 border-t border-slate-700/50">
                                            <FormSelect label="Pay To Shop" name="promoPayToShop" value={formData.promoPayToShop} onChange={handleFormChange} options={[{value: '', label: 'Select Shop...'}, ...otherShops.map(s => ({value: s.name, label: s.name}))]} required={formData.promoEnabled} />
                                            <div className="grid grid-cols-3 gap-3">
                                                <FormInput label="Qty H" type="number" name="promoQtyH" value={formData.promoQtyH} onChange={handleFormChange} placeholder="0" />
                                                <FormInput label="Qty G" type="number" name="promoQtyG" value={formData.promoQtyG} onChange={handleFormChange} placeholder="0" />
                                                <FormInput label="Qty R" type="number" name="promoQtyR" value={formData.promoQtyR} onChange={handleFormChange} placeholder="0" />
                                            </div>
                                            <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                                <div className="grid grid-cols-2 gap-3 p-3 bg-slate-900/50 rounded-lg border border-slate-700/50">
                                                    <div>
                                                        <span className="text-[10px] uppercase text-slate-400 font-bold block mb-1">Total Qty</span>
                                                        <span className="font-mono text-sm font-bold text-slate-200">{formData.promoQty || 0}</span>
                                                    </div>
                                                    <div>
                                                        <span className="text-[10px] uppercase text-slate-400 font-bold block mb-1">Base Amount</span>
                                                        <span className="font-mono text-sm font-bold text-slate-200">{formData.promoBaseAmount || '0'} ៛</span>
                                                    </div>
                                                </div>
                                                <div className="grid grid-cols-2 gap-3">
                                                    <FormSelect label="Discount" name="promoDisc" value={formData.promoDisc} onChange={handleFormChange} options={[{value:'30%', label:'30%'}, {value:'40%', label:'40%'}]} />
                                                    <div className="flex flex-col justify-end">
                                                        <span className="text-[10px] uppercase text-violet-400 font-bold block mb-1">Final Payout</span>
                                                        <div className="h-[42px] px-3 flex items-center bg-violet-500/10 border border-violet-500/30 rounded-lg">
                                                            <span className="font-mono font-bold text-violet-400 text-sm">{formData.promoBaseAmount ? new Intl.NumberFormat('en-US').format((parseFloat(formData.promoBaseAmount.replace(/,/g, '')) || 0) * (1 - (parseFloat(formData.promoDisc)/100 || 0.3))) : '0'} ៛</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            </div>
                                        </div>
                                    )}
                                </CategoryCard>

                                <CategoryCard title="Note" icon="PenSquare" color="violet" className="w-full">
                                    <FormTextarea name="note" label="Optional Note" labelIcon="FileText" value={formData.note} onChange={handleFormChange} placeholder="Enter details..." className="h-full resize-none min-h-[60px]" />
                                </CategoryCard>
                            </div>

                            <div className="lg:col-span-1 lg:sticky lg:top-8">
                                <SummaryCard formData={formData} grandTotal={grandTotal} isSubmitting={isSubmitting} />
                            </div>
                        </div>
                    </form>
                    
                    {isConfirming && <ConfirmationModal title="Confirm Submission" message="Please check details carefully before submitting." onConfirm={handleConfirmSubmit} onClose={() => setIsConfirming(false)} isSubmitting={isSubmitting} />}
                    {isPreviewing && lastSubmittedData && <SummaryPreviewModal isOpen={isPreviewing} onClose={handleClosePreviewAndReset} formData={lastSubmittedData.formData} grandTotal={lastSubmittedData.grandTotal} submittedAt={lastSubmittedData.submittedAt} />}
                    {billCounterState.isOpen && <BillCounterModal currency={billCounterState.currency} onClose={() => setBillCounterState(prev => ({ ...prev, isOpen: false }))} onApply={handleBillCounterApply} />}
                    {isExpenseModalOpen && <DailyExpenseModal onClose={() => setIsExpenseModalOpen(false)} />}
                </>
            );
        };

        const StandaloneAppWrapper = () => {
            const { userData } = useAuth();
            const { showNotification } = useNotification();

            const handleLogout = async () => {
                if (window.Firebase && window.Firebase.signOut) {
                    await window.Firebase.signOut(window.auth);
                    showNotification("Logged out.", "info");
                }
            };

            return (
                <div className="flex flex-col h-full bg-slate-900">
                    <header className="flex-shrink-0 flex items-center justify-between px-6 py-4 bg-slate-950/80 backdrop-blur-md border-b border-slate-800 sticky top-0 z-30">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-xl bg-gradient-to-br from-blue-600 to-indigo-700 flex items-center justify-center shadow-lg border border-white/10">
                                <Icon name="AppLogo" size={22} className="text-white" />
                            </div>
                            <div>
                                <h1 className="text-lg font-black text-slate-100 tracking-wide leading-tight">Cashier <span className="text-blue-500">Portal</span></h1>
                                <p className="text-[10px] text-slate-500 font-medium uppercase tracking-wider">{userData?.name || 'Staff'}</p>
                            </div>
                        </div>
                        <Button onClick={handleLogout} variant="ghost" className="text-slate-400 hover:text-red-400 rounded-full" title="Sign out" icon="LogOut" />
                    </header>
                    
                    <main className="flex-1 overflow-y-auto p-4 md:p-6 pb-24">
                        <div className="max-w-5xl mx-auto">
                            <div className="animate-in fade-in slide-in-from-bottom-4 duration-300"><NewCashDropForm /></div>
                        </div>
                    </main>
                </div>
            );
        };

        const LoginPage = () => {
            const { showNotification } = useNotification();
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [isLoading, setIsLoading] = useState(false);

            const handleLogin = async (e) => {
                e.preventDefault();
                setIsLoading(true);
                try {
                    const { signInWithEmailAndPassword, setPersistence, browserLocalPersistence } = window.Firebase;
                    await setPersistence(window.auth, browserLocalPersistence);
                    await signInWithEmailAndPassword(window.auth, email, password);
                } catch (err) {
                    showNotification('Login failed. Please check your credentials.', 'error');
                } finally {
                    setIsLoading(false);
                }
            };

            return (
                <div className="min-h-screen w-full flex items-center justify-center bg-slate-950 relative">
                    <div className="w-full max-w-md bg-slate-900/80 backdrop-blur-xl border border-slate-800 rounded-3xl p-8 shadow-2xl relative z-10 m-4">
                        <div className="text-center mb-8">
                            <div className="w-16 h-16 mx-auto rounded-2xl bg-gradient-to-br from-blue-500 to-indigo-600 flex items-center justify-center shadow-lg mb-4">
                                <Icon name="AppLogo" size={36} className="text-white" />
                            </div>
                            <h2 className="text-2xl font-bold text-white">Cashier Portal</h2>
                            <p className="text-slate-400 text-sm mt-1">Sign in to record drops & expenses.</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-5">
                            <FormInput label="Email Address" type="email" icon="Mail" value={email} onChange={(e) => setEmail(e.target.value)} required />
                            <FormInput label="Password" type="password" icon="Lock" value={password} onChange={(e) => setPassword(e.target.value)} required />
                            <Button type="submit" disabled={isLoading} className="w-full py-4 mt-2" icon={isLoading ? "LoaderCircle" : "LogOut"}>
                                {isLoading ? 'Signing In...' : 'Sign In'}
                            </Button>
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => {
            const { user, userData, isLoading } = useAuth();
            if (isLoading) return <div className="flex items-center justify-center h-screen bg-slate-900"><Icon name="LoaderCircle" size={48} className="text-blue-500" /></div>;
            return user && userData ? <StandaloneAppWrapper /> : <LoginPage />;
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(
            <NotificationProvider>
                <AuthProvider>
                    <DataProvider>
                        <App />
                    </DataProvider>
                </AuthProvider>
            </NotificationProvider>
        );
    </script>
</body>
</html>
