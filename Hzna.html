<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OnSale CRM - Outdoor Sales Tracker</title>
    
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Performance Hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://www.gstatic.com">

    <!-- Google Fonts (Khmer & English) -->
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Moul&family=Siemreap&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Battambang', 'Siemreap', 'sans-serif'],
                        display: ['Moul', 'Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- React & Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

    <style>
        @import url('https://rsms.me/inter/inter.css');
        html, body { 
            font-family: 'Inter', 'Battambang', 'Siemreap', sans-serif;
            overflow-x: hidden; 
            overscroll-behavior-x: none;
            background-color: #0f172a;
        }
        .font-khmer-header { font-family: 'Moul', cursive; }

        /* Splash Screen */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0f172a; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.3s ease-out, visibility 0.3s;
        }
        .splash-loader {
            width: 40px; height: 40px;
            border: 4px solid #3b82f6; border-bottom-color: transparent;
            border-radius: 50%; display: inline-block;
            box-sizing: border-box; animation: rotation 0.8s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Optimized Forms */
        .input, .select, .textarea {
            margin-top: 0.25rem; display: block; width: 100%; padding: 0.75rem 1rem;
            border-width: 1px; border-color: #475569; border-radius: 0.75rem;
            background-color: #1e293b; color: #f1f5f9; outline: none; transition: border-color 0.2s, background-color 0.2s;
        }
        .input:focus, .select:focus, .textarea:focus { border-color: #3b82f6; background-color: #0f172a; }

        /* Animations */
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #475569; border-radius: 10px; }

        .login-gradient { background: radial-gradient(circle at top right, #1e293b, #0f172a); }
        .glass-panel { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.05); }
        .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .tr-hover:hover { background-color: rgba(59, 130, 246, 0.05); }
        .text-shadow-glow { text-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }

        /* Permission Toggles */
        .checkbox-custom:checked + label { background-color: #3b82f6; color: white; border-color: #3b82f6; }

        /* Logo Gradient Style */
        .logo-gradient-text {
            background: linear-gradient(to right, #10b981, #3b82f6, #8b5cf6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body class="bg-slate-900 text-slate-300">
    <div id="splash-screen">
        <span class="splash-loader"></span>
        <h2 style="color: white; font-weight: 600; font-size: 14px; letter-spacing: 0.05em;">ONSALE CRM</h2>
    </div>

    <div id="root"></div>

    <script type="module">
        import { initializeApp, deleteApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, serverTimestamp, setDoc, enableIndexedDbPersistence, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseSDK = {
            initializeApp, deleteApp, getAuth, getFirestore, collection, onSnapshot,
            doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, serverTimestamp,
            signInWithEmailAndPassword, onAuthStateChanged, signOut, setDoc, 
            createUserWithEmailAndPassword, enableIndexedDbPersistence, getDocs
        };
    </script>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, createContext, useContext, memo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAYb0HKLnEUuhrVcQlXACsxFk28w99qAkc",
            authDomain: "onsale-product.firebaseapp.com",
            projectId: "onsale-product",
            storageBucket: "onsale-product.firebasestorage.app",
            messagingSenderId: "837098663012",
            appId: "1:837098663012:web:cb61b9bd7f99ec4d6e8371"
        };
        
        const appId = 'onsale-crm-app';

        // === CONTEXTS ===
        const FirebaseContext = createContext(null);
        const AppDataContext = createContext(null);
        const useFirebase = () => useContext(FirebaseContext);
        const useAppData = () => useContext(AppDataContext);

        const FirebaseProvider = ({ children }) => {
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);
            const [currentUser, setCurrentUser] = useState(null);
            const [userProfile, setUserProfile] = useState(() => {
                try { return JSON.parse(localStorage.getItem('app_user_profile')) || null; } catch(e) { return null; }
            });
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const { initializeApp, getFirestore, getAuth, onAuthStateChanged, enableIndexedDbPersistence } = window.firebaseSDK;
                const app = initializeApp(firebaseConfig);
                const dbInstance = getFirestore(app);
                const authInstance = getAuth(app);
                setAuth(authInstance); setDb(dbInstance);
                enableIndexedDbPersistence(dbInstance).catch(() => {});
                return onAuthStateChanged(authInstance, (user) => {
                    setCurrentUser(user);
                    if (!user) { setUserProfile(null); localStorage.removeItem('app_user_profile'); setLoading(false); }
                });
            }, []);

            useEffect(() => {
                if (!db || !currentUser) return;
                const { doc, onSnapshot } = window.firebaseSDK;
                const userRef = doc(db, 'artifacts', appId, 'users', currentUser.uid);
                return onSnapshot(userRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const profileData = { id: docSnap.id, ...docSnap.data() };
                        setUserProfile(profileData);
                        localStorage.setItem('app_user_profile', JSON.stringify(profileData));
                    } else {
                        setUserProfile({ name: currentUser.email || 'User', role: 'Staff', uid: currentUser.uid, permissions: ['dashboard', 'customers'] });
                    }
                    setLoading(false);
                }, () => setLoading(false));
            }, [db, currentUser]);

            return <FirebaseContext.Provider value={{ db, auth, currentUser, userProfile, loading }}>{children}</FirebaseContext.Provider>;
        };

        const AppDataProvider = ({ children }) => {
            const { db, currentUser } = useFirebase();
            const [systemConfig, setSystemConfig] = useState({ appName: 'OnSale CRM' });
            useEffect(() => {
                if(!db || !currentUser) return;
                const { doc, onSnapshot } = window.firebaseSDK;
                const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'systemConfig', 'global');
                return onSnapshot(configRef, (snapshot) => {
                    if (snapshot.exists()) setSystemConfig(snapshot.data());
                });
            }, [db, currentUser]);
            return <AppDataContext.Provider value={{ systemConfig }}>{children}</AppDataContext.Provider>;
        };

        // === UI KIT COMPONENTS ===
        const Card = memo(({ children, className = '' }) => (
            <div className={`bg-slate-800/50 p-4 sm:p-6 rounded-3xl shadow-lg border border-slate-700/50 ${className}`}>{children}</div>
        ));

        const CardTitle = memo(({ children }) => (
            <h2 className="text-xl font-black text-slate-100 mb-4 pb-4 border-b border-slate-700/50 tracking-tight flex items-center gap-2 uppercase">{children}</h2>
        ));

        const PageHeader = memo(({ title, children }) => (
            <div className="flex flex-wrap gap-4 justify-between items-center mb-6">
                <h3 className="text-2xl font-black text-white tracking-tight uppercase leading-none">{title}</h3>
                <div className="flex flex-wrap gap-4 items-center">{children}</div>
            </div>
        ));

        const Button = memo(({ children, onClick, variant = 'primary', icon, disabled = false, type = 'button', className = '' }) => {
            const base = 'font-bold rounded-xl shadow-sm transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed transform active:scale-95 whitespace-nowrap';
            const variants = {
                primary: 'bg-blue-600 text-white hover:bg-blue-500 px-6 py-2.5',
                secondary: 'bg-slate-700 text-slate-200 hover:bg-slate-600 px-4 py-2',
                danger: 'bg-red-600 text-white hover:bg-red-500 px-4 py-2',
                success: 'bg-emerald-600 text-white hover:bg-emerald-700 px-4 py-2',
                cyan: 'bg-cyan-600 text-white hover:bg-cyan-500 px-6 py-2.5',
            };
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`${base} ${variants[variant] || variants.primary} ${className}`}>
                    {icon && <i className={`fas ${icon}`}></i>} {children}
                </button>
            );
        });

        const AppLabelLogo = ({ className = "" }) => (
            <div className={`flex flex-col ${className}`}>
                <span className="font-khmer-header text-xl tracking-tighter logo-gradient-text uppercase leading-none">OnSale</span>
                <span className="text-[10px] font-black tracking-[0.3em] text-slate-500 uppercase -mt-0.5 pl-0.5">Solutions</span>
            </div>
        );

        const Modal = ({ isOpen, onClose, children, maxWidth = "max-w-2xl" }) => { 
            if (!isOpen) return null; 
            return ReactDOM.createPortal(
                <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                    <div className={`relative bg-slate-800 rounded-2xl shadow-2xl w-full ${maxWidth} border border-slate-700 flex flex-col max-h-[85vh]`}>
                        {children}
                    </div>
                </div>, document.body
            ); 
        };
        const ModalHeader = ({ title, onClose }) => (<div className="p-5 border-b border-slate-700 flex-none flex justify-between items-center"><h3 className="text-xl font-bold text-white uppercase tracking-tight">{title}</h3><button onClick={onClose} className="text-slate-400 hover:text-white transition-colors"><i className="fas fa-times text-lg"></i></button></div>);
        const ModalBody = ({ children }) => (<div className="p-6 flex-1 overflow-y-auto custom-scrollbar">{children}</div>);
        const ModalFooter = ({ children }) => (<div className="p-4 bg-slate-900/50 border-t border-slate-700 flex-none flex justify-end gap-3 rounded-b-2xl">{children}</div>);

        const useCollection = (collectionName) => {
            const { db, currentUser } = useFirebase();
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            useEffect(() => {
                if (!db || !currentUser) return;
                const { collection, onSnapshot } = window.firebaseSDK;
                const ref = collection(db, 'artifacts', appId, 'public', 'data', collectionName);
                return onSnapshot(ref, (snapshot) => {
                    const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    docs.sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
                    setData(docs); setLoading(false);
                }, () => setLoading(false));
            }, [db, currentUser, collectionName]);
            return { data, loading };
        };

        const APP_MODULES_LIST = [
            { key: 'dashboard', label: 'Dashboard', icon: 'fa-chart-pie', color: 'text-blue-500' },
            { key: 'customers', label: 'Customers', icon: 'fa-store', color: 'text-emerald-500' },
            { key: 'visits', label: 'GPS Visits', icon: 'fa-location-dot', color: 'text-amber-500' },
            { key: 'orders', label: 'Orders', icon: 'fa-file-invoice-dollar', color: 'text-purple-500' },
            { key: 'products', label: 'Products', icon: 'fa-box-open', color: 'text-cyan-500' },
        ];

        // === DASHBOARD ===
        const DashboardPage = () => {
            const { userProfile } = useFirebase();
            const { data: customers } = useCollection('customers');
            const stats = useMemo(() => ({
                total: customers.length,
                active: customers.filter(c => c.status === 'Active').length,
                retail: customers.filter(c => c.type === 'Retail').length,
                wholesale: customers.filter(c => c.type === 'Wholesale').length
            }), [customers]);

            const StatCard = ({ title, value, icon, color }) => (
                <div className="bg-slate-800/40 p-6 rounded-3xl border border-slate-700/50 shadow-lg flex items-center gap-5 hover:-translate-y-1 transition-all">
                    <div className={`w-14 h-14 rounded-2xl ${color} flex items-center justify-center text-white text-2xl shadow-lg`}><i className={`fas ${icon}`}></i></div>
                    <div><p className="text-[10px] font-black uppercase text-slate-500 tracking-widest">{title}</p><p className="text-3xl font-black text-white tracking-tight">{value}</p></div>
                </div>
            );

            return (
                <div className="space-y-8 animate-fade-in pb-10">
                    <h3 className="text-3xl font-black text-white tracking-tight uppercase leading-none">Sales Intelligence</h3>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        <StatCard title="Customers" value={stats.total} icon="fa-store" color="bg-blue-600" />
                        <StatCard title="Active" value={stats.active} icon="fa-check" color="bg-emerald-600" />
                        <StatCard title="Retail" value={stats.retail} icon="fa-shopping-bag" color="bg-indigo-600" />
                        <StatCard title="Wholesale" value={stats.wholesale} icon="fa-truck" color="bg-purple-600" />
                    </div>
                </div>
            );
        };

        // === CATEGORY MANAGEMENT ===
        const CategoryModal = ({ isOpen, onClose, category }) => {
            const { db, currentUser } = useFirebase();
            const [name, setName] = useState('');
            const [isSaving, setIsSaving] = useState(false);
            useEffect(() => {
                if (category) setName(category.name || '');
                else setName('');
            }, [category, isOpen]);
            const handleSubmit = async (e) => {
                e.preventDefault(); setIsSaving(true);
                const { collection, doc, addDoc, updateDoc, serverTimestamp } = window.firebaseSDK;
                const ref = collection(db, 'artifacts', appId, 'public', 'data', 'productCategories');
                try {
                    if (category?.id) await updateDoc(doc(ref, category.id), { name, updatedAt: serverTimestamp() });
                    else await addDoc(ref, { name, createdBy: currentUser.uid, createdAt: serverTimestamp() });
                    onClose();
                } catch (err) { alert(err.message); } finally { setIsSaving(false); }
            };
            return (
                <Modal isOpen={isOpen} onClose={onClose} maxWidth="max-w-md">
                    <form onSubmit={handleSubmit} className="flex flex-col h-full overflow-hidden">
                        <ModalHeader title={category ? "Edit Category" : "New Category"} onClose={onClose} />
                        <ModalBody><label className="text-[10px] font-black uppercase text-blue-500 tracking-widest ml-1">Category Name *</label><input value={name} onChange={e=>setName(e.target.value)} className="input border-blue-500/20" required placeholder="e.g., Beverage, Food, Household" /></ModalBody>
                        <ModalFooter><Button type="button" variant="secondary" onClick={onClose}>Cancel</Button><Button type="submit" disabled={isSaving}>{isSaving ? '...' : 'Save'}</Button></ModalFooter>
                    </form>
                </Modal>
            );
        };

        const CategoryManagementSection = () => {
            const { db } = useFirebase();
            const { data: categories, loading } = useCollection('productCategories');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editTarget, setEditTarget] = useState(null);
            const handleDelete = async (cat) => {
                if (!confirm(`Delete category "${cat.name}"?`)) return;
                const { doc, deleteDoc } = window.firebaseSDK;
                try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'productCategories', cat.id)); } catch (err) { alert(err.message); }
            };
            return (
                <div className="space-y-4">
                    <div className="flex justify-between items-center"><h4 className="text-lg font-black text-white uppercase tracking-widest">Classifications</h4><Button variant="primary" icon="fa-plus" onClick={() => {setEditTarget(null); setIsModalOpen(true);}}>Add</Button></div>
                    <div className="table-responsive bg-slate-900/50 rounded-2xl border border-slate-700">
                        <table className="w-full text-left text-sm border-collapse">
                            <thead><tr className="bg-slate-800 text-slate-400 font-black uppercase text-[10px] tracking-widest border-b border-slate-700"><th className="px-6 py-4">Name</th><th className="px-6 py-4 text-right">Actions</th></tr></thead>
                            <tbody className="divide-y divide-slate-800">
                                {categories.map(c => (
                                    <tr key={c.id} className="hover:bg-slate-800/40 transition-colors"><td className="px-6 py-4 font-bold text-slate-100 uppercase">{c.name}</td><td className="px-6 py-4 text-right"><div className="flex justify-end gap-2"><button onClick={() => {setEditTarget(c); setIsModalOpen(true);}} className="p-2 text-blue-400"><i className="fas fa-edit"></i></button><button onClick={() => handleDelete(c)} className="p-2 text-red-500"><i className="fas fa-trash-alt"></i></button></div></td></tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    <CategoryModal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} category={editTarget} />
                </div>
            );
        };

        // === USER MANAGEMENT MODAL FIXES ===
        const CreateUserModal = ({ isOpen, onClose, editingUser = null }) => {
            const { db, userProfile } = useFirebase();
            const [formData, setFormData] = useState({ name: '', email: '', password: '', role: 'Staff', sellerName: '', contactNumber: '', permissions: ['dashboard', 'customers'] });
            const [isSaving, setIsSaving] = useState(false);
            const [error, setError] = useState('');
            const isAdmin = userProfile?.role?.trim().toLowerCase() === 'admin';

            useEffect(() => {
                if (editingUser) setFormData({ name: editingUser.name || '', email: editingUser.email || '', password: '', role: editingUser.role || 'Staff', sellerName: editingUser.sellerName || '', contactNumber: editingUser.contactNumber || '', permissions: editingUser.permissions || ['dashboard', 'customers'] });
                else setFormData({ name: '', email: '', password: '', role: 'Staff', sellerName: '', contactNumber: '', permissions: ['dashboard', 'customers'] });
            }, [editingUser, isOpen]);

            const handleSubmit = async (e) => {
                e.preventDefault(); setIsSaving(true);
                try {
                    const { initializeApp, deleteApp, getAuth, createUserWithEmailAndPassword, doc, updateDoc, setDoc, serverTimestamp } = window.firebaseSDK;
                    if (editingUser) await updateDoc(doc(db, 'artifacts', appId, 'users', editingUser.id), { ...formData, updatedAt: serverTimestamp() });
                    else {
                        const tempApp = initializeApp(firebaseConfig, "Temp_" + Date.now());
                        const userCred = await createUserWithEmailAndPassword(getAuth(tempApp), formData.email, formData.password);
                        await setDoc(doc(db, 'artifacts', appId, 'users', userCred.user.uid), { ...formData, createdAt: serverTimestamp() });
                        await getAuth(tempApp).signOut(); await deleteApp(tempApp);
                    }
                    onClose();
                } catch (err) { setError(err.message); } finally { setIsSaving(false); }
            };

            const togglePerm = (k) => setFormData(p => ({ ...p, permissions: p.permissions.includes(k) ? p.permissions.filter(x => x !== k) : [...p.permissions, k] }));

            return (
                <Modal isOpen={isOpen} onClose={onClose} maxWidth="max-w-xl">
                    <form onSubmit={handleSubmit} className="flex flex-col h-full overflow-hidden">
                        <ModalHeader title={editingUser ? "Edit Profile" : "Add Team Member"} onClose={onClose} />
                        <ModalBody className="space-y-6">
                            {error && <div className="p-3 bg-red-900/40 rounded-xl text-xs text-red-200 border border-red-500/20">{error}</div>}
                            <div className="space-y-4">
                                <h4 className="text-[10px] font-black uppercase text-blue-500 tracking-[0.2em] border-b border-slate-700/50 pb-1">User Identity</h4>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                    <div className="sm:col-span-2"><label className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1">Full Name</label><input name="name" value={formData.name} onChange={e=>setFormData({...formData, name:e.target.value})} className="input" required /></div>
                                    <div><label className="text-[10px] font-black uppercase text-emerald-500 tracking-widest ml-1">Seller Identity</label><input name="sellerName" value={formData.sellerName} onChange={e=>setFormData({...formData, sellerName:e.target.value})} className="input border-emerald-500/20" /></div>
                                    <div><label className="text-[10px] font-black uppercase text-emerald-500 tracking-widest ml-1">Contact No.</label><input name="contactNumber" value={formData.contactNumber} onChange={e=>setFormData({...formData, contactNumber:e.target.value})} className="input border-emerald-500/20" /></div>
                                </div>
                                
                                {!editingUser && (
                                    <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                                        <div className="sm:col-span-2"><label className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1">Work Email</label><input type="email" placeholder="email@domain.com" value={formData.email} onChange={e=>setFormData({...formData, email:e.target.value})} className="input" required /></div>
                                        <div className="sm:col-span-2"><label className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1">Initial Password</label><input type="password" value={formData.password} onChange={e=>setFormData({...formData, password:e.target.value})} className="input" required minLength="6" /></div>
                                    </div>
                                )}

                                <div>
                                    <label className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1">System Role</label>
                                    <select value={formData.role} onChange={e=>setFormData({...formData, role:e.target.value})} className="select font-bold">
                                        <option value="Staff">Staff</option>
                                        {isAdmin && <><option value="Management">Management</option><option value="Admin">Admin</option></>}
                                    </select>
                                </div>
                            </div>

                            <div className="space-y-3">
                                <h4 className="text-[10px] font-black uppercase text-blue-500 tracking-[0.2em] border-b border-slate-700/50 pb-1">Page Access Permissions</h4>
                                <div className="grid grid-cols-1 sm:grid-cols-2 gap-2">
                                    {APP_MODULES_LIST.map(m => (
                                        <div key={m.key} className="flex items-center">
                                            <input type="checkbox" id={`p-${m.key}`} className="hidden checkbox-custom" checked={formData.permissions.includes(m.key)} onChange={() => togglePerm(m.key)}/>

                            <div className="flex items-center gap-4"><div className="hidden sm:flex flex-col items-end"><span className="text-[11px] font-black text-white uppercase">{userProfile.sellerName || userProfile.name}</span><span className={`text-[9px] font-bold uppercase tracking-widest ${isAdmin ? 'text-amber-500' : isMan ? 'text-blue-400' : 'text-emerald-500'}`}>{userProfile.role}</span></div><button onClick={() => window.firebaseSDK.signOut(auth)} className="px-4 py-2 bg-red-900/20 text-red-500 text-[10px] font-black uppercase rounded-lg border border-red-500/20 active:scale-95 transition-all">Logout</button></div>
                        </header>
                        <main className="flex-1 overflow-y-auto p-6 bg-[#0f172a]"><div className="max-w-7xl mx-auto">{renderPage()}</div></main>
                    </div>
                    {launchpad && (
                        <div className="fixed inset-0 z-50 bg-slate-900/95 backdrop-blur-xl flex flex-col animate-fade-in overflow-y-auto custom-scrollbar">
                            <header className="p-6 flex justify-between items-center max-w-6xl mx-auto w-full"><AppLabelLogo /><button onClick={() => setLaunchpad(false)} className="w-10 h-10 flex items-center justify-center bg-slate-800 rounded-full border border-slate-700 shadow-xl transition-all hover:rotate-90"><i className="fas fa-times text-lg text-white"></i></button></header>
                            <div className="flex-1 p-6 grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 gap-6 max-w-6xl mx-auto w-full mb-10">
                                {[
                                    {id: 'dashboard', icon: 'chart-pie', label: 'Dashboard'}, {id: 'customers', icon: 'store', label: 'Customers'}, {id: 'visits', icon: 'location-dot', label: 'GPS Visits'},
                                    {id: 'orders', icon: 'file-invoice-dollar', label: 'Orders'}, {id: 'products', icon: 'box-open', label: 'Products'}, {id: 'settings', icon: 'sliders', label: 'Settings', isSystem: true}
                                ].filter(m => isAdmin || (m.isSystem ? canAccessSettings : userPermissions.includes(m.id))).map(m => (
                                    <button key={m.id} onClick={() => {setPage(m.id); setLaunchpad(false);}} className="bg-slate-800/50 aspect-square rounded-[2rem] border border-slate-700 flex flex-col items-center justify-center gap-3 hover:border-blue-500 active:scale-95 transition-all group shadow-2xl"><i className={`fas fa-${m.icon} text-2xl ${m.color} group-hover:scale-110 transition-transform`}></i><span className="text-[10px] font-black uppercase tracking-widest text-slate-400 group-hover:text-white text-center px-1">{m.label}</span></button>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const LoginPage = () => {
            const { auth } = useFirebase();
            const [email, setEmail] = useState(''); const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false); const [error, setError] = useState('');
            const handleLogin = async (e) => { e.preventDefault(); setLoading(true); setError(''); try { await window.firebaseSDK.signInWithEmailAndPassword(auth, email, password); } catch (err) { setError("Credential validation failed."); setLoading(false); } };
            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-[#0f172a] overflow-hidden">
                    <div className="hidden md:flex md:w-1/2 login-gradient p-16 flex-col justify-between border-r border-slate-800"><div><AppLabelLogo className="scale-150 origin-left mb-10" /><h1 className="text-5xl font-black text-white leading-tight font-khmer-header tracking-tight uppercase mt-10">Sales Intelligence</h1><p className="text-slate-400 text-xl font-medium tracking-tight max-w-sm italic opacity-70 italic">Powering modern field sales teams.</p></div><p className="text-slate-500 text-[10px] font-black uppercase tracking-[0.5em]">AI - Jelly Wang</p></div>
                    <div className="flex-1 flex items-center justify-center p-6 relative"><div className="w-full max-w-sm animate-fade-in z-10"><div className="md:hidden flex flex-col items-center mb-10"><AppLabelLogo className="scale-125 mb-4" /></div><div className="glass-panel p-8 sm:p-10 rounded-[2.5rem] shadow-2xl border border-slate-700/50"><h2 className="text-2xl font-bold text-white mb-6 uppercase tracking-tighter text-center">Secure Sign-In</h2>{error && <div className="mb-6 p-4 bg-red-900/40 rounded-xl text-xs font-bold text-red-200 border border-red-500/20">{error}</div>}<form onSubmit={handleLogin} className="space-y-6"><div><label className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1">Identity</label><input type="email" placeholder="work@email.com" className="input h-14" value={email} onChange={e=>setEmail(e.target.value)} required /></div><div><label className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1">Secret Key</label><input type="password" placeholder="••••••••" className="input h-14" value={password} onChange={e=>setPassword(e.target.value)} required /></div><Button type="submit" className="w-full h-14 text-lg" disabled={loading}>{loading ? <i className="fas fa-circle-notch fa-spin"></i> : 'Authorize Access'}</Button><p className="text-slate-500 text-[10px] font-black uppercase tracking-[0.2em] text-center pt-4">AI - <span className="text-slate-300">Jelly Wang</span></p></form></div></div></div>
                </div>
            );
        };

        const App = () => (<FirebaseProvider><AppDataProvider><AppContent /></AppDataProvider></FirebaseProvider>);
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
