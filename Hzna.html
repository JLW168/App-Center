<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ounna Outdoor Sales Tracker</title>
    
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Google Fonts: Inter (English/Numbers), Battambang (Khmer Body), Moul (Khmer Header) -->
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Moul&family=Siemreap&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

    <!-- Cropper.js for Image Processing -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <!-- Tailwind CSS with Custom Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Battambang', 'Siemreap', 'sans-serif'],
                        display: ['Moul', 'Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        slate: {
                            750: '#1e293b',
                            850: '#0f172a',
                            900: '#0f172a', 
                            950: '#020617',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.6s ease-out forwards',
                        'bounce-short': 'bounceShort 1.5s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            from: { opacity: '0', transform: 'translateY(10px)' },
                            to: { opacity: '1', transform: 'translateY(0)' }
                        },
                        bounceShort: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-6px)' },
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- Corrected React and ReactDOM CDN URLs -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

    <style>
        html, body { 
            font-family: 'Inter', 'Battambang', 'Siemreap', sans-serif;
            overflow-x: hidden; 
            background-color: #0f172a;
            color: #cbd5e1;
            height: 100%;
        }
        .font-khmer-header { font-family: 'Moul', cursive; }
        
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0f172a; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease-out;
        }

        .input, .select, .textarea {
            display: block; width: 100%; padding: 0.75rem 1rem;
            border: 1px solid #334155; border-radius: 0.85rem;
            background-color: #1e293b; color: #f1f5f9; outline: none; transition: all 0.2s;
            font-size: 14px;
        }
        .input:focus, .select:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }

        .app-card { background: rgba(30, 41, 59, 0.5); border: 1px solid #334155; border-radius: 1.5rem; overflow: hidden; }
        
        .logo-gradient-text {
            background: linear-gradient(135deg, #60a5fa, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .squircle { border-radius: 28px; }
        .glass-icon { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }

        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
        .safe-pt { padding-top: env(safe-area-inset-top); }

        .avatar-circle-box {
            position: relative;
            width: 140px;
            height: 140px;
            border-radius: 50%;
            background: #1e293b;
            border: 2px solid #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
        }
        .avatar-circle-box:hover {
            border-color: #3b82f6;
            box-shadow: 0 0 20px rgba(59, 130, 246, 0.2);
        }
    </style>
</head>
<body class="bg-slate-900">
    <div id="splash-screen">
        <div class="w-12 h-12 border-4 border-blue-500 border-b-transparent rounded-full animate-spin mb-4"></div>
        <h2 class="text-xs font-black text-white tracking-[0.3em] uppercase opacity-80">Ounna CRM</h2>
    </div>

    <div id="root"></div>

    <script type="module">
        import { initializeApp, deleteApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, serverTimestamp, setDoc, enableIndexedDbPersistence, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseSDK = {
            initializeApp, deleteApp, getAuth, getFirestore, collection, onSnapshot,
            doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, serverTimestamp,
            signInWithEmailAndPassword, onAuthStateChanged, signOut, setDoc, 
            createUserWithEmailAndPassword, enableIndexedDbPersistence, getDocs
        };
    </script>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo, createContext, useContext, memo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAYb0HKLnEUuhrVcQlXACsxFk28w99qAkc",
            authDomain: "onsale-product.firebaseapp.com",
            projectId: "onsale-product",
            storageBucket: "onsale-product.firebasestorage.app",
            messagingSenderId: "837098663012",
            appId: "1:837098663012:web:cb61b9bd7f99ec4d6e8371"
        };
        
        const appId = 'onsale-crm-app';

        // === UTILS ===
        const generateInvoiceNo = () => {
            const d = new Date();
            const pad = (n) => n.toString().padStart(2, '0');
            const dateStr = `${pad(d.getDate())}${pad(d.getMonth() + 1)}${d.getFullYear().toString().slice(-2)}`;
            const timeStr = `${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
            return `HZN-${dateStr}-${timeStr}`;
        };

        const generateDriverId = () => {
            return `DV-${Math.floor(1000 + Math.random() * 9000)}`;
        };

        // === CONTEXTS ===
        const FirebaseContext = createContext(null);
        const FirebaseProvider = ({ children }) => {
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);
            const [currentUser, setCurrentUser] = useState(null);
            const [userProfile, setUserProfile] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const { initializeApp, getFirestore, getAuth, onAuthStateChanged, enableIndexedDbPersistence } = window.firebaseSDK;
                const app = initializeApp(firebaseConfig);
                const dbInstance = getFirestore(app);
                const authInstance = getAuth(app);
                setAuth(authInstance); setDb(dbInstance);
                enableIndexedDbPersistence(dbInstance).catch(() => {});
                
                return onAuthStateChanged(authInstance, (user) => {
                    setCurrentUser(user);
                    if (!user) { setUserProfile(null); setLoading(false); }
                });
            }, []);

            useEffect(() => {
                if (!db || !currentUser) return;
                const { doc, onSnapshot } = window.firebaseSDK;
                const userRef = doc(db, 'artifacts', appId, 'users', currentUser.uid);
                return onSnapshot(userRef, (snap) => {
                    if (snap.exists()) setUserProfile({ id: snap.id, ...snap.data() });
                    else setUserProfile({ id: currentUser.uid, name: currentUser.email.split('@')[0], role: 'Staff' });
                    setLoading(false);
                }, () => setLoading(false));
            }, [db, currentUser]);

            return <FirebaseContext.Provider value={{ db, auth, currentUser, userProfile, loading }}>{children}</FirebaseContext.Provider>;
        };

        const useFirebase = () => useContext(FirebaseContext);

        const useCollection = (collectionName) => {
            const { db, currentUser } = useFirebase();
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!db || !currentUser) return;
                const { collection, onSnapshot } = window.firebaseSDK;
                const ref = collectionName === 'users' 
                    ? collection(db, 'artifacts', appId, 'users')
                    : collection(db, 'artifacts', appId, 'public', 'data', collectionName);
                
                const unsubscribe = onSnapshot(ref, (snapshot) => {
                    const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    docs.sort((a, b) => {
                        const timeA = (a.updatedAt || a.createdAt)?.toMillis?.() || 0;
                        const timeB = (b.updatedAt || b.createdAt)?.toMillis?.() || 0;
                        return timeB - timeA;
                    });
                    setData(docs);
                    setLoading(false);
                }, (err) => {
                    console.error(`Node Error [${collectionName}]:`, err);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [db, currentUser, collectionName]);

            return { data, loading };
        };

        // === UI KIT COMPONENTS ===
        const Clock = () => {
            const [time, setTime] = useState(new Date());
            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);
            return (
                <div className="flex flex-col items-end font-mono text-right">
                    <span className="text-xl font-bold text-white leading-none">{time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false })}</span>
                    <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">{time.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' })}</span>
                </div>
            );
        };

        const Button = memo(({ children, onClick, variant = 'primary', icon, disabled = false, type = 'button', className = '' }) => {
            const variants = {
                primary: 'bg-blue-600 text-white shadow-lg shadow-blue-500/20 hover:bg-blue-500',
                secondary: 'bg-slate-750 text-slate-300 border border-slate-700 hover:bg-slate-700',
                danger: 'bg-red-600 text-white shadow-lg shadow-red-500/20 hover:bg-red-500',
                success: 'bg-emerald-600 text-white shadow-lg shadow-emerald-500/20 hover:bg-emerald-500',
            };
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`px-5 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all disabled:opacity-50 ${variants[variant]} ${className}`}>
                    {icon && <i className={`fas ${icon}`}></i>} {children}
                </button>
            );
        });

        const Modal = ({ isOpen, onClose, title, children, footer, size = "max-w-xl" }) => {
            if (!isOpen) return null;
            return ReactDOM.createPortal(
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md">
                    <div className={`bg-slate-900 rounded-[2.5rem] shadow-2xl w-full ${size} border border-slate-700 flex flex-col max-h-[90vh] overflow-hidden animate-fade-in`}>
                        <div className="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                            <h3 className="text-lg font-black text-white uppercase tracking-tighter">{title}</h3>
                            <button onClick={onClose} className="w-10 h-10 rounded-full hover:bg-slate-800 text-slate-400 flex items-center justify-center transition-all"><i className="fas fa-times"></i></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-8 space-y-6 custom-scrollbar">{children}</div>
                        {footer && <div className="p-6 border-t border-slate-800 bg-slate-900/50 flex justify-end gap-3">{footer}</div>}
                    </div>
                </div>, document.body
            );
        };

        const Avatar = ({ name, url, size = "10" }) => (
            <div className={`w-${size} h-${size} rounded-full bg-slate-700 border border-slate-600 flex items-center justify-center text-slate-300 font-bold uppercase text-xs overflow-hidden flex-none`}>
                {url ? <img src={url} className="w-full h-full object-cover" /> : (name?.charAt(0) || 'U')}
            </div>
        );

        // === PAGES ===

        const DashboardPage = () => {
            const { data: customers } = useCollection('customers');
            const { data: orders } = useCollection('orders');
            const stats = useMemo(() => ({
                customers: customers.length,
                revenue: orders.filter(o => o.status === 'Paid').reduce((a, c) => a + (c.grandTotal || 0), 0),
                pending: orders.filter(o => o.orderType === 'PR').length,
                total: orders.length
            }), [customers, orders]);

            return (
                <div className="space-y-8 animate-fade-in pb-12">
                    <h3 className="text-2xl font-khmer-header text-white uppercase tracking-tighter leading-none">Business Intelligence</h3>
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        {[
                            { label: 'Network', value: stats.customers, icon: 'fa-store', color: 'text-blue-400' },
                            { label: 'Revenue ($)', value: stats.revenue.toFixed(2), icon: 'fa-dollar-sign', color: 'text-green-400' },
                            { label: 'Pending PR', value: stats.pending, icon: 'fa-clock', color: 'text-amber-400' },
                            { label: 'Total Orders', value: stats.total, icon: 'fa-shopping-cart', color: 'text-indigo-400' }
                        ].map((s, i) => (
                            <div key={i} className="bg-slate-800/50 p-6 rounded-[2rem] border border-slate-700 shadow-xl">
                                <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-1">{s.label}</p>
                                <p className={`text-3xl font-black font-mono tracking-tighter ${s.color}`}>{s.value}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const CustomersPage = () => {
            const { db, userProfile } = useFirebase();
            const { data: customers } = useCollection('customers');
            const { data: sellers } = useCollection('users');
            
            const [search, setSearch] = useState('');
            const [marketFilter, setMarketFilter] = useState('');
            const [sellerFilter, setSellerFilter] = useState('');
            const [isCustModalOpen, setIsCustModalOpen] = useState(false);
            const [isEditing, setIsEditing] = useState(false);
            const [selectedCustomerId, setSelectedCustomerId] = useState(null);
            const [saving, setSaving] = useState(false);
            const [isDeleteModalOpen, setIsDeleteModalOpen] = useState(false);
            const [idToDelete, setIdToDelete] = useState(null);

            const initialForm = { 
                shopName: '', ownerName: '', contact: '', gender: 'Male', dob: '', idCard: '',
                assignedSellerId: '', marketType: 'Retail', physicalAddress: '', 
                lat: '', lng: '', mapLink: '', photo: '' 
            };
            const [formData, setFormData] = useState(initialForm);
            const [tempPhoto, setTempPhoto] = useState(null);
            const imageRef = useRef(null);
            const cropperRef = useRef(null);

            useEffect(() => {
                if (formData.mapLink && !formData.lat) {
                    const regex = /@(-?\d+\.\d+),(-?\d+\.\d+)/;
                    const match = formData.mapLink.match(regex);
                    if (match) setFormData(prev => ({ ...prev, lat: match[1], lng: match[2] }));
                }
            }, [formData.mapLink]);

            const getGPS = () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        setFormData(prev => ({ ...prev, lat: pos.coords.latitude.toFixed(6), lng: pos.coords.longitude.toFixed(6) }));
                    }, () => alert("GPS capture failed."));
                }
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = () => { setTempPhoto(reader.result); if (cropperRef.current) cropperRef.current.destroy(); };
                    reader.readAsDataURL(file);
                }
            };

            useEffect(() => {
                if (tempPhoto && imageRef.current) {
                    cropperRef.current = new Cropper(imageRef.current, { aspectRatio: 1, viewMode: 1, background: false, autoCropArea: 1, responsive: true });
                }
                return () => cropperRef.current?.destroy();
            }, [tempPhoto]);

            const applyCrop = () => {
                if (cropperRef.current) {
                    const canvas = cropperRef.current.getCroppedCanvas({ width: 400, height: 400 });
                    setFormData({ ...formData, photo: canvas.toDataURL('image/jpeg', 0.8) });
                    setTempPhoto(null);
                }
            };

            const handleRegister = async () => {
                if (!formData.shopName && !formData.ownerName) return;
                setSaving(true);
                try {
                    const { collection, addDoc, updateDoc, doc, serverTimestamp } = window.firebaseSDK;
                    const sellerNode = sellers.find(s => s.id === formData.assignedSellerId);
                    const payload = { ...formData, assignedSellerName: sellerNode?.name || sellerNode?.sellerName || 'Unassigned', updatedAt: serverTimestamp() };
                    if (isEditing) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', selectedCustomerId), payload);
                    else { payload.registeredBy = userProfile?.name || 'System'; payload.createdAt = serverTimestamp(); await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'customers'), payload); }
                    setIsCustModalOpen(false); setFormData(initialForm);
                } catch (e) { alert("Operation failed."); }
                setSaving(false);
            };

            const handleDeleteAction = async () => {
                try {
                    const { doc, deleteDoc } = window.firebaseSDK;
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', idToDelete));
                    setIsDeleteModalOpen(false);
                } catch (e) { alert("Delete failed."); }
            };

            const filtered = customers.filter(c => {
                const s = search.toLowerCase();
                const shopNameMatch = (c.shopName || c.name || '').toLowerCase().includes(s) || (c.ownerName || c.contactPerson || '').toLowerCase().includes(s) || (c.contact || c.phone || '').includes(s);
                const marketMatch = marketFilter === '' || (c.marketType || c.type || 'Retail') === marketFilter;
                const sellerMatch = sellerFilter === '' || (c.assignedSellerId || c.sellerId || '') === sellerFilter;
                return shopNameMatch && marketMatch && sellerMatch;
            });

            return (
                <div className="space-y-8 animate-fade-in pb-12">
                    <div className="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-6">
                        <h3 className="text-2xl font-khmer-header text-white uppercase tracking-tighter leading-none flex-none">Customer List</h3>
                        <div className="flex flex-row items-center w-full xl:w-auto gap-3 flex-nowrap overflow-x-auto pb-2 xl:pb-0 custom-scrollbar">
                            <input placeholder="Search shop/owner/phone..." className="input !mt-0 !py-2.5 !px-4 text-sm !bg-slate-800 !border-slate-700 flex-grow xl:min-w-[200px]" value={search} onChange={e=>setSearch(e.target.value)} />
                            <select className="select !mt-0 !py-2.5 !px-3 text-xs !bg-slate-800 !border-slate-700 w-32 flex-none" value={marketFilter} onChange={e=>setMarketFilter(e.target.value)}><option value="">All Markets</option><option value="Retail">Retail</option><option value="Wholesale">Wholesale</option></select>
                            <select className="select !mt-0 !py-2.5 !px-3 text-xs !bg-slate-800 !border-slate-700 w-40 flex-none" value={sellerFilter} onChange={e=>setSellerFilter(e.target.value)}><option value="">All Sellers</option>{sellers.map(s => <option key={s.id} value={s.id}>{s.name || s.sellerName}</option>)}</select>
                            <Button icon="fa-plus" className="flex-none" onClick={() => { setIsEditing(false); setSelectedCustomerId(null); setFormData(initialForm); setIsCustModalOpen(true); }}>Add</Button>
                        </div>
                    </div>

                    <div className="bg-slate-800/50 rounded-[2rem] border border-slate-700 overflow-hidden shadow-2xl">
                        <div className="overflow-x-auto custom-scrollbar">
                            <table className="w-full text-left border-collapse min-w-[900px]">
                                <thead>
                                    <tr className="bg-slate-900/50 text-xs text-slate-400 font-semibold uppercase tracking-wider border-b border-slate-700">
                                        <th className="px-4 py-3">Shop Node</th><th className="px-4 py-3">Contact</th><th className="px-4 py-3">Market</th><th className="px-4 py-3">Seller</th><th className="px-4 py-3 text-center">Pin</th><th className="px-4 py-3 text-center">Actions</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-700">
                                    {filtered.map(c => (
                                        <tr key={c.id} className="hover:bg-slate-700/50 transition-all group">
                                            <td className="px-4 py-4"><div className="flex items-center gap-3"><Avatar name={c.shopName || c.name} url={c.photo} /><div><p className="text-sm font-bold text-slate-200 uppercase truncate max-w-[180px]">{c.shopName || c.name}</p><p className="text-[10px] text-slate-400 font-bold uppercase truncate max-w-[180px]">{c.ownerName || c.contactPerson || '---'}</p></div></div></td>
                                            <td className="px-4 py-4 text-sm font-mono tracking-tighter"><a href={`tel:${(c.contact || c.phone || '').replace(/\D/g,'')}`} className="text-slate-300 hover:text-blue-400 underline decoration-slate-600 hover:decoration-blue-400 underline-offset-4 transition-colors">{c.contact || c.phone || 'N/A'}</a></td>
                                            <td className="px-4 py-4"><span className="text-[10px] font-black uppercase px-2 py-0.5 rounded-lg border border-blue-500/20 text-blue-400 bg-blue-500/5">{c.marketType || c.type || 'Retail'}</span></td>
                                            <td className="px-4 py-4 text-xs font-bold text-slate-300 uppercase">{c.assignedSellerName || c.sellerName || '---'}</td>
                                            <td className="px-4 py-4 text-center">{(c.lat || c.gpsLat) ? <a href={`https://www.google.com/maps?q=${c.lat || c.gpsLat},${c.lng || c.gpsLong}`} target="_blank" className="text-green-400 hover:scale-110 transition-transform"><i className="fas fa-location-dot"></i></a> : <i className="fas fa-location-dot opacity-10"></i>}</td>
                                            <td className="px-4 py-4 text-center">
                                                <div className="flex justify-center gap-4">
                                                    <button onClick={() => { setIsEditing(true); setSelectedCustomerId(c.id); setFormData({...c}); setIsCustModalOpen(true); }} className="text-blue-400 hover:scale-110 transition-transform">
                                                        <i className="fas fa-edit"></i>
                                                    </button>
                                                    <button onClick={() => { setIdToDelete(c.id); setIsDeleteModalOpen(true); }} className="text-red-500 hover:scale-110 transition-transform">
                                                        <i className="fas fa-trash-alt"></i>
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* CUSTOMER FORM MODAL - PREMIUM REDESIGN */}
                    <Modal 
                        isOpen={isCustModalOpen} 
                        onClose={() => setIsCustModalOpen(false)} 
                        title={isEditing ? "Update Shop Data" : "New Client Onboarding"} 
                        size="max-w-4xl"
                        footer={
                            <div className="flex gap-3">
                                <Button variant="secondary" onClick={() => setIsCustModalOpen(false)}>Cancel</Button>

            const { data: drivers } = useCollection('drivers');

            const [isOrderModalOpen, setIsOrderModalOpen] = useState(false);
            const [isViewModalOpen, setIsViewModalOpen] = useState(false);
            const [isEditingReceipt, setIsEditingReceipt] = useState(false);
            const [viewOrderData, setViewOrderData] = useState(null);
            const [originalOrderData, setOriginalOrderData] = useState(null);

            const [isUpdatingStatus, setIsUpdatingStatus] = useState(false);
            const [isDeleteModalOpen, setIsDeleteModalOpen] = useState(false);
            const [idToDelete, setIdToDelete] = useState(null);
            const [custSearch, setCustSearch] = useState('');
            const [prodSearch, setProdSearch] = useState('');

            const [selectedCust, setSelectedCust] = useState(null);
            const [selectedDriverId, setSelectedDriverId] = useState('');
            const [cart, setCart] = useState([]);
            const [orderType, setOrderType] = useState('PR');
            const [paymentMethod, setPaymentMethod] = useState('Cash');
            const [discountType, setDiscountType] = useState('Cash'); 
            const [discountVal, setDiscountVal] = useState(0);

            const calculateTotals = (items = [], dType = 'Cash', dVal = 0) => {
                const sub = items.reduce((a, c) => a + (c.price * c.qty), 0);
                const dAmount = dType === 'Percentage' ? (sub * (parseFloat(dVal) || 0)) / 100 : (parseFloat(dVal) || 0);
                return { subTotal: sub, discountAmount: dAmount, grandTotal: sub - dAmount };
            };

            const activeSubTotal = useMemo(() => cart.reduce((a, c) => a + (c.price * c.qty), 0), [cart]);
            const activeDiscountAmount = useMemo(() => discountType === 'Percentage' ? (activeSubTotal * discountVal) / 100 : (parseFloat(discountVal) || 0), [activeSubTotal, discountType, discountVal]);
            const activeGrandTotal = activeSubTotal - activeDiscountAmount;

            const addToCart = (p) => {
                const list = isEditingReceipt ? viewOrderData.items : cart;
                const existing = list.find(item => item.id === p.id);
                let newList;
                if (existing) newList = list.map(item => item.id === p.id ? { ...item, qty: item.qty + 1 } : item);
                else newList = [...list, { ...p, qty: 1 }];
                if (isEditingReceipt) setViewOrderData({...viewOrderData, items: newList});
                else setCart(newList);
                setProdSearch('');
            };

            const updateItemQty = (id, delta) => {
                const list = isEditingReceipt ? viewOrderData.items : cart;
                const newList = list.map(i => i.id === id ? { ...i, qty: Math.max(1, i.qty + delta) } : i);
                if (isEditingReceipt) setViewOrderData({...viewOrderData, items: newList});
                else setCart(newList);
            };

            const removeItem = (id) => {
                const list = isEditingReceipt ? viewOrderData.items : cart;
                const newList = list.filter(i => i.id !== id);
                if (isEditingReceipt) setViewOrderData({...viewOrderData, items: newList});
                else setCart(newList);
            };

                if (!selectedCust || cart.length === 0) return;
                setSaving(true);
                try {
                    const { collection, addDoc, serverTimestamp } = window.firebaseSDK;
                    const driverNode = drivers.find(d => d.id === selectedDriverId);
                    const orderPayload = {
                        invoiceNo: generateInvoiceNo(),
                        customer: { id: selectedCust.id, name: selectedCust.shopName || selectedCust.name, contact: selectedCust.contact || selectedCust.phone },
                        seller: { id: userProfile.id, sellerId: userProfile.sellerId || 'GEN-01', name: userProfile.name || userProfile.sellerName },
                        driver: driverNode ? { id: driverNode.id, name: driverNode.name, driverId: driverNode.driverId } : null,
                        items: cart, orderType, paymentMethod, discountType, discountVal: parseFloat(discountVal),
                        subTotal: activeSubTotal, discountAmount: activeDiscountAmount, grandTotal: activeGrandTotal, deliveryStatus: 'Pending',
                        status: paymentMethod === 'Cash' ? 'Paid' : 'Pending Verification',
                        createdAt: serverTimestamp()
                    };
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), orderPayload);
                    setIsOrderModalOpen(false); setCart([]); setSelectedCust(null); setDiscountVal(0); setSelectedDriverId('');
                } catch (e) { console.error("Order failure:", e); }
                setSaving(false);

                setSaving(true);
                try {
                    const { doc, updateDoc } = window.firebaseSDK;
                    const totals = calculateTotals(viewOrderData.items, viewOrderData.discountType, viewOrderData.discountVal);

                setIsUpdatingStatus(true);

            const [classFormData, setClassFormData] = useState({ name: '', description: '' });
            const [classLoading, setClassLoading] = useState(false);
            
            const [isClassDeleteModalOpen, setIsClassDeleteModalOpen] = useState(false);

            const handleUserFileChange = (e) => {
                const file = e.target.files[0];
                if (file) { const reader = new FileReader(); reader.onload = () => { setTempPhoto(reader.result); if (userCropperRef.current) userCropperRef.current.destroy(); }; reader.readAsDataURL(file); }
            };

            useEffect(() => { if (tempPhoto && userImageRef.current) { userCropperRef.current = new Cropper(userImageRef.current, { aspectRatio: 1, viewMode: 1, background: false, autoCropArea: 1, responsive: true }); } return () => userCropperRef.current?.destroy(); }, [tempPhoto]);
            const applyUserCrop = () => { if (userCropperRef.current) { const canvas = userCropperRef.current.getCroppedCanvas({ width: 256, height: 256 }); setUserFormData({ ...userFormData, photo: canvas.toDataURL('image/jpeg', 0.8) }); setTempPhoto(null); } };

            const handleSaveUser = async () => {
                if (!userFormData.name || (!isUserEditing && !userFormData.password)) return;
                setLoadingAction(true);
                try {
                    const { doc, setDoc, updateDoc, serverTimestamp, initializeApp, getAuth, createUserWithEmailAndPassword, deleteApp } = window.firebaseSDK;
                    const payload = { name: userFormData.name, sellerName: userFormData.name, sellerId: userFormData.sellerId, contactNumber: userFormData.contactNumber, role: userFormData.role, permissions: userFormData.permissions, photo: userFormData.photo || '', updatedAt: serverTimestamp() };
                    if (isUserEditing) await updateDoc(doc(db, 'artifacts', appId, 'users', selectedUserId), payload);
                    else {
                        const secApp = initializeApp(firebaseConfig, "sec-" + Date.now());
                        const userCred = await createUserWithEmailAndPassword(getAuth(secApp), userFormData.email, userFormData.password);
                        await setDoc(doc(db, 'artifacts', appId, 'users', userCred.user.uid), { ...payload, email: userFormData.email, createdAt: serverTimestamp() });
                        await getAuth(secApp).signOut(); await deleteApp(secApp);

                    setIsUserModalOpen(false);

                setLoadingAction(false);

                    </div>
                    {tab === 'users' && (
                        <div className="space-y-4"><div className="flex justify-between items-center"><p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest italic">Authorized Security Nodes</p><Button icon="fa-user-plus" onClick={() => {setIsUserEditing(false); setUserFormData({name:'',sellerId:'',contactNumber:'',email:'',password:'',role:'Sales Agent',permissions:['dashboard'], photo:''}); setTempPhoto(null); setIsUserModalOpen(true);}}>Smart User</Button></div><div className="bg-slate-800/50 rounded-[2rem] border border-slate-700 overflow-hidden shadow-xl"><table className="w-full text-left border-collapse"><thead><tr className="bg-slate-900/50 text-xs text-slate-400 font-semibold uppercase tracking-wider border-b border-slate-700"><th className="px-4 py-3">Identity</th><th className="px-4 py-3">Role</th><th className="px-4 py-3 text-center">Actions</th></tr></thead><tbody className="divide-y divide-slate-700">{users.map(u => (<tr key={u.id} className="hover:bg-slate-700/50 transition-all group group group group group group group group group group group group group group group group group group group group group group group group"><td className="px-4 py-4"><div className="flex items-center gap-3"><Avatar name={u.name || u.sellerName} url={u.photo} /><p className="text-sm font-bold text-slate-200 uppercase">{u.name || u.sellerName || '---'}</p></div></td><td className="px-4 py-4"><span className="text-[10px] font-black uppercase px-2 py-0.5 rounded-lg border border-blue-500/20 text-blue-400 bg-blue-500/5">{u.role}</span></td><td className="px-4 py-4 text-center">
                            <div className="flex justify-center gap-4">
                                <button onClick={() => openEditUser(u)} className="text-blue-400 hover:scale-110 transition-transform"><i className="fas fa-edit"></i></button>
                                <button onClick={() => { setUserIdToDelete(u.id); setIsUserDeleteModalOpen(true); }} className="text-red-500 hover:scale-110 transition-transform"><i className="fas fa-trash-alt"></i></button>
                            </div>
                        </td></tr>))}</tbody></table></div></div>
                    )}
                    
                    {tab === 'drivers' && (
                        <div className="space-y-4">
                            <div className="flex justify-between items-center"><p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest italic">Logistics Distribution Node</p><Button icon="fa-truck-moving" onClick={() => { setIsDriverEditing(false); setDriverFormData({name:'', contact:'', driverId: generateDriverId(), address:'', note:''}); setIsDriverModalOpen(true); }}>Add Driver</Button></div>
                            <div className="bg-slate-800/50 rounded-[2rem] border border-slate-700 overflow-hidden shadow-xl">
                                <table className="w-full text-left border-collapse">
                                    <thead><tr className="bg-slate-900/50 text-[10px] text-slate-400 font-black uppercase tracking-widest border-b border-slate-700"><th className="px-4 py-3">ID</th><th className="px-4 py-3">Driver Name</th><th className="px-4 py-3">Contact</th><th className="px-4 py-3">Address</th><th className="px-4 py-3 text-center">Actions</th></tr></thead>
                                    <tbody className="divide-y divide-slate-700">{drivers.map(d => (<tr key={d.id} className="hover:bg-slate-700/50 transition-all group group group group group group group group group group group group"><td className="px-4 py-4 font-mono text-blue-400 text-xs">{d.driverId}</td><td className="px-4 py-4 font-bold text-slate-200 uppercase">{d.name}</td><td className="px-4 py-4 font-mono text-xs"><a href={`tel:${d.contact.replace(/\D/g,'')}`} className="hover:text-blue-400 underline decoration-slate-700">{d.contact}</a></td><td className="px-4 py-4 text-xs text-slate-400 truncate max-w-[150px]">{d.address}</td><td className="px-4 py-4 text-center"><div className="flex justify-center gap-3"><button onClick={() => { setIsDriverEditing(true); setSelectedDriverId(d.id); setDriverFormData(d); setIsDriverModalOpen(true); }} className="text-blue-400 hover:scale-110 transition-transform"><i className="fas fa-edit"></i></button><button onClick={async () => { if(confirm("Terminate driver node?")) await window.firebaseSDK.deleteDoc(window.firebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'drivers', d.id)); }} className="text-red-500 hover:scale-110 transition-transform"><i className="fas fa-trash-alt"></i></button></div></td></tr>))}</tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {tab === 'general' && (
                        <div className="space-y-8">
                            <div className="flex justify-between items-center"><p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest italic">Classification Node</p><Button icon="fa-layer-group" onClick={() => { setClassType('category'); setIsClassEditing(false); setClassFormData({name:'', description:''}); setIsClassModalOpen(true); }}>Add Classification</Button></div>
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-8">
                                <div className="space-y-4"><h4 className="text-xs font-black uppercase text-slate-500 tracking-widest flex items-center gap-2"><i className="fas fa-tags text-blue-400"></i> Categories</h4><div className="bg-slate-800/50 rounded-[2rem] border border-slate-700 overflow-hidden shadow-xl"><table className="w-full text-left border-collapse"><thead><tr className="bg-slate-900/50 text-[10px] text-slate-400 font-black uppercase tracking-widest border-b border-slate-700"><th className="px-4 py-3">Name</th><th className="px-4 py-3 text-center">Actions</th></tr></thead><tbody className="divide-y divide-slate-700">{categories.map(cat => (<tr key={cat.id} className="hover:bg-slate-700/50 transition-all group group group group group group group group group group group group group group group group group group group group"><td className="px-4 py-4 text-sm font-bold text-slate-200 uppercase">{cat.name}</td><td className="px-4 py-4 text-center"><div className="flex justify-center gap-4"><button onClick={() => { setClassType('category'); setIsClassEditing(true); setSelectedClassId(cat.id); setClassFormData({name: cat.name, description: cat.description}); setIsClassModalOpen(true); }} className="text-blue-400 hover:scale-110 transition-transform"><i className="fas fa-edit"></i></button><button onClick={() => { setClassToDelete({id: cat.id, collectionName: 'productCategories'}); setIsClassDeleteModalOpen(true); }} className="text-red-500/50 hover:text-red-500 transition-colors"><i className="fas fa-trash-alt"></i></button></div></td></tr>))}</tbody></table></div></div>
                                <div className="space-y-4"><h4 className="text-xs font-black uppercase text-slate-500 tracking-widest flex items-center gap-2"><i className="fas fa-cubes text-emerald-400"></i> Units</h4><div className="bg-slate-800/50 rounded-[2rem] border border-slate-700 overflow-hidden shadow-xl"><table className="w-full text-left border-collapse"><thead><tr className="bg-slate-900/50 text-[10px] text-slate-400 font-black uppercase tracking-widest border-b border-slate-700"><th className="px-4 py-3">Name</th><th className="px-4 py-3 text-center">Actions</th></tr></thead><tbody className="divide-y divide-slate-700">{units.map(u => (<tr key={u.id} className="hover:bg-slate-700/50 transition-all group group group group group group group group group group group group group group group"><td className="px-4 py-4 text-sm font-bold text-slate-200 uppercase">{u.name}</td><td className="px-4 py-4 text-center"><div className="flex justify-center gap-4"><button onClick={() => { setClassType('unit'); setIsClassEditing(true); setSelectedClassId(u.id); setClassFormData({name: u.name, description: u.description}); setIsClassModalOpen(true); }} className="text-blue-400 hover:scale-110 transition-transform"><i className="fas fa-edit"></i></button><button onClick={() => { setClassToDelete({id: u.id, collectionName: 'productUnits'}); setIsClassDeleteModalOpen(true); }} className="text-red-500/50 hover:text-red-500 transition-colors"><i className="fas fa-trash-alt"></i></button></div></td></tr>))}</tbody></table></div></div>
                            </div>
                        </div>
                    )}

                    <Modal isOpen={isUserModalOpen} onClose={() => setIsUserModalOpen(false)} title={isUserEditing ? "Update Profile" : "Deployment"} footer={<div className="flex gap-3"><Button variant="secondary" onClick={() => setIsUserModalOpen(false)}>Cancel</Button><Button onClick={handleSaveUser} disabled={loadingAction}>Execute</Button></div>}><div className="space-y-6"><div className="flex flex-col items-center gap-4">{tempPhoto ? (<div className="w-full space-y-4"><div className="max-h-[300px] bg-black rounded-2xl overflow-hidden shadow-inner"><img ref={userImageRef} src={tempPhoto} className="max-w-full" /></div><div className="flex justify-center gap-4"><button onClick={() => userCropperRef.current?.zoom(0.1)} className="w-10 h-10 rounded-full bg-slate-800 text-white"><i className="fas fa-plus"></i></button><button onClick = {() => userCropperRef.current?.zoom(-0.1)} className="w-10 h-10 rounded-full bg-slate-800 text-white"><i className="fas fa-minus"></i></button><Button onClick={applyUserCrop} icon="fa-check">Lock</Button><button onClick={() => setTempPhoto(null)} className="text-[10px] font-black uppercase text-slate-500">Cancel</button></div></div>) : (<div className="relative group cursor-pointer" onClick={() => document.getElementById('user-photo-upload').click()}><div className="w-24 h-24 rounded-full bg-slate-800 border-2 border-dashed border-slate-700 flex items-center justify-center text-slate-500 overflow-hidden shadow-xl">{userFormData.photo ? <img src={userFormData.photo} className="w-full h-full object-cover" /> : <i className="fas fa-user-plus text-2xl"></i>}</div><input id="user-photo-upload" type="file" accept="image/*" className="hidden" onChange={handleUserFileChange} /></div>)}</div><div className="grid grid-cols-2 gap-4 pt-4 border-t border-slate-800"><input className="input" placeholder="Full Name" value={userFormData.name} onChange={e=>setUserFormData({...userFormData, name: e.target.value})} /><input className="input" placeholder="Seller ID" value={userFormData.sellerId} onChange={e=>setUserFormData({...userFormData, sellerId: e.target.value})} /></div><div className="grid grid-cols-2 gap-4"><input className="input font-mono" placeholder="Contact" value={userFormData.contactNumber} onChange={e=>setUserFormData({...userFormData, contactNumber: e.target.value})} /><select className="select" value={userFormData.role} onChange={e=>setUserFormData({...userFormData, role: e.target.value})}><option>Sales Agent</option><option>Regional Manager</option><option>Admin</option></select></div>{!isUserEditing && (<div className="grid grid-cols-2 gap-4"><input className="input" placeholder="Email" value={userFormData.email} onChange={e=>setUserFormData({...userFormData, email: e.target.value})} /><input type="password" className="input" placeholder="Password" value={userFormData.password} onChange={e=>setUserFormData({...userFormData, password: e.target.value})} /></div>)}<div className="bg-slate-900 p-4 rounded-2xl border border-slate-700"><label className="text-[10px] font-black uppercase text-slate-500 block mb-3">Permissions</label><div className="grid grid-cols-2 gap-2">{['dashboard', 'customers', 'visits', 'products', 'orders'].map(p => (<button key={p} onClick={() => setUserFormData(prev => ({...prev, permissions: prev.permissions.includes(p) ? prev.permissions.filter(x=>x!==p) : [...prev.permissions, p]}))} className={`px-4 py-2 rounded-xl text-[9px] font-bold uppercase transition-all flex items-center gap-2 ${userFormData.permissions.includes(p) ? 'bg-blue-600/20 text-blue-400 border border-blue-500/30' : 'bg-slate-850 text-slate-500'}`}><i className={`fas ${userFormData.permissions.includes(p) ? 'fa-check-circle' : 'fa-circle'}`}></i> {p}</button>))}</div></div></div></Modal>
                    <Modal isOpen={isUserDeleteModalOpen} onClose={() => setIsUserDeleteModalOpen(false)} title="Identity Revocation" footer={<div className="flex gap-3"><Button variant="secondary" onClick={() => setIsUserDeleteModalOpen(false)}>Abort</Button><Button variant="danger" icon="fa-trash-alt" onClick={handleDeleteUser}>Terminate Account</Button></div>}>
                        <div className="text-center py-6">
                            <div className="w-16 h-16 bg-red-600/10 rounded-full flex items-center justify-center mx-auto mb-4 text-red-500"><i className="fas fa-user-slash text-2xl"></i></div>
                            <h4 className="text-white font-black uppercase tracking-widest mb-1">Access De-authorization</h4>
                            <p className="text-slate-500 text-sm">Permanently terminate this user's access node?</p>
                        </div>
                    </Modal>
                    <Modal isOpen={isDriverModalOpen} onClose={() => setIsDriverModalOpen(false)} title={isDriverEditing ? "Update Logistics Member" : "Add Logistics Member"} footer={<div className="flex gap-3"><Button variant="secondary" onClick={() => setIsDriverModalOpen(false)}>Cancel</Button><Button onClick={handleSaveDriver} disabled={loadingAction}>Save Driver</Button></div>}><div className="space-y-4"><div className="grid grid-cols-2 gap-4"><div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-500 ml-1">Driver Name</label><input className="input !mt-0" value={driverFormData.name} onChange={e=>setDriverFormData({...driverFormData, name: e.target.value})} /></div><div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-500 ml-1">Driver ID (Locked)</label><input className="input !mt-0 font-mono text-blue-400" value={driverFormData.driverId} readOnly /></div></div><div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-500 ml-1">Contact Number</label><input className="input !mt-0 font-mono" value={driverFormData.contact} onChange={e=>setDriverFormData({...driverFormData, contact: e.target.value})} /></div><div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-500 ml-1">Physical Address</label><input className="input !mt-0" value={driverFormData.address} onChange={e=>setDriverFormData({...driverFormData, address: e.target.value})} /></div><div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-500 ml-1">Note / Remark (ចំណាំ)</label><input className="input !mt-0" value={driverFormData.note} onChange={e=>setDriverFormData({...driverFormData, note: e.target.value})} /></div></div></Modal>
                    <Modal isOpen={isClassModalOpen} onClose={() => setIsClassModalOpen(false)} title={isClassEditing ? "Update Classification" : "New Node"} footer={<div className="flex gap-3"><Button variant="secondary" onClick={() => setIsClassModalOpen(false)}>Cancel</Button><Button onClick={handleSaveClassification} disabled={classLoading}>Confirm</Button></div>}><div className="space-y-6"><div className="bg-slate-950/50 p-4 rounded-2xl border border-white/5"><label className="text-[9px] font-black uppercase text-slate-500 block mb-3">Node Type</label><div className="grid grid-cols-2 gap-2"><button onClick={() => setClassType('category')} className={`px-4 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all flex items-center justify-center gap-2 ${classType === 'category' ? 'bg-blue-600 text-white shadow-lg shadow-blue-500/20' : 'bg-slate-850 text-slate-500'}`}><i className="fas fa-tag"></i> Category</button><button onClick={() => setClassType('unit')} className={`px-4 py-2.5 rounded-xl text-[10px] font-black uppercase transition-all flex items-center justify-center gap-2 ${classType === 'unit' ? 'bg-emerald-600 text-white shadow-lg shadow-emerald-500/20' : 'bg-slate-850 text-slate-500'}`}><i className="fas fa-cube"></i> Unit</button></div></div><div className="space-y-4"><input className="input" placeholder="Name" value={classFormData.name} onChange={e=>setClassFormData({...classFormData, name: e.target.value})} /><textarea className="input h-32" placeholder="Description" value={classFormData.description} onChange={e=>setClassFormData({...classFormData, description: e.target.value})} /></div></div></Modal>
                    <Modal isOpen={isClassDeleteModalOpen} onClose={() => setIsClassDeleteModalOpen(false)} title="Security Guard" footer={<div className="flex gap-3"><Button variant="secondary" onClick={() => setIsDeleteModalOpen(false)}>Abort</Button><Button variant="danger" icon="fa-trash-alt" onClick={async () => { await window.firebaseSDK.deleteDoc(window.firebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', classToDelete.collectionName, classToDelete.id)); setIsClassDeleteModalOpen(false); }}>Terminate</Button></div>}><div className="text-center py-6"><div className="w-16 h-16 bg-red-600/10 rounded-full flex items-center justify-center mx-auto mb-4 text-red-500"><i className="fas fa-exclamation-triangle text-2xl"></i></div><h4 className="text-white font-black uppercase tracking-widest mb-1">Permanent Erasure</h4><p className="text-slate-500 text-sm">Terminate this classification?</p></div></Modal>
                </div>
            );
        };

        const AppIcon = ({ id, icon, label, color, onClick }) => (
            <button onClick={onClick} className="flex flex-col items-center gap-3 group transition-all active:scale-90">
                <div className={`w-16 h-16 md:w-20 md:h-20 squircle bg-slate-900 border border-white/10 flex items-center justify-center text-2xl md:text-3xl shadow-xl group-hover:bg-slate-800 transition-all`}>
                    <i className={`fas fa-${icon} bg-gradient-to-br ${color} bg-clip-text text-transparent`}></i>
                </div>
                <span className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 group-hover:text-white transition-colors text-center">{label}</span>
            </button>
        );

        const AppContent = () => {
            const { userProfile, loading, auth } = useFirebase();
            const [page, setPage] = useState('dashboard');
            const [launchpad, setLaunchpad] = useState(true);
            useEffect(() => { if (!loading) { const s = document.getElementById('splash-screen'); if (s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 500); } } }, [loading]);
            if (loading) return null;
            if (!userProfile && !loading) return <LoginPage />;
            return (
                <div className="h-screen flex flex-col bg-slate-900 safe-pb overflow-hidden">
                    <header className="px-6 py-5 flex flex-none justify-between items-center bg-slate-900 border-b border-slate-800 backdrop-blur-xl z-50 shadow-2xl safe-pt">
                        <div className="flex items-center gap-4"><button onClick={() => setLaunchpad(true)} className="w-10 h-10 rounded-xl bg-slate-800 text-blue-400 flex items-center justify-center border border-slate-700 active:scale-90 shadow-lg transition-all"><i className="fas fa-th-large"></i></button><div className="flex flex-col"><span className="font-khmer-header text-lg logo-gradient-text leading-none uppercase">Ounna</span><span className="text-[9px] font-black tracking-[0.4em] text-slate-500 uppercase -mt-0.5">Outdoor Sale</span></div></div>
                        <div className="flex items-center gap-4"><div className="flex flex-col items-end"><span className="text-sm font-black text-slate-100 uppercase tracking-tighter leading-none truncate max-w-[120px]">{userProfile.name || userProfile.sellerName}</span><span className="text-[10px] font-bold text-blue-500 uppercase tracking-widest">{userProfile.role}</span></div><Avatar name={userProfile.name} url={userProfile.photo} size="10" /></div>
                    </header>
                    <main className="flex-1 p-6 overflow-y-auto custom-scrollbar"><div className="max-w-7xl mx-auto">{page === 'dashboard' && <DashboardPage />}{page === 'customers' && <CustomersPage />}{page === 'products' && <ProductsPage />}{page === 'orders' && <OrdersPage />}{page === 'settings' && <SettingsPage />}</div></main>
                    {launchpad && (
                        <div className="fixed inset-0 z-[100] bg-[#0f172a]/98 backdrop-blur-3xl flex flex-col animate-fade-in safe-pt safe-pb overflow-y-auto">
                            <header className="p-8 flex justify-between items-start"><div className="flex flex-col"><span className="font-khmer-header text-3xl logo-gradient-text uppercase leading-none">Ounna</span><span className="text-xs font-black tracking-[0.5em] text-slate-600 uppercase mt-1">Global Dashboard</span></div><Clock /></header>
                            <div className="flex-1 flex flex-col items-center justify-center py-20 px-8"><div className="grid grid-cols-3 gap-8 md:gap-16 w-full max-w-2xl justify-items-center">
                                    {[ { id: 'dashboard', icon: 'chart-pie', label: 'Monitor', color: 'from-blue-600 to-blue-400' }, { id: 'customers', icon: 'store', label: 'Customers', color: 'from-emerald-600 to-emerald-400' }, { id: 'orders', icon: 'receipt', label: 'Orders', color: 'from-purple-600 to-purple-400' }, { id: 'products', icon: 'box-open', label: 'Inventory', color: 'from-cyan-600 to-cyan-400' }, { id: 'sync', icon: 'location-dot', label: 'GPS Sync', color: 'from-amber-600 to-amber-400' }, { id: 'settings', icon: 'gear', label: 'Security', color: 'from-slate-600 to-slate-400' } ].map(app => (<AppIcon key={app.id} {...app} onClick={() => { setPage(app.id); setLaunchpad(false); }} />))}
                            </div></div><footer className="p-10 flex flex-col items-center gap-6"><button onClick={() => window.firebaseSDK.signOut(auth)} className="px-10 py-3.5 rounded-full bg-red-950/30 text-red-500 font-black text-[10px] uppercase tracking-[0.3em] active:scale-95 transition-all shadow-xl border border-red-500/20">Terminate Node Session</button></footer>
                        </div>
                    )}
                </div>
            );
        };

        const LoginPage = () => {
            const { auth } = useFirebase();
            const [email, setEmail] = useState(''); const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const handleLogin = async (e) => { e.preventDefault(); setLoading(true); try { await window.firebaseSDK.signInWithEmailAndPassword(auth, email, password); } catch (err) { alert("Access Denied."); setLoading(false); } };
            return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-900 relative overflow-hidden"><div className="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-600/10 blur-[120px] rounded-full pointer-events-none"></div><div className="w-full max-w-sm glass-panel p-10 rounded-[3.5rem] shadow-2xl relative z-10 animate-fade-in border border-slate-700 text-center"><div className="font-khmer-header text-4xl logo-gradient-text uppercase mb-2">Ounna</div><p className="text-[10px] font-black text-slate-500 tracking-[0.5em] uppercase mb-10">Gateway Verification</p><form onSubmit={handleLogin} className="space-y-6 text-left"><div><label className="text-[10px] font-black uppercase text-slate-600 tracking-widest ml-1 mb-2 block">System Identity</label><input type="email" placeholder="admin@onsale.com" className="input !bg-slate-950/50 !border-slate-700" value={email} onChange={e=>setEmail(e.target.value)} required /></div><div><label className="text-[10px] font-black uppercase text-slate-600 tracking-widest ml-1 mb-2 block">Security Token</label><input type="password" placeholder="••••••••" className="input !bg-slate-950/50 !border-slate-700" value={password} onChange={e=>setPassword(e.target.value)} required /></div><Button type="submit" className="w-full py-5 shadow-blue-600/20" disabled={loading}>{loading ? <i className="fas fa-spinner fa-spin"></i> : 'Authorize Access'}</Button></form></div></div>
            );
        };

        const App = () => (<FirebaseProvider><AppContent /></FirebaseProvider>);
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
