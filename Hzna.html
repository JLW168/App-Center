        import { initializeApp, deleteApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";

    <script type="text/babel">
        const { useState, useEffect, useMemo, createContext, useContext, memo, useRef } = React;

        const Recharts = window.Recharts || {};
        const ResponsiveContainer = Recharts.ResponsiveContainer || (({children}) => <div className="flex h-full items-center justify-center text-slate-400 text-xs font-bold text-center">Chart library loading...</div>);

        const Cell = Recharts.Cell || 'div';
        const Legend = Recharts.Legend || 'div';

        const firebaseConfig = {
            apiKey: "AIzaSyAYb0HKLnEUuhrVcQlXACsxFk28w99qAkc",
            authDomain: "onsale-product.firebaseapp.com",
            projectId: "onsale-product",
            storageBucket: "onsale-product.firebasestorage.app",
            messagingSenderId: "837098663012",
            appId: "1:837098663012:web:cb61b9bd7f99ec4d6e8371"
        };
        const appId = 'onsale-crm-app';
        const APP_VERSION = "1.0.1"; // CHANGE THIS NUMBER whenever you want to force an update prompt for users

        // --- Theme Hook ---
        const useTheme = () => {
            const [theme, setTheme] = useState(() => {
                try { return localStorage.getItem('theme') || 'dark'; } 
                catch (e) { return 'dark'; }
            });
            useEffect(() => {
                const root = window.document.documentElement;
                root.classList.remove('light', 'dark');
                root.classList.add(theme);
                try { localStorage.setItem('theme', theme); } catch (e) {}
            }, [theme]);
            const toggleTheme = () => setTheme(prev => prev === 'dark' ? 'light' : 'dark');
            return { theme, toggleTheme };
        };

        // --- NEW: Smart PWA Update Notifier ---
        const UpdateNotifier = () => {
            const [updateAvailable, setUpdateAvailable] = useState(false);

            useEffect(() => {
                const checkForUpdates = async () => {
                    if (updateAvailable) return;
                    
                    // PREVENT ERROR IN PREVIEW ENVIRONMENTS: Do not fetch if running on a blob or data URL
                    if (window.location.protocol === 'blob:' || window.location.protocol === 'data:' || window.location.protocol === 'about:') {
                        return;
                    }

                    try {
                        const url = new URL(window.location.href);
                        url.searchParams.set('vcheck', Date.now()); // Bypass browser cache completely
                        const res = await fetch(url.toString(), { cache: 'no-store', headers: { 'Pragma': 'no-cache', 'Cache-Control': 'no-cache' } });
                        const html = await res.text();
                        
                        // Look for the APP_VERSION string in the live code
                        const match = html.match(/const\s+APP_VERSION\s*=\s*['"]([^'"]+)['"]/);
                        if (match && match[1] !== APP_VERSION) {
                            setUpdateAvailable(true);
                        }
                    } catch (e) {
                        // Silently fail instead of logging an error if the user is offline
                    }
                };

                // Check for updates on mount and every 2 minutes
                checkForUpdates();
                const interval = setInterval(checkForUpdates, 2 * 60 * 1000);
                return () => clearInterval(interval);
            }, [updateAvailable]);

            if (!updateAvailable) return null;

            return (
                <div className="fixed bottom-0 left-0 right-0 p-4 z-[99999] animate-slide-up pointer-events-none pb-safe">
                    <div className="max-w-md mx-auto bg-gradient-to-r from-brand-600 to-brand-500 rounded-2xl p-4 shadow-[0_10px_40px_rgba(59,130,246,0.4)] border border-brand-400/50 flex items-center justify-between pointer-events-auto">
                        <div className="flex items-center gap-3">
                            <div className="w-10 h-10 rounded-full bg-white/20 flex items-center justify-center text-white flex-shrink-0 animate-pulse shadow-inner">
                                <i className="fas fa-cloud-download-alt"></i>
                            </div>
                            <div>
                                <h4 className="text-white font-bold text-sm leading-tight">New Update Available!</h4>
                                <p className="text-white/80 text-[10px] font-medium mt-0.5">Get the latest features & fixes.</p>
                            </div>
                        </div>
                        <button 
                            onClick={() => {
                                // Wipe the browser cache and force a hard reload
                                if ('caches' in window) {
                                    caches.keys().then(names => Promise.all(names.map(name => caches.delete(name))))
                                    .finally(() => { window.location.reload(true); });
                                } else {
                                    window.location.reload(true);
                                }
                            }}
                            className="bg-white text-brand-600 px-4 py-2.5 rounded-xl text-xs font-black tracking-widest shadow-lg active:scale-95 transition-transform uppercase"
                        >
                            Update
                        </button>
                    </div>
                </div>
            );
        };

        // --- Contexts ---
        const FirebaseContext = createContext(null);
        const FirebaseProvider = ({ children }) => {
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const { initializeApp, initializeFirestore, persistentLocalCache, getAuth, onAuthStateChanged } = window.firebaseSDK;
                const app = initializeApp(firebaseConfig);
                
                // Enable Smart Browser Caching & Offline Persistence
                const dbInst = initializeFirestore(app, {
                    localCache: persistentLocalCache()
                });
                
                const authInst = getAuth(app);
                setDb(dbInst); setAuth(authInst);
                return onAuthStateChanged(authInst, (u) => { setUser(u); setLoading(false); });
            }, []);

            return <FirebaseContext.Provider value={{ db, auth, user, loading }}>{children}</FirebaseContext.Provider>;
        };

        // --- NEW: Global Toast Notification Context ---
        const ToastContext = createContext(null);
        const ToastProvider = ({ children }) => {
            const [toasts, setToasts] = useState([]);
            
            const addToast = (message, type = 'success') => {
                const id = Date.now();
                setToasts(prev => [...prev, { id, message, type }]);
                setTimeout(() => {
                    setToasts(prev => prev.filter(t => t.id !== id));
                }, 3000);
            };

            return (
                <ToastContext.Provider value={{ addToast }}>
                    {children}
                    <div className="fixed top-safe mt-4 left-4 right-4 md:left-auto md:right-8 z-[9999] flex flex-col items-center md:items-end gap-3 pointer-events-none">
                        {toasts.map(t => (
                            <div key={t.id} className={`pointer-events-auto animate-toast flex items-center gap-3 px-5 py-3.5 rounded-2xl shadow-2xl backdrop-blur-xl border ${t.type === 'success' ? 'bg-emerald-500/95 border-emerald-400/50 text-white shadow-emerald-500/20' : t.type === 'error' ? 'bg-red-500/95 border-red-400/50 text-white shadow-red-500/20' : 'bg-slate-800/95 border-slate-700/50 text-white shadow-black/20'}`}>
                                <i className={`fas ${t.type === 'success' ? 'fa-check-circle' : t.type === 'error' ? 'fa-exclamation-circle' : 'fa-info-circle'} text-lg`}></i>
                                <span className="text-sm font-bold tracking-wide">{t.message}</span>
                            </div>
                        ))}
                    </div>
                </ToastContext.Provider>
            );
        };

        // --- UPDATED: Cache-First Data Fetching Strategy ---
        const useCollection = (name) => {
            const { db, user } = useContext(FirebaseContext);
            const [data, setData] = useState([]);
            useEffect(() => {
                if (!db || !user) return;
                const { collection, onSnapshot } = window.firebaseSDK;
                const collectionName = name === 'sales' ? 'orders' : name;
                const ref = name === 'users' ? collection(db, 'artifacts', appId, 'users') : collection(db, 'artifacts', appId, 'public', 'data', collectionName);
                
                // includeMetadataChanges allows the app to render instantly from browser cache, 
                // then silently updates the data state in the background when fresh data arrives from the server.
                return onSnapshot(ref, { includeMetadataChanges: true }, (snap) => {
                    setData(snap.docs.map(d => ({ id: d.id, ...d.data() })));
                });
            }, [db, user, name]);
            return data;
        };

        // --- UI Components ---
        const Button = ({ children, onClick, variant = 'primary', icon, disabled, className = "", type = "button" }) => {
            const baseStyles = "px-6 py-3.5 rounded-2xl font-semibold text-sm flex items-center justify-center gap-3 transition-all active:scale-[0.98] disabled:opacity-50 disabled:active:scale-100";

                    <div className="w-full h-full lg:h-auto lg:max-h-[90vh] lg:max-w-5xl bg-slate-50 dark:bg-slate-900 lg:rounded-3xl lg:shadow-2xl flex flex-col animate-slide-up lg:animate-in lg:fade-in lg:zoom-in-95 border-0 lg:border border-slate-200 dark:border-slate-800/50 overflow-hidden">

        // --- NEW: Image Cropper Modal ---
        const ImageCropperModal = ({ isOpen, imageSrc, onCrop, onClose, aspectRatio = 1 }) => {
            const imgRef = useRef(null);
            const cropperRef = useRef(null);

            useEffect(() => {
                return () => {
                    if (cropperRef.current) {
                        cropperRef.current.destroy();
                        cropperRef.current = null;
                    }
                };
            }, []);

            if (!isOpen) return null;

            const handleImageLoad = (e) => {
                if (cropperRef.current) cropperRef.current.destroy();
                cropperRef.current = new window.Cropper(e.target, {
                    aspectRatio: aspectRatio,
                    viewMode: 1,
                    dragMode: 'move',
                    autoCropArea: 1,
                    cropBoxMovable: false,
                    cropBoxResizable: false,
                    guides: true,
                    center: true,
                    highlight: false,
                    background: true,
                    responsive: true,
                });
            };

            const handleCrop = () => {
                if (cropperRef.current) {
                    const canvas = cropperRef.current.getCroppedCanvas({
                        width: 400,
                        height: Math.round(400 / aspectRatio),
                    });
                    onCrop(canvas.toDataURL('image/jpeg', 0.8));
                }
            };

            return (
                <div className="fixed inset-0 z-[300] bg-black/95 flex flex-col animate-in fade-in duration-200">

                            <button onClick={() => cropperRef.current?.zoom(0.1)} className="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 active:scale-95 transition-all text-white"><i className="fas fa-search-plus"></i></button>
                            <button onClick={() => cropperRef.current?.zoom(-0.1)} className="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 active:scale-95 transition-all text-white"><i className="fas fa-search-minus"></i></button>

        // --- NEW: Live Barcode Scanner UI ---
        const BarcodeScannerUI = ({ onScan, onClose }) => {

                html5QrcodeScanner.render(

                        // ignore errors natively, it continuously scans until success
                    }
                );

                return () => {
                    try {
                        html5QrcodeScanner.clear().catch(e => console.log("Scanner cleanup", e));

        // --- Settings View ---
        const SettingsView = ({ isChatVisible, setIsChatVisible }) => {
            const users = useCollection('users');
            const drivers = useCollection('drivers');
            const messages = useCollection('messages'); 
            const { auth, db } = useContext(FirebaseContext);
            const { addToast } = useContext(ToastContext);
            
            const [settingsTab, setSettingsTab] = useState('users'); 
            const [formError, setFormError] = useState('');
            const [loading, setLoading] = useState(false);

            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({ name: '', email: '', password: '', role: 'Staff', status: 'Active', photo: '', sellerId: '', permissions: [], monthlyTarget: '', commissionRate: '' });
            const [editingId, setEditingId] = useState(null);
            const [confirmDeleteId, setConfirmDeleteId] = useState(null);

            const [isDriverModalOpen, setIsDriverModalOpen] = useState(false);
            const [driverData, setDriverData] = useState({ name: '', contact: '', plate: '', photo: '' });
            const [editingDriverId, setEditingDriverId] = useState(null);
            const [confirmDriverDeleteId, setConfirmDriverDeleteId] = useState(null);

            // --- NEW: Idle Timeout Configuration State ---
            const [idleTimeoutSetting, setIdleTimeoutSetting] = useState(() => {
                const saved = localStorage.getItem('chatIdleTimeout');
                return saved !== null ? Number(saved) : 3;
            });

            // --- NEW: Idle Timeout Logic for Chat Hiding ---
            useEffect(() => {
                // If set to 0 (Never), don't start the idle timer
                if (idleTimeoutSetting === 0) return;

                let idleTimer;
                const IDLE_TIMEOUT_MS = idleTimeoutSetting * 60 * 1000;

                const resetIdleTimer = () => {
                    clearTimeout(idleTimer);
                    // Only start the timer if the chat is currently visible
                    if (isChatVisible) {
                        idleTimer = setTimeout(() => {
                            setIsChatVisible(false); // Hide the chat
                            setSettingsTab('users'); // Reset view to users
                            addToast(`Chat automatically locked due to ${idleTimeoutSetting} min of inactivity.`, "info");
                        }, IDLE_TIMEOUT_MS);
                    }
                };

                // Listen for activity
                const events = ['mousemove', 'keydown', 'mousedown', 'touchstart'];
                events.forEach(event => document.addEventListener(event, resetIdleTimer));
                
                // Initial timer start
                resetIdleTimer();

                return () => {
                    clearTimeout(idleTimer);
                    events.forEach(event => document.removeEventListener(event, resetIdleTimer));
                };
            }, [isChatVisible, setIsChatVisible, addToast, idleTimeoutSetting]);
            // ---------------------------------------------

            // Chat PIN Lock State
            const [isChatUnlocked, setIsChatUnlocked] = useState(false);
            const [chatPin, setChatPin] = useState('');
            const [pinError, setPinError] = useState(false);
            const REQUIRED_PIN = '143412';

            const [activeChatUser, setActiveChatUser] = useState(null);
            const [newMessage, setNewMessage] = useState('');
            const [showEmojis, setShowEmojis] = useState(false);
            const [showStickers, setShowStickers] = useState(false);
            const [confirmClearChat, setConfirmClearChat] = useState(false);
            const messagesEndRef = useRef(null);
            const [replyingTo, setReplyingTo] = useState(null);
            const chatInputRef = useRef(null);
            
            // --- NEW: Typing Indicator Refs ---
            const typingTimeoutRef = useRef(null);
            const isTypingRef = useRef(false);

            // Cropper state
            const [cropConfig, setCropConfig] = useState({ src: null, target: null });

            useEffect(() => {
                if (!isChatVisible && settingsTab === 'chat') {
                    setSettingsTab('users');
                }
            }, [isChatVisible, settingsTab]);

            // 1. Lock outer scroll when in chat to fix mobile keyboard layout
            useEffect(() => {
                const mainEl = document.querySelector('main');
                if (!mainEl) return;
                
                if (settingsTab === 'chat') {
                    // CRITICAL FIX: Instantly reset scroll to top BEFORE locking overflow to prevent clipping
                    mainEl.scrollTop = 0;
                    mainEl.style.overflow = 'hidden';
                    mainEl.style.paddingBottom = 'env(safe-area-inset-bottom)'; // Remove outer padding
                } else {
                    mainEl.style.overflow = '';
                    mainEl.style.paddingBottom = ''; // Restore original pb-24 class behavior
                }
                
                return () => {
                    mainEl.style.overflow = '';
                    mainEl.style.paddingBottom = '';
                };
            }, [settingsTab]);

            // 2. Ensure chat stays scrolled to bottom when mobile keyboard resizes screen
            useEffect(() => {
                const handleResize = () => {
                    if (settingsTab === 'chat' && activeChatUser) {
                        setTimeout(() => messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' }), 100);
                    }
                };
                window.visualViewport?.addEventListener('resize', handleResize);
                return () => window.visualViewport?.removeEventListener('resize', handleResize);
            }, [settingsTab, activeChatUser]);

            // --- NEW: Online Status Heartbeat ---
            useEffect(() => {
                const currentId = auth.currentUser?.uid;
                if (!currentId || !db) return;
                
                const updatePresence = async () => {
                    try {
                        await window.firebaseSDK.updateDoc(
                            window.firebaseSDK.doc(db, 'artifacts', appId, 'users', currentId), 
                            { lastActive: window.firebaseSDK.serverTimestamp() }
                        );
                    } catch(e) {}
                };
                
                updatePresence();
                const interval = setInterval(updatePresence, 60000); // Every 60s
                return () => clearInterval(interval);
            }, [auth.currentUser, db]);

            // --- NEW: Clear typing when leaving active chat ---
            useEffect(() => {
                if (!activeChatUser && auth.currentUser?.uid && db) {
                     window.firebaseSDK.updateDoc(
                        window.firebaseSDK.doc(db, 'artifacts', appId, 'users', auth.currentUser.uid), 
                        { typingTo: null }
                    ).catch(()=>{});
                }
            }, [activeChatUser, auth.currentUser?.uid, db]);

            const currentUserProfile = users.find(u => u.email?.toLowerCase() === auth.currentUser?.email?.toLowerCase());
            const currentProfileRole = currentUserProfile?.role || 'Staff';

            const openForm = (u = null) => {
                if (u && u.role === 'Admin' && currentProfileRole !== 'Admin') {
                    return addToast("Permission Denied: Only Admins can edit Admin accounts.", "error");
                }
                setFormError('');
                if (u) { 
                    setFormData({ ...u, password: '', sellerId: u.sellerId || '', permissions: u.permissions || [], status: u.status || 'Active', monthlyTarget: u.monthlyTarget || '', commissionRate: u.commissionRate || '' }); 
                    setEditingId(u.id); 
                } 
                else { 
                    setFormData({ name: '', email: '', password: '', role: 'Staff', status: 'Active', photo: '', sellerId: '', permissions: [], monthlyTarget: '', commissionRate: '' }); 
                    setEditingId(null); 
                }
                setIsModalOpen(true);
            };

            const handleSave = async () => {
                setFormError('');
                if (!formData.name || !formData.email) return setFormError("Name and Email are required.");
                if (!editingId && !formData.password) return setFormError("Password is required for new users.");
                if (!editingId && formData.password.length < 6) return setFormError("Password must be at least 6 characters.");
                
                setLoading(true);
                const { doc, setDoc, serverTimestamp, initializeApp, deleteApp, getAuth, createUserWithEmailAndPassword } = window.firebaseSDK;
                
                let secondaryApp = null;
                try {
                    let finalId = editingId;

                    if (!editingId) {
                        const tempAppName = `CreateUser_${Date.now()}`;
                        secondaryApp = initializeApp(firebaseConfig, tempAppName);
                        const secondaryAuth = getAuth(secondaryApp);
                        
                        const userCredential = await createUserWithEmailAndPassword(secondaryAuth, formData.email, formData.password);
                        finalId = userCredential.user.uid; 
                    }

                    const payload = { ...formData, updatedAt: serverTimestamp() };
                    delete payload.password; 

                    if (!editingId) {
                        payload.id = finalId;
                        payload.createdAt = serverTimestamp();
                    }
                    
                    if (payload.role === 'Admin') payload.permissions = ['customers', 'orders', 'products', 'productCategories', 'productUnits', 'drivers'];
                    else if (!payload.permissions || payload.permissions.length === 0) payload.permissions = ['customers', 'orders'];

                    await setDoc(doc(db, 'artifacts', appId, 'users', finalId), payload);
                    
                    if (secondaryApp) await deleteApp(secondaryApp);
                    
                    setIsModalOpen(false); 
                    setEditingId(null);
                    addToast(editingId ? "User profile updated!" : "New user created!", "success");
                } catch (e) { 
                    const errorMsg = e.message.includes('auth/email-already-in-use') ? "Email already registered." : e.message;
                    setFormError(errorMsg); 
                    if (secondaryApp) await deleteApp(secondaryApp);
                }
                setLoading(false);
            };

            const handleDelete = async (id) => {
                const userToDelete = users.find(u => u.id === id);
                if (userToDelete?.role === 'Admin' && currentProfileRole !== 'Admin') {
                    return addToast("Permission Denied: Only Admins can delete Admin accounts.", "error");
                }

                if (confirmDeleteId === id) { 
                    await window.firebaseSDK.deleteDoc(window.firebaseSDK.doc(db, 'artifacts', appId, 'users', id)); 
                    setConfirmDeleteId(null); 
                    addToast("User account deleted.", "info");
                } 
                else { setConfirmDeleteId(id); setTimeout(() => setConfirmDeleteId(null), 3000); }
            };

            const openDriverForm = (d = null) => {
                setFormError('');
                if (d) { setDriverData(d); setEditingDriverId(d.id); } 
                else { setDriverData({ name: '', contact: '', plate: '', photo: '' }); setEditingDriverId(null); }
                setIsDriverModalOpen(true);
            };

            const handleDriverSave = async () => {
                setFormError('');
                if (!driverData.name) return setFormError("Driver Name is required.");
                setLoading(true);
                const { collection, addDoc, updateDoc, doc, serverTimestamp } = window.firebaseSDK;
                try {
                    const payload = { ...driverData, updatedAt: serverTimestamp() };
                    if (editingDriverId) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'drivers', editingDriverId), payload);
                    else { payload.createdAt = serverTimestamp(); await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'drivers'), payload); }
                    setIsDriverModalOpen(false); setEditingDriverId(null);
                    addToast(editingDriverId ? "Driver updated!" : "Driver added to fleet!", "success");
                } catch (e) { setFormError(e.message); }
                setLoading(false);
            };

            const handleDriverDelete = async (id) => {
                if (confirmDriverDeleteId === id) { 
                    await window.firebaseSDK.deleteDoc(window.firebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'drivers', id)); 
                    setConfirmDriverDeleteId(null); 
                    addToast("Driver removed from fleet.", "info");
                } 
                else { setConfirmDriverDeleteId(id); setTimeout(() => setConfirmDriverDeleteId(null), 3000); }
            };

            const handleFileChange = (e, target) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = () => setCropConfig({ src: reader.result, target });
                    reader.readAsDataURL(file);
                }
                e.target.value = '';
            };

            const handleCropComplete = (dataUrl) => {
                if (cropConfig.target === 'user') setFormData({ ...formData, photo: dataUrl });
                else if (cropConfig.target === 'driver') setDriverData({ ...driverData, photo: dataUrl });
                setCropConfig({ src: null, target: null });
            };

            const profileName = currentUserProfile?.name || auth.currentUser?.email?.split('@')[0] || 'User';
            const profilePhoto = currentUserProfile?.photo || '';
            const myId = auth.currentUser?.uid;

            const myMessages = messages.filter(m => m.senderId === myId || m.receiverId === myId);
            
            useEffect(() => {
                if (activeChatUser && myId) {
                    const unread = myMessages.filter(m => m.receiverId === myId && m.senderId === activeChatUser.id && !m.read);
                    unread.forEach(m => {
                        if(m.id) {
                            window.firebaseSDK.updateDoc(
                                window.firebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'messages', m.id), 
                                { 
                                    read: true,
                                    readAt: window.firebaseSDK.serverTimestamp() 
                                }
                            ).catch(e => console.error("Mark read error:", e));
                        }
                    });
                }
            }, [activeChatUser, messages, myId, db]);

            const handleSendMessage = async (e) => {
                e.preventDefault();
                if (!newMessage.trim() || !activeChatUser || !myId) return;
                const text = newMessage.trim();
                setNewMessage('');
                
                // --- NEW: Clear typing indicator immediately ---
                if (typingTimeoutRef.current) clearTimeout(typingTimeoutRef.current);
                isTypingRef.current = false;
                window.firebaseSDK.updateDoc(
                    window.firebaseSDK.doc(db, 'artifacts', appId, 'users', myId), 
                    { typingTo: null }
                ).catch(()=>{});

                try {
                    await window.firebaseSDK.addDoc(
                        window.firebaseSDK.collection(db, 'artifacts', appId, 'public', 'data', 'messages'),
                        {
                            senderId: myId,
                            receiverId: activeChatUser.id,
                            text: text,
                            createdAt: window.firebaseSDK.serverTimestamp(),
                            read: false,
                            replyTo: replyingTo ? { id: replyingTo.id || null, text: replyingTo.text, senderId: replyingTo.senderId } : null
                        }
                    );
                    setReplyingTo(null);
                } catch (err) {
                    addToast("Failed to send message", "error");
                }
            };
            
            const handleSendSticker = async (emoji, animationClass) => {
                if (!activeChatUser || !myId) return;
                setShowStickers(false);
                
                // Clear typing indicator immediately
                if (typingTimeoutRef.current) clearTimeout(typingTimeoutRef.current);
                isTypingRef.current = false;
                window.firebaseSDK.updateDoc(
                    window.firebaseSDK.doc(db, 'artifacts', appId, 'users', myId), 
                    { typingTo: null }
                ).catch(()=>{});

                try {
                    await window.firebaseSDK.addDoc(
                        window.firebaseSDK.collection(db, 'artifacts', appId, 'public', 'data', 'messages'),
                        {
                            senderId: myId,
                            receiverId: activeChatUser.id,
                            text: `[[STICKER:${emoji}:${animationClass}]]`,
                            createdAt: window.firebaseSDK.serverTimestamp(),
                            read: false,
                            replyTo: replyingTo ? { id: replyingTo.id || null, text: replyingTo.text, senderId: replyingTo.senderId } : null
                        }
                    );
                    setReplyingTo(null);
                } catch (err) {
                    addToast("Failed to send sticker", "error");
                }
            };
            
            const handleInitiateReply = (msg) => {
                setReplyingTo(msg);
                setTimeout(() => chatInputRef.current?.focus(), 50);
            };

            const triggerTyping = () => {
                if (!activeChatUser || !myId) return;

                if (!isTypingRef.current) {
                    isTypingRef.current = true;
                    window.firebaseSDK.updateDoc(
                        window.firebaseSDK.doc(db, 'artifacts', appId, 'users', myId), 
                        { typingTo: activeChatUser.id }
                    ).catch(()=>{});
                }

                if (typingTimeoutRef.current) clearTimeout(typingTimeoutRef.current);
                typingTimeoutRef.current = setTimeout(() => {
                    isTypingRef.current = false;
                    window.firebaseSDK.updateDoc(
                        window.firebaseSDK.doc(db, 'artifacts', appId, 'users', myId), 
                        { typingTo: null }
                    ).catch(()=>{});
                }, 2000);
            };

            const handleTyping = (e) => {
                setNewMessage(e.target.value);
                triggerTyping();
            };
            
            let chatThread = [];
            if (activeChatUser) {
                chatThread = myMessages.filter(m => 
                    (m.senderId === myId && m.receiverId === activeChatUser.id) ||
                    (m.senderId === activeChatUser.id && m.receiverId === myId)
                ).sort((a, b) => {
                    const timeA = a.createdAt?.seconds || Date.now() / 1000;
                    const timeB = b.createdAt?.seconds || Date.now() / 1000;
                    return timeA - timeB;
                });
            }

                if(!msgId) return;
                try {
                    await window.firebaseSDK.deleteDoc(window.firebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'messages', msgId));
                } catch(e) {
                    addToast("Failed to delete message", "error");
                }
            };

            const handleClearChat = async () => {
                if (confirmClearChat) {
                    try {
                        const deletePromises = chatThread.map(msg => 
                            msg.id ? window.firebaseSDK.deleteDoc(window.firebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'messages', msg.id)) : Promise.resolve()
                        );
                        await Promise.all(deletePromises);
                        setConfirmClearChat(false);
                        addToast("Chat cleared", "info");
                    } catch(e) {
                        addToast("Failed to clear chat", "error");
                    }

            const handleProductSave = async () => {
                if (!productData.name) return;
                setLoading(true);
                const { collection, addDoc, updateDoc, doc, serverTimestamp } = window.firebaseSDK;
                try {
                    const payload = { ...productData, updatedAt: serverTimestamp() };
                    if (editingProductId) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', editingProductId), payload);
                    else { payload.createdAt = serverTimestamp(); await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'products'), payload); }

                    addToast(editingProductId ? "Product updated!" : "Product added to inventory!", "success");

                setLoading(false);

                    await window.firebaseSDK.deleteDoc(window.firebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'products', id));

                                        <div className="flex items-center gap-3 min-w-0">

                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-3">Base Price ($)</label>
                                        <input className="input" placeholder="0.00" type="number" step="0.01" value={productData.price} onChange={e=>setProductData({...productData, price: e.target.value})} />

                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-3">Stock Qty</label>
                                        <input className="input" placeholder="0" type="number" value={productData.qty} onChange={e=>setProductData({...productData, qty: e.target.value})} />

                            <Button className="w-full !py-4 shadow-glow" onClick={handleProductSave} disabled={loading}>

                    <ImageCropperModal 
                        isOpen={!!cropImage} 
                        imageSrc={cropImage}

                        }} 
                        onClose={() => setCropImage(null)} 
                    />
                </div>
            );
        };

        // --- NEW: Territory & Smart Routing View ---
        const TerritoryMapView = () => {
            const customers = useCollection('customers');
            const users = useCollection('users');
            const sales = useCollection('sales'); // NEW: Fetch sales for map debt tracking
            const { auth } = useContext(FirebaseContext);
            const { addToast } = useContext(ToastContext);

            const currentUser = useMemo(() => users.find(u => u.email?.toLowerCase() === auth.currentUser?.email?.toLowerCase()), [users, auth.currentUser]);
            const currentRole = currentUser?.role || 'Staff';
            const sellerId = currentUser?.sellerId || auth.currentUser?.email || '';

            const accessibleCustomers = useMemo(() => {
                const filtered = currentRole === 'Admin' ? customers : customers.filter(c => c.sellerId === sellerId);
                return filtered.filter(c => c.lat && c.lng); // Only those with GPS
            }, [customers, currentRole, sellerId]);

            const [mapTab, setMapTab] = useState('map'); // 'map' or 'planner'
            const mapRef = useRef(null);
            const mapInstance = useRef(null);
            const markersRef = useRef([]);

            const [selectedCustomer, setSelectedCustomer] = useState(null);
            const [routeQueue, setRouteQueue] = useState([]);
            const [isOptimized, setIsOptimized] = useState(false);
            const [optimizing, setOptimizing] = useState(false);
            
            const hasSetInitialBounds = useRef(false); // NEW: Track initial zoom to prevent annoying reset jumps

            // 1. Initialize Leaflet Map
            useEffect(() => {
                // Map container is always rendered now, just hidden via CSS
                if (!mapRef.current) return;

                if (!mapInstance.current) {
                    mapInstance.current = window.L.map(mapRef.current, { zoomControl: false }).setView([11.5564, 104.9282], 12); // Default PP
                    window.L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
                        attribution: '&copy; OpenStreetMap & CartoDB'
                    }).addTo(mapInstance.current);
                    window.L.control.zoom({ position: 'topright' }).addTo(mapInstance.current);
                }

                const map = mapInstance.current;

                // Fix Leaflet's blank tile bug when switching tabs (display: none -> block)
                if (mapTab === 'map') {
                    setTimeout(() => {
                        map.invalidateSize();
                    }, 100);
                }

                // Clear old markers
                markersRef.current.forEach(m => map.removeLayer(m));
                markersRef.current = [];

                const bounds = [];

                accessibleCustomers.forEach(c => {
                    const lat = parseFloat(c.lat);
                    const lng = parseFloat(c.lng);
                    if (isNaN(lat) || isNaN(lng)) return;

                    bounds.push([lat, lng]);

                    const inRoute = routeQueue.some(r => r.id === c.id);
                    const isSelected = selectedCustomer?.id === c.id;
                    
                    // --- NEW: Dynamic Debt Calculation for Map Markers ---
                    const debt = sales.filter(s => s.customerId === c.id).reduce((sum, s) => sum + (parseFloat(s.balanceDue) || 0), 0);
                    const hasDebt = debt > 0;
                    
                    let bgColor = hasDebt ? 'bg-red-500' : 'bg-brand-500';
                    let iconClass = hasDebt ? 'fa-file-invoice-dollar' : 'fa-store';
                    
                    if (isSelected) bgColor = 'bg-indigo-600 scale-110 z-50';
                    if (inRoute) { bgColor = 'bg-emerald-500 pulse'; iconClass = 'fa-check'; }
                    
                    const iconHtml = `
                        <div class="custom-marker ${bgColor}">
                            <i class="fas ${iconClass} text-white text-[12px]"></i>
                        </div>
                    `;
                    // ---------------------------------------------------
                    
                    const customIcon = window.L.divIcon({ html: iconHtml, className: '', iconSize: [36, 36], iconAnchor: [18, 36] });
                    const marker = window.L.marker([lat, lng], { icon: customIcon }).addTo(map);
                    
                    marker.on('click', () => {
                        setSelectedCustomer(c);
                        map.flyTo([lat, lng], 15, { duration: 0.5 });
                    });
                    
                    markersRef.current.push(marker);
                });

                // Only fit bounds initially, stops map from violently zooming out when clicking markers
                if (bounds.length > 0 && !selectedCustomer && !hasSetInitialBounds.current) {
                    map.fitBounds(bounds, { padding: [50, 50], maxZoom: 14 });
                    hasSetInitialBounds.current = true;
                }

            }, [mapTab, accessibleCustomers, routeQueue, selectedCustomer, sales]);

            // 2. Haversine Distance Calculator (Client-Side Math, No API fees!)
            const getDistance = (lat1, lon1, lat2, lon2) => {
                const R = 6371; // Earth Radius in km
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) + Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                return R * c;
            };

            // 3. Nearest Neighbor Route Optimizer
            const handleOptimizeRoute = () => {
                if (routeQueue.length < 2) return addToast("Add at least 2 stops to optimize.", "error");

                setOptimizing(true);
                addToast("Calculating optimal route...", "info");

                // Get Current GPS as Start Point
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        position => {
                            const startLoc = { lat: position.coords.latitude, lng: position.coords.longitude };
                            runAlgorithm(startLoc);
                        },
                        error => {
                            // Fallback: Use the first customer in the queue as the start point if GPS fails
                            addToast("GPS denied. Using first stop as origin.", "error");
                            const startLoc = { lat: parseFloat(routeQueue[0].lat), lng: parseFloat(routeQueue[0].lng) };
                            runAlgorithm(startLoc);
                        }
                    );
                } else {
                    const startLoc = { lat: parseFloat(routeQueue[0].lat), lng: parseFloat(routeQueue[0].lng) };
                    runAlgorithm(startLoc);
                }

                function runAlgorithm(startLoc) {
                    let unvisited = [...routeQueue];
                    let currentLoc = startLoc;
                    let sortedRoute = [];

                    while(unvisited.length > 0) {
                        let nearestIdx = 0;
                        let minDistance = Infinity;

                        for (let i = 0; i < unvisited.length; i++) {
                            const dist = getDistance(currentLoc.lat, currentLoc.lng, parseFloat(unvisited[i].lat), parseFloat(unvisited[i].lng));
                            if (dist < minDistance) {
                                minDistance = dist;
                                nearestIdx = i;
                            }
                        }

                        const nearest = unvisited[nearestIdx];
                        sortedRoute.push({...nearest, distanceFromLast: minDistance});
                        currentLoc = { lat: parseFloat(nearest.lat), lng: parseFloat(nearest.lng) };
                        unvisited.splice(nearestIdx, 1);
                    }

                    setTimeout(() => {
                        setRouteQueue(sortedRoute);
                        setIsOptimized(true);
                        setOptimizing(false);
                        addToast("Route fully optimized!", "success");
                    }, 800); // Artificial delay for UX
                }
            };

            const toggleRouteQueue = (customer) => {
                const exists = routeQueue.find(c => c.id === customer.id);
                if (exists) {
                    setRouteQueue(routeQueue.filter(c => c.id !== customer.id));
                    setIsOptimized(false);
                    addToast("Removed from route", "info");
                } else {
                    setRouteQueue([...routeQueue, { ...customer, routeStatus: 'pending', reachedAt: null }]);
                    setIsOptimized(false);
                    addToast("Added to route", "success");
                }
            };

            const markStopReached = (stopId) => {
                setRouteQueue(prev => prev.map(stop =>
                    stop.id === stopId
                        ? { ...stop, routeStatus: 'reached', reachedAt: new Date().toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'}) }
                        : stop
                ));
                addToast("Destination marked as reached!", "success");
            };

            const undoStopReached = (stopId) => {
                setRouteQueue(prev => prev.map(stop =>
                    stop.id === stopId
                        ? { ...stop, routeStatus: 'pending', reachedAt: null }
                        : stop
                ));
                addToast("Stop unlocked and marked as pending.", "info");
            };

            return (
                <div className="flex flex-col h-full space-y-4 animate-in fade-in duration-300">
                    <div className="flex bg-slate-100 dark:bg-slate-800/60 p-1 rounded-2xl border border-slate-200 dark:border-slate-700/50 shadow-inner max-w-xl mx-auto w-full z-20 flex-shrink-0 overflow-x-auto hide-scrollbar">
                        <button onClick={() => setMapTab('map')} className={`flex-1 min-w-[100px] py-2.5 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-2 ${mapTab === 'map' ? 'bg-brand-600 text-white shadow-lg' : 'text-slate-400 hover:text-slate-600 dark:hover:text-slate-200'}`}>
                            <i className="fas fa-map-marked-alt"></i> Map
                        </button>
                        <button onClick={() => setMapTab('planner')} className={`flex-1 min-w-[120px] py-2.5 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-2 ${mapTab === 'planner' ? 'bg-brand-600 text-white shadow-lg' : 'text-slate-400 hover:text-slate-600 dark:hover:text-slate-200'}`}>
                            <i className="fas fa-route"></i> Route {routeQueue.length > 0 && <span className={`px-1.5 py-0.5 rounded-md text-[9px] ml-1 ${mapTab === 'planner' ? 'bg-white/20 text-white' : 'bg-slate-200 dark:bg-slate-700 text-slate-500'}`}>{routeQueue.length}</span>}
                        </button>
                        <button onClick={() => setMapTab('report')} className={`flex-1 min-w-[120px] py-2.5 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-2 ${mapTab === 'report' ? 'bg-brand-600 text-white shadow-lg' : 'text-slate-400 hover:text-slate-600 dark:hover:text-slate-200'}`}>
                            <i className="fas fa-clipboard-check"></i> Report
                        </button>
                    </div>

                    {/* MAP VIEW - Always render, control via CSS hidden to preserve Leaflet state */}
                    <div className={`relative flex-1 rounded-3xl overflow-hidden border border-slate-200 dark:border-slate-700/50 shadow-sm min-h-[400px] ${mapTab === 'map' ? 'block' : 'hidden'}`}>
                        <div ref={mapRef} className="absolute inset-0 w-full h-full z-10"></div>
                        
                        {/* Floating Map Customer Card */}
                        {selectedCustomer && (() => {
                            const selectedDebt = sales.filter(s => s.customerId === selectedCustomer.id).reduce((sum, s) => sum + (parseFloat(s.balanceDue) || 0), 0);
                            return (
                                <div className="absolute bottom-4 left-4 right-4 lg:left-1/2 lg:-translate-x-1/2 lg:w-96 z-[400] bg-white/95 dark:bg-slate-900/95 backdrop-blur-xl p-4 rounded-3xl shadow-2xl border border-slate-200 dark:border-slate-700 animate-in slide-in-from-bottom-4">
                                    {selectedDebt > 0 && (
                                        <div className="absolute -top-3 right-4 bg-red-500 text-white px-2.5 py-1 rounded-md text-[10px] font-black tracking-widest shadow-lg animate-pulse border border-red-400">
                                            DEBT: ${selectedDebt.toFixed(2)}
                                        </div>
                                    )}
                                    <button onClick={() => setSelectedCustomer(null)} className="absolute top-4 right-4 w-8 h-8 rounded-full bg-slate-100 dark:bg-slate-800 flex items-center justify-center text-slate-500 hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors">
                                        <i className="fas fa-times text-xs"></i>
                                    </button>
                                    <div className="flex items-center gap-4 mb-4 pr-10">
                                        <Avatar name={selectedCustomer.shopName} url={selectedCustomer.photo} size="12" isCircle={true} />
                                        <div className="min-w-0">

                    </div>

                    {/* ROUTE PLANNER VIEW - Control via CSS hidden */}
                    <div className={`flex-1 flex-col max-w-3xl mx-auto w-full ${mapTab === 'planner' ? 'flex' : 'hidden'}`}>
                        <div className="bg-white dark:bg-slate-800/40 rounded-3xl border border-slate-200 dark:border-slate-700/50 shadow-sm p-5 mb-4 flex-shrink-0">

                                    {optimizing ? <i className="fas fa-circle-notch fa-spin"></i> : <><i className="fas fa-magic"></i> OPTIMIZE SHORTEST PATH</>}

                            </div>

                            <div className="flex-1 overflow-y-auto space-y-3 pb-safe custom-scroll pr-1">
                                {routeQueue.length === 0 ? (
                                    <div className="text-center py-16 text-slate-400">
                                        <i className="fas fa-route text-5xl mb-4 opacity-20"></i>
                                        <p className="text-xs font-bold uppercase tracking-widest">No Stops Planned</p>
                                        <p className="text-[10px] mt-2 opacity-70">Go to the map to add customers to your daily route.</p>
                                    </div>
                                ) : (
                                    routeQueue.map((stop, index) => (
                                        <div key={stop.id} className={`bg-white dark:bg-slate-800/40 p-4 rounded-2xl border ${stop.routeStatus === 'reached' ? 'border-emerald-500/50 shadow-[0_0_15px_rgba(16,185,129,0.1)]' : 'border-slate-200 dark:border-slate-700/50'} shadow-sm flex items-center gap-4 transition-all hover:shadow-md animate-in slide-in-from-left-4`}>
                                            <div className={`w-8 h-8 rounded-full flex items-center justify-center flex-shrink-0 font-black text-xs ${stop.routeStatus === 'reached' ? 'bg-emerald-500 text-white shadow-md' : (isOptimized ? 'bg-brand-500 text-white shadow-md' : 'bg-slate-100 dark:bg-slate-700 text-slate-500')}`}>
                                                {stop.routeStatus === 'reached' ? <i className="fas fa-check"></i> : (index + 1)}
                                            </div>
                                            <div className="flex-1 min-w-0">
                                                <h4 className="font-bold text-slate-900 dark:text-white truncate">{stop.shopName}</h4>
                                                <p className="text-[10px] text-slate-500 truncate">{stop.address || stop.ownerName || 'No specific address'}</p>

                                                {stop.routeStatus === 'reached' && (
                                                    <p className="text-[9px] font-bold text-emerald-600 dark:text-emerald-400 mt-1"><i className="far fa-clock mr-1"></i>Reached at {stop.reachedAt}</p>
                                                )}
                                            </div>
                                            <div className="flex gap-2 flex-shrink-0">
                                                {stop.routeStatus === 'reached' ? (
                                                    <button onClick={() => undoStopReached(stop.id)} className="w-10 h-10 rounded-xl bg-amber-50 dark:bg-amber-500/10 text-amber-500 flex items-center justify-center hover:bg-amber-500 hover:text-white transition-colors" title="Undo Reached Status">
                                                        <i className="fas fa-undo"></i>
                                                    </button>
                                                ) : (
                                                    <button onClick={() => markStopReached(stop.id)} className="w-10 h-10 rounded-xl bg-emerald-50 dark:bg-emerald-500/10 text-emerald-600 dark:text-emerald-400 flex items-center justify-center hover:bg-emerald-500 hover:text-white transition-colors" title="Mark as Reached">
                                                        <i className="fas fa-check-double"></i>
                                                    </button>
                                                )}
                                                <a href={`https://www.google.com/maps/dir/?api=1&destination=${stop.lat},${stop.lng}`} target="_blank" className="w-10 h-10 rounded-xl bg-brand-50 dark:bg-brand-500/10 text-brand-600 dark:text-brand-400 flex items-center justify-center hover:bg-brand-500 hover:text-white transition-colors">
                                                    <i className="fas fa-location-arrow"></i>
                                                </a>
                                                {stop.routeStatus !== 'reached' && (
                                                    <button onClick={() => toggleRouteQueue(stop)} className="w-10 h-10 rounded-xl bg-red-50 dark:bg-red-500/10 text-red-500 flex items-center justify-center hover:bg-red-500 hover:text-white transition-colors">
                                                        <i className="fas fa-times"></i>
                                                    </button>
                                                )}
                                            </div>
                                        </div>
                                    ))
                                )}
                            </div>
                        </div>

                    {/* TRACKING REPORT VIEW - Control via CSS hidden */}
                    <div className={`flex-1 flex-col max-w-4xl mx-auto w-full animate-in fade-in ${mapTab === 'report' ? 'flex' : 'hidden'}`}>
                        <div id="print-area" className="bg-white dark:bg-slate-800/40 rounded-3xl border border-slate-200 dark:border-slate-700/50 shadow-sm p-4 lg:p-6 print:shadow-none print:border-none print:w-full print:p-0 print:bg-white print:text-black">
                            <div className="flex flex-col sm:flex-row justify-between items-start sm:items-center mb-6 border-b border-slate-200 dark:border-slate-700/50 pb-4 gap-4">
                                <div>
                                    <h2 className="text-lg lg:text-xl font-black text-slate-900 dark:text-white uppercase tracking-tighter print:text-black">Daily Route Tracking</h2>
                                    <p className="text-xs text-slate-500 mt-1 print:text-gray-600">Generated: {new Date().toLocaleDateString()}</p>
                                </div>
                                <div className="no-print w-full sm:w-auto">
                                    <Button onClick={() => window.print()} className="shadow-sm !py-2 w-full sm:w-auto"><i className="fas fa-print"></i> Print Log</Button>
                                </div>
                            </div>

                            {routeQueue.length === 0 ? (
                                <div className="text-center py-12 text-slate-400">
                                    <i className="fas fa-clipboard-list text-4xl mb-3 opacity-20"></i>
                                    <p className="text-xs font-bold uppercase tracking-widest">No Data Available</p>
                                    <p className="text-[10px] mt-2 opacity-70">Add stops and mark them as reached to generate a report.</p>
                                </div>
                            ) : (
                                <div className="overflow-x-auto border border-slate-200 dark:border-slate-700/50 rounded-2xl print:border-0 print:overflow-visible">
                                    <table className="w-full text-left text-xs lg:text-sm print:text-xs">
                                        <thead className="bg-slate-50 dark:bg-slate-900/50 text-slate-500 dark:text-slate-400 print:bg-gray-100 print:text-gray-800">
                                            <tr>
                                                <th className="p-3 font-bold uppercase tracking-wider rounded-tl-xl print:rounded-none">#</th>
                                                <th className="p-3 font-bold uppercase tracking-wider">Destination</th>
                                                <th className="p-3 font-bold uppercase tracking-wider hidden sm:table-cell">Est. Dist</th>

                                        </thead>
                                        <tbody className="divide-y divide-slate-100 dark:divide-slate-700/50 print:divide-gray-200">
                                            {routeQueue.map((stop, index) => (
                                                <tr key={stop.id} className="text-slate-900 dark:text-white print:text-black">
                                                    <td className="p-3 font-bold text-slate-400 print:text-gray-500">{index + 1}</td>
                                                    <td className="p-3">
                                                        <p className="font-bold">{stop.shopName}</p>
                                                        <p className="text-[10px] text-slate-500 truncate max-w-[150px] lg:max-w-[250px] print:text-gray-600 print:max-w-none print:whitespace-normal">{stop.address || stop.ownerName}</p>
                                                    </td>
                                                    <td className="p-3 text-xs font-mono hidden sm:table-cell text-slate-500 print:text-gray-600">{stop.distanceFromLast ? `+${stop.distanceFromLast.toFixed(1)} km` : '-'}</td>
                                                    <td className="p-3">
                                                        <span className={`text-[9px] font-black px-2 py-1 rounded uppercase tracking-widest ${stop.routeStatus === 'reached' ? 'bg-emerald-100 text-emerald-600 dark:bg-emerald-500/20 dark:text-emerald-400 print:text-green-700 print:bg-transparent print:border print:border-green-700 print:px-1' : 'bg-amber-100 text-amber-600 dark:bg-amber-500/20 dark:text-amber-400 print:text-orange-700 print:bg-transparent print:border print:border-orange-700 print:px-1'}`}>
                                                            {stop.routeStatus === 'reached' ? 'Reached' : 'Pending'}
                                                        </span>
                                                    </td>
                                                    <td className="p-3 text-xs font-bold text-slate-500 print:text-gray-800">{stop.reachedAt || '--:--'}</td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            )}
                            
                            <div className="mt-6 pt-4 border-t border-slate-200 dark:border-slate-700/50 flex justify-between text-[10px] text-slate-400 uppercase tracking-widest print:border-gray-200 print:text-gray-500">
                                <span>Total Stops: {routeQueue.length}</span>
                                <span>Reached: {routeQueue.filter(s => s.routeStatus === 'reached').length}</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Purchase/Sales View ---
        const PurchaseView = () => {
            const sales = useCollection('sales');
            const customers = useCollection('customers');
            const products = useCollection('products');
            const drivers = useCollection('drivers');
            const users = useCollection('users');
            const { db, auth } = useContext(FirebaseContext);
            const { addToast } = useContext(ToastContext);
            
            // Tab & Report State
            const [saleTab, setSaleTab] = useState('recent');
            const [reportFilter, setReportFilter] = useState('Today');
            const [customStartDate, setCustomStartDate] = useState('');
            const [customEndDate, setCustomEndDate] = useState('');
            const [reportSellerId, setReportSellerId] = useState('All');
            const [reportPaymentMethod, setReportPaymentMethod] = useState('All');
            const [reportCustomerSearch, setReportCustomerSearch] = useState('');

            const [isSaleModalOpen, setIsSaleModalOpen] = useState(false);
            const [isScanning, setIsScanning] = useState(false);
            const [loading, setLoading] = useState(false);
            const [formError, setFormError] = useState('');
            
            // New Sale State
            const [invoiceNo, setInvoiceNo] = useState('');
            const [saleDate, setSaleDate] = useState('');
            const [selectedCustomer, setSelectedCustomer] = useState(null);
            const [selectedDriverId, setSelectedDriverId] = useState('');
            const [paymentMethod, setPaymentMethod] = useState('Cash');
            const [discountType, setDiscountType] = useState('Cash');
            const [discountValue, setDiscountValue] = useState(0);
            const [paymentStatusToggle, setPaymentStatusToggle] = useState('Paid'); // NEW: Paid, Partial, Unpaid
            const [amountPaid, setAmountPaid] = useState(''); // NEW: Track partial payments
            const [cart, setCart] = useState([]);
            const [editingSaleId, setEditingSaleId] = useState(null);
            const [confirmSaleDeleteId, setConfirmSaleDeleteId] = useState(null);
            
            // Search States
            const [custSearch, setCustSearch] = useState('');
            const [prodSearch, setProdSearch] = useState('');

            // --- NEW: Haversine Distance Calculator (in meters) ---
            const getDistanceInMeters = (lat1, lon1, lat2, lon2) => {
                const R = 6371e3; // Earth radius in meters
                const dLat = (lat2 - lat1) * Math.PI / 180;
                const dLon = (lon2 - lon1) * Math.PI / 180;
                const a = Math.sin(dLat/2) * Math.sin(dLat/2) + 
                          Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) * Math.sin(dLon/2) * Math.sin(dLon/2);
                const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
                return R * c; 
            };

            // Robust sellerId extraction logic
            const currentUser = useMemo(() => 
                users.find(u => u.email?.toLowerCase() === auth.currentUser?.email?.toLowerCase()), 
                [users, auth.currentUser]
            );
            const sellerId = currentUser?.sellerId || auth.currentUser?.email || 'N/A';
            const currentRole = currentUser?.role || 'Staff';

            // --- NEW: Seal Sales Data Restriction ---
            const accessibleSales = useMemo(() => {
                if (currentRole === 'Admin') return sales;
                return sales.filter(s => s.sellerId === currentUser?.sellerId || s.sellerId === auth.currentUser?.email);
            }, [sales, currentRole, currentUser, auth.currentUser]);

            // --- Report Logic ---
            const filteredReportSales = useMemo(() => {
                if (!accessibleSales || accessibleSales.length === 0) return [];
                
                let startTime = 0;
                let endTime = Infinity;

                if (reportFilter === 'Custom') {
                    if (customStartDate) startTime = new Date(customStartDate).getTime();
                    if (customEndDate) {
                        const end = new Date(customEndDate);
                        end.setHours(23, 59, 59, 999);
                        endTime = end.getTime();
                    }
                } else {
                    const today = new Date();
                    today.setHours(0,0,0,0);
                    
                    if (reportFilter === 'Today') {
                        startTime = today.getTime();
                    } else if (reportFilter === 'Yesterday') {
                        const yesterday = new Date(today); 
                        yesterday.setDate(yesterday.getDate() - 1);
                        startTime = yesterday.getTime();
                        endTime = today.getTime() - 1;
                    } else if (reportFilter === 'This Week') {
                        const start = new Date(today); 
                        start.setDate(start.getDate() - start.getDay());
                        startTime = start.getTime();
                    } else if (reportFilter === 'Last Week') {
                        const start = new Date(today); 
                        start.setDate(start.getDate() - start.getDay() - 7);
                        const end = new Date(start); 
                        end.setDate(end.getDate() + 7);
                        startTime = start.getTime();
                        endTime = end.getTime() - 1;
                    } else if (reportFilter === 'This Month') {
                        startTime = new Date(today.getFullYear(), today.getMonth(), 1).getTime();
                    } else if (reportFilter === 'Last Month') {
                        startTime = new Date(today.getFullYear(), today.getMonth() - 1, 1).getTime();
                        endTime = new Date(today.getFullYear(), today.getMonth(), 1).getTime() - 1;
                    } else if (reportFilter === 'This Year') {
                        startTime = new Date(today.getFullYear(), 0, 1).getTime();
                    }
                }

                const customerSearchLower = reportCustomerSearch.toLowerCase();
                let matchingCustomerIds = null;
                if (customerSearchLower) {
                    matchingCustomerIds = new Set(customers.filter(c => 
                        (c.shopName || '').toLowerCase().includes(customerSearchLower) ||
                        (c.ownerName || '').toLowerCase().includes(customerSearchLower) ||
                        (c.contact || '').includes(customerSearchLower)
                    ).map(c => c.id));
                }

                return accessibleSales.filter(s => {
                    const t = s.createdAt ? (s.createdAt.seconds * 1000) : new Date(s.date).getTime();
                    const timeMatch = t >= startTime && t <= endTime;
                    const sellerMatch = reportSellerId === 'All' || s.sellerId === reportSellerId;
                    const paymentMatch = reportPaymentMethod === 'All' || s.paymentMethod === reportPaymentMethod;
                    
                    let customerMatch = true;
                    if (matchingCustomerIds) {
                        customerMatch = matchingCustomerIds.has(s.customerId) || (s.customerName || '').toLowerCase().includes(customerSearchLower);
                    }

                    return timeMatch && sellerMatch && paymentMatch && customerMatch;
                }).sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0));

            }, [accessibleSales, reportFilter, customStartDate, customEndDate, reportSellerId, reportPaymentMethod, reportCustomerSearch, customers]);

            const reportTotal = filteredReportSales.reduce((acc, s) => acc + (parseFloat(s.total) || 0), 0);
            
            const uniqueSellers = useMemo(() => {
                const sellers = new Set(accessibleSales.map(s => s.sellerId).filter(Boolean));
                return Array.from(sellers);
            }, [accessibleSales]);
            // --------------------

            const generateInvoiceNo = () => {
                const now = new Date();
                const d = String(now.getDate()).padStart(2, '0');
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const y = String(now.getFullYear()).slice(-2);
                const h = String(now.getHours()).padStart(2, '0');
                const min = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                return `HZN-${d}${m}${y}-${h}${min}${s}`;
            };

            const openNewSale = () => {
                setFormError('');
                setEditingSaleId(null);
                setInvoiceNo(generateInvoiceNo());
                setSaleDate(new Date().toLocaleString());
                setSelectedCustomer(null);
                setCart([]);
                setDiscountValue(0);
                setPaymentStatusToggle('Paid');
                setAmountPaid('');
                setSelectedDriverId('');
                setPaymentMethod('Cash');
                setDiscountType('Cash');
                setIsSaleModalOpen(true);
            };

            const handleEditSale = (sale) => {
                setFormError('');
                setEditingSaleId(sale.id);
                setInvoiceNo(sale.invoiceNo);
                setSaleDate(sale.date);
                const cust = customers.find(c => c.id === sale.customerId);
                setSelectedCustomer(cust || { id: sale.customerId, shopName: sale.customerName });
                setCart(sale.items || []);
                setDiscountValue(sale.discount?.value || 0);
                setDiscountType(sale.discount?.type || 'Cash');
                
                if (!sale.balanceDue || sale.balanceDue === 0) setPaymentStatusToggle('Paid');
                else if (sale.amountPaid > 0) setPaymentStatusToggle('Partial');
                else setPaymentStatusToggle('Unpaid');
                
                setAmountPaid(sale.amountPaid !== undefined ? sale.amountPaid : (sale.balanceDue > 0 ? 0 : sale.total));
                setSelectedDriverId(sale.driverId || '');
                setPaymentMethod(sale.paymentMethod || 'Cash');
                setIsSaleModalOpen(true);
            };

            const handleDeleteSale = async (id) => {
                if (confirmSaleDeleteId === id) {
                    try {
                        const { doc, deleteDoc, updateDoc } = window.firebaseSDK;
                        
                        // 1. Inventory Refund Strategy
                        const saleToDelete = sales.find(s => s.id === id);
                        if (saleToDelete && saleToDelete.items) {
                            for (const item of saleToDelete.items) {
                                const product = products.find(p => p.id === item.id);
                                if (product) {
                                    const currentQty = parseInt(product.qty) || 0;
                                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', item.id), { qty: (currentQty + item.qty).toString() });
                                }
                            }
                        }

                        // 2. Delete Order
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', id));
                        setConfirmSaleDeleteId(null);
                        addToast("Sale record voided and inventory returned.", "info");
                    } catch (e) {
                        console.error("Delete Error:", e);
                    }
                } else {
                    setConfirmSaleDeleteId(id);
                    setTimeout(() => setConfirmSaleDeleteId(null), 3000);
                }
            };

            const addToCart = (product) => {
                const existing = cart.find(item => item.id === product.id);
                if (existing) {
                    setCart(cart.map(item => item.id === product.id ? { ...item, qty: item.qty + 1 } : item));
                } else {
                    setCart([...cart, { ...product, qty: 1 }]);
                }
                setProdSearch('');
            };

            const handleScan = (scannedSku) => {
                setIsScanning(false);
                const product = products.find(p => p.sku === scannedSku);
                if (product) {
                    addToCart(product);
                    addToast(`Scanned: ${product.name}`, "success");
                } else {
                    addToast(`Unrecognized Barcode: ${scannedSku}`, "error");
                }
            };

            const cartTotal = useMemo(() => {
                const sub = cart.reduce((acc, item) => acc + (parseFloat(item.price || 0) * item.qty), 0);
                let disc = parseFloat(discountValue || 0);
                if (discountType === 'Percentage') disc = (sub * disc) / 100;
                return Math.max(0, sub - disc);
            }, [cart, discountValue, discountType]);

            const handleSaveSale = async () => {
                setFormError('');
                if (!selectedCustomer) return setFormError("Missing Field: Please select a customer first.");
                if (cart.length === 0) return setFormError("Cart Empty: Please add at least one product.");
                
                setLoading(true);
                const { collection, addDoc, updateDoc, doc, serverTimestamp } = window.firebaseSDK;
                try {
                    // --- NEW: Geofence Validation Check ---
                    let locationData = { status: 'Unknown', distance: null, lat: null, lng: null };
                    
                    if (selectedCustomer.lat && selectedCustomer.lng) {
                        try {
                            const pos = await new Promise((resolve, reject) => {
                                navigator.geolocation.getCurrentPosition(resolve, reject, { 
                                    timeout: 10000, 
                                    enableHighAccuracy: true 
                                });
                            });
                            
                            const dist = getDistanceInMeters(
                                pos.coords.latitude, pos.coords.longitude, 
                                parseFloat(selectedCustomer.lat), parseFloat(selectedCustomer.lng)
                            );
                            
                            locationData = {
                                status: dist <= 100 ? 'Verified' : 'Off-Site',
                                distance: Math.round(dist),
                                lat: pos.coords.latitude,
                                lng: pos.coords.longitude
                            };
                        } catch (err) {
                            console.warn("Geofence check failed or GPS denied.", err);
                            locationData.status = 'GPS Denied/Failed';
                        }
                    } else {
                        locationData.status = 'Customer Missing GPS';
                    }

                    // --- 1. Calculate Inventory Net Changes ---
                    const stockChanges = {}; 
                    
                    if (editingSaleId) {
                        const oldSale = accessibleSales.find(s => s.id === editingSaleId);
                        const oldCart = oldSale?.items || [];
                        oldCart.forEach(item => {
                            stockChanges[item.id] = (stockChanges[item.id] || 0) + item.qty;
                        });
                    }
                    
                    cart.forEach(item => {
                        stockChanges[item.id] = (stockChanges[item.id] || 0) - item.qty;
                    });

                    // --- 1.5 Calculate Payments & Debt ---
                    let finalAmountPaid = 0;
                    if (paymentStatusToggle === 'Paid') {
                        finalAmountPaid = cartTotal;
                    } else if (paymentStatusToggle === 'Unpaid') {
