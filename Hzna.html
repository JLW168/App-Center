<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OnSale CRM - Outdoor Sales Tracker</title>
    
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Performance Hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://www.gstatic.com">

    <!-- Google Fonts (Khmer & English) -->
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Moul&family=Siemreap&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Battambang', 'Siemreap', 'sans-serif'],
                        display: ['Moul', 'Inter', 'sans-serif'],
                    },
                }
            }
        }
    </script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- React & Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

    <style>
        @import url('https://rsms.me/inter/inter.css');
        html, body { 
            font-family: 'Inter', 'Battambang', 'Siemreap', sans-serif;
            overflow-x: hidden; 
            overscroll-behavior-x: none;
            background-color: #0f172a;
        }
        
        .font-khmer-header { font-family: 'Moul', cursive; }

        /* Splash Screen */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0f172a; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.3s ease-out, visibility 0.3s;
        }
        .splash-loader {
            width: 40px; height: 40px;
            border: 4px solid #3b82f6; border-bottom-color: transparent;
            border-radius: 50%; display: inline-block;
            box-sizing: border-box; animation: rotation 0.8s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Optimized Forms */
        .input, .select {
            margin-top: 0.25rem; display: block; width: 100%; padding: 0.75rem 1rem;
            border-width: 1px; border-color: #475569; border-radius: 0.75rem;
            background-color: #1e293b; color: #f1f5f9; outline: none; transition: border-color 0.2s, background-color 0.2s;
        }
        .input:focus, .select:focus { border-color: #3b82f6; background-color: #0f172a; }

        /* Animations */
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #475569; border-radius: 10px; }

        .login-gradient { background: radial-gradient(circle at top right, #1e293b, #0f172a); }
        .glass-panel { background: rgba(30, 41, 59, 0.6); backdrop-filter: blur(8px); border: 1px solid rgba(255,255,255,0.05); }
        .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; }

        /* Table Premium Styles */
        .tr-hover:hover { background-color: rgba(59, 130, 246, 0.05); }
        .text-shadow-glow { text-shadow: 0 0 10px rgba(16, 185, 129, 0.3); }
    </style>
</head>
<body class="bg-slate-900 text-slate-300">
    <div id="splash-screen">
        <span class="splash-loader"></span>
        <h2 style="color: white; font-weight: 600; font-size: 14px; letter-spacing: 0.05em;">ONSALE CRM</h2>
    </div>

    <div id="root"></div>

    <!-- Firebase SDK (v11) -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, serverTimestamp, setDoc, enableIndexedDbPersistence, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseSDK = {
            initializeApp, getAuth, getFirestore, collection, onSnapshot,
            doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, serverTimestamp,
            signInWithEmailAndPassword, onAuthStateChanged, signOut, setDoc, 
            createUserWithEmailAndPassword, enableIndexedDbPersistence, getDocs
        };
    </script>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, createContext, useContext, memo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAYb0HKLnEUuhrVcQlXACsxFk28w99qAkc",
            authDomain: "onsale-product.firebaseapp.com",
            projectId: "onsale-product",
            storageBucket: "onsale-product.firebasestorage.app",
            messagingSenderId: "837098663012",
            appId: "1:837098663012:web:cb61b9bd7f99ec4d6e8371"
        };
        
        const appId = 'onsale-crm-app';

        const FirebaseContext = createContext(null);
        const useFirebase = () => useContext(FirebaseContext);

        const FirebaseProvider = ({ children }) => {
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);
            const [currentUser, setCurrentUser] = useState(null);
            const [userProfile, setUserProfile] = useState(() => {
                try { return JSON.parse(localStorage.getItem('app_user_profile')) || null; } catch(e) { return null; }
            });
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const { initializeApp, getFirestore, getAuth, onAuthStateChanged, enableIndexedDbPersistence } = window.firebaseSDK;
                const app = initializeApp(firebaseConfig);
                const dbInstance = getFirestore(app);
                const authInstance = getAuth(app);
                setAuth(authInstance); setDb(dbInstance);
                enableIndexedDbPersistence(dbInstance).catch(() => {});
                return onAuthStateChanged(authInstance, (user) => {
                    setCurrentUser(user);
                    if (!user) { setUserProfile(null); localStorage.removeItem('app_user_profile'); setLoading(false); }
                });
            }, []);

            useEffect(() => {
                if (!db || !currentUser) return;
                const { doc, onSnapshot } = window.firebaseSDK;
                const userRef = doc(db, 'artifacts', appId, 'users', currentUser.uid);
                return onSnapshot(userRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const profileData = { id: docSnap.id, ...docSnap.data() };
                        setUserProfile(profileData);
                        localStorage.setItem('app_user_profile', JSON.stringify(profileData));
                    } else {
                        setUserProfile({ name: currentUser.email || 'User', role: 'Staff', uid: currentUser.uid });
                    }
                    setLoading(false);
                }, () => { 
                    setUserProfile({ name: currentUser.email || 'User', role: 'Staff', uid: currentUser.uid });
                    setLoading(false); 
                });
            }, [db, currentUser]);

            return <FirebaseContext.Provider value={{ db, auth, currentUser, userProfile, loading }}>{children}</FirebaseContext.Provider>;
        };

        const AppDataContext = createContext(null);
        const useAppData = () => useContext(AppDataContext);

        const AppDataProvider = ({ children }) => {
            const { db, currentUser } = useFirebase();
            const [systemConfig, setSystemConfig] = useState({ appName: 'OnSale CRM' });
            useEffect(() => {
                if(!db || !currentUser) return;
                const { doc, onSnapshot } = window.firebaseSDK;
                const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'systemConfig', 'global');
                return onSnapshot(configRef, (snapshot) => {
                    if (snapshot.exists()) setSystemConfig(snapshot.data());
                });
            }, [db, currentUser]);
            return <AppDataContext.Provider value={{ systemConfig }}>{children}</AppDataContext.Provider>;
        };

        // === UI KIT ===
        const Button = memo(({ children, onClick, variant = 'primary', icon, disabled = false, type = 'button', className = '' }) => {
            const base = 'font-bold rounded-xl shadow-sm transition-all flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed transform active:scale-95';
            const variants = {
                primary: 'bg-blue-600 text-white hover:bg-blue-500 px-6 py-2.5',
                secondary: 'bg-slate-700 text-slate-200 hover:bg-slate-600 px-4 py-2',
                danger: 'bg-red-600 text-white hover:bg-red-500 px-4 py-2',
            };
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`${base} ${variants[variant] || variants.primary} ${className}`}>
                    {icon && <i className={`fas ${icon}`}></i>} {children}
                </button>
            );
        });

        const Modal = ({ isOpen, onClose, children, maxWidth = "max-w-2xl" }) => { 
            if (!isOpen) return null; 
            return ReactDOM.createPortal(
                <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-black/60 backdrop-blur-sm">
                    <div className={`relative bg-slate-800 rounded-2xl shadow-2xl w-full ${maxWidth} border border-slate-700 flex flex-col max-h-[90vh]`}>
                        {children}
                    </div>
                </div>, document.body
            ); 
        };
        const ModalHeader = ({ title, onClose }) => (<div className="p-5 border-b border-slate-700 flex justify-between items-center"><h3 className="text-xl font-bold text-white">{title}</h3><button onClick={onClose} className="text-slate-400 hover:text-white transition-colors"><i className="fas fa-times text-lg"></i></button></div>);
        const ModalBody = ({ children }) => (<div className="p-6 flex-1 overflow-y-auto custom-scrollbar">{children}</div>);
        const ModalFooter = ({ children }) => (<div className="p-4 bg-slate-900/50 border-t border-slate-700 flex justify-end gap-3 rounded-b-2xl">{children}</div>);

        const useCollection = (collectionName) => {
            const { db, currentUser } = useFirebase();
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            useEffect(() => {
                if (!db || !currentUser) return;
                const { collection, onSnapshot } = window.firebaseSDK;
                const ref = collection(db, 'artifacts', appId, 'public', 'data', collectionName);
                return onSnapshot(ref, (snapshot) => {
                    const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    docs.sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
                    setData(docs); setLoading(false);
                }, () => setLoading(false));
            }, [db, currentUser, collectionName]);
            return { data, loading };
        };

        // === CUSTOMER MODAL ===
        const CustomerModal = ({ isOpen, onClose, customer }) => {
            const { db, currentUser, userProfile } = useFirebase();
            const [formData, setFormData] = useState({
                name: '', contactPerson: '', phone: '', type: 'Retail', status: 'Active', 
                address: '', lat: '', lng: '', notes: '', sellerName: '', createdBy: ''
            });
            const [isSaving, setIsSaving] = useState(false);
            const [isGettingGPS, setIsGettingGPS] = useState(false);
            const [allSellers, setAllSellers] = useState([]);

            const isAdmin = userProfile?.role?.toLowerCase() === 'admin';

            useEffect(() => {
                if (isOpen && isAdmin && db) {
                    const { collection, getDocs } = window.firebaseSDK;
                    getDocs(collection(db, 'artifacts', appId, 'users')).then(snap => {
                        setAllSellers(snap.docs.map(doc => ({ id: doc.id, name: doc.data().sellerName || doc.data().name })));
                    });
                }
            }, [isOpen, isAdmin, db]);

            useEffect(() => {
                if (customer) setFormData({ ...customer });
                else setFormData({ name: '', contactPerson: '', phone: '', type: 'Retail', status: 'Active', address: '', lat: '', lng: '', notes: '', sellerName: userProfile?.sellerName || userProfile?.name || '', createdBy: currentUser?.uid || '' });
            }, [customer, isOpen, userProfile, currentUser]);

            const handleChange = (e) => {
                const { name, value } = e.target;
                if (name === 'assignedSellerId' && isAdmin) {
                    const selected = allSellers.find(s => s.id === value);
                    setFormData(prev => ({ ...prev, createdBy: selected ? selected.id : '', sellerName: selected ? selected.name : '' }));
                } else setFormData(prev => ({ ...prev, [name]: value }));
            };

            const handleGetLocation = () => {
                setIsGettingGPS(true);
                navigator.geolocation.getCurrentPosition((p) => { setFormData(prev => ({ ...prev, lat: p.coords.latitude, lng: p.coords.longitude })); setIsGettingGPS(false); }, () => { alert("Check GPS Permissions"); setIsGettingGPS(false); }, { enableHighAccuracy: true });
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.createdBy) { alert("Select Seller"); return; }
                setIsSaving(true);
                const { collection, doc, addDoc, updateDoc, serverTimestamp } = window.firebaseSDK;
                const ref = collection(db, 'artifacts', appId, 'public', 'data', 'customers');
                try {
                    if (customer?.id) await updateDoc(doc(ref, customer.id), { ...formData, updatedAt: serverTimestamp() });
                    else await addDoc(ref, { ...formData, createdAt: serverTimestamp(), updatedAt: serverTimestamp() });
                    onClose();
                } catch (err) { alert(err.message); } finally { setIsSaving(false); }
            };

            return (
                <Modal isOpen={isOpen} onClose={onClose} maxWidth="max-w-3xl">
                    <form onSubmit={handleSubmit} className="flex flex-col h-full overflow-hidden">
                        <ModalHeader title={customer ? "Edit Customer" : "Add New Customer"} onClose={onClose} />
                        <ModalBody>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                <div className="md:col-span-2">
                                    <label className="text-[11px] font-black uppercase text-blue-500 tracking-widest mb-1.5 block">Business / Shop Name *</label>
                                    <input name="name" value={formData.name} onChange={handleChange} className="input border-blue-500/20" required placeholder="Dara Supermarket" />
                                </div>
                                <div>
                                    <label className="text-[11px] font-black uppercase text-slate-500 tracking-widest mb-1.5 block">Contact Person</label>
                                    <input name="contactPerson" value={formData.contactPerson} onChange={handleChange} className="input" placeholder="Owner Name" />
                                </div>
                                <div>
                                    <label className="text-[11px] font-black uppercase text-slate-500 tracking-widest mb-1.5 block">Assigned Seller</label>
                                    {isAdmin ? (
                                        <select name="assignedSellerId" value={formData.createdBy} onChange={handleChange} className="select font-bold"><option value="">Select Seller...</option>{allSellers.map(s => <option key={s.id} value={s.id}>{s.name}</option>)}</select>
                                    ) : <div className="relative"><input value={formData.sellerName} className="input bg-slate-800/50 text-slate-500" readOnly /><i className="fas fa-lock absolute right-4 top-1/2 -translate-y-1/2 text-slate-600"></i></div>}
                                </div>
                                <div><label className="text-[11px] font-black uppercase text-slate-500 tracking-widest mb-1.5 block">Phone Number *</label><input name="phone" value={formData.phone} onChange={handleChange} className="input" required /></div>
                                <div><label className="text-[11px] font-black uppercase text-slate-500 tracking-widest mb-1.5 block">Category</label><select name="type" value={formData.type} onChange={handleChange} className="select"><option value="Retail">Retail Store</option><option value="Wholesale">Wholesale</option><option value="Prospect">Prospect</option></select></div>
                                <div><label className="text-[11px] font-black uppercase text-slate-500 tracking-widest mb-1.5 block">Status</label><select name="status" value={formData.status} onChange={handleChange} className="select"><option value="Active">Active</option><option value="Inactive">Inactive</option></select></div>
                                <div className="md:col-span-2"><label className="text-[11px] font-black uppercase text-slate-500 tracking-widest mb-1.5 block">Full Address</label><textarea name="address" value={formData.address} onChange={handleChange} className="input" rows="2" /></div>
                                <div className="md:col-span-2 bg-slate-900/50 p-4 rounded-xl border border-slate-700 flex justify-between items-center">
                                    <div className="flex items-center gap-3"><div className="w-10 h-10 rounded-lg bg-amber-500/10 flex items-center justify-center"><i className="fas fa-location-dot text-amber-500"></i></div><div><p className="text-[10px] font-black text-slate-500 uppercase">GPS Pinned</p><p className="text-slate-200 font-mono text-xs">{formData.lat ? `${formData.lat.toFixed(6)}, ${formData.lng.toFixed(6)}` : 'Location not pinned'}</p></div></div>
                                    <Button type="button" variant="secondary" onClick={handleGetLocation} disabled={isGettingGPS} className="text-xs px-4">{isGettingGPS ? <i className="fas fa-spinner fa-spin"></i> : 'Update GPS'}</Button>
                                </div>
                            </div>
                        </ModalBody>
                        <ModalFooter><Button type="button" variant="secondary" onClick={onClose}>Cancel</Button><Button type="submit" disabled={isSaving}>{isSaving ? 'Processing...' : 'Save Record'}</Button></ModalFooter>
                    </form>
                </Modal>
            );
        };

        // === DIRECTORY PAGE ===
        const CustomersPage = () => {
            const { db, userProfile, currentUser } = useFirebase();
            const { data: customers, loading } = useCollection('customers');
            const [search, setSearch] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editTarget, setEditTarget] = useState(null);
            
            // Delete State
            const [deleteTarget, setDeleteTarget] = useState(null);
            const [isDeleting, setIsDeleting] = useState(false);

            const filtered = useMemo(() => {
                const isAdmin = userProfile?.role?.toLowerCase() === 'admin';
                return customers.filter(c => {
                    const isOwner = isAdmin || c.createdBy === currentUser?.uid;
                    const match = c.name?.toLowerCase().includes(search.toLowerCase()) || c.phone?.includes(search);
                    return isOwner && match;
                });
            }, [customers, search, userProfile, currentUser]);

            const handleDeleteRequest = (customer) => {
                setDeleteTarget(customer);
            };

            const confirmDelete = async () => {
                if (!deleteTarget) return;
                setIsDeleting(true);
                const { doc, deleteDoc } = window.firebaseSDK;
                try {
                    const customerRef = doc(db, 'artifacts', appId, 'public', 'data', 'customers', deleteTarget.id);
                    await deleteDoc(customerRef);
                    setDeleteTarget(null);
                } catch (err) {
                    alert("Delete failed: " + err.message);
                } finally {
                    setIsDeleting(false);
                }
            };

            return (
                <div className="space-y-6 animate-fade-in pb-10">
                    <div className="flex flex-col md:flex-row md:items-center justify-between gap-4">
                        <div>
                            <h3 className="text-2xl font-black text-white tracking-tight">Directory</h3>
                            <p className="text-[11px] text-slate-500 font-black uppercase tracking-[0.2em] mt-1">Customer Management</p>
                        </div>
                        <div className="flex gap-3">
                            <div className="relative group flex-1 md:w-64">
                                <i className="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-500 group-focus-within:text-blue-500 transition-colors"></i>
                                <input placeholder="Quick search..." className="input !mt-0 pl-11 h-11 w-full text-sm" value={search} onChange={e=>setSearch(e.target.value)} />
                            </div>
                            <Button icon="fa-plus" onClick={() => {setEditTarget(null); setIsModalOpen(true);}} className="bg-emerald-600 hover:bg-emerald-500 h-11">Add Shop</Button>
                        </div>
                    </div>

                    {/* RECENT ACTIVITY CARDS (UPDATED WITH OPEN MAP ICON) */}
                    {!search && filtered.length > 0 && (
                        <div className="space-y-3 animate-fade-in">
                            <h4 className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em] flex items-center gap-2">
                                <i className="fas fa-history"></i> Recent Activity
                            </h4>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                {filtered.slice(0, 2).map(c => (
                                    <div key={c.id} className="bg-slate-800 border border-emerald-500/30 rounded-2xl p-5 shadow-lg flex flex-col relative overflow-hidden group">
                                        <div className="flex justify-between items-start mb-3">
                                            <div className="pr-10">
                                                <div className="flex items-center gap-2 mb-1">
                                                    <span className="text-[9px] font-black text-emerald-400 uppercase tracking-widest bg-emerald-500/10 px-2 py-0.5 rounded-full border border-emerald-500/20">New Entry</span>
                                                    <span className={`px-2 py-0.5 rounded-lg text-[8px] font-black uppercase tracking-widest border shadow-sm ${
                                                        c.type === 'Retail' ? 'bg-blue-500/10 text-blue-400 border-blue-500/20' : 
                                                        c.type === 'Wholesale' ? 'bg-indigo-500/10 text-indigo-400 border-indigo-500/20' : 
                                                        'bg-amber-500/10 text-amber-400 border-amber-500/20'
                                                    }`}>
                                                        {c.type}
                                                    </span>
                                                </div>
                                                <h4 className="font-bold text-lg text-white leading-tight">{c.name}</h4>
                                            </div>
                                            
                                            {/* UTILITY ICONS AREA */}
                                            <div className="flex items-center gap-1 -mt-2 -mr-2">
                                                {/* OPEN MAP ICON ADDED HERE */}
                                                {c.lat && (
                                                    <a href={`https://www.google.com/maps/search/?api=1&query=${c.lat},${c.lng}`} target="_blank" className="text-slate-600 hover:text-blue-400 transition-colors p-2" title="Open Map">
                                                        <i className="fas fa-location-arrow text-xs"></i>
                                                    </a>
                                                )}
                                                <button onClick={() => handleDeleteRequest(c)} className="text-slate-600 hover:text-red-500 transition-colors p-2" title="Delete">
                                                    <i className="fas fa-trash-alt text-xs"></i>
                                                </button>
                                            </div>
                                        </div>
                                        
                                        <div className="space-y-2 mb-4 text-sm relative z-10 flex-1">
                                            <div className="flex items-center gap-2">
                                                <div className="w-5 h-5 rounded bg-slate-700/50 flex items-center justify-center">
                                                    <i className="fas fa-user-tie text-[10px] text-slate-400"></i>
                                                </div>
                                                <span className="text-slate-300 font-bold text-xs">{c.contactPerson || 'No contact person'}</span>
                                            </div>
                                            
                                            <a href={`tel:${c.phone}`} className="text-blue-400 hover:text-blue-300 flex items-center gap-2 font-bold tracking-tight transition-all">
                                                <div className="w-5 h-5 rounded bg-blue-500/10 flex items-center justify-center">
                                                    <i className="fas fa-phone-alt text-[10px]"></i>
                                                </div>
                                                <span className="text-xs">{c.phone}</span>
                                            </a>
                                            
                                            <div className="flex items-start gap-2">
                                                <div className="w-5 h-5 rounded bg-slate-700/50 flex items-center justify-center mt-0.5">
                                                    <i className="fas fa-map-marker-alt text-[10px] text-slate-400"></i>
                                                </div>
                                                <span className="text-[11px] text-slate-400 leading-tight line-clamp-2 italic">{c.address || 'No address specified'}</span>
                                            </div>
                                        </div>

                                        <div className="pt-3 border-t border-slate-700/50 flex justify-between items-center">
                                            <div className="text-[9px] text-slate-500 font-black uppercase flex items-center gap-1.5">
                                                <i className="fas fa-user-circle text-[10px]"></i>
                                                <span>Owned by: <span className="text-slate-300">{c.sellerName || 'System'}</span></span>
                                            </div>
                                            <button onClick={() => {setEditTarget(c); setIsModalOpen(true);}} className="text-[10px] font-black uppercase tracking-wider text-emerald-400 bg-emerald-500/5 hover:bg-emerald-600 hover:text-white px-3 py-1.5 rounded-lg border border-emerald-500/20 transition-all">Quick Edit</button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <div className="bg-slate-800/40 rounded-3xl border border-slate-700/50 overflow-hidden shadow-2xl backdrop-blur-sm">
                        <div className="table-responsive custom-scrollbar">
                            <table className="w-full text-left text-sm border-collapse min-w-[900px]">
                                <thead>
                                    <tr className="bg-slate-900/60 text-slate-400 font-black uppercase text-[10px] tracking-[0.15em] border-b border-slate-700">
                                        <th className="px-6 py-5">Shop & Location</th>
                                        <th className="px-6 py-5">Contact Details</th>
                                        <th className="px-6 py-5">Classification</th>
                                        <th className="px-6 py-5">Status</th>
                                        <th className="px-6 py-5">Assigned Seller</th>
                                        <th className="px-6 py-5 text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-800/50">
                                    {loading ? (
                                        <tr><td colSpan="6" className="py-24 text-center"><i className="fas fa-circle-notch fa-spin text-4xl text-blue-600 mb-4 block mx-auto"></i><p className="text-slate-500 font-bold uppercase tracking-widest">Syncing Records...</p></td></tr>
                                    ) : filtered.length === 0 ? (
                                        <tr><td colSpan="6" className="py-24 text-center text-slate-500 italic uppercase tracking-widest font-black opacity-30">No Records Found</td></tr>
                                    ) : filtered.map(c => (
                                        <tr key={c.id} className="tr-hover transition-all group">
                                            <td className="px-6 py-5">
                                                <div className="font-bold text-slate-100 text-base leading-tight group-hover:text-blue-400 transition-colors">{c.name}</div>
                                                <div className="text-[11px] text-slate-500 mt-1 flex items-center gap-1.5 max-w-[220px] truncate">
                                                    <i className="fas fa-map-pin text-[8px] opacity-40"></i>
                                                    {c.address || 'No address specified'}
                                                </div>
                                            </td>
                                            <td className="px-6 py-5">
                                                <div className="flex flex-col gap-1.5">
                                                    <a href={`tel:${c.phone}`} className="font-mono text-xs font-black text-blue-400 hover:text-blue-300 tracking-wider bg-blue-500/10 w-fit px-2 py-0.5 rounded border border-blue-500/20 block transition-all active:scale-95 shadow-sm" title="Click to Call">
                                                        <i className="fas fa-phone-alt text-[8px] mr-1 opacity-70"></i>
                                                        {c.phone}
                                                    </a>
                                                    <div className="text-[10px] font-bold text-slate-500 uppercase ml-0.5">{c.contactPerson || 'Unknown Contact'}</div>
                                                </div>
                                            </td>
                                            <td className="px-6 py-5">
                                                <span className={`px-2.5 py-1 rounded-lg text-[9px] font-black uppercase tracking-widest border shadow-sm ${
                                                    c.type === 'Retail' ? 'bg-blue-500/10 text-blue-400 border-blue-500/20' : 
                                                    c.type === 'Wholesale' ? 'bg-indigo-500/10 text-indigo-400 border-indigo-500/20' : 
                                                    'bg-amber-500/10 text-amber-400 border-amber-500/20'
                                                }`}>
                                                    {c.type}
                                                </span>
                                            </td>
                                            <td className="px-6 py-5">
                                                <div className="flex items-center gap-2">
                                                    <div className={`w-2 h-2 rounded-full shadow-[0_0_8px] ${c.status === 'Active' ? 'bg-emerald-500 shadow-emerald-500/50' : 'bg-slate-600 shadow-transparent'}`}></div>
                                                    <span className={`text-[10px] font-black uppercase tracking-widest ${c.status === 'Active' ? 'text-emerald-400 text-shadow-glow' : 'text-slate-500'}`}>{c.status}</span>
                                                </div>
                                            </td>
                                            <td className="px-6 py-5">
                                                <div className="flex items-center gap-2.5">
                                                    <div className="w-7 h-7 rounded-lg bg-blue-600/10 flex items-center justify-center text-[10px] font-black text-blue-400 border border-blue-500/10">
                                                        {c.sellerName?.charAt(0)}
                                                    </div>
                                                    <div className="flex flex-col">
                                                        <span className="text-xs font-bold text-slate-300">{c.sellerName}</span>
                                                        <span className="text-[8px] text-slate-500 uppercase font-black tracking-widest">Territory Owner</span>
                                                    </div>
                                                </div>
                                            </td>
                                            <td className="px-6 py-5 text-right">
                                                <div className="flex justify-end gap-2">
                                                    {c.lat && (
                                                        <a href={`https://www.google.com/maps/search/?api=1&query=${c.lat},${c.lng}`} target="_blank" className="w-9 h-9 flex items-center justify-center text-blue-400 hover:bg-blue-500 hover:text-white rounded-xl transition-all border border-blue-500/10" title="Open Map">
                                                            <i className="fas fa-location-arrow text-sm"></i>
                                                        </a>
                                                    )}
                                                    <button onClick={() => {setEditTarget(c); setIsModalOpen(true);}} className="w-9 h-9 flex items-center justify-center text-slate-400 hover:bg-slate-700 hover:text-white rounded-xl transition-all border border-slate-700" title="Edit Entry">
                                                        <i className="fas fa-pen-to-square text-sm"></i>
                                                    </button>
                                                    <button onClick={() => handleDeleteRequest(c)} className="w-9 h-9 flex items-center justify-center text-slate-600 hover:bg-red-900/20 hover:text-red-500 rounded-xl transition-all border border-transparent hover:border-red-900/30" title="Delete Record">
                                                        <i className="fas fa-trash-alt text-sm"></i>
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    
                    <Modal isOpen={!!deleteTarget} onClose={() => setDeleteTarget(null)} maxWidth="max-w-md">
                        <ModalHeader title="Confirm Deletion" onClose={() => setDeleteTarget(null)} />
                        <ModalBody className="text-center py-6">
                            <div className="w-20 h-20 bg-red-500/10 rounded-full flex items-center justify-center mx-auto mb-6">
                                <i className="fas fa-trash-alt text-3xl text-red-500"></i>
                            </div>
                            <h4 className="text-xl font-bold text-white mb-2">Delete Customer?</h4>
                            <p className="text-slate-400 px-4 leading-relaxed">Are you sure you want to remove <span className="text-white font-bold">{deleteTarget?.name}</span>? This action cannot be undone.</p>
                        </ModalBody>
                        <ModalFooter>
                            <Button variant="secondary" onClick={() => setDeleteTarget(null)}>Cancel</Button>
                            <Button variant="danger" onClick={confirmDelete} disabled={isDeleting}>{isDeleting ? <i className="fas fa-spinner fa-spin"></i> : 'Confirm Delete'}</Button>
                        </ModalFooter>
                    </Modal>

                    <CustomerModal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} customer={editTarget} />
                </div>
            );
        };

        // === LOGIN PAGE ===
        const LoginPage = () => {
            const { auth } = useFirebase();
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');
            const handleLogin = async (e) => { e.preventDefault(); setLoading(true); setError(''); try { await window.firebaseSDK.signInWithEmailAndPassword(auth, email, password); } catch (err) { setError("Authentication failed."); setLoading(false); } };
            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-[#0f172a] overflow-hidden">
                    <div className="hidden md:flex md:w-1/2 login-gradient p-16 flex-col justify-between border-r border-slate-800">
                        <div>
                            <div className="w-16 h-16 rounded-2xl bg-blue-600 flex items-center justify-center shadow-xl shadow-blue-500/20 mb-8"><i className="fas fa-rocket text-white text-2xl"></i></div>
                            <h1 className="text-5xl font-black text-white leading-tight font-khmer-header mb-6">OnSale CRM</h1>
                            <p className="text-slate-400 text-xl font-medium tracking-tight max-w-sm">Smart tracking for professional field sales teams.</p>
                        </div>
                        <p className="text-slate-500 text-xs font-black uppercase tracking-[0.3em]">Version 2.5.5</p>
                    </div>
                    <div className="flex-1 flex items-center justify-center p-6 relative">
                        <div className="w-full max-w-sm animate-fade-in z-10">
                            <div className="md:hidden flex flex-col items-center mb-10 text-center">
                                <div className="w-12 h-12 rounded-xl bg-blue-600 flex items-center justify-center shadow-lg mb-4"><i className="fas fa-rocket text-white"></i></div>
                                <h1 className="text-2xl font-black text-white font-khmer-header">OnSale CRM</h1>
                            </div>
                            <div className="glass-panel p-8 sm:p-10 rounded-[2.5rem] shadow-2xl">
                                <div className="mb-8"><h2 className="text-2xl font-bold text-white mb-1">Sign In</h2><p className="text-slate-400 text-sm">Enter your account details</p></div>
                                {error && <div className="mb-6 p-4 bg-red-900/40 text-red-200 rounded-xl text-xs font-bold border border-red-500/20">{error}</div>}
                                <form onSubmit={handleLogin} className="space-y-6">
                                    <div><label className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1">Email</label><input type="email" className="input h-14" value={email} onChange={e=>setEmail(e.target.value)} required /></div>
                                    <div><label className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1">Password</label><input type="password" className="input h-14" value={password} onChange={e=>setPassword(e.target.value)} required /></div>
                                    <Button type="submit" className="w-full h-14 text-lg" disabled={loading}>{loading ? <i className="fas fa-spinner fa-spin"></i> : 'Log In'}</Button>
                                    <div className="mt-10 text-center"><p className="text-slate-500 text-[10px] font-black uppercase tracking-[0.2em]">AI - <span className="text-slate-300">Jelly Wang</span></p></div>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const AppContent = () => {
            const { userProfile, loading, auth } = useFirebase();
            const { systemConfig } = useAppData();
            const [page, setPage] = useState('customers');
            const [launchpad, setLaunchpad] = useState(false);
            useEffect(() => { if (!loading) { const s = document.getElementById('splash-screen'); if (s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 300); } } }, [loading]);
            if (loading) return null;
            if (!userProfile) return <LoginPage />;
            return (
                <div className="flex h-screen bg-[#0f172a] text-slate-300 font-sans overflow-hidden">
                    <div className="flex-1 flex flex-col min-w-0">
                        <header className="px-6 py-4 flex justify-between items-center bg-slate-900/80 border-b border-slate-800 backdrop-blur-md sticky top-0 z-40">
                            <div className="flex items-center gap-4">
                                <button onClick={() => setLaunchpad(true)} className="p-3 bg-slate-800 rounded-xl text-slate-400 border border-slate-700 active:scale-95 transition-all hover:bg-slate-700"><i className="fas fa-th-large"></i></button>
                                <span className="font-black text-white text-lg font-khmer-header tracking-tight">{systemConfig?.appName}</span>
                            </div>
                            <div className="flex items-center gap-4">
                                <div className="hidden sm:flex flex-col items-end">
                                    <span className="text-[10px] font-black text-white uppercase">{userProfile.sellerName || userProfile.name}</span>
                                    <span className="text-[9px] text-emerald-500 font-bold uppercase tracking-widest">{userProfile.role}</span>
                                </div>
                                <button onClick={() => window.firebaseSDK.signOut(auth)} className="px-4 py-2 bg-red-900/20 text-red-500 text-[10px] font-black uppercase rounded-lg border border-red-500/20 active:scale-95 transition-all hover:bg-red-500 hover:text-white">Logout</button>
                            </div>
                        </header>
                        <main className="flex-1 overflow-y-auto p-6 bg-[#0f172a]"><div className="max-w-7xl mx-auto">{page === 'customers' ? <CustomersPage /> : <div className="p-20 text-center italic text-slate-500 text-xs uppercase tracking-widest">Implementation coming soon...</div>}</div></main>
                    </div>
                    {launchpad && (
                        <div className="fixed inset-0 z-50 bg-slate-900/95 backdrop-blur-xl flex flex-col animate-fade-in">
                            <header className="p-6 flex justify-between items-center max-w-6xl mx-auto w-full"><h1 className="text-xl font-black text-white font-khmer-header">{systemConfig?.appName}</h1><button onClick={() => setLaunchpad(false)} className="w-10 h-10 flex items-center justify-center bg-slate-800 rounded-full border border-slate-700"><i className="fas fa-times text-lg"></i></button></header>
                            <div className="flex-1 p-6 grid grid-cols-2 sm:grid-cols-3 md:grid-cols-5 gap-6 max-w-6xl mx-auto w-full">
                                {['customers', 'visits', 'orders', 'products', 'settings'].map(m => (
                                    <button key={m} onClick={() => {setPage(m); setLaunchpad(false);}} className="bg-slate-800/50 aspect-square rounded-[2rem] border border-slate-700 flex flex-col items-center justify-center gap-4 hover:border-blue-500 active:scale-95 transition-all group">
                                        <i className={`fas fa-${m === 'customers' ? 'store' : m === 'visits' ? 'location-dot' : 'sliders'} text-3xl text-blue-400 group-hover:scale-110 transition-transform`}></i>
                                        <span className="text-[10px] font-black uppercase tracking-widest text-slate-400 group-hover:text-white">{m}</span>
                                    </button>
                                ))}
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => (<FirebaseProvider><AppDataProvider><AppContent /></AppDataProvider></FirebaseProvider>);
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
