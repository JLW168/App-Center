<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ounna Outdoor Sales Tracker</title>
    
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Moul&family=Siemreap&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

    <!-- Cropper.js -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Battambang', 'Siemreap', 'sans-serif'],
                        display: ['Moul', 'Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        slate: {
                            750: '#1e293b',
                            850: '#0f172a',
                            900: '#0f172a', 
                            950: '#020617',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.6s ease-out forwards',
                        'bounce-short': 'bounceShort 1.5s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            from: { opacity: '0', transform: 'translateY(10px)' },
                            to: { opacity: '1', transform: 'translateY(0)' }
                        },
                        bounceShort: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-6px)' },
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

    <style>
        html, body { 
            font-family: 'Inter', 'Battambang', 'Siemreap', sans-serif;
            overflow-x: hidden; 
            background-color: #0f172a;
            color: #cbd5e1;
            height: 100%;
        }
        .font-khmer-header { font-family: 'Moul', cursive; }
        
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0f172a; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease-out;
        }

        .input, .select, .textarea {
            display: block; width: 100%; padding: 0.75rem 1rem;
            border: 1px solid #334155; border-radius: 0.85rem;
            background-color: #1e293b; color: #f1f5f9; outline: none; transition: all 0.2s;
            font-size: 14px;
        }
        .input:focus, .select:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }

        .logo-gradient-text {
            background: linear-gradient(135deg, #60a5fa, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .squircle { border-radius: 28px; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }

        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
        .safe-pt { padding-top: env(safe-area-inset-top); }

        .avatar-circle-box {
            position: relative; width: 140px; height: 140px; border-radius: 50%;
            background: #1e293b; border: 2px solid #334155; display: flex;
            align-items: center; justify-content: center; cursor: pointer;
            transition: all 0.3s ease; overflow: hidden;
        }
        .avatar-circle-box:hover { border-color: #3b82f6; box-shadow: 0 0 20px rgba(59, 130, 246, 0.2); }
    </style>
</head>
<body class="bg-slate-900">
    <div id="splash-screen">
        <div class="w-12 h-12 border-4 border-blue-500 border-b-transparent rounded-full animate-spin mb-4"></div>
        <h2 class="text-xs font-black text-white tracking-[0.3em] uppercase opacity-80">Ounna CRM</h2>
    </div>

    <div id="root"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, serverTimestamp, setDoc, enableIndexedDbPersistence, getDocs, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseSDK = {
            initializeApp, getAuth, getFirestore, collection, onSnapshot,
            doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, serverTimestamp,
            signInWithEmailAndPassword, onAuthStateChanged, signOut, setDoc, 
            createUserWithEmailAndPassword, enableIndexedDbPersistence, getDocs, increment
        };
    </script>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo, createContext, useContext, memo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAYb0HKLnEUuhrVcQlXACsxFk28w99qAkc",
            authDomain: "onsale-product.firebaseapp.com",
            projectId: "onsale-product",
            storageBucket: "onsale-product.firebasestorage.app",
            messagingSenderId: "837098663012",
            appId: "1:837098663012:web:cb61b9bd7f99ec4d6e8371"
        };
        
        const appId = 'onsale-crm-app';

        // === UTILS ===
        const generateInvoiceNo = () => {
            const d = new Date();
            const pad = (n) => n.toString().padStart(2, '0');
            const dateStr = `${pad(d.getDate())}${pad(d.getMonth() + 1)}${d.getFullYear().toString().slice(-2)}`;
            const timeStr = `${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
            return `HZN-${dateStr}-${timeStr}`;
        };

        const generateDriverId = () => `DV-${Math.floor(1000 + Math.random() * 9000)}`;

        // === CONTEXTS ===
        const FirebaseContext = createContext(null);
        const FirebaseProvider = ({ children }) => {
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);
            const [currentUser, setCurrentUser] = useState(null);
            const [userProfile, setUserProfile] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const { initializeApp, getFirestore, getAuth, onAuthStateChanged, enableIndexedDbPersistence } = window.firebaseSDK;
                const app = initializeApp(firebaseConfig);
                const dbInstance = getFirestore(app);
                const authInstance = getAuth(app);
                setAuth(authInstance); setDb(dbInstance);
                enableIndexedDbPersistence(dbInstance).catch(() => {});
                
                return onAuthStateChanged(authInstance, (user) => {
                    setCurrentUser(user);
                    if (!user) { setUserProfile(null); setLoading(false); }
                });
            }, []);

            useEffect(() => {
                if (!db || !currentUser) return;
                const { doc, onSnapshot } = window.firebaseSDK;
                const userRef = doc(db, 'artifacts', appId, 'users', currentUser.uid);
                return onSnapshot(userRef, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        setUserProfile({ 
                            id: snap.id, 
                            ...data,
                            permissions: Array.isArray(data.permissions) ? data.permissions : ['dashboard']
                        });
                    }
                    else setUserProfile({ id: currentUser.uid, name: currentUser.email.split('@')[0], role: 'Staff', permissions: ['dashboard'] });
                    setLoading(false);
                }, () => setLoading(false));
            }, [db, currentUser]);

            return <FirebaseContext.Provider value={{ db, auth, currentUser, userProfile, loading }}>{children}</FirebaseContext.Provider>;
        };

        const useFirebase = () => useContext(FirebaseContext);

        const useCollection = (collectionName) => {
            const { db, currentUser } = useFirebase();
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!db || !currentUser) return;
                const { collection, onSnapshot } = window.firebaseSDK;
                const ref = collectionName === 'users' 
                    ? collection(db, 'artifacts', appId, 'users')
                    : collection(db, 'artifacts', appId, 'public', 'data', collectionName);
                
                const unsubscribe = onSnapshot(ref, (snapshot) => {
                    const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    docs.sort((a, b) => {
                        const timeA = (a.updatedAt || a.createdAt)?.toMillis?.() || 0;
                        const timeB = (b.updatedAt || b.createdAt)?.toMillis?.() || 0;
                        return timeB - timeA;
                    });
                    setData(docs);
                    setLoading(false);
                }, (err) => {
                    console.error(`Node Error [${collectionName}]:`, err);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [db, currentUser, collectionName]);

            return { data, loading };
        };

        // === UI KIT COMPONENTS ===
        const Clock = () => {
            const [time, setTime] = useState(new Date());
            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);
            return (
                <div className="flex flex-col items-end font-mono text-right">
                    <span className="text-xl font-bold text-white leading-none">{time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false })}</span>
                    <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">{time.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' })}</span>
                </div>
            );
        };

        const Button = memo(({ children, onClick, variant = 'primary', icon, disabled = false, type = 'button', className = '' }) => {
            const variants = {
                primary: 'bg-blue-600 text-white shadow-lg shadow-blue-500/20 hover:bg-blue-500',
                secondary: 'bg-slate-750 text-slate-300 border border-slate-700 hover:bg-slate-700',
                danger: 'bg-red-600 text-white shadow-lg shadow-red-500/20 hover:bg-red-500',
                success: 'bg-emerald-600 text-white shadow-lg shadow-emerald-500/20 hover:bg-emerald-500',
            };
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`px-5 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all disabled:opacity-50 ${variants[variant]} ${className}`}>
                    {icon && <i className={`fas ${icon}`}></i>} {children}
                </button>
            );
        });

        const Modal = ({ isOpen, onClose, title, children, footer, size = "max-w-xl" }) => {
            if (!isOpen) return null;
            return ReactDOM.createPortal(
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md">
                    <div className={`bg-slate-900 rounded-[2.5rem] shadow-2xl w-full ${size} border border-slate-700 flex flex-col max-h-[90vh] overflow-hidden animate-fade-in`}>
                        <div className="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                            <h3 className="text-lg font-black text-white uppercase tracking-tighter">{title}</h3>
                            <button onClick={onClose} className="w-10 h-10 rounded-full hover:bg-slate-800 text-slate-400 flex items-center justify-center transition-all"><i className="fas fa-times"></i></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-8 space-y-6 custom-scrollbar">{children}</div>
                        {footer && <div className="p-6 border-t border-slate-800 bg-slate-900/50 flex justify-end gap-3">{footer}</div>}
                    </div>
                </div>, document.body
            );
        };

        const Avatar = ({ name, url, size = "10" }) => (
            <div className={`w-${size} h-${size} rounded-full bg-slate-700 border border-slate-600 flex items-center justify-center text-slate-300 font-bold uppercase text-xs overflow-hidden flex-none`}>
                {url ? <img src={url} className="w-full h-full object-cover" /> : (name?.charAt(0) || 'U')}
            </div>
        );

        // === PAGES ===

        const DashboardPage = () => {
            const { data: customers } = useCollection('customers');
            const { data: orders } = useCollection('orders');
            const stats = useMemo(() => ({
                customers: customers.length,
                revenue: orders.filter(o => o.status === 'Paid').reduce((a, c) => a + (c.grandTotal || 0), 0),
                pending: orders.filter(o => o.orderType === 'PR').length,
                total: orders.length
            }), [customers, orders]);

            return (
                <div className="space-y-8 animate-fade-in pb-12">
                    <h3 className="text-2xl font-khmer-header text-white uppercase tracking-tighter leading-none">Business Intelligence</h3>
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        {[
                            { label: 'Network', value: stats.customers, icon: 'fa-store', color: 'text-blue-400' },
                            { label: 'Revenue ($)', value: stats.revenue.toFixed(2), icon: 'fa-dollar-sign', color: 'text-green-400' },
                            { label: 'Pending PR', value: stats.pending, icon: 'fa-clock', color: 'text-amber-400' },
                            { label: 'Total Orders', value: stats.total, icon: 'fa-shopping-cart', color: 'text-indigo-400' }
                        ].map((s, i) => (
                            <div key={i} className="bg-slate-800/50 p-6 rounded-[2rem] border border-slate-700 shadow-xl">
                                <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-1">{s.label}</p>
                                <p className={`text-3xl font-black font-mono tracking-tighter ${s.color}`}>{s.value}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const CustomersPage = () => {
            const { db, userProfile } = useFirebase();
            const { data: customers } = useCollection('customers');
            const { data: sellers } = useCollection('users');
            
            const [search, setSearch] = useState('');
            const [marketFilter, setMarketFilter] = useState('');
            const [sellerFilter, setSellerFilter] = useState('');
            const [isCustModalOpen, setIsCustModalOpen] = useState(false);
            const [isEditing, setIsEditing] = useState(false);
            const [selectedCustomerId, setSelectedCustomerId] = useState(null);
            const [saving, setSaving] = useState(false);
            const [isDeleteModalOpen, setIsDeleteModalOpen] = useState(false);
            const [idToDelete, setIdToDelete] = useState(null);

            const initialForm = { 
                shopName: '', ownerName: '', contact: '', gender: 'Male', dob: '', idCard: '',
                assignedSellerId: '', marketType: 'Retail', physicalAddress: '', 
                lat: '', lng: '', mapLink: '', photo: '' 
            };
            const [formData, setFormData] = useState(initialForm);
            const [tempPhoto, setTempPhoto] = useState(null);
            const imageRef = useRef(null);
            const cropperRef = useRef(null);

            const getGPS = () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        setFormData(prev => ({ ...prev, lat: pos.coords.latitude.toFixed(6), lng: pos.coords.longitude.toFixed(6) }));
                    }, () => alert("GPS capture failed."));
                }
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = () => { setTempPhoto(reader.result); if (cropperRef.current) cropperRef.current.destroy(); };
                    reader.readAsDataURL(file);
                }
            };

            useEffect(() => {
                if (tempPhoto && imageRef.current) {
                    cropperRef.current = new Cropper(imageRef.current, { aspectRatio: 1, viewMode: 1, background: false, autoCropArea: 1, responsive: true });
                }
                return () => cropperRef.current?.destroy();
            }, [tempPhoto]);

            const applyCrop = () => {
                if (cropperRef.current) {
                    const canvas = cropperRef.current.getCroppedCanvas({ width: 400, height: 400 });
                    setFormData({ ...formData, photo: canvas.toDataURL('image/jpeg', 0.8) });
                    setTempPhoto(null);
                }
            };

            const handleRegister = async () => {
                if (!formData.shopName && !formData.ownerName) return;
                setSaving(true);
                try {
                    const { collection, addDoc, updateDoc, doc, serverTimestamp } = window.firebaseSDK;
                    const sellerNode = sellers.find(s => s.id === formData.assignedSellerId);
                    const payload = { ...formData, assignedSellerName: sellerNode?.name || sellerNode?.sellerName || 'Unassigned', updatedAt: serverTimestamp() };
                    if (isEditing) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', selectedCustomerId), payload);
                    else { payload.registeredBy = userProfile?.name || 'System'; payload.createdAt = serverTimestamp(); await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'customers'), payload); }
                    setIsCustModalOpen(false); setFormData(initialForm);
                } catch (e) { alert("Operation failed."); }
                setSaving(false);
            };

            const handleDeleteAction = async () => {
                try {
                    const { doc, deleteDoc } = window.firebaseSDK;
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', idToDelete));
                    setIsDeleteModalOpen(false);
                } catch (e) { alert("Delete failed."); }
            };

            const filtered = customers.filter(c => {
                const s = search.toLowerCase();
                const shopNameMatch = (c.shopName || c.name || '').toLowerCase().includes(s) || (c.ownerName || c.contactPerson || '').toLowerCase().includes(s) || (c.contact || c.phone || '').includes(s);
                const marketMatch = marketFilter === '' || (c.marketType || c.type || 'Retail') === marketFilter;
                const sellerMatch = sellerFilter === '' || (c.assignedSellerId || c.sellerId || '') === sellerFilter;
                return shopNameMatch && marketMatch && sellerMatch;
            });

            return (
                <div className="space-y-8 animate-fade-in pb-12">
                    <div className="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-6">
                        <h3 className="text-2xl font-khmer-header text-white uppercase tracking-tighter leading-none flex-none">Customer List</h3>
                        <div className="flex flex-row items-center w-full xl:w-auto gap-3 flex-nowrap overflow-x-auto pb-2 xl:pb-0 custom-scrollbar">
                            <input placeholder="Search shop/owner/phone..." className="input !mt-0 !py-2.5 !px-4 text-sm !bg-slate-800 !border-slate-700 flex-grow xl:min-w-[200px]" value={search} onChange={e=>setSearch(e.target.value)} />
                            <select className="select !mt-0 !py-2.5 !px-3 text-xs !bg-slate-800 !border-slate-700 w-32 flex-none" value={marketFilter} onChange={e=>setMarketFilter(e.target.value)}><option value="">All Markets</option><option value="Retail">Retail</option><option value="Wholesale">Wholesale</option></select>
                            <Button icon="fa-plus" className="flex-none" onClick={() => { setIsEditing(false); setSelectedCustomerId(null); setFormData(initialForm); setIsCustModalOpen(true); }}>Add</Button>
                        </div>
                    </div>

                    {/* TABLE VIEW (DESKTOP) */}
                    <div className="hidden xl:block bg-slate-800/50 rounded-[2rem] border border-slate-700 overflow-hidden shadow-2xl">
                        <div className="overflow-x-auto custom-scrollbar">
                            <table className="w-full text-left border-collapse min-w-[900px]">
                                <thead>
                                    <tr className="bg-slate-900/50 text-xs text-slate-400 font-semibold uppercase tracking-wider border-b border-slate-700">
                                        <th className="px-4 py-3">Shop Node</th><th className="px-4 py-3">Contact</th><th className="px-4 py-3">Market</th><th className="px-4 py-3">Seller</th><th className="px-4 py-3 text-center">Pin</th><th className="px-4 py-3 text-center">Actions</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-700">
                                    {filtered.map(c => (
                                        <tr key={c.id} className="hover:bg-slate-700/50 transition-all group">
                                            <td className="px-4 py-4"><div className="flex items-center gap-3"><Avatar name={c.shopName || c.name} url={c.photo} /><div><p className="text-sm font-bold text-slate-200 uppercase truncate max-w-[180px]">{c.shopName || c.name}</p><p className="text-[10px] text-slate-400 font-bold uppercase truncate max-w-[180px]">{c.ownerName || c.contactPerson || '---'}</p></div></div></td>
                                            <td className="px-4 py-4 text-sm font-mono tracking-tighter"><a href={`tel:${(c.contact || c.phone || '').replace(/\D/g,'')}`} className="text-slate-300 hover:text-blue-400 underline decoration-slate-600 hover:decoration-blue-400 underline-offset-4 transition-colors">{c.contact || c.phone || 'N/A'}</a></td>
                                            <td className="px-4 py-4"><span className="text-[10px] font-black uppercase px-2 py-0.5 rounded-lg border border-blue-500/20 text-blue-400 bg-blue-500/5">{c.marketType || c.type || 'Retail'}</span></td>
                                            <td className="px-4 py-4 text-xs font-bold text-slate-300 uppercase">{c.assignedSellerName || c.sellerName || '---'}</td>
                                            <td className="px-4 py-4 text-center">{(c.lat || c.gpsLat) ? <a href={`https://www.google.com/maps?q=${c.lat || c.gpsLat},${c.lng || c.gpsLong}`} target="_blank" className="text-green-400 hover:scale-110 transition-transform"><i className="fas fa-location-dot"></i></a> : <i className="fas fa-location-dot opacity-10"></i>}</td>
                                            <td className="px-4 py-4 text-center">
                                                <div className="flex justify-center gap-4">
                                                    <button onClick={() => { setIsEditing(true); setSelectedCustomerId(c.id); setFormData({...c}); setIsCustModalOpen(true); }} className="text-blue-400 hover:scale-110 transition-transform"><i className="fas fa-edit"></i></button>
                                                    <button onClick={() => { setIdToDelete(c.id); setIsDeleteModalOpen(true); }} className="text-red-500 hover:scale-110 transition-transform"><i className="fas fa-trash-alt"></i></button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* CARD VIEW (MOBILE) */}
                    <div className="xl:hidden grid grid-cols-1 md:grid-cols-2 gap-4">
                        {filtered.map(c => (
                            <div key={c.id} className="bg-slate-800/60 p-5 rounded-3xl border border-slate-700 shadow-xl space-y-4">
                                <div className="flex justify-between items-start">
                                    <div className="flex items-center gap-3">
                                        <Avatar name={c.shopName || c.name} url={c.photo} size="12" />
                                        <div>
                                            <h4 className="text-sm font-black text-white uppercase tracking-tight">{c.shopName || c.name}</h4>
                                            <p className="text-[10px] font-bold text-slate-500 uppercase">{c.ownerName || '---'}</p>
                                        </div>
                                    </div>
                                    <span className="text-[9px] font-black uppercase px-2 py-1 rounded-lg border border-blue-500/20 text-blue-400 bg-blue-500/5">{c.marketType || 'Retail'}</span>
                                </div>
                                
                                <div className="grid grid-cols-2 gap-4 border-y border-white/5 py-4">
                                    <div className="space-y-1">
                                        <p className="text-[8px] font-black text-slate-600 uppercase tracking-widest">Contact Terminal</p>
                                        <a href={`tel:${(c.contact || '').replace(/\D/g,'')}`} className="text-xs font-mono font-bold text-slate-300 flex items-center gap-2">
                                            <i className="fas fa-phone-alt text-blue-500"></i> {c.contact || 'N/A'}

        const OrdersPage = () => {
            const { db, userProfile } = useFirebase();
            const { data: orders } = useCollection('orders');
            const { data: customers } = useCollection('customers');
            const { data: products } = useCollection('products');
            const { data: drivers } = useCollection('drivers');

            const [isOrderModalOpen, setIsOrderModalOpen] = useState(false);
            const [isViewModalOpen, setIsViewModalOpen] = useState(false);
            const [isEditingReceipt, setIsEditingReceipt] = useState(false);
            const [viewOrderData, setViewOrderData] = useState(null);
            const [saving, setSaving] = useState(false);
            const [isUpdatingStatus, setIsUpdatingStatus] = useState(false);
            const [isDeleteModalOpen, setIsDeleteModalOpen] = useState(false);
            const [idToDelete, setIdToDelete] = useState(null);
            
            const [custSearch, setCustSearch] = useState('');
            const [prodSearch, setProdSearch] = useState('');
            const [selectedCust, setSelectedCust] = useState(null);
            const [selectedDriverId, setSelectedDriverId] = useState('');
            const [cart, setCart] = useState([]);
            const [orderType, setOrderType] = useState('PR');
            const [paymentMethod, setPaymentMethod] = useState('Cash');
            const [discountType, setDiscountType] = useState('Cash'); 
            const [discountVal, setDiscountVal] = useState(0);

            const activeSubTotal = useMemo(() => cart.reduce((a, c) => a + (c.price * c.qty), 0), [cart]);
            const activeDiscountAmount = useMemo(() => discountType === 'Percentage' ? (activeSubTotal * discountVal) / 100 : (parseFloat(discountVal) || 0), [activeSubTotal, discountType, discountVal]);
            const activeGrandTotal = activeSubTotal - activeDiscountAmount;

            const addToCart = (p) => {
                const list = isEditingReceipt ? viewOrderData.items : cart;
                const existing = list.find(item => item.id === p.id);
                if (existing && existing.qty >= p.stock) return;
                let newList = existing ? list.map(item => item.id === p.id ? { ...item, qty: item.qty + 1 } : item) : [...list, { ...p, qty: 1 }];
                if (isEditingReceipt) setViewOrderData({...viewOrderData, items: newList}); else setCart(newList);
                setProdSearch('');
            };

            const updateItemQty = (id, delta) => {
                const list = isEditingReceipt ? viewOrderData.items : cart;
                const newList = list.map(i => i.id === id ? { ...i, qty: Math.max(1, i.qty + delta) } : i);
                if (isEditingReceipt) setViewOrderData({...viewOrderData, items: newList}); else setCart(newList);
            };

            const handleSaveNewOrder = async () => {
                if (!selectedCust || cart.length === 0) return;
                setSaving(true);
                try {
                    const { collection, addDoc, doc, updateDoc, serverTimestamp, increment } = window.firebaseSDK;
                    const driverNode = drivers.find(d => d.id === selectedDriverId);
                    const orderPayload = {
                        invoiceNo: generateInvoiceNo(),
                        customer: { id: selectedCust.id, name: selectedCust.shopName || selectedCust.name, contact: selectedCust.contact || selectedCust.phone },
                        seller: { id: userProfile.id, sellerId: userProfile.sellerId || 'GEN-01', name: userProfile.name || userProfile.sellerName },
                        driver: driverNode ? { id: driverNode.id, name: driverNode.name, driverId: driverNode.driverId } : null,
                        items: cart, orderType, paymentMethod, discountType, discountVal: parseFloat(discountVal),
                        subTotal: activeSubTotal, discountAmount: activeDiscountAmount, grandTotal: activeGrandTotal, deliveryStatus: 'Pending',
                        status: paymentMethod === 'Cash' ? 'Paid' : 'Pending Verification',
                        createdAt: serverTimestamp()
                    };
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), orderPayload);
                    for (let item of cart) { await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', item.id), { stock: increment(-item.qty), updatedAt: serverTimestamp() }); }
                    setIsOrderModalOpen(false); setCart([]); setSelectedCust(null);
                } catch (e) { alert("Order failed."); }
                setSaving(false);
            };

            const { auth } = useFirebase();
            const [email, setEmail] = useState(''); const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const handleLogin = async (e) => { e.preventDefault(); setLoading(true); try { await window.firebaseSDK.signInWithEmailAndPassword(auth, email, password); } catch (err) { alert("Access Denied."); setLoading(false); } };
            return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-900 relative overflow-hidden">
                    <div className="w-full max-w-sm p-10 rounded-[3.5rem] shadow-2xl relative z-10 animate-fade-in border border-slate-700 text-center">
                        <div className="font-khmer-header text-4xl logo-gradient-text uppercase mb-2">Ounna</div>
                        <p className="text-[10px] font-black text-slate-500 tracking-[0.5em] uppercase mb-10">Verification</p>
                        <form onSubmit={handleLogin} className="space-y-6 text-left">
                            <div><label className="text-[10px] font-black uppercase text-slate-600 tracking-widest ml-1 mb-2 block">Identity</label><input type="email" placeholder="admin@onsale.com" className="input !bg-slate-950/50 !border-slate-700" value={email} onChange={e=>setEmail(e.target.value)} required /></div>
                            <div><label className="text-[10px] font-black uppercase text-slate-600 tracking-widest ml-1 mb-2 block">Security Token</label><input type="password" placeholder="••••••••" className="input !bg-slate-950/50 !border-slate-700" value={password} onChange={e=>setPassword(e.target.value)} required /></div>
                            <Button type="submit" className="w-full py-5" disabled={loading}>{loading ? <i className="fas fa-spinner fa-spin"></i> : 'Authorize'}</Button>
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => (<FirebaseProvider><AppContent /></FirebaseProvider>);
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
