<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OUNNA | Outdoor Tracking System</title>
    
    <meta name="theme-color" content="#0f172a">
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Moul&family=Siemreap&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Battambang', 'sans-serif'],
                        display: ['Moul', 'Inter', 'sans-serif'],
                    },
                    colors: {
                        slate: { 750: '#1e293b', 850: '#0f172a', 900: '#0b1120', 950: '#020617' },
                        brand: { 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb' }
                    },
                    boxShadow: {
                        'glass': '0 4px 30px rgba(0, 0, 0, 0.1)',
                        'glow': '0 0 20px rgba(59, 130, 246, 0.5)'
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />
    
    <!-- Cropper.js for Zooming and Cropping -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.6.1/cropper.min.js"></script>

    <!-- React and Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

    <style>
        :root {
            --sat: env(safe-area-inset-top, 0px);
            --sar: env(safe-area-inset-right, 0px);
            --sab: env(safe-area-inset-bottom, 0px);
            --sal: env(safe-area-inset-left, 0px);
        }

        .pt-safe { padding-top: var(--sat) !important; }
        .pb-safe { padding-bottom: var(--sab) !important; }
        .mt-safe { margin-top: var(--sat) !important; }
        .mb-safe { margin-bottom: var(--sab) !important; }

        html, body { 
            font-family: 'Inter', sans-serif; 
            height: 100%; 
            width: 100%;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background-color: #f8fafc;
            color: #0f172a;
            transition: background-color 0.3s ease, color 0.3s ease;
        }
        .dark body {
            background-color: #0b1120;
            color: #f8fafc;
        }
        .font-khmer-header { font-family: 'Moul', cursive; }
        
        .input, .select, .textarea {
            width: 100%; padding: 1rem 1.25rem;
            border: 1.5px solid #e2e8f0; border-radius: 1rem;
            background-color: rgba(255, 255, 255, 0.8); color: #0f172a; 
            outline: none; transition: all 0.3s ease;
            font-size: 15px; backdrop-filter: blur(8px);
        }
        .dark .input, .dark .select, .dark .textarea {
            border-color: #1e293b;
            background-color: rgba(30, 41, 59, 0.5);
            color: #f8fafc;
        }
        .input:focus, .select:focus { 
            border-color: #3b82f6; 
            background-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); 
        }
        .dark .input:focus, .dark .select:focus {
            background-color: rgba(30, 41, 59, 0.8);
        }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        #splash-screen {
            position: fixed; inset: 0; background-color: #f8fafc; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .dark #splash-screen { background-color: #0b1120; }
        
        .fab {
            position: fixed; 
            bottom: calc(2rem + var(--sab));
            right: 1.5rem; z-index: 40;
            width: 3.5rem; height: 3.5rem; border-radius: 1rem;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
            transition: all 0.2s;
        }
        .fab:active { transform: scale(0.9); }
        
        /* Desktop Smart FAB Adjustments */
        @media (min-width: 1024px) {
            .fab {
                bottom: 3rem;
                right: 3rem;
                width: 4rem;
                height: 4rem;
                border-radius: 1.25rem;
            }
            .fab i {
                font-size: 1.25rem;
            }
        }
    </style>
</head>
<body class="max-w-full overflow-x-hidden">
    <div id="splash-screen">
        <div class="w-16 h-16 relative flex items-center justify-center mb-6">
            <div class="absolute inset-0 border-4 border-slate-200 dark:border-slate-800 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-brand-500 border-t-transparent rounded-full animate-spin"></div>
            <i class="fas fa-location-crosshairs text-brand-500 text-xl"></i>
        </div>
        <h2 class="text-xl font-khmer-header text-slate-900 dark:text-white tracking-widest uppercase">OUNNA</h2>
        <p class="text-[10px] font-bold text-brand-500 dark:text-brand-400 tracking-widest mt-2 uppercase">Outdoor Tracking System</p>
    </div>

    <div id="root" class="h-full w-full"></div>

    <script type="module">
        import { initializeApp, deleteApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, initializeFirestore, persistentLocalCache, collection, onSnapshot, doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseSDK = { initializeApp, deleteApp, getAuth, getFirestore, initializeFirestore, persistentLocalCache, collection, onSnapshot, doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, serverTimestamp, signInWithEmailAndPassword, onAuthStateChanged, signOut, setDoc, createUserWithEmailAndPassword };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, createContext, useContext, memo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAYb0HKLnEUuhrVcQlXACsxFk28w99qAkc",
            authDomain: "onsale-product.firebaseapp.com",
            projectId: "onsale-product",
            storageBucket: "onsale-product.firebasestorage.app",
            messagingSenderId: "837098663012",
            appId: "1:837098663012:web:cb61b9bd7f99ec4d6e8371"
        };
        const appId = 'onsale-crm-app';

        // --- Theme Hook ---
        const useTheme = () => {
            const [theme, setTheme] = useState(() => {
                try { return localStorage.getItem('theme') || 'dark'; } 
                catch (e) { return 'dark'; }
            });
            useEffect(() => {
                const root = window.document.documentElement;
                root.classList.remove('light', 'dark');
                root.classList.add(theme);
                try { localStorage.setItem('theme', theme); } catch (e) {}
            }, [theme]);
            const toggleTheme = () => setTheme(prev => prev === 'dark' ? 'light' : 'dark');
            return { theme, toggleTheme };
        };

        // --- Context ---
        const FirebaseContext = createContext(null);
        const FirebaseProvider = ({ children }) => {
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const { initializeApp, initializeFirestore, persistentLocalCache, getAuth, onAuthStateChanged } = window.firebaseSDK;
                const app = initializeApp(firebaseConfig);
                
                // Enable Smart Browser Caching & Offline Persistence
                const dbInst = initializeFirestore(app, {
                    localCache: persistentLocalCache()
                });
                
                const authInst = getAuth(app);
                setDb(dbInst); setAuth(authInst);
                return onAuthStateChanged(authInst, (u) => { setUser(u); setLoading(false); });
            }, []);

            return <FirebaseContext.Provider value={{ db, auth, user, loading }}>{children}</FirebaseContext.Provider>;
        };

        const useCollection = (name) => {
            const { db, user } = useContext(FirebaseContext);
            const [data, setData] = useState([]);
            useEffect(() => {
                if (!db || !user) return;
                const { collection, onSnapshot } = window.firebaseSDK;
                const collectionName = name === 'sales' ? 'orders' : name;
                const ref = name === 'users' ? collection(db, 'artifacts', appId, 'users') : collection(db, 'artifacts', appId, 'public', 'data', collectionName);
                return onSnapshot(ref, (snap) => setData(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
            }, [db, user, name]);
            return data;
        };

        // --- UI Components ---
        const Button = ({ children, onClick, variant = 'primary', icon, disabled, className = "", type = "button" }) => {
            const baseStyles = "px-6 py-3.5 rounded-2xl font-semibold text-sm flex items-center justify-center gap-3 transition-all active:scale-[0.98] disabled:opacity-50 disabled:active:scale-100";
            const variants = {
                primary: 'bg-brand-600 hover:bg-brand-500 text-white shadow-lg shadow-brand-500/25',
                secondary: 'bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 border border-slate-200 dark:border-slate-700',
                ghost: 'bg-transparent hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white',
                danger: 'bg-red-50 dark:bg-red-500/10 hover:bg-red-100 dark:hover:bg-red-500/20 text-red-600 dark:text-red-400'
            };
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`${baseStyles} ${variants[variant]} ${className}`}>
                    {icon && <i className={`fas ${icon} text-lg`}></i>} {children}
                </button>
            );
        };

        const Avatar = ({ name, url, size = "12", isCircle = false }) => (
            <div className={`w-${size} h-${size} ${isCircle ? 'rounded-full' : 'rounded-2xl'} bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex items-center justify-center text-slate-500 dark:text-slate-400 font-bold uppercase text-lg shadow-inner overflow-hidden flex-none`}>
                {url ? <img src={url} className="w-full h-full object-cover" loading="lazy" /> : (name?.charAt(0) || 'O')}
            </div>
        );

        const FullScreenModal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[200] bg-slate-50 dark:bg-slate-900 flex flex-col animate-slide-up transition-colors duration-300">
                    <div className="flex-none bg-white/90 dark:bg-slate-900/90 backdrop-blur-xl border-b border-slate-200 dark:border-slate-800/50 z-20 transition-colors duration-300">
                        <div className="pt-safe"></div>
                        <div className="flex items-center justify-between p-4 max-w-4xl mx-auto w-full">
                            <button onClick={onClose} className="w-10 h-10 flex items-center justify-center rounded-full bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors shadow-sm">
                                <i className="fas fa-chevron-down"></i>
                            </button>
                            <h3 className="font-bold text-slate-900 dark:text-white text-lg tracking-tight">{title}</h3>
                            <div className="w-10"></div> 
                        </div>
                    </div>
                    <div className="flex-1 overflow-y-auto p-5 pb-24 hide-scrollbar">
                        {children}
                    </div>
                </div>
            );
        };

        // --- NEW: Image Cropper Modal ---
        const ImageCropperModal = ({ isOpen, imageSrc, onCrop, onClose, aspectRatio = 1 }) => {
            const imgRef = useRef(null);
            const cropperRef = useRef(null);

            useEffect(() => {
                return () => {
                    if (cropperRef.current) {
                        cropperRef.current.destroy();
                        cropperRef.current = null;
                    }
                };
            }, []);

            if (!isOpen) return null;

            const handleImageLoad = (e) => {
                if (cropperRef.current) cropperRef.current.destroy();
                cropperRef.current = new window.Cropper(e.target, {
                    aspectRatio: aspectRatio,
                    viewMode: 1,
                    dragMode: 'move',
                    autoCropArea: 1,
                    cropBoxMovable: false,
                    cropBoxResizable: false,
                    guides: true,
                    center: true,
                    highlight: false,
                    background: true,
                    responsive: true,
                });
            };

            const handleCrop = () => {
                if (cropperRef.current) {
                    const canvas = cropperRef.current.getCroppedCanvas({
                        width: 400,
                        height: Math.round(400 / aspectRatio),
                    });
                    onCrop(canvas.toDataURL('image/jpeg', 0.8));
                }
            };

            return (
                <div className="fixed inset-0 z-[300] bg-black/95 flex flex-col animate-in fade-in duration-200">
                    <div className="flex-none pt-safe bg-black">
                        <div className="flex justify-between items-center p-4">
                            <button onClick={onClose} className="w-10 h-10 flex items-center justify-center rounded-full bg-white/10 text-white hover:bg-white/20 transition-colors">
                                <i className="fas fa-times"></i>
                            </button>
                            <h3 className="font-bold text-white tracking-widest text-xs uppercase">Adjust Photo</h3>
                            <button onClick={handleCrop} className="px-5 py-2 bg-brand-500 text-white rounded-full text-xs font-bold hover:bg-brand-400 transition-colors shadow-glow">
                                DONE
                            </button>
                        </div>
                    </div>
                    <div className="flex-1 relative flex items-center justify-center p-4">
                        <div className="w-full h-full max-h-[70vh] flex items-center justify-center">
                            <img src={imageSrc} className="max-w-full block opacity-0" onLoad={handleImageLoad} />
                        </div>
                    </div>
                    <div className="pb-safe bg-black">
                        <div className="p-6 text-center text-white/50 text-xs flex justify-center gap-6">
                            <button onClick={() => cropperRef.current?.rotate(-90)} className="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 active:scale-95 transition-all text-white"><i className="fas fa-undo"></i></button>
                            <button onClick={() => cropperRef.current?.zoom(0.1)} className="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 active:scale-95 transition-all text-white"><i className="fas fa-search-plus"></i></button>
                            <button onClick={() => cropperRef.current?.zoom(-0.1)} className="w-12 h-12 rounded-full bg-white/10 flex items-center justify-center hover:bg-white/20 active:scale-95 transition-all text-white"><i className="fas fa-search-minus"></i></button>
                        </div>
                    </div>
                </div>
            );
        };

        // --- Settings View ---
        const SettingsView = () => {
            const users = useCollection('users');
            const drivers = useCollection('drivers');
            const { auth, db } = useContext(FirebaseContext);
            
            const [settingsTab, setSettingsTab] = useState('users'); 
            const [formError, setFormError] = useState('');
            const [loading, setLoading] = useState(false);

            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({ name: '', email: '', password: '', role: 'Staff', status: 'Active', photo: '', sellerId: '', permissions: [] });
            const [editingId, setEditingId] = useState(null);
            const [confirmDeleteId, setConfirmDeleteId] = useState(null);

            const [isDriverModalOpen, setIsDriverModalOpen] = useState(false);
            const [driverData, setDriverData] = useState({ name: '', contact: '', plate: '', photo: '' });
            const [editingDriverId, setEditingDriverId] = useState(null);
            const [confirmDriverDeleteId, setConfirmDriverDeleteId] = useState(null);

            // Cropper state
            const [cropConfig, setCropConfig] = useState({ src: null, target: null });

            const currentUserProfile = users.find(u => u.email?.toLowerCase() === auth.currentUser?.email?.toLowerCase());
            const currentProfileRole = currentUserProfile?.role || 'Staff';

            const openForm = (u = null) => {
                setFormError('');
                if (u) { 
                    setFormData({ ...u, password: '', sellerId: u.sellerId || '', permissions: u.permissions || [], status: u.status || 'Active' }); 
                    setEditingId(u.id); 
                } 
                else { 
                    setFormData({ name: '', email: '', password: '', role: 'Staff', status: 'Active', photo: '', sellerId: '', permissions: [] }); 
                    setEditingId(null); 
                }
                setIsModalOpen(true);
            };

            const handleSave = async () => {
                setFormError('');
                if (!formData.name || !formData.email) return setFormError("Name and Email are required.");
                if (!editingId && !formData.password) return setFormError("Password is required for new users.");
                if (!editingId && formData.password.length < 6) return setFormError("Password must be at least 6 characters.");
                
                setLoading(true);
                const { doc, setDoc, serverTimestamp, initializeApp, deleteApp, getAuth, createUserWithEmailAndPassword } = window.firebaseSDK;
                
                let secondaryApp = null;
                try {
                    let finalId = editingId;

                    if (!editingId) {
                        const tempAppName = `CreateUser_${Date.now()}`;
                        secondaryApp = initializeApp(firebaseConfig, tempAppName);
                        const secondaryAuth = getAuth(secondaryApp);
                        
                        const userCredential = await createUserWithEmailAndPassword(secondaryAuth, formData.email, formData.password);
                        finalId = userCredential.user.uid; 
                    }

                    const payload = { ...formData, updatedAt: serverTimestamp() };
                    delete payload.password; 

                    if (!editingId) {
                        payload.id = finalId;
                        payload.createdAt = serverTimestamp();
                    }
                    
                    if (payload.role === 'Admin') payload.permissions = ['customers', 'orders', 'products', 'productCategories', 'productUnits', 'drivers'];
                    else if (!payload.permissions || payload.permissions.length === 0) payload.permissions = ['customers', 'orders'];

                    await setDoc(doc(db, 'artifacts', appId, 'users', finalId), payload);
                    
                    if (secondaryApp) await deleteApp(secondaryApp);
                    
                    setIsModalOpen(false); 
                    setEditingId(null);
                } catch (e) { 
                    setFormError(e.message.includes('auth/email-already-in-use') ? "Email already registered." : e.message); 
                    if (secondaryApp) await deleteApp(secondaryApp);
                }
                setLoading(false);
            };

            const handleDelete = async (id) => {
                if (confirmDeleteId === id) { await window.firebaseSDK.deleteDoc(window.firebaseSDK.doc(db, 'artifacts', appId, 'users', id)); setConfirmDeleteId(null); } 
                else { setConfirmDeleteId(id); setTimeout(() => setConfirmDeleteId(null), 3000); }
            };

            const openDriverForm = (d = null) => {
                setFormError('');
                if (d) { setDriverData(d); setEditingDriverId(d.id); } 
                else { setDriverData({ name: '', contact: '', plate: '', photo: '' }); setEditingDriverId(null); }
                setIsDriverModalOpen(true);
            };

            const handleDriverSave = async () => {
                setFormError('');
                if (!driverData.name) return setFormError("Driver Name is required.");
                setLoading(true);
                const { collection, addDoc, updateDoc, doc, serverTimestamp } = window.firebaseSDK;
                try {
                    const payload = { ...driverData, updatedAt: serverTimestamp() };
                    if (editingDriverId) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'drivers', editingDriverId), payload);
                    else { payload.createdAt = serverTimestamp(); await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'drivers'), payload); }
                    setIsDriverModalOpen(false); setEditingDriverId(null);
                } catch (e) { setFormError(e.message); }
                setLoading(false);
            };

            const handleDriverDelete = async (id) => {
                if (confirmDeleteId === id) { await window.firebaseSDK.deleteDoc(window.firebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'drivers', id)); setConfirmDriverDeleteId(null); } 
                else { setConfirmDriverDeleteId(id); setTimeout(() => setConfirmDriverDeleteId(null), 3000); }
            };

            const handleFileChange = (e, target) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = () => setCropConfig({ src: reader.result, target });
                    reader.readAsDataURL(file);
                }
                e.target.value = '';
            };

            const handleCropComplete = (dataUrl) => {
                if (cropConfig.target === 'user') setFormData({ ...formData, photo: dataUrl });
                else if (cropConfig.target === 'driver') setDriverData({ ...driverData, photo: dataUrl });
                setCropConfig({ src: null, target: null });
            };

            const profileName = currentUserProfile?.name || auth.currentUser?.email?.split('@')[0] || 'User';
            const profilePhoto = currentUserProfile?.photo || '';

            return (
                <div className="space-y-6 pb-20 animate-in fade-in duration-300 px-1 max-w-4xl mx-auto">
                    <div className="bg-white dark:bg-slate-800/40 rounded-3xl p-5 border border-slate-200 dark:border-slate-700/50 flex items-center gap-4 shadow-sm dark:shadow-none transition-colors">
                        <Avatar name={profileName} url={profilePhoto} size="14" isCircle={true} />
                        <div className="flex-1 min-w-0">
                            <h2 className="text-lg font-bold text-slate-900 dark:text-white truncate">{profileName}</h2>
                            <p className="text-xs text-slate-500 dark:text-slate-400 truncate">{auth.currentUser?.email}</p>
                            <span className="inline-block mt-2 px-2 py-0.5 bg-brand-50 dark:bg-brand-500/10 text-brand-600 dark:text-brand-400 text-[10px] font-semibold rounded uppercase tracking-wide border border-brand-200 dark:border-brand-500/20">{currentProfileRole}</span>
                        </div>
                    </div>

                    <div className="flex bg-slate-100 dark:bg-slate-800/60 p-1 rounded-2xl border border-slate-200 dark:border-slate-700/50 shadow-inner">
                        <button onClick={() => setSettingsTab('users')} className={`flex-1 py-2.5 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-2 ${settingsTab === 'users' ? 'bg-brand-600 text-white shadow-lg' : 'text-slate-400'}`}>
                            <i className="fas fa-users"></i> Users
                        </button>
                        <button onClick={() => setSettingsTab('drivers')} className={`flex-1 py-2.5 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-2 ${settingsTab === 'drivers' ? 'bg-brand-600 text-white shadow-lg' : 'text-slate-400'}`}>
                            <i className="fas fa-truck"></i> Drivers
                        </button>
                    </div>

                    {settingsTab === 'users' ? (
                        <div className="animate-in fade-in duration-200 space-y-3">
                            <div className="flex justify-between items-center px-1">
                                <h3 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Accounts</h3>
                                <button onClick={() => openForm()} className="text-brand-500 text-[10px] font-bold tracking-tight hover:underline"><i className="fas fa-plus-circle mr-1"></i> ADD USER</button>
                            </div>
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-4">
                                {users.map(u => (
                                    <div key={u.id} className="bg-white dark:bg-slate-800/40 p-4 rounded-2xl border border-slate-200 dark:border-slate-700/50 flex flex-col gap-3 shadow-sm transition-all hover:shadow-md active:scale-[0.98]">
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center gap-3 min-w-0">
                                                <Avatar name={u.name} url={u.photo} size="10" />

                                <div className="bg-red-500/10 border border-red-500/20 text-red-500 p-3 rounded-xl text-xs font-bold text-center">
                                    <i className="fas fa-exclamation-circle mr-2"></i>{formError}
                                </div>

                                <div className="relative">
                                    <div className="w-24 h-24 rounded-full bg-slate-100 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 flex items-center justify-center overflow-hidden shadow-inner cursor-pointer" onClick={() => document.getElementById('u-up').click()}>
                                        {formData.photo ? <img src={formData.photo} className="w-full h-full object-cover" /> : <i className="fas fa-user-circle text-slate-400 text-4xl"></i>}
                                    </div>
                                    <button onClick={() => document.getElementById('u-up').click()} className="absolute bottom-0 right-0 w-8 h-8 bg-brand-500 text-white rounded-full flex items-center justify-center shadow-lg border-2 border-white dark:border-slate-900 transition-transform active:scale-95">
                                        <i className="fas fa-camera text-xs"></i>
                                    </button>
                                </div>
                                <input id="u-up" type="file" accept="image/*" className="hidden" onChange={(e) => handleFileChange(e, 'user')} />
                            </div>
                            <div className="space-y-4">
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-3">Account Status</label>
                                        <select className={`select font-bold !py-3 ${formData.status === 'Inactive' ? 'text-red-500' : 'text-green-500'}`} value={formData.status} onChange={e=>setFormData({...formData, status: e.target.value})}>

                                            <option value="Inactive">Inactive / Suspended</option>
                                        </select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-3">Access Level</label>
                                        <select className="select !py-3" value={formData.role} onChange={e=>setFormData({...formData, role: e.target.value})}>

                                            <option value="Manager">Manager</option>
                                            {currentProfileRole === 'Admin' && <option value="Admin">Admin</option>}
                                        </select>
                                    </div>
                                </div>

                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-3">Display Name</label>
                                    <input className="input !py-3.5" placeholder="e.g. John Doe" value={formData.name} onChange={e=>setFormData({...formData, name: e.target.value})} />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-3">Email Address</label>
                                    <input className="input !py-3.5" placeholder="user@example.com" value={formData.email} onChange={e=>setFormData({...formData, email: e.target.value})} disabled={!!editingId} />
                                </div>
                                
                                {!editingId && (
                                    <div className="space-y-1 animate-in slide-in-from-top-2">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-3">Login Password</label>
                                        <input type="password" class="input !py-3.5" placeholder="Min. 6 characters" value={formData.password} onChange={e=>setFormData({...formData, password: e.target.value})} />
                                        <p className="text-[10px] text-slate-500 ml-3 italic mt-1 leading-tight">This will be the user's secure login credential.</p>
                                    </div>
                                )}

                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-3">Seller ID</label>
                                    <input className="input !py-3.5" placeholder="SID-001" value={formData.sellerId} onChange={e=>setFormData({...formData, sellerId: e.target.value})} />
                                </div>
                            </div>
                            <Button className="w-full !py-4 shadow-glow" onClick={handleSave} disabled={loading}>
                                {loading ? <i className="fas fa-circle-notch fa-spin"></i> : (editingId ? 'UPDATE PROFILE' : 'CREATE USER & LOGIN')}
                            </Button>
                        </div>
                    </FullScreenModal>

                    <FullScreenModal isOpen={isDriverModalOpen} onClose={() => setIsDriverModalOpen(false)} title={editingDriverId ? "Edit Driver" : "New Driver"}>
                        <div className="space-y-5 max-w-2xl mx-auto">
                            <div className="flex justify-center mb-2">
                                <div className="relative">
                                    <div className="w-24 h-24 rounded-2xl bg-slate-100 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 flex items-center justify-center overflow-hidden shadow-inner cursor-pointer" onClick={() => document.getElementById('d-up').click()}>
                                        {driverData.photo ? <img src={driverData.photo} className="w-full h-full object-cover" /> : <i className="fas fa-truck text-slate-400 text-4xl"></i>}
                                    </div>
                                    <button onClick={() => document.getElementById('d-up').click()} className="absolute -bottom-2 -right-2 w-8 h-8 bg-brand-500 text-white rounded-full flex items-center justify-center shadow-lg border-2 border-white dark:border-slate-900 transition-transform active:scale-95">
                                        <i className="fas fa-camera text-xs"></i>
                                    </button>
                                </div>
                                <input id="d-up" type="file" accept="image/*" className="hidden" onChange={(e) => handleFileChange(e, 'driver')} />
                            </div>
                            <div className="space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-3">Driver Name</label>
                                    <input className="input" placeholder="Driver Name" value={driverData.name} onChange={e=>setDriverData({...driverData, name: e.target.value})} />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-3">Contact Number</label>
                                    <input className="input" placeholder="Contact" value={driverData.contact} onChange={e=>setDriverData({...driverData, contact: e.target.value})} />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-3">License Plate</label>
                                    <input className="input" placeholder="Plate Number" value={driverData.plate} onChange={e=>setDriverData({...driverData, plate: e.target.value})} />
                                </div>

                            <Button className="w-full shadow-glow !py-4" onClick={handleDriverSave} disabled={loading}>SAVE DRIVER</Button>

                    <ImageCropperModal 
                        isOpen={!!cropConfig.src} 
                        imageSrc={cropConfig.src} 
                        onCrop={handleCropComplete} 
                        onClose={() => setCropConfig({ src: null, target: null })} 
                    />

            );
        };

            const products = useCollection('products');
            const categories = useCollection('productCategories');
            const units = useCollection('productUnits');
            const { db } = useContext(FirebaseContext);
            
            const [inventoryTab, setInventoryTab] = useState('products'); 
            const [formError, setFormError] = useState('');
            const [loading, setLoading] = useState(false);

            // Products State
            const [isProductModalOpen, setIsProductModalOpen] = useState(false);
            const [productData, setProductData] = useState({ name: '', sku: '', categoryId: '', unitId: '', price: '', qty: '', photo: '' });
            const [editingProductId, setEditingProductId] = useState(null);
            const [confirmProductDeleteId, setConfirmProductDeleteId] = useState(null);
            
            const [cropImage, setCropImage] = useState(null);

            // Categories State
            const [isCategoryModalOpen, setIsCategoryModalOpen] = useState(false);
            const [categoryData, setCategoryData] = useState({ name: '', description: '' });
            const [editingCategoryId, setEditingCategoryId] = useState(null);
            const [confirmCategoryDeleteId, setConfirmCategoryDeleteId] = useState(null);

            // Units State
            const [isUnitModalOpen, setIsUnitModalOpen] = useState(false);
            const [unitData, setUnitData] = useState({ name: '', symbol: '' });
            const [editingUnitId, setEditingUnitId] = useState(null);
            const [confirmUnitDeleteId, setConfirmUnitDeleteId] = useState(null);

            // Handlers
            const openProductForm = (p = null) => {
                setFormError('');
                if (p) { setProductData({ ...p, qty: p.qty || '' }); setEditingProductId(p.id); } 
                else { setProductData({ name: '', sku: '', categoryId: '', unitId: '', price: '', qty: '', photo: '' }); setEditingProductId(null); }
                setIsProductModalOpen(true);
            };

            const handleProductSave = async () => {
                if (!productData.name) return;
                setLoading(true);
                const { collection, addDoc, updateDoc, doc, serverTimestamp } = window.firebaseSDK;
                try {
                    const payload = { ...productData, updatedAt: serverTimestamp() };
                    if (editingProductId) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', editingProductId), payload);
                    else { payload.createdAt = serverTimestamp(); await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'products'), payload); }
                    setIsProductModalOpen(false);
                } catch (e) { setFormError(e.message); }
                setLoading(false);
            };

            const handleProductDelete = async (id) => {
                if (confirmProductDeleteId === id) { 
                    await window.firebaseSDK.deleteDoc(window.firebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'products', id)); 
                    setConfirmProductDeleteId(null);
                } 
                else { setConfirmProductDeleteId(id); setTimeout(() => setConfirmProductDeleteId(null), 3000); }
            };

            const openCategoryForm = (c = null) => {
                if (c) { setCategoryData(c); setEditingCategoryId(c.id); } 
                else { setCategoryData({ name: '', description: '' }); setEditingCategoryId(null); }
                setIsCategoryModalOpen(true);
            };

            const handleCategorySave = async () => {
                if (!categoryData.name) return;
                setLoading(true);
                const { collection, addDoc, updateDoc, doc, serverTimestamp } = window.firebaseSDK;
                try {
                    const payload = { ...categoryData, updatedAt: serverTimestamp() };
                    if (editingCategoryId) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'productCategories', editingCategoryId), payload);
                    else { payload.createdAt = serverTimestamp(); await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'productCategories'), payload); }
                    setIsCategoryModalOpen(false);
                } catch (e) { setFormError(e.message); }
                setLoading(false);
            };

            const handleCategoryDelete = async (id) => {
                if (confirmCategoryDeleteId === id) { 
                    await window.firebaseSDK.deleteDoc(window.firebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'productCategories', id)); 
                    setConfirmCategoryDeleteId(null);
                } 
                else { setConfirmCategoryDeleteId(id); setTimeout(() => setConfirmCategoryDeleteId(null), 3000); }
            };

            const openUnitForm = (u = null) => {
                if (u) { setUnitData(u); setEditingUnitId(u.id); }
                else { setUnitData({ name: '', symbol: '' }); setEditingUnitId(null); }
                setIsUnitModalOpen(true);
            };

            const handleUnitSave = async () => {
                if (!unitData.name) return;
                setLoading(true);
                const { collection, addDoc, updateDoc, doc, serverTimestamp } = window.firebaseSDK;
                try {
                    const payload = { ...unitData, updatedAt: serverTimestamp() };
                    if (editingUnitId) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'productUnits', editingUnitId), payload);
                    else { payload.createdAt = serverTimestamp(); await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'productUnits'), payload); }
                    setIsUnitModalOpen(false);
                } catch (e) { setFormError(e.message); }
                setLoading(false);
            };

            const handleUnitDelete = async (id) => {
                if (confirmUnitDeleteId === id) { 
                    await window.firebaseSDK.deleteDoc(window.firebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'productUnits', id)); 
                    setConfirmUnitDeleteId(null);
                } 
                else { setConfirmUnitDeleteId(id); setTimeout(() => setConfirmUnitDeleteId(null), 3000); }
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = () => setCropImage(reader.result);
                    reader.readAsDataURL(file);
                }
                e.target.value = '';
            };

                        <div className="absolute left-4 top-1/2 -translate-y-1/2 pointer-events-none text-brand-500">
                            <i className={`fas ${inventoryTab === 'products' ? 'fa-box' : inventoryTab === 'categories' ? 'fa-tags' : 'fa-ruler'} text-sm`}></i>
                        </div>
                        <select 
                            value={inventoryTab} 
                            onChange={(e) => setInventoryTab(e.target.value)}

                            <option value="products">Inventory: Products List</option>
                            <option value="categories">Inventory: Categories List</option>
                            <option value="units">Inventory: Product Units</option>
                        </select>
                        <div className="absolute right-4 top-1/2 -translate-y-1/2 pointer-events-none text-slate-400">

                    {inventoryTab === 'products' && (

                            </div>
                            {products.map(p => {
                                const cat = categories.find(c => c.id === p.categoryId);
                                const unit = units.find(u => u.id === p.unitId);

                                                    <img src={p.photo} className="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" loading="lazy" />

                                                    <i className="fas fa-box text-slate-200 dark:text-slate-500 text-2xl"></i>
                                                )}
                                            </div>
                                            <div className="w-full text-left space-y-0.5 px-0.5">

                                                    <i className="fas fa-tag mr-1 opacity-50"></i>{cat ? cat.name : 'Uncategorized'}

                                                <div className="pt-1 flex items-baseline gap-1">
                                                    <p className="text-xs lg:text-sm font-black text-brand-600 dark:text-brand-400">${parseFloat(p.price || 0).toFixed(2)}</p>
                                                    {unit && <span className="text-[8px] text-slate-400 dark:text-slate-500 uppercase">/ {unit.symbol || unit.name}</span>}
                                                </div>
                                                {p.qty && <p className="text-[9px] font-bold text-slate-500 dark:text-slate-400">Stock: {p.qty}</p>}
                                            </div>
                                        </div>
                                        <div className="flex gap-1 pt-2 border-t border-slate-100 dark:border-slate-700/50 mt-auto">
                                            <button onClick={() => openProductForm(p)} className="flex-1 bg-slate-50 dark:bg-slate-700/60 text-slate-600 dark:text-slate-300 py-1.5 rounded-lg text-[10px] font-bold hover:bg-brand-500 hover:text-white transition-all">Edit</button>
                                            <button onClick={() => handleProductDelete(p.id)} className={`w-8 flex items-center justify-center rounded-lg transition-all ${confirmProductDeleteId === p.id ? 'bg-red-500 text-white' : 'bg-red-500/10 text-red-500 hover:bg-red-500/20'}`}>
                                                <i className={`fas ${confirmProductDeleteId === p.id ? 'fa-check' : 'fa-trash-alt'} text-[10px]`}></i>
                                            </button>
                                        </div>
                                    </div>
                                );
                            })}
                        </div>
                    )}

                    {inventoryTab === 'categories' && (
                        <div className="space-y-3">
                            <div className="flex justify-between px-1 items-center">
                                <h3 className="text-[10px] font-bold text-slate-500 uppercase tracking-widest">Global Groupings</h3>
                                <button onClick={() => openCategoryForm()} className="bg-brand-500 text-white text-[10px] font-bold px-3 py-1.5 rounded-lg shadow-sm hover:shadow-md transition-all">+ NEW CATEGORY</button>
                            </div>
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
                                {categories.map(c => (
                                    <div key={c.id} className="bg-white dark:bg-slate-800/40 p-4 rounded-2xl border border-slate-200 dark:border-slate-700/50 flex justify-between items-center shadow-sm transition-all hover:shadow-md active:scale-[0.99]">
                                        <div className="flex items-center gap-3 min-w-0">
                                            <div className="w-10 h-10 flex-shrink-0 rounded-xl bg-slate-100 dark:bg-slate-700 flex items-center justify-center text-slate-400 shadow-inner">
                                                <i className="fas fa-tag"></i>
                                            </div>
                                            <p className="text-sm font-bold text-slate-900 dark:text-white truncate">{c.name}</p>
                                        </div>
                                        <div className="flex gap-2 flex-shrink-0">
                                            <button onClick={() => openCategoryForm(c)} className="w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-brand-500 hover:text-white transition-colors text-slate-500 p-2"><i className="fas fa-edit"></i></button>
                                            <button onClick={() => handleCategoryDelete(c.id)} className={`w-10 h-10 rounded-xl transition-all flex items-center justify-center shadow-sm ${confirmCategoryDeleteId === c.id ? 'bg-red-500 text-white' : 'bg-red-500/10 text-red-500 hover:bg-red-500/20'}`}>
                                                <i className={`fas ${confirmCategoryDeleteId === c.id ? 'fa-check' : 'fa-trash-alt'} text-xs`}></i>
                                            </button>

                            </div>

                    {inventoryTab === 'units' && (
