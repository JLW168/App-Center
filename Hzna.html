<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OnSale CRM - Outdoor Sales Tracker</title>
    
    <meta name="theme-color" content="#020617">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Performance Hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Moul&family=Siemreap&family=Inter:wght@400;700;900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Battambang', 'Siemreap', 'sans-serif'],
                        display: ['Moul', 'Inter', 'sans-serif'],
                    },
                    screens: {
                        'xs': '375px',
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- React & Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

    <style>
        html, body { 
            font-family: 'Inter', 'Battambang', 'Siemreap', sans-serif;
            overflow-x: hidden; 
            background-color: #020617;
            color: #cbd5e1;
            height: 100%;
        }
        .font-khmer-header { font-family: 'Moul', cursive; }

        /* Splash Screen */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #020617; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.3s ease-out;
        }
        .splash-loader {
            width: 40px; height: 40px;
            border: 4px solid #3b82f6; border-bottom-color: transparent;
            border-radius: 50%; display: inline-block;
            animation: rotation 0.8s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Components */
        .input, .select, .textarea {
            margin-top: 0.25rem; display: block; width: 100%; padding: 0.75rem 1rem;
            border: 1px solid #334155; border-radius: 1rem;
            background-color: #0f172a; color: #f1f5f9; outline: none; transition: all 0.2s;
        }
        .input:focus, .select:focus { border-color: #3b82f6; ring: 2px; ring-color: rgba(59, 130, 246, 0.2); }

        .glass-panel { background: rgba(15, 23, 42, 0.6); backdrop-filter: blur(16px); border: 1px solid rgba(255,255,255,0.05); }
        
        .springboard-card {
            background: rgba(30, 41, 59, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .springboard-card:active { transform: scale(0.92); background: rgba(59, 130, 246, 0.15); }

        .logo-gradient-text {
            background: linear-gradient(135deg, #60a5fa, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
        .safe-pt { padding-top: env(safe-area-inset-top); }
        
        .table-responsive { overflow-x: auto; -webkit-overflow-scrolling: touch; }
        .animate-fade-in { animation: fadeIn 0.3s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: translateY(0); } }

        /* Custom Scrollbar */
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #1e293b; border-radius: 10px; }
    </style>
</head>
<body class="bg-slate-950">
    <div id="splash-screen">
        <span class="splash-loader"></span>
        <h2 style="color: white; font-weight: 900; font-size: 12px; letter-spacing: 0.3em; opacity: 0.8; text-transform: uppercase;">OnSale CRM</h2>
    </div>

    <div id="root"></div>

    <script type="module">
        import { initializeApp, deleteApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, serverTimestamp, setDoc, enableIndexedDbPersistence, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseSDK = {
            initializeApp, deleteApp, getAuth, getFirestore, collection, onSnapshot,
            doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, serverTimestamp,
            signInWithEmailAndPassword, onAuthStateChanged, signOut, setDoc, 
            createUserWithEmailAndPassword, enableIndexedDbPersistence, getDocs
        };
    </script>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, createContext, useContext, memo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAYb0HKLnEUuhrVcQlXACsxFk28w99qAkc",
            authDomain: "onsale-product.firebaseapp.com",
            projectId: "onsale-product",
            storageBucket: "onsale-product.firebasestorage.app",
            messagingSenderId: "837098663012",
            appId: "1:837098663012:web:cb61b9bd7f99ec4d6e8371"
        };
        
        const appId = 'onsale-crm-app';

        // === CONTEXTS ===
        const FirebaseContext = createContext(null);
        const AppDataContext = createContext(null);
        const useFirebase = () => useContext(FirebaseContext);
        const useAppData = () => useContext(AppDataContext);

        const FirebaseProvider = ({ children }) => {
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);
            const [currentUser, setCurrentUser] = useState(null);
            const [userProfile, setUserProfile] = useState(() => {
                try { return JSON.parse(localStorage.getItem('app_user_profile')) || null; } catch(e) { return null; }
            });
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const { initializeApp, getFirestore, getAuth, onAuthStateChanged, enableIndexedDbPersistence } = window.firebaseSDK;
                const app = initializeApp(firebaseConfig);
                const dbInstance = getFirestore(app);
                const authInstance = getAuth(app);
                setAuth(authInstance); setDb(dbInstance);
                enableIndexedDbPersistence(dbInstance).catch(() => {});
                return onAuthStateChanged(authInstance, (user) => {
                    setCurrentUser(user);
                    if (!user) { setUserProfile(null); localStorage.removeItem('app_user_profile'); setLoading(false); }
                });
            }, []);

            useEffect(() => {
                if (!db || !currentUser) return;
                const { doc, onSnapshot } = window.firebaseSDK;
                const userRef = doc(db, 'artifacts', appId, 'users', currentUser.uid);
                return onSnapshot(userRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const profileData = { id: docSnap.id, ...docSnap.data() };
                        setUserProfile(profileData);
                        localStorage.setItem('app_user_profile', JSON.stringify(profileData));
                    }
                    setLoading(false);
                }, () => setLoading(false));
            }, [db, currentUser]);

            return <FirebaseContext.Provider value={{ db, auth, currentUser, userProfile, loading }}>{children}</FirebaseContext.Provider>;
        };

        const AppDataProvider = ({ children }) => {
            const { db, currentUser } = useFirebase();
            const [systemConfig, setSystemConfig] = useState({ appName: 'OnSale CRM' });
            useEffect(() => {
                if(!db || !currentUser) return;
                const { doc, onSnapshot } = window.firebaseSDK;
                const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'systemConfig', 'global');
                return onSnapshot(configRef, (snapshot) => {
                    if (snapshot.exists()) setSystemConfig(snapshot.data());
                });
            }, [db, currentUser]);
            return <AppDataContext.Provider value={{ systemConfig }}>{children}</AppDataContext.Provider>;
        };

        // === UI KIT ===
        const Card = memo(({ children, className = '' }) => (
            <div className={`bg-slate-900/40 p-5 rounded-[2rem] border border-white/5 backdrop-blur-md ${className}`}>{children}</div>
        ));

        const CardTitle = memo(({ children }) => (
            <h2 className="text-sm font-black text-slate-100 mb-5 pb-3 border-b border-white/5 tracking-widest flex items-center gap-2 uppercase">{children}</h2>
        ));

        const Button = memo(({ children, onClick, variant = 'primary', icon, disabled = false, type = 'button', className = '' }) => {
            const base = 'font-black rounded-2xl transition-all flex items-center justify-center gap-2.5 transform active:scale-95 whitespace-nowrap text-[10px] uppercase tracking-widest';
            const variants = {
                primary: 'bg-blue-600 text-white px-5 py-3.5 shadow-lg shadow-blue-500/20',
                secondary: 'bg-slate-800 text-slate-300 px-5 py-3.5 border border-white/5',
                danger: 'bg-red-600 text-white px-5 py-3.5',
            };
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`${base} ${variants[variant] || variants.primary} ${className}`}>
                    {icon && <i className={`fas ${icon}`}></i>} {children}
                </button>
            );
        });

        const Modal = ({ isOpen, onClose, children, maxWidth = "max-w-2xl" }) => { 
            if (!isOpen) return null; 
            return ReactDOM.createPortal(
                <div className="fixed inset-0 z-[100] flex items-center justify-center p-4 bg-slate-950/90 backdrop-blur-xl">
                    <div className={`bg-slate-900 rounded-[2.5rem] shadow-2xl w-full ${maxWidth} border border-white/10 flex flex-col max-h-[85vh] sm:max-h-[90vh] overflow-hidden`}>
                        {children}
                    </div>
                </div>, document.body
            ); 
        };

        const ModalHeader = ({ title, onClose }) => (
            <div className="p-6 border-b border-white/5 flex flex-none justify-between items-center bg-slate-900/50">
                <h3 className="text-lg font-black text-white uppercase tracking-tighter">{title}</h3>
                <button onClick={onClose} className="w-10 h-10 rounded-full bg-slate-800 text-slate-400 flex items-center justify-center active:bg-red-600 active:text-white transition-all"><i className="fas fa-times"></i></button>
            </div>
        );

        // === HOOKS ===
        const useCollection = (collectionName) => {
            const { db, currentUser } = useFirebase();
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            useEffect(() => {
                if (!db || !currentUser) return;
                const { collection, onSnapshot } = window.firebaseSDK;
                const ref = collection(db, 'artifacts', appId, 'public', 'data', collectionName);
                return onSnapshot(ref, (snapshot) => {
                    const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    docs.sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
                    setData(docs); setLoading(false);
                }, () => setLoading(false));
            }, [db, currentUser, collectionName]);
            return { data, loading };
        };

        // === PAGES ===
        const DashboardPage = () => {
            const { data: customers } = useCollection('customers');
            const stats = useMemo(() => ({
                total: customers.length,
                active: customers.filter(c => c.status === 'Active').length
            }), [customers]);

            return (
                <div className="space-y-6 animate-fade-in pb-10">
                    <h3 className="text-3xl font-black text-white uppercase tracking-tighter leading-none">Intelligence</h3>
                    <div className="grid grid-cols-2 gap-4">
                        <div className="bg-slate-900/60 p-6 rounded-[2rem] border border-white/5 shadow-2xl">
                            <p className="text-[9px] font-black uppercase text-slate-500 tracking-widest mb-1">Network</p>
                            <p className="text-3xl font-black text-white">{stats.total}</p>
                        </div>
                        <div className="bg-slate-900/60 p-6 rounded-[2rem] border border-white/5 shadow-2xl">
                            <p className="text-[9px] font-black uppercase text-emerald-500 tracking-widest mb-1">Active</p>
                            <p className="text-3xl font-black text-white">{stats.active}</p>
                        </div>
                    </div>
                </div>
            );
        };

        const CustomersPage = () => {
            const { db, userProfile, currentUser } = useFirebase();
            const { data: customers } = useCollection('customers');
            const [search, setSearch] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editTarget, setEditTarget] = useState(null);
            
            const isAdmin = ['admin', 'management'].includes(userProfile?.role?.toLowerCase());
            const filtered = customers.filter(c => (isAdmin || c.createdBy === currentUser?.uid) && (c.name?.toLowerCase().includes(search.toLowerCase()) || c.phone?.includes(search)));
            const newestEntries = useMemo(() => (isAdmin ? customers : customers.filter(c => c.createdBy === currentUser?.uid)).slice(0, 2), [customers, isAdmin, currentUser]);

            const handleDelete = async (id) => {
                const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'customers', id);
                if (!confirm("Remove this registration?")) return;
                const { deleteDoc } = window.firebaseSDK;
                try { await deleteDoc(docRef); } catch(e) { console.error(e); }
            };

            return (
                <div className="space-y-8 animate-fade-in pb-12">
                    <div className="flex flex-col gap-4">
                        <h3 className="text-3xl font-black text-white uppercase tracking-tighter leading-none">Customer List</h3>
                        <div className="flex gap-3">
                            <input placeholder="Search list..." className="input !mt-0 flex-1 glass-panel border-white/10" value={search} onChange={e=>setSearch(e.target.value)} />
                            <Button icon="fa-plus" onClick={() => {setEditTarget(null); setIsModalOpen(true);}}>Add</Button>
                        </div>
                    </div>

                    <div className="space-y-4">
                        <div className="flex items-center gap-3 px-1">
                            <span className="w-1.5 h-5 bg-blue-500 rounded-full shadow-[0_0_10px_rgba(59,130,246,0.5)]"></span>
                            <h4 className="text-[10px] font-black uppercase text-slate-500 tracking-[0.2em]">New Registrations</h4>
                        </div>
                        {/* UPDATE: Forced 2-column grid for mobile */}
                        <div className="grid grid-cols-2 gap-3 xs:gap-4">
                            {newestEntries.length > 0 ? newestEntries.map(c => (
                                <div key={c.id} className="glass-panel p-3.5 xs:p-5 rounded-[1.8rem] xs:rounded-[2.2rem] flex flex-col min-h-[260px] relative overflow-hidden group hover:border-blue-500/30 transition-all">
                                    <div className="flex justify-between items-start mb-3 relative z-10">
                                        <div className="flex-1">
                                            <div className="flex flex-wrap gap-1.5 xs:gap-2 mb-2">
                                                <span className={`text-[7px] xs:text-[8px] font-black uppercase px-1.5 xs:px-2 py-0.5 rounded-lg border inline-block ${c.status === 'Active' ? 'text-emerald-400 border-emerald-500/20 bg-emerald-500/5' : 'text-slate-500 border-white/10 bg-slate-800'}`}>
                                                    {c.status}
                                                </span>
                                                <span className="text-[7px] xs:text-[8px] font-black uppercase px-1.5 xs:px-2 py-0.5 rounded-lg border border-blue-500/20 text-blue-400 bg-blue-500/5">
                                                    {c.type || 'Retail'}
                                                </span>
                                            </div>
                                            <h3 className="text-base xs:text-xl font-black text-white uppercase tracking-tight leading-tight mb-1 line-clamp-1">{c.name}</h3>
                                            <p className="text-[8px] xs:text-[9px] font-bold text-slate-500 tracking-widest uppercase mb-3 line-clamp-1">ID: {c.sellerName || 'SYSTEM'}</p>
                                            
                                            <div className="space-y-1.5 mb-2">
                                                <div className="flex items-center gap-2">
                                                    <i className="fas fa-user-tie text-blue-500 text-[9px] xs:text-[10px]"></i>
                                                    <p className="text-[9px] xs:text-[10px] text-slate-300 font-bold uppercase tracking-tight line-clamp-1">{c.contactPerson || 'No Contact'}</p>
                                                </div>
                                                <div className="flex items-start gap-2">
                                                    <i className="fas fa-location-dot text-blue-500 text-[9px] xs:text-[10px] mt-1"></i>
                                                    <p className="text-[9px] xs:text-[10px] text-slate-400 leading-relaxed italic line-clamp-2">{c.address || 'No address'}</p>
                                                </div>
                                            </div>
                                        </div>
                                        <div className="flex flex-col gap-2 ml-2 xs:ml-4">
                                            <button onClick={() => {setEditTarget(c); setIsModalOpen(true);}} className="w-8 h-8 xs:w-9 xs:h-9 rounded-xl bg-slate-800 text-blue-400 flex items-center justify-center border border-white/5 active:bg-blue-600 active:text-white transition-all">
                                                <i className="fas fa-edit text-[10px] xs:text-xs"></i>
                                            </button>
                                            <button onClick={() => handleDelete(c.id)} className="w-8 h-8 xs:w-9 xs:h-9 rounded-xl bg-red-950/20 text-red-500 flex items-center justify-center border border-red-500/10 active:bg-red-600 active:text-white transition-all">
                                                <i className="fas fa-trash-alt text-[10px] xs:text-xs"></i>
                                            </button>
                                        </div>
                                    </div>
                                    <div className="mt-auto pt-3 xs:pt-4 border-t border-white/5 flex flex-wrap items-center gap-2 xs:gap-4 relative z-10">
                                        <a href={`tel:${c.phone}`} className="flex items-center gap-1.5 xs:gap-2 text-blue-400 font-black text-[10px] xs:text-xs hover:text-blue-300">
                                            <div className="w-7 h-7 xs:w-8 xs:h-8 rounded-lg bg-blue-600 flex items-center justify-center text-white shadow-lg"><i className="fas fa-phone-alt text-[9px] xs:text-[10px]"></i></div>
                                            <span className="hidden xs:inline">{c.phone}</span>
                                            <span className="inline xs:hidden">Call</span>
                                        </a>
                                        {c.lat && (
                                            <a href={`https://www.google.com/maps?q=${c.lat},${c.lng}`} target="_blank" className="flex items-center gap-1.5 xs:gap-2 text-emerald-400 font-black text-[10px] xs:text-xs ml-auto hover:text-emerald-300">
                                                <div className="w-7 h-7 xs:w-8 xs:h-8 rounded-lg bg-emerald-600 flex items-center justify-center text-white shadow-lg"><i className="fas fa-map-marked-alt text-[9px] xs:text-[10px]"></i></div>
                                                Map
                                            </a>
                                        )}
                                    </div>
                                    <div className="absolute -right-6 -bottom-6 w-32 h-32 bg-blue-600/5 rounded-full blur-3xl group-hover:bg-blue-600/10 pointer-events-none transition-all"></div>
                                </div>
                            )) : (
                                <div className="col-span-2 p-12 text-center glass-panel rounded-[2rem] border-dashed border-white/10">
                                    <p className="text-[10px] font-black uppercase text-slate-600 tracking-[0.4em]">No records found</p>
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="bg-slate-900/40 rounded-[2rem] border border-white/5 overflow-hidden shadow-2xl">
                        <div className="table-responsive custom-scrollbar">
                            <table className="w-full text-left text-sm min-w-[950px]">
                                <thead>
                                    <tr className="bg-slate-900/80 text-[10px] text-slate-500 font-black uppercase tracking-widest border-b border-white/5">
                                        <th className="px-6 py-5">Entity Point</th>
                                        <th className="px-6 py-5">Contact Person</th>
                                        <th className="px-6 py-5">Phone</th>
                                        <th className="px-6 py-5">Market Type</th>
                                        <th className="px-6 py-5 text-center">Status</th>
                                        <th className="px-6 py-5 text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-white/5">
                                    {filtered.map(c => (
                                        <tr key={c.id} className="hover:bg-blue-500/5 transition-colors group">
                                            <td className="px-6 py-5 font-black text-slate-200 uppercase tracking-tight">
                                                {c.name}
                                            </td>
                                            <td className="px-6 py-5 text-[11px] font-bold text-slate-300 uppercase">{c.contactPerson || '-'}</td>
                                            <td className="px-6 py-5 font-mono"><a href={`tel:${c.phone}`} className="text-blue-400 font-bold hover:underline">{c.phone}</a></td>
                                            <td className="px-6 py-5">
                                                <span className="text-[9px] font-black uppercase px-2 py-1 rounded-lg border border-blue-500/20 text-blue-400 bg-blue-500/5">{c.type || 'Retail'}</span>
                                            </td>
                                            <td className="px-6 py-5 text-center"><span className="text-[9px] font-black uppercase px-2.5 py-1 rounded-lg border border-white/5 bg-slate-800 group-hover:bg-slate-700 transition-colors">{c.status}</span></td>
                                            <td className="px-6 py-5 text-right">
                                                <div className="flex justify-end gap-2">
                                                    <div className="group relative">
                                                        <button className="w-10 h-10 rounded-xl bg-slate-800 text-slate-500 flex items-center justify-center border border-white/5 hover:text-blue-400 transition-all shadow-md cursor-help">
                                                            <i className="fas fa-location-dot text-xs"></i>
                                                        </button>
                                                        <div className="absolute bottom-full right-0 mb-2 w-48 p-2 bg-slate-900 text-[10px] text-white rounded-lg opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none z-20 border border-white/10 shadow-xl hidden sm:block">
                                                            {c.address || 'No address provided'}
                                                        </div>
                                                    </div>
                                                    
                                                    {c.lat && (
                                                        <a href={`https://www.google.com/maps?q=${c.lat},${c.lng}`} target="_blank" className="w-10 h-10 rounded-xl bg-slate-800 text-emerald-400 flex items-center justify-center border border-white/5 active:bg-emerald-600 active:text-white transition-all shadow-md">
                                                            <i className="fas fa-map-marked-alt text-xs"></i>
                                                        </a>
                                                    )}
                                                    <button onClick={() => {setEditTarget(c); setIsModalOpen(true);}} className="w-10 h-10 rounded-xl bg-slate-800 text-blue-400 flex items-center justify-center border border-white/5 active:bg-blue-600 active:text-white transition-all shadow-md">
                                                        <i className="fas fa-edit text-xs"></i>
                                                    </button>
                                                    <button onClick={() => handleDelete(c.id)} className="w-10 h-10 rounded-xl bg-red-950/20 text-red-500 flex items-center justify-center border border-red-500/10 active:bg-red-600 active:text-white transition-all shadow-md">
                                                        <i className="fas fa-trash-alt text-xs"></i>
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                    <CustomerModal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} customer={editTarget} />
                </div>
            );
        };

        // === MODALS ===

        const CustomerModal = ({ isOpen, onClose, customer }) => {
            const { db, userProfile, currentUser } = useFirebase();
            const [formData, setFormData] = useState({ name: '', contactPerson: '', phone: '', type: 'Retail', status: 'Active', address: '', lat: '', lng: '', sellerName: '', createdBy: '' });
            const [isGettingGPS, setIsGettingGPS] = useState(false);
            const [team, setTeam] = useState([]);
            
            const isAdmin = ['admin', 'management'].includes(userProfile?.role?.toLowerCase());

                            </div>
                            
                            <footer className="p-10 flex-none text-center relative z-10">
                                <div className="inline-flex items-center gap-3 px-6 py-2.5 bg-slate-900/40 rounded-full border border-white/5 backdrop-blur-md shadow-2xl">
                                    <span className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_10px_rgba(16,185,129,0.5)]"></span>
                                    <span className="text-[9px] font-black uppercase tracking-[0.3em] text-slate-500">Secure Node Sync Active</span>
                                </div>
                            </footer>
                        </div>
                    )}
                </div>
            );
        };

        const LoginPage = () => {
            const { auth } = useFirebase();
            const [email, setEmail] = useState(''); const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const handleLogin = async (e) => { e.preventDefault(); setLoading(true); try { await window.firebaseSDK.signInWithEmailAndPassword(auth, email, password); } catch (err) { alert("Credential verification failed."); setLoading(false); } };
            return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-950 relative overflow-hidden">
                    <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-600/10 blur-[120px] rounded-full pointer-events-none"></div>
                    <div className="w-full max-w-sm glass-panel p-10 rounded-[3.5rem] shadow-[0_35px_60px_-15px_rgba(0,0,0,0.6)] relative z-10 animate-fade-in border-white/10">
                        <div className="flex flex-col items-center mb-8">
                            <AppLabelLogo className="scale-125 mb-4" />
                            <h2 className="text-xl font-black text-white uppercase tracking-tighter">System Access</h2>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-6">
                            <div><label className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1 mb-2 block">System Identity</label><input type="email" placeholder="admin@onsale.com" className="input bg-slate-950/50 border-white/10" value={email} onChange={e=>setEmail(e.target.value)} required /></div>
                            <div><label className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1 mb-2 block">Security Token</label><input type="password" placeholder="••••••••" className="input bg-slate-950/50 border-white/10" value={password} onChange={e=>setPassword(e.target.value)} required /></div>
                            <Button type="submit" className="w-full py-5 shadow-2xl shadow-blue-600/20" disabled={loading}>{loading ? <i className="fas fa-spinner fa-spin mr-2"></i> : 'Authorize'}</Button>
                            <p className="text-slate-600 text-[9px] font-black uppercase tracking-[0.5em] text-center pt-4 opacity-40">AI - JELLY WANG</p>
                        </form>
                    </div>
                </div>
            );
        };

        const AppLabelLogo = ({ className = "" }) => (
            <div className={`flex flex-col ${className}`}>
                <span className="font-khmer-header text-xl tracking-tighter logo-gradient-text uppercase leading-none">OnSale</span>
                <span className="text-[10px] font-black tracking-[0.4em] text-slate-500 uppercase -mt-0.5 pl-0.5 opacity-60">Solutions</span>
            </div>
        );

        const App = () => (<FirebaseProvider><AppDataProvider><AppContent /></AppDataProvider></FirebaseProvider>);
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
