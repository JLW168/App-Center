<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OnSale CRM - Outdoor Sales Tracker</title>
    
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Performance Hints -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link rel="preconnect" href="https://cdnjs.cloudflare.com">
    <link rel="preconnect" href="https://www.gstatic.com">

    <!-- Google Fonts (Khmer & English) -->
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Moul&family=Siemreap&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Battambang', 'Siemreap', 'sans-serif'],
                        display: ['Moul', 'Inter', 'sans-serif'],
                    },
                    animation: {
                        'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    }
                }
            }
        }
    </script>
    <!-- FontAwesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- React & Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

    <style>
        @import url('https://rsms.me/inter/inter.css');
        html, body { 
            font-family: 'Inter', 'Battambang', 'Siemreap', sans-serif;
            overflow-x: hidden; 
            overscroll-behavior-x: none;
            background-color: #020617;
        }
        .font-khmer-header { font-family: 'Moul', cursive; }

        /* Splash Screen */
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #020617; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.3s ease-out, visibility 0.3s;
        }
        .splash-loader {
            width: 40px; height: 40px;
            border: 4px solid #3b82f6; border-bottom-color: transparent;
            border-radius: 50%; display: inline-block;
            box-sizing: border-box; animation: rotation 0.8s linear infinite;
            margin-bottom: 20px;
        }
        @keyframes rotation { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* Optimized Forms */
        .input, .select, .textarea {
            margin-top: 0.25rem; display: block; width: 100%; padding: 0.75rem 1rem;
            border-width: 1px; border-color: #334155; border-radius: 0.75rem;
            background-color: #0f172a; color: #f1f5f9; outline: none; transition: all 0.2s;
        }
        .input:focus, .select:focus, .textarea:focus { border-color: #3b82f6; background-color: #020617; ring: 2px; ring-color: #3b82f6/20; }

        /* Animations */
        .animate-fade-in { animation: fadeIn 0.4s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }

        .login-gradient { background: radial-gradient(circle at top right, #1e293b, #020617); }
        .glass-panel { background: rgba(15, 23, 42, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.08); }
        
        /* Modern Springboard Item */
        .springboard-card {
            background: rgba(30, 41, 59, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.03);
            backdrop-filter: blur(12px);
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }
        .springboard-card:active {
            transform: scale(0.90);
            background: rgba(59, 130, 246, 0.2);
            border-color: rgba(59, 130, 246, 0.4);
        }

        .logo-gradient-text {
            background: linear-gradient(135deg, #60a5fa, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        /* Safe Area Insets for Mobile */
        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
        .safe-pt { padding-top: env(safe-area-inset-top); }
    </style>
</head>
<body class="bg-slate-950 text-slate-300">
    <div id="splash-screen">
        <span class="splash-loader"></span>
        <h2 style="color: white; font-weight: 800; font-size: 12px; letter-spacing: 0.2em; opacity: 0.8;">ONSALE CRM</h2>
    </div>

    <div id="root"></div>

    <script type="module">
        import { initializeApp, deleteApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, serverTimestamp, setDoc, enableIndexedDbPersistence, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseSDK = {
            initializeApp, deleteApp, getAuth, getFirestore, collection, onSnapshot,
            doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, serverTimestamp,
            signInWithEmailAndPassword, onAuthStateChanged, signOut, setDoc, 
            createUserWithEmailAndPassword, enableIndexedDbPersistence, getDocs
        };
    </script>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo, useCallback, createContext, useContext, memo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAYb0HKLnEUuhrVcQlXACsxFk28w99qAkc",
            authDomain: "onsale-product.firebaseapp.com",
            projectId: "onsale-product",
            storageBucket: "onsale-product.firebasestorage.app",
            messagingSenderId: "837098663012",
            appId: "1:837098663012:web:cb61b9bd7f99ec4d6e8371"
        };
        
        const appId = 'onsale-crm-app';

        // === CONTEXTS ===
        const FirebaseContext = createContext(null);
        const AppDataContext = createContext(null);
        const useFirebase = () => useContext(FirebaseContext);
        const useAppData = () => useContext(AppDataContext);

        const FirebaseProvider = ({ children }) => {
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);
            const [currentUser, setCurrentUser] = useState(null);
            const [userProfile, setUserProfile] = useState(() => {
                try { return JSON.parse(localStorage.getItem('app_user_profile')) || null; } catch(e) { return null; }
            });
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const { initializeApp, getFirestore, getAuth, onAuthStateChanged, enableIndexedDbPersistence } = window.firebaseSDK;
                const app = initializeApp(firebaseConfig);
                const dbInstance = getFirestore(app);
                const authInstance = getAuth(app);
                setAuth(authInstance); setDb(dbInstance);
                enableIndexedDbPersistence(dbInstance).catch(() => {});
                return onAuthStateChanged(authInstance, (user) => {
                    setCurrentUser(user);
                    if (!user) { setUserProfile(null); localStorage.removeItem('app_user_profile'); setLoading(false); }
                });
            }, []);

            useEffect(() => {
                if (!db || !currentUser) return;
                const { doc, onSnapshot } = window.firebaseSDK;
                const userRef = doc(db, 'artifacts', appId, 'users', currentUser.uid);
                return onSnapshot(userRef, (docSnap) => {
                    if (docSnap.exists()) {
                        const profileData = { id: docSnap.id, ...docSnap.data() };
                        setUserProfile(profileData);
                        localStorage.setItem('app_user_profile', JSON.stringify(profileData));
                    } else {
                        setUserProfile({ name: currentUser.email || 'User', role: 'Staff', uid: currentUser.uid, permissions: ['dashboard', 'customers'] });
                    }
                    setLoading(false);
                }, () => setLoading(false));
            }, [db, currentUser]);

            return <FirebaseContext.Provider value={{ db, auth, currentUser, userProfile, loading }}>{children}</FirebaseContext.Provider>;
        };

        const AppDataProvider = ({ children }) => {
            const { db, currentUser } = useFirebase();
            const [systemConfig, setSystemConfig] = useState({ appName: 'OnSale CRM' });
            useEffect(() => {
                if(!db || !currentUser) return;
                const { doc, onSnapshot } = window.firebaseSDK;
                const configRef = doc(db, 'artifacts', appId, 'public', 'data', 'systemConfig', 'global');
                return onSnapshot(configRef, (snapshot) => {
                    if (snapshot.exists()) setSystemConfig(snapshot.data());
                });
            }, [db, currentUser]);
            return <AppDataContext.Provider value={{ systemConfig }}>{children}</AppDataContext.Provider>;
        };

        // === UI KIT COMPONENTS ===
        const Card = memo(({ children, className = '' }) => (
            <div className={`bg-slate-900/40 p-5 sm:p-7 rounded-[2rem] shadow-2xl border border-white/5 backdrop-blur-md ${className}`}>{children}</div>
        ));

        const CardTitle = memo(({ children }) => (
            <h2 className="text-lg font-black text-slate-100 mb-5 pb-4 border-b border-white/5 tracking-wider flex items-center gap-3 uppercase">{children}</h2>
        ));

        const PageHeader = memo(({ title, children }) => (
            <div className="flex flex-wrap gap-4 justify-between items-center mb-8 px-2">
                <h3 className="text-3xl font-black text-white tracking-tighter uppercase leading-none">{title}</h3>
                <div className="flex flex-wrap gap-3 items-center">{children}</div>
            </div>
        ));

        const Button = memo(({ children, onClick, variant = 'primary', icon, disabled = false, type = 'button', className = '' }) => {
            const base = 'font-black rounded-2xl shadow-lg transition-all flex items-center justify-center gap-2.5 disabled:opacity-50 disabled:cursor-not-allowed transform active:scale-95 whitespace-nowrap text-xs uppercase tracking-widest';
            const variants = {
                primary: 'bg-blue-600 text-white hover:bg-blue-500 px-6 py-3.5 shadow-blue-500/20',
                secondary: 'bg-slate-800 text-slate-300 hover:bg-slate-700 px-5 py-3 border border-white/5',
                danger: 'bg-red-600 text-white hover:bg-red-500 px-5 py-3 shadow-red-500/20',
                success: 'bg-emerald-600 text-white hover:bg-emerald-700 px-5 py-3 shadow-emerald-500/20',
                cyan: 'bg-cyan-600 text-white hover:bg-cyan-500 px-6 py-3.5 shadow-cyan-500/20',
            };
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`${base} ${variants[variant] || variants.primary} ${className}`}>
                    {icon && <i className={`fas ${icon}`}></i>} {children}
                </button>
            );
        });

        const AppLabelLogo = ({ className = "" }) => (
            <div className={`flex flex-col ${className}`}>
                <span className="font-khmer-header text-xl tracking-tighter logo-gradient-text uppercase leading-none">OnSale</span>
                <span className="text-[10px] font-black tracking-[0.4em] text-slate-500 uppercase -mt-0.5 pl-0.5 opacity-60">Solutions</span>
            </div>
        );

        const Modal = ({ isOpen, onClose, children, maxWidth = "max-w-2xl" }) => { 
            if (!isOpen) return null; 
            return ReactDOM.createPortal(
                <div className="fixed inset-0 z-[60] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-lg">
                    <div className={`relative bg-slate-900 rounded-[2.5rem] shadow-2xl w-full ${maxWidth} border border-white/10 flex flex-col max-h-[90vh] overflow-hidden`}>
                        {children}
                    </div>
                </div>, document.body
            ); 
        };
        const ModalHeader = ({ title, onClose }) => (<div className="p-7 border-b border-white/5 flex-none flex justify-between items-center bg-slate-900/50"><h3 className="text-xl font-black text-white uppercase tracking-tighter">{title}</h3><button onClick={onClose} className="w-10 h-10 rounded-full flex items-center justify-center bg-slate-800 text-slate-400 hover:text-white transition-colors border border-white/5"><i className="fas fa-times"></i></button></div>);
        const ModalBody = ({ children, className = "" }) => (<div className={`p-8 flex-1 overflow-y-auto custom-scrollbar ${className}`}>{children}</div>);
        const ModalFooter = ({ children }) => (<div className="p-6 bg-slate-950/40 border-t border-white/5 flex-none flex justify-end gap-3 rounded-b-[2.5rem]">{children}</div>);

        const useCollection = (collectionName) => {
            const { db, currentUser } = useFirebase();
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);
            useEffect(() => {
                if (!db || !currentUser) return;
                const { collection, onSnapshot } = window.firebaseSDK;
                const ref = collection(db, 'artifacts', appId, 'public', 'data', collectionName);
                return onSnapshot(ref, (snapshot) => {
                    const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    docs.sort((a, b) => (b.createdAt?.toMillis?.() || 0) - (a.createdAt?.toMillis?.() || 0));
                    setData(docs); setLoading(false);
                }, () => setLoading(false));
            }, [db, currentUser, collectionName]);
            return { data, loading };
        };

        const APP_MODULES_LIST = [
            { key: 'dashboard', label: 'Dashboard', icon: 'fa-chart-pie', color: 'text-blue-500' },
            { key: 'customers', label: 'Customers', icon: 'fa-store', color: 'text-emerald-500' },
            { key: 'visits', label: 'GPS Visits', icon: 'fa-location-dot', color: 'text-amber-500' },
            { key: 'orders', label: 'Orders', icon: 'fa-file-invoice-dollar', color: 'text-purple-500' },
            { key: 'products', label: 'Products', icon: 'fa-box-open', color: 'text-cyan-500' },
        ];

        // === DASHBOARD ===
        const DashboardPage = () => {
            const { userProfile } = useFirebase();
            const { data: customers } = useCollection('customers');
            const stats = useMemo(() => ({
                total: customers.length,
                active: customers.filter(c => c.status === 'Active').length,
                retail: customers.filter(c => c.type === 'Retail').length,
                wholesale: customers.filter(c => c.type === 'Wholesale').length
            }), [customers]);

            const StatCard = ({ title, value, icon, color }) => (
                <div className="bg-slate-900/60 p-7 rounded-[2rem] border border-white/5 shadow-2xl flex items-center gap-6 group hover:-translate-y-1.5 transition-all">
                    <div className={`w-16 h-16 rounded-2xl ${color} flex items-center justify-center text-white text-3xl shadow-2xl shadow-${color.split('-')[1]}-500/20 group-hover:scale-110 transition-transform`}><i className={`fas ${icon}`}></i></div>
                    <div><p className="text-[10px] font-black uppercase text-slate-500 tracking-[0.2em] mb-1">{title}</p><p className="text-4xl font-black text-white tracking-tighter">{value}</p></div>
                </div>
            );

            return (
                <div className="space-y-10 animate-fade-in pb-12">
                    <div className="flex flex-col">
                        <span className="text-[11px] font-black uppercase text-blue-500 tracking-[0.3em] mb-2">Market Overview</span>
                        <h3 className="text-4xl font-black text-white tracking-tighter uppercase leading-none">Sales Intelligence</h3>
                    </div>
                    <div className="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-6">
                        <StatCard title="Total Customers" value={stats.total} icon="fa-store" color="bg-blue-600" />
                        <StatCard title="Active Network" value={stats.active} icon="fa-check" color="bg-emerald-600" />
                        <StatCard title="Retail Points" value={stats.retail} icon="fa-shopping-bag" color="bg-indigo-600" />
                        <StatCard title="Wholesale hubs" value={stats.wholesale} icon="fa-truck" color="bg-purple-600" />
                    </div>
                </div>
            );
        };

        // === ORDERS MODULE ===
        const OrdersPage = () => {
            const { db, userProfile } = useFirebase();
            const { data: orders, loading } = useCollection('orders');
            const [search, setSearch] = useState('');
            
            return (
                <div className="space-y-8 animate-fade-in pb-12">
                    <PageHeader title="Logistics">
                        <div className="flex gap-3">
                            <input placeholder="Search orders..." className="input !mt-0 w-full sm:w-80 shadow-2xl" value={search} onChange={e=>setSearch(e.target.value)} />
                            <Button icon="fa-plus-circle" variant="primary">Create Order</Button>
                        </div>
                    </PageHeader>
                    
                    <div className="bg-slate-900/40 rounded-[2.5rem] border border-white/5 overflow-hidden shadow-2xl backdrop-blur-md">
                        <div className="table-responsive">
                            <table className="w-full text-left text-sm min-w-[900px]">
                                <thead>
                                    <tr className="bg-slate-900/60 text-slate-500 font-black uppercase text-[10px] tracking-widest border-b border-white/5">
                                        <th className="px-7 py-6">Order ID</th>
                                        <th className="px-7 py-6">Client Shop</th>
                                        <th className="px-7 py-6">Value ($)</th>
                                        <th className="px-7 py-6 text-center">Status</th>
                                        <th className="px-7 py-6 text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-white/5">
                                    {orders.length === 0 ? (
                                        <tr>
                                            <td colSpan="5" className="px-7 py-20 text-center text-slate-600 text-[10px] font-black uppercase tracking-[0.5em] italic">No active orders found</td>
                                        </tr>
                                    ) : (
                                        orders.map(o => (
                                            <tr key={o.id} className="hover:bg-blue-500/5 transition-all">
                                                <td className="px-7 py-6 font-mono font-bold text-blue-400">#{o.id.substring(0,8).toUpperCase()}</td>
                                                <td className="px-7 py-6 font-black text-slate-100 uppercase tracking-tight">{o.customerName}</td>
                                                <td className="px-7 py-6 font-mono font-black text-emerald-400">${parseFloat(o.total || 0).toFixed(2)}</td>
                                                <td className="px-7 py-6 text-center">
                                                    <span className="px-3 py-1.5 rounded-xl text-[9px] font-black uppercase border border-amber-500/20 bg-amber-500/10 text-amber-500">Pending</span>
                                                </td>
                                                <td className="px-7 py-6 text-right">
                                                    <div className="flex justify-end gap-2.5">
                                                        <button className="w-11 h-11 flex items-center justify-center rounded-2xl bg-slate-800 text-blue-400 hover:bg-blue-600 transition-all shadow-lg"><i className="fas fa-eye"></i></button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        // === CATEGORY MANAGEMENT ===
        const CategoryModal = ({ isOpen, onClose, category }) => {
            const { db, currentUser } = useFirebase();
            const [name, setName] = useState('');
            const [isSaving, setIsSaving] = useState(false);
            useEffect(() => {
                if (category) setName(category.name || '');
                else setName('');
            }, [category, isOpen]);
            const handleSubmit = async (e) => {
                e.preventDefault(); setIsSaving(true);
                const { collection, doc, addDoc, updateDoc, serverTimestamp } = window.firebaseSDK;
                const ref = collection(db, 'artifacts', appId, 'public', 'data', 'productCategories');
                try {
                    if (category?.id) await updateDoc(doc(ref, category.id), { name, updatedAt: serverTimestamp() });
                    else await addDoc(ref, { name, createdBy: currentUser.uid, createdAt: serverTimestamp() });
                    onClose();
                } catch (err) { alert(err.message); } finally { setIsSaving(false); }
            };
            return (
                <Modal isOpen={isOpen} onClose={onClose} maxWidth="max-w-md">
                    <form onSubmit={handleSubmit} className="flex flex-col h-full overflow-hidden">
                        <ModalHeader title={category ? "Edit Category" : "New Category"} onClose={onClose} />
                        <ModalBody><label className="text-[10px] font-black uppercase text-blue-500 tracking-widest ml-1">Category Name *</label><input value={name} onChange={e=>setName(e.target.value)} className="input border-blue-500/20 mt-2" required placeholder="Beverage, Food, etc." /></ModalBody>
                        <ModalFooter><Button type="button" variant="secondary" onClick={onClose}>Cancel</Button><Button type="submit" disabled={isSaving}>{isSaving ? '...' : 'Save'}</Button></ModalFooter>
                    </form>
                </Modal>
            );
        };

        const CategoryManagementSection = () => {
            const { db } = useFirebase();
            const { data: categories, loading } = useCollection('productCategories');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editTarget, setEditTarget] = useState(null);
            const handleDelete = async (cat) => {
                if (!confirm(`Delete category "${cat.name}"?`)) return;
                const { doc, deleteDoc } = window.firebaseSDK;
                try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'productCategories', cat.id)); } catch (err) { alert(err.message); }
            };
            return (
                <div className="space-y-6">
                    <div className="flex justify-between items-center"><h4 className="text-base font-black text-white uppercase tracking-widest">Classifications</h4><Button variant="primary" icon="fa-plus" onClick={() => {setEditTarget(null); setIsModalOpen(true);}}>Add</Button></div>
                    <div className="table-responsive bg-slate-950/40 rounded-3xl border border-white/5 overflow-hidden">
                        <table className="w-full text-left text-sm border-collapse">
                            <thead><tr className="bg-slate-900/60 text-slate-500 font-black uppercase text-[10px] tracking-widest border-b border-white/5"><th className="px-6 py-5">Name</th><th className="px-6 py-5 text-right">Actions</th></tr></thead>
                            <tbody className="divide-y divide-white/5">
                                {categories.map(c => (
                                    <tr key={c.id} className="hover:bg-blue-500/5 transition-colors"><td className="px-6 py-5 font-bold text-slate-100 uppercase tracking-tighter">{c.name}</td><td className="px-6 py-5 text-right"><div className="flex justify-end gap-2"><button onClick={() => {setEditTarget(c); setIsModalOpen(true);}} className="w-9 h-9 flex items-center justify-center rounded-xl bg-blue-500/10 text-blue-400 hover:bg-blue-500 hover:text-white transition-all"><i className="fas fa-edit text-xs"></i></button><button onClick={() => handleDelete(c)} className="w-9 h-9 flex items-center justify-center rounded-xl bg-red-500/10 text-red-500 hover:bg-red-500 hover:text-white transition-all"><i className="fas fa-trash-alt text-xs"></i></button></div></td></tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                    <CategoryModal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} category={editTarget} />
                </div>
            );
        };

        const UserManagementTab = () => {
            const { db, userProfile } = useFirebase();
            const [users, setUsers] = useState([]);
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingUser, setEditingUser] = useState(null);
            const isAdmin = userProfile?.role?.trim().toLowerCase() === 'admin';
            useEffect(() => {
                if (!db) return;
                const { collection, onSnapshot } = window.firebaseSDK;
                return onSnapshot(collection(db, 'artifacts', appId, 'users'), (snap) => {
                    const list = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    list.sort((a, b) => {
                        const r = { 'Admin': 1, 'Management': 2, 'Staff': 3 };
                        return (r[a.role] || 4) - (r[b.role] || 4) || (a.name || '').localeCompare(b.name || '');
                    });
                    setUsers(list);
                });
            }, [db]);
            return (
                <div className="space-y-6">

                const { doc, setDoc, serverTimestamp } = window.firebaseSDK;

                            <Card><CategoryManagementSection /></Card>

        // === USER MANAGEMENT MODAL ===
        const CreateUserModal = ({ isOpen, onClose, editingUser = null }) => {
            const { db, userProfile } = useFirebase();
            const [formData, setFormData] = useState({ name: '', email: '', password: '', role: 'Staff', sellerName: '', contactNumber: '', permissions: ['dashboard', 'customers'] });
            const [isSaving, setIsSaving] = useState(false);
            const [error, setError] = useState('');
            const isAdmin = userProfile?.role?.trim().toLowerCase() === 'admin';

            useEffect(() => {
                if (editingUser) setFormData({ name: editingUser.name || '', email: editingUser.email || '', password: '', role: editingUser.role || 'Staff', sellerName: editingUser.sellerName || '', contactNumber: editingUser.contactNumber || '', permissions: editingUser.permissions || ['dashboard', 'customers'] });
                else setFormData({ name: '', email: '', password: '', role: 'Staff', sellerName: '', contactNumber: '', permissions: ['dashboard', 'customers'] });
            }, [editingUser, isOpen]);

            const handleSubmit = async (e) => {
                e.preventDefault(); setIsSaving(true);
                try {
                    const { initializeApp, deleteApp, getAuth, createUserWithEmailAndPassword, doc, updateDoc, setDoc, serverTimestamp } = window.firebaseSDK;
                    if (editingUser) await updateDoc(doc(db, 'artifacts', appId, 'users', editingUser.id), { ...formData, updatedAt: serverTimestamp() });
                    else {
                        const tempApp = initializeApp(firebaseConfig, "Temp_" + Date.now());
                        const userCred = await createUserWithEmailAndPassword(getAuth(tempApp), formData.email, formData.password);
                        await setDoc(doc(db, 'artifacts', appId, 'users', userCred.user.uid), { ...formData, createdAt: serverTimestamp() });
                        await getAuth(tempApp).signOut(); await deleteApp(tempApp);
                    }
                    onClose();

                                                </td>
                                                <td className="px-7 py-6 text-center">
                                                    <span className={`px-3 py-1.5 rounded-xl text-[9px] font-black uppercase border ${c.status === 'Active' ? 'text-emerald-400 border-emerald-500/20 bg-emerald-500/10' : 'text-slate-500 border-white/5 bg-slate-800'}`}>
                                                        {c.status}
                                                    </span>
                                                </td>
                                                <td className="px-7 py-6 text-right">
                                                    <div className="flex justify-end gap-2.5">
                                                        <button onClick={() => {setEditTarget(c); setIsModalOpen(true);}} className="w-11 h-11 flex items-center justify-center rounded-2xl bg-slate-800 text-blue-400 hover:bg-blue-600 hover:text-white transition-all shadow-lg"><i className="fas fa-edit"></i></button>
                                                        <button onClick={() => handleDelete(c.id)} className="w-11 h-11 flex items-center justify-center rounded-2xl bg-red-950/20 text-red-500 hover:bg-red-600 hover:text-white transition-all shadow-lg border border-red-500/10"><i className="fas fa-trash-alt"></i></button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    </div>
                    
                    <CustomerModal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} customer={editTarget} />
                </div>
            );
        };

        // === PRODUCTS ===
        const ProductModal = ({ isOpen, onClose, product }) => {
            const { db, currentUser } = useFirebase();
            const { data: categories } = useCollection('productCategories');
            const [formData, setFormData] = useState({ name: '', sku: '', barcode: '', category: 'General', price: '', stock: '', notes: '' });
            const [isSaving, setIsSaving] = useState(false);
            useEffect(() => {
                if (product) setFormData({ ...product });
                else setFormData({ name: '', sku: '', barcode: '', category: 'General', price: '', stock: '', notes: '' });
            }, [product, isOpen]);
            const handleSubmit = async (e) => {
                e.preventDefault(); setIsSaving(true);
                const { collection, doc, addDoc, updateDoc, serverTimestamp } = window.firebaseSDK;
                const ref = collection(db, 'artifacts', appId, 'public', 'data', 'products');
                try {
                    const data = { ...formData, price: parseFloat(formData.price) || 0, stock: parseInt(formData.stock) || 0, updatedAt: serverTimestamp() };
                    if (product?.id) await updateDoc(doc(ref, product.id), data);
                    else await addDoc(ref, { ...data, createdBy: currentUser.uid, createdAt: serverTimestamp() });
                    onClose();
                } catch (err) { alert(err.message); } finally { setIsSaving(false); }
            };
            return (
                <Modal isOpen={isOpen} onClose={onClose} maxWidth="max-w-3xl">
                    <form onSubmit={handleSubmit} className="flex flex-col h-full overflow-hidden">
                        <ModalHeader title={product ? "Update Product" : "New SKU Registration"} onClose={onClose} />
                        <ModalBody className="space-y-8">
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                                <div className="md:col-span-2"><label className="text-[10px] font-black uppercase text-cyan-500 tracking-widest mb-1.5 block">Official Product Name *</label><input value={formData.name} onChange={e=>setFormData({...formData, name:e.target.value})} className="input border-cyan-500/20" required placeholder="Full item description..." /></div>
                                <div><label className="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-1.5 block">SKU Code</label><input value={formData.sku} onChange={e=>setFormData({...formData, sku:e.target.value})} className="input font-mono" /></div>
                                <div><label className="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-1.5 block">UPC / Barcode</label><input value={formData.barcode} onChange={e=>setFormData({...formData, barcode:e.target.value})} className="input font-mono" /></div>
                                <div><label className="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-1.5 block">Classification</label><select value={formData.category} onChange={e=>setFormData({...formData, category:e.target.value})} className="select font-black uppercase"><option value="General">General</option>{categories.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}</select></div>
                                <div><label className="text-[10px] font-black uppercase text-emerald-500 tracking-widest mb-1.5 block">Unit Price ($)</label><input type="number" step="0.01" value={formData.price} onChange={e=>setFormData({...formData, price:e.target.value})} className="input border-emerald-500/20 font-black" required /></div>
                                <div><label className="text-[10px] font-black uppercase text-amber-500 tracking-widest mb-1.5 block">Available Stock</label><input type="number" value={formData.stock} onChange={e=>setFormData({...formData, stock:e.target.value})} className="input border-amber-500/20 font-black" required /></div>
                                <div className="md:col-span-2"><label className="text-[10px] font-black uppercase text-slate-500 tracking-widest mb-1.5 block">Internal Notes</label><textarea value={formData.notes} onChange={e=>setFormData({...formData, notes:e.target.value})} className="input h-20" rows="2" /></div>
                            </div>
                        </ModalBody>
                        <ModalFooter><Button type="button" variant="secondary" onClick={onClose}>Cancel</Button><Button type="submit" disabled={isSaving}>Commmit Asset</Button></ModalFooter>
                    </form>
                </Modal>
            );
        };

        const ProductsPage = () => {
            const { db, userProfile } = useFirebase();
            const { data: products, loading } = useCollection('products');
            const [search, setSearch] = useState('');
            const [isOpen, setIsOpen] = useState(false);
            const [editTarget, setEditTarget] = useState(null);
            const isAdmin = userProfile?.role?.trim().toLowerCase() === 'admin';
            const filtered = products.filter(p => p.name?.toLowerCase().includes(search.toLowerCase()) || p.sku?.toLowerCase().includes(search.toLowerCase()) || p.barcode?.toLowerCase().includes(search.toLowerCase()));
            const handleDelete = async (p) => {
                if (!confirm(`Delete ${p.name}?`)) return;
                const { doc, deleteDoc } = window.firebaseSDK;
                try { await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'products', p.id)); } catch(e) { alert(e.message); }
            };
            return (
                <div className="space-y-8 animate-fade-in pb-12">
                    <PageHeader title="Catalog"><div className="flex gap-3"><input placeholder="Search assets..." className="input !mt-0 w-full sm:w-80 shadow-2xl" value={search} onChange={e=>setSearch(e.target.value)} />{isAdmin && <Button variant="cyan" icon="fa-plus" onClick={() => {setEditTarget(null); setIsOpen(true);}}>Add</Button>}</div></PageHeader>
                    <div className="bg-slate-900/40 rounded-[2.5rem] border border-white/5 overflow-hidden shadow-2xl backdrop-blur-md"><div className="table-responsive"><table className="w-full text-left text-sm border-collapse min-w-[950px]"><thead><tr className="bg-slate-900/60 text-slate-500 font-black uppercase text-[10px] tracking-widest border-b border-white/5"><th className="px-7 py-6">Product Item</th><th className="px-7 py-6">SKU/Barcode</th><th className="px-7 py-6">Category</th><th className="px-7 py-6 text-right">MSRP</th><th className="px-7 py-6 text-center">Stock</th><th className="px-7 py-6 text-right">Actions</th></tr></thead><tbody className="divide-y divide-white/5">{filtered.map(p => (<tr key={p.id} className="hover:bg-blue-500/5 transition-all"><td className="px-7 py-6"><div className="font-black text-slate-100 uppercase tracking-tight leading-none">{p.name}</div></td><td className="px-7 py-6"><div className="flex flex-col gap-1"><span className="text-[10px] font-mono font-bold text-slate-400">{p.sku || 'N/A'}</span><span className="text-[10px] font-mono text-cyan-500 font-bold">{p.barcode || 'NO-BC'}</span></div></td><td className="px-7 py-6 text-[10px] font-black text-slate-500 uppercase tracking-widest">{p.category}</td><td className="px-7 py-6 text-right font-mono text-emerald-400 font-black text-lg">${parseFloat(p.price).toFixed(2)}</td><td className="px-7 py-6 text-center font-black text-slate-100">{p.stock}</td><td className="px-7 py-6 text-right"><div className="flex justify-end gap-2.5"><button onClick={() => {setEditTarget(p); setIsOpen(true);}} className="w-11 h-11 flex items-center justify-center rounded-2xl bg-slate-800 text-blue-400 hover:bg-blue-600 hover:text-white transition-all shadow-lg"><i className="fas fa-edit"></i></button>{isAdmin && <button onClick={() => handleDelete(p)} className="w-11 h-11 flex items-center justify-center rounded-2xl bg-red-950/20 text-red-500 hover:bg-red-600 hover:text-white transition-all shadow-lg border border-red-500/10"><i className="fas fa-trash-alt"></i></button>}</div></td></tr>))}</tbody></table></div></div>
                    <ProductModal isOpen={isOpen} onClose={() => setIsOpen(false)} product={editTarget} />
                </div>
            );
        };

        // === MAIN APP SHELL ===
        const AppContent = () => {
            const { userProfile, loading, auth } = useFirebase();
            const { systemConfig } = useAppData();
            const [page, setPage] = useState('dashboard');
            // Launchpad defaults to true so it shows immediately after login
            const [launchpad, setLaunchpad] = useState(true);
            const [time, setTime] = useState(new Date());
            
            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);
            
            useEffect(() => { if (!loading) { const s = document.getElementById('splash-screen'); if (s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 400); } } }, [loading]);
            
            if (loading) return null;
            if (!userProfile) return <LoginPage />;

            const userRole = userProfile?.role?.trim().toLowerCase();
            const isAdmin = userRole === 'admin';
            const isMan = userRole === 'management';
            const canAccessSettings = isAdmin || isMan;
            const userPermissions = userProfile?.permissions || [];

            const renderPage = () => {
                if (page === 'settings') return canAccessSettings ? <SettingsPage /> : <div className="p-20 text-center text-red-400 font-black italic uppercase tracking-widest">Unauthorized Entry</div>;
                if (isAdmin || userPermissions.includes(page)) {
                    switch(page) {
                        case 'dashboard': return <DashboardPage />;
                        case 'customers': return <CustomersPage />;
                        case 'products':  return <ProductsPage />;
                        case 'orders':    return <OrdersPage />;
                        default: return <div className="p-20 text-center text-slate-600 uppercase tracking-[0.5em] text-[10px] font-black italic">Module under construction...</div>;
                    }
                }
                return <div className="p-20 text-center text-red-500 font-black italic tracking-widest uppercase">System permission denied.</div>;
            };

            return (
                <div className="flex h-screen bg-[#020617] text-slate-300 font-sans overflow-hidden">
                    <div className="flex-1 flex flex-col min-w-0">
                        <header className="px-6 py-5 flex justify-between items-center bg-slate-950/90 border-b border-white/5 backdrop-blur-xl sticky top-0 z-40">
                            <div className="flex items-center gap-6">
                                <button onClick={() => setLaunchpad(true)} className="w-11 h-11 flex items-center justify-center bg-slate-900 rounded-2xl text-blue-400 border border-white/5 active:scale-90 transition-all hover:bg-slate-800 shadow-2xl">
                                    <i className="fas fa-th-large text-lg"></i>
                                </button>
                                <AppLabelLogo />
                            </div>
                            <div className="flex items-center gap-5">
                                <div className="hidden sm:flex flex-col items-end">
                                    <span className="text-[10px] font-black text-blue-400 uppercase tracking-widest leading-none mb-1">
                                        {time.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}
                                    </span>
                                    <span className="text-[11px] font-black text-white uppercase tracking-tighter">{userProfile.sellerName || userProfile.name}</span>
                                    <div className="flex items-center gap-2">
                                        <span className="w-1.5 h-1.5 rounded-full bg-emerald-500 animate-pulse"></span>
                                        <span className={`text-[9px] font-black uppercase tracking-[0.2em] ${isAdmin ? 'text-amber-500' : isMan ? 'text-blue-400' : 'text-emerald-500 opacity-60'}`}>{userProfile.role}</span>
                                    </div>
                                </div>
                                <button onClick={() => window.firebaseSDK.signOut(auth)} className="w-10 h-10 flex items-center justify-center bg-red-950/20 text-red-500 text-xs rounded-2xl border border-red-500/10 active:scale-95 transition-all shadow-lg hover:bg-red-600 hover:text-white">
                                    <i className="fas fa-power-off"></i>
                                </button>
                            </div>
                        </header>
                        <main className="flex-1 overflow-y-auto p-6 bg-[#020617] relative">
                            {/* Suble Background Gradients */}
                            <div className="absolute top-0 right-0 w-96 h-96 bg-blue-600/5 blur-[120px] pointer-events-none rounded-full"></div>
                            <div className="absolute bottom-0 left-0 w-80 h-80 bg-purple-600/5 blur-[100px] pointer-events-none rounded-full"></div>
                            
                            <div className="max-w-7xl mx-auto relative z-10">{renderPage()}</div>
                        </main>
                    </div>

                    {/* OPTIMIZED MOBILEPAD LAUNCHPAD */}
                    {launchpad && (
                        <div className="fixed inset-0 z-50 bg-[#020617]/95 backdrop-blur-[32px] flex flex-col animate-fade-in safe-pt safe-pb">
                            <div className="absolute inset-0 bg-gradient-to-tr from-blue-900/20 via-transparent to-purple-900/20 opacity-40 pointer-events-none"></div>
                            
                            {/* TOP BAR: Logo, Clock & Logout */}
                            <header className="px-8 py-10 flex justify-between items-center max-w-5xl mx-auto w-full relative z-10">
                                <AppLabelLogo className="scale-[1.1] origin-left" />
                                <div className="flex items-center gap-6">
                                    <div className="flex flex-col items-end">
                                        <span className="text-[12px] font-mono font-black text-blue-400 uppercase tracking-widest leading-none mb-1">
                                            {time.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit', second: '2-digit' })}
                                        </span>
                                        <span className="text-[10px] font-black text-slate-500 uppercase tracking-[0.2em]">Live Session</span>
                                    </div>
                                    <button onClick={() => window.firebaseSDK.signOut(auth)} className="w-12 h-12 flex items-center justify-center bg-red-950/30 text-red-500 rounded-full border border-red-500/20 shadow-2xl active:scale-90 transition-all hover:bg-red-600 hover:text-white">
                                        <i className="fas fa-power-off text-lg"></i>
                                    </button>
                                </div>
                            </header>

                            {/* CENTER SECTION: User Identity & Navigation Grid */}
                            <div className="flex-1 flex flex-col items-center justify-center p-6 relative z-10">
                                <div className="max-w-3xl w-full">
                                    {/* User Branding Section */}
                                    <div className="mb-12 flex flex-col items-center text-center">
                                        <div className="w-20 h-20 rounded-[2rem] bg-gradient-to-tr from-blue-600 to-indigo-600 flex items-center justify-center text-white text-3xl font-black shadow-2xl shadow-blue-600/20 mb-5 border border-white/10">
                                            {(userProfile.sellerName || userProfile.name || 'U').charAt(0).toUpperCase()}
                                        </div>
                                        <h2 className="text-2xl font-black text-white uppercase tracking-tighter leading-none mb-2">
                                            {userProfile.sellerName || userProfile.name}
                                        </h2>
                                        <div className="flex items-center gap-3">
                                            <span className="w-1.5 h-1.5 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_8px_rgba(16,185,129,0.8)]"></span>
                                            <span className={`text-[10px] font-black uppercase tracking-[0.4em] ${isAdmin ? 'text-amber-500' : 'text-blue-400'}`}>
                                                {userProfile.role}
                                            </span>
                                        </div>
                                    </div>

                                    {/* 3-Column Navigation Grid */}
                                    <div className="grid grid-cols-3 gap-6 xs:gap-8 sm:gap-12 items-center justify-items-center">
                                        {[
                                            {id: 'dashboard', icon: 'chart-pie', label: 'Dashboard', color: 'from-blue-600 to-blue-400'}, 
                                            {id: 'customers', icon: 'store', label: 'Customers', color: 'from-emerald-600 to-emerald-400'}, 
                                            {id: 'visits', icon: 'location-dot', label: 'GPS Sync', color: 'from-amber-600 to-amber-400'},
                                            {id: 'orders', icon: 'file-invoice-dollar', label: 'Orders', color: 'from-purple-600 to-purple-400'}, 
                                            {id: 'products', icon: 'box-open', label: 'Inventory', color: 'from-cyan-600 to-cyan-400'}, 
                                            {id: 'settings', icon: 'sliders', label: 'Settings', color: 'from-slate-600 to-slate-400', isSystem: true}
                                        ].filter(m => isAdmin || (m.isSystem ? canAccessSettings : userPermissions.includes(m.id))).map(m => (
                                            <button 
                                                key={m.id} 
                                                onClick={() => {setPage(m.id); setLaunchpad(false);}} 
                                                className="springboard-card w-full max-w-[120px] aspect-square rounded-[2rem] xs:rounded-[3rem] flex flex-col items-center justify-center gap-2 xs:gap-4 group shadow-[0_25px_50px_-12px_rgba(0,0,0,0.5)] overflow-hidden relative"
                                            >
                                                <div className={`w-12 h-12 xs:w-16 xs:h-16 rounded-2xl xs:rounded-3xl bg-gradient-to-br ${m.color} flex items-center justify-center text-white text-xl xs:text-3xl shadow-xl shadow-black/20 group-hover:scale-110 transition-transform`}>
                                                    <i className={`fas fa-${m.icon}`}></i>
                                                </div>
                                                <span className="text-[9px] xs:text-[11px] font-black uppercase tracking-[0.2em] text-slate-400 group-hover:text-white transition-colors">
                                                    {m.label}
                                                </span>
                                                {/* High Gloss Reflection */}
                                                <div className="absolute inset-0 bg-gradient-to-br from-white/10 via-transparent to-transparent opacity-50 pointer-events-none"></div>
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            </div>
                            
                            <footer className="p-12 text-center relative z-10">
                                <div className="inline-flex items-center gap-3 px-6 py-2.5 bg-slate-900/40 rounded-full border border-white/5 backdrop-blur-md shadow-2xl">
                                    <span className="w-2 h-2 bg-emerald-500 rounded-full animate-pulse shadow-[0_0_10px_rgba(16,185,129,0.5)]"></span>
                                    <span className="text-[10px] font-black uppercase tracking-[0.3em] text-slate-500">System Secure & Encrypted</span>
                                </div>
                            </footer>
                        </div>
                    )}
                </div>
            );
        };

        const LoginPage = () => {
            const { auth } = useFirebase();
            const [email, setEmail] = useState(''); const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false); const [error, setError] = useState('');
            const handleLogin = async (e) => { e.preventDefault(); setLoading(true); setError(''); try { await window.firebaseSDK.signInWithEmailAndPassword(auth, email, password); } catch (err) { setError("Credential validation failed."); setLoading(false); } };
            return (
                <div className="min-h-screen flex flex-col md:flex-row bg-[#020617] overflow-hidden">
                    <div className="hidden md:flex md:w-1/2 login-gradient p-16 flex-col justify-between border-r border-white/5 relative">
                        <div className="absolute top-0 right-0 w-full h-full bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')] opacity-20 pointer-events-none"></div>
                        <div className="relative z-10">
                            <AppLabelLogo className="scale-[1.75] origin-left mb-12" />
                            <h1 className="text-6xl font-black text-white leading-[0.9] font-khmer-header tracking-tighter uppercase mt-12">Sales<br/>Intelligence</h1>
                            <p className="text-slate-400 text-xl font-medium tracking-tight max-w-xs mt-6 leading-relaxed opacity-60">Architecting high-performance field operations for the modern era.</p>
                        </div>
                        <p className="text-slate-600 text-[10px] font-black uppercase tracking-[0.5em] relative z-10">AI - JELLY WANG</p>
                    </div>
                    <div className="flex-1 flex items-center justify-center p-8 relative">
                        <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-600/10 blur-[150px] rounded-full pointer-events-none"></div>
                        <div className="w-full max-w-sm animate-fade-in z-10">
                            <div className="md:hidden flex flex-col items-center mb-12">
                                <AppLabelLogo className="scale-125 mb-4" />
                            </div>
                            <div className="glass-panel p-10 sm:p-12 rounded-[3.5rem] shadow-[0_35px_60px_-15px_rgba(0,0,0,0.5)]">
                                <h2 className="text-2xl font-black text-white mb-8 uppercase tracking-tighter text-center">Authentication</h2>
                                {error && <div className="mb-8 p-4 bg-red-950/30 rounded-2xl text-[10px] font-black uppercase tracking-widest text-red-400 border border-red-500/10">{error}</div>}
                                <form onSubmit={handleLogin} className="space-y-7">
                                    <div>
                                        <label className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1 mb-2 block">System Identity</label>
                                        <input type="email" placeholder="admin@onsale.com" className="input h-14 bg-slate-950/50" value={email} onChange={e=>setEmail(e.target.value)} required />
                                    </div>
                                    <div>
                                        <label className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1 mb-2 block">Security Token</label>
                                        <input type="password" placeholder="••••••••" className="input h-14 bg-slate-950/50" value={password} onChange={e=>setPassword(e.target.value)} required />
                                    </div>
                                    <Button type="submit" className="w-full h-15 text-sm py-5 shadow-2xl shadow-blue-600/20" disabled={loading}>
                                        {loading ? <i className="fas fa-circle-notch fa-spin"></i> : 'Verify & Authorize'}
                                    </Button>
                                    <p className="text-slate-600 text-[9px] font-black uppercase tracking-[0.4em] text-center pt-6 opacity-40">AI - <span className="text-slate-400">Jelly Wang</span></p>
                                </form>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const App = () => (<FirebaseProvider><AppDataProvider><AppContent /></AppDataProvider></FirebaseProvider>);
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
