<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>OUNNA | Outdoor Tracking System</title>
    
    <meta name="theme-color" content="#0f172a">
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Moul&family=Siemreap&family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Battambang', 'sans-serif'],
                        display: ['Moul', 'Inter', 'sans-serif'],
                    },
                    colors: {
                        slate: { 750: '#1e293b', 850: '#0f172a', 900: '#0b1120', 950: '#020617' },
                        brand: { 400: '#60a5fa', 500: '#3b82f6', 600: '#2563eb' }
                    },
                    boxShadow: {
                        'glass': '0 4px 30px rgba(0, 0, 0, 0.1)',
                        'glow': '0 0 20px rgba(59, 130, 246, 0.5)'
                    }
                }
            }
        }
    </script>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <!-- React and Babel -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

    <style>
        :root {
            /* Safe area variables with fallbacks */
            --sat: env(safe-area-inset-top, 0px);
            --sab: env(safe-area-inset-bottom, 0px);
        }

        html, body { 
            font-family: 'Inter', sans-serif; 
            height: 100%; 
            width: 100%;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
            /* Prevent bouncing on mobile while still allowing scrolling */
            overscroll-behavior-y: none;
        }

        body {
            background-color: #f8fafc;
            color: #0f172a;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .dark body {
            background-color: #0b1120;
            color: #f8fafc;
        }

        /* Professional Safe Area Utilities */
        .pt-safe { 
            padding-top: calc(var(--sat) + 0.75rem) !important; 
        }
        
        .pb-safe { 
            padding-bottom: calc(var(--sab) + 0.5rem) !important; 
        }

        .h-nav-safe {
            height: calc(4rem + var(--sab));
        }

        .font-khmer-header { font-family: 'Moul', cursive; }
        
        .input, .select, .textarea {
            width: 100%; padding: 0.875rem 1rem;
            border: 1.5px solid #e2e8f0; border-radius: 1rem;
            background-color: rgba(255, 255, 255, 0.8); color: #0f172a; 
            outline: none; transition: all 0.3s ease;
            font-size: 15px; backdrop-filter: blur(8px);
        }
        .dark .input, .dark .select, .dark .textarea {
            border-color: #1e293b;
            background-color: rgba(30, 41, 59, 0.5);
            color: #f8fafc;
        }
        .input:focus, .select:focus { 
            border-color: #3b82f6; 
            background-color: rgba(255, 255, 255, 0.95);
            box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); 
        }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }

        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }
        .animate-slide-up { animation: slideUp 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        #splash-screen {
            position: fixed; inset: 0; background-color: #f8fafc; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease;
        }
        .dark #splash-screen { background-color: #0b1120; }
        
        .fab {
            position: fixed; 
            /* Adjusted FAB position to account for safe nav height */
            bottom: calc(5.5rem + var(--sab)); 
            right: 1.5rem; 
            z-index: 40;
            width: 3.5rem; height: 3.5rem; border-radius: 1.25rem;
            background: linear-gradient(135deg, #3b82f6, #2563eb);
            color: white; display: flex; align-items: center; justify-content: center;
            box-shadow: 0 8px 25px rgba(37, 99, 235, 0.4);
            transition: all 0.2s;
        }
        /* FAB Position for Desktop */
        @media (min-width: 1024px) {
            .fab {
                bottom: 2.5rem;
                right: 2.5rem;
            }
        }
        .fab:active { transform: scale(0.9); }
    </style>
</head>
<body class="max-w-full overflow-x-hidden">
    <div id="splash-screen">
        <div class="w-16 h-16 relative flex items-center justify-center mb-6">
            <div class="absolute inset-0 border-4 border-slate-200 dark:border-slate-800 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-brand-500 border-t-transparent rounded-full animate-spin"></div>
            <i class="fas fa-location-crosshairs text-brand-500 text-xl"></i>
        </div>
        <h2 class="text-xl font-khmer-header text-slate-900 dark:text-white tracking-widest uppercase">OUNNA</h2>
        <p class="text-[10px] font-bold text-brand-500 dark:text-brand-400 tracking-widest mt-2 uppercase">Outdoor Tracking System</p>
    </div>

    <div id="root" class="h-full w-full"></div>

    <script type="module">
        import { initializeApp, deleteApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, serverTimestamp, setDoc } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseSDK = { initializeApp, deleteApp, getAuth, getFirestore, collection, onSnapshot, doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, serverTimestamp, signInWithEmailAndPassword, onAuthStateChanged, signOut, setDoc, createUserWithEmailAndPassword };
    </script>

    <script type="text/babel">
        const { useState, useEffect, useMemo, createContext, useContext, memo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAYb0HKLnEUuhrVcQlXACsxFk28w99qAkc",
            authDomain: "onsale-product.firebaseapp.com",
            projectId: "onsale-product",
            storageBucket: "onsale-product.firebasestorage.app",
            messagingSenderId: "837098663012",
            appId: "1:837098663012:web:cb61b9bd7f99ec4d6e8371"
        };
        const appId = 'onsale-crm-app';

        // --- Theme Hook ---
        const useTheme = () => {
            const [theme, setTheme] = useState(() => {
                try { return localStorage.getItem('theme') || 'dark'; } 
                catch (e) { return 'dark'; }
            });
            useEffect(() => {
                const root = window.document.documentElement;
                root.classList.remove('light', 'dark');
                root.classList.add(theme);
                try { localStorage.setItem('theme', theme); } catch (e) {}
            }, [theme]);
            const toggleTheme = () => setTheme(prev => prev === 'dark' ? 'light' : 'dark');
            return { theme, toggleTheme };
        };

        // --- Context ---
        const FirebaseContext = createContext(null);
        const FirebaseProvider = ({ children }) => {
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);
            const [user, setUser] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const { initializeApp, getFirestore, getAuth, onAuthStateChanged } = window.firebaseSDK;
                const app = initializeApp(firebaseConfig);
                const dbInst = getFirestore(app);
                const authInst = getAuth(app);
                setDb(dbInst); setAuth(authInst);
                return onAuthStateChanged(authInst, (u) => { setUser(u); setLoading(false); });
            }, []);

            return <FirebaseContext.Provider value={{ db, auth, user, loading }}>{children}</FirebaseContext.Provider>;
        };

        const useCollection = (name) => {
            const { db, user } = useContext(FirebaseContext);
            const [data, setData] = useState([]);
            useEffect(() => {
                if (!db || !user) return;
                const { collection, onSnapshot } = window.firebaseSDK;
                const collectionName = name === 'sales' ? 'orders' : name;
                const ref = name === 'users' ? collection(db, 'artifacts', appId, 'users') : collection(db, 'artifacts', appId, 'public', 'data', collectionName);
                return onSnapshot(ref, (snap) => setData(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
            }, [db, user, name]);
            return data;
        };

        const compressImage = (file, callback) => {
            const reader = new FileReader();
            reader.onload = (event) => {
                const img = new Image();
                img.onload = () => {
                    const canvas = document.createElement('canvas');
                    let width = img.width; let height = img.height;
                    const MAX_SIZE = 400; 
                    if (width > height) { if (width > MAX_SIZE) { height *= MAX_SIZE / width; width = MAX_SIZE; } }
                    else { if (height > MAX_SIZE) { width *= MAX_SIZE / height; height = MAX_SIZE; } }
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(img, 0, 0, width, height);
                    callback(canvas.toDataURL('image/jpeg', 0.6)); 
                };
                img.src = event.target.result;
            };
            reader.readAsDataURL(file);
        };

        // --- UI Components ---
        const Button = ({ children, onClick, variant = 'primary', icon, disabled, className = "", type = "button" }) => {
            const baseStyles = "px-6 py-3 rounded-2xl font-semibold text-sm flex items-center justify-center gap-3 transition-all active:scale-[0.98] disabled:opacity-50 disabled:active:scale-100";
            const variants = {
                primary: 'bg-brand-600 hover:bg-brand-500 text-white shadow-lg shadow-brand-500/25',
                secondary: 'bg-slate-100 dark:bg-slate-800 hover:bg-slate-200 dark:hover:bg-slate-700 text-slate-700 dark:text-slate-200 border border-slate-200 dark:border-slate-700',
                ghost: 'bg-transparent hover:bg-slate-100 dark:hover:bg-slate-800 text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white',
                danger: 'bg-red-50 dark:bg-red-500/10 hover:bg-red-100 dark:hover:bg-red-500/20 text-red-600 dark:text-red-400'
            };
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`${baseStyles} ${variants[variant]} ${className}`}>
                    {icon && <i className={`fas ${icon} text-lg`}></i>} {children}
                </button>
            );
        };

        const Avatar = ({ name, url, size = "12", isCircle = false }) => (
            <div className={`w-${size} h-${size} ${isCircle ? 'rounded-full' : 'rounded-2xl'} bg-slate-100 dark:bg-slate-800 border border-slate-200 dark:border-slate-700 flex items-center justify-center text-slate-500 dark:text-slate-400 font-bold uppercase text-lg shadow-inner overflow-hidden flex-none`}>
                {url ? <img src={url} className="w-full h-full object-cover" loading="lazy" /> : (name?.charAt(0) || 'O')}
            </div>
        );

        const FullScreenModal = ({ isOpen, onClose, title, children }) => {
            if (!isOpen) return null;
            return (
                <div className="fixed inset-0 z-[200] flex items-end md:items-center justify-center">
                    {/* Desktop Backdrop */}
                    <div className="hidden md:block absolute inset-0 bg-slate-950/40 backdrop-blur-sm" onClick={onClose}></div>
                    
                    <div className="relative w-full md:max-w-2xl h-full md:h-auto md:max-h-[90vh] bg-slate-50 dark:bg-slate-900 flex flex-col animate-slide-up transition-colors duration-300 md:rounded-3xl shadow-2xl overflow-hidden">
                        <div className="flex items-center justify-between px-6 py-4 pt-safe border-b border-slate-200 dark:border-slate-800/50 bg-white dark:bg-slate-900 sticky top-0 z-10">
                            <button onClick={onClose} className="w-10 h-10 flex items-center justify-center rounded-xl bg-slate-100 dark:bg-slate-800 text-slate-500 dark:text-slate-400 hover:text-slate-900 dark:hover:text-white transition-colors">
                                <i className="fas fa-chevron-down md:hidden"></i>
                                <i className="fas fa-times hidden md:block"></i>
                            </button>
                            <h3 className="font-bold text-lg text-slate-900 dark:text-white">{title}</h3>
                            <div className="w-10"></div> 
                        </div>
                        <div className="flex-1 overflow-y-auto p-6 pb-32 md:pb-12 hide-scrollbar">
                            {children}
                        </div>
                    </div>
                </div>
            );
        };

        // --- Settings View ---
        const SettingsView = () => {
            const users = useCollection('users');
            const drivers = useCollection('drivers');
            const { auth, db } = useContext(FirebaseContext);
            
            const [settingsTab, setSettingsTab] = useState('users'); 
            const [formError, setFormError] = useState('');
            const [loading, setLoading] = useState(false);

            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({ name: '', email: '', password: '', role: 'Staff', status: 'Active', photo: '', sellerId: '', permissions: [] });
            const [editingId, setEditingId] = useState(null);
            const [confirmDeleteId, setConfirmDeleteId] = useState(null);

            const [isDriverModalOpen, setIsDriverModalOpen] = useState(false);
            const [driverData, setDriverData] = useState({ name: '', contact: '', plate: '', photo: '' });
            const [editingDriverId, setEditingDriverId] = useState(null);
            const [confirmDriverDeleteId, setConfirmDriverDeleteId] = useState(null);

            const currentUserProfile = users.find(u => u.email?.toLowerCase() === auth.currentUser?.email?.toLowerCase());
            const currentProfileRole = currentUserProfile?.role || 'Staff';

            const openForm = (u = null) => {
                setFormError('');
                if (u) { 
                    setFormData({ ...u, password: '', sellerId: u.sellerId || '', permissions: u.permissions || [], status: u.status || 'Active' }); 
                    setEditingId(u.id); 
                } 
                else { 
                    setFormData({ name: '', email: '', password: '', role: 'Staff', status: 'Active', photo: '', sellerId: '', permissions: [] }); 
                    setEditingId(null); 
                }
                setIsModalOpen(true);
            };

            const handleSave = async () => {
                setFormError('');
                if (!formData.name || !formData.email) return setFormError("Name and Email are required.");
                if (!editingId && !formData.password) return setFormError("Password is required for new users.");
                if (!editingId && formData.password.length < 6) return setFormError("Password must be at least 6 characters.");
                
                setLoading(true);
                const { doc, setDoc, serverTimestamp, initializeApp, deleteApp, getAuth, createUserWithEmailAndPassword } = window.firebaseSDK;
                
                let secondaryApp = null;
                try {
                    let finalId = editingId;

                    if (!editingId) {
                        const tempAppName = `CreateUser_${Date.now()}`;
                        secondaryApp = initializeApp(firebaseConfig, tempAppName);
                        const secondaryAuth = getAuth(secondaryApp);
                        
                        const userCredential = await createUserWithEmailAndPassword(secondaryAuth, formData.email, formData.password);
                        finalId = userCredential.user.uid; 
                    }

                    const payload = { ...formData, updatedAt: serverTimestamp() };
                    delete payload.password; 

                    if (!editingId) {
                        payload.id = finalId;
                        payload.createdAt = serverTimestamp();
                    }
                    
                    if (payload.role === 'Admin') payload.permissions = ['customers', 'orders', 'products', 'productCategories', 'productUnits', 'drivers'];
                    else if (!payload.permissions || payload.permissions.length === 0) payload.permissions = ['customers', 'orders'];

                    await setDoc(doc(db, 'artifacts', appId, 'users', finalId), payload);
                    
                    if (secondaryApp) await deleteApp(secondaryApp);
                    
                    setIsModalOpen(false); 
                    setEditingId(null);
                } catch (e) { 
                    setFormError(e.message.includes('auth/email-already-in-use') ? "Email already registered." : e.message); 
                    if (secondaryApp) await deleteApp(secondaryApp);
                }
                setLoading(false);
            };

            const handleDelete = async (id) => {
                if (confirmDeleteId === id) { await window.firebaseSDK.deleteDoc(window.firebaseSDK.doc(db, 'artifacts', appId, 'users', id)); setConfirmDeleteId(null); } 
                else { setConfirmDeleteId(id); setTimeout(() => setConfirmDeleteId(null), 3000); }
            };

            const openDriverForm = (d = null) => {
                setFormError('');
                if (d) { setDriverData(d); setEditingDriverId(d.id); } 
                else { setDriverData({ name: '', contact: '', plate: '', photo: '' }); setEditingDriverId(null); }
                setIsDriverModalOpen(true);
            };

            const handleDriverSave = async () => {
                setFormError('');
                if (!driverData.name) return setFormError("Driver Name is required.");
                setLoading(true);
                const { collection, addDoc, updateDoc, doc, serverTimestamp } = window.firebaseSDK;
                try {
                    const payload = { ...driverData, updatedAt: serverTimestamp() };
                    if (editingDriverId) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'drivers', editingDriverId), payload);
                    else { payload.createdAt = serverTimestamp(); await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'drivers'), payload); }
                    setIsDriverModalOpen(false); setEditingDriverId(null);
                } catch (e) { setFormError(e.message); }
                setLoading(false);
            };

            const handleDriverDelete = async (id) => {
                if (confirmDeleteId === id) { await window.firebaseSDK.deleteDoc(window.firebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'drivers', id)); setConfirmDriverDeleteId(null); } 
                else { setConfirmDriverDeleteId(id); setTimeout(() => setConfirmDriverDeleteId(null), 3000); }
            };

            const profileName = currentUserProfile?.name || auth.currentUser?.email?.split('@')[0] || 'User';
            const profilePhoto = currentUserProfile?.photo || '';

            return (
                <div className="space-y-6 pb-20 animate-in fade-in duration-300 px-1 lg:max-w-4xl lg:mx-auto">
                    <div className="bg-white dark:bg-slate-800/40 rounded-3xl p-6 border border-slate-200 dark:border-slate-700/50 flex items-center gap-6 shadow-sm dark:shadow-none transition-colors">
                        <Avatar name={profileName} url={profilePhoto} size="16" isCircle={true} />
                        <div className="flex-1 min-w-0">
                            <h2 className="text-xl font-bold text-slate-900 dark:text-white truncate">{profileName}</h2>
                            <p className="text-sm text-slate-500 dark:text-slate-400 truncate">{auth.currentUser?.email}</p>
                            <span className="inline-block mt-2 px-3 py-1 bg-brand-50 dark:bg-brand-500/10 text-brand-600 dark:text-brand-400 text-xs font-bold rounded-lg uppercase tracking-wide border border-brand-200 dark:border-brand-500/20">{currentProfileRole}</span>
                        </div>
                    </div>

                    <div className="flex bg-slate-100 dark:bg-slate-800/60 p-1.5 rounded-2xl border border-slate-200 dark:border-slate-700/50 shadow-inner">
                        <button onClick={() => setSettingsTab('users')} className={`flex-1 py-3 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-2 ${settingsTab === 'users' ? 'bg-brand-600 text-white shadow-lg' : 'text-slate-400'}`}>
                            <i className="fas fa-users"></i> Users Management
                        </button>
                        <button onClick={() => setSettingsTab('drivers')} className={`flex-1 py-3 rounded-xl text-xs font-bold transition-all flex items-center justify-center gap-2 ${settingsTab === 'drivers' ? 'bg-brand-600 text-white shadow-lg' : 'text-slate-400'}`}>
                            <i className="fas fa-truck"></i> Fleet Management
                        </button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                        {settingsTab === 'users' ? (
                            <>
                                <div className="col-span-full flex justify-between items-center px-1">
                                    <h3 className="text-xs font-bold text-slate-500 uppercase tracking-widest">Active Accounts</h3>
                                    <button onClick={() => openForm()} className="text-brand-500 text-xs font-bold tracking-tight bg-brand-500/10 px-3 py-1.5 rounded-lg"><i className="fas fa-plus-circle mr-1"></i> ADD USER</button>
                                </div>
                                {users.map(u => (
                                    <div key={u.id} className="bg-white dark:bg-slate-800/40 p-5 rounded-2xl border border-slate-200 dark:border-slate-700/50 flex flex-col gap-4 shadow-sm transition-all hover:shadow-md">
                                        <div className="flex items-center justify-between">
                                            <div className="flex items-center gap-4 min-w-0">
                                                <Avatar name={u.name} url={u.photo} size="12" />
                                                <div className="min-w-0">
                                                    <div className="flex items-center gap-2 min-w-0">
                                                        <p className="text-base font-bold text-slate-900 dark:text-white truncate">{u.name}</p>
                                                        <span className={`w-2 h-2 flex-shrink-0 rounded-full ${u.status === 'Inactive' ? 'bg-red-500' : 'bg-green-500'}`}></span>
                                                    </div>
                                                    <p className="text-xs text-slate-500 truncate">{u.email}</p>
                                                </div>
                                            </div>
                                            <div className="flex flex-col items-end gap-1">
                                                <span className="text-[10px] font-bold px-2 py-1 bg-slate-100 dark:bg-slate-700 rounded-lg whitespace-nowrap">{u.role}</span>
                                                {u.sellerId && <span className="text-[10px] font-mono font-black text-brand-500 truncate">ID: {u.sellerId}</span>}
                                            </div>
                                        </div>
                                        <div className="flex gap-2">
                                            <button onClick={() => openForm(u)} className="flex-1 bg-slate-50 dark:bg-slate-700 py-2.5 rounded-xl text-xs font-bold transition-colors hover:bg-brand-500 hover:text-white">Edit Profile</button>
                                            <button onClick={() => handleDelete(u.id)} className={`w-24 py-2.5 rounded-xl text-xs font-bold transition-all ${confirmDeleteId === u.id ? 'bg-red-500 text-white' : 'bg-red-500/10 text-red-500'}`}>{confirmDeleteId === u.id ? 'Confirm' : 'Delete'}</button>
                                        </div>
                                    </div>
                                ))}
                            </>
                        ) : (
                            <>
                                 <div className="col-span-full flex justify-between items-center px-1">
                                    <h3 className="text-xs font-bold text-slate-500 uppercase tracking-widest">Global Fleet</h3>
                                    <button onClick={() => openDriverForm()} className="text-brand-500 text-xs font-bold tracking-tight bg-brand-500/10 px-3 py-1.5 rounded-lg"><i className="fas fa-plus-circle mr-1"></i> ADD DRIVER</button>
                                </div>
                                {drivers.map(d => (
                                    <div key={d.id} className="bg-white dark:bg-slate-800/40 p-5 rounded-2xl border border-slate-200 dark:border-slate-700/50 flex flex-col gap-4 shadow-sm transition-all hover:shadow-md">
                                        <div className="flex items-center gap-4">
                                            <Avatar name={d.name} url={d.photo} size="12" />
                                            <div className="min-w-0">
                                                <p className="text-base font-bold text-slate-900 dark:text-white truncate">{d.name}</p>
                                                <p className="text-sm font-mono text-slate-500 truncate">{d.plate}</p>
                                            </div>
                                        </div>
                                        <div className="flex gap-2 pt-2 border-t border-slate-50 dark:border-slate-700/30">
                                            <button onClick={() => openDriverForm(d)} className="flex-1 bg-slate-50 dark:bg-slate-700 py-2.5 rounded-xl text-xs font-bold hover:bg-brand-500 hover:text-white transition-colors">Edit Details</button>
                                            <button onClick={() => handleDriverDelete(d.id)} className={`w-24 py-2.5 rounded-xl text-xs font-bold transition-all ${confirmDriverDeleteId === d.id ? 'bg-red-500 text-white' : 'bg-red-500/10 text-red-500'}`}>{confirmDriverDeleteId === d.id ? 'Confirm' : 'Delete'}</button>
                                        </div>
                                    </div>
                                ))}
                            </>
                        )}
                    </div>

            const [loading, setLoading] = useState(false);
            const [isProfileMenuOpen, setIsProfileMenuOpen] = useState(false);
            const [confirmDeleteId, setConfirmDeleteId] = useState(null);
            const [formError, setFormError] = useState('');

            const currentUserProfile = useMemo(() => 
                users.find(u => u.email?.toLowerCase() === auth.currentUser?.email?.toLowerCase()), 
                [users, auth.currentUser]
            );
            const profileName = currentUserProfile?.name || user?.email?.split('@')[0] || 'User';
            const profilePhoto = currentUserProfile?.photo || '';

            const handleSave = async () => {
                setFormError('');
                if (!formData.shopName) return setFormError("Shop Name is required");
                setLoading(true);
                const { collection, addDoc, updateDoc, doc, serverTimestamp } = window.firebaseSDK;
                try {
                    const payload = { ...formData, updatedAt: serverTimestamp() };
                    if (editingId) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', editingId), payload);
                    else { payload.createdAt = serverTimestamp(); await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'customers'), payload); }
                    setIsModalOpen(false); 
                    setFormData({ shopName: '', ownerName: '', contact: '', marketType: 'Retail', lat: '', lng: '', photo: '', sellerId: '', googleMapsLink: '', address: '' }); 
                    setEditingId(null);
                } catch (e) { setFormError(e.message); }
                setLoading(false);
            };

            const getGPS = () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        p => setFormData(f => ({...f, lat: p.coords.latitude.toFixed(6), lng: p.coords.longitude.toFixed(6)})),
                        e => setFormError("GPS Access Denied")
                    );
                }
            };

            const openForm = (c = null) => {
                setFormError('');
                if(c) { setFormData({...c}); setEditingId(c.id); } 
                else { setFormData({ shopName: '', ownerName: '', contact: '', marketType: 'Retail', lat: '', lng: '', photo: '', sellerId: '', googleMapsLink: '', address: '' }); setEditingId(null); }
                setIsModalOpen(true);
            };

            const handleDelete = async (id) => {
                if (confirmDeleteId === id) { await window.firebaseSDK.deleteDoc(window.firebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'customers', id)); setConfirmDeleteId(null); } 
                else { setConfirmDeleteId(id); setTimeout(() => setConfirmDeleteId(null), 3000); }
            };

            const filtered = useMemo(() => {
                const s = search.toLowerCase();
                return customers.filter(c => (c.shopName || '').toLowerCase().includes(s) || (c.ownerName || '').toLowerCase().includes(s) || (c.contact || '').includes(s));
            }, [customers, search]);
            
            const displayedCustomers = filtered.slice(0, displayCount);

            return (
                <div className="min-h-screen flex flex-col bg-slate-50 dark:bg-slate-900 transition-colors duration-300 w-full overflow-x-hidden">
                    {/* Responsive Header */}
                    <header className="px-6 pb-4 pt-safe bg-white/80 dark:bg-slate-900/80 backdrop-blur-xl border-b border-slate-200 dark:border-slate-800/50 sticky top-0 z-30 shadow-sm transition-colors">
                        <div className="flex justify-between items-center max-w-7xl mx-auto w-full gap-4">
                            <div className="flex items-center gap-4 min-w-0 flex-1">
                                <div className="w-12 h-12 flex-shrink-0 rounded-2xl bg-gradient-to-br from-brand-500 to-indigo-600 flex items-center justify-center text-white shadow-xl shadow-brand-500/20">
                                    <i className="fas fa-location-crosshairs text-lg"></i>
                                </div>
                                <div className="min-w-0">
                                    <h1 className="font-khmer-header text-base md:text-xl text-slate-900 dark:text-white uppercase leading-tight truncate tracking-wider">OUNNA</h1>
                                    <p className="text-[9px] md:text-[10px] font-black text-brand-500 uppercase tracking-[0.2em] truncate opacity-90">
                                        {activeTab === 'customers' ? 'CRM Tracking' : activeTab === 'inventory' ? 'Inventory Control' : activeTab === 'purchase' ? 'POS Sales' : 'Global Settings'}
                                    </p>
                                </div>
                            </div>

                            {/* Center Navigation for Desktop */}
                            <div className="hidden lg:flex items-center gap-1 bg-slate-100 dark:bg-slate-800/60 p-1 rounded-2xl border border-slate-200 dark:border-slate-800 shadow-inner">
                                <button onClick={() => setActiveTab('customers')} className={`px-5 py-2 rounded-xl text-[11px] font-black uppercase tracking-widest transition-all ${activeTab === 'customers' ? 'bg-white dark:bg-slate-700 text-brand-500 shadow-md' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Clients</button>
                                <button onClick={() => setActiveTab('inventory')} className={`px-5 py-2 rounded-xl text-[11px] font-black uppercase tracking-widest transition-all ${activeTab === 'inventory' ? 'bg-white dark:bg-slate-700 text-brand-500 shadow-md' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Stock</button>
                                <button onClick={() => setActiveTab('purchase')} className={`px-5 py-2 rounded-xl text-[11px] font-black uppercase tracking-widest transition-all ${activeTab === 'purchase' ? 'bg-white dark:bg-slate-700 text-brand-500 shadow-md' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Sales</button>
                                <button onClick={() => setActiveTab('settings')} className={`px-5 py-2 rounded-xl text-[11px] font-black uppercase tracking-widest transition-all ${activeTab === 'settings' ? 'bg-white dark:bg-slate-700 text-brand-500 shadow-md' : 'text-slate-500 hover:text-slate-700 dark:hover:text-slate-300'}`}>Admin</button>
                            </div>

                            <div className="flex items-center gap-3.5 flex-shrink-0">
                                <button onClick={toggleTheme} className="w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-800 flex items-center justify-center transition-all active:scale-90 border border-slate-200 dark:border-slate-700/50 hover:bg-slate-200 dark:hover:bg-slate-700">
                                    {theme === 'dark' ? <i className="fas fa-sun text-amber-400 text-sm"></i> : <i className="fas fa-moon text-indigo-500 text-sm"></i>}
                                </button>
                                <div className="relative">
                                    <div onClick={() => setIsProfileMenuOpen(!isProfileMenuOpen)} className="flex items-center gap-2.5 bg-slate-100 dark:bg-slate-800/40 p-1 pr-3 rounded-2xl cursor-pointer hover:bg-slate-200 dark:hover:bg-slate-700 transition-colors border border-slate-200 dark:border-slate-700/50">
                                        <Avatar name={profileName} url={profilePhoto} size="9" isCircle={true} />
                                        <span className="hidden md:block text-xs font-bold text-slate-700 dark:text-slate-200">{profileName}</span>
                                        <i className="fas fa-chevron-down text-[10px] text-slate-500"></i>
                                    </div>
                                    {isProfileMenuOpen && (
                                        <div className="absolute top-full right-0 mt-3 w-56 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-3xl shadow-2xl py-2 z-50 animate-in fade-in slide-in-from-top-3">
                                            <div className="px-5 py-3 border-b border-slate-100 dark:border-slate-700/50 mb-1">
                                                <p className="text-[10px] font-bold text-slate-400 uppercase tracking-widest">Global Identity</p>
                                                <p className="text-sm font-bold text-slate-900 dark:text-white truncate">{profileName}</p>
                                            </div>
                                            <button onClick={() => window.firebaseSDK.signOut(auth)} className="w-full text-left px-5 py-4 text-red-500 text-xs font-bold flex items-center gap-4 transition-colors hover:bg-red-50 dark:hover:bg-red-500/10">
                                                <i className="fas fa-sign-out-alt"></i> Sign Out Securely
                                            </button>
                                        </div>
                                    )}
                                </div>
                            </div>
                        </div>
                    </header>

                    <main className="flex-1 p-4 md:p-8 pb-32 max-w-7xl mx-auto w-full transition-all">
                        {activeTab === 'customers' ? (
                            <div className="space-y-6 animate-in fade-in duration-300">
                                <div className="relative group md:max-w-2xl mx-auto">
                                    <i className="fas fa-search absolute left-5 top-1/2 -translate-y-1/2 text-slate-400 text-sm transition-colors group-focus-within:text-brand-500"></i>
                                    <input className="input !pl-12 !py-4 shadow-sm text-base border-slate-200 dark:border-slate-800/50" placeholder="Filter by customer, owner, or contact..." value={search} onChange={e => { setSearch(e.target.value); setDisplayCount(20); }} />
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-4 md:gap-6">
                                    {displayedCustomers.map(c => (
                                        <div key={c.id} className="bg-white dark:bg-slate-800/40 border border-slate-200 dark:border-slate-700/50 rounded-3xl p-4 flex flex-col gap-4 relative shadow-sm hover:shadow-xl transition-all active:scale-[0.98]">
                                            {c.sellerId && (
                                                <div className="absolute top-3 left-3 px-2 py-1 bg-slate-900/90 text-white text-[9px] rounded-lg font-mono z-10 shadow-lg uppercase tracking-widest backdrop-blur-md">
                                                    ID:{c.sellerId}
                                                </div>
                                            )}
                                            <div className="flex flex-col items-center text-center gap-2.5 cursor-pointer pt-4 min-w-0" onClick={() => openForm(c)}>
                                                <Avatar name={c.shopName} url={c.photo} size="16" isCircle={true} />
                                                <div className="w-full px-1">
                                                    <h3 className="font-bold text-slate-900 dark:text-white text-sm leading-tight line-clamp-2 min-h-[2.5rem] flex items-center justify-center">{c.shopName}</h3>
                                                    <span className="inline-block text-[9px] font-black bg-brand-50 dark:bg-brand-500/10 text-brand-500 px-3 py-1 rounded-full border border-brand-100/50 dark:border-brand-500/20 uppercase mt-1.5">{c.marketType}</span>
                                                </div>
                                                
                                                <div className="w-full space-y-1 mt-1 overflow-hidden">
                                                    <p className="text-[10px] text-slate-500 dark:text-slate-400 truncate font-medium uppercase"><i className="fas fa-user mr-2 opacity-50"></i>{c.ownerName || 'Unknown Owner'}</p>
                                                    {c.contact && <p className="text-xs font-black text-slate-900 dark:text-white tracking-tight">{c.contact}</p>}
                                                </div>
                                            </div>
                                            <div className="flex gap-2 pt-3 border-t border-slate-100 dark:border-slate-700/50 mt-auto">
                                                <a href={`tel:${c.contact}`} className="flex-1 bg-slate-100 dark:bg-slate-800/60 py-3 rounded-2xl flex items-center justify-center transition-colors hover:bg-brand-500 hover:text-white"><i className="fas fa-phone text-xs"></i></a>
                                                <a href={c.googleMapsLink || (c.lat ? `https://www.google.com/maps?q=${c.lat},${c.lng}` : '#')} target="_blank" className="flex-1 bg-brand-500/10 py-3 rounded-2xl flex items-center justify-center text-brand-500 transition-colors hover:bg-brand-500 hover:text-white"><i className="fas fa-map-marker-alt text-xs"></i></a>
                                                <button onClick={() => handleDelete(c.id)} className={`flex-none h-12 transition-all rounded-2xl ${confirmDeleteId === c.id ? 'bg-red-500 text-white px-4' : 'bg-red-500/10 text-red-500 w-12 hover:bg-red-500/20'}`}>
                                                    {confirmDeleteId === c.id ? <i className="fas fa-check"></i> : <i className="fas fa-trash-alt text-xs"></i>}
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                {filtered.length > displayCount && (
                                    <div className="flex justify-center pt-8">
                                        <button onClick={() => setDisplayCount(prev => prev + 20)} className="px-10 py-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl text-xs font-black tracking-[0.2em] uppercase shadow-lg hover:shadow-xl transition-all active:scale-95">REVEAL MORE CLIENTS</button>
                                    </div>
                                )}
                            </div>
                        ) : activeTab === 'inventory' ? (
                            <InventoryView />
                        ) : activeTab === 'purchase' ? (
                            <PurchaseView />
                        ) : (
                            <SettingsView />
                        )}
                    </main>

                    {activeTab === 'customers' && (
                        <button className="fab shadow-glow lg:hover:scale-110 transition-all" onClick={() => openForm()}>
                            <i className="fas fa-plus text-xl"></i>
                        </button>
                    )}

                    {/* Responsive Navigation - Hidden on large screens because of Top Bar */}
                    <nav className="lg:hidden fixed bottom-0 left-0 w-full bg-white/95 dark:bg-slate-900/95 backdrop-blur-2xl border-t border-slate-200/60 dark:border-slate-800/60 pb-safe z-30 shadow-[0_-10px_30px_rgba(0,0,0,0.1)] transition-colors">
                        <div className="flex justify-around items-center h-nav-safe max-w-lg mx-auto px-4">
                            <button onClick={() => setActiveTab('customers')} className={`flex-1 flex flex-col items-center justify-center gap-1.5 transition-all py-1 ${activeTab === 'customers' ? 'text-brand-500' : 'text-slate-400 opacity-60'}`}>
                                <div className={`w-10 h-1 rounded-full mb-1 transition-all ${activeTab === 'customers' ? 'bg-brand-500' : 'bg-transparent'}`}></div>
                                <i className={`fas fa-users-viewfinder ${activeTab === 'customers' ? 'text-lg' : 'text-base'}`}></i>
                                <span className="text-[9px] font-black uppercase tracking-widest">Clients</span>
                            </button>
                            <button onClick={() => setActiveTab('inventory')} className={`flex-1 flex flex-col items-center justify-center gap-1.5 transition-all py-1 ${activeTab === 'inventory' ? 'text-brand-500' : 'text-slate-400 opacity-60'}`}>
                                <div className={`w-10 h-1 rounded-full mb-1 transition-all ${activeTab === 'inventory' ? 'bg-brand-500' : 'bg-transparent'}`}></div>
                                <i className={`fas fa-warehouse ${activeTab === 'inventory' ? 'text-lg' : 'text-base'}`}></i>
                                <span className="text-[9px] font-black uppercase tracking-widest">Stock</span>
                            </button>
                            <button onClick={() => setActiveTab('purchase')} className={`flex-1 flex flex-col items-center justify-center gap-1.5 transition-all py-1 ${activeTab === 'purchase' ? 'text-brand-500' : 'text-slate-400 opacity-60'}`}>
                                <div className={`w-10 h-1 rounded-full mb-1 transition-all ${activeTab === 'purchase' ? 'bg-brand-500' : 'bg-transparent'}`}></div>
                                <i className={`fas fa-credit-card ${activeTab === 'purchase' ? 'text-lg' : 'text-base'}`}></i>
                                <span className="text-[9px] font-black uppercase tracking-widest">Sales</span>
                            </button>
                            <button onClick={() => setActiveTab('settings')} className={`flex-1 flex flex-col items-center justify-center gap-1.5 transition-all py-1 ${activeTab === 'settings' ? 'text-brand-500' : 'text-slate-400 opacity-60'}`}>
                                <div className={`w-10 h-1 rounded-full mb-1 transition-all ${activeTab === 'settings' ? 'bg-brand-500' : 'bg-transparent'}`}></div>
                                <i className={`fas fa-fingerprint ${activeTab === 'settings' ? 'text-lg' : 'text-base'}`}></i>
                                <span className="text-[9px] font-black uppercase tracking-widest">Admin</span>
                            </button>
                        </div>
                    </nav>

                    {/* Form Modals */}
                    <FullScreenModal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} title="Client Relationship Profile">
                        <div className="space-y-6 md:grid md:grid-cols-2 md:gap-8 md:space-y-0">
                            <div className="flex flex-col items-center">
                                {formError && <div className="w-full bg-red-500/10 text-red-500 p-4 rounded-2xl text-xs text-center font-bold border border-red-500/20 mb-4">{formError}</div>}
                                <div className="relative group">
                                    <div className="w-40 h-40 rounded-[2.5rem] bg-slate-100 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 flex items-center justify-center overflow-hidden shadow-inner cursor-pointer" onClick={() => document.getElementById('f-up').click()}>
                                        {formData.photo ? <img src={formData.photo} className="w-full h-full object-cover" /> : <i className="fas fa-camera text-slate-400 text-5xl"></i>}
                                    </div>
                                    <div className="absolute -bottom-2 -right-2 w-12 h-12 bg-brand-500 text-white rounded-2xl flex items-center justify-center shadow-2xl border-4 border-white dark:border-slate-900 cursor-pointer" onClick={() => document.getElementById('f-up').click()}>
                                        <i className="fas fa-plus"></i>
                                    </div>
                                </div>
                                <input id="f-up" type="file" accept="image/*" className="hidden" onChange={e => {
                                    if(e.target.files[0]) compressImage(e.target.files[0], (res) => setFormData({...formData, photo: res}));
                                }} />
                                <p className="text-[10px] text-slate-400 font-bold uppercase mt-6 tracking-widest">Identification Photo</p>
                            </div>
                            
                            <div className="space-y-5">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-4">Establishment Name</label>
                                    <input className="input" placeholder="Shop / Company Name" value={formData.shopName} onChange={e=>setFormData({...formData, shopName: e.target.value})} />
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-4">Account Type</label>
                                        <select className="select" value={formData.marketType} onChange={e=>setFormData({...formData, marketType: e.target.value})}>
                                            <option value="Retail">Retail</option>
                                            <option value="Wholesale">Wholesale</option>
                                            <option value="Distributor">Distributor</option>
                                        </select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-4">Assigned Rep</label>
                                        <select className="select" value={formData.sellerId} onChange={e=>setFormData({...formData, sellerId: e.target.value})}>
                                            <option value="">No Rep Assigned</option>
                                            {users.map(u => <option key={u.id} value={u.sellerId || u.email}>{u.name} (ID:{u.sellerId || 'N/A'})</option>)}
                                        </select>
                                    </div>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-4">Owner / Contact Person</label>
                                    <input className="input" placeholder="Full Name" value={formData.ownerName} onChange={e=>setFormData({...formData, ownerName: e.target.value})} />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-4">Phone Number</label>
                                    <input className="input" placeholder="+855 XXX XXX XXX" value={formData.contact} onChange={e=>setFormData({...formData, contact: e.target.value})} />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-4">Location & Logistics</label>
                                    <textarea className="textarea" placeholder="Physical Address Details..." rows="3" value={formData.address} onChange={e=>setFormData({...formData, address: e.target.value})} />
                                </div>
                                <div className="flex items-center justify-between bg-slate-100 dark:bg-slate-800 p-4 rounded-3xl border border-slate-200 dark:border-slate-700">
                                    <span className="text-[10px] text-slate-500 font-mono truncate flex-1 mr-4">{formData.lat ? `${formData.lat}, ${formData.lng}` : 'Waiting for GPS Fix...'}</span>
                                    <button onClick={getGPS} className="bg-brand-500 text-white px-5 py-2.5 rounded-xl text-[10px] font-bold shadow-lg shadow-brand-500/30 whitespace-nowrap active:scale-95 transition-transform">UPDATE COORDS</button>
                                </div>
                                <Button className="w-full !py-5 shadow-glow mt-4" onClick={handleSave} disabled={loading}>SYNC CLIENT PROFILE</Button>
                            </div>
                        </div>
                    </FullScreenModal>
                </div>
            );
        };

        const AuthScreen = ({ theme, toggleTheme }) => {
            const { auth } = useContext(FirebaseContext);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleLogin = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                try {
                    await window.firebaseSDK.signInWithEmailAndPassword(auth, email, password);
                } catch (e) { setError('Access Denied: Invalid Credentials'); }
                setLoading(false);
            };

            return (
                <div className="min-h-screen bg-slate-50 dark:bg-[#020617] flex flex-col items-center justify-center p-6 relative overflow-hidden transition-colors duration-300">
                    <button onClick={toggleTheme} className="absolute top-8 right-8 w-12 h-12 rounded-2xl bg-white dark:bg-slate-800 flex items-center justify-center shadow-xl transition-all active:scale-90 border border-slate-100 dark:border-slate-700">
                        {theme === 'dark' ? <i className="fas fa-sun text-amber-400"></i> : <i className="fas fa-moon text-indigo-500"></i>}
                    </button>
                    <div className="w-full max-w-sm space-y-10 text-center relative z-10 animate-slide-up">
                        <div className="space-y-4">
                            <div className="w-24 h-24 bg-gradient-to-br from-brand-500 to-indigo-700 rounded-[2.5rem] mx-auto flex items-center justify-center shadow-glow border border-white/20">
                                <i className="fas fa-location-crosshairs text-white text-5xl"></i>
                            </div>
                            <h1 className="text-5xl font-bold dark:text-white leading-none tracking-tighter uppercase">OUNNA</h1>
                            <p className="text-slate-500 dark:text-slate-400 uppercase text-[10px] tracking-[0.4em] font-black opacity-70">Logistics & CRM Ecosystem</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-6 bg-white/60 dark:bg-slate-800/40 p-10 rounded-[3rem] border border-white/80 dark:border-slate-700 backdrop-blur-3xl shadow-2xl">
                            {error && <div className="bg-red-500/10 text-red-500 p-4 rounded-2xl text-xs font-bold border border-red-500/20">{error}</div>}
                            <div className="space-y-5 text-left">
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-5 block tracking-widest">Operator Email</label>
                                    <input className="input !bg-white/80 dark:!bg-slate-900/50" placeholder="operator@ounna.sys" value={email} onChange={e=>setEmail(e.target.value)} required />
                                </div>
                                <div className="space-y-2">
                                    <label className="text-[10px] font-black text-slate-400 uppercase ml-5 block tracking-widest">Security Token</label>
                                    <input type="password" class="input !bg-white/80 dark:!bg-slate-900/50" placeholder="••••••••" value={password} onChange={e=>setPassword(e.target.value)} required />
                                </div>
                            </div>
                            <Button type="submit" className="w-full shadow-glow !py-5 text-base" disabled={loading}>{loading ? 'VERIFYING...' : 'AUTHORIZE ACCESS'}</Button>
                        </form>
                    </div>
                </div>
            );
        };

        const DeactivatedScreen = ({ toggleTheme, theme }) => {
            const { auth } = useContext(FirebaseContext);
            return (
                <div className="min-h-screen bg-slate-50 dark:bg-slate-950 flex flex-col items-center justify-center p-8 text-center animate-in fade-in duration-700 transition-colors">
                    <button onClick={toggleTheme} className="absolute top-8 right-8 w-12 h-12 rounded-2xl bg-white dark:bg-slate-800 flex items-center justify-center shadow-xl">
                        {theme === 'dark' ? <i className="fas fa-sun text-amber-400"></i> : <i className="fas fa-moon text-indigo-500"></i>}
                    </button>
                    <div className="w-28 h-28 bg-red-500/10 dark:bg-red-500/5 border-2 border-red-500/20 dark:border-red-500/10 rounded-[3rem] flex items-center justify-center mb-10 shadow-2xl">
                        <i className="fas fa-user-lock text-red-500 text-5xl"></i>
                    </div>
                    <h1 className="text-4xl font-black text-slate-900 dark:text-white uppercase tracking-tight mb-2">Access Revoked</h1>
                    <div className="w-16 h-1.5 bg-red-500 mx-auto my-6 rounded-full shadow-lg shadow-red-500/30"></div>
                    <p className="text-slate-500 dark:text-slate-400 max-w-md mx-auto text-base font-medium leading-relaxed mb-12">
                        Your operational status has been set to <span className="font-bold text-red-500">INACTIVE</span>. Please contact system administration for re-authorization.
                    </p>
                    <button onClick={() => window.firebaseSDK.signOut(auth)} className="bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-12 py-5 rounded-[2rem] font-black text-xs tracking-widest transition-all active:scale-95 shadow-2xl shadow-black/20">
                        EXIT TO SECURITY GATE
                    </button>
                </div>
            );
        };

        const App = () => (
            <FirebaseProvider>
                <AppInitializer />
            </FirebaseProvider>
        );

        const AppInitializer = () => {
            const { loading: authLoading, user, db } = useContext(FirebaseContext);
            const { theme, toggleTheme } = useTheme();
            const [profile, setProfile] = useState(null);
            const [profileLoading, setProfileLoading] = useState(true);

            useEffect(() => {
                let unsub = () => {};
                if (user && db) {
                    setProfileLoading(true);
                    const { doc, onSnapshot } = window.firebaseSDK;
                    const profileRef = doc(db, 'artifacts', appId, 'users', user.uid);
                    
                    unsub = onSnapshot(profileRef, (snap) => {
                        setProfile(snap.exists() ? snap.data() : { status: 'Active' });
                        setProfileLoading(false);
                        
                        const splash = document.getElementById('splash-screen');
                        if (splash) { 
                            splash.style.opacity = '0'; 
                            setTimeout(() => splash.remove(), 500); 
                        }
                    }, (error) => {
                        console.error("Profile Fetch Error:", error);
                        setProfileLoading(false);
                        const splash = document.getElementById('splash-screen');
                        if (splash) { splash.style.opacity = '0'; setTimeout(() => splash.remove(), 500); }
                    });
                } else if (!authLoading) {
                    setProfileLoading(false);
                    const splash = document.getElementById('splash-screen');
                    if (splash) { 
                        splash.style.opacity = '0'; 
                        setTimeout(() => splash.remove(), 500); 
                    }
                }
                return () => unsub();
            }, [user, db, authLoading]);

            if (authLoading || (user && profileLoading)) return null;
            
            if (user && profile?.status === 'Inactive') {
                return <DeactivatedScreen theme={theme} toggleTheme={toggleTheme} />;
            }
            
            return user ? <CustomerApp theme={theme} toggleTheme={toggleTheme} /> : <AuthScreen theme={theme} toggleTheme={toggleTheme} />;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
