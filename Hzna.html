                                            </div>
                                        </div>
                                        <div className="flex gap-2 flex-shrink-0">
                                            <button onClick={() => openUnitForm(u)} className="w-10 h-10 rounded-xl bg-slate-100 dark:bg-slate-800 hover:bg-brand-500 hover:text-white transition-colors text-slate-500 p-2"><i className="fas fa-edit"></i></button>
                                            <button onClick={() => handleUnitDelete(u.id)} className={`w-10 h-10 rounded-xl transition-all flex items-center justify-center shadow-sm ${confirmUnitDeleteId === u.id ? 'bg-red-500 text-white' : 'bg-red-500/10 text-red-500 hover:bg-red-500/20'}`}>
                                                <i className={`fas ${confirmUnitDeleteId === u.id ? 'fa-check' : 'fa-trash-alt'} text-xs`}></i>
                                            </button>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    <FullScreenModal isOpen={isProductModalOpen} onClose={() => setIsProductModalOpen(false)} title={editingProductId ? "Edit Product" : "New Product"}>
                        <div className="space-y-6 max-w-2xl mx-auto">
                            {formError && (
                                <div className="bg-red-500/10 border border-red-500/20 text-red-500 p-3 rounded-xl text-xs font-bold text-center">
                                    <i className="fas fa-exclamation-circle mr-2"></i>{formError}
                                </div>
                            )}
                            <div className="flex justify-center mb-2 mt-2">
                                <div className="relative">
                                    <div className="w-28 h-28 rounded-3xl bg-slate-100 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 flex items-center justify-center overflow-hidden shadow-inner cursor-pointer" onClick={() => document.getElementById('p-up').click()}>
                                        {productData.photo ? <img src={productData.photo} className="w-full h-full object-cover" /> : <i className="fas fa-box text-slate-400 text-4xl"></i>}
                                    </div>
                                    <button onClick={() => document.getElementById('p-up').click()} className="absolute -bottom-2 -right-2 w-9 h-9 bg-brand-500 text-white rounded-full flex items-center justify-center shadow-lg border-2 border-white dark:border-slate-900 transition-transform active:scale-95">
                                        <i className="fas fa-camera text-xs"></i>
                                    </button>
                                </div>
                                <input id="p-up" type="file" accept="image/*" className="hidden" onChange={handleFileChange} />
                            </div>
                            <div className="space-y-4">
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-3">Product Name</label>
                                    <input className="input" placeholder="Product Name" value={productData.name} onChange={e=>setProductData({...productData, name: e.target.value})} />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-3">SKU / Barcode</label>
                                    <input className="input" placeholder="SKU / Barcode" value={productData.sku} onChange={e=>setProductData({...productData, sku: e.target.value})} />
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-3">Category</label>
                                        <select className="select" value={productData.categoryId} onChange={e=>setProductData({...productData, categoryId: e.target.value})}>
                                            <option value="">Select Category</option>
                                            {categories.map(c => <option key={c.id} value={c.id}>{c.name}</option>)}
                                        </select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-3">Unit</label>
                                        <select className="select" value={productData.unitId} onChange={e=>setProductData({...productData, unitId: e.target.value})}>
                                            <option value="">Select Unit</option>
                                            {units.map(u => <option key={u.id} value={u.id}>{u.symbol || u.name}</option>)}
                                        </select>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-4">
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-3">Base Price ($)</label>
                                        <input className="input" placeholder="0.00" type="number" step="0.01" value={productData.price} onChange={e=>setProductData({...productData, price: e.target.value})} />
                                    </div>
                                    <div className="space-y-1">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-3">Stock Qty</label>
                                        <input className="input" placeholder="0" type="number" value={productData.qty} onChange={e=>setProductData({...productData, qty: e.target.value})} />
                                    </div>
                                </div>
                            </div>
                            <Button className="w-full !py-4 shadow-glow" onClick={handleProductSave} disabled={loading}>
                                {loading ? <i className="fas fa-circle-notch fa-spin"></i> : (editingProductId ? 'UPDATE PRODUCT' : 'SAVE PRODUCT')}
                            </Button>
                        </div>
                    </FullScreenModal>

                    <ImageCropperModal 
                        isOpen={!!cropImage} 
                        imageSrc={cropImage} 
                        onCrop={(dataUrl) => {
                            setProductData({...productData, photo: dataUrl});
                            setCropImage(null);
                        }} 
                        onClose={() => setCropImage(null)} 
                    />
                </div>
            );
        };

        // --- Purchase/Sales View ---
        const PurchaseView = () => {
            const sales = useCollection('sales');
            const customers = useCollection('customers');
            const products = useCollection('products');
            const drivers = useCollection('drivers');
            const users = useCollection('users');
            const { db, auth } = useContext(FirebaseContext);
            
            const [isSaleModalOpen, setIsSaleModalOpen] = useState(false);
            const [loading, setLoading] = useState(false);
            const [formError, setFormError] = useState('');
            
            // New Sale State
            const [invoiceNo, setInvoiceNo] = useState('');
            const [saleDate, setSaleDate] = useState('');
            const [selectedCustomer, setSelectedCustomer] = useState(null);
            const [selectedDriverId, setSelectedDriverId] = useState('');
            const [paymentMethod, setPaymentMethod] = useState('Cash');
            const [discountType, setDiscountType] = useState('Cash');
            const [discountValue, setDiscountValue] = useState(0);
            const [cart, setCart] = useState([]);
            const [editingSaleId, setEditingSaleId] = useState(null);
            const [confirmSaleDeleteId, setConfirmSaleDeleteId] = useState(null);
            
            // Search States
            const [custSearch, setCustSearch] = useState('');
            const [prodSearch, setProdSearch] = useState('');

            // Robust sellerId extraction logic
            const currentUser = useMemo(() => 
                users.find(u => u.email?.toLowerCase() === auth.currentUser?.email?.toLowerCase()), 
                [users, auth.currentUser]
            );
            const sellerId = currentUser?.sellerId || 'N/A';

            const generateInvoiceNo = () => {
                const now = new Date();
                const d = String(now.getDate()).padStart(2, '0');
                const m = String(now.getMonth() + 1).padStart(2, '0');
                const y = String(now.getFullYear()).slice(-2);
                const h = String(now.getHours()).padStart(2, '0');
                const min = String(now.getMinutes()).padStart(2, '0');
                const s = String(now.getSeconds()).padStart(2, '0');
                return `HZN-${d}${m}${y}-${h}${min}${s}`;
            };

            const openNewSale = () => {
                setFormError('');
                setEditingSaleId(null);
                setInvoiceNo(generateInvoiceNo());
                setSaleDate(new Date().toLocaleString());
                setSelectedCustomer(null);
                setCart([]);
                setDiscountValue(0);
                setSelectedDriverId('');
                setPaymentMethod('Cash');
                setDiscountType('Cash');
                setIsSaleModalOpen(true);
            };

            const handleEditSale = (sale) => {
                setFormError('');
                setEditingSaleId(sale.id);
                setInvoiceNo(sale.invoiceNo);
                setSaleDate(sale.date);
                const cust = customers.find(c => c.id === sale.customerId);
                setSelectedCustomer(cust || { id: sale.customerId, shopName: sale.customerName });
                setCart(sale.items || []);
                setDiscountValue(sale.discount?.value || 0);
                setDiscountType(sale.discount?.type || 'Cash');
                setSelectedDriverId(sale.driverId || '');
                setPaymentMethod(sale.paymentMethod || 'Cash');
                setIsSaleModalOpen(true);
            };

            const handleDeleteSale = async (id) => {
                if (confirmSaleDeleteId === id) {
                    try {
                        const { doc, deleteDoc } = window.firebaseSDK;
                        await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', id));
                        setConfirmSaleDeleteId(null);
                    } catch (e) {
                        console.error("Delete Error:", e);
                    }
                } else {
                    setConfirmSaleDeleteId(id);
                    setTimeout(() => setConfirmSaleDeleteId(null), 3000);
                }
            };

            const addToCart = (product) => {
                const existing = cart.find(item => item.id === product.id);
                if (existing) {
                    setCart(cart.map(item => item.id === product.id ? { ...item, qty: item.qty + 1 } : item));
                } else {
                    setCart([...cart, { ...product, qty: 1 }]);
                }
                setProdSearch('');
            };

            const cartTotal = useMemo(() => {
                const sub = cart.reduce((acc, item) => acc + (parseFloat(item.price || 0) * item.qty), 0);
                let disc = parseFloat(discountValue || 0);
                if (discountType === 'Percentage') disc = (sub * disc) / 100;
                return Math.max(0, sub - disc);
            }, [cart, discountValue, discountType]);

            const handleSaveSale = async () => {
                setFormError('');
                if (!selectedCustomer) return setFormError("Missing Field: Please select a customer first.");
                if (cart.length === 0) return setFormError("Cart Empty: Please add at least one product.");
                
                setLoading(true);
                const { collection, addDoc, updateDoc, doc, serverTimestamp } = window.firebaseSDK;
                try {
                    const payload = {
                        invoiceNo,
                        date: saleDate,
                        customerId: selectedCustomer.id,
                        customerName: selectedCustomer.shopName,
                        sellerId, 
                        driverId: selectedDriverId,
                        items: cart,
                        paymentMethod,
                        discount: { type: discountType, value: parseFloat(discountValue) || 0 },
                        total: cartTotal,
                        updatedAt: serverTimestamp()
                    };

                    if (editingSaleId) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', editingSaleId), payload);
                    } else {
                        payload.createdAt = serverTimestamp();
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), payload);
                    }
                    setIsSaleModalOpen(false);
                } catch (e) { 
                    console.error("Sale Completion Error:", e);
                    setFormError("Database Error: " + e.message); 
                }
                setLoading(false);
            };

            const filteredCustomers = customers.filter(c => 
                (c.shopName||'').toLowerCase().includes(custSearch.toLowerCase()) || 
                (c.ownerName||'').toLowerCase().includes(custSearch.toLowerCase()) ||
                (c.contact||'').includes(custSearch)
            );

            const filteredProducts = products.filter(p => 
                (p.name||'').toLowerCase().includes(prodSearch.toLowerCase()) || 
                (p.sku||'').toLowerCase().includes(prodSearch.toLowerCase())
            );

            return (
                <div className="space-y-6 pb-20 animate-in fade-in duration-300 px-1">
                    <div className="flex justify-between items-center px-1">
                        <h2 className="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest">Recent Sales</h2>
                        <Button variant="primary" className="!py-2 !px-4 !rounded-xl text-[10px]" onClick={openNewSale}>
                            <i className="fas fa-plus-circle"></i> NEW SALE
                        </Button>
                    </div>

                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 gap-4 px-1">
                        {sales.sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)).map(s => {
                            const driver = drivers.find(d => d.id === s.driverId);
                            return (
                                <div key={s.id} className="bg-white dark:bg-slate-800/40 p-4 rounded-2xl border border-slate-200 dark:border-slate-700/50 flex flex-col gap-3 shadow-sm transition-all hover:shadow-lg">
                                    <div className="space-y-1">
                                        <div className="flex justify-between items-start">
                                            <p className="text-xs font-mono font-bold text-brand-500 truncate max-w-[70%]">{s.invoiceNo}</p>
                                            <span className={`text-[9px] font-black px-2 py-0.5 rounded uppercase border ${s.paymentMethod === 'Bank' ? 'bg-indigo-500/10 text-indigo-500 border-indigo-500/20' : 'bg-green-500/10 text-green-500 border-green-500/20'}`}>
                                                {s.paymentMethod || 'Cash'}
                                            </span>
                                        </div>
                                        <h3 className="text-sm font-bold text-slate-900 dark:text-white leading-tight line-clamp-1">{s.customerName}</h3>
                                        <p className="text-[10px] text-slate-400 font-medium truncate">{s.date.split(',')[0]}</p>
                                    </div>

                                    <div className="bg-slate-50 dark:bg-slate-900/40 rounded-xl p-3 space-y-2">
                                        <div className="flex justify-between items-end">
                                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Total</span>
                                            <p className="text-sm font-black text-brand-600 dark:text-brand-400">${parseFloat(s.total || 0).toFixed(2)}</p>
                                        </div>
                                        <div className="grid grid-cols-3 gap-1 border-t border-slate-200/50 dark:border-slate-700/50 pt-2">
                                            <div className="flex flex-col items-center min-w-0" title="Seller ID">
                                                <i className="fas fa-id-badge text-[10px] text-slate-400 mb-0.5"></i>
                                                <span className="text-[9px] font-bold text-slate-500 truncate w-full text-center" title={`SID: ${s.sellerId}`}>SID:{s.sellerId || '-'}</span>
                                            </div>
                                            <div className="flex flex-col items-center border-x border-slate-200/50 dark:border-slate-700/50 px-1 min-w-0" title="Driver">
                                                <i className="fas fa-truck text-[10px] text-slate-400 mb-0.5"></i>
                                                <span className="text-[9px] font-bold text-slate-500 truncate w-full text-center">{driver?.name || 'Self'}</span>
                                            </div>
                                            <div className="flex flex-col items-center min-w-0" title="Discount">
                                                <i className="fas fa-tag text-[10px] text-slate-400 mb-0.5"></i>
                                                <span className="text-[9px] font-bold text-slate-500">{s.discount?.type === 'Percentage' ? '%' : '$'}</span>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="flex gap-2 mt-auto pt-1">
                                        <button onClick={() => handleEditSale(s)} className="flex-1 bg-slate-50 dark:bg-slate-700/60 py-2.5 rounded-xl text-[10px] font-bold text-slate-600 dark:text-slate-300 hover:bg-brand-500 hover:text-white transition-all">
                                            Edit Record
                                        </button>
                                        <button 
                                            onClick={() => handleDeleteSale(s.id)} 
                                            className={`w-10 h-10 rounded-xl flex items-center justify-center transition-all ${confirmSaleDeleteId === s.id ? 'bg-red-500 text-white flex-1' : 'bg-red-500/10 text-red-500 hover:bg-red-500/20'}`}
                                        >
                                            <i className={`fas ${confirmSaleDeleteId === s.id ? 'fa-check' : 'fa-trash-alt'} text-[10px]`}></i>
                                        </button>
                                    </div>
                                </div>
                            );
                        })}
                    </div>

                    <FullScreenModal isOpen={isSaleModalOpen} onClose={() => setIsSaleModalOpen(false)} title={editingSaleId ? "Edit Sale Record" : "Create New Sale"}>
                        <div className="space-y-6 max-w-4xl mx-auto">
                            {formError && (
                                <div className="bg-red-500/10 border border-red-500/30 text-red-500 p-4 rounded-2xl flex items-start gap-3 animate-in shake duration-300">
                                    <i className="fas fa-exclamation-triangle mt-0.5"></i>
                                    <p className="text-xs font-bold">{formError}</p>
                                </div>
                            )}

                            <div className="bg-slate-100 dark:bg-slate-800/60 p-4 rounded-2xl flex justify-between items-center border border-slate-200 dark:border-slate-700/50">
                                <div className="min-w-0">
                                    <p className="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest">Invoice No</p>
                                    <p className="text-sm lg:text-base font-mono font-black text-brand-500 truncate">{invoiceNo}</p>
                                </div>
                                <div className="text-right flex-shrink-0">
                                    <p className="text-[10px] font-bold text-slate-500 dark:text-slate-400 uppercase tracking-widest">Date & Time</p>
                                    <p className="text-xs lg:text-sm text-slate-600 dark:text-slate-300 font-medium whitespace-nowrap">{saleDate.split(',')[0]}</p>
                                </div>
                            </div>

                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-6 lg:gap-8">
                                {/* Left Column: Selections */}
                                <div className="space-y-6">
                                    <div className="space-y-2">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">1. Select Customer</label>
                                        {selectedCustomer ? (
                                            <div className="bg-brand-50 dark:bg-brand-500/10 p-4 rounded-2xl border border-brand-200 dark:border-brand-500/20 flex justify-between items-center">
                                                <div className="flex items-center gap-3 min-w-0">
                                                    <Avatar name={selectedCustomer.shopName} url={selectedCustomer.photo} size="12" isCircle={true} />
                                                    <div className="min-w-0">
                                                        <p className="text-sm font-bold text-slate-900 dark:text-white truncate">{selectedCustomer.shopName}</p>
                                                        <p className="text-xs text-brand-600 truncate">{selectedCustomer.ownerName} • {selectedCustomer.contact}</p>
                                                    </div>
                                                </div>
                                                <button onClick={() => setSelectedCustomer(null)} className="text-slate-400 hover:text-red-500 ml-2 text-lg"><i className="fas fa-times-circle"></i></button>
                                            </div>
                                        ) : (
                                            <div className="relative">
                                                <i className="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                                <input className="input !pl-12" placeholder="Search Customer..." value={custSearch} onChange={e=>setCustSearch(e.target.value)} />
                                                {custSearch && (
                                                    <div className="absolute top-full left-0 w-full mt-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-2xl z-50 max-h-64 overflow-y-auto">
                                                        {filteredCustomers.map(c => (
                                                            <div key={c.id} onClick={() => { setSelectedCustomer(c); setCustSearch(''); }} className="p-4 border-b border-slate-100 dark:border-slate-700/50 hover:bg-slate-50 dark:hover:bg-slate-700/50 cursor-pointer flex items-center gap-3 transition-colors">
                                                                <Avatar name={c.shopName} url={c.photo} size="10" isCircle={true} />
                                                                <div className="min-w-0">
                                                                    <p className="text-sm font-bold text-slate-900 dark:text-white truncate">{c.shopName}</p>
                                                                    <p className="text-xs text-slate-400 truncate">{c.contact}</p>
                                                                </div>
                                                            </div>
                                                        ))}
                                                    </div>
                                                )}
                                            </div>
                                        )}
                                    </div>

                                    <div className="space-y-2">
                                        <label className="text-[10px] font-bold text-slate-400 uppercase tracking-widest ml-2">2. Add Products</label>
                                        <div className="relative">
                                            <i className="fas fa-barcode absolute left-4 top-1/2 -translate-y-1/2 text-slate-400"></i>
                                            <input className="input !pl-12" placeholder="Search Product..." value={prodSearch} onChange={e=>setProdSearch(e.target.value)} />
                                            {prodSearch && (
                                                <div className="absolute top-full left-0 w-full mt-2 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-2xl shadow-2xl z-50 max-h-64 overflow-y-auto">
                                                    {filteredProducts.map(p => (
                                                        <div key={p.id} onClick={() => addToCart(p)} className="p-4 border-b border-slate-100 dark:border-slate-700/50 hover:bg-slate-50 dark:hover:bg-slate-700/50 cursor-pointer flex items-center gap-3 transition-colors">
                                                            <Avatar name={p.name} url={p.photo} size="10" />
                                                            <div className="flex-1 min-w-0">
                                                                <p className="text-sm font-bold text-slate-900 dark:text-white truncate">{p.name}</p>
                                                                <p className="text-xs text-brand-500 font-mono truncate">#{p.sku}</p>
                                                            </div>
                                                            <p className="text-sm font-black text-slate-900 dark:text-white">${p.price}</p>
                                                        </div>
                                                    ))}
                                                </div>
                                            )}
                                        </div>

                                        <div className="space-y-2 mt-4 max-h-[40vh] overflow-y-auto pr-1 custom-scroll">
                                            {cart.length === 0 && <div className="text-center py-10 border-2 border-dashed border-slate-200 dark:border-slate-700/50 rounded-3xl text-slate-400"><i className="fas fa-shopping-basket text-4xl mb-3 opacity-50"></i><p className="text-xs font-bold uppercase tracking-widest">Cart is empty</p></div>}
                                            {cart.map(item => (
                                                <div key={item.id} className="flex flex-col bg-slate-50 dark:bg-slate-800/40 p-4 rounded-2xl border border-slate-100 dark:border-slate-700/50 gap-3">
                                                    <div className="flex items-center gap-3">
                                                        <Avatar name={item.name} url={item.photo} size="12" />
                                                        <div className="flex-1 min-w-0">
                                                            <p className="text-sm font-bold text-slate-900 dark:text-white truncate">{item.name}</p>
                                                            <p className="text-xs text-slate-500 font-mono truncate">#{item.sku}</p>
                                                        </div>
                                                        <div className="flex items-center gap-2 bg-white dark:bg-slate-900 p-1.5 rounded-xl border border-slate-200 dark:border-slate-700 flex-shrink-0 shadow-sm">
                                                            <button onClick={() => {
                                                                const newCart = item.qty > 1 ? cart.map(i => i.id === item.id ? {...i, qty: i.qty - 1} : i) : cart.filter(i => i.id !== item.id);
                                                                setCart(newCart);
                                                            }} className="w-8 h-8 flex items-center justify-center text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg hover:text-red-500 transition-colors"><i className="fas fa-minus text-xs"></i></button>
                                                            <span className="text-sm font-bold text-slate-900 dark:text-white w-6 text-center">{item.qty}</span>
                                                            <button onClick={() => addToCart(item)} className="w-8 h-8 flex items-center justify-center text-slate-400 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-lg hover:text-brand-500 transition-colors"><i className="fas fa-plus text-xs"></i></button>
                                                        </div>
                                                    </div>
                                                    <div className="flex justify-between items-center px-1 pt-2 border-t border-slate-200/50 dark:border-slate-700/30">
                                                        <div className="flex flex-col">
                                                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Unit Price</span>
                                                            <span className="text-sm font-bold text-slate-600 dark:text-slate-300">${parseFloat(item.price || 0).toFixed(2)}</span>
                                                        </div>
                                                        <div className="flex flex-col text-right">
                                                            <span className="text-[10px] font-bold text-slate-400 uppercase tracking-tighter">Line Total</span>
                                                            <span className="text-sm font-black text-brand-600 dark:text-brand-400">${(parseFloat(item.price || 0) * item.qty).toFixed(2)}</span>
                                                        </div>
                                                    </div>
                                                </div>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                {/* Right Column: Details & Checkout */}
                                <div className="space-y-6 lg:border-l lg:border-slate-200 lg:dark:border-slate-800/50 lg:pl-8 flex flex-col h-full">

                    </header>

                    {/* Expanded max-w for Desktop Layout */}
                    <main className="flex-1 p-3.5 lg:p-8 pb-20 lg:pb-8 mb-safe max-w-lg lg:max-w-7xl mx-auto w-full overflow-x-hidden">
                        {activeTab === 'dashboard' ? (
                            <DashboardView setActiveTab={setActiveTab} profileName={profileName} greeting={greeting} />
                        ) : activeTab === 'customers' ? (
                            <div className="space-y-5 animate-in fade-in duration-300">
                                <div className="relative max-w-2xl mx-auto">
                                    <i className="fas fa-search absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-xs lg:text-sm"></i>
                                    <input className="input !pl-10 lg:!pl-12 !py-3 lg:!py-4 shadow-sm text-sm lg:text-base" placeholder="Search customer, owner..." value={search} onChange={e => { setSearch(e.target.value); setDisplayCount(20); }} />
                                </div>
                                <div className="grid grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-5 gap-3.5 sm:gap-4 lg:gap-6">
                                    {displayedCustomers.map(c => (
                                        <div key={c.id} className="bg-white dark:bg-slate-800/40 border border-slate-200 dark:border-slate-700/50 rounded-2xl lg:rounded-3xl p-3 lg:p-5 flex flex-col gap-3 relative shadow-sm hover:shadow-xl transition-all active:scale-[0.98]">
                                            {c.sellerId && (
                                                <div className="absolute top-2 left-2 px-1.5 lg:px-2 py-0.5 lg:py-1 bg-slate-100/80 dark:bg-slate-700/80 text-slate-600 dark:text-slate-300 text-[8px] lg:text-[10px] rounded lg:rounded-md font-mono border border-slate-200 dark:border-slate-600/50 z-10 shadow-sm uppercase tracking-tighter backdrop-blur-md">
                                                    ID:{c.sellerId}
                                                </div>
                                            )}
                                            <div className="flex flex-col items-center text-center gap-1.5 lg:gap-3 cursor-pointer pt-3 lg:pt-5 min-w-0" onClick={() => openForm(c)}>
                                                <Avatar name={c.shopName} url={c.photo} size="11" isCircle={true} />
                                                <h3 className="font-bold text-slate-900 dark:text-white text-[11px] lg:text-sm leading-tight line-clamp-2 w-full px-1">{c.shopName}</h3>
                                                <span className="text-[8px] lg:text-[10px] font-bold bg-brand-50 dark:bg-brand-500/10 text-brand-500 px-2 lg:px-3 py-0.5 lg:py-1 rounded-full border border-brand-100/50 dark:border-brand-500/20">{c.marketType}</span>
                                                
                                                <div className="w-full space-y-0.5 lg:space-y-1 mt-1 lg:mt-2 overflow-hidden">
                                                    <p className="text-[9px] lg:text-xs text-slate-500 dark:text-slate-400 truncate"><i className="fas fa-user-circle mr-1 lg:mr-2 opacity-70"></i>{c.ownerName || '---'}</p>
                                                    {c.contact && <p className="text-[10px] lg:text-sm font-bold text-brand-600 dark:text-brand-400 truncate">{c.contact}</p>}
                                                    {c.address && <p className="text-[9px] lg:text-xs text-slate-400 line-clamp-1 mt-1 leading-tight">{c.address}</p>}
                                                </div>
                                            </div>
                                            <div className="flex gap-1 lg:gap-2 pt-2 lg:pt-4 border-t border-slate-100 dark:border-slate-700/50 mt-auto">
                                                {c.contact ? (
                                                    <a href={`tel:${c.contact}`} className="flex-1 bg-slate-50 dark:bg-slate-800 py-2 lg:py-3 rounded-lg lg:rounded-xl flex items-center justify-center transition-colors hover:bg-brand-500 hover:text-white text-slate-700 dark:text-slate-300"><i className="fas fa-phone text-[10px] lg:text-xs"></i></a>
                                                ) : (
                                                    <button disabled className="flex-1 bg-slate-50/50 dark:bg-slate-800/50 py-2 lg:py-3 rounded-lg lg:rounded-xl flex items-center justify-center text-slate-300 dark:text-slate-600 cursor-not-allowed"><i className="fas fa-phone-slash text-[10px] lg:text-xs"></i></button>
                                                )}
                                                
                                                {c.googleMapsLink || (c.lat && c.lng) ? (
                                                    <a href={c.googleMapsLink || `https://www.google.com/maps?q=${c.lat},${c.lng}`} target="_blank" rel="noopener noreferrer" className="flex-1 bg-slate-50 dark:bg-slate-800 py-2 lg:py-3 rounded-lg lg:rounded-xl flex items-center justify-center text-brand-500 transition-colors hover:bg-brand-500 hover:text-white"><i className="fas fa-map-marker-alt text-[10px] lg:text-xs"></i></a>
                                                ) : (
                                                    <button disabled className="flex-1 bg-slate-50/50 dark:bg-slate-800/50 py-2 lg:py-3 rounded-lg lg:rounded-xl flex items-center justify-center text-slate-300 dark:text-slate-600 cursor-not-allowed"><i className="fas fa-map-marker-alt text-[10px] lg:text-xs"></i></button>
                                                )}
                                                
                                                <button onClick={() => handleDelete(c.id)} className={`flex-none py-2 lg:py-3 rounded-lg lg:rounded-xl transition-all ${confirmDeleteId === c.id ? 'bg-red-500 text-white px-2.5 lg:px-4' : 'bg-red-500/10 text-red-500 w-8 lg:w-12 hover:bg-red-500/20'}`}>
                                                    {confirmDeleteId === c.id ? <i className="fas fa-check text-[10px] lg:text-xs"></i> : <i className="fas fa-trash text-[10px] lg:text-xs"></i>}
                                                </button>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                {filtered.length > displayCount && (
                                    <div className="flex justify-center pt-4 lg:pt-8">
                                        <button onClick={() => setDisplayCount(prev => prev + 20)} className="px-6 lg:px-10 py-2 lg:py-4 bg-white dark:bg-slate-800 border border-slate-200 dark:border-slate-700 rounded-xl lg:rounded-2xl text-xs lg:text-sm font-bold shadow-sm hover:shadow-xl transition-all tracking-widest">LOAD MORE</button>
                                    </div>
                                )}
                            </div>
                        ) : activeTab === 'inventory' ? (
                            <InventoryView />
                        ) : activeTab === 'purchase' ? (
                            <PurchaseView />
                        ) : (
                            <SettingsView />
                        )}
                    </main>

                    {activeTab === 'customers' && (
                        <button className="fab shadow-glow" onClick={() => openForm()}>
                            <i className="fas fa-plus"></i>
                        </button>
                    )}

                    <FullScreenModal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} title="Customer Profile">
                        <div className="space-y-5 max-w-3xl mx-auto">
                            {formError && <div className="bg-red-500/10 text-red-500 p-3 rounded-xl text-xs text-center font-bold border border-red-500/20">{formError}</div>}
                            <div className="flex justify-center mb-2">
                                <div className="w-28 h-28 lg:w-32 lg:h-32 rounded-3xl bg-slate-100 dark:bg-slate-800 border-2 border-slate-200 dark:border-slate-700 flex items-center justify-center overflow-hidden shadow-inner cursor-pointer" onClick={() => document.getElementById('f-up').click()}>
                                    {formData.photo ? <img src={formData.photo} className="w-full h-full object-cover" /> : <i className="fas fa-camera text-slate-400 text-3xl lg:text-4xl"></i>}
                                </div>
                                <input id="f-up" type="file" accept="image/*" className="hidden" onChange={handleFileChange} />
                            </div>
                            <div className="space-y-4">
                                <input className="input" placeholder="Shop Name" value={formData.shopName} onChange={e=>setFormData({...formData, shopName: e.target.value})} />
                                <div className="grid grid-cols-2 gap-3 lg:gap-5">
                                    <select className="select" value={formData.marketType} onChange={e=>setFormData({...formData, marketType: e.target.value})}>
                                        <option value="Retail">Retail</option>
                                        <option value="Wholesale">Wholesale</option>
                                        <option value="Distributor">Distributor</option>
                                    </select>
                                    <select className="select" value={formData.sellerId} onChange={e=>setFormData({...formData, sellerId: e.target.value})}>
                                        <option value="">Select Seller</option>
                                        {users.map(u => <option key={u.id} value={u.sellerId || u.email}>{u.name} (ID:{u.sellerId || 'N/A'})</option>)}
                                    </select>
                                </div>
                                <input className="input" placeholder="Owner Name" value={formData.ownerName} onChange={e=>setFormData({...formData, ownerName: e.target.value})} />
                                <input className="input" placeholder="Phone" value={formData.contact} onChange={e=>setFormData({...formData, contact: e.target.value})} />
                                <textarea className="textarea" placeholder="Physical Address" rows="2" value={formData.address} onChange={e=>setFormData({...formData, address: e.target.value})} />
                                <input className="input" placeholder="Google Maps Link" value={formData.googleMapsLink} onChange={e=>setFormData({...formData, googleMapsLink: e.target.value})} />
                                <div className="flex items-center justify-between bg-slate-100 dark:bg-slate-800 p-4 lg:p-6 rounded-2xl lg:rounded-3xl border border-slate-200 dark:border-slate-700">
                                    <span className="text-[10px] lg:text-xs text-slate-500 font-mono truncate flex-1 mr-2 lg:mr-4">{formData.lat ? `${formData.lat}, ${formData.lng}` : 'Coordinates'}</span>
                                    <button onClick={getGPS} className="bg-brand-500 text-white px-3 lg:px-5 py-1.5 lg:py-2.5 rounded-lg lg:rounded-xl text-[10px] lg:text-xs font-bold shadow-sm whitespace-nowrap active:scale-95 transition-transform">GET GPS</button>
                                </div>
                            </div>
                            <Button className="w-full !py-4 lg:!py-5 shadow-glow lg:text-base mt-6" onClick={handleSave} disabled={loading}>SAVE CUSTOMER</Button>
                        </div>
                    </FullScreenModal>

                    <ImageCropperModal 
                        isOpen={!!cropImage} 
                        imageSrc={cropImage} 
                        onCrop={(dataUrl) => {
                            setFormData({...formData, photo: dataUrl});
                            setCropImage(null);
                        }} 
                        onClose={() => setCropImage(null)} 
                    />
                </div>
            );
        };

        const AuthScreen = ({ theme, toggleTheme }) => {
            const { auth } = useContext(FirebaseContext);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleLogin = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                try {
                    await window.firebaseSDK.signInWithEmailAndPassword(auth, email, password);
                } catch (e) { setError('Invalid Credentials'); }
                setLoading(false);
            };

            return (
                <div className="min-h-screen bg-slate-50 dark:bg-[#020617] flex flex-col items-center justify-center p-6 relative overflow-hidden transition-colors duration-300">
                    <div className="absolute top-0 w-full pt-safe"></div>
                    <button onClick={toggleTheme} className="absolute top-6 right-6 mt-safe w-11 h-11 lg:w-14 lg:h-14 rounded-full bg-white dark:bg-slate-800 flex items-center justify-center shadow-md transition-all active:scale-90 z-50">
                        {theme === 'dark' ? <i className="fas fa-sun text-amber-400 lg:text-xl"></i> : <i className="fas fa-moon text-indigo-500 lg:text-xl"></i>}
                    </button>
                    <div className="w-full max-w-sm lg:max-w-md space-y-8 lg:space-y-12 text-center relative z-10 animate-slide-up">
                        <div>
                            <div className="w-20 h-20 lg:w-28 lg:h-28 bg-gradient-to-br from-brand-500 to-brand-700 rounded-3xl lg:rounded-[2.5rem] mx-auto flex items-center justify-center shadow-glow mb-6 lg:mb-8 border border-white/20">
                                <i className="fas fa-location-crosshairs text-white text-4xl lg:text-6xl"></i>
                            </div>
                            <h1 className="text-4xl lg:text-5xl font-bold dark:text-white leading-none tracking-widest uppercase">OUNNA</h1>
                            <p className="text-slate-500 mt-3 lg:mt-4 uppercase text-xs lg:text-sm tracking-[0.3em] font-bold opacity-60">Outdoor Tracking System</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-4 lg:space-y-6 bg-white/50 dark:bg-slate-800/40 p-8 lg:p-12 rounded-[2rem] lg:rounded-[3rem] border border-white dark:border-slate-700 backdrop-blur-xl shadow-2xl">
                            {error && <div className="bg-red-500/10 text-red-500 p-3 rounded-xl text-xs font-bold border border-red-500/20">{error}</div>}
                            <div className="space-y-4 lg:space-y-5 text-left">
                                <div className="space-y-1">
                                    <label className="text-[10px] lg:text-xs font-black text-slate-400 uppercase ml-4 block tracking-widest">Email Access</label>
                                    <input className="input shadow-inner !bg-white/50 dark:!bg-slate-900/50 lg:!py-4" placeholder="your@email.com" value={email} onChange={e=>setEmail(e.target.value)} required />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] lg:text-xs font-black text-slate-400 uppercase ml-4 block tracking-widest">Secure Passcode</label>
                                    <input type="password" class="input shadow-inner !bg-white/50 dark:!bg-slate-900/50 lg:!py-4" placeholder="••••••••" value={password} onChange={e=>setPassword(e.target.value)} required />
                                </div>
                            </div>
                            <Button type="submit" className="w-full shadow-lg !py-5 lg:!py-6 lg:text-base mt-2" disabled={loading}>{loading ? 'AUTHORIZING...' : 'SIGN IN'}</Button>
                        </form>
                    </div>
                </div>
            );
        };

        const DeactivatedScreen = ({ toggleTheme, theme }) => {
            const { auth } = useContext(FirebaseContext);
            return (
                <div className="min-h-screen bg-slate-50 dark:bg-slate-950 flex flex-col items-center justify-center p-6 text-center animate-in fade-in duration-500 transition-colors">
                    <div className="absolute top-0 w-full pt-safe"></div>
                    <button onClick={toggleTheme} className="absolute top-6 right-6 mt-safe w-11 h-11 rounded-full bg-white dark:bg-slate-800 flex items-center justify-center shadow-md z-50">
                        {theme === 'dark' ? <i className="fas fa-sun text-amber-400"></i> : <i className="fas fa-moon text-indigo-500"></i>}
                    </button>
                    <div className="w-24 h-24 bg-red-500/10 dark:bg-red-500/5 border-2 border-red-500/20 dark:border-red-500/10 rounded-3xl flex items-center justify-center mb-8 shadow-xl">
                        <i className="fas fa-user-slash text-red-500 text-4xl"></i>
                    </div>
                    <h1 className="text-3xl font-bold text-slate-900 dark:text-white uppercase tracking-tight">Account Suspended</h1>
                    <div className="w-12 h-1 bg-red-500 mx-auto my-4 rounded-full"></div>
                    <p className="text-slate-500 dark:text-slate-400 max-w-xs mx-auto text-sm font-medium leading-relaxed">
                        Your access to the <span className="font-bold text-slate-900 dark:text-white">OUNNA</span> tracking system has been deactivated by an administrator.
                    </p>
                    <button onClick={() => window.firebaseSDK.signOut(auth)} className="mt-10 bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-8 py-3 rounded-2xl font-bold text-xs tracking-widest transition-all active:scale-95 shadow-lg shadow-black/10">
                        RETURN TO LOGIN
                    </button>
                </div>
            );
        };

        const App = () => (
            <FirebaseProvider>
                <AppInitializer />
            </FirebaseProvider>
        );

        const AppInitializer = () => {
            const { loading: authLoading, user, db } = useContext(FirebaseContext);
            const { theme, toggleTheme } = useTheme();
            const [profile, setProfile] = useState(null);
            const [profileLoading, setProfileLoading] = useState(true);

            useEffect(() => {
                let unsub = () => {};
                if (user && db) {
                    setProfileLoading(true);
                    const { doc, onSnapshot } = window.firebaseSDK;
                    const profileRef = doc(db, 'artifacts', appId, 'users', user.uid);
                    
                    unsub = onSnapshot(profileRef, (snap) => {
                        setProfile(snap.exists() ? snap.data() : { status: 'Active' });
                        setProfileLoading(false);
                        
                        const splash = document.getElementById('splash-screen');
                        if (splash) { 
                            splash.style.opacity = '0'; 
                            setTimeout(() => splash.remove(), 500); 
                        }
                    }, (error) => {
                        console.error("Profile Fetch Error:", error);
                        setProfileLoading(false);
                        const splash = document.getElementById('splash-screen');
                        if (splash) { splash.style.opacity = '0'; setTimeout(() => splash.remove(), 500); }
                    });
                } else if (!authLoading) {
                    setProfileLoading(false);
                    const splash = document.getElementById('splash-screen');
                    if (splash) { 
                        splash.style.opacity = '0'; 
                        setTimeout(() => splash.remove(), 500); 
                    }
                }
                return () => unsub();
            }, [user, db, authLoading]);

            if (authLoading || (user && profileLoading)) return null;
            
            if (user && profile?.status === 'Inactive') {
                return <DeactivatedScreen theme={theme} toggleTheme={toggleTheme} />;
            }
            
            return user ? <CustomerApp theme={theme} toggleTheme={toggleTheme} /> : <AuthScreen theme={theme} toggleTheme={toggleTheme} />;
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
