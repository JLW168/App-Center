        const DashboardView = ({ setActiveTab, profileName, greeting }) => {
            const sales = useCollection('sales');
            const customers = useCollection('customers');
            const products = useCollection('products'); // NEW: Fetch products to check stock
            const users = useCollection('users');
            const { auth } = useContext(FirebaseContext);

            const currentUser = useMemo(() => 
                users.find(u => u.email?.toLowerCase() === auth.currentUser?.email?.toLowerCase()), 
                [users, auth.currentUser]
            );
            const currentRole = currentUser?.role || 'Staff';
            const sellerId = currentUser?.sellerId || auth.currentUser?.email || 'N/A';

            const [selectedTargetSeller, setSelectedTargetSeller] = useState('SELF');
            const effectiveSellerId = selectedTargetSeller === 'SELF' ? sellerId : selectedTargetSeller;
            const viewedUser = selectedTargetSeller === 'SELF' ? currentUser : users.find(u => (u.sellerId || u.email) === selectedTargetSeller);

            const todayStr = new Date().toLocaleDateString();
            
            // Seal Global Sales Restriction (For Top-Level Analytics)
            const accessibleSales = useMemo(() => {
                if (currentRole === 'Admin') return sales;
                return sales.filter(s => s.sellerId === currentUser?.sellerId || s.sellerId === auth.currentUser?.email);
            }, [sales, currentRole, currentUser, auth.currentUser]);

            // STRICT PERSONAL SALES (For Target & Commission Engine)
            const personalSales = useMemo(() => {
                return sales.filter(s => s.sellerId === effectiveSellerId);
            }, [sales, effectiveSellerId]);

            // --- NEW: Target & Commission Engine ---
            const target = parseFloat(viewedUser?.monthlyTarget) || 0;
            const commRate = parseFloat(viewedUser?.commissionRate) || 0;
            
            const currentMonth = new Date().getMonth();
            const currentYear = new Date().getFullYear();

            const thisMonthPersonalSales = useMemo(() => personalSales.filter(s => {
                const date = s.createdAt ? new Date(s.createdAt.seconds * 1000) : new Date(s.date);
                return date.getMonth() === currentMonth && date.getFullYear() === currentYear;
            }), [personalSales, currentMonth, currentYear]);

            // Specifically track "Collected Cash" using amountPaid instead of total
            const thisMonthCollected = useMemo(() => thisMonthPersonalSales.reduce((sum, s) => sum + (parseFloat(s.amountPaid) || 0), 0), [thisMonthPersonalSales]);
            const earnedCommission = (thisMonthCollected * commRate) / 100;
            const progressPct = target > 0 ? Math.min(100, (thisMonthCollected / target) * 100) : 0;
            // ---------------------------------------

            // Calculate today's metrics
            const todaySales = useMemo(() => accessibleSales.filter(s => (s.date && s.date.split(',')[0] === todayStr) || (s.createdAt && new Date(s.createdAt.seconds * 1000).toLocaleDateString() === todayStr)), [accessibleSales, todayStr]);
            const todayRevenue = todaySales.reduce((sum, s) => sum + (parseFloat(s.total) || 0), 0);
            
            // Global Debt Calculation
            const totalDebt = useMemo(() => accessibleSales.reduce((sum, s) => sum + (parseFloat(s.balanceDue) || 0), 0), [accessibleSales]);
            
            // Latest Lists
            const recentSales = useMemo(() => [...accessibleSales].sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)).slice(0, 5), [accessibleSales]);
            
            // Restricted Customer Lists
            const recentCustomers = useMemo(() => {
                let accessibleCustomers = customers;
                if (currentRole !== 'Admin') {
                    accessibleCustomers = accessibleCustomers.filter(c => c.sellerId === currentUser?.sellerId || c.sellerId === auth.currentUser?.email);
                }
                return [...accessibleCustomers].sort((a,b) => (b.createdAt?.seconds || 0) - (a.createdAt?.seconds || 0)).slice(0, 5);
            }, [customers, currentRole, currentUser, auth.currentUser]);

            const activeCustomersCount = useMemo(() => {
                if (currentRole === 'Admin') return customers.length;
                return customers.filter(c => c.sellerId === currentUser?.sellerId || c.sellerId === auth.currentUser?.email).length;
            }, [customers, currentRole, currentUser, auth.currentUser]);

            // Low Stock Calculation
            const lowStockProducts = useMemo(() => products.filter(p => parseInt(p.qty || 0) <= 5), [products]);

            // --- NEW: Visual Analytics Data ---
            // 1. Last 7 Days Revenue
            const last7DaysData = useMemo(() => {
                const data = [];
                for (let i = 6; i >= 0; i--) {
                    const d = new Date();
                    d.setDate(d.getDate() - i);
                    const dateStr = d.toLocaleDateString();
                    const dayName = d.toLocaleDateString('en-US', { weekday: 'short' });
                    
                    const daySales = accessibleSales.filter(s => {
                        const sDate = s.createdAt ? new Date(s.createdAt.seconds * 1000).toLocaleDateString() : s.date?.split(',')[0];
                        return sDate === dateStr;
                    });
                    const revenue = daySales.reduce((sum, s) => sum + (parseFloat(s.total) || 0), 0);
                    
                    data.push({ name: dayName, fullDate: dateStr, revenue });
                }
                return data;
            }, [accessibleSales]);

            // 2. Top Selling Products
            const topProductsData = useMemo(() => {
                const productCounts = {};
                accessibleSales.forEach(sale => {
                    (sale.items || []).forEach(item => {
                        productCounts[item.name] = (productCounts[item.name] || 0) + item.qty;
                    });
                });
                return Object.entries(productCounts)
                    .map(([name, value]) => ({ name, value }))
                    .sort((a, b) => b.value - a.value)
                    .slice(0, 5);
            }, [accessibleSales]);

            // 3. Target & Commission Trend (Last 6 Months)
            const targetTrendData = useMemo(() => {
                const data = [];
                const targetVal = parseFloat(viewedUser?.monthlyTarget) || 0;
                const commRateVal = parseFloat(viewedUser?.commissionRate) || 0;

                for (let i = 5; i >= 0; i--) {
                    const d = new Date();
                    d.setMonth(d.getMonth() - i);
                    const monthName = d.toLocaleDateString('en-US', { month: 'short' });
                    const mYear = d.getFullYear();
                    const mMonth = d.getMonth();

                    const mSales = personalSales.filter(s => {
                        const t = s.createdAt ? new Date(s.createdAt.seconds * 1000) : new Date(s.date?.split(',')[0] || new Date());
                        return t.getMonth() === mMonth && t.getFullYear() === mYear;
                    });

                    const mCollected = mSales.reduce((sum, s) => sum + (parseFloat(s.amountPaid) || 0), 0);
                    const mComm = (mCollected * commRateVal) / 100;

                    data.push({
                        name: monthName,
                        Collected: parseFloat(mCollected.toFixed(2)),
                        Target: targetVal,
                        Commission: parseFloat(mComm.toFixed(2))
                    });
                }
                return data;
            }, [personalSales, viewedUser]);

            const PIE_COLORS = ['#3b82f6', '#10b981', '#f59e0b', '#ec4899', '#8b5cf6'];
            const isDark = document.documentElement.classList.contains('dark');

                        </button>

            const [cropImage, setCropImage] = useState(null);

            const currentUserProfile = useMemo(() =>

            );
            const profileName = currentUserProfile?.name || user?.email?.split('@')[0] || 'User';
            const profilePhoto = currentUserProfile?.photo || '';
            const currentProfileRole = currentUserProfile?.role || 'Staff';
            const currentSellerId = currentUserProfile?.sellerId || auth.currentUser?.email || '';

            const handleSave = async () => {
                setFormError('');
                if (!formData.shopName) return setFormError("Shop Name is required");
                setLoading(true);
                const { collection, addDoc, updateDoc, doc, serverTimestamp } = window.firebaseSDK;
                try {
                    const payload = { ...formData, updatedAt: serverTimestamp() };
                    if (editingId) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', editingId), payload);
                    else { payload.createdAt = serverTimestamp(); await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'customers'), payload); }
                    setIsModalOpen(false); 
                    setFormData({ shopName: '', ownerName: '', contact: '', marketType: 'Retail', lat: '', lng: '', photo: '', sellerId: '', googleMapsLink: '', address: '' }); 
                    setEditingId(null);
                    addToast(editingId ? "Customer profile updated!" : "New customer added!", "success");
                } catch (e) { setFormError(e.message); }
                setLoading(false);
            };

            const getGPS = () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition(
                        p => {
                            setFormData(f => ({...f, lat: p.coords.latitude.toFixed(6), lng: p.coords.longitude.toFixed(6)}));

                        e => setFormError("GPS Access Denied")
                    );
                }

            const openForm = (c = null) => {
                setFormError('');
                if(c) { setFormData({...c}); setEditingId(c.id); } 
                else { setFormData({ shopName: '', ownerName: '', contact: '', marketType: 'Retail', lat: '', lng: '', photo: '', sellerId: currentProfileRole !== 'Admin' ? currentSellerId : '', googleMapsLink: '', address: '' }); setEditingId(null); }
                setIsModalOpen(true);

            const handleDelete = async (id) => {

                    await window.firebaseSDK.deleteDoc(window.firebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'customers', id)); 
                    setConfirmDeleteId(null);

                    const reader = new FileReader();

                    accessibleCustomers = accessibleCustomers.filter(c => c.sellerId === currentUserProfile?.sellerId || c.sellerId === auth.currentUser?.email);

                return accessibleCustomers.filter(c => (c.shopName || '').toLowerCase().includes(s) || (c.ownerName || '').toLowerCase().includes(s) || (c.contact || '').includes(s));
            }, [customers, search, currentProfileRole, currentUserProfile, auth.currentUser]);

                                                <h3 className="text-lg font-bold text-slate-900 dark:text-white truncate">{selectedStatementCustomer.shopName}</h3>
                                                <p className="text-xs text-slate-500 truncate">{selectedStatementCustomer.ownerName} • {selectedStatementCustomer.contact}</p>
                                                {selectedStatementCustomer.address && <p className="text-xs text-slate-500 mt-1 line-clamp-2">{selectedStatementCustomer.address}</p>}
                                            </div>
                                        </div>

                                        {/* Unfiltered Outstanding Balances */}
                                        <div className="space-y-4">
                                            <h3 className="text-xs font-bold text-red-500 uppercase tracking-widest flex items-center gap-2"><i className="fas fa-exclamation-circle"></i> Outstanding Invoices</h3>
                                            {unpaidInvoices.length === 0 ? (
                                                <div className="bg-slate-50 dark:bg-slate-900/50 p-6 rounded-2xl text-center text-emerald-500 text-xs font-bold uppercase tracking-widest border border-slate-200 dark:border-slate-700/50">
                                                    <i className="fas fa-check-circle text-3xl mb-2 block opacity-50"></i>
                                                    No Outstanding Debt
                                                </div>
                                            ) : (
                                                <div className="border border-slate-200 dark:border-slate-700/50 rounded-2xl overflow-hidden">
                                                    <table className="w-full text-left text-xs lg:text-sm">
                                                        <thead className="bg-slate-50 dark:bg-slate-900/50 text-slate-500 dark:text-slate-400">
                                                            <tr>
                                                                <th className="p-3 font-bold uppercase tracking-wider">Date</th>
                                                                <th className="p-3 font-bold uppercase tracking-wider">Invoice</th>
                                                                <th className="p-3 font-bold uppercase tracking-wider text-right hidden sm:table-cell">Total</th>
                                                                <th className="p-3 font-bold uppercase tracking-wider text-right text-red-500">Balance Due</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-slate-100 dark:divide-slate-700/50">
                                                            {unpaidInvoices.map(inv => (
                                                                <tr key={inv.id} className="text-slate-900 dark:text-white">
                                                                    <td className="p-3 whitespace-nowrap">{inv.date?.split(',')[0]}</td>
                                                                    <td className="p-3 font-mono font-medium text-brand-500">{inv.invoiceNo}</td>
                                                                    <td className="p-3 text-right hidden sm:table-cell">${parseFloat(inv.total).toFixed(2)}</td>
                                                                    <td className="p-3 text-right font-bold text-red-500 bg-red-50/50 dark:bg-red-500/5">${parseFloat(inv.balanceDue).toFixed(2)}</td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            )}
                                            
                                            {unpaidInvoices.length > 0 && (
                                                <div className="flex justify-end pt-2">
                                                    <div className="bg-red-50 dark:bg-red-500/10 border border-red-200 dark:border-red-500/30 p-4 lg:p-6 rounded-2xl text-right w-full sm:w-auto min-w-[250px]">
                                                        <p className="text-[10px] font-bold text-red-600 dark:text-red-400 uppercase tracking-widest mb-1">Total Outstanding Debt</p>
                                                        <p className="text-3xl lg:text-4xl font-black text-red-600 dark:text-red-400">${totalDebt.toFixed(2)}</p>
                                                    </div>
                                                </div>
                                            )}
                                        </div>

                                        {/* Contextual Recent Paid History */}
                                        <div className="space-y-4 mt-8 pt-8 border-t border-slate-200 dark:border-slate-700/50">
                                            <h3 className="text-xs font-bold text-emerald-500 uppercase tracking-widest flex items-center gap-2"><i className="fas fa-history"></i> Recent Settled Invoices</h3>
                                            {paidInvoices.length === 0 ? (
                                                <div className="bg-slate-50 dark:bg-slate-900/50 p-4 rounded-xl text-center text-slate-500 text-[10px] font-bold uppercase tracking-widest border border-slate-200 dark:border-slate-700/50">No Settlement History</div>
                                            ) : (
                                                <div className="border border-slate-200 dark:border-slate-700/50 rounded-2xl overflow-hidden opacity-80">
                                                    <table className="w-full text-left text-[10px] lg:text-xs">
                                                        <thead className="bg-slate-50 dark:bg-slate-900/50 text-slate-500 dark:text-slate-400">
                                                            <tr>
                                                                <th className="p-2.5 font-bold uppercase tracking-wider">Date</th>
                                                                <th className="p-2.5 font-bold uppercase tracking-wider">Invoice</th>
                                                                <th className="p-2.5 font-bold uppercase tracking-wider text-right">Total Paid</th>
                                                            </tr>
                                                        </thead>
                                                        <tbody className="divide-y divide-slate-100 dark:divide-slate-700/50">
                                                            {paidInvoices.map(inv => (
                                                                <tr key={inv.id} className="text-slate-700 dark:text-slate-300">
                                                                    <td className="p-2.5 whitespace-nowrap">{inv.date?.split(',')[0]}</td>
                                                                    <td className="p-2.5 font-mono">{inv.invoiceNo}</td>
                                                                    <td className="p-2.5 text-right font-medium">${parseFloat(inv.total).toFixed(2)}</td>
                                                                </tr>
                                                            ))}
                                                        </tbody>
                                                    </table>
                                                </div>
                                            )}
                                        </div>
                                    </div>

                                    {/* Action Buttons (Hidden when printing via CSS) */}
                                    <div className="flex flex-col sm:flex-row justify-end gap-3 no-print pt-2">
                                        <Button variant="secondary" onClick={() => setIsStatementModalOpen(false)}>Close Ledger</Button>
                                        <Button onClick={() => window.print()} className="shadow-glow"><i className="fas fa-print"></i> Print / Save PDF</Button>
                                    </div>
                                </div>
                            );
                        })()}
                    </FullScreenModal>

                    <ImageCropperModal 
                        isOpen={!!cropImage} 
                        imageSrc={cropImage} 
                        onCrop={(dataUrl) => {
                            setFormData({...formData, photo: dataUrl});
                            setCropImage(null);
                        }} 
                        onClose={() => setCropImage(null)} 
                    />
                </div>
            );
        };

        const AuthScreen = ({ theme, toggleTheme }) => {
            const { auth } = useContext(FirebaseContext);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const [error, setError] = useState('');

            const handleLogin = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                try {
                    await window.firebaseSDK.signInWithEmailAndPassword(auth, email, password);
                } catch (e) { setError('Invalid Credentials'); }
                setLoading(false);
            };

            return (
                <div className="min-h-screen bg-slate-50 dark:bg-[#020617] flex flex-col items-center justify-center p-6 relative overflow-hidden transition-colors duration-300">
                    <div className="absolute top-0 w-full pt-safe"></div>
                    <button onClick={toggleTheme} className="absolute top-6 right-6 mt-safe w-11 h-11 lg:w-14 lg:h-14 rounded-full bg-white dark:bg-slate-800 flex items-center justify-center shadow-md transition-all active:scale-90 z-50">
                        {theme === 'dark' ? <i className="fas fa-sun text-amber-400 lg:text-xl"></i> : <i className="fas fa-moon text-indigo-500 lg:text-xl"></i>}
                    </button>
                    <div className="w-full max-w-sm lg:max-w-md space-y-8 lg:space-y-12 text-center relative z-10 animate-slide-up">
                        <div>
                            <div className="w-20 h-20 lg:w-28 lg:h-28 bg-gradient-to-br from-brand-500 to-brand-700 rounded-3xl lg:rounded-[2.5rem] mx-auto flex items-center justify-center shadow-glow mb-6 lg:mb-8 border border-white/20">
                                <i className="fas fa-location-crosshairs text-white text-4xl lg:text-6xl"></i>
                            </div>
                            <h1 className="text-4xl lg:text-5xl font-bold dark:text-white leading-none tracking-widest uppercase">OUNNA</h1>
                            <p className="text-slate-500 mt-3 lg:mt-4 uppercase text-xs lg:text-sm tracking-[0.3em] font-bold opacity-60">Outdoor Tracking System</p>
                        </div>
                        <form onSubmit={handleLogin} className="space-y-4 lg:space-y-6 bg-white/50 dark:bg-slate-800/40 p-8 lg:p-12 rounded-[2rem] lg:rounded-[3rem] border border-white dark:border-slate-700 backdrop-blur-xl shadow-2xl">
                            {error && <div className="bg-red-500/10 text-red-500 p-3 rounded-xl text-xs font-bold border border-red-500/20">{error}</div>}
                            <div className="space-y-4 lg:space-y-5 text-left">
                                <div className="space-y-1">
                                    <label className="text-[10px] lg:text-xs font-black text-slate-400 uppercase ml-4 block tracking-widest">Email Access</label>
                                    <input className="input shadow-inner !bg-white/50 dark:!bg-slate-900/50 lg:!py-4" placeholder="your@email.com" value={email} onChange={e=>setEmail(e.target.value)} required />
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[10px] lg:text-xs font-black text-slate-400 uppercase ml-4 block tracking-widest">Secure Passcode</label>
                                    <input type="password" class="input shadow-inner !bg-white/50 dark:!bg-slate-900/50 lg:!py-4" placeholder="••••••••" value={password} onChange={e=>setPassword(e.target.value)} required />
                                </div>
                            </div>
                            <Button type="submit" className="w-full shadow-lg !py-5 lg:!py-6 lg:text-base mt-2" disabled={loading}>{loading ? 'AUTHORIZING...' : 'SIGN IN'}</Button>
                        </form>
                    </div>
                </div>
            );
        };

        const DeactivatedScreen = ({ toggleTheme, theme }) => {
            const { auth } = useContext(FirebaseContext);
            return (
                <div className="min-h-screen bg-slate-50 dark:bg-slate-950 flex flex-col items-center justify-center p-6 text-center animate-in fade-in duration-500 transition-colors">
                    <div className="absolute top-0 w-full pt-safe"></div>
                    <button onClick={toggleTheme} className="absolute top-6 right-6 mt-safe w-11 h-11 rounded-full bg-white dark:bg-slate-800 flex items-center justify-center shadow-md z-50">
                        {theme === 'dark' ? <i className="fas fa-sun text-amber-400"></i> : <i className="fas fa-moon text-indigo-500"></i>}
                    </button>
                    <div className="w-24 h-24 bg-red-500/10 dark:bg-red-500/5 border-2 border-red-500/20 dark:border-red-500/10 rounded-3xl flex items-center justify-center mb-8 shadow-xl">
                        <i className="fas fa-user-slash text-red-500 text-4xl"></i>
                    </div>
                    <h1 className="text-3xl font-bold text-slate-900 dark:text-white uppercase tracking-tight">Account Suspended</h1>
                    <div className="w-12 h-1 bg-red-500 mx-auto my-4 rounded-full"></div>
                    <p className="text-slate-500 dark:text-slate-400 max-w-xs mx-auto text-sm font-medium leading-relaxed">
                        Your access to the <span className="font-bold text-slate-900 dark:text-white">OUNNA</span> tracking system has been deactivated by an administrator.
                    </p>
                    <button onClick={() => window.firebaseSDK.signOut(auth)} className="mt-10 bg-slate-900 dark:bg-white text-white dark:text-slate-900 px-8 py-3 rounded-2xl font-bold text-xs tracking-widest transition-all active:scale-95 shadow-lg shadow-black/10">
                        RETURN TO LOGIN
                    </button>
                </div>
            );
        };

        const App = () => (
            <FirebaseProvider>
                <ToastProvider>
                    <AppInitializer />
                </ToastProvider>
            </FirebaseProvider>
        );

        const AppInitializer = () => {
            const { loading: authLoading, user, db } = useContext(FirebaseContext);
            const { theme, toggleTheme } = useTheme();
            const [profile, setProfile] = useState(null);
            const [profileLoading, setProfileLoading] = useState(true);

            useEffect(() => {
                let unsub = () => {};
                if (user && db) {
                    setProfileLoading(true);
                    const { doc, onSnapshot } = window.firebaseSDK;
                    const profileRef = doc(db, 'artifacts', appId, 'users', user.uid);
                    
                    unsub = onSnapshot(profileRef, (snap) => {
                        setProfile(snap.exists() ? snap.data() : { status: 'Active' });
                        setProfileLoading(false);
                        
                        const splash = document.getElementById('splash-screen');
                        if (splash) { 
                            splash.style.opacity = '0'; 
                            setTimeout(() => splash.remove(), 500); 
                        }
                    }, (error) => {
                        console.error("Profile Fetch Error:", error);
                        setProfileLoading(false);
                        const splash = document.getElementById('splash-screen');
                        if (splash) { splash.style.opacity = '0'; setTimeout(() => splash.remove(), 500); }
                    });
                } else if (!authLoading) {
                    setProfileLoading(false);
                    const splash = document.getElementById('splash-screen');
                    if (splash) { 
                        splash.style.opacity = '0'; 
                        setTimeout(() => splash.remove(), 500); 
                    }
                }
                return () => unsub();
            }, [user, db, authLoading]);

            if (authLoading || (user && profileLoading)) {
                return (
                    <div className="min-h-screen bg-slate-50 dark:bg-slate-950 flex flex-col items-center justify-center transition-colors duration-300">
                        <div className="w-16 h-16 relative flex items-center justify-center mb-6">
                            <div className="absolute inset-0 border-4 border-slate-200 dark:border-slate-800 rounded-full"></div>
                            <div className="absolute inset-0 border-4 border-brand-500 border-t-transparent rounded-full animate-spin"></div>
                            <i className="fas fa-location-crosshairs text-brand-500 text-xl"></i>
                        </div>
                        <h2 className="text-xl font-khmer-header text-slate-900 dark:text-white tracking-widest uppercase animate-pulse">Loading Profile...</h2>
                    </div>
                );
            }
            
            if (user && profile?.status === 'Inactive') {
                return (
                    <>
                        <DeactivatedScreen theme={theme} toggleTheme={toggleTheme} />
                        <UpdateNotifier />
                    </>
                );
            }
            
            return (
                <>
                    {user ? <CustomerApp theme={theme} toggleTheme={toggleTheme} /> : <AuthScreen theme={theme} toggleTheme={toggleTheme} />}
                    <UpdateNotifier />
                </>
            );
        }

        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
