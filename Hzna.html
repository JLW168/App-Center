<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OnSale CRM - Outdoor Sales Tracker</title>
    
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Moul&family=Siemreap&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

    <!-- Tailwind CSS with Custom Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Battambang', 'Siemreap', 'sans-serif'],
                        display: ['Moul', 'Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        slate: {
                            750: '#1e293b',
                            850: '#0f172a',
                            900: '#0f172a', 
                            950: '#020617',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.6s ease-out forwards',
                        'bounce-short': 'bounceShort 1s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            from: { opacity: '0', transform: 'translateY(10px)' },
                            to: { opacity: '1', transform: 'translateY(0)' }
                        },
                        bounceShort: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-4px)' },
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

    <style>
        html, body { 
            font-family: 'Inter', 'Battambang', 'Siemreap', sans-serif;
            overflow-x: hidden; 
            background-color: #0f172a;
            color: #cbd5e1;
            height: 100%;
        }
        .font-khmer-header { font-family: 'Moul', cursive; }
        
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0f172a; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease-out;
        }

        .input, .select, .textarea {
            display: block; width: 100%; padding: 0.75rem 1rem;
            border: 1px solid #334155; border-radius: 0.75rem;
            background-color: #1e293b; color: #f1f5f9; outline: none; transition: all 0.2s;
            font-size: 14px;
        }
        .input:focus, .select:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }

        .app-card { background: rgba(30, 41, 59, 0.5); border: 1px solid #334155; border-radius: 1.5rem; overflow: hidden; }
        
        .logo-gradient-text {
            background: linear-gradient(135deg, #60a5fa, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .squircle { border-radius: 28px; }
        .glass-icon { background: rgba(255, 255, 255, 0.2); backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px); }

        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }

        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
        .safe-pt { padding-top: env(safe-area-inset-top); }
    </style>
</head>
<body class="bg-slate-900">
    <div id="splash-screen">
        <div class="w-12 h-12 border-4 border-blue-500 border-b-transparent rounded-full animate-spin mb-4"></div>
        <h2 class="text-xs font-black text-white tracking-[0.3em] uppercase opacity-80">OnSale CRM</h2>
    </div>

    <div id="root"></div>

    <script type="module">
        import { initializeApp, deleteApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, serverTimestamp, setDoc, enableIndexedDbPersistence, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseSDK = {
            initializeApp, deleteApp, getAuth, getFirestore, collection, onSnapshot,
            doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, serverTimestamp,
            signInWithEmailAndPassword, onAuthStateChanged, signOut, setDoc, 
            createUserWithEmailAndPassword, enableIndexedDbPersistence, getDocs
        };
    </script>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo, createContext, useContext, memo } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAYb0HKLnEUuhrVcQlXACsxFk28w99qAkc",
            authDomain: "onsale-product.firebaseapp.com",
            projectId: "onsale-product",
            storageBucket: "onsale-product.firebasestorage.app",
            messagingSenderId: "837098663012",
            appId: "1:837098663012:web:cb61b9bd7f99ec4d6e8371"
        };
        
        const appId = 'onsale-crm-app';

        // === CONTEXTS ===
        const FirebaseContext = createContext(null);
        const FirebaseProvider = ({ children }) => {
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);
            const [currentUser, setCurrentUser] = useState(null);
            const [userProfile, setUserProfile] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const { initializeApp, getFirestore, getAuth, onAuthStateChanged, enableIndexedDbPersistence } = window.firebaseSDK;
                const app = initializeApp(firebaseConfig);
                const dbInstance = getFirestore(app);
                const authInstance = getAuth(app);
                setAuth(authInstance); setDb(dbInstance);
                enableIndexedDbPersistence(dbInstance).catch(() => {});
                
                return onAuthStateChanged(authInstance, (user) => {
                    setCurrentUser(user);
                    if (!user) { setUserProfile(null); setLoading(false); }
                });
            }, []);

            useEffect(() => {
                if (!db || !currentUser) return;
                const { doc, onSnapshot } = window.firebaseSDK;
                const userRef = doc(db, 'artifacts', appId, 'users', currentUser.uid);
                return onSnapshot(userRef, (snap) => {
                    if (snap.exists()) setUserProfile({ id: snap.id, ...snap.data() });
                    else setUserProfile({ id: currentUser.uid, name: currentUser.email.split('@')[0], role: 'Staff' });
                    setLoading(false);
                }, () => setLoading(false));
            }, [db, currentUser]);

            return <FirebaseContext.Provider value={{ db, auth, currentUser, userProfile, loading }}>{children}</FirebaseContext.Provider>;
        };

        const useFirebase = () => useContext(FirebaseContext);

        const useCollection = (collectionName) => {
            const { db, currentUser } = useFirebase();
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!db || !currentUser) return;
                const { collection, onSnapshot } = window.firebaseSDK;
                const ref = collectionName === 'users' 
                    ? collection(db, 'artifacts', appId, 'users')
                    : collection(db, 'artifacts', appId, 'public', 'data', collectionName);
                
                const unsubscribe = onSnapshot(ref, (snapshot) => {
                    const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    docs.sort((a, b) => {
                        const timeA = (a.updatedAt || a.createdAt)?.toMillis?.() || 0;
                        const timeB = (b.updatedAt || b.createdAt)?.toMillis?.() || 0;
                        return timeB - timeA;
                    });
                    setData(docs);
                    setLoading(false);
                }, (err) => {
                    console.error(`Node Error [${collectionName}]:`, err);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [db, currentUser, collectionName]);

            return { data, loading };
        };

        // === UI KIT COMPONENTS ===
        const Clock = () => {
            const [time, setTime] = useState(new Date());
            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);
            return (
                <div className="flex flex-col items-end font-mono">
                    <span className="text-xl font-bold text-white leading-none">{time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false })}</span>
                    <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">{time.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' })}</span>
                </div>
            );
        };

        const Button = memo(({ children, onClick, variant = 'primary', icon, disabled = false, type = 'button', className = '' }) => {
            const variants = {
                primary: 'bg-blue-600 text-white shadow-lg shadow-blue-500/20 hover:bg-blue-500',
                secondary: 'bg-slate-750 text-slate-300 border border-slate-700 hover:bg-slate-700',
                danger: 'bg-red-600 text-white shadow-lg shadow-red-500/20 hover:bg-red-500',
            };
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`px-5 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all disabled:opacity-50 ${variants[variant]} ${className}`}>
                    {icon && <i className={`fas ${icon}`}></i>} {children}
                </button>
            );
        });

        const Modal = ({ isOpen, onClose, title, children, footer }) => {
            if (!isOpen) return null;
            return ReactDOM.createPortal(
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md">
                    <div className="bg-slate-900 rounded-[2.5rem] shadow-2xl w-full max-w-xl border border-slate-700 flex flex-col max-h-[90vh] overflow-hidden animate-fade-in">
                        <div className="p-6 border-b border-slate-700 flex justify-between items-center bg-slate-900/50">
                            <h3 className="text-lg font-black text-white uppercase tracking-tighter">{title}</h3>
                            <button onClick={onClose} className="w-10 h-10 rounded-full hover:bg-slate-800 text-slate-400 flex items-center justify-center transition-all"><i className="fas fa-times"></i></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-8 space-y-6 custom-scrollbar">{children}</div>
                        {footer && <div className="p-6 border-t border-slate-700 bg-slate-900/50 flex justify-end gap-3">{footer}</div>}
                    </div>
                </div>, document.body
            );
        };

        const Avatar = ({ name }) => (
            <div className="w-10 h-10 rounded-full bg-slate-700 border border-slate-600 flex items-center justify-center text-blue-400 font-black text-xs uppercase overflow-hidden">
                {name?.charAt(0) || 'U'}
            </div>
        );

        // === PAGES ===

        const DashboardPage = () => {
            const { data: customers } = useCollection('customers');
            const { data: orders } = useCollection('orders');
            const stats = useMemo(() => ({
                customers: customers.length,
                revenue: orders.filter(o => o.status === 'Delivered').reduce((a, c) => a + (c.total || 0), 0),
                pending: orders.filter(o => o.status === 'Pending').length,
                total: orders.length
            }), [customers, orders]);

            return (
                <div className="space-y-8 animate-fade-in pb-12">
                    <h3 className="text-2xl font-khmer-header text-white uppercase tracking-tighter leading-none">Business Intelligence</h3>
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        {[
                            { label: 'Network', value: stats.customers, icon: 'fa-store', color: 'text-blue-400' },
                            { label: 'Revenue ($)', value: stats.revenue.toFixed(2), icon: 'fa-dollar-sign', color: 'text-green-400' },
                            { label: 'Pending', value: stats.pending, icon: 'fa-clock', color: 'text-amber-400' },
                            { label: 'Orders', value: stats.total, icon: 'fa-shopping-cart', color: 'text-indigo-400' }
                        ].map((s, i) => (
                            <div key={i} className="bg-slate-800/50 p-6 rounded-[2rem] border border-slate-700 shadow-xl">
                                <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-1">{s.label}</p>
                                <p className={`text-3xl font-black font-mono tracking-tighter ${s.color}`}>{s.value}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const CustomersPage = () => {
            const { db, userProfile } = useFirebase();
            const { data: customers } = useCollection('customers');
            const { data: sellers } = useCollection('users');
            const [search, setSearch] = useState('');
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [isEditing, setIsEditing] = useState(false);
            const [selectedCustomerId, setSelectedCustomerId] = useState(null);
            const [saving, setSaving] = useState(false);
            const [isDeleteModalOpen, setIsDeleteModalOpen] = useState(false);
            const [idToDelete, setIdToDelete] = useState(null);

            const initialForm = { shopName: '', ownerName: '', contact: '', assignedSellerId: '', marketType: 'Retail', physicalAddress: '', lat: '', lng: '', mapLink: '' };
            const [formData, setFormData] = useState(initialForm);

            // AUTO-EXTRACT COORDINATES FROM MAP LINK
            useEffect(() => {
                if (formData.mapLink && !formData.lat) {
                    const regex = /@(-?\d+\.\d+),(-?\d+\.\d+)/;
                    const match = formData.mapLink.match(regex);
                    if (match) {
                        setFormData(prev => ({ ...prev, lat: match[1], lng: match[2] }));
                    }
                }
            }, [formData.mapLink]);

            const getGPS = () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        setFormData(prev => ({ ...prev, lat: pos.coords.latitude, lng: pos.coords.longitude }));
                    }, () => alert("GPS capture failed. Check permissions."));
                }
            };

            const openAddModal = () => {
                setIsEditing(false); setSelectedCustomerId(null); setFormData(initialForm); setIsModalOpen(true);
            };

            const openEditModal = (c) => {
                setIsEditing(true); setSelectedCustomerId(c.id);
                setFormData({
                    shopName: c.shopName || c.name || '',
                    ownerName: c.ownerName || c.contactPerson || '',
                    contact: c.contact || c.phone || '',
                    assignedSellerId: c.assignedSellerId || c.sellerId || '',
                    marketType: c.marketType || c.type || 'Retail',
                    physicalAddress: c.physicalAddress || c.address || '',
                    lat: c.lat || c.gpsLat || '',
                    lng: c.lng || c.gpsLong || '',
                    mapLink: c.mapLink || ''
                });
                setIsModalOpen(true);
            };

            const handleRegister = async () => {
                if (!formData.shopName && !formData.ownerName) return;
                if (!formData.contact) return;
                setSaving(true);
                try {
                    const { collection, addDoc, updateDoc, doc, serverTimestamp } = window.firebaseSDK;
                    const seller = sellers.find(s => s.id === formData.assignedSellerId);
                    const payload = { ...formData, assignedSellerName: seller?.name || seller?.sellerName || 'Unassigned', updatedAt: serverTimestamp() };
                    if (isEditing) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', selectedCustomerId), payload);
                    else { payload.registeredBy = userProfile?.name || 'System'; payload.createdAt = serverTimestamp(); await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'customers'), payload); }
                    setIsModalOpen(false); setFormData(initialForm);
                } catch (e) { alert("Operation failed."); }
                setSaving(false);
            };

            const confirmDelete = (id) => { setIdToDelete(id); setIsDeleteModalOpen(true); };
            const handleDeleteAction = async () => {
                try { const { doc, deleteDoc } = window.firebaseSDK; await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', idToDelete)); setIsDeleteModalOpen(false); } catch (e) { alert("Delete failed."); }
            };

            const filtered = customers.filter(c => {
                const s = search.toLowerCase();
                return (c.shopName || c.name || '').toLowerCase().includes(s) || (c.ownerName || c.contactPerson || '').toLowerCase().includes(s);
            });

            return (
                <div className="space-y-8 animate-fade-in pb-12">
                    <div className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4">
                        <h3 className="text-2xl font-khmer-header text-white uppercase tracking-tighter leading-none">Customer Registry</h3>
                        <div className="flex w-full md:w-auto gap-3">
                            <input placeholder="Search shops..." className="input !mt-0 !py-2.5 !px-5 text-sm !bg-slate-800 !border-slate-600 flex-1 md:min-w-[250px]" value={search} onChange={e=>setSearch(e.target.value)} />
                            <Button icon="fa-plus" onClick={openAddModal}>Add</Button>
                        </div>
                    </div>
                    <div className="bg-slate-800/50 rounded-[2rem] border border-slate-700 overflow-hidden shadow-2xl">
                        <div className="overflow-x-auto custom-scrollbar">
                            <table className="w-full text-left border-collapse min-w-[900px]">
                                <thead>
                                    <tr className="bg-slate-900/50 text-xs text-slate-400 font-semibold uppercase tracking-wider border-b border-slate-700">
                                        <th className="px-4 py-3">Shop Node</th>
                                        <th className="px-4 py-3">Contact</th>
                                        <th className="px-4 py-3">Market</th>
                                        <th className="px-4 py-3">Seller</th>
                                        <th className="px-4 py-3 text-center">Pin</th>
                                        <th className="px-4 py-3 text-center">Actions</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-700">
                                    {filtered.map(c => {
                                        const displayName = c.shopName || c.name || 'Unnamed';
                                        const displayContact = c.contact || c.phone || 'N/A';
                                        const displayOwner = c.ownerName || c.contactPerson || '---';
                                        return (
                                            <tr key={c.id} className="hover:bg-slate-700/50 transition-all group">
                                                <td className="px-4 py-4">
                                                    <div className="flex items-center gap-3">
                                                        <Avatar name={displayName} />
                                                        <div><p className="text-sm font-bold text-slate-200 uppercase tracking-tight">{displayName}</p><p className="text-[10px] text-slate-400 font-bold uppercase">{displayOwner}</p></div>
                                                    </div>
                                                </td>
                                                <td className="px-4 py-4 text-sm text-slate-300 font-mono">{displayContact}</td>
                                                <td className="px-4 py-4"><span className="text-[10px] font-black uppercase px-2 py-0.5 rounded-lg border border-blue-500/20 text-blue-400 bg-blue-500/5">{c.marketType || c.type || 'Retail'}</span></td>
                                                <td className="px-4 py-4 text-xs font-bold text-slate-300 uppercase">{c.assignedSellerName || c.sellerName || '---'}</td>
                                                <td className="px-4 py-4 text-center">
                                                    {(c.lat || c.gpsLat) ? <a href={`https://www.google.com/maps?q=${c.lat || c.gpsLat},${c.lng || c.gpsLong}`} target="_blank" className="text-green-400 hover:scale-110 transition-transform"><i className="fas fa-location-dot"></i></a> : <i className="fas fa-location-dot opacity-10"></i>}
                                                </td>
                                                <td className="px-4 py-4 text-center">
                                                    <div className="flex justify-center gap-4">
                                                        <button onClick={() => openEditModal(c)} className="text-blue-400 hover:scale-110 transition-transform"><i className="fas fa-eye"></i></button>
                                                        <button className="text-indigo-400 hover:scale-110 transition-transform"><i className="fas fa-history"></i></button>
                                                        <button onClick={() => confirmDelete(c.id)} className="text-red-500 hover:scale-110 transition-transform"><i className="fas fa-trash-alt"></i></button>
                                                    </div>
                                                </td>
                                            </tr>
                                        );
                                    })}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <Modal isOpen={isModalOpen} onClose={() => setIsModalOpen(false)} title={isEditing ? "Update Customer Node" : "Register Node"} footer={<div className="flex gap-3"><Button variant="secondary" onClick={() => setIsModalOpen(false)}>Cancel</Button><Button onClick={handleRegister} disabled={saving}>{isEditing ? "Save Changes" : "Authorize Node"}</Button></div>}>
                        <div className="space-y-6">
                            <div className="grid grid-cols-2 gap-4">
                                <div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-500 ml-1">Shop Name</label><input className="input !mt-0" value={formData.shopName} onChange={e=>setFormData({...formData, shopName: e.target.value})} /></div>
                                <div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-500 ml-1">Owner / Contact</label><input className="input !mt-0" value={formData.ownerName} onChange={e=>setFormData({...formData, ownerName: e.target.value})} /></div>
                            </div>
                            <div className="grid grid-cols-2 gap-4">
                                <div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-500 ml-1">Phone Number</label><input className="input !mt-0 font-mono" value={formData.contact} onChange={e=>setFormData({...formData, contact: e.target.value})} /></div>
                                <div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-500 ml-1">Market Type</label><select className="select !mt-0" value={formData.marketType} onChange={e=>setFormData({...formData, marketType: e.target.value})}><option>Retail</option><option>Wholesale</option></select></div>
                            </div>
                            <div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-500 ml-1">Assigned Seller</label><select className="select !mt-0" value={formData.assignedSellerId} onChange={e=>setFormData({...formData, assignedSellerId: e.target.value})}><option value="">Assign Personnel...</option>{sellers.map(s => <option key={s.id} value={s.id}>{s.name || s.sellerName}</option>)}</select></div>
                            <div className="space-y-1"><label className="text-[9px] font-black uppercase text-slate-500 ml-1">Physical Address</label><textarea className="input !mt-0 h-20" placeholder="Address Detail..." value={formData.physicalAddress} onChange={e=>setFormData({...formData, physicalAddress: e.target.value})} /></div>

                            {/* ADVANCED LOCATION NODE MAPPING */}
                            <div className="bg-slate-950/40 p-5 rounded-2xl border border-white/5 space-y-4">
                                <div className="flex justify-between items-center">
                                    <label className="text-[9px] font-black uppercase text-slate-400 tracking-[0.2em]">Geospatial Node (Optional Mapping)</label>
                                    <button onClick={getGPS} className="text-[9px] font-black uppercase text-blue-400 flex items-center gap-2 hover:text-blue-300 transition-colors"><i className="fas fa-location-crosshairs"></i> Pin Live GPS</button>
                                </div>
                                <div className="space-y-1">
                                    <label className="text-[8px] font-black uppercase text-slate-600 ml-1">Paste Google Maps URL (Auto-Extract)</label>
                                    <div className="flex gap-2">
                                        <input className="input !mt-0 !py-2.5 !px-3 text-xs flex-1" placeholder="https://www.google.com/maps/..." value={formData.mapLink} onChange={e=>setFormData({...formData, mapLink: e.target.value})} />
                                        <a href="https://www.google.com/maps" target="_blank" className="w-10 h-10 rounded-xl bg-slate-800 border border-slate-700 flex items-center justify-center text-blue-400"><i className="fas fa-map-marked-alt"></i></a>
                                    </div>
                                </div>
                                <div className="grid grid-cols-2 gap-3 pt-2">
                                    <input className="input !mt-0 !py-2 !px-3 font-mono text-[10px] bg-slate-900/50" placeholder="Latitude" value={formData.lat} onChange={e=>setFormData({...formData, lat: e.target.value})} />
                                    <input className="input !mt-0 !py-2 !px-3 font-mono text-[10px] bg-slate-900/50" placeholder="Longitude" value={formData.lng} onChange={e=>setFormData({...formData, lng: e.target.value})} />
                                </div>
                            </div>
                        </div>
                    </Modal>

                    <Modal isOpen={isDeleteModalOpen} onClose={() => setIsDeleteModalOpen(false)} title="Security Guard" footer={<div className="flex gap-3"><Button variant="secondary" onClick={() => setIsDeleteModalOpen(false)}>Abort</Button><Button variant="danger" icon="fa-trash-alt" onClick={handleDeleteAction}>Terminate</Button></div>}><div className="text-center py-6"><div className="w-16 h-16 bg-red-600/10 rounded-full flex items-center justify-center mx-auto mb-4 text-red-500"><i className="fas fa-exclamation-triangle text-2xl"></i></div><h4 className="text-white font-black uppercase tracking-widest mb-1">Permanent Erasure</h4><p className="text-slate-500 text-sm">Terminate this node from the registry?</p></div></Modal>
                </div>
            );
        };

        const ProductsPage = () => {
            const { data: products } = useCollection('products');
            return (
                <div className="space-y-8 animate-fade-in pb-12">
                    <h3 className="text-2xl font-khmer-header text-white uppercase tracking-tighter leading-none">Inventory Node</h3>
                    <div className="bg-slate-800/50 rounded-[2rem] border border-slate-700 overflow-hidden shadow-2xl">
                        <div className="overflow-x-auto custom-scrollbar">
                            <table className="w-full text-left border-collapse min-w-[800px]">
                                <thead>
                                    <tr className="bg-slate-900/50 text-xs text-slate-400 font-semibold uppercase tracking-wider border-b border-slate-700"><th className="px-4 py-3">Asset</th><th className="px-4 py-3">Category</th><th className="px-4 py-3 text-right">Price</th><th className="px-4 py-3 text-center">Stock</th><th className="px-4 py-3 text-center">Actions</th></tr>
                                </thead>
                                <tbody className="divide-y divide-slate-700">
                                    {products.map(p => (<tr key={p.id} className="hover:bg-slate-700/50 transition-all"><td className="px-4 py-4 text-sm font-bold text-slate-200 uppercase">{p.name}</td><td className="px-4 py-4 text-sm text-slate-400">{p.categoryName || 'General'}</td><td className="px-4 py-4 text-right font-mono font-bold text-green-400">${p.price?.toFixed(2)}</td><td className="px-4 py-4 text-center font-mono text-slate-200">{p.stock}</td><td className="px-4 py-4 text-center"><button className="text-blue-400 hover:scale-110 transition-transform"><i className="fas fa-edit"></i></button></td></tr>))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const SettingsPage = () => {
            const { db } = useFirebase();
            const [tab, setTab] = useState('users');
            const { data: users } = useCollection('users');
            const { data: categories } = useCollection('productCategories');
            const [isUserModalOpen, setIsUserModalOpen] = useState(false);
            const [isUserEditing, setIsUserEditing] = useState(false);
            const [selectedUserId, setSelectedUserId] = useState(null);
            const [loadingAction, setLoadingAction] = useState(false);
            const [userFormData, setUserFormData] = useState({ name: '', sellerId: '', contactNumber: '', email: '', password: '', role: 'Sales Agent', permissions: ['dashboard', 'customers'] });
            const [isCatModalOpen, setIsCatModalOpen] = useState(false);
            const [isCatEditing, setIsCatEditing] = useState(false);
            const [selectedCatId, setSelectedCatId] = useState(null);
            const [catFormData, setCatFormData] = useState({ name: '', description: '' });
            const [isCatDeleteModalOpen, setIsCatDeleteModalOpen] = useState(false);
            const [catIdToDelete, setCatIdToDelete] = useState(null);

            const handleSaveUser = async () => {
                if (!userFormData.name || (!isUserEditing && !userFormData.password)) return;
                setLoadingAction(true);
                try {
                    const { doc, setDoc, updateDoc, serverTimestamp, initializeApp, getAuth, createUserWithEmailAndPassword, deleteApp } = window.firebaseSDK;
                    const payload = { name: userFormData.name, sellerName: userFormData.name, sellerId: userFormData.sellerId, contactNumber: userFormData.contactNumber, role: userFormData.role, permissions: userFormData.permissions, updatedAt: serverTimestamp() };
                    if (isUserEditing) await updateDoc(doc(db, 'artifacts', appId, 'users', selectedUserId), payload);
                    else {
                        const secApp = initializeApp(firebaseConfig, "sec-" + Date.now());
                        const userCred = await createUserWithEmailAndPassword(getAuth(secApp), userFormData.email, userFormData.password);
                        await setDoc(doc(db, 'artifacts', appId, 'users', userCred.user.uid), { ...payload, email: userFormData.email, createdAt: serverTimestamp() });
                        await getAuth(secApp).signOut(); await deleteApp(secApp);
                    }
                    setIsUserModalOpen(false);
                } catch (e) { alert(e.message); }
                setLoadingAction(false);
            };

            return (
                <div className="space-y-8 animate-fade-in pb-12">
                    <h3 className="text-2xl font-khmer-header text-white uppercase tracking-tighter leading-none">Security Node</h3>
                    <div className="flex gap-4 border-b border-slate-700">
                        {['users', 'general'].map(t => (<button key={t} onClick={() => setTab(t)} className={`pb-3 px-4 text-[10px] font-black uppercase tracking-widest transition-all ${tab === t ? 'text-blue-500 border-b-2 border-blue-500' : 'text-slate-500 hover:text-slate-300'}`}>{t} Module</button>))}
                    </div>

                    {tab === 'users' && (
                        <div className="space-y-4">
                            <div className="flex justify-between items-center"><p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest italic">Authorized Nodes</p><Button icon="fa-user-plus" onClick={() => {setIsUserEditing(false); setUserFormData({name:'',sellerId:'',contactNumber:'',email:'',password:'',role:'Sales Agent',permissions:['dashboard']}); setIsUserModalOpen(true);}}>Smart User</Button></div>
                            <div className="bg-slate-800/50 rounded-[2rem] border border-slate-700 overflow-hidden shadow-xl"><table className="w-full text-left border-collapse"><thead><tr className="bg-slate-900/50 text-xs text-slate-400 font-semibold uppercase tracking-wider border-b border-slate-700"><th className="px-4 py-3">Node Identity</th><th className="px-4 py-3">Role</th><th className="px-4 py-3 text-center">Actions</th></tr></thead><tbody className="divide-y divide-slate-700">
                                {users.map(u => (<tr key={u.id} className="hover:bg-slate-700/50 transition-all"><td className="px-4 py-4"><p className="text-sm font-bold text-slate-200 uppercase">{u.name || u.sellerName || '---'}</p><p className="text-[10px] text-slate-500 font-mono">{u.email}</p></td><td className="px-4 py-4"><span className="text-[10px] font-black uppercase px-2 py-0.5 rounded-lg border border-blue-500/20 text-blue-400 bg-blue-500/5">{u.role}</span></td><td className="px-4 py-4 text-center"><button onClick={() => {setIsUserEditing(true); setSelectedUserId(u.id); setUserFormData({name: u.name, sellerId: u.sellerId, contactNumber: u.contactNumber, email: u.email, role: u.role, permissions: u.permissions || []}); setIsUserModalOpen(true);}} className="text-blue-400 hover:scale-110 transition-transform"><i className="fas fa-edit"></i></button></td></tr>))}
                            </tbody></table></div>
                        </div>
                    )}

                    {tab === 'general' && (
                        <div className="space-y-4">
                            <div className="flex justify-between items-center"><p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest italic">Classification Node</p><Button icon="fa-layer-group" onClick={() => {setIsCatEditing(false); setCatFormData({name:'', description:''}); setIsCatModalOpen(true);}}>Add Class</Button></div>
                            <div className="bg-slate-800/50 rounded-[2rem] border border-slate-700 overflow-hidden shadow-xl"><table className="w-full text-left border-collapse"><thead><tr className="bg-slate-900/50 text-xs text-slate-400 font-semibold uppercase tracking-wider border-b border-slate-700"><th className="px-4 py-3">Classification</th><th className="px-4 py-3">Description</th><th className="px-4 py-3 text-center">Actions</th></tr></thead><tbody className="divide-y divide-slate-700">
                                {categories.map(cat => (<tr key={cat.id} className="hover:bg-slate-700/50 transition-all group"><td className="px-4 py-4 text-sm font-bold text-slate-200 uppercase">{cat.name}</td><td className="px-4 py-4 text-sm text-slate-400">{cat.description || ''}</td><td className="px-4 py-4 text-center"><div className="flex justify-center gap-4"><button onClick={() => {setIsCatEditing(true); setSelectedCatId(cat.id); setCatFormData({name: cat.name, description: cat.description}); setIsCatModalOpen(true);}} className="text-blue-400 hover:scale-110 transition-transform"><i className="fas fa-edit"></i></button><button onClick={() => { setCatIdToDelete(cat.id); setIsCatDeleteModalOpen(true); }} className="text-red-500/50 hover:text-red-500 transition-colors"><i className="fas fa-trash-alt"></i></button></div></td></tr>))}
                            </tbody></table></div>
                        </div>
                    )}

                    <Modal isOpen={isUserModalOpen} onClose={() => setIsUserModalOpen(false)} title={isUserEditing ? "Update Profile" : "Deployment"} footer={<div className="flex gap-3"><Button variant="secondary" onClick={() => setIsUserModalOpen(false)}>Cancel</Button><Button onClick={handleSaveUser} disabled={loadingAction}>Execute</Button></div>}>
                        <div className="space-y-4"><div className="grid grid-cols-2 gap-4"><input className="input" placeholder="Full Name" value={userFormData.name} onChange={e=>setUserFormData({...userFormData, name: e.target.value})} /><input className="input" placeholder="Seller ID" value={userFormData.sellerId} onChange={e=>setUserFormData({...userFormData, sellerId: e.target.value})} /></div><div className="grid grid-cols-2 gap-4"><input className="input" placeholder="Contact" value={userFormData.contactNumber} onChange={e=>setUserFormData({...userFormData, contactNumber: e.target.value})} /><select className="select" value={userFormData.role} onChange={e=>setUserFormData({...userFormData, role: e.target.value})}><option>Sales Agent</option><option>Regional Manager</option><option>Admin</option></select></div>{!isUserEditing && (<div className="grid grid-cols-2 gap-4"><input className="input" placeholder="Email" value={userFormData.email} onChange={e=>setUserFormData({...userFormData, email: e.target.value})} /><input type="password" className="input" placeholder="Password" value={userFormData.password} onChange={e=>setUserFormData({...userFormData, password: e.target.value})} /></div>)}<div className="bg-slate-900 p-4 rounded-2xl border border-slate-700"><label className="text-[10px] font-black uppercase text-slate-500 block mb-3">Permissions</label><div className="grid grid-cols-2 gap-2">{['dashboard', 'customers', 'visits', 'products', 'orders'].map(p => (<button key={p} onClick={() => setUserFormData(prev => ({...prev, permissions: prev.permissions.includes(p) ? prev.permissions.filter(x=>x!==p) : [...prev.permissions, p]}))} className={`px-4 py-2 rounded-xl text-[9px] font-bold uppercase transition-all flex items-center gap-2 ${userFormData.permissions.includes(p) ? 'bg-blue-600/20 text-blue-400 border border-blue-500/30' : 'bg-slate-850 text-slate-500'}`}><i className={`fas ${userFormData.permissions.includes(p) ? 'fa-check-circle' : 'fa-circle'}`}></i> {p}</button>))}</div></div></div>
                    </Modal>
                    <Modal isOpen={isCatModalOpen} onClose={() => setIsCatModalOpen(false)} title={isCatEditing ? "Update Class" : "New Node"} footer={<div className="flex gap-3"><Button variant="secondary" onClick={() => setIsModalOpen(false)}>Cancel</Button><Button onClick={async () => { try { const { collection, addDoc, updateDoc, doc, serverTimestamp } = window.firebaseSDK; if (isCatEditing) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'productCategories', selectedCatId), { ...catFormData, updatedAt: serverTimestamp() }); else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'productCategories'), { ...catFormData, createdAt: serverTimestamp() }); setIsCatModalOpen(false); } catch(e){} }}>Confirm</Button></div>}><div className="space-y-4"><input className="input" placeholder="Category Name" value={catFormData.name} onChange={e=>setCatFormData({...catFormData, name: e.target.value})} /><textarea className="input h-32" placeholder="Description Node" value={catFormData.description} onChange={e=>setCatFormData({...catFormData, description: e.target.value})} /></div></Modal>
                    <Modal isOpen={isCatDeleteModalOpen} onClose={() => setIsCatDeleteModalOpen(false)} title="Security Guard" footer={<div className="flex gap-3"><Button variant="secondary" onClick={() => setIsCatDeleteModalOpen(false)}>Abort</Button><Button variant="danger" icon="fa-trash-alt" onClick={async () => { await window.firebaseSDK.deleteDoc(window.firebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'productCategories', catIdToDelete)); setIsCatDeleteModalOpen(false); }}>Terminate</Button></div>}><div className="text-center py-6"><div className="w-16 h-16 bg-red-600/10 rounded-full flex items-center justify-center mx-auto mb-4 text-red-500"><i className="fas fa-exclamation-triangle text-2xl"></i></div><h4 className="text-white font-black uppercase tracking-widest mb-1">Permanent Erasure</h4><p className="text-slate-500 text-sm">Terminate this classification from the registry?</p></div></Modal>
                </div>
            );
        };

        const AppIcon = ({ id, icon, label, color, onClick }) => (
            <button onClick={onClick} className="flex flex-col items-center gap-3 group transition-all active:scale-90">
                <div className={`w-16 h-16 md:w-20 md:h-20 squircle bg-slate-900 border border-white/10 flex items-center justify-center text-2xl md:text-3xl shadow-xl group-hover:bg-slate-800 transition-all`}>
                    <i className={`fas fa-${icon} bg-gradient-to-br ${color} bg-clip-text text-transparent`}></i>
                </div>
                <span className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 group-hover:text-white transition-colors text-center">{label}</span>
            </button>
        );

        const AppContent = () => {
            const { userProfile, loading, auth } = useFirebase();
            const [page, setPage] = useState('dashboard');
            const [launchpad, setLaunchpad] = useState(true);
            useEffect(() => { if (!loading) { const s = document.getElementById('splash-screen'); if (s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 500); } } }, [loading]);
            if (loading) return null;
            if (!userProfile && !loading) return <LoginPage />;
            return (
                <div className="h-screen flex flex-col bg-slate-900 safe-pb overflow-hidden">
                    <header className="px-6 py-5 flex flex-none justify-between items-center bg-slate-900 border-b border-slate-800 backdrop-blur-xl z-50 shadow-2xl safe-pt">
                        <div className="flex items-center gap-4">
                            <button onClick={() => setLaunchpad(true)} className="w-10 h-10 rounded-xl bg-slate-800 text-blue-400 flex items-center justify-center border border-slate-700 active:scale-90 shadow-lg transition-all"><i className="fas fa-th-large"></i></button>
                            <div className="flex flex-col"><span className="font-khmer-header text-lg logo-gradient-text leading-none uppercase">OnSale</span><span className="text-[9px] font-black tracking-[0.4em] text-slate-500 uppercase -mt-0.5">Enterprise Node</span></div>
                        </div>
                        <div className="flex flex-col items-end"><span className="text-sm font-black text-slate-100 uppercase tracking-tighter leading-none">{userProfile.name || userProfile.sellerName}</span><span className="text-[10px] font-bold text-blue-500 uppercase tracking-widest">{userProfile.role}</span></div>
                    </header>
                    <main className="flex-1 p-6 overflow-y-auto custom-scrollbar"><div className="max-w-7xl mx-auto">{page === 'dashboard' && <DashboardPage />}{page === 'customers' && <CustomersPage />}{page === 'products' && <ProductsPage />}{page === 'settings' && <SettingsPage />}</div></main>
                    {launchpad && (
                        <div className="fixed inset-0 z-[100] bg-[#0f172a]/98 backdrop-blur-3xl flex flex-col animate-fade-in safe-pt safe-pb overflow-y-auto">
                            <header className="p-8 flex justify-between items-start"><div className="flex flex-col"><span className="font-khmer-header text-3xl logo-gradient-text uppercase leading-none">OnSale</span><span className="text-xs font-black tracking-[0.5em] text-slate-600 uppercase mt-1">Global Dashboard</span></div><Clock /></header>
                            <div className="flex-1 flex flex-col items-center justify-center py-20 px-8">
                                <div className="grid grid-cols-3 gap-8 md:gap-16 w-full max-w-2xl justify-items-center">
                                    {[
                                        { id: 'dashboard', icon: 'chart-pie', label: 'Monitor', color: 'from-blue-600 to-blue-400' },
                                        { id: 'customers', icon: 'store', label: 'Customers', color: 'from-emerald-600 to-emerald-400' },
                                        { id: 'orders', icon: 'receipt', label: 'Orders', color: 'from-purple-600 to-purple-400' },
                                        { id: 'products', icon: 'box-open', label: 'Inventory', color: 'from-cyan-600 to-cyan-400' },
                                        { id: 'sync', icon: 'location-dot', label: 'GPS Sync', color: 'from-amber-600 to-amber-400' },
                                        { id: 'settings', icon: 'gear', label: 'Security', color: 'from-slate-600 to-slate-400' }
                                    ].map(app => (<AppIcon key={app.id} {...app} onClick={() => { setPage(app.id); setLaunchpad(false); }} />))}
                                </div>
                            </div>
                            <footer className="p-10 flex flex-col items-center gap-6"><button onClick={() => window.firebaseSDK.signOut(auth)} className="px-10 py-3.5 rounded-full bg-red-950/30 text-red-500 font-black text-[10px] uppercase tracking-[0.3em] active:scale-95 transition-all shadow-xl border border-red-500/20">Terminate Node Session</button></footer>
                        </div>
                    )}
                </div>
            );
        };

        const LoginPage = () => {
            const { auth } = useFirebase();
            const [email, setEmail] = useState(''); const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const handleLogin = async (e) => { e.preventDefault(); setLoading(true); try { await window.firebaseSDK.signInWithEmailAndPassword(auth, email, password); } catch (err) { alert("Access Denied."); setLoading(false); } };
            return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-900 relative overflow-hidden">
                    <div className="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-600/10 blur-[120px] rounded-full pointer-events-none"></div>
                    <div className="w-full max-w-sm glass-panel p-10 rounded-[3.5rem] shadow-2xl relative z-10 animate-fade-in border border-slate-700 text-center">
                        <div className="font-khmer-header text-4xl logo-gradient-text uppercase mb-2">OnSale</div>
                        <p className="text-[10px] font-black text-slate-500 tracking-[0.5em] uppercase mb-10">Gateway Verification</p>
                        <form onSubmit={handleLogin} className="space-y-6 text-left">
                            <div><label className="text-[10px] font-black uppercase text-slate-600 tracking-widest ml-1 mb-2 block">System Identity</label><input type="email" placeholder="admin@onsale.com" className="input !bg-slate-950/50 !border-slate-700" value={email} onChange={e=>setEmail(e.target.value)} required /></div>
                            <div><label className="text-[10px] font-black uppercase text-slate-600 tracking-widest ml-1 mb-2 block">Security Token</label><input type="password" placeholder="••••••••" className="input !bg-slate-950/50 !border-slate-700" value={password} onChange={e=>setPassword(e.target.value)} required /></div>
                            <Button type="submit" className="w-full py-5 shadow-blue-600/20" disabled={loading}>{loading ? <i className="fas fa-spinner fa-spin"></i> : 'Authorize Access'}</Button>
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => (<FirebaseProvider><AppContent /></FirebaseProvider>);
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
