<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ounna CRM - Outdoor Sales Tracker</title>
    
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">

    <!-- Google Fonts: Inter (English/Numbers), Battambang (Khmer Body), Moul (Khmer Header) -->
    <link href="https://fonts.googleapis.com/css2?family=Battambang:wght@400;700&family=Moul&family=Siemreap&family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">

    <!-- Cropper.js for Image Processing -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.css" />
    <script src="https://cdnjs.cloudflare.com/ajax/libs/cropperjs/1.5.13/cropper.min.js"></script>

    <!-- Tailwind CSS with Custom Config -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    fontFamily: {
                        sans: ['Inter', 'Battambang', 'Siemreap', 'sans-serif'],
                        display: ['Moul', 'Inter', 'sans-serif'],
                        mono: ['JetBrains Mono', 'monospace'],
                    },
                    colors: {
                        slate: {
                            750: '#1e293b',
                            850: '#0f172a',
                            900: '#0f172a', 
                            950: '#020617',
                        }
                    },
                    animation: {
                        'fade-in': 'fadeIn 0.6s ease-out forwards',
                        'bounce-short': 'bounceShort 1.5s ease-in-out infinite',
                    },
                    keyframes: {
                        fadeIn: {
                            from: { opacity: '0', transform: 'translateY(10px)' },
                            to: { opacity: '1', transform: 'translateY(0)' }
                        },
                        bounceShort: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-6px)' },
                        }
                    }
                }
            }
        }
    </script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" />

    <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

    <style>
        html, body { 
            font-family: 'Inter', 'Battambang', 'Siemreap', sans-serif;
            overflow-x: hidden; 
            background-color: #0f172a;
            color: #cbd5e1;
            height: 100%;
        }
        .font-khmer-header { font-family: 'Moul', cursive; }
        
        #splash-screen {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #0f172a; z-index: 9999;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            transition: opacity 0.5s ease-out;
        }

        .input, .select, .textarea {
            display: block; width: 100%; padding: 0.75rem 1rem;
            border: 1px solid #334155; border-radius: 0.85rem;
            background-color: #1e293b; color: #f1f5f9; outline: none; transition: all 0.2s;
            font-size: 14px;
        }
        .input:focus, .select:focus { border-color: #3b82f6; box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.1); }

        .group-card {
            background: rgba(30, 41, 59, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 1.5rem;
            padding: 1.5rem;
            transition: all 0.3s ease;
        }
        .group-card:hover {
            border-color: rgba(59, 130, 246, 0.3);
            background: rgba(30, 41, 59, 0.6);
        }
        
        .logo-gradient-text {
            background: linear-gradient(135deg, #60a5fa, #a855f7, #ec4899);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .squircle { border-radius: 28px; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; height: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background-color: #334155; border-radius: 10px; }

        .safe-pb { padding-bottom: env(safe-area-inset-bottom); }
        .safe-pt { padding-top: env(safe-area-inset-top); }

        .avatar-circle-box {
            position: relative;
            width: 120px;
            height: 120px;
            border-radius: 50%;
            background: #0f172a;
            border: 2px solid #334155;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: all 0.3s ease;
            overflow: hidden;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.5);
        }
        .avatar-circle-box:hover {
            border-color: #3b82f6;
            transform: scale(1.02);
        }
    </style>
</head>
<body class="bg-slate-900">
    <div id="splash-screen">
        <div class="w-12 h-12 border-4 border-blue-500 border-b-transparent rounded-full animate-spin mb-4"></div>
        <h2 class="text-xs font-black text-white tracking-[0.3em] uppercase opacity-80">Ounna CRM</h2>
    </div>

    <div id="root"></div>

    <script type="module">
        import { initializeApp, deleteApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, serverTimestamp, setDoc, enableIndexedDbPersistence, getDocs } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseSDK = {
            initializeApp, deleteApp, getAuth, getFirestore, collection, onSnapshot,
            doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, serverTimestamp,
            signInWithEmailAndPassword, onAuthStateChanged, signOut, setDoc, 
            createUserWithEmailAndPassword, enableIndexedDbPersistence, getDocs
        };
    </script>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo, createContext, useContext, memo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAYb0HKLnEUuhrVcQlXACsxFk28w99qAkc",
            authDomain: "onsale-product.firebaseapp.com",
            projectId: "onsale-product",
            storageBucket: "onsale-product.firebasestorage.app",
            messagingSenderId: "837098663012",
            appId: "1:837098663012:web:cb61b9bd7f99ec4d6e8371"
        };
        
        const appId = 'onsale-crm-app';

        // === UTILS ===
        const generateInvoiceNo = () => {
            const d = new Date();
            const pad = (n) => n.toString().padStart(2, '0');
            const dateStr = `${pad(d.getDate())}${pad(d.getMonth() + 1)}${d.getFullYear().toString().slice(-2)}`;
            const timeStr = `${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
            return `HZN-${dateStr}-${timeStr}`;
        };

        const generateDriverId = () => {
            return `DV-${Math.floor(1000 + Math.random() * 9000)}`;
        };

        // === CONTEXTS ===
        const FirebaseContext = createContext(null);
        const FirebaseProvider = ({ children }) => {
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);
            const [currentUser, setCurrentUser] = useState(null);
            const [userProfile, setUserProfile] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const { initializeApp, getFirestore, getAuth, onAuthStateChanged, enableIndexedDbPersistence } = window.firebaseSDK;
                const app = initializeApp(firebaseConfig);
                const dbInstance = getFirestore(app);
                const authInstance = getAuth(app);
                setAuth(authInstance); setDb(dbInstance);
                enableIndexedDbPersistence(dbInstance).catch(() => {});
                
                return onAuthStateChanged(authInstance, (user) => {
                    setCurrentUser(user);
                    if (!user) { setUserProfile(null); setLoading(false); }
                });
            }, []);

            useEffect(() => {
                if (!db || !currentUser) return;
                const { doc, onSnapshot } = window.firebaseSDK;
                const userRef = doc(db, 'artifacts', appId, 'users', currentUser.uid);
                return onSnapshot(userRef, (snap) => {
                    if (snap.exists()) setUserProfile({ id: snap.id, ...snap.data() });
                    else setUserProfile({ id: currentUser.uid, name: currentUser.email.split('@')[0], role: 'Staff' });
                    setLoading(false);
                }, () => setLoading(false));
            }, [db, currentUser]);

            return <FirebaseContext.Provider value={{ db, auth, currentUser, userProfile, loading }}>{children}</FirebaseContext.Provider>;
        };

        const useFirebase = () => useContext(FirebaseContext);

        const useCollection = (collectionName) => {
            const { db, currentUser } = useFirebase();
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!db || !currentUser) return;
                const { collection, onSnapshot } = window.firebaseSDK;
                const ref = collectionName === 'users' 
                    ? collection(db, 'artifacts', appId, 'users')
                    : collection(db, 'artifacts', appId, 'public', 'data', collectionName);
                
                const unsubscribe = onSnapshot(ref, (snapshot) => {
                    const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    docs.sort((a, b) => {
                        const timeA = (a.updatedAt || a.createdAt)?.toMillis?.() || 0;
                        const timeB = (b.updatedAt || b.createdAt)?.toMillis?.() || 0;
                        return timeB - timeA;
                    });
                    setData(docs);
                    setLoading(false);
                }, (err) => {
                    console.error(`Node Error [${collectionName}]:`, err);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [db, currentUser, collectionName]);

            return { data, loading };
        };

        // === UI KIT COMPONENTS ===
        const Clock = () => {
            const [time, setTime] = useState(new Date());
            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);
            return (
                <div className="flex flex-col items-end font-mono text-right">
                    <span className="text-xl font-bold text-white leading-none">{time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false })}</span>
                    <span className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-1">{time.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' })}</span>
                </div>
            );
        };

        const Button = memo(({ children, onClick, variant = 'primary', icon, disabled = false, type = 'button', className = '' }) => {
            const variants = {
                primary: 'bg-blue-600 text-white shadow-lg shadow-blue-500/20 hover:bg-blue-500',
                secondary: 'bg-slate-750 text-slate-300 border border-slate-700 hover:bg-slate-700',
                danger: 'bg-red-600 text-white shadow-lg shadow-red-500/20 hover:bg-red-500',
                success: 'bg-emerald-600 text-white shadow-lg shadow-emerald-500/20 hover:bg-emerald-500',
            };
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`px-5 py-3 rounded-xl font-black text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 active:scale-95 transition-all disabled:opacity-50 ${variants[variant]} ${className}`}>
                    {icon && <i className={`fas ${icon}`}></i>} {children}
                </button>
            );
        });

        const Modal = ({ isOpen, onClose, title, children, footer, size = "max-w-xl" }) => {
            if (!isOpen) return null;
            return ReactDOM.createPortal(
                <div className="fixed inset-0 z-[200] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md">
                    <div className={`bg-slate-900 rounded-[2.5rem] shadow-2xl w-full ${size} border border-slate-700 flex flex-col max-h-[90vh] overflow-hidden animate-fade-in`}>
                        <div className="p-6 border-b border-slate-800 flex justify-between items-center bg-slate-900/50">
                            <h3 className="text-lg font-black text-white uppercase tracking-tighter">{title}</h3>
                            <button onClick={onClose} className="w-10 h-10 rounded-full hover:bg-slate-800 text-slate-400 flex items-center justify-center transition-all"><i className="fas fa-times"></i></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-8 space-y-6 custom-scrollbar">{children}</div>
                        {footer && <div className="p-6 border-t border-slate-800 bg-slate-900/50 flex justify-end gap-3">{footer}</div>}
                    </div>
                </div>, document.body
            );
        };

        const Avatar = ({ name, url, size = "10" }) => (
            <div className={`w-${size} h-${size} rounded-full bg-slate-700 border border-slate-600 flex items-center justify-center text-slate-300 font-bold uppercase text-xs overflow-hidden flex-none`}>
                {url ? <img src={url} className="w-full h-full object-cover" /> : (name?.charAt(0) || 'U')}
            </div>
        );

        // === PAGES ===

        const DashboardPage = () => {
            const { data: customers } = useCollection('customers');
            const { data: orders } = useCollection('orders');
            const stats = useMemo(() => ({
                customers: customers.length,
                revenue: orders.filter(o => o.status === 'Paid').reduce((a, c) => a + (c.grandTotal || 0), 0),
                pending: orders.filter(o => o.orderType === 'PR').length,
                total: orders.length
            }), [customers, orders]);

            return (
                <div className="space-y-8 animate-fade-in pb-12">
                    <h3 className="text-2xl font-khmer-header text-white uppercase tracking-tighter leading-none">Business Intelligence</h3>
                    <div className="grid grid-cols-2 lg:grid-cols-4 gap-4">
                        {[
                            { label: 'Network', value: stats.customers, icon: 'fa-store', color: 'text-blue-400' },
                            { label: 'Revenue ($)', value: stats.revenue.toFixed(2), icon: 'fa-dollar-sign', color: 'text-green-400' },
                            { label: 'Pending PR', value: stats.pending, icon: 'fa-clock', color: 'text-amber-400' },
                            { label: 'Total Orders', value: stats.total, icon: 'fa-shopping-cart', color: 'text-indigo-400' }
                        ].map((s, i) => (
                            <div key={i} className="bg-slate-800/50 p-6 rounded-[2rem] border border-slate-700 shadow-xl">
                                <p className="text-[10px] font-black uppercase text-slate-400 tracking-widest mb-1">{s.label}</p>
                                <p className={`text-3xl font-black font-mono tracking-tighter ${s.color}`}>{s.value}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const CustomersPage = () => {
            const { db, userProfile } = useFirebase();
            const { data: customers } = useCollection('customers');
            const { data: sellers } = useCollection('users');
            
            const [search, setSearch] = useState('');
            const [marketFilter, setMarketFilter] = useState('');
            const [sellerFilter, setSellerFilter] = useState('');
            const [isCustModalOpen, setIsCustModalOpen] = useState(false);
            const [isEditing, setIsEditing] = useState(false);
            const [selectedCustomerId, setSelectedCustomerId] = useState(null);
            const [saving, setSaving] = useState(false);
            const [isDeleteModalOpen, setIsDeleteModalOpen] = useState(false);
            const [idToDelete, setIdToDelete] = useState(null);

            const initialForm = { 
                shopName: '', ownerName: '', contact: '', gender: 'Male', dob: '', idCard: '',
                assignedSellerId: '', marketType: 'Retail', physicalAddress: '', 
                lat: '', lng: '', mapLink: '', photo: '' 
            };
            const [formData, setFormData] = useState(initialForm);
            const [tempPhoto, setTempPhoto] = useState(null);
            const imageRef = useRef(null);
            const cropperRef = useRef(null);

            useEffect(() => {
                if (formData.mapLink && !formData.lat) {
                    const regex = /@(-?\d+\.\d+),(-?\d+\.\d+)/;
                    const match = formData.mapLink.match(regex);
                    if (match) setFormData(prev => ({ ...prev, lat: match[1], lng: match[2] }));
                }
            }, [formData.mapLink]);

            const getGPS = () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        setFormData(prev => ({ ...prev, lat: pos.coords.latitude.toFixed(6), lng: pos.coords.longitude.toFixed(6) }));
                    }, () => alert("GPS capture failed."));
                }
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = () => { setTempPhoto(reader.result); if (cropperRef.current) cropperRef.current.destroy(); };
                    reader.readAsDataURL(file);
                }
            };

            useEffect(() => {
                if (tempPhoto && imageRef.current) {
                    cropperRef.current = new Cropper(imageRef.current, { aspectRatio: 1.6, viewMode: 1, background: false, autoCropArea: 1, responsive: true });
                }
                return () => cropperRef.current?.destroy();
            }, [tempPhoto]);

            const applyCrop = () => {
                if (cropperRef.current) {
                    const canvas = cropperRef.current.getCroppedCanvas({ width: 640, height: 400 });
                    setFormData({ ...formData, photo: canvas.toDataURL('image/jpeg', 0.8) });
                    setTempPhoto(null);
                }
            };

            const handleRegister = async () => {
                if (!formData.shopName && !formData.ownerName) return;
                setSaving(true);
                try {
                    const { collection, addDoc, updateDoc, doc, serverTimestamp } = window.firebaseSDK;
                    const sellerNode = sellers.find(s => s.id === formData.assignedSellerId);
                    const payload = { ...formData, assignedSellerName: sellerNode?.name || sellerNode?.sellerName || 'Unassigned', updatedAt: serverTimestamp() };
                    if (isEditing) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', selectedCustomerId), payload);
                    else { payload.registeredBy = userProfile?.name || 'System'; payload.createdAt = serverTimestamp(); await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'customers'), payload); }
                    setIsCustModalOpen(false); setFormData(initialForm);
                } catch (e) { alert("Operation failed."); }
                setSaving(false);
            };

            const handleDeleteAction = async () => {
                try {
                    const { doc, deleteDoc } = window.firebaseSDK;
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', idToDelete));
                    setIsDeleteModalOpen(false);
                } catch (e) { alert("Delete failed."); }
            };

            return (
                <div className="space-y-8 animate-fade-in pb-12">
                    <div className="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-6">
                        <h3 className="text-2xl font-khmer-header text-white uppercase tracking-tighter leading-none flex-none">Customer List</h3>
                        <div className="flex flex-row items-center w-full xl:w-auto gap-3 flex-nowrap overflow-x-auto pb-2 xl:pb-0 custom-scrollbar">
                            <input placeholder="Search shop/owner/phone..." className="input !mt-0 !py-2.5 !px-4 text-sm !bg-slate-800 !border-slate-700 flex-grow xl:min-w-[200px]" value={search} onChange={e=>setSearch(e.target.value)} />
                            <select className="select !mt-0 !py-2.5 !px-3 text-xs !bg-slate-800 !border-slate-700 w-32 flex-none" value={marketFilter} onChange={e=>setMarketFilter(e.target.value)}><option value="">All Markets</option><option value="Retail">Retail</option><option value="Wholesale">Wholesale</option></select>
                            <select className="select !mt-0 !py-2.5 !px-3 text-xs !bg-slate-800 !border-slate-700 w-40 flex-none" value={sellerFilter} onChange={e=>setSellerFilter(e.target.value)}><option value="">All Sellers</option>{sellers.map(s => <option key={s.id} value={s.id}>{s.name || s.sellerName}</option>)}</select>
                            <Button icon="fa-plus" className="flex-none" onClick={() => { setIsEditing(false); setSelectedCustomerId(null); setFormData(initialForm); setIsCustModalOpen(true); }}>Add</Button>
                        </div>
                    </div>

                    <div className="bg-slate-800/50 rounded-[2rem] border border-slate-700 overflow-hidden shadow-2xl">
                        <div className="overflow-x-auto custom-scrollbar">
                            <table className="w-full text-left border-collapse min-w-[900px]">
                                <thead>
                                    <tr className="bg-slate-900/50 text-xs text-slate-400 font-semibold uppercase tracking-wider border-b border-slate-700">
                                        <th className="px-4 py-3">Shop Node</th><th className="px-4 py-3">Contact</th><th className="px-4 py-3">Market</th><th className="px-4 py-3">Seller</th><th className="px-4 py-3 text-center">Pin</th><th className="px-4 py-3 text-center">Actions</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-slate-700">
                                    {customers.filter(c => {
                                        const s = search.toLowerCase();
                                        return (c.shopName || '').toLowerCase().includes(s) || (c.ownerName || '').toLowerCase().includes(s) || (c.contact || '').includes(s);
                                    }).map(c => (
                                        <tr key={c.id} className="hover:bg-slate-700/50 transition-all group">
                                            <td className="px-4 py-4"><div className="flex items-center gap-3"><Avatar name={c.shopName || c.name} url={c.photo} /><div><p className="text-sm font-bold text-slate-200 uppercase truncate max-w-[180px]">{c.shopName || c.name}</p><p className="text-[10px] text-slate-400 font-bold uppercase truncate max-w-[180px]">{c.ownerName || '---'}</p></div></div></td>
                                            <td className="px-4 py-4 text-sm font-mono tracking-tighter"><a href={`tel:${(c.contact || '').replace(/\D/g,'')}`} className="text-slate-300 hover:text-blue-400 underline decoration-slate-600 hover:decoration-blue-400 underline-offset-4 transition-colors">{c.contact || 'N/A'}</a></td>
                                            <td className="px-4 py-4"><span className="text-[10px] font-black uppercase px-2 py-0.5 rounded-lg border border-blue-500/20 text-blue-400 bg-blue-500/5">{c.marketType || 'Retail'}</span></td>
                                            <td className="px-4 py-4 text-xs font-bold text-slate-300 uppercase">{c.assignedSellerName || '---'}</td>
                                            <td className="px-4 py-4 text-center">{c.lat ? <a href={`https://www.google.com/maps?q=${c.lat},${c.lng}`} target="_blank" className="text-green-400 hover:scale-110 transition-transform"><i className="fas fa-location-dot"></i></a> : <i className="fas fa-location-dot opacity-10"></i>}</td>
                                            <td className="px-4 py-4 text-center">
                                                <div className="flex justify-center gap-4">
                                                    <button onClick={() => { setIsEditing(true); setSelectedCustomerId(c.id); setFormData({...c}); setIsCustModalOpen(true); }} className="text-blue-400 hover:scale-110 transition-transform"><i className="fas fa-edit"></i></button>
                                                    <button onClick={() => { setIdToDelete(c.id); setIsDeleteModalOpen(true); }} className="text-red-500 hover:scale-110 transition-transform"><i className="fas fa-trash-alt"></i></button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* REARRANGED PREMIUM MODAL */}
                    <Modal 
                        isOpen={isCustModalOpen} 
                        onClose={() => setIsCustModalOpen(false)} 
                        title={isEditing ? "Update Shop Identity" : "Global Node Deployment"} 
                        size="max-w-5xl"
                        footer={
                            <div className="flex gap-3">
                                <Button variant="secondary" onClick={() => setIsCustModalOpen(false)}>Abort</Button>
                                <Button variant="primary" icon="fa-cube" onClick={handleRegister} disabled={saving}>{isEditing ? "Apply Updates" : "Deploy Node"}</Button>
                            </div>
                        }
                    >
                        <div className="space-y-8 pb-4">
                            {/* SECTION 1: Primary Identity Hub */}
                            <div className="group-card relative overflow-hidden">

                const list = isEditingReceipt ? viewOrderData.items : cart;
                const existing = list.find(item => item.id === p.id);

                if (existing) newList = list.map(item => item.id === p.id ? { ...item, qty: item.qty + 1 } : item);
                else newList = [...list, { ...p, qty: 1 }];
                if (isEditingReceipt) setViewOrderData({...viewOrderData, items: newList});
                else setCart(newList);
                setProdSearch('');

                setLoadingAction(true);
                try {
                    const { doc, setDoc, updateDoc, serverTimestamp, initializeApp, getAuth, createUserWithEmailAndPassword, deleteApp } = window.firebaseSDK;
                    if (isUserEditing) {
                        await updateDoc(doc(db, 'artifacts', appId, 'users', selectedUserId), { ...userFormData, updatedAt: serverTimestamp() });
                    } else {
                        const secApp = initializeApp(firebaseConfig, "sec-" + Date.now());
                        const userCred = await createUserWithEmailAndPassword(getAuth(secApp), userFormData.email, userFormData.password);
                        await setDoc(doc(db, 'artifacts', appId, 'users', userCred.user.uid), { ...userFormData, createdAt: serverTimestamp() });
                        await deleteApp(secApp);
                    }
                    setIsUserModalOpen(false);
                } catch (e) { alert(e.message); }
                setLoadingAction(false);
            };

            // Driver Actions
            const handleSaveDriver = async () => {
                setLoadingAction(true);
                try {
                    const { collection, addDoc, updateDoc, doc, serverTimestamp } = window.firebaseSDK;
                    if (isDriverEditing) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'drivers', selectedDriverId), { ...driverFormData, updatedAt: serverTimestamp() });
                    } else {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'drivers'), { ...driverFormData, createdAt: serverTimestamp() });
                    }
                    setIsDriverModalOpen(false);
                } catch (e) { alert("Driver deployment error."); }
                setLoadingAction(false);
            };

            // Classification Actions
            const handleSaveClassification = async () => {
                setLoadingAction(true);
                const collectionName = classType === 'category' ? 'productCategories' : 'productUnits';
                try {
                    const { collection, addDoc, updateDoc, doc, serverTimestamp } = window.firebaseSDK;
                    if (isClassEditing) {
                        await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', collectionName, selectedClassId), { ...classFormData, updatedAt: serverTimestamp() });
                    } else {
                        await addDoc(collection(db, 'artifacts', appId, 'public', 'data', collectionName), { ...classFormData, createdAt: serverTimestamp() });
                    }
                    setIsClassModalOpen(false);
                } catch (e) { alert("System categorization error."); }
                setLoadingAction(false);
            };

            return (
                <div className="space-y-8 animate-fade-in pb-12">
                    <h3 className="text-2xl font-khmer-header text-white uppercase tracking-tighter leading-none">Security Node Matrix</h3>
                    
                    <div className="flex gap-4 border-b border-slate-800">
                        {[
                            {id: 'users', label: 'Identity Security', icon: 'fa-user-shield'},
                            {id: 'drivers', label: 'Logistics Distro', icon: 'fa-truck-fast'},
                            {id: 'general', label: 'System Library', icon: 'fa-database'}
                        ].map(t => (
                            <button key={t.id} onClick={() => setTab(t.id)} className={`pb-3 px-6 text-[10px] font-black uppercase tracking-widest transition-all flex items-center gap-2 ${tab === t.id ? 'text-blue-500 border-b-2 border-blue-500' : 'text-slate-500 hover:text-slate-300'}`}>
                                <i className={`fas ${t.icon}`}></i> {t.label}
                            </button>
                        ))}
                    </div>

                    {/* TAB: USERS */}
                    {tab === 'users' && (
                        <div className="space-y-4">
                            <div className="flex justify-between items-center"><p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest italic">Authorized Security Access Nodes</p><Button icon="fa-user-plus" onClick={() => { setIsUserEditing(false); setUserFormData({name:'', email:'', password:'', role:'Sales Agent', permissions:['dashboard'], photo:''}); setIsUserModalOpen(true); }}>Enroll Agent</Button></div>
                            <div className="bg-slate-800/50 rounded-[2rem] border border-slate-700 overflow-hidden shadow-xl">
                                <table className="w-full text-left border-collapse">
                                    <thead><tr className="bg-slate-900/50 text-[10px] text-slate-400 font-black uppercase tracking-widest border-b border-slate-700"><th className="px-6 py-4">Identity</th><th className="px-6 py-4">Security Role</th><th className="px-6 py-4 text-center">Nodes</th><th className="px-6 py-4 text-center">Actions</th></tr></thead>
                                    <tbody className="divide-y divide-slate-700">
                                        {users.map(u => (
                                            <tr key={u.id} className="hover:bg-slate-700/50 transition-all group">
                                                <td className="px-6 py-5"><div className="flex items-center gap-3"><Avatar name={u.name} url={u.photo} /><p className="text-sm font-bold text-slate-200 uppercase">{u.name}</p></div></td>
                                                <td className="px-6 py-5"><span className="text-[10px] font-black uppercase px-2 py-0.5 rounded-lg border border-blue-500/20 text-blue-400 bg-blue-500/5">{u.role}</span></td>
                                                <td className="px-6 py-5 text-center"><span className="font-mono text-[10px] text-slate-500">{(u.permissions || []).length} API Nodes</span></td>
                                                <td className="px-6 py-5 text-center">
                                                    <div className="flex justify-center gap-4">
                                                        <button onClick={() => { setIsUserEditing(true); setSelectedUserId(u.id); setUserFormData({...u}); setIsUserModalOpen(true); }} className="text-blue-400 hover:scale-110 transition-transform"><i className="fas fa-edit"></i></button>
                                                        <button onClick={async () => { if(confirm("Terminate security access for this node?")) await window.firebaseSDK.deleteDoc(window.firebaseSDK.doc(db, 'artifacts', appId, 'users', u.id)); }} className="text-red-500 hover:scale-110 transition-transform"><i className="fas fa-trash-alt"></i></button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {/* TAB: DRIVERS */}
                    {tab === 'drivers' && (
                        <div className="space-y-4">
                            <div className="flex justify-between items-center"><p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest italic">Logistic Distribution Hub Nodes</p><Button icon="fa-truck-arrow-right" onClick={() => { setIsDriverEditing(false); setDriverFormData({name:'', contact:'', driverId: generateDriverId(), address:'', note:''}); setIsDriverModalOpen(true); }}>Deploy Driver</Button></div>
                            <div className="bg-slate-800/50 rounded-[2rem] border border-slate-700 overflow-hidden shadow-xl">
                                <table className="w-full text-left border-collapse">
                                    <thead><tr className="bg-slate-900/50 text-[10px] text-slate-400 font-black uppercase tracking-widest border-b border-slate-700"><th className="px-6 py-4">ID Node</th><th className="px-6 py-4">Identity</th><th className="px-6 py-4">Contact</th><th className="px-6 py-4 text-center">Status</th><th className="px-6 py-4 text-center">Actions</th></tr></thead>
                                    <tbody className="divide-y divide-slate-700">
                                        {drivers.map(d => (
                                            <tr key={d.id} className="hover:bg-slate-700/50 transition-all group">
                                                <td className="px-6 py-5 font-mono text-[11px] text-blue-400">{d.driverId}</td>
                                                <td className="px-6 py-5 text-sm font-bold text-slate-200 uppercase">{d.name}</td>
                                                <td className="px-6 py-5 font-mono text-xs text-slate-400">{d.contact}</td>
                                                <td className="px-6 py-5 text-center"><span className="text-[9px] font-black px-2 py-0.5 rounded-lg bg-emerald-500/10 text-emerald-400 border border-emerald-500/20 uppercase tracking-tighter italic">Operational</span></td>
                                                <td className="px-6 py-5 text-center">
                                                    <div className="flex justify-center gap-4">
                                                        <button onClick={() => { setIsDriverEditing(true); setSelectedDriverId(d.id); setDriverFormData({...d}); setIsDriverModalOpen(true); }} className="text-blue-400 hover:scale-110 transition-transform"><i className="fas fa-edit"></i></button>
                                                        <button onClick={async () => { if(confirm("Terminate logistics node?")) await window.firebaseSDK.deleteDoc(window.firebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'drivers', d.id)); }} className="text-red-500 hover:scale-110 transition-transform"><i className="fas fa-trash-alt"></i></button>
                                                    </div>
                                                </td>
                                            </tr>
                                        ))}
                                    </tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {/* TAB: GENERAL LIBRARY */}
                    {tab === 'general' && (
                        <div className="grid grid-cols-1 lg:grid-cols-2 gap-10">
                            <div className="space-y-4">
                                <div className="flex justify-between items-center"><h4 className="text-[11px] font-black uppercase text-slate-400 tracking-widest flex items-center gap-2"><i className="fas fa-tags text-blue-500"></i> Category Nodes</h4><button onClick={() => { setClassType('category'); setIsClassEditing(false); setClassFormData({name:'', description:''}); setIsClassModalOpen(true); }} className="text-blue-400 text-[10px] font-black uppercase hover:text-white transition-colors tracking-widest">+ Add</button></div>
                                <div className="bg-slate-800/40 rounded-[2rem] border border-slate-700 overflow-hidden">
                                    <table className="w-full text-left border-collapse">
                                        <thead><tr className="bg-slate-900/40 text-[9px] text-slate-500 font-black uppercase tracking-widest border-b border-slate-700"><th className="px-6 py-3">Classification</th><th className="px-6 py-3 text-center">Actions</th></tr></thead>
                                        <tbody className="divide-y divide-slate-800">
                                            {categories.map(c => (
                                                <tr key={c.id} className="hover:bg-slate-700/30 transition-all">
                                                    <td className="px-6 py-3 text-xs font-bold text-slate-200 uppercase">{c.name}</td>
                                                    <td className="px-6 py-3 text-center">
                                                        <div className="flex justify-center gap-3">
                                                            <button onClick={() => { setClassType('category'); setIsClassEditing(true); setSelectedClassId(c.id); setClassFormData({...c}); setIsClassModalOpen(true); }} className="text-slate-500 hover:text-blue-400"><i className="fas fa-pen-to-square"></i></button>
                                                            <button onClick={async () => { if(confirm("Erase classification node?")) await window.firebaseSDK.deleteDoc(window.firebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'productCategories', c.id)); }} className="text-slate-500 hover:text-red-500"><i className="fas fa-trash"></i></button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                            <div className="space-y-4">
                                <div className="flex justify-between items-center"><h4 className="text-[11px] font-black uppercase text-slate-400 tracking-widest flex items-center gap-2"><i className="fas fa-cube text-emerald-500"></i> Unit Nodes</h4><button onClick={() => { setClassType('unit'); setIsClassEditing(false); setClassFormData({name:'', description:''}); setIsClassModalOpen(true); }} className="text-emerald-400 text-[10px] font-black uppercase hover:text-white transition-colors tracking-widest">+ Add</button></div>
                                <div className="bg-slate-800/40 rounded-[2rem] border border-slate-700 overflow-hidden">
                                    <table className="w-full text-left border-collapse">
                                        <thead><tr className="bg-slate-900/40 text-[9px] text-slate-500 font-black uppercase tracking-widest border-b border-slate-700"><th className="px-6 py-3">Metric Unit</th><th className="px-6 py-3 text-center">Actions</th></tr></thead>
                                        <tbody className="divide-y divide-slate-800">
                                            {units.map(u => (
                                                <tr key={u.id} className="hover:bg-slate-700/30 transition-all">
                                                    <td className="px-6 py-3 text-xs font-bold text-slate-200 uppercase">{u.name}</td>
                                                    <td className="px-6 py-3 text-center">
                                                        <div className="flex justify-center gap-3">
                                                            <button onClick={() => { setClassType('unit'); setIsClassEditing(true); setSelectedClassId(u.id); setClassFormData({...u}); setIsClassModalOpen(true); }} className="text-slate-500 hover:text-emerald-400"><i className="fas fa-pen-to-square"></i></button>
                                                            <button onClick={async () => { if(confirm("Erase metric node?")) await window.firebaseSDK.deleteDoc(window.firebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'productUnits', u.id)); }} className="text-slate-500 hover:text-red-500"><i className="fas fa-trash"></i></button>
                                                        </div>
                                                    </td>
                                                </tr>
                                            ))}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* MODALS: USER MANAGEMENT */}
                    <Modal isOpen={isUserModalOpen} onClose={() => setIsUserModalOpen(false)} title={isUserEditing ? "Update Identity Token" : "Enroll New Agent"} footer={<div className="flex gap-3"><Button variant="secondary" onClick={() => setIsUserModalOpen(false)}>Abort</Button><Button onClick={handleSaveUser} disabled={loadingAction}>Execute Enrollment</Button></div>}>
                        <div className="space-y-6">
                            <div className="space-y-1.5"><label className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1">Full Legal Name</label><input className="input !bg-slate-950/40" placeholder="Identity Name" value={userFormData.name} onChange={e=>setUserFormData({...userFormData, name:e.target.value})} /></div>
                            <div className="space-y-1.5"><label className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1">System Identifier (Email)</label><input className="input !bg-slate-950/40" placeholder="email@ounna.com" value={userFormData.email} onChange={e=>setUserFormData({...userFormData, email:e.target.value})} disabled={isUserEditing} /></div>
                            {!isUserEditing && <div className="space-y-1.5"><label className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1">Security Passkey</label><input type="password" className="input !bg-slate-950/40 font-mono" placeholder="••••••••" value={userFormData.password} onChange={e=>setUserFormData({...userFormData, password:e.target.value})} /></div>}
                            <div className="space-y-1.5"><label className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1">Node Security Role</label><select className="select !bg-slate-950/40" value={userFormData.role} onChange={e=>setUserFormData({...userFormData, role:e.target.value})}><option>Sales Agent</option><option>Manager</option><option>Admin</option></select></div>
                        </div>
                    </Modal>

                    {/* MODALS: DRIVER DEPLOYMENT */}
                    <Modal isOpen={isDriverModalOpen} onClose={() => setIsDriverModalOpen(false)} title={isDriverEditing ? "Update Logistics Node" : "Deploy Logistics Member"} footer={<div className="flex gap-3"><Button variant="secondary" onClick={() => setIsDriverModalOpen(false)}>Abort</Button><Button variant="success" onClick={handleSaveDriver} disabled={loadingAction}>Deploy Node</Button></div>}>
                        <div className="space-y-6">
                            <div className="grid grid-cols-2 gap-4">
                                <div className="space-y-1.5"><label className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1">Member Name</label><input className="input !bg-slate-950/40" placeholder="e.g. Heng Lymeng" value={driverFormData.name} onChange={e=>setDriverFormData({...driverFormData, name:e.target.value})} /></div>
                                <div className="space-y-1.5"><label className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1">Driver identity</label><input className="input !bg-slate-950/40 font-mono !text-blue-400" value={driverFormData.driverId} readOnly /></div>
                            </div>
                            <div className="space-y-1.5"><label className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1">Contact Terminal</label><input className="input !bg-slate-950/40 font-mono" placeholder="Phone Number" value={driverFormData.contact} onChange={e=>setDriverFormData({...driverFormData, contact:e.target.value})} /></div>
                            <div className="space-y-1.5"><label className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1">Logistics Note</label><textarea className="textarea !bg-slate-950/40 h-24" placeholder="Vehicle info, license, etc..." value={driverFormData.note} onChange={e=>setDriverFormData({...driverFormData, note:e.target.value})} /></div>
                        </div>
                    </Modal>

                    {/* MODALS: SYSTEM CLASSIFICATION */}
                    <Modal isOpen={isClassModalOpen} onClose={() => setIsClassModalOpen(false)} title={isClassEditing ? `Update ${classType}` : `New System ${classType}`} footer={<div className="flex gap-3"><Button variant="secondary" onClick={() => setIsClassModalOpen(false)}>Cancel</Button><Button onClick={handleSaveClassification} disabled={loadingAction}>Confirm Change</Button></div>}>
                        <div className="space-y-6">
                            <div className="space-y-1.5"><label className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1">{classType} Identity Name</label><input className="input !bg-slate-950/40" placeholder="e.g. Beverages / Carton" value={classFormData.name} onChange={e=>setClassFormData({...classFormData, name:e.target.value})} /></div>
                            <div className="space-y-1.5"><label className="text-[10px] font-black uppercase text-slate-500 tracking-widest ml-1">Functional Description</label><textarea className="textarea !bg-slate-950/40 h-24" placeholder="Description of this metric/group..." value={classFormData.description} onChange={e=>setClassFormData({...classFormData, description:e.target.value})} /></div>
                        </div>
                    </Modal>
                </div>
            );
        };

        const AppIcon = ({ id, icon, label, color, onClick }) => (
            <button onClick={onClick} className="flex flex-col items-center gap-3 group transition-all active:scale-90">
                <div className={`w-16 h-16 md:w-20 md:h-20 squircle bg-slate-900 border border-white/10 flex items-center justify-center text-2xl md:text-3xl shadow-xl group-hover:bg-slate-800 transition-all`}>
                    <i className={`fas fa-${icon} bg-gradient-to-br ${color} bg-clip-text text-transparent`}></i>
                </div>
                <span className="text-[10px] font-black uppercase tracking-[0.2em] text-slate-400 group-hover:text-white transition-colors text-center">{label}</span>
            </button>
        );

        const AppContent = () => {
            const { userProfile, loading, auth } = useFirebase();
            const [page, setPage] = useState('dashboard');
            const [launchpad, setLaunchpad] = useState(true);
            useEffect(() => { if (!loading) { const s = document.getElementById('splash-screen'); if (s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 500); } } }, [loading]);
            if (loading) return null;
            if (!userProfile && !loading) return <LoginPage />;
            return (
                <div className="h-screen flex flex-col bg-slate-900 safe-pb overflow-hidden">
                    <header className="px-6 py-5 flex flex-none justify-between items-center bg-slate-900 border-b border-slate-800 backdrop-blur-xl z-50 shadow-2xl safe-pt">
                        <div className="flex items-center gap-4"><button onClick={() => setLaunchpad(true)} className="w-10 h-10 rounded-xl bg-slate-800 text-blue-400 flex items-center justify-center border border-slate-700 active:scale-90 shadow-lg transition-all"><i className="fas fa-th-large"></i></button><div className="flex flex-col"><span className="font-khmer-header text-lg logo-gradient-text leading-none uppercase">Ounna</span><span className="text-[9px] font-black tracking-[0.4em] text-slate-500 uppercase -mt-0.5">Outdoor Sale</span></div></div>
                        <div className="flex items-center gap-4"><div className="flex flex-col items-end"><span className="text-sm font-black text-slate-100 uppercase tracking-tighter leading-none truncate max-w-[120px]">{userProfile.name}</span><span className="text-[10px] font-bold text-blue-500 uppercase tracking-widest">{userProfile.role}</span></div><Avatar name={userProfile.name} url={userProfile.photo} size="10" /></div>
                    </header>
                    <main className="flex-1 p-6 overflow-y-auto custom-scrollbar"><div className="max-w-7xl mx-auto">{page === 'dashboard' && <DashboardPage />}{page === 'customers' && <CustomersPage />}{page === 'products' && <ProductsPage />}{page === 'orders' && <OrdersPage />}{page === 'settings' && <SettingsPage />}</div></main>
                    {launchpad && (
                        <div className="fixed inset-0 z-[100] bg-[#0f172a]/98 backdrop-blur-3xl flex flex-col animate-fade-in safe-pt safe-pb overflow-y-auto">
                            <header className="p-8 flex justify-between items-start"><div className="flex flex-col"><span className="font-khmer-header text-3xl logo-gradient-text uppercase leading-none">Ounna</span><span className="text-xs font-black tracking-[0.5em] text-slate-600 uppercase mt-1">Global Dashboard</span></div><Clock /></header>
                            <div className="flex-1 flex flex-col items-center justify-center py-20 px-8"><div className="grid grid-cols-3 gap-8 md:gap-16 w-full max-w-2xl justify-items-center">
                                    {[ { id: 'dashboard', icon: 'chart-pie', label: 'Monitor', color: 'from-blue-600 to-blue-400' }, { id: 'customers', icon: 'store', label: 'Customers', color: 'from-emerald-600 to-emerald-400' }, { id: 'orders', icon: 'receipt', label: 'Orders', color: 'from-purple-600 to-purple-400' }, { id: 'products', icon: 'box-open', label: 'Inventory', color: 'from-cyan-600 to-cyan-400' }, { id: 'settings', icon: 'gear', label: 'Security', color: 'from-slate-600 to-slate-400' } ].map(app => (<AppIcon key={app.id} {...app} onClick={() => { setPage(app.id); setLaunchpad(false); }} />))}
                            </div></div><footer className="p-10 flex flex-col items-center gap-6"><button onClick={() => window.firebaseSDK.signOut(auth)} className="px-10 py-3.5 rounded-full bg-red-950/30 text-red-500 font-black text-[10px] uppercase tracking-[0.3em] active:scale-95 transition-all shadow-xl border border-red-500/20">Terminate Node Session</button></footer>
                        </div>
                    )}
                </div>
            );
        };

        const LoginPage = () => {
            const { auth } = useFirebase();
            const [email, setEmail] = useState(''); const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const handleLogin = async (e) => { e.preventDefault(); setLoading(true); try { await window.firebaseSDK.signInWithEmailAndPassword(auth, email, password); } catch (err) { alert("Access Denied."); setLoading(false); } };
            return (
                <div className="min-h-screen flex items-center justify-center p-6 bg-slate-900 relative overflow-hidden"><div className="absolute top-1/4 left-1/4 w-96 h-96 bg-blue-600/10 blur-[120px] rounded-full pointer-events-none"></div><div className="w-full max-w-sm glass-panel p-10 rounded-[3.5rem] shadow-2xl relative z-10 animate-fade-in border border-slate-700 text-center"><div className="font-khmer-header text-4xl logo-gradient-text uppercase mb-2">Ounna</div><p className="text-[10px] font-black text-slate-500 tracking-[0.5em] uppercase mb-10">Gateway Verification</p><form onSubmit={handleLogin} className="space-y-6 text-left"><div><label className="text-[10px] font-black uppercase text-slate-600 tracking-widest ml-1 mb-2 block">System Identity</label><input type="email" placeholder="admin@onsale.com" className="input !bg-slate-950/50 !border-slate-700" value={email} onChange={e=>setEmail(e.target.value)} required /></div><div><label className="text-[10px] font-black uppercase text-slate-600 tracking-widest ml-1 mb-2 block">Security Token</label><input type="password" placeholder="••••••••" className="input !bg-slate-950/50 !border-slate-700" value={password} onChange={e=>setPassword(e.target.value)} required /></div><Button type="submit" className="w-full py-5 shadow-blue-600/20" disabled={loading}>{loading ? <i className="fas fa-spinner fa-spin"></i> : 'Authorize Access'}</Button></form></div></div>
            );
        };

        const App = () => (<FirebaseProvider><AppContent /></FirebaseProvider>);
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
