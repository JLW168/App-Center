    <style>
        html, body {

<body class="bg-slate-950">
    <div class="mesh-spot-1"></div>
    <div class="mesh-spot-2"></div>

    <div id="splash-screen">
        <div class="relative w-20 h-20 flex items-center justify-center">
            <div class="absolute inset-0 border-4 border-blue-500/20 rounded-full"></div>
            <div class="absolute inset-0 border-4 border-blue-500 border-t-transparent rounded-full animate-spin"></div>

        </div>
        <h2 class="mt-8 text-[10px] font-black text-white tracking-[0.6em] uppercase opacity-40">Ounna Outdoor Solutions</h2>
    </div>

    <div id="root"></div>

    <script type="module">
        import { initializeApp, deleteApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, onAuthStateChanged, signOut, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { getFirestore, collection, onSnapshot, doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, serverTimestamp, setDoc, enableIndexedDbPersistence, getDocs, increment } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        window.firebaseSDK = {
            initializeApp, deleteApp, getAuth, getFirestore, collection, onSnapshot,
            doc, getDoc, addDoc, updateDoc, deleteDoc, query, where, serverTimestamp,
            signInWithEmailAndPassword, onAuthStateChanged, signOut, setDoc, 
            createUserWithEmailAndPassword, enableIndexedDbPersistence, getDocs, increment
        };
    </script>
    
    <script type="text/babel">
        const { useState, useEffect, useMemo, createContext, useContext, memo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyAYb0HKLnEUuhrVcQlXACsxFk28w99qAkc",
            authDomain: "onsale-product.firebaseapp.com",
            projectId: "onsale-product",
            storageBucket: "onsale-product.firebasestorage.app",
            messagingSenderId: "837098663012",
            appId: "1:837098663012:web:cb61b9bd7f99ec4d6e8371"
        };
        
        const appId = 'onsale-crm-app';

        // === UTILS ===
        const generateInvoiceNo = () => {
            const d = new Date();
            const pad = (n) => n.toString().padStart(2, '0');
            const dateStr = `${pad(d.getDate())}${pad(d.getMonth() + 1)}${d.getFullYear().toString().slice(-2)}`;
            const timeStr = `${pad(d.getHours())}${pad(d.getMinutes())}${pad(d.getSeconds())}`;
            return `HZN-${dateStr}-${timeStr}`;
        };

        const generateDriverId = () => {
            return `DV-${Math.floor(1000 + Math.random() * 9000)}`;
        };

        // === CONTEXTS ===
        const FirebaseContext = createContext(null);
        const FirebaseProvider = ({ children }) => {
            const [db, setDb] = useState(null);
            const [auth, setAuth] = useState(null);
            const [currentUser, setCurrentUser] = useState(null);
            const [userProfile, setUserProfile] = useState(null);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const { initializeApp, getFirestore, getAuth, onAuthStateChanged, enableIndexedDbPersistence } = window.firebaseSDK;
                const app = initializeApp(firebaseConfig);
                const dbInstance = getFirestore(app);
                const authInstance = getAuth(app);
                setAuth(authInstance); setDb(dbInstance);
                enableIndexedDbPersistence(dbInstance).catch(() => {});
                
                return onAuthStateChanged(authInstance, (user) => {
                    setCurrentUser(user);
                    if (!user) { setUserProfile(null); setLoading(false); }
                });
            }, []);

            useEffect(() => {
                if (!db || !currentUser) return;
                const { doc, onSnapshot } = window.firebaseSDK;
                const userRef = doc(db, 'artifacts', appId, 'users', currentUser.uid);
                return onSnapshot(userRef, (snap) => {
                    if (snap.exists()) {
                        const data = snap.data();
                        setUserProfile({ 
                            id: snap.id, 
                            ...data,
                            permissions: Array.isArray(data.permissions) ? data.permissions : ['dashboard']
                        });
                    }
                    else setUserProfile({ id: currentUser.uid, name: currentUser.email.split('@')[0], role: 'Staff', permissions: ['dashboard'] });
                    setLoading(false);
                }, () => setLoading(false));
            }, [db, currentUser]);

            return <FirebaseContext.Provider value={{ db, auth, currentUser, userProfile, loading }}>{children}</FirebaseContext.Provider>;
        };

        const useFirebase = () => useContext(FirebaseContext);

        const useCollection = (collectionName) => {
            const { db, currentUser } = useFirebase();
            const [data, setData] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                if (!db || !currentUser) return;
                const { collection, onSnapshot } = window.firebaseSDK;
                const ref = collectionName === 'users' 
                    ? collection(db, 'artifacts', appId, 'users')
                    : collection(db, 'artifacts', appId, 'public', 'data', collectionName);
                
                const unsubscribe = onSnapshot(ref, (snapshot) => {
                    const docs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    docs.sort((a, b) => {
                        const timeA = (a.updatedAt || a.createdAt)?.toMillis?.() || 0;
                        const timeB = (b.updatedAt || b.createdAt)?.toMillis?.() || 0;
                        return timeB - timeA;
                    });
                    setData(docs);
                    setLoading(false);
                }, (err) => {
                    console.error(`Node Error [${collectionName}]:`, err);
                    setLoading(false);
                });
                return () => unsubscribe();
            }, [db, currentUser, collectionName]);

            return { data, loading };
        };

        // === UI KIT COMPONENTS ===
        const Clock = () => {
            const [time, setTime] = useState(new Date());
            useEffect(() => {
                const timer = setInterval(() => setTime(new Date()), 1000);
                return () => clearInterval(timer);
            }, []);
            return (
                <div className="bg-white/5 backdrop-blur-2xl border border-white/10 rounded-[2rem] px-8 py-4 flex items-center gap-6 shadow-2xl">
                    <div className="text-right">
                        <p className="text-2xl font-black text-white leading-none tracking-tighter">{time.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit', hour12: false })}</p>
                        <p className="text-[10px] font-bold text-slate-500 uppercase tracking-widest mt-2">{time.toLocaleDateString([], { weekday: 'short', month: 'short', day: 'numeric' })}</p>
                    </div>
                    <div className="w-[1px] h-10 bg-white/10"></div>
                    <i className="fas fa-clock text-blue-400/50 text-xl"></i>
                </div>
            );
        };

        const Button = memo(({ children, onClick, variant = 'primary', icon, disabled = false, type = 'button', className = '' }) => {
            const variants = {
                primary: 'bg-blue-600 text-white shadow-lg shadow-blue-500/20 hover:bg-blue-500',
                secondary: 'bg-slate-800 text-slate-300 border border-white/5 hover:bg-slate-700',
                danger: 'bg-red-600/10 text-red-500 border border-red-500/20 hover:bg-red-600 hover:text-white',
                success: 'bg-emerald-600 text-white shadow-lg shadow-emerald-500/20 hover:bg-emerald-500',
            };
            return (
                <button type={type} onClick={onClick} disabled={disabled} className={`px-6 py-4 rounded-2xl font-black text-[11px] uppercase tracking-widest flex items-center justify-center gap-3 active:scale-95 transition-all disabled:opacity-50 btn-premium-action ${variants[variant]} ${className}`}>
                    {icon && <i className={`fas ${icon}`}></i>} {children}
                </button>
            );
        });

        const Modal = ({ isOpen, onClose, title, children, footer, size = "max-w-xl" }) => {
            if (!isOpen) return null;
            return ReactDOM.createPortal(
                <div className="fixed inset-0 z-[1000] flex items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md">
                    <div className={`bg-slate-900/90 glass-panel rounded-[3rem] shadow-2xl w-full ${size} flex flex-col max-h-[90vh] overflow-hidden animate-fade-in`}>
                        <div className="p-8 border-b border-white/5 flex justify-between items-center bg-black/10">
                            <h3 className="text-xl font-black text-white uppercase tracking-tighter">{title}</h3>
                            <button onClick={onClose} className="w-12 h-12 rounded-full hover:bg-white/5 text-slate-400 flex items-center justify-center transition-all"><i className="fas fa-times"></i></button>
                        </div>
                        <div className="flex-1 overflow-y-auto p-10 space-y-8 custom-scrollbar">{children}</div>
                        {footer && <div className="p-8 border-t border-white/5 bg-black/20 flex justify-end gap-4">{footer}</div>}
                    </div>
                </div>, document.body
            );
        };

        const Avatar = ({ name, url, size = "10" }) => (
            <div className={`w-${size} h-${size} rounded-full bg-slate-800 border border-white/10 flex items-center justify-center text-slate-300 font-bold uppercase text-xs overflow-hidden flex-none shadow-xl`}>
                {url ? <img src={url} className="w-full h-full object-cover" /> : (name?.charAt(0) || 'U')}
            </div>
        );

        // === PAGES ===

        const DashboardPage = () => {
            const { data: customers } = useCollection('customers');
            const { data: orders } = useCollection('orders');
            const stats = useMemo(() => ({
                customers: customers.length,
                revenue: orders.filter(o => o.status === 'Paid').reduce((a, c) => a + (c.grandTotal || 0), 0),
                pending: orders.filter(o => o.orderType === 'PR').length,
                total: orders.length
            }), [customers, orders]);

            return (
                <div className="space-y-12 animate-fade-in pb-12">
                    <div className="flex flex-col">
                        <h3 className="text-3xl font-khmer-header text-white uppercase tracking-tighter leading-none mb-3">Intelligence Hub</h3>
                        <p className="text-[11px] font-black text-slate-500 uppercase tracking-[0.4em]">Strategic Market Monitor</p>
                    </div>
                    <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6">
                        {[
                            { label: 'Market Nodes', value: stats.customers, icon: 'fa-store', color: 'text-blue-400', sub: 'Verified Shop Locations' },
                            { label: 'Gross Revenue', value: stats.revenue.toFixed(2), icon: 'fa-dollar-sign', color: 'text-emerald-400', sub: 'Accumulated Verified Sales' },
                            { label: 'Pending PR', value: stats.pending, icon: 'fa-clock', color: 'text-amber-400', sub: 'Requests Awaiting Logic' },
                            { label: 'Total Deployments', value: stats.total, icon: 'fa-shopping-cart', color: 'text-violet-400', sub: 'Historical Operations' }
                        ].map((s, i) => (
                            <div key={i} className="glass-panel p-10 rounded-[3rem] group hover:bg-white/5 transition-all">
                                <p className="text-[10px] font-black uppercase text-slate-500 tracking-[0.2em] mb-3">{s.label}</p>
                                <p className={`text-4xl font-black font-mono tracking-tighter ${s.color}`}>
                                    {i === 1 ? `$${s.value}` : s.value}
                                </p>
                                <p className="text-[9px] font-bold text-slate-600 uppercase mt-5 tracking-widest">{s.sub}</p>
                            </div>
                        ))}
                    </div>
                </div>
            );
        };

        const CustomersPage = () => {
            const { db, userProfile } = useFirebase();
            const { data: customers } = useCollection('customers');
            const { data: sellers } = useCollection('users');
            
            const [search, setSearch] = useState('');
            const [marketFilter, setMarketFilter] = useState('');
            const [sellerFilter, setSellerFilter] = useState('');
            const [isCustModalOpen, setIsCustModalOpen] = useState(false);
            const [isEditing, setIsEditing] = useState(false);
            const [selectedCustomerId, setSelectedCustomerId] = useState(null);
            const [saving, setSaving] = useState(false);
            const [isDeleteModalOpen, setIsDeleteModalOpen] = useState(false);
            const [idToDelete, setIdToDelete] = useState(null);

            const initialForm = { 
                shopName: '', ownerName: '', contact: '', gender: 'Male', dob: '', idCard: '',
                assignedSellerId: '', marketType: 'Retail', physicalAddress: '', 
                lat: '', lng: '', mapLink: '', photo: '' 
            };
            const [formData, setFormData] = useState(initialForm);
            const [tempPhoto, setTempPhoto] = useState(null);
            const imageRef = useRef(null);
            const cropperRef = useRef(null);

            useEffect(() => {
                if (formData.mapLink && !formData.lat) {
                    const regex = /@(-?\d+\.\d+),(-?\d+\.\d+)/;
                    const match = formData.mapLink.match(regex);
                    if (match) setFormData(prev => ({ ...prev, lat: match[1], lng: match[2] }));
                }
            }, [formData.mapLink]);

            const getGPS = () => {
                if (navigator.geolocation) {
                    navigator.geolocation.getCurrentPosition((pos) => {
                        setFormData(prev => ({ ...prev, lat: pos.coords.latitude.toFixed(6), lng: pos.coords.longitude.toFixed(6) }));
                    }, () => alert("GPS capture failed."));
                }
            };

            const handleFileChange = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = () => { setTempPhoto(reader.result); if (cropperRef.current) cropperRef.current.destroy(); };
                    reader.readAsDataURL(file);
                }
            };

            useEffect(() => {
                if (tempPhoto && imageRef.current) {
                    cropperRef.current = new Cropper(imageRef.current, { aspectRatio: 1, viewMode: 1, background: false, autoCropArea: 1, responsive: true });
                }
                return () => cropperRef.current?.destroy();
            }, [tempPhoto]);

            const applyCrop = () => {
                if (cropperRef.current) {
                    const canvas = cropperRef.current.getCroppedCanvas({ width: 400, height: 400 });
                    setFormData({ ...formData, photo: canvas.toDataURL('image/jpeg', 0.8) });
                    setTempPhoto(null);
                }
            };

            const handleRegister = async () => {
                if (!formData.shopName && !formData.ownerName) return;
                setSaving(true);
                try {
                    const { collection, addDoc, updateDoc, doc, serverTimestamp } = window.firebaseSDK;
                    const sellerNode = sellers.find(s => s.id === formData.assignedSellerId);
                    const payload = { ...formData, assignedSellerName: sellerNode?.name || sellerNode?.sellerName || 'Unassigned', updatedAt: serverTimestamp() };
                    if (isEditing) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', selectedCustomerId), payload);
                    else { payload.registeredBy = userProfile?.name || 'System'; payload.createdAt = serverTimestamp(); await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'customers'), payload); }
                    setIsCustModalOpen(false); setFormData(initialForm);
                } catch (e) { alert("Operation failed."); }
                setSaving(false);
            };

            const handleDeleteAction = async () => {
                try {
                    const { doc, deleteDoc } = window.firebaseSDK;
                    await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'customers', idToDelete));
                    setIsDeleteModalOpen(false);
                } catch (e) { alert("Delete failed."); }
            };

            const filtered = customers.filter(c => {
                const s = search.toLowerCase();
                const shopNameMatch = (c.shopName || c.name || '').toLowerCase().includes(s) || (c.ownerName || c.contactPerson || '').toLowerCase().includes(s) || (c.contact || c.phone || '').includes(s);
                const marketMatch = marketFilter === '' || (c.marketType || c.type || 'Retail') === marketFilter;
                const sellerMatch = sellerFilter === '' || (c.assignedSellerId || c.sellerId || '') === sellerFilter;
                return shopNameMatch && marketMatch && sellerMatch;
            });

            return (
                <div className="space-y-10 animate-fade-in pb-12">
                    <div className="flex flex-col xl:flex-row justify-between items-start xl:items-center gap-8">
                        <div className="flex flex-col">
                            <h3 className="text-3xl font-khmer-header text-white uppercase tracking-tighter leading-none mb-2">Node Matrix</h3>
                            <p className="text-[11px] font-black text-slate-500 uppercase tracking-[0.4em]">Client Deployment Registry</p>
                        </div>
                        <div className="flex flex-row items-center w-full xl:w-auto gap-4 flex-nowrap overflow-x-auto pb-2 xl:pb-0 custom-scrollbar">
                            <input placeholder="Search shop/owner/phone..." className="input !mt-0 !py-3 !px-5 text-sm !bg-white/5 !border-white/10 flex-grow xl:min-w-[250px]" value={search} onChange={e=>setSearch(e.target.value)} />
                            <select className="select !mt-0 !py-3 !px-4 text-xs !bg-white/5 !border-white/10 w-36 flex-none" value={marketFilter} onChange={e=>setMarketFilter(e.target.value)}><option value="">All Markets</option><option value="Retail">Retail</option><option value="Wholesale">Wholesale</option></select>
                            <Button icon="fa-plus-circle" className="flex-none !py-3" onClick={() => { setIsEditing(false); setSelectedCustomerId(null); setFormData(initialForm); setIsCustModalOpen(true); }}>Add Client</Button>
                        </div>
                    </div>

                    <div className="glass-panel rounded-[3rem] overflow-hidden shadow-2xl">
                        <div className="overflow-x-auto custom-scrollbar">
                            <table className="w-full text-left border-collapse min-w-[1000px]">
                                <thead>
                                    <tr className="bg-white/5 text-[10px] text-slate-400 font-black uppercase tracking-widest border-b border-white/5">
                                        <th className="px-8 py-5">Node Identity</th><th className="px-8 py-5">Communication</th><th className="px-8 py-5">Tier</th><th className="px-8 py-5">Authorized Seller</th><th className="px-8 py-5 text-center">GPS</th><th className="px-8 py-5 text-center">Ops</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-white/5">
                                    {filtered.map(c => (
                                        <tr key={c.id} className="hover:bg-white/5 transition-all group">
                                            <td className="px-8 py-6"><div className="flex items-center gap-4"><Avatar name={c.shopName || c.name} url={c.photo} size="12" /><div><p className="text-sm font-black text-white uppercase tracking-tight truncate max-w-[200px]">{c.shopName || c.name}</p><p className="text-[10px] text-slate-500 font-bold uppercase truncate max-w-[200px] mt-0.5">{c.ownerName || c.contactPerson || '---'}</p></div></div></td>

        const OrdersPage = () => {
            const { db, userProfile } = useFirebase();
            const { data: orders } = useCollection('orders');
            const { data: customers } = useCollection('customers');
            const { data: products } = useCollection('products');
            const { data: drivers } = useCollection('drivers');

            const [isOrderModalOpen, setIsOrderModalOpen] = useState(false);
            const [isViewModalOpen, setIsViewModalOpen] = useState(false);
            const [isEditingReceipt, setIsEditingReceipt] = useState(false);
            const [viewOrderData, setViewOrderData] = useState(null);
            const [originalOrderData, setOriginalOrderData] = useState(null); 
            const [saving, setSaving] = useState(false);
            const [isUpdatingStatus, setIsUpdatingStatus] = useState(false);
            const [isDeleteModalOpen, setIsDeleteModalOpen] = useState(false);
            const [idToDelete, setIdToDelete] = useState(null);
            const [custSearch, setCustSearch] = useState('');
            const [prodSearch, setProdSearch] = useState('');

            const [selectedCust, setSelectedCust] = useState(null);
            const [selectedDriverId, setSelectedDriverId] = useState('');
            const [cart, setCart] = useState([]);
            const [orderType, setOrderType] = useState('PR');
            const [paymentMethod, setPaymentMethod] = useState('Cash');
            const [discountType, setDiscountType] = useState('Cash'); 
            const [discountVal, setDiscountVal] = useState(0);

            const calculateTotals = (items = [], dType = 'Cash', dVal = 0) => {
                const sub = items.reduce((a, c) => a + (c.price * c.qty), 0);
                const dAmount = dType === 'Percentage' ? (sub * (parseFloat(dVal) || 0)) / 100 : (parseFloat(dVal) || 0);
                return { subTotal: sub, discountAmount: dAmount, grandTotal: sub - dAmount };
            };

            const activeSubTotal = useMemo(() => cart.reduce((a, c) => a + (c.price * c.qty), 0), [cart]);
            const activeDiscountAmount = useMemo(() => discountType === 'Percentage' ? (activeSubTotal * discountVal) / 100 : (parseFloat(discountVal) || 0), [activeSubTotal, discountType, discountVal]);
            const activeGrandTotal = activeSubTotal - activeDiscountAmount;

            const addToCart = (p) => {
                if (p.stock <= 0) { alert(`Asset "${p.name}" is out of stock!`); return; }
                const list = isEditingReceipt ? viewOrderData.items : cart;
                const existing = list.find(item => item.id === p.id);
                if (existing && existing.qty >= p.stock) { alert(`Cannot add more. Only ${p.stock} units available.`); return; }
                let newList;
                if (existing) newList = list.map(item => item.id === p.id ? { ...item, qty: item.qty + 1 } : item);
                else newList = [...list, { ...p, qty: 1 }];
                if (isEditingReceipt) setViewOrderData({...viewOrderData, items: newList});
                else setCart(newList);
                setProdSearch('');
            };

            const updateItemQty = (id, delta) => {
                const list = isEditingReceipt ? viewOrderData.items : cart;
                const prod = products.find(p => p.id === id);
                const item = list.find(i => i.id === id);
                if (delta > 0 && item.qty >= prod.stock) { alert(`Limited stock: Only ${prod.stock} units available.`); return; }
                const newList = list.map(i => i.id === id ? { ...i, qty: Math.max(1, i.qty + delta) } : i);
                if (isEditingReceipt) setViewOrderData({...viewOrderData, items: newList});
                else setCart(newList);
            };

            const removeItem = (id) => {
                const list = isEditingReceipt ? viewOrderData.items : cart;
                const newList = list.filter(i => i.id !== id);
                if (isEditingReceipt) setViewOrderData({...viewOrderData, items: newList});
                else setCart(newList);
            };

            const handleSaveNewOrder = async () => {
                if (!selectedCust || cart.length === 0) return;
                setSaving(true);
                try {
                    const { collection, addDoc, doc, updateDoc, serverTimestamp, increment } = window.firebaseSDK;
                    const driverNode = drivers.find(d => d.id === selectedDriverId);
                    const orderPayload = {
                        invoiceNo: generateInvoiceNo(),
                        customer: { id: selectedCust.id, name: selectedCust.shopName || selectedCust.name, contact: selectedCust.contact || selectedCust.phone },
                        seller: { id: userProfile.id, sellerId: userProfile.sellerId || 'GEN-01', name: userProfile.name || userProfile.sellerName },
                        driver: driverNode ? { id: driverNode.id, name: driverNode.name, driverId: driverNode.driverId } : null,
                        items: cart, orderType, paymentMethod, discountType, discountVal: parseFloat(discountVal),
                        subTotal: activeSubTotal, discountAmount: activeDiscountAmount, grandTotal: activeGrandTotal, deliveryStatus: 'Pending',
                        status: paymentMethod === 'Cash' ? 'Paid' : 'Pending Verification',
                        createdAt: serverTimestamp()
                    };
                    await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'orders'), orderPayload);
                    const stockUpdates = cart.map(item => {
                        const productRef = doc(db, 'artifacts', appId, 'public', 'data', 'products', item.id);
                        return updateDoc(productRef, { stock: increment(-item.qty), updatedAt: serverTimestamp() });
                    });
                    await Promise.all(stockUpdates);
                    setIsOrderModalOpen(false); setCart([]); setSelectedCust(null); setDiscountVal(0); setSelectedDriverId('');
                } catch (e) { alert("Order failed."); }
                setSaving(false);
            };

            const handleUpdateExistingOrder = async () => {
                setSaving(true);
                try {
                    const { doc, updateDoc } = window.firebaseSDK;
                    const totals = calculateTotals(viewOrderData.items, viewOrderData.discountType, viewOrderData.discountVal);
                    await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'orders', viewOrderData.id), { ...viewOrderData, ...totals });

                                    <tr className="bg-white/5 text-[10px] text-slate-400 font-black uppercase tracking-widest border-b border-white/5">

                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-white/5">
                                    {orders.map(o => (
                                        <tr key={o.id} className="hover:bg-white/5 transition-all group">

                                            <td className="px-8 py-6 text-[10px] font-black text-slate-500 uppercase tracking-widest">{o.driver?.name || '---'}</td>
                                            <td className="px-8 py-6 text-center"><span className="px-3 py-1 rounded-full border border-purple-500/20 text-purple-400 bg-purple-500/5 text-[9px] font-black uppercase tracking-widest">{o.orderType}</span></td>
                                            <td className="px-8 py-6 text-right font-mono font-black text-emerald-400 text-base">${o.grandTotal?.toFixed(2)}</td>

                                            <td className="px-8 py-6 text-center">
                                                <div className="flex justify-center gap-6">
                                                    <button onClick={() => openViewOrder(o)} className="text-blue-400/50 hover:text-blue-400 transition-colors"><i className="fas fa-eye"></i></button>
                                                    <button onClick={() => { setIdToDelete(o.id); setIsDeleteModalOpen(true); }} className="text-red-500/30 hover:text-red-500 transition-colors"><i className="fas fa-trash-alt"></i></button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                </tbody>
                            </table>
                        </div>
                    </div>
                </div>
            );
        };

        const SettingsPage = () => {

            const { data: units } = useCollection('productUnits');
            
            const [isUserModalOpen, setIsUserModalOpen] = useState(false);

            const [classFormData, setClassFormData] = useState({ name: '', description: '' });

            const [isClassDeleteModalOpen, setIsClassDeleteModalOpen] = useState(false);
            const [classToDelete, setClassToDelete] = useState(null);

            const visibleUsers = useMemo(() => {
                if (userProfile?.role === 'Admin') return users;

                const file = e.target.files[0];

            useEffect(() => { if (tempPhoto && userImageRef.current) { userCropperRef.current = new Cropper(userImageRef.current, { aspectRatio: 1, viewMode: 1, background: false, autoCropArea: 1, responsive: true }); } return () => userCropperRef.current?.destroy(); }, [tempPhoto]);
            const applyUserCrop = () => { if (userCropperRef.current) { const canvas = userCropperRef.current.getCroppedCanvas({ width: 256, height: 256 }); setUserFormData({ ...userFormData, photo: canvas.toDataURL('image/jpeg', 0.8) }); setTempPhoto(null); } };

            const handleSaveUser = async () => {
                if (!userFormData.name || (!isUserEditing && !userFormData.password)) return;
                setLoadingAction(true);
                try {
                    const { doc, setDoc, updateDoc, serverTimestamp, initializeApp, getAuth, createUserWithEmailAndPassword, deleteApp } = window.firebaseSDK;
                    const payload = { name: userFormData.name, sellerName: userFormData.name, sellerId: userFormData.sellerId, contactNumber: userFormData.contactNumber, role: userFormData.role, permissions: userFormData.permissions, photo: userFormData.photo || '', updatedAt: serverTimestamp() };
                    if (isUserEditing) await updateDoc(doc(db, 'artifacts', appId, 'users', selectedUserId), payload);
                    else {
                        const secApp = initializeApp(firebaseConfig, "sec-" + Date.now());
                        const userCred = await createUserWithEmailAndPassword(getAuth(secApp), userFormData.email, userFormData.password);
                        await setDoc(doc(db, 'artifacts', appId, 'users', userCred.user.uid), { ...payload, email: userFormData.email, createdAt: serverTimestamp() });
                        await getAuth(secApp).signOut(); await deleteApp(secApp);
                    }
                    setIsUserModalOpen(false);
                } catch (e) { alert(e.message); }
                setLoadingAction(false);
            };

            const handleDeleteUser = async () => {
                try {
                    const { doc, deleteDoc } = window.firebaseSDK;
                    await deleteDoc(doc(db, 'artifacts', appId, 'users', userIdToDelete));
                    setIsUserDeleteModalOpen(false);
                } catch (e) { alert("Delete failed."); }
            };

            const handleSaveDriver = async () => {
                if (!driverFormData.name) return;
                setLoadingAction(true);
                try {
                    const { collection, addDoc, updateDoc, doc, serverTimestamp } = window.firebaseSDK;
                    const payload = { ...driverFormData, updatedAt: serverTimestamp() };
                    if (isDriverEditing) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', 'drivers', selectedDriverId), payload);
                    else { payload.createdAt = serverTimestamp(); await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'drivers'), payload); }
                    setIsDriverModalOpen(false);
                } catch (e) { alert("Driver registration failure."); }
                setLoadingAction(false);
            };

            const handleSaveClassification = async () => {
                if (!classFormData.name) return;
                setClassLoading(true);
                const collectionName = classType === 'category' ? 'productCategories' : 'productUnits';
                try {
                    const { collection, addDoc, updateDoc, doc, serverTimestamp } = window.firebaseSDK;
                    if (isClassEditing) await updateDoc(doc(db, 'artifacts', appId, 'public', 'data', collectionName, selectedClassId), { ...classFormData, updatedAt: serverTimestamp() });
                    else await addDoc(collection(db, 'artifacts', appId, 'public', 'data', collectionName), { ...classFormData, createdAt: serverTimestamp() });
                    setIsClassModalOpen(false);
                } catch (e) { alert("Error."); }
                setClassLoading(false);

            const openEditUser = (u) => {
                setIsUserEditing(true); setSelectedUserId(u.id);
                setUserFormData({ name: u.name || u.sellerName || '', sellerId: u.sellerId || '', contactNumber: u.contactNumber || '', email: u.email || '', password: '', role: u.role || 'Sales Agent', permissions: u.permissions || ['dashboard'], photo: u.photo || '' });

                    {tab === 'users' && (

                            <div className="flex justify-center gap-6">
                                <button onClick={() => openEditUser(u)} className="text-blue-400/50 hover:text-blue-400 transition-colors"><i className="fas fa-edit"></i></button>
                                <button onClick={() => { setUserIdToDelete(u.id); setIsUserDeleteModalOpen(true); }} className="text-red-500/30 hover:text-red-500 transition-colors"><i className="fas fa-trash-alt"></i></button>
                            </div>
                        </td></tr>))}</tbody></table></div></div>
                    )}
                    
                    {tab === 'drivers' && (
                        <div className="space-y-6">
                            <div className="flex justify-between items-center"><p className="text-[10px] font-black text-slate-600 uppercase tracking-widest italic">Logistics Distribution Node</p><Button icon="fa-truck-moving" onClick={() => { setIsDriverEditing(false); setDriverFormData({name:'', contact:'', driverId: generateDriverId(), address:'', note:''}); setIsDriverModalOpen(true); }}>Register Driver</Button></div>
                            <div className="glass-panel rounded-[3rem] overflow-hidden shadow-2xl">
                                <table className="w-full text-left border-collapse">
                                    <thead><tr className="bg-white/5 text-[10px] text-slate-400 font-black uppercase tracking-widest border-b border-white/5"><th className="px-8 py-5">Identity Node</th><th className="px-8 py-5">Full Descriptor</th><th className="px-8 py-5">Signal Terminal</th><th className="px-8 py-5">Base Coordinates</th><th className="px-8 py-5 text-center">Protocol Ops</th></tr></thead>
                                    <tbody className="divide-y divide-white/5">{drivers.map(d => (<tr key={d.id} className="hover:bg-white/5 transition-all group"><td className="px-8 py-6 font-mono font-black text-blue-500 text-xs tracking-widest">{d.driverId}</td><td className="px-8 py-6 font-black text-white uppercase tracking-tight text-sm">{d.name}</td><td className="px-8 py-6 font-mono text-xs"><a href={`tel:${d.contact.replace(/\D/g,'')}`} className="text-slate-400 hover:text-blue-400 underline underline-offset-8 decoration-slate-800">{d.contact}</a></td><td className="px-8 py-6 text-[10px] text-slate-500 font-bold uppercase tracking-tighter truncate max-w-[200px]">{d.address}</td><td className="px-8 py-6 text-center"><div className="flex justify-center gap-4"><button onClick={() => { setIsDriverEditing(true); setSelectedDriverId(d.id); setDriverFormData(d); setIsDriverModalOpen(true); }} className="text-blue-400/50 hover:text-blue-400"><i className="fas fa-edit"></i></button><button onClick={async () => { if(confirm("Terminate driver node?")) await window.firebaseSDK.deleteDoc(window.firebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', 'drivers', d.id)); }} className="text-red-500/30 hover:text-red-500"><i className="fas fa-trash-alt"></i></button></div></td></tr>))}</tbody>
                                </table>
                            </div>
                        </div>
                    )}

                    {tab === 'general' && (
                        <div className="space-y-12">
                            <div className="flex justify-between items-center"><p className="text-[10px] font-black text-slate-600 uppercase tracking-widest italic">System Classification Node Architecture</p><Button icon="fa-layer-group" onClick={() => { setClassType('category'); setIsClassEditing(false); setClassFormData({name:'', description:''}); setIsClassModalOpen(true); }}>Initialize Component</Button></div>
                            <div className="grid grid-cols-1 lg:grid-cols-2 gap-12">
                                <div className="space-y-6"><h4 className="text-[11px] font-black uppercase text-slate-500 tracking-[0.3em] flex items-center gap-3 px-4"><i className="fas fa-tags text-blue-400"></i> Category Classifiers</h4><div className="glass-panel rounded-[2.5rem] overflow-hidden shadow-2xl"><table className="w-full text-left border-collapse"><thead><tr className="bg-white/5 text-[9px] text-slate-500 font-black uppercase tracking-widest border-b border-white/5"><th className="px-8 py-5">Component Name</th><th className="px-8 py-5 text-center">Ops</th></tr></thead><tbody className="divide-y divide-white/5">{categories.map(cat => (<tr key={cat.id} className="hover:bg-white/5 transition-all group"><td className="px-8 py-6 text-sm font-black text-white uppercase tracking-tight">{cat.name}</td><td className="px-8 py-6 text-center"><div className="flex justify-center gap-6"><button onClick={() => { setClassType('category'); setIsClassEditing(true); setSelectedClassId(cat.id); setClassFormData({name: cat.name, description: cat.description}); setIsClassModalOpen(true); }} className="text-blue-400/50 hover:text-blue-400 transition-colors"><i className="fas fa-edit"></i></button><button onClick={() => { setClassToDelete({id: cat.id, collectionName: 'productCategories'}); setIsClassDeleteModalOpen(true); }} className="text-red-500/30 hover:text-red-500 transition-colors"><i className="fas fa-trash-alt"></i></button></div></td></tr>))}</tbody></table></div></div>
                                <div className="space-y-6"><h4 className="text-[11px] font-black uppercase text-slate-500 tracking-[0.3em] flex items-center gap-3 px-4"><i className="fas fa-cubes text-emerald-400"></i> Unit Classifiers</h4><div className="glass-panel rounded-[2.5rem] overflow-hidden shadow-2xl"><table className="w-full text-left border-collapse"><thead><tr className="bg-white/5 text-[9px] text-slate-500 font-black uppercase tracking-widest border-b border-white/5"><th className="px-8 py-5">Component Name</th><th className="px-8 py-5 text-center">Ops</th></tr></thead><tbody className="divide-y divide-white/5">{units.map(u => (<tr key={u.id} className="hover:bg-white/5 transition-all group"><td className="px-8 py-6 text-sm font-black text-white uppercase tracking-tight">{u.name}</td><td className="px-8 py-6 text-center"><div className="flex justify-center gap-6"><button onClick={() => { setClassType('unit'); setIsClassEditing(true); setSelectedClassId(u.id); setClassFormData({name: u.name, description: u.description}); setIsClassModalOpen(true); }} className="text-blue-400/50 hover:text-blue-400 transition-colors"><i className="fas fa-edit"></i></button><button onClick={() => { setClassToDelete({id: u.id, collectionName: 'productUnits'}); setIsClassDeleteModalOpen(true); }} className="text-red-500/30 hover:text-red-500 transition-colors"><i className="fas fa-trash-alt"></i></button></div></td></tr>))}</tbody></table></div></div>
                            </div>
                        </div>
                    )}

                    <Modal isOpen={isUserModalOpen} onClose={() => setIsUserModalOpen(false)} title={isUserEditing ? "Modify Identity Parameters" : "Authorized Node Deployment"} footer={<div className="flex gap-4"><Button variant="secondary" onClick={() => setIsUserModalOpen(false)}>Abort</Button><Button variant="primary" icon="fa-fingerprint" onClick={handleSaveUser} disabled={loadingAction}>Execute Sync</Button></div>}><div className="space-y-8"><div className="flex flex-col items-center gap-6">{tempPhoto ? (<div className="w-full space-y-6"><div className="max-h-[350px] bg-black/40 rounded-3xl overflow-hidden shadow-inner border border-white/5"><img ref={userImageRef} src={tempPhoto} className="max-w-full" /></div><div className="flex justify-center gap-6"><button onClick={() => userCropperRef.current?.zoom(0.1)} className="w-12 h-12 rounded-full bg-slate-800 text-white flex items-center justify-center"><i className="fas fa-magnifying-glass-plus"></i></button><button onClick = {() => userCropperRef.current?.zoom(-0.1)} className="w-12 h-12 rounded-full bg-slate-800 text-white flex items-center justify-center"><i className="fas fa-magnifying-glass-minus"></i></button><Button onClick={applyUserCrop} icon="fa-check-circle">Authorize</Button><button onClick={() => setTempPhoto(null)} className="text-[10px] font-black uppercase text-slate-500 tracking-widest">Cancel</button></div></div>) : (<div className="relative group cursor-pointer" onClick={() => document.getElementById('user-photo-upload').click()}><div className="w-32 h-32 rounded-full bg-black/40 border-2 border-dashed border-white/10 flex items-center justify-center text-slate-700 overflow-hidden shadow-2xl group-hover:border-blue-500/50 transition-all">{userFormData.photo ? <img src={userFormData.photo} className="w-full h-full object-cover" /> : <i className="fas fa-user-shield text-3xl"></i>}</div><input id="user-photo-upload" type="file" accept="image/*" className="hidden" onChange={handleUserFileChange} /></div>)}</div><div className="grid grid-cols-2 gap-6 pt-8 border-t border-white/5"><div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-600 tracking-widest ml-1">Legal Name</label><input className="input" placeholder="Full Identity Name" value={userFormData.name} onChange={e=>setUserFormData({...userFormData, name: e.target.value})} /></div><div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-600 tracking-widest ml-1">Seller Node ID</label><input className="input font-mono" placeholder="GEN-XX-01" value={userFormData.sellerId} onChange={e=>setUserFormData({...userFormData, sellerId: e.target.value})} /></div></div><div className="grid grid-cols-2 gap-6"><div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-600 tracking-widest ml-1">Terminal Signal</label><input className="input font-mono" placeholder="Contact Terminal" value={userFormData.contactNumber} onChange={e=>setUserFormData({...userFormData, contactNumber: e.target.value})} /></div><div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-600 tracking-widest ml-1">Authorization Role</label><select className="select" value={userFormData.role} onChange={e=>setUserFormData({...userFormData, role: e.target.value})}><option>Sales Agent</option><option>Regional Manager</option>{userProfile?.role === 'Admin' && <option>Admin</option>}</select></div></div>{!isUserEditing && (<div className="grid grid-cols-2 gap-6"><div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-600 tracking-widest ml-1">Identity Email</label><input className="input" placeholder="node@onsale.com" value={userFormData.email} onChange={e=>setUserFormData({...userFormData, email: e.target.value})} /></div><div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-600 tracking-widest ml-1">Security Token</label><input type="password" className="input" placeholder="••••••••" value={userFormData.password} onChange={e=>setUserFormData({...userFormData, password: e.target.value})} /></div></div>)}<div className="bg-black/40 p-8 rounded-[2.5rem] border border-white/5"><label className="text-[10px] font-black uppercase text-slate-500 block mb-6 tracking-[0.2em]">Authorized Module Permissions</label><div className="grid grid-cols-2 gap-3">{['dashboard', 'customers', 'visits', 'products', 'orders'].map(p => (<button key={p} onClick={() => setUserFormData(prev => ({...prev, permissions: prev.permissions.includes(p) ? prev.permissions.filter(x=>x!==p) : [...prev.permissions, p]}))} className={`px-6 py-3.5 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center gap-3 ${userFormData.permissions.includes(p) ? 'bg-blue-600/20 text-blue-400 border border-blue-500/30 shadow-lg shadow-blue-500/10' : 'bg-slate-900 text-slate-600 border border-white/5'}`}><i className={`fas ${userFormData.permissions.includes(p) ? 'fa-check-circle' : 'fa-circle-notch opacity-20'}`}></i> {p}</button>))}</div></div></div></Modal>
                    <Modal isOpen={isUserDeleteModalOpen} onClose={() => setIsUserDeleteModalOpen(false)} title="Identity Revocation" footer={<div className="flex gap-4"><Button variant="secondary" onClick={() => setIsUserDeleteModalOpen(false)}>Abort</Button><Button variant="danger" icon="fa-user-slash" onClick={handleDeleteUser}>Revoke Access</Button></div>}>
                        <div className="text-center py-10">
                            <div className="w-20 h-20 bg-red-600/10 rounded-full flex items-center justify-center mx-auto mb-6 text-red-500"><i className="fas fa-lock-open text-3xl"></i></div>
                            <h4 className="text-white font-black uppercase tracking-widest mb-2">Access De-authorization</h4>
                            <p className="text-slate-500 text-sm max-w-xs mx-auto font-bold uppercase tracking-tighter">Permanently terminate this user node's authorization identity from the global registry?</p>
                        </div>
                    </Modal>
                    <Modal isOpen={isDriverModalOpen} onClose={() => setIsDriverModalOpen(false)} title={isDriverEditing ? "Modify Logistics Personnel" : "Authorized Logistics Onboarding"} footer={<div className="flex gap-4"><Button variant="secondary" onClick={() => setIsDriverModalOpen(false)}>Cancel</Button><Button icon="fa-truck-ramp-box" onClick={handleSaveDriver} disabled={loadingAction}>Deploy Personnel</Button></div>}><div className="space-y-6"><div className="grid grid-cols-2 gap-6"><div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-500 ml-1">Personnel Name</label><input className="input" value={driverFormData.name} onChange={e=>setDriverFormData({...driverFormData, name: e.target.value})} /></div><div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-500 ml-1">Binary Driver ID (Locked)</label><input className="input font-mono text-blue-400 !bg-black/20" value={driverFormData.driverId} readOnly /></div></div><div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-500 ml-1">Terminal Signal Terminal</label><input className="input font-mono" value={driverFormData.contact} onChange={e=>setDriverFormData({...driverFormData, contact: e.target.value})} /></div><div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-500 ml-1">Coordinate Residency</label><input className="input" value={driverFormData.address} onChange={e=>setDriverFormData({...driverFormData, address: e.target.value})} /></div><div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-500 ml-1">Strategic Operations Note</label><input className="input" value={driverFormData.note} onChange={e=>setDriverFormData({...driverFormData, note: e.target.value})} /></div></div></Modal>
                    <Modal isOpen={isClassModalOpen} onClose={() => setIsClassModalOpen(false)} title={isClassEditing ? "Modify classifier Node" : "Synchronize System classification"} footer={<div className="flex gap-4"><Button variant="secondary" onClick={() => setIsClassModalOpen(false)}>Cancel</Button><Button icon="fa-microchip" onClick={handleSaveClassification} disabled={classLoading}>Authorize classification</Button></div>}><div className="space-y-8"><div className="bg-black/30 p-8 rounded-[2.5rem] border border-white/5"><label className="text-[10px] font-black uppercase text-slate-500 block mb-6 tracking-widest">Architectural Component Type</label><div className="grid grid-cols-2 gap-4"><button onClick={() => setClassType('category')} className={`px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-3 ${classType === 'category' ? 'bg-blue-600 text-white shadow-xl shadow-blue-500/20' : 'bg-slate-900 text-slate-600 border border-white/5'}`}><i className="fas fa-tag"></i> Category</button><button onClick={() => setClassType('unit')} className={`px-8 py-4 rounded-2xl text-[10px] font-black uppercase tracking-widest transition-all flex items-center justify-center gap-3 ${classType === 'unit' ? 'bg-emerald-600 text-white shadow-xl shadow-emerald-500/20' : 'bg-slate-900 text-slate-600 border border-white/5'}`}><i className="fas fa-cube"></i> Unit</button></div></div><div className="space-y-6"><div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-500 ml-1">Component Identifier</label><input className="input" placeholder="Logic Name" value={classFormData.name} onChange={e=>setClassFormData({...classFormData, name: e.target.value})} /></div><div className="space-y-2"><label className="text-[10px] font-black uppercase text-slate-500 ml-1">Architectural Descriptor</label><textarea className="input h-32" placeholder="Synchronized component description..." value={classFormData.description} onChange={e=>setClassFormData({...classFormData, description: e.target.value})} /></div></div></div></Modal>
                    <Modal isOpen={isClassDeleteModalOpen} onClose={() => setIsClassDeleteModalOpen(false)} title="Registry Integrity" footer={<div className="flex gap-4"><Button variant="secondary" onClick={() => setIsDeleteModalOpen(false)}>Abort</Button><Button variant="danger" icon="fa-microchip" onClick={async () => { await window.firebaseSDK.deleteDoc(window.firebaseSDK.doc(db, 'artifacts', appId, 'public', 'data', classToDelete.collectionName, classToDelete.id)); setIsClassDeleteModalOpen(false); }}>Erase classification</Button></div>}><div className="text-center py-10"><div className="w-20 h-20 bg-red-600/10 rounded-full flex items-center justify-center mx-auto mb-6 text-red-500"><i className="fas fa-atom text-3xl"></i></div><h4 className="text-white font-black uppercase tracking-widest mb-2">Architectural Erasure</h4><p className="text-slate-500 text-sm max-w-xs mx-auto font-bold uppercase tracking-tighter">Terminate this system classification identity? All associated product mappings may lose logical integrity.</p></div></Modal>
                </div>
            );
        };

        const AppIcon = ({ id, icon, label, color, onClick }) => (
            <button onClick={onClick} className="flex flex-col items-center gap-6 group transition-all btn-premium-action">
                <div className={`w-20 h-20 md:w-24 md:h-24 squircle glass-panel flex items-center justify-center text-3xl md:text-4xl shadow-2xl relative overflow-hidden group-hover:scale-105 transition-transform`}>
                    <div className={`absolute inset-0 bg-gradient-to-br ${color} opacity-0 group-hover:opacity-20 transition-opacity`}></div>
                    <i className={`fas fa-${icon} bg-gradient-to-br ${color} bg-clip-text text-transparent group-hover:drop-shadow-[0_0_15px_rgba(255,255,255,0.4)]`}></i>
                </div>
                <span className="text-[11px] font-black uppercase tracking-[0.4em] text-slate-500 group-hover:text-white transition-colors text-center">{label}</span>
            </button>
        );

        const AppContent = () => {
            const { userProfile, loading, auth } = useFirebase();
            const [page, setPage] = useState('dashboard');
            const [launchpad, setLaunchpad] = useState(true);

            useEffect(() => { 
                if (!loading) { 
                    const s = document.getElementById('splash-screen'); 
                    if (s) { s.style.opacity = '0'; setTimeout(() => s.remove(), 800); } 
                } 
            }, [loading]);

            if (loading) return null;
            if (!userProfile && !loading) return <LoginPage />;

            // PERMISSION CONFIG
            const allApps = [
                { id: 'dashboard', icon: 'chart-pie', label: 'Monitor', color: 'from-blue-600 to-blue-400', permId: 'dashboard' },
                { id: 'customers', icon: 'store', label: 'Customers', color: 'from-emerald-600 to-emerald-400', permId: 'customers' },
                { id: 'orders', icon: 'receipt', label: 'Orders', color: 'from-violet-600 to-violet-400', permId: 'orders' },
                { id: 'products', icon: 'box-open', label: 'Inventory', color: 'from-cyan-600 to-cyan-400', permId: 'products' },
                { id: 'sync', icon: 'location-dot', label: 'GPS Sync', color: 'from-amber-600 to-amber-400', permId: 'visits' },
                { id: 'settings', icon: 'gear', label: 'Security', color: 'from-slate-600 to-slate-400', permId: 'ADMIN' }
            ];

            const filteredApps = allApps.filter(app => {
                if (userProfile.role === 'Admin') return true;
                if (app.id === 'settings' && userProfile.role === 'Regional Manager') return true;
                if (app.permId === 'ADMIN') return false; 
                return userProfile.permissions?.includes(app.permId);
            });

            const canAccessPage = (targetId) => {
                if (userProfile.role === 'Admin') return true;
                if (targetId === 'settings' && userProfile.role === 'Regional Manager') return true;
                const app = allApps.find(a => a.id === targetId);
                if (app?.permId === 'ADMIN') return false;
                return userProfile.permissions?.includes(app?.permId);
            };

            return (
                <div className="h-screen flex flex-col bg-slate-950/20 safe-pb overflow-hidden">
                    <header className="px-10 py-10 flex flex-none justify-between items-center z-[500] safe-pt">
                        <div className="flex items-center gap-6">
                            <button onClick={() => setLaunchpad(true)} className="w-14 h-14 rounded-[1.25rem] glass-panel text-blue-400 flex items-center justify-center active:scale-90 transition-all shadow-xl hover:bg-white/5">
                                <i className="fas fa-th-large text-xl"></i>
                            </button>
                            <div className="flex flex-col">
                                <span className="font-khmer-header text-3xl logo-gradient-text leading-none uppercase tracking-tighter">Ounna</span>
                                <span className="text-[10px] font-black tracking-[0.7em] text-slate-700 uppercase mt-1">Matrix Node</span>
                            </div>
                        </div>
                        <div className="flex items-center gap-6">
                            <div className="hidden md:flex flex-col items-end">
                                <span className="text-sm font-black text-white uppercase tracking-tighter leading-none">{userProfile.name}</span>
                                <span className="text-[10px] font-bold text-blue-500 uppercase tracking-widest mt-1.5">{userProfile.role}</span>
                            </div>
                            <Avatar name={userProfile.name} url={userProfile.photo} size="14" />
                        </div>
                    </header>

                    <main className="flex-1 px-10 py-6 overflow-y-auto custom-scrollbar">
                        <div className="max-w-7xl mx-auto">
                            {page === 'dashboard' && canAccessPage('dashboard') && <DashboardPage />}
                            {page === 'customers' && canAccessPage('customers') && <CustomersPage />}
                            {page === 'products' && canAccessPage('products') && <ProductsPage />}
                            {page === 'orders' && canAccessPage('orders') && <OrdersPage />}
                            {page === 'settings' && canAccessPage('settings') && <SettingsPage />}
                            
                            {!canAccessPage(page) && (
                                <div className="h-full flex flex-col items-center justify-center py-24 animate-fade-in text-center">
                                    <div className="w-24 h-24 bg-red-600/10 rounded-full flex items-center justify-center text-red-500 mb-8">
                                        <i className="fas fa-lock text-4xl"></i>
                                    </div>
                                    <h3 className="text-2xl font-black text-white uppercase tracking-widest">Protocol Restriction</h3>
                                    <p className="text-slate-600 text-sm mt-3 font-bold uppercase tracking-tighter">Authorization Node Failure for Identity Hash</p>
                                    <Button className="mt-12" onClick={() => { setPage('dashboard'); setLaunchpad(true); }}>Return to Core</Button>
                                </div>
                            )}
                        </div>
                    </main>

                    {launchpad && (
                        <div className="fixed inset-0 z-[1000] bg-slate-950/60 backdrop-blur-3xl flex flex-col animate-fade-in safe-pt safe-pb">
                            <header className="p-12 flex justify-between items-start">
                                <div className="flex flex-col">
                                    <span className="font-khmer-header text-5xl logo-gradient-text uppercase leading-none mb-3">Ounna</span>
                                    <span className="text-[12px] font-black tracking-[0.8em] text-slate-700 uppercase">Core Management Grid</span>
                                </div>
                                <Clock />
                            </header>
                            
                            <div className="flex-1 flex flex-col items-center justify-center px-10">
                                <div className="grid grid-cols-3 gap-y-20 gap-x-12 md:gap-24 w-full max-w-3xl justify-items-center">
                                    {filteredApps.map(app => (
                                        <AppIcon key={app.id} {...app} onClick={() => { setPage(app.id); setLaunchpad(false); }} />
                                    ))}
                                </div>
                                {filteredApps.length === 0 && <p className="text-red-500 text-xs font-black uppercase mt-24 tracking-[0.5em] animate-pulse">Node Identification Error</p>}
                            </div>

                            <footer className="p-20 flex flex-col items-center">
                                <button onClick={() => window.firebaseSDK.signOut(auth)} className="group px-12 py-5 rounded-[2rem] bg-red-600/5 border border-red-500/10 text-red-600 font-black text-[11px] uppercase tracking-[0.5em] active:scale-95 transition-all shadow-2xl hover:bg-red-600 hover:text-white">
                                    <i className="fas fa-power-off mr-4 opacity-50"></i> Terminate Node Session
                                </button>
                            </footer>
                        </div>
                    )}
                </div>
            );
        };

        const LoginPage = () => {
            const { auth } = useFirebase();
            const [email, setEmail] = useState(''); const [password, setPassword] = useState('');
            const [loading, setLoading] = useState(false);
            const handleLogin = async (e) => { e.preventDefault(); setLoading(true); try { await window.firebaseSDK.signInWithEmailAndPassword(auth, email, password); } catch (err) { alert("Access Denied."); setLoading(false); } };
            return (
                <div className="min-h-screen flex items-center justify-center p-10 bg-slate-950 relative overflow-hidden">
                    <div className="mesh-spot-1 scale-150"></div>
                    <div className="w-full max-w-md glass-panel p-16 rounded-[4rem] relative z-10 animate-fade-in text-center">
                        <div className="font-khmer-header text-5xl logo-gradient-text uppercase mb-4">Ounna</div>
                        <p className="text-[10px] font-black text-slate-600 tracking-[0.6em] uppercase mb-16">Security Gateway Verification</p>
                        <form onSubmit={handleLogin} className="space-y-8 text-left">
                            <div className="space-y-2">
                                <label className="text-[10px] font-black uppercase text-slate-700 tracking-widest ml-1 block">Identity Identifier</label>
                                <input type="email" placeholder="admin@onsale.com" className="input !bg-white/5 !border-white/10 !py-4" value={email} onChange={e=>setEmail(e.target.value)} required />
                            </div>
                            <div className="space-y-2">
                                <label className="text-[10px] font-black uppercase text-slate-700 tracking-widest ml-1 block">Security Token</label>
                                <input type="password" placeholder="••••••••" className="input !bg-white/5 !border-white/10 !py-4" value={password} onChange={e=>setPassword(e.target.value)} required />
                            </div>
                            <Button type="submit" className="w-full py-5 !rounded-[2rem] shadow-blue-500/20 mt-4" disabled={loading}>{loading ? <i className="fas fa-spinner fa-spin"></i> : 'Authorize Access'}</Button>
                        </form>
                    </div>
                </div>
            );
        };

        const App = () => (<FirebaseProvider><AppContent /></FirebaseProvider>);
        ReactDOM.createRoot(document.getElementById('root')).render(<App />);
    </script>
</body>
</html>
