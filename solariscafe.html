<body class="bg-stone-50 font-sans text-stone-900">

            <i class="fa-solid fa-spinner fa-spin" style="margin-right: 10px;"></i> Loading Solaris System...

    <!-- Firebase Init -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, initializeFirestore, persistentLocalCache, persistentMultipleTabManager, collection, doc, setDoc, getDocs, onSnapshot, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        window.FirebaseApp = {
            initializeApp, getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, 
            onAuthStateChanged, signOut, signInAnonymously,
            getFirestore, initializeFirestore, persistentLocalCache, persistentMultipleTabManager, 
            collection, doc, setDoc, getDocs, onSnapshot, 
            addDoc, updateDoc, deleteDoc
        };
        window.dispatchEvent(new Event('firebase-loaded'));
    </script>

    <!-- React App -->
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyADedJwnXvUv3bK_OBkzzbOw82L8QuAC8Q",
            authDomain: "solaris-1f4cb.firebaseapp.com",
            projectId: "solaris-1f4cb",
            storageBucket: "solaris-1f4cb.firebasestorage.app",
            messagingSenderId: "372761640969",
            appId: "1:372761640969:web:91f24d3f7a93babd6cf8d8",
            measurementId: "G-VR3L5HWHFD"
        };

        let app, auth, db, getColRef;

        function initializeFirebase() {
            if (app) return;
            const { initializeApp, getAuth, getFirestore, collection } = window.FirebaseApp;
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            
            try {
                db = getFirestore(app);
                console.log("Firestore initialized (Standard Mode).");
            } catch (err) {
                console.warn("Failed to initialize Firestore: ", err);
                db = getFirestore(app); 
            }
            
            getColRef = (colName) => collection(db, colName);
        }

        const resizeImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const SIZE = 200; 
                        canvas.width = SIZE;
                        canvas.height = SIZE;
                        const ctx = canvas.getContext('2d');
                        
                        const minDim = Math.min(img.width, img.height);
                        const startX = (img.width - minDim) / 2;
                        const startY = (img.height - minDim) / 2;
                        
                        ctx.drawImage(img, startX, startY, minDim, minDim, 0, 0, SIZE, SIZE);
                        resolve(canvas.toDataURL('image/webp', 0.4));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        };

        const getTodayString = () => new Date().toISOString().split('T')[0];

        // --- Root & Data Fetching ---
        function RootApp() {
            const [isReady, setIsReady] = useState(!!window.FirebaseApp);
            
            useEffect(() => {
                const handleReady = () => setIsReady(true);
                if (!isReady) window.addEventListener('firebase-loaded', handleReady);
                return () => window.removeEventListener('firebase-loaded', handleReady);
            }, [isReady]);

            if (!isReady) return <div className="flex h-screen items-center justify-center text-stone-500 font-medium"><i className="fa-solid fa-spinner fa-spin mr-2"></i> Connecting...</div>;

            initializeFirebase();
            return <MainApp />;
        }

        function MainApp() {
            const [view, setView] = useState('customer'); // customer, admin_login, admin_dashboard
            const [user, setUser] = useState(null);
            
            const [products, setProducts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [tables, setTables] = useState([]);
            const [orders, setOrders] = useState([]);
            const [loading, setLoading] = useState(true);

            useEffect(() => {
                const hideAddressBar = () => {
                    setTimeout(() => window.scrollTo(0, 1), 100);
                };
                window.addEventListener('load', hideAddressBar);
                window.addEventListener('orientationchange', hideAddressBar);
                hideAddressBar(); 
                
                return () => {
                    window.removeEventListener('load', hideAddressBar);
                    window.removeEventListener('orientationchange', hideAddressBar);
                };
            }, []);

            useEffect(() => {
                const { signInAnonymously, onAuthStateChanged } = window.FirebaseApp;
                const initAuth = async () => { 
                    try { 
                        if (!auth.currentUser) await signInAnonymously(auth); 
                    } catch (err) {
                        console.error("Firebase Auth Error", err);
                    } 
                };
                initAuth();
                const unsub = onAuthStateChanged(auth, setUser);
                return () => unsub();
            }, []);

            useEffect(() => {
                if (!user) return;
                const { onSnapshot } = window.FirebaseApp;

                const unsubP = onSnapshot(getColRef('products'), snap => setProducts(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.updatedAt-a.updatedAt)));
                const unsubC = onSnapshot(getColRef('categories'), snap => setCategories(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>a.order-b.order)));
                const unsubT = onSnapshot(getColRef('tables'), snap => setTables(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubO = onSnapshot(getColRef('orders'), snap => {
                    setOrders(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.createdAt-a.createdAt));
                    setLoading(false);
                });

                return () => { unsubP(); unsubC(); unsubT(); unsubO(); };
            }, [user]);

            return (
                <div className="min-h-screen">
                    {view === 'customer' && <CustomerPortal products={products} categories={categories} tables={tables} orders={orders} currentUser={user} isLoading={loading} onAdminClick={() => setView(user && !user.isAnonymous ? 'admin_dashboard' : 'admin_login')} />}
                    {view === 'admin_login' && <AdminLogin onBack={() => setView('customer')} onLogin={() => setView('admin_dashboard')} />}
                    {view === 'admin_dashboard' && <AdminDashboard products={products} categories={categories} tables={tables} orders={orders} currentUser={user} onLogout={() => { window.FirebaseApp.signOut(auth).then(() => setView('customer')); }} onBack={() => setView('customer')} />}
                </div>
            );
        }

        // ==========================================
        //         SHARED UI COMPONENTS
        // ==========================================

        function LiveOrderTimer({ createdAt, completedAt, status }) {
            const [elapsed, setElapsed] = useState(0);

            useEffect(() => {
                const calc = () => {
                    const end = (status === 'Served' || status === 'Cancelled') && completedAt ? completedAt : Date.now();
                    setElapsed(Math.max(0, Math.floor((end - createdAt) / 1000)));
                };
                calc();

                if (status === 'Served' || status === 'Cancelled') return;

                const timer = setInterval(calc, 1000);
                return () => clearInterval(timer);
            }, [createdAt, completedAt, status]);

            const minutes = Math.floor(elapsed / 60);
            const seconds = elapsed % 60;
            const timeStr = `${minutes}:${seconds.toString().padStart(2, '0')}`;
            
            let colorClass = "bg-stone-100 text-stone-600 border-stone-200";
            if (status === 'Served') colorClass = "bg-green-50 text-green-700 border-green-200";
            else if (status === 'Cancelled') colorClass = "bg-red-50 text-red-700 border-red-200";
            else if (elapsed > 1800) colorClass = "bg-red-100 text-red-800 border-red-300 animate-pulse"; 
            else if (elapsed > 900) colorClass = "bg-amber-100 text-amber-800 border-amber-300"; 

            return (
                <div className={`flex items-center gap-1.5 text-[10px] font-bold px-2 py-0.5 rounded border ${colorClass}`}>
                    <i className={`fa-solid ${status === 'Served' ? 'fa-check-double' : status === 'Cancelled' ? 'fa-ban' : 'fa-clock'}`}></i>
                    {timeStr}
                </div>
            );
        }

        function OrderProgressBar({ status }) {
            if (status === 'Cancelled') {
                return <div className="text-red-500 font-bold mt-4 p-3 bg-red-50 rounded-lg border border-red-200 text-center"><i className="fa-solid fa-ban mr-2"></i>Order Cancelled</div>;
            }

            const steps = [
                { id: 'New', label: 'Received', icon: 'fa-receipt' },
                { id: 'Preparing', label: 'Preparing', icon: 'fa-fire-burner' },
                { id: 'Ready', label: 'Ready', icon: 'fa-bell' },
                { id: 'Served', label: 'Completed', icon: 'fa-check-double' }
            ];

            const currentIdx = steps.findIndex(s => s.id === status);
            const activeIdx = currentIdx === -1 ? 0 : currentIdx;

            return (
                <div className="mt-5 relative">
                    <div className="absolute top-4 left-4 right-4 h-1 bg-stone-200 rounded-full"></div>
                    <div className="absolute top-4 left-4 h-1 bg-amber-500 rounded-full transition-all duration-500" style={{ width: `${(activeIdx / (steps.length - 1)) * 100}%` }}></div>

                    <div className="flex justify-between relative z-10">
                        {steps.map((step, idx) => {
                            const isCompleted = idx <= activeIdx;
                            const isCurrent = idx === activeIdx;
                            return (
                                <div key={step.id} className="flex flex-col items-center">
                                    <div className={`w-8 h-8 rounded-full flex items-center justify-center border-2 transition-colors duration-300 ${isCompleted ? 'bg-amber-500 border-amber-500 text-white shadow-md' : 'bg-white border-stone-300 text-stone-400'}`}>
                                        <i className={`fa-solid ${step.icon} text-xs`}></i>
                                    </div>
                                    <span className={`text-[10px] mt-1.5 font-bold ${isCurrent ? 'text-amber-600' : isCompleted ? 'text-stone-800' : 'text-stone-400'}`}>{step.label}</span>
                                </div>
                            );
                        })}
                    </div>
                </div>
            );
        }

        function CustomizeModal({ selectedItem, onClose, onAddToCart }) {
            const [sugar, setSugar] = useState(selectedItem.sugar);
            const [ice, setIce] = useState(selectedItem.ice);

            return (
                <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                    <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-fade-in">
                        <div className="flex justify-between items-center mb-4">
                            <h3 className="text-xl font-bold text-stone-900">Customize Item</h3>
                            <button onClick={onClose} className="text-stone-400 hover:text-stone-700"><i className="fa-solid fa-xmark text-xl"></i></button>
                        </div>
                        <div className="mb-6">
                            <p className="font-bold text-stone-800">{selectedItem.product.name} ({selectedItem.size})</p>
                            
                            {selectedItem.sugar !== null && (
                                <div className="mt-4">
                                    <p className="text-sm font-semibold text-stone-700 mb-2">Select Sugar Level</p>
                                    <div className="flex flex-wrap gap-2">
                                        {['0%', '30%', '50%', '70%', '100%'].map(level => (
                                            <button 
                                                key={level}
                                                onClick={() => setSugar(level)}
                                                className={`px-4 py-2 rounded-xl text-sm font-bold border transition ${sugar === level ? 'bg-amber-600 border-amber-600 text-white' : 'bg-white border-stone-300 text-stone-600 hover:border-amber-400'}`}
                                            >
                                                {level}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {selectedItem.ice !== null && (
                                <div className="mt-6">
                                    <p className="text-sm font-semibold text-stone-700 mb-2">Select Ice Level</p>
                                    <div className="flex flex-wrap gap-2">
                                        {['Normal Ice', 'Less Ice', 'No Ice', 'Hot'].map(level => (
                                            <button 
                                                key={level}
                                                onClick={() => setIce(level)}
                                                className={`px-4 py-2 rounded-xl text-sm font-bold border transition ${ice === level ? 'bg-blue-600 border-blue-600 text-white' : 'bg-white border-stone-300 text-stone-600 hover:border-blue-400'}`}
                                            >
                                                {level}
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}
                        </div>
                        <button 
                            onClick={() => { 
                                onAddToCart(selectedItem.product, selectedItem.size, selectedItem.price, sugar, ice); 
                                onClose(); 
                            }} 
                            className="w-full bg-stone-900 text-white py-3.5 rounded-xl font-bold hover:bg-stone-800 transition shadow-md"
                        >
                            Add to Cart - {selectedItem.price.toLocaleString()} ៛
                        </button>
                    </div>
                </div>
            );
        }

        function OrderSuccessView({ order, sessionInfo, setSessionInfo, onTrackOrder, onNewOrder }) {
            return (
                <div className="min-h-screen bg-stone-50 flex items-center justify-center p-4">
                    <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md text-center">
                        <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                            <i className="fa-solid fa-check text-4xl"></i>
                        </div>
                        <h2 className="text-2xl font-bold text-stone-900 mb-2">Order Received!</h2>
                        <p className="text-stone-500 mb-8">Thank you, {order.customerName}. We're preparing it now.</p>
                        
                        <div className="bg-stone-50 rounded-2xl p-6 border border-stone-100 mb-8">
                            <p className="text-sm font-semibold text-stone-400 uppercase tracking-widest mb-1">Queue Number</p>
                            <p className="text-5xl font-black text-amber-600 mb-4">{order.queueNo}</p>
                            
                            <div className="grid grid-cols-2 gap-2 text-sm text-left">
                                <div className="bg-white p-2 rounded border border-stone-200">
                                    <p className="text-stone-400 text-[10px] uppercase font-bold">Type</p>
                                    <p className="font-bold text-stone-700">{order.orderType.replace('_', ' ')}</p>
                                </div>
                                <div className="bg-white p-2 rounded border border-stone-200">
                                    <p className="text-stone-400 text-[10px] uppercase font-bold">Location</p>
                                    <p className="font-bold text-stone-700">{order.orderType === 'TAKEAWAY' ? 'Counter' : `Table ${order.tableName}`}</p>
                                </div>
                            </div>
                        </div>

                        <button onClick={onTrackOrder} className="w-full bg-amber-600 text-white py-4 rounded-xl font-bold hover:bg-amber-700 transition mb-3 shadow-lg">
                            <i className="fa-solid fa-radar mr-2"></i> Track Live Order
                        </button>

                        <button onClick={onNewOrder} className="w-full bg-stone-900 text-white py-4 rounded-xl font-bold hover:bg-stone-800 transition">
                            New Order
                        </button>
                    </div>
                </div>
            );
        }

        function SetupModal({ sessionInfo, setSessionInfo, tables, orders, onSubmit, onClose }) {
            const [phone, setPhone] = useState(sessionInfo.customerPhone || '');
            const [name, setName] = useState(sessionInfo.customerName || '');
            // If they already have a name in their session (e.g., editing from cart), show it. Otherwise, hide it.
            const [showName, setShowName] = useState(!!sessionInfo.customerName);

            const handleSubmit = (e) => {
                e.preventDefault();
                if (!phone) return;

                if (sessionInfo.mode === 'DINE_IN' && !sessionInfo.tableId) {
                    alert("Please select a Table."); return;
                }

                if (!showName) {
                    // SILENT PULL: Search all historical orders for this phone number
                    const pastOrder = orders.find(o => o.customerPhone === phone);
                    if (pastOrder && pastOrder.customerName) {
                        // Found them! Bypass the name screen and proceed silently.
                        onSubmit(e, { phone, name: pastOrder.customerName });
                    } else {
                        // Not found. Reveal the Name field.
                        setShowName(true);
                    }
                } else {
                    // Name field is showing, ensure they filled it out
                    if (!name) return alert("Please enter your name.");
                    onSubmit(e, { phone, name });
                }
            };

            return (
                <div className="fixed inset-0 bg-stone-900/80 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                    <form onSubmit={handleSubmit} className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-fade-in relative">
                        {sessionInfo.mode !== 'QR' && (
                            <button type="button" onClick={onClose} className="absolute top-4 right-4 text-stone-400 hover:text-stone-700 w-8 h-8 flex items-center justify-center bg-stone-100 rounded-full"><i className="fa-solid fa-xmark"></i></button>
                        )}
                        
                        <h2 className="text-2xl font-bold text-stone-900 mb-2">
                            {sessionInfo.mode === 'DINE_IN' ? 'Dine-In Details' : sessionInfo.mode === 'TAKEAWAY' ? 'Take Away Details' : 'Welcome to Solaris'}
                        </h2>
                        <p className="text-stone-500 text-sm mb-6">Please provide your info so we can prepare your order.</p>
                        
                        <div className="space-y-4 mb-6">
                            {sessionInfo.mode === 'DINE_IN' && (
                                <div>
                                    <label className="block text-sm font-bold text-stone-700 mb-1">Select Table *</label>
                                    <select required className="w-full border border-stone-300 rounded-xl px-4 py-3 outline-none focus:border-amber-600 bg-stone-50" value={sessionInfo.tableId || ''} onChange={(e) => {
                                        const t = tables.find(x => x.id === e.target.value);
                                        setSessionInfo({...sessionInfo, tableId: t?.id, tableName: t?.name});
                                    }}>
                                        <option value="" disabled>Choose an available table...</option>
                                        {tables.filter(t => t.status !== 'Occupied' && t.status !== 'Reserved').map(t => (
                                            <option key={t.id} value={t.id}>Table {t.name}</option>
                                        ))}
                                    </select>
                                </div>
                            )}
                            {sessionInfo.mode === 'QR' && (
                                <div className="bg-amber-50 border border-amber-200 text-amber-800 p-3 rounded-xl font-bold text-sm flex items-center">
                                    <i className="fa-solid fa-location-dot mr-2"></i> Table {sessionInfo.tableName} Detected
                                </div>
                            )}
                            
                            <div>
                                <label className="block text-sm font-bold text-stone-700 mb-1">Phone Number *</label>
                                <input type="tel" required placeholder="Enter phone to start" className="w-full border border-stone-300 rounded-xl px-4 py-3 outline-none focus:border-amber-600 bg-stone-50" value={phone} onChange={e => { setPhone(e.target.value); if(!sessionInfo.customerName) setShowName(false); }} />
                                {!showName && <p className="text-xs text-stone-500 mt-1.5 font-medium"><i className="fa-solid fa-bolt text-amber-500 mr-1"></i> Returning customers skip name entry.</p>}
                            </div>
                            
                            {showName && (
                                <div className="animate-fade-in">
                                    <label className="block text-sm font-bold text-stone-700 mb-1">Your Name *</label>
                                    <input type="text" required placeholder="e.g. John Doe" className="w-full border border-stone-300 rounded-xl px-4 py-3 outline-none focus:border-amber-600 bg-stone-50" value={name} onChange={e => setName(e.target.value)} autoFocus={!sessionInfo.customerName} />
                                    {!sessionInfo.customerName && <p className="text-xs text-amber-600 mt-1.5 font-medium"><i className="fa-solid fa-sparkles mr-1"></i> New number! Please provide your name to register.</p>}
                                </div>
                            )}
                        </div>
                        
                        <button type="submit" className="w-full bg-stone-900 text-white font-bold py-4 rounded-xl hover:bg-stone-800 transition shadow-lg">
                            {showName ? 'Complete Setup' : 'Start Ordering'} <i className="fa-solid fa-arrow-right ml-2"></i>
                        </button>
                    </form>
                </div>
            );
        }

        function CartModal({ cart, sessionInfo, cartNotes, setCartNotes, cartTotal, updateCartQty, handleCheckout, isSubmitting, onClose }) {
            return (
                <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-50 flex justify-end">
                    <div className="bg-white w-full max-w-md h-full flex flex-col shadow-2xl animate-slide-in-right">
                        <div className="p-5 border-b border-stone-100 flex justify-between items-center bg-white">
                            <h2 className="text-xl font-bold text-stone-900">Your Order</h2>
                            <button onClick={onClose} className="w-8 h-8 rounded-full bg-stone-100 flex items-center justify-center text-stone-500 hover:bg-stone-200"><i className="fa-solid fa-xmark"></i></button>
                        </div>

                        <div className="flex-1 overflow-y-auto p-5 space-y-4">
                            <div className="bg-stone-50 p-4 rounded-xl border border-stone-100 mb-2">
                                <div className="flex justify-between items-center mb-1">
                                    <span className="text-xs font-bold text-stone-400 uppercase tracking-wider">Ordering As</span>
                                    <span className="text-xs font-bold bg-amber-100 text-amber-800 px-2 py-0.5 rounded">{sessionInfo.mode === 'TAKEAWAY' ? 'Take Away' : 'Dine In'}</span>
                                </div>
                                <p className="font-bold text-stone-800">{sessionInfo.customerName} <span className="font-normal text-stone-500">({sessionInfo.customerPhone})</span></p>
                                {sessionInfo.mode !== 'TAKEAWAY' && <p className="text-sm font-semibold text-amber-600 mt-1">Table {sessionInfo.tableName}</p>}
                            </div>

                            {cart.map((item, idx) => (
                                <div key={idx} className="flex gap-4 items-center border-b border-stone-50 pb-3">
                                    <div className="w-16 h-16 bg-stone-100 rounded-xl overflow-hidden shrink-0">
                                        {item.image ? <img src={item.image} className="w-full h-full object-cover" loading="lazy"/> : <i className="fa-solid fa-image flex items-center justify-center h-full text-stone-300"></i>}
                                    </div>
                                    <div className="flex-1">
                                        <h4 className="font-bold text-stone-800 text-sm leading-tight">{item.name}</h4>
                                        <span className="text-[11px] font-semibold text-stone-500 bg-stone-100 px-1.5 py-0.5 rounded mt-1 inline-block">
                                            Size: {item.size} {item.sugar && `| Sugar: ${item.sugar}`} {item.ice && `| ${item.ice}`}
                                        </span>
                                        <p className="font-bold text-amber-600 text-sm mt-1">{(item.price * item.quantity).toLocaleString()} ៛</p>
                                    </div>
                                    <div className="flex items-center bg-stone-100 rounded-lg p-1 border border-stone-200">
                                        <button onClick={() => updateCartQty(idx, -1)} className="w-7 h-7 flex items-center justify-center text-stone-600"><i className="fa-solid fa-minus text-xs"></i></button>
                                        <span className="w-6 text-center font-semibold text-sm">{item.quantity}</span>
                                        <button onClick={() => updateCartQty(idx, 1)} className="w-7 h-7 flex items-center justify-center text-stone-600"><i className="fa-solid fa-plus text-xs"></i></button>
                                    </div>
                                </div>
                            ))}

                            <div className="pt-2">
                                <label className="block text-sm font-semibold text-stone-700 mb-1">Additional Notes</label>
                                <input type="text" placeholder="e.g. Extra ice..." className="w-full border border-stone-300 rounded-xl px-4 py-3 outline-none focus:border-amber-600 bg-stone-50" value={cartNotes} onChange={e=>setCartNotes(e.target.value)} />
                            </div>
                        </div>

                        <div className="p-5 bg-stone-50 border-t border-stone-200">
                            <div className="flex justify-between items-center mb-4">
                                <span className="text-stone-500 font-medium">Total Amount</span>
                                <span className="text-2xl font-black text-stone-900">{cartTotal.toLocaleString()} ៛</span>
                            </div>
                            <button onClick={handleCheckout} disabled={isSubmitting} className="w-full bg-amber-600 text-white font-bold py-4 rounded-xl hover:bg-amber-700 transition shadow-lg disabled:opacity-50">
                                {isSubmitting ? 'Processing...' : 'Send to Kitchen'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        function OrderTrackerModal({ myActiveOrders, myPastOrders, phoneSearchQuery, setPhoneSearchQuery, onReorder, onClose }) {
            return (
                <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-50 flex justify-end">
                    <div className="bg-white w-full max-w-md h-full flex flex-col shadow-2xl animate-slide-in-right">
                        <div className="p-5 border-b border-stone-100 flex justify-between items-center bg-white shrink-0">
                            <h2 className="text-xl font-bold text-stone-900"><i className="fa-solid fa-satellite-dish text-amber-500 mr-2"></i> Live Tracker</h2>
                            <button onClick={onClose} className="w-8 h-8 rounded-full bg-stone-100 flex items-center justify-center text-stone-500 hover:bg-stone-200"><i className="fa-solid fa-xmark"></i></button>
                        </div>

                        <div className="p-5 border-b border-stone-100 bg-stone-50 shrink-0">
                            <label className="block text-xs font-bold text-stone-500 uppercase tracking-wider mb-2">Lost your session? Search by Phone</label>
                            <div className="flex gap-2">
                                <div className="relative w-full">
                                    <i className="fa-solid fa-phone absolute left-4 top-1/2 -translate-y-1/2 text-stone-400"></i>
                                    <input type="tel" placeholder="Enter phone number..." className="w-full border border-stone-300 rounded-xl pl-10 pr-4 py-2.5 text-sm outline-none focus:border-amber-500 bg-white shadow-sm" value={phoneSearchQuery} onChange={e=>setPhoneSearchQuery(e.target.value)} />
                                </div>
                            </div>
                        </div>

                        <div className="flex-1 overflow-y-auto p-5 bg-stone-100 flex flex-col gap-6">
                            {/* Active Orders Section */}
                            <div>
                                <h3 className="text-sm font-bold text-stone-500 uppercase tracking-wider mb-3">Active Orders</h3>
                                {myActiveOrders.length === 0 ? (
                                    <div className="text-center text-stone-400 py-6 flex flex-col items-center bg-white rounded-2xl border border-stone-200">
                                        <i className="fa-solid fa-box-open text-4xl mb-3 opacity-30 block mt-4"></i>
                                        <p className="font-medium text-stone-500 mb-4">No active orders found.</p>
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        {myActiveOrders.map(order => (
                                            <div key={order.id} className="bg-white border border-stone-200 rounded-2xl p-5 shadow-sm">
                                                <div className="flex justify-between items-start mb-2">
                                                    <div>
                                                        <div className="flex items-center gap-2 mb-1">
                                                            <div className="text-xs font-bold text-stone-400 uppercase tracking-widest">{new Date(order.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                                                            <LiveOrderTimer createdAt={order.createdAt} completedAt={order.completedAt} status={order.status} />
                                                        </div>
                                                        <div className="font-black text-3xl text-stone-800 leading-none">{order.queueNo}</div>
                                                    </div>
                                                    <div className="text-right flex flex-col items-end">
                                                        <div className={`text-[10px] font-bold px-2 py-0.5 rounded uppercase tracking-wider mb-1 ${order.orderType === 'TAKEAWAY' ? 'bg-stone-800 text-white' : 'bg-amber-100 text-amber-800'}`}>
                                                            {order.orderType === 'TAKEAWAY' ? 'Take Away' : `Table ${order.tableName}`}
                                                        </div>
                                                        <div className="font-bold text-stone-600 text-lg">{order.totalAmount.toLocaleString()} ៛</div>
                                                    </div>
                                                </div>
                                                <div className="text-sm font-semibold text-stone-500 mb-2">{order.items.reduce((s,i)=>s+i.quantity,0)} items</div>
                                                
                                                <div className="flex flex-wrap gap-1 mb-4">
                                                    {order.items.map((item, idx) => (
                                                        <span key={idx} className="text-[10px] bg-stone-100 text-stone-600 px-2 py-1 rounded border border-stone-200">
                                                            {item.quantity}x {item.name}
                                                        </span>
                                                    ))}
                                                </div>
                                                
                                                <OrderProgressBar status={order.status} />
                                            </div>
                                        ))}
                                    </div>
                                )}
                            </div>

                            {/* Order History / Past Orders Section */}
                            {(phoneSearchQuery || (myPastOrders && myPastOrders.length > 0)) && (
                                <div>
                                    <h3 className="text-sm font-bold text-stone-500 uppercase tracking-wider mb-3">Order History</h3>
                                    {myPastOrders.length === 0 ? (
                                        <div className="text-center text-stone-400 py-6 bg-white rounded-2xl border border-stone-200">No previous orders found.</div>
                                    ) : (
                                        <div className="space-y-4">
                                            {myPastOrders.map(order => (
                                                <div key={order.id} className="bg-white border border-stone-200 rounded-2xl p-4 shadow-sm opacity-90 hover:opacity-100 transition">
                                                    <div className="flex justify-between items-start mb-2">
                                                        <div>
                                                            <div className="text-xs font-bold text-stone-400">{new Date(order.createdAt).toLocaleDateString()} {new Date(order.createdAt).toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}</div>
                                                            <div className="font-bold text-stone-800">{order.items.reduce((s,i)=>s+i.quantity,0)} items • {order.totalAmount.toLocaleString()} ៛</div>
                                                        </div>
                                                        <span className={`text-[10px] font-bold px-2 py-0.5 rounded ${order.status === 'Served' ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>{order.status}</span>
                                                    </div>
                                                    <div className="flex flex-wrap gap-1 mb-3">
                                                        {order.items.map((item, idx) => (
                                                            <span key={idx} className="text-[10px] bg-stone-50 text-stone-600 px-2 py-1 rounded border border-stone-100">
                                                                {item.quantity}x {item.name}
                                                            </span>
                                                        ))}
                                                    </div>
                                                    <button onClick={() => onReorder(order)} className="w-full py-2.5 bg-stone-100 hover:bg-stone-200 text-stone-800 rounded-xl text-sm font-bold transition flex items-center justify-center gap-2">
                                                        <i className="fa-solid fa-rotate-left"></i> Re-order Items
                                                    </button>
                                                </div>
                                            ))}
                                        </div>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        // ==========================================
        //         CUSTOMER PORTAL MAIN
        // ==========================================

        function CustomerPortal({ products, categories, tables, orders, currentUser, isLoading, onAdminClick }) {
            const [activeCategory, setActiveCategory] = useState('All');
            const [searchQuery, setSearchQuery] = useState('');
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [submittedOrder, setSubmittedOrder] = useState(null);
            
            const [selectedItemForOptions, setSelectedItemForOptions] = useState(null);

            const queryParams = new URLSearchParams(window.location.search);
            const tableIdParam = queryParams.get('table');
            const qrDetectedTable = tables.find(t => t.id === tableIdParam) || tables.find(t => t.name === tableIdParam);

            const [sessionInfo, setSessionInfo] = useState({
                isSetup: false,
                mode: qrDetectedTable ? 'QR' : null, 
                tableId: qrDetectedTable ? qrDetectedTable.id : null,
                tableName: qrDetectedTable ? qrDetectedTable.name : null,
                customerName: '',
                customerPhone: ''
            });
            const [showSetupModal, setShowSetupModal] = useState(false);
            const [cartNotes, setCartNotes] = useState('');
            const [isTrackerOpen, setIsTrackerOpen] = useState(false);
            const [phoneSearchQuery, setPhoneSearchQuery] = useState('');

            useEffect(() => {
                if (qrDetectedTable && !sessionInfo.isSetup) {
                    setShowSetupModal(true);
                }
            }, [qrDetectedTable, sessionInfo.isSetup]);

            const myActiveOrders = useMemo(() => {
                return orders.filter(o => {
                    const isMyAuth = currentUser && o.userId === currentUser.uid;
                    const isMyPhone = phoneSearchQuery && o.customerPhone === phoneSearchQuery;
                    return (isMyAuth || isMyPhone) && !['Served', 'Cancelled'].includes(o.status);
                }).sort((a, b) => b.createdAt - a.createdAt);
            }, [orders, currentUser, phoneSearchQuery]);

            const myPastOrders = useMemo(() => {
                return orders.filter(o => {
                    const isMyAuth = currentUser && o.userId === currentUser.uid;
                    const isMyPhone = phoneSearchQuery && o.customerPhone === phoneSearchQuery;
                    return (isMyAuth || isMyPhone) && ['Served', 'Cancelled'].includes(o.status);
                }).sort((a, b) => b.createdAt - a.createdAt).slice(0, 15);
            }, [orders, currentUser, phoneSearchQuery]);

            const filteredProducts = useMemo(() => {
                return products.filter(p => {
                    const matchesSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesCategory = activeCategory === 'All' || p.category === activeCategory;
                    return matchesSearch && matchesCategory && p.isAvailable;
                });
            }, [products, searchQuery, activeCategory]);

            const handleSizeClick = (product, size, price) => {
                if (!sessionInfo.isSetup) {
                    if (!sessionInfo.mode) {
                        setSessionInfo(prev => ({ ...prev, mode: 'DINE_IN' }));
                    }
                    setShowSetupModal(true);
                    return;
                }
                if (product.hasSugarOption || product.hasIceOption) {
                    setSelectedItemForOptions({ 
                        product, size, price, 
                        sugar: product.hasSugarOption ? '100%' : null,
                        ice: product.hasIceOption ? 'Normal Ice' : null
                    });
                } else {
                    addToCart(product, size, price, null, null);
                }
            };

            const addToCart = (product, size, price, sugar, ice) => {
                setCart(prev => {
                    const existingIndex = prev.findIndex(item => item.productId === product.id && item.size === size && item.sugar === sugar && item.ice === ice);
                    if (existingIndex >= 0) {
                        const newCart = [...prev];
                        newCart[existingIndex].quantity += 1;
                        return newCart;
                    }
                    return [...prev, { productId: product.id, name: product.name, size, price, quantity: 1, image: product.image, sugar, ice }];
                });
            };

            const updateCartQty = (idx, delta) => {
                setCart(prev => {
                    const newCart = [...prev];
                    newCart[idx].quantity += delta;
                    if (newCart[idx].quantity <= 0) newCart.splice(idx, 1);
                    return newCart;
                });
            };

            const cartTotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            const handleSetupSubmit = (e, resolvedData) => {
                if (e) e.preventDefault();
                
                // If resolvedData exists, it means SetupModal pulled/confirmed the phone and name successfully.
                if (resolvedData) {
                    setSessionInfo(prev => ({ 
                        ...prev, 
                        customerPhone: resolvedData.phone, 
                        customerName: resolvedData.name, 
                        isSetup: true 
                    }));
                } else {
                    setSessionInfo(prev => ({ ...prev, isSetup: true }));
                }
                setShowSetupModal(false);
            };
            
            const handleReorder = (order) => {
                setCart(order.items.map(item => ({...item}))); 
                setSessionInfo(prev => ({
                    ...prev,
                    customerName: order.customerName || prev.customerName,
                    customerPhone: order.customerPhone || prev.customerPhone,
                    mode: order.orderType === 'TAKEAWAY' ? 'TAKEAWAY' : 'DINE_IN',
                    tableId: order.tableId || prev.tableId,
                    tableName: order.tableName || prev.tableName,
                    isSetup: true // Automatically bypass setup requirement for returning users
                }));
                setIsTrackerOpen(false);
                setIsCartOpen(true); // Pops open mobile cart (desktop users will just see the right panel update instantly)
            };

            const handleCheckout = async (e) => {
                e.preventDefault();
                if (cart.length === 0 || !sessionInfo.isSetup) return;
                setIsSubmitting(true);

                const { addDoc, updateDoc, doc } = window.FirebaseApp;
                const today = getTodayString();
                
                const todaysOrders = orders.filter(o => o.dateString === today);
                const highestQueue = todaysOrders.length > 0 
                    ? Math.max(...todaysOrders.map(o => parseInt(o.queueNo.split('-')[1]) || 0)) 
                    : 0;
                const queueString = `A-${(highestQueue + 1).toString().padStart(3, '0')}`;

                const actualOrderType = (sessionInfo.mode === 'QR' || sessionInfo.mode === 'DINE_IN') ? 'DINE_IN' : 'TAKEAWAY';

                const orderData = {
                    userId: currentUser ? currentUser.uid : null,
                    queueNo: queueString,
                    orderType: actualOrderType,
                    tableId: sessionInfo.tableId || 'TAKEAWAY',
                    tableName: sessionInfo.tableName || 'Take Away',
                    customerName: sessionInfo.customerName,
                    customerPhone: sessionInfo.customerPhone,
                    notes: cartNotes,
                    items: cart,
                    totalAmount: cartTotal,
                    status: 'New', 
                    dateString: today,
                    createdAt: Date.now()
                };

                try {
                    await addDoc(getColRef('orders'), orderData);
                    
                    if (actualOrderType === 'DINE_IN' && sessionInfo.tableId) {
                        try {
                            await updateDoc(doc(getColRef('tables'), sessionInfo.tableId), { status: 'Occupied' });
                        } catch(err) {
                            console.warn("Could not update table status: ", err);
                        }
                    }

                    setSubmittedOrder(orderData);
                    setCart([]);
                    setIsCartOpen(false);
                } catch (err) {
                    console.error("Order submission failed:", err);
                    alert("Submission Blocked by Firebase!\n\nError: " + err.message + "\n\nFix: You must update your Firestore Security Rules to allow writes.");
                } finally {
                    setIsSubmitting(false);
                }
            };

            if (submittedOrder) {
                return (
                    <OrderSuccessView 
                        order={submittedOrder} 
                        sessionInfo={sessionInfo}
                        setSessionInfo={setSessionInfo}
                        onTrackOrder={() => {
                            setSubmittedOrder(null);
                            setIsTrackerOpen(true);
                        }}
                        onNewOrder={() => {
                            setSubmittedOrder(null);
                            if (sessionInfo.mode !== 'QR') {
                                setSessionInfo({ isSetup: false, mode: null, tableId: null, tableName: null, customerName: '', customerPhone: '' });
                            }
                        }}
                    />
                );
            }

            return (
                <div className="pb-28 lg:pb-8 relative min-h-screen bg-stone-50">
                    {/* Header Banner */}
                    <div className="relative h-48 sm:h-64 bg-stone-900 w-full overflow-hidden flex-shrink-0">
                        <button 
                            onClick={() => setIsTrackerOpen(true)}
                            className="absolute top-4 right-4 z-20 bg-stone-900/80 backdrop-blur text-white px-4 py-2 rounded-full text-sm font-bold shadow-lg border border-stone-700 hover:bg-stone-800 transition"
                        >
                            <i className="fa-solid fa-satellite-dish mr-2 text-amber-500"></i> Track Order
                        </button>

                        <img src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&q=80&w=2000" alt="Cafe" className="w-full h-full object-cover opacity-50" />
                        <div className="absolute inset-0 flex flex-col items-center justify-center text-white px-4 text-center">
                            <h1 className="text-3xl sm:text-4xl font-bold tracking-tight drop-shadow-md">Solaris Cafe</h1>
                            
                            {sessionInfo.isSetup ? (
                                <div className="mt-4 flex gap-2">
                                    <span className="bg-amber-600/90 backdrop-blur px-4 py-1.5 rounded-full text-sm font-bold shadow-lg flex items-center">
                                        <i className={`fa-solid ${sessionInfo.mode === 'TAKEAWAY' ? 'fa-bag-shopping' : 'fa-location-dot'} mr-2`}></i>
                                        {sessionInfo.mode === 'TAKEAWAY' ? 'Take Away' : `Table ${sessionInfo.tableName}`}
                                    </span>
                                    <span className="bg-stone-800/90 backdrop-blur px-4 py-1.5 rounded-full text-sm font-bold shadow-lg">
                                        <i className="fa-solid fa-user mr-2"></i> {sessionInfo.customerName}
                                    </span>
                                </div>
                            ) : (
                                <div className="mt-4 flex flex-wrap justify-center gap-3">
                                    {qrDetectedTable ? (
                                        <button onClick={() => setShowSetupModal(true)} className="bg-amber-600/90 hover:bg-amber-500 backdrop-blur px-6 py-2.5 rounded-full text-sm font-bold shadow-lg transition animate-pulse">
                                            Tap to Start Table {qrDetectedTable.name} Order
                                        </button>
                                    ) : (
                                        <>
                                            <button onClick={() => { setSessionInfo({...sessionInfo, mode: 'DINE_IN'}); setShowSetupModal(true); }} className="bg-amber-600/90 hover:bg-amber-500 backdrop-blur px-6 py-2 rounded-full text-sm font-bold shadow-lg transition border border-amber-500/50">
                                                <i className="fa-solid fa-utensils mr-2"></i> Dine In Self Order
                                            </button>
                                            <button onClick={() => { setSessionInfo({...sessionInfo, mode: 'TAKEAWAY', tableId: 'TAKEAWAY', tableName: 'Take Away'}); setShowSetupModal(true); }} className="bg-stone-800/90 hover:bg-stone-700 backdrop-blur px-6 py-2 rounded-full text-sm font-bold shadow-lg transition border border-stone-600/50">
                                                <i className="fa-solid fa-bag-shopping mr-2"></i> Take Away
                                            </button>
                                        </>
                                    )}
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="max-w-7xl mx-auto px-4 sm:px-6 -mt-6 relative z-10 flex flex-col lg:flex-row gap-6 items-start">
                        {/* LEFT SIDE: Menu Items (expands to fill space on desktop) */}
                        <div className="flex-1 w-full min-w-0">
                            {/* Search & Filter */}
                            <div className="bg-white p-2 rounded-2xl shadow-lg flex items-center mb-6 border border-stone-100">
                                <i className="fa-solid fa-magnifying-glass text-stone-400 ml-3 mr-2"></i>
                                <input type="text" placeholder="Search menu..." className="flex-1 py-2 px-2 outline-none" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                            </div>

                            <div className="flex gap-3 overflow-x-auto no-scrollbar mb-6 pb-2">
                                {isLoading ? (
                                    Array.from({length: 5}).map((_, i) => (
                                        <div key={`skel-cat-${i}`} className="whitespace-nowrap px-8 py-5 rounded-full bg-stone-200 animate-pulse shrink-0"></div>
                                    ))
                                ) : (
                                    <>
                                        <button onClick={() => setActiveCategory('All')} className={`whitespace-nowrap px-5 py-2 rounded-full text-sm font-semibold transition ${activeCategory === 'All' ? 'bg-stone-900 text-white shadow-md' : 'bg-white text-stone-600 border border-stone-200 hover:bg-stone-100'}`}>All</button>
                                        {categories.map(cat => (
                                            <button key={cat.id} onClick={() => setActiveCategory(cat.name)} className={`whitespace-nowrap px-5 py-2 rounded-full text-sm font-semibold transition ${activeCategory === cat.name ? 'bg-stone-900 text-white shadow-md' : 'bg-white text-stone-600 border border-stone-200 hover:bg-stone-100'}`}>{cat.name}</button>
                                        ))}
                                    </>
                                )}
                            </div>

                            {/* Product Grid */}
                            <div className="grid grid-cols-2 md:grid-cols-3 xl:grid-cols-4 gap-3 sm:gap-4">
                                {isLoading ? (
                                    Array.from({length: 8}).map((_, i) => (
                                        <div key={`skel-prod-${i}`} className="bg-white rounded-2xl p-2.5 sm:p-3 flex flex-col sm:flex-row gap-2.5 sm:gap-3 shadow-sm border border-stone-100 animate-pulse">
                                            <div className="w-full h-32 sm:w-28 sm:h-28 rounded-xl bg-stone-200 shrink-0"></div>
                                            <div className="flex-1 flex flex-col w-full py-1">
                                                <div className="h-4 bg-stone-200 rounded w-3/4 mb-2"></div>
                                                <div className="h-3 bg-stone-200 rounded w-full mb-1"></div>
                                                <div className="h-3 bg-stone-200 rounded w-5/6 mb-auto"></div>
                                                <div className="flex flex-col gap-1.5 mt-auto pt-3">
                                                    <div className="h-8 bg-stone-200 rounded-lg w-full"></div>
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                ) : filteredProducts.length > 0 ? (
                                    filteredProducts.map(product => (
                                        <div key={product.id} className="bg-white rounded-2xl overflow-hidden shadow-sm border border-stone-100 hover:shadow-md flex flex-col sm:flex-row lg:flex-col xl:flex-row p-2.5 sm:p-3 gap-2.5 sm:gap-3 transition-all h-full">
                                            <div className="w-full h-32 sm:w-28 sm:h-28 lg:w-full lg:h-32 xl:w-24 xl:h-24 rounded-xl bg-stone-100 shrink-0 overflow-hidden relative">
                                                {product.image ? <img src={product.image} className="w-full h-full object-cover absolute inset-0" alt={product.name} loading="lazy" /> : <i className="fa-solid fa-image text-2xl text-stone-300 w-full h-full flex items-center justify-center absolute inset-0"></i>}
                                            </div>
                                            <div className="flex-1 flex flex-col w-full relative">
                                                <h3 className="font-bold text-stone-800 text-sm sm:text-base leading-tight">{product.name}</h3>
                                                <p className="text-[10px] sm:text-xs text-stone-500 line-clamp-2 mt-1 flex-1">{product.description}</p>
                                                
                                                <div className="flex flex-col gap-1.5 mt-2">
                                                    {product.priceSmall > 0 && (
                                                        <button onClick={() => handleSizeClick(product, 'S', product.priceSmall)} className="w-full flex items-center justify-between px-2.5 py-1.5 rounded-lg border text-[11px] sm:text-xs font-bold transition-colors border-amber-300 bg-amber-100 text-amber-900 hover:bg-amber-200 shadow-sm">
                                                            <span>S</span><span>{product.priceSmall.toLocaleString()} ៛</span>
                                                        </button>
                                                    )}
                                                    {product.priceLarge > 0 && (
                                                        <button onClick={() => handleSizeClick(product, 'L', product.priceLarge)} className="w-full flex items-center justify-between px-2.5 py-1.5 rounded-lg border text-[11px] sm:text-xs font-bold transition-colors border-amber-300 bg-amber-100 text-amber-900 hover:bg-amber-200 shadow-sm">
                                                            <span>L</span><span>{product.priceLarge.toLocaleString()} ៛</span>
                                                        </button>
                                                    )}
                                                </div>
                                            </div>
                                        </div>
                                    ))
                                ) : (
                                    <div className="col-span-2 md:col-span-3 xl:col-span-4 text-center py-10 text-stone-400 font-medium">
                                        <i className="fa-solid fa-mug-hot text-4xl mb-3 opacity-30 block"></i>
                                        No products found in this category.
                                    </div>
                                )}
                            </div>
                        </div>

                        {/* RIGHT SIDE: Desktop Split POS-Style Cart (Hidden on Mobile) */}
                        <div className="hidden lg:flex w-[22rem] xl:w-96 flex-col shrink-0 bg-white rounded-2xl shadow-xl border border-stone-200 sticky top-6 h-[calc(100vh-3rem)] overflow-hidden">
                            <div className="p-4 border-b border-stone-200 bg-stone-50 font-bold text-stone-800 flex items-center">
                                <i className="fa-solid fa-cart-shopping mr-2 text-amber-600"></i> Current Order
                            </div>
                            
                            <div className="flex-1 overflow-y-auto p-4 space-y-4">

        function AdminLogin({ onBack, onLogin }) {
            const [isRegistering, setIsRegistering] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [secretCode, setSecretCode] = useState('');
            const [error, setError] = useState('');

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                const { signInWithEmailAndPassword, createUserWithEmailAndPassword, setDoc, doc } = window.FirebaseApp;
                try {
                    if (isRegistering) {
                        if (secretCode !== 'JL1688') {
                            setError('Invalid secret registration code.');
                            return;
                        }
                        const userCred = await createUserWithEmailAndPassword(auth, email, password);
                        try {
                            await setDoc(doc(getColRef('admins'), userCred.user.uid), {
                                email: userCred.user.email,
                                permissions: ['pos', 'kds', 'tables', 'categories', 'products', 'sales', 'users'], 
                                createdAt: Date.now()
                            });
                        } catch (dbErr) {
                            console.error("Could not save to admins collection", dbErr);
                        }
                    } else {
                        await signInWithEmailAndPassword(auth, email, password);
                    }
                    onLogin();
                } catch (err) { 
                    setError(err.message.replace('Firebase: ', '')); 
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-stone-100 p-4">
                    <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md">

                        <h2 className="text-2xl font-bold mb-6">{isRegistering ? 'Create Admin' : 'Staff Login'}</h2>
                        {error && <div className="bg-red-50 text-red-600 p-3 rounded-lg mb-4 text-sm">{error}</div>}
                        <form onSubmit={handleSubmit} className="space-y-4">
                            <input type="email" placeholder="Email" required className="w-full border rounded-xl px-4 py-3 outline-none" value={email} onChange={e=>setEmail(e.target.value)} />
                            <input type="password" placeholder="Password" required className="w-full border rounded-xl px-4 py-3 outline-none" value={password} onChange={e=>setPassword(e.target.value)} />
                            
                            {isRegistering && (
                                <input 
                                    type="password" 
                                    placeholder="Admin Registration Code" 
                                    required 
                                    className="w-full border rounded-xl px-4 py-3 outline-none focus:border-amber-600" 
                                    value={secretCode} 
                                    onChange={e=>setSecretCode(e.target.value)} 
                                />
                            )}
                            
                            <button type="submit" className="w-full bg-stone-900 text-white py-3.5 rounded-xl font-bold">
                                {isRegistering ? 'Create Account' : 'Login'}
                            </button>
                        </form>

                        <div className="mt-6 text-center">
                            <button 
                                type="button"
                                onClick={() => { setIsRegistering(!isRegistering); setError(''); setSecretCode(''); }}
                                className="text-sm text-amber-600 hover:text-amber-700 font-semibold"
                            >
                                {isRegistering ? 'Already have an account? Sign In' : 'Need to register? Create Admin'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

                    const existingIndex = prev.findIndex(item => item.productId === product.id && item.size === size && item.sugar === sugar && item.ice === ice);
                    if (existingIndex >= 0) {
                        const newCart = [...prev];
                        newCart[existingIndex].quantity += 1;
                        return newCart;

                                    <div className="flex justify-between items-start mb-2">
                                        <div>
                                            <h3 className="text-2xl font-bold text-stone-900 leading-tight">{viewingProduct.name}</h3>
                                            <span className="text-sm font-medium text-stone-500">{viewingProduct.category}</span>
                                        </div>
                                        <span className={`px-2.5 py-1 text-xs font-bold rounded-lg ${viewingProduct.isAvailable ? 'bg-green-100 text-green-700' : 'bg-red-100 text-red-700'}`}>
                                            {viewingProduct.isAvailable ? 'Available' : 'Hidden'}
                                        </span>
                                    </div>
                                    
                                    {viewingProduct.description && (
                                        <p className="text-stone-600 text-sm mt-3 bg-stone-50 p-3 rounded-xl border border-stone-100">{viewingProduct.description}</p>
                                    )}
                                    
                                    <div className="mt-5 grid grid-cols-2 gap-3">
                                        {viewingProduct.priceSmall > 0 && (
                                            <div className="bg-stone-50 p-3 rounded-xl border border-stone-100">
                                                <p className="text-xs text-stone-400 font-bold uppercase tracking-wider mb-1">Small Size</p>
                                                <p className="font-black text-amber-600">{viewingProduct.priceSmall.toLocaleString()} ៛</p>
                                            </div>
                                        )}
                                        {viewingProduct.priceLarge > 0 && (
                                            <div className="bg-stone-50 p-3 rounded-xl border border-stone-100">
                                                <p className="text-xs text-stone-400 font-bold uppercase tracking-wider mb-1">Large Size</p>
                                                <p className="font-black text-amber-600">{viewingProduct.priceLarge.toLocaleString()} ៛</p>
                                            </div>
                                        )}
                                    </div>
                                    
                                    <div className="mt-5 flex gap-2">
                                        {viewingProduct.hasSugarOption && <span className="bg-stone-900 text-white px-3 py-1.5 rounded-lg text-xs font-bold"><i className="fa-solid fa-cubes-stacked mr-1.5"></i>Sugar Options</span>}
                                        {viewingProduct.hasIceOption && <span className="bg-blue-600 text-white px-3 py-1.5 rounded-lg text-xs font-bold"><i className="fa-solid fa-snowflake mr-1.5"></i>Ice Options</span>}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function SalesView({ orders }) {
            const [filter, setFilter] = useState('today'); 
            
            const filteredOrders = useMemo(() => {
                const now = new Date();
                return orders.filter(o => {
                    const orderDate = new Date(o.createdAt);
                    if (filter === 'today') return orderDate.toDateString() === now.toDateString();
                    if (filter === 'week') {
                        const weekAgo = new Date(); weekAgo.setDate(now.getDate() - 7);
                        return orderDate >= weekAgo;
                    }
                    if (filter === 'month') return orderDate.getMonth() === now.getMonth() && orderDate.getFullYear() === now.getFullYear();
                    return true;
                });
            }, [orders, filter]);

            const completedOrders = filteredOrders.filter(o => o.status === 'Served');
            const totalRevenue = completedOrders.reduce((s,o) => s + o.totalAmount, 0);

            const exportCSV = () => {
                const headers = "Date,Type,Queue,Table,Customer,Phone,Total,Status\n";
                const rows = filteredOrders.map(o => `${new Date(o.createdAt).toLocaleString()},${o.orderType || 'DINE_IN'},${o.queueNo},${o.tableName},"${o.customerName}",${o.customerPhone || 'N/A'},${o.totalAmount},${o.status}`).join("\n");
                const blob = new Blob([headers + rows], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `sales_report_${filter}.csv`;
                link.click();
            };

            return (
                <div id="printable-area">
                    <div className="flex justify-between items-center mb-6 no-print">
                        <h2 className="text-2xl font-bold">Sales Report</h2>
                        <div className="flex gap-2">
                            <select className="border rounded-lg px-3 py-2 bg-white outline-none" value={filter} onChange={e=>setFilter(e.target.value)}>
                                <option value="today">Today</option>
                                <option value="week">Last 7 Days</option>
                                <option value="month">This Month</option>
                            </select>
                            <button onClick={exportCSV} className="bg-green-600 text-white px-4 py-2 rounded-lg font-semibold"><i className="fa-solid fa-file-csv mr-2"></i> CSV</button>
                            <button onClick={() => window.print()} className="bg-stone-900 text-white px-4 py-2 rounded-lg font-semibold"><i className="fa-solid fa-file-pdf mr-2"></i> Print PDF</button>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4 mb-6">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <p className="text-stone-500 font-medium">Total Orders</p>
                            <p className="text-3xl font-bold text-stone-900">{filteredOrders.length}</p>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <p className="text-stone-500 font-medium">Revenue (Completed)</p>
                            <p className="text-3xl font-bold text-green-600">{totalRevenue.toLocaleString()} ៛</p>
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl border shadow-sm overflow-auto">
                        <table className="w-full min-w-[700px] text-left text-sm border-collapse border border-stone-300">
                            <thead>
                                <tr className="text-stone-700 uppercase tracking-wider bg-stone-100">
                                    <th className="p-3 font-bold border border-stone-300">Date</th>
                                    <th className="p-3 font-bold border border-stone-300">Queue</th>
                                    <th className="p-3 font-bold border border-stone-300">Total</th>
                                    <th className="p-3 font-bold border border-stone-300">Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filteredOrders.map(o => (
                                    <tr key={o.id} className="hover:bg-stone-50 bg-white">
                                        <td className="p-3 border border-stone-300 align-top">{new Date(o.createdAt).toLocaleString()}</td>
                                        <td className="p-3 border border-stone-300 align-top font-semibold">{o.queueNo}</td>
                                        <td className="p-3 border border-stone-300 align-top font-bold">{o.totalAmount.toLocaleString()} ៛</td>
                                        <td className="p-3 border border-stone-300 align-top">{o.status}</td>
                                    </tr>
                                ))}
                                {filteredOrders.length === 0 && <tr><td colSpan="4" className="text-center py-4 text-stone-400 border border-stone-300">No sales found.</td></tr>}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootApp />);
    </script>

    <!-- Service Worker Registration for Offline Caching & Background Sync -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then((registration) => {
                        console.log('ServiceWorker registered successfully with scope: ', registration.scope);
                        
                        registration.addEventListener('updatefound', () => {
                            const newWorker = registration.installing;
                            newWorker.addEventListener('statechange', () => {
                                if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                                    console.log('Background Sync Complete: New app version is ready.');
                                }
                            });
                        });
                    })
                    .catch((error) => console.log('ServiceWorker registration failed: ', error));
            });
        }
    </script>
</body>
</html>
