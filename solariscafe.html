<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Solaris Cafe - QR Menu</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- React & ReactDOM (UMD versions for browser usage) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for in-browser JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Custom scrollbar hiding */
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-stone-50 font-sans text-stone-900">
    
    <!-- Application Mount Point -->
    <div id="root">
        <!-- Initial loading state visible while scripts fetch -->
        <div style="display: flex; height: 100vh; align-items: center; justify-content: center; color: #78716c; font-weight: 500;">
            <i class="fa-solid fa-spinner fa-spin" style="margin-right: 10px;"></i> Loading Menu System...
        </div>
    </div>

    <!-- 1. Firebase Initialization Module -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDocs, onSnapshot, addDoc, updateDoc, deleteDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        // Attach to global window object so the React app can access them
        window.FirebaseApp = {
            initializeApp, getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, 
            onAuthStateChanged, signOut, signInAnonymously,
            getFirestore, collection, doc, setDoc, getDocs, onSnapshot, 
            addDoc, updateDoc, deleteDoc, query, orderBy, serverTimestamp
        };
        
        // Let the React app know the module has finished loading
        window.dispatchEvent(new Event('firebase-loaded'));
    </script>

    <!-- 2. React Application Logic -->
    <script type="text/babel">
        const { useState, useEffect, useMemo } = React;

        // Firebase Setup configuration (User Provided)
        const firebaseConfig = {
            apiKey: "AIzaSyADedJwnXvUv3bK_OBkzzbOw82L8QuAC8Q",
            authDomain: "solaris-1f4cb.firebaseapp.com",
            projectId: "solaris-1f4cb",
            storageBucket: "solaris-1f4cb.firebasestorage.app",
            messagingSenderId: "372761640969",
            appId: "1:372761640969:web:91f24d3f7a93babd6cf8d8",
            measurementId: "G-VR3L5HWHFD"
        };

        let app, auth, db, getColRef;

        function initializeFirebase() {
            if (app) return; // Prevent double initialization
            const { initializeApp, getAuth, getFirestore, collection } = window.FirebaseApp;
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            // Standard collection path for GitHub pages deployment
            getColRef = (colName) => collection(db, colName);
        }

        // --- Utility: Image Resizer ---
        const resizeImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        const MAX_WIDTH = 600;
                        const scaleSize = MAX_WIDTH / img.width;
                        canvas.width = MAX_WIDTH;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        resolve(canvas.toDataURL('image/jpeg', 0.85));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        };

        // --- Root App Wrapper (Waits for Firebase script to load) ---
        function RootApp() {
            const [isReady, setIsReady] = useState(!!window.FirebaseApp);
            
            useEffect(() => {
                const handleReady = () => setIsReady(true);
                if (!isReady) {
                    window.addEventListener('firebase-loaded', handleReady);
                }
                return () => window.removeEventListener('firebase-loaded', handleReady);
            }, [isReady]);

            if (!isReady) {
                return (
                    <div className="flex h-screen items-center justify-center text-stone-500 font-medium">
                        <i className="fa-solid fa-spinner fa-spin mr-2"></i> Connecting to servers...
                    </div>
                );
            }

            // Initialize Firebase once ready
            initializeFirebase();
            return <CafeQRMenu />;
        }

        // --- Main App Component ---
        function CafeQRMenu() {
            const [view, setView] = useState('menu'); 
            const [user, setUser] = useState(null);
            
            const [products, setProducts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [loading, setLoading] = useState(true);

            // 1. Initialize Auth
            useEffect(() => {
                const { signInAnonymously, onAuthStateChanged } = window.FirebaseApp;

                const initAuth = async () => {
                    try {
                        if (!auth.currentUser) await signInAnonymously(auth);
                    } catch (err) {
                        console.error("Auth init error:", err);
                    }
                };
                initAuth();

                const unsubscribeAuth = onAuthStateChanged(auth, (currentUser) => {
                    setUser(currentUser);
                });

                return () => {
                    unsubscribeAuth();
                };
            }, []);

            // 2. Fetch Data (Only after auth is resolved)
            useEffect(() => {
                if (!user) return;

                const { onSnapshot } = window.FirebaseApp;

                const unsubProducts = onSnapshot(getColRef('products'), (snapshot) => {
                    const prods = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setProducts(prods.sort((a, b) => b.updatedAt - a.updatedAt)); 
                }, (error) => console.error("Products error:", error));

                const unsubCategories = onSnapshot(getColRef('categories'), (snapshot) => {
                    const cats = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                    setCategories(cats.sort((a, b) => a.order - b.order));
                    setLoading(false);
                }, (error) => {
                    console.error("Categories error:", error);
                    setLoading(false);
                });

                return () => {
                    unsubProducts();
                    unsubCategories();
                };
            }, [user]);

            // 3. Default Categories Seed
            useEffect(() => {
                const { addDoc } = window.FirebaseApp;
                const seedCategories = async () => {
                    // Only seed if logged in as ADMIN (not anonymous) to prevent write permission errors
                    if (!loading && categories.length === 0 && user && !user.isAnonymous) {
                        const defaults = ['Coffee', 'Tea', 'Smoothies', 'Food', 'Desserts'];
                        for (let index = 0; index < defaults.length; index++) {
                            try {
                                await addDoc(getColRef('categories'), { name: defaults[index], order: index });
                            } catch (e) {
                                console.error("Seed error:", e);
                            }
                        }
                    }
                };
                seedCategories();
            }, [loading, categories, user]);

            return (
                <div className="min-h-screen">
                    {view === 'menu' && (
                        <PublicMenu 
                            products={products} 
                            categories={categories} 
                            onAdminClick={() => setView(user && !user.isAnonymous ? 'admin_dashboard' : 'admin_login')} 
                        />
                    )}
                    {view === 'admin_login' && (
                        <AdminLogin 
                            onBack={() => setView('menu')} 
                            onLogin={() => setView('admin_dashboard')} 
                        />
                    )}
                    {view === 'admin_dashboard' && (
                        <AdminDashboard 
                            products={products} 
                            categories={categories} 
                            onLogout={() => {
                                window.FirebaseApp.signOut(auth).then(() => setView('menu'));
                            }}
                            onBackToMenu={() => setView('menu')}
                        />
                    )}
                </div>
            );
        }

        // --- 1. Customer Front-End (Public) ---
        function PublicMenu({ products, categories, onAdminClick }) {
            const [activeCategory, setActiveCategory] = useState('All');
            const [searchQuery, setSearchQuery] = useState('');

            const filteredProducts = useMemo(() => {
                return products.filter(product => {
                    const matchesSearch = product.name.toLowerCase().includes(searchQuery.toLowerCase()) || 
                                          product.description.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesCategory = activeCategory === 'All' || product.category === activeCategory;
                    return matchesSearch && matchesCategory && product.isAvailable;
                });
            }, [products, searchQuery, activeCategory]);

            return (
                <div className="pb-24">
                    {/* Banner & Header */}
                    <div className="relative h-64 bg-stone-900 w-full overflow-hidden">
                        <img 
                            src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&q=80&w=2000" 
                            alt="Cafe Cover" 
                            className="w-full h-full object-cover opacity-60"
                        />
                        <div className="absolute inset-0 flex flex-col items-center justify-center text-white">
                            <div className="w-20 h-20 bg-amber-600 rounded-full flex items-center justify-center mb-4 shadow-xl border-4 border-white/20">
                                <i className="fa-solid fa-mug-hot text-4xl text-white"></i>
                            </div>
                            <h1 className="text-4xl font-bold tracking-tight drop-shadow-md">Solaris Cafe</h1>
                            <p className="mt-2 text-stone-200 font-medium tracking-wide text-sm uppercase">Artisan Coffee & Kitchen</p>
                        </div>
                    </div>

                    <div className="max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 -mt-8 relative z-10">
                        {/* Search Bar */}
                        <div className="bg-white p-2 rounded-2xl shadow-lg shadow-stone-200/50 flex items-center mb-8 border border-stone-100">
                            <i className="fa-solid fa-magnifying-glass text-stone-400 ml-3 mr-2 text-xl"></i>
                            <input 
                                type="text" 
                                placeholder="Search our menu..." 
                                className="flex-1 bg-transparent py-3 px-2 outline-none text-stone-700 placeholder-stone-400"
                                value={searchQuery}
                                onChange={(e) => setSearchQuery(e.target.value)}
                            />
                        </div>

                        {/* Categories (Sticky) */}
                        <div className="sticky top-0 bg-stone-50/95 backdrop-blur-md pt-4 pb-4 z-20 overflow-x-auto no-scrollbar mb-6 -mx-4 px-4 sm:mx-0 sm:px-0">
                            <div className="flex gap-3">
                                <button
                                    onClick={() => setActiveCategory('All')}
                                    className={`whitespace-nowrap px-6 py-2.5 rounded-full text-sm font-semibold transition-all ${
                                        activeCategory === 'All' 
                                        ? 'bg-stone-900 text-white shadow-md' 
                                        : 'bg-white text-stone-600 border border-stone-200 hover:bg-stone-100'
                                    }`}
                                >
                                    All Menu
                                </button>
                                {categories.map(cat => (
                                    <button
                                        key={cat.id}
                                        onClick={() => setActiveCategory(cat.name)}
                                        className={`whitespace-nowrap px-6 py-2.5 rounded-full text-sm font-semibold transition-all ${
                                            activeCategory === cat.name 
                                            ? 'bg-stone-900 text-white shadow-md' 
                                            : 'bg-white text-stone-600 border border-stone-200 hover:bg-stone-100'
                                        }`}
                                    >
                                        {cat.name}
                                    </button>
                                ))}
                            </div>
                        </div>

                        {/* Products Grid */}
                        {filteredProducts.length === 0 ? (
                            <div className="text-center py-20 text-stone-500">
                                <i className="fa-solid fa-mug-hot text-5xl text-stone-300 mb-4 block text-center"></i>
                                <p className="text-lg">No items found.</p>
                            </div>
                        ) : (
                            <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-2 gap-6">
                                {filteredProducts.map(product => (
                                    <div key={product.id} className="bg-white rounded-3xl overflow-hidden shadow-sm hover:shadow-xl transition-shadow duration-300 border border-stone-100 flex flex-row h-40">
                                        <div className="w-1/3 bg-stone-200 shrink-0">
                                            {product.image ? (
                                                <img src={product.image} alt={product.name} className="w-full h-full object-cover" />
                                            ) : (
                                                <div className="w-full h-full flex items-center justify-center text-stone-400">
                                                    <i className="fa-solid fa-image text-3xl"></i>
                                                </div>
                                            )}
                                        </div>
                                        <div className="w-2/3 p-4 flex flex-col justify-between">
                                            <div>
                                                <h3 className="font-bold text-lg text-stone-800 leading-tight mb-1 line-clamp-1">{product.name}</h3>
                                                <p className="text-xs text-stone-500 line-clamp-2 leading-relaxed">{product.description}</p>
                                            </div>
                                            <div className="flex gap-2 mt-3">
                                                {product.priceSmall > 0 && (
                                                    <div className="bg-stone-100 rounded-lg px-3 py-1.5 flex flex-col items-center flex-1">
                                                        <span className="text-[10px] uppercase font-bold text-stone-500">Regular</span>
                                                        <span className="font-semibold text-stone-900">${Number(product.priceSmall).toFixed(2)}</span>
                                                    </div>
                                                )}
                                                {product.priceLarge > 0 && (
                                                    <div className="bg-stone-100 rounded-lg px-3 py-1.5 flex flex-col items-center flex-1">
                                                        <span className="text-[10px] uppercase font-bold text-stone-500">Large</span>
                                                        <span className="font-semibold text-stone-900">${Number(product.priceLarge).toFixed(2)}</span>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        )}
                    </div>

                    {/* Hidden Admin Trigger (Double click footer) */}
                    <div 
                        className="text-center mt-20 pb-8 text-stone-400 text-xs cursor-pointer select-none"
                        onDoubleClick={onAdminClick}
                    >
                        © {new Date().getFullYear()} Solaris Cafe. All rights reserved.
                    </div>
                </div>
            );
        }

        // --- 2. Admin Login ---
        function AdminLogin({ onBack, onLogin }) {
            const [isRegistering, setIsRegistering] = useState(false);
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                setLoading(true);
                const { createUserWithEmailAndPassword, signInWithEmailAndPassword } = window.FirebaseApp;
                try {
                    if (isRegistering) {
                        await createUserWithEmailAndPassword(auth, email, password);
                    } else {
                        await signInWithEmailAndPassword(auth, email, password);
                    }
                    onLogin();
                } catch (err) {
                    setError(err.message.replace('Firebase: ', ''));
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-stone-100 px-4">
                    <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md border border-stone-200">
                        <div className="flex justify-between items-center mb-8">
                            <button onClick={onBack} className="text-stone-400 hover:text-stone-700 transition">
                                <i className="fa-solid fa-xmark text-2xl"></i>
                            </button>
                            <div className="flex items-center gap-2">
                                <div className="bg-amber-600 p-2 rounded-lg text-white text-center">
                                    <i className="fa-solid fa-mug-hot w-5 h-5 flex items-center justify-center"></i>
                                </div>
                                <span className="font-bold text-xl text-stone-800">Back Office</span>
                            </div>
                        </div>

                        <h2 className="text-2xl font-bold text-stone-900 mb-2">
                            {isRegistering ? 'Create Admin' : 'Welcome Back'}
                        </h2>
                        <p className="text-stone-500 mb-6">
                            {isRegistering ? 'Set up your admin account.' : 'Sign in to manage your menu.'}
                        </p>

                        {error && (
                            <div className="bg-red-50 text-red-600 text-sm p-3 rounded-lg mb-6 border border-red-100">
                                {error}
                            </div>
                        )}

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm font-medium text-stone-700 mb-1">Email</label>
                                <input 
                                    type="email" required
                                    className="w-full border border-stone-300 rounded-xl px-4 py-3 outline-none focus:border-amber-600 focus:ring-1 focus:ring-amber-600 transition"
                                    value={email} onChange={e => setEmail(e.target.value)}
                                />
                            </div>
                            <div>
                                <label className="block text-sm font-medium text-stone-700 mb-1">Password</label>
                                <input 
                                    type="password" required
                                    className="w-full border border-stone-300 rounded-xl px-4 py-3 outline-none focus:border-amber-600 focus:ring-1 focus:ring-amber-600 transition"
                                    value={password} onChange={e => setPassword(e.target.value)}
                                />
                            </div>
                            <button 
                                type="submit" disabled={loading}
                                className="w-full bg-stone-900 text-white font-bold py-3.5 rounded-xl hover:bg-stone-800 transition disabled:opacity-50 mt-4"
                            >
                                {loading ? 'Processing...' : (isRegistering ? 'Create Account' : 'Sign In')}
                            </button>
                        </form>

                        <div className="mt-6 text-center">
                            <button 
                                onClick={() => setIsRegistering(!isRegistering)}
                                className="text-sm text-amber-600 hover:text-amber-700 font-semibold"
                            >
                                {isRegistering ? 'Already have an account? Sign In' : 'Need to register? Create Admin'}
                            </button>
                        </div>
                    </div>
                </div>
            );
        }

        // --- 3. Admin Dashboard ---
        function AdminDashboard({ products, categories, onLogout, onBackToMenu }) {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [mobileMenuOpen, setMobileMenuOpen] = useState(false);

            const navItems = [
                { id: 'dashboard', label: 'Dashboard', icon: 'fa-table-columns' },
                { id: 'products', label: 'Products', icon: 'fa-mug-hot' },
                { id: 'categories', label: 'Categories', icon: 'fa-tag' },
                { id: 'qrcode', label: 'QR Code', icon: 'fa-qrcode' },
            ];

            return (
                <div className="flex h-screen bg-stone-50 overflow-hidden">
                    {/* Sidebar - Desktop */}
                    <aside className="hidden md:flex w-64 flex-col bg-white border-r border-stone-200">
                        <div className="p-6 flex items-center gap-3">
                            <div className="bg-amber-600 p-2 rounded-xl text-white">
                                <i className="fa-solid fa-mug-hot text-xl w-6 text-center"></i>
                            </div>
                            <span className="font-bold text-xl text-stone-800">Admin</span>
                        </div>
                        <nav className="flex-1 px-4 space-y-2 mt-4">
                            {navItems.map(item => (
                                <button
                                    key={item.id}
                                    onClick={() => setActiveTab(item.id)}
                                    className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl transition-colors font-medium text-sm ${
                                        activeTab === item.id 
                                        ? 'bg-amber-50 text-amber-700' 
                                        : 'text-stone-500 hover:bg-stone-50 hover:text-stone-900'
                                    }`}
                                >
                                    <i className={`fa-solid ${item.icon} text-lg w-5 text-center`}></i>
                                    {item.label}
                                </button>
                            ))}
                        </nav>
                        <div className="p-4 border-t border-stone-100 space-y-2">
                            <button 
                                onClick={onBackToMenu}
                                className="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-stone-500 hover:bg-stone-50 hover:text-stone-900 transition-colors font-medium text-sm"
                            >
                                <i className="fa-solid fa-chevron-right text-lg w-5 text-center"></i>
                                View Public Menu
                            </button>
                            <button 
                                onClick={onLogout}
                                className="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-500 hover:bg-red-50 transition-colors font-medium text-sm"
                            >
                                <i className="fa-solid fa-right-from-bracket text-lg w-5 text-center"></i>
                                Sign Out
                            </button>
                        </div>
                    </aside>

                    {/* Mobile Header */}
                    <div className="md:hidden fixed top-0 left-0 right-0 bg-white border-b border-stone-200 px-4 py-3 flex justify-between items-center z-50">
                        <div className="flex items-center gap-2">
                            <div className="bg-amber-600 p-1.5 rounded-lg text-white">
                                <i className="fa-solid fa-mug-hot"></i>
                            </div>
                            <span className="font-bold text-lg text-stone-800">Admin</span>
                        </div>
                        <button onClick={() => setMobileMenuOpen(!mobileMenuOpen)} className="text-stone-600">
                            {mobileMenuOpen ? <i className="fa-solid fa-xmark text-2xl"></i> : <i className="fa-solid fa-bars text-2xl"></i>}
                        </button>
                    </div>

                    {/* Mobile Menu Overlay */}
                    {mobileMenuOpen && (
                        <div className="md:hidden fixed inset-0 top-14 bg-white z-40 p-4 border-b border-stone-200">
                            <nav className="space-y-2">
                                {navItems.map(item => (
                                    <button
                                        key={item.id}
                                        onClick={() => { setActiveTab(item.id); setMobileMenuOpen(false); }}
                                        className={`w-full flex items-center gap-3 px-4 py-3 rounded-xl font-medium text-sm ${
                                            activeTab === item.id ? 'bg-amber-50 text-amber-700' : 'text-stone-600'
                                        }`}
                                    >
                                        <i className={`fa-solid ${item.icon} text-lg w-5 text-center`}></i>
                                        {item.label}
                                    </button>
                                ))}
                            </nav>
                            <div className="mt-8 pt-4 border-t border-stone-100 space-y-2">
                                <button onClick={() => { onBackToMenu(); setMobileMenuOpen(false); }} className="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-stone-600 font-medium text-sm">
                                    <i className="fa-solid fa-chevron-right text-lg w-5 text-center"></i> View Menu
                                </button>
                                <button onClick={onLogout} className="w-full flex items-center gap-3 px-4 py-3 rounded-xl text-red-500 font-medium text-sm">
                                    <i className="fa-solid fa-right-from-bracket text-lg w-5 text-center"></i> Sign Out
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Main Content Area */}
                    <main className="flex-1 overflow-y-auto p-4 md:p-8 mt-14 md:mt-0">
                        {activeTab === 'dashboard' && <DashboardTab products={products} categories={categories} onNavigate={setActiveTab} />}
                        {activeTab === 'products' && <ProductsTab products={products} categories={categories} />}
                        {activeTab === 'categories' && <CategoriesTab categories={categories} />}
                        {activeTab === 'qrcode' && <QRCodeTab />}
                    </main>
                </div>
            );
        }

        // --- Admin Sub-Views ---

        function DashboardTab({ products, categories, onNavigate }) {
            const recentProducts = [...products].sort((a, b) => b.updatedAt - a.updatedAt).slice(0, 5);

            return (
                <div className="max-w-5xl mx-auto space-y-6">
                    <h2 className="text-2xl font-bold text-stone-800 mb-6">Overview</h2>
                    
                    <div className="grid grid-cols-1 md:grid-cols-2 gap-6">
                        <div className="bg-white p-6 rounded-3xl border border-stone-200 shadow-sm flex items-center justify-between">
                            <div>
                                <p className="text-stone-500 font-medium mb-1">Total Products</p>
                                <h3 className="text-4xl font-bold text-stone-900">{products.length}</h3>
                            </div>
                            <div className="bg-blue-50 p-4 rounded-2xl flex items-center justify-center">
                                <i className="fa-solid fa-mug-hot text-3xl text-blue-600"></i>
                            </div>
                        </div>
                        
                        <div className="bg-white p-6 rounded-3xl border border-stone-200 shadow-sm flex items-center justify-between">
                            <div>
                                <p className="text-stone-500 font-medium mb-1">Total Categories</p>
                                <h3 className="text-4xl font-bold text-stone-900">{categories.length}</h3>
                            </div>
                            <div className="bg-amber-50 p-4 rounded-2xl flex items-center justify-center">
                                <i className="fa-solid fa-tag text-3xl text-amber-600"></i>
                            </div>
                        </div>
                    </div>

                    <div className="bg-white rounded-3xl border border-stone-200 shadow-sm overflow-hidden mt-8">
                        <div className="p-6 border-b border-stone-100 flex justify-between items-center">
                            <h3 className="font-bold text-stone-800 text-lg">Recently Updated</h3>
                            <button onClick={() => onNavigate('products')} className="text-amber-600 text-sm font-semibold hover:text-amber-700">View All</button>
                        </div>
                        <div className="divide-y divide-stone-100">
                            {recentProducts.length === 0 ? (
                                <div className="p-6 text-stone-500 text-center">No products found.</div>
                            ) : (
                                recentProducts.map(product => (
                                    <div key={product.id} className="p-4 flex items-center justify-between hover:bg-stone-50 transition">
                                        <div className="flex items-center gap-4">
                                            <div className="w-12 h-12 rounded-xl bg-stone-200 overflow-hidden shrink-0 flex items-center justify-center">
                                                {product.image ? <img src={product.image} className="w-full h-full object-cover" alt="" /> : <i className="fa-solid fa-image text-2xl text-stone-400"></i>}
                                            </div>
                                            <div>
                                                <h4 className="font-bold text-stone-800">{product.name}</h4>
                                                <span className="text-xs font-medium text-stone-500 bg-stone-100 px-2 py-0.5 rounded-full">{product.category}</span>
                                            </div>
                                        </div>
                                        <div>
                                            {product.isAvailable ? <i className="fa-solid fa-circle-check text-xl text-green-500"></i> : <i className="fa-solid fa-circle-xmark text-xl text-red-500"></i>}
                                        </div>
                                    </div>
                                ))
                            )}
                        </div>
                    </div>
                </div>
            );
        }

        function ProductsTab({ products, categories }) {
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [editingProduct, setEditingProduct] = useState(null);
            const [confirmDeleteId, setConfirmDeleteId] = useState(null);
            
            const [formData, setFormData] = useState({
                name: '', description: '', category: '', priceSmall: '', priceLarge: '', image: '', isAvailable: true
            });

            const openNew = () => {
                setFormData({ name: '', description: '', category: categories[0]?.name || '', priceSmall: '', priceLarge: '', image: '', isAvailable: true });
                setEditingProduct(null);
                setIsModalOpen(true);
            };

            const openEdit = (product) => {
                setFormData({ ...product });
                setEditingProduct(product.id);
                setIsModalOpen(true);
            };

            const handleDeleteClick = async (id) => {
                if (confirmDeleteId === id) {
                    const { doc, deleteDoc } = window.FirebaseApp;
                    await deleteDoc(doc(getColRef('products'), id));
                    setConfirmDeleteId(null);
                } else {
                    setConfirmDeleteId(id);
                    setTimeout(() => setConfirmDeleteId(null), 3000); // reset after 3s
                }
            };

            const handleImageUpload = async (e) => {
                const file = e.target.files[0];
                if (file) {
                    const base64Image = await resizeImage(file);
                    setFormData({ ...formData, image: base64Image });
                }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const { doc, updateDoc, addDoc } = window.FirebaseApp;
                const data = {
                    ...formData,
                    priceSmall: Number(formData.priceSmall) || 0,
                    priceLarge: Number(formData.priceLarge) || 0,
                    updatedAt: Date.now()
                };

                if (editingProduct) {
                    await updateDoc(doc(getColRef('products'), editingProduct), data);
                } else {
                    await addDoc(getColRef('products'), { ...data, createdAt: Date.now() });
                }
                setIsModalOpen(false);
            };

            return (
                <div className="max-w-6xl mx-auto">
                    <div className="flex justify-between items-center mb-6">
                        <h2 className="text-2xl font-bold text-stone-800">Products</h2>
                        <button onClick={openNew} className="bg-stone-900 text-white px-4 py-2.5 rounded-xl font-medium flex items-center gap-2 hover:bg-stone-800 transition shadow-sm">
                            <i className="fa-solid fa-plus text-lg"></i> <span className="hidden sm:inline">Add Product</span>
                        </button>
                    </div>

                    <div className="bg-white rounded-3xl border border-stone-200 shadow-sm overflow-hidden">
                        <div className="overflow-x-auto">
                            <table className="w-full text-left border-collapse">
                                <thead>
                                    <tr className="bg-stone-50 border-b border-stone-200 text-sm text-stone-500 uppercase tracking-wider">
                                        <th className="p-4 font-semibold">Image</th>
                                        <th className="p-4 font-semibold">Details</th>
                                        <th className="p-4 font-semibold">Category</th>
                                        <th className="p-4 font-semibold">Prices</th>
                                        <th className="p-4 font-semibold">Status</th>
                                        <th className="p-4 font-semibold text-right">Actions</th>
                                    </tr>
                                </thead>
                                <tbody className="divide-y divide-stone-100">
                                    {products.map(product => (
                                        <tr key={product.id} className="hover:bg-stone-50 transition-colors">
                                            <td className="p-4">
                                                <div className="w-16 h-16 rounded-xl bg-stone-100 overflow-hidden shrink-0 border border-stone-200 flex justify-center items-center">
                                                    {product.image ? <img src={product.image} className="w-full h-full object-cover" alt="" /> : <i className="fa-solid fa-image text-3xl text-stone-300"></i>}
                                                </div>
                                            </td>
                                            <td className="p-4 max-w-[200px]">
                                                <p className="font-bold text-stone-900 truncate">{product.name}</p>
                                                <p className="text-xs text-stone-500 truncate mt-1">{product.description}</p>
                                            </td>
                                            <td className="p-4">
                                                <span className="inline-flex items-center px-2.5 py-1 rounded-full text-xs font-medium bg-stone-100 text-stone-800">
                                                    {product.category}
                                                </span>
                                            </td>
                                            <td className="p-4 text-sm text-stone-700 whitespace-nowrap">
                                                <div><span className="text-stone-400 mr-1">Sm:</span>${product.priceSmall}</div>
                                                <div><span className="text-stone-400 mr-1">Lg:</span>${product.priceLarge}</div>
                                            </td>
                                            <td className="p-4">
                                                <span className={`inline-flex items-center gap-1.5 px-2.5 py-1 rounded-full text-xs font-medium ${product.isAvailable ? 'bg-green-100 text-green-800' : 'bg-red-100 text-red-800'}`}>
                                                    {product.isAvailable ? 'Available' : 'Hidden'}
                                                </span>
                                            </td>
                                            <td className="p-4 text-right">
                                                <div className="flex items-center justify-end gap-2">
                                                    <button onClick={() => openEdit(product)} className="p-2 text-stone-400 hover:text-amber-600 hover:bg-amber-50 rounded-lg transition"><i className="fa-solid fa-pen text-lg"></i></button>
                                                    <button onClick={() => handleDeleteClick(product.id)} className={`p-2 rounded-lg transition ${confirmDeleteId === product.id ? 'bg-red-600 text-white hover:bg-red-700' : 'text-stone-400 hover:text-red-600 hover:bg-red-50'}`}>
                                                        <i className="fa-solid fa-trash text-lg"></i>
                                                        {confirmDeleteId === product.id && <span className="text-xs font-bold ml-2">Confirm</span>}
                                                    </button>
                                                </div>
                                            </td>
                                        </tr>
                                    ))}
                                    {products.length === 0 && (
                                        <tr><td colSpan="6" className="p-8 text-center text-stone-500">No products added yet.</td></tr>
                                    )}
                                </tbody>
                            </table>
                        </div>
                    </div>

                    {/* Product Modal */}
                    {isModalOpen && (
                        <div className="fixed inset-0 bg-stone-900/40 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl shadow-2xl w-full max-w-2xl max-h-[90vh] overflow-y-auto overflow-hidden flex flex-col">
                                <div className="p-6 border-b border-stone-100 flex justify-between items-center sticky top-0 bg-white/95 backdrop-blur z-10">
                                    <h3 className="text-xl font-bold text-stone-800">{editingProduct ? 'Edit Product' : 'Add New Product'}</h3>
                                    <button onClick={() => setIsModalOpen(false)} className="text-stone-400 hover:text-stone-700 p-1"><i className="fa-solid fa-xmark text-2xl"></i></button>
                                </div>
                                
                                <form onSubmit={handleSubmit} className="p-6 space-y-5">
                                    <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                                        <div className="space-y-1 md:col-span-2">
                                            <label className="block text-sm font-semibold text-stone-700">Product Name</label>
                                            <input required type="text" className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 focus:ring-1 focus:ring-amber-600" value={formData.name} onChange={e => setFormData({...formData, name: e.target.value})} />
                                        </div>
                                        
                                        <div className="space-y-1 md:col-span-2">
                                            <label className="block text-sm font-semibold text-stone-700">Description</label>
                                            <textarea rows="2" className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 focus:ring-1 focus:ring-amber-600 resize-none" value={formData.description} onChange={e => setFormData({...formData, description: e.target.value})}></textarea>
                                        </div>

                                        <div className="space-y-1">
                                            <label className="block text-sm font-semibold text-stone-700">Category</label>
                                            <select required className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-white" value={formData.category} onChange={e => setFormData({...formData, category: e.target.value})}>
                                                <option value="" disabled>Select Category</option>
                                                {categories.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}
                                            </select>
                                        </div>

                                        <div className="space-y-1">
                                            <label className="block text-sm font-semibold text-stone-700">Status</label>
                                            <select className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-white" value={formData.isAvailable ? 'true' : 'false'} onChange={e => setFormData({...formData, isAvailable: e.target.value === 'true'})}>
                                                <option value="true">Available</option>
                                                <option value="false">Unavailable</option>
                                            </select>
                                        </div>

                                        <div className="space-y-1">
                                            <label className="block text-sm font-semibold text-stone-700">Small Price ($)</label>
                                            <input type="number" step="0.01" min="0" className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600" value={formData.priceSmall} onChange={e => setFormData({...formData, priceSmall: e.target.value})} />
                                        </div>

                                        <div className="space-y-1">
                                            <label className="block text-sm font-semibold text-stone-700">Large Price ($)</label>
                                            <input type="number" step="0.01" min="0" className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600" value={formData.priceLarge} onChange={e => setFormData({...formData, priceLarge: e.target.value})} />
                                        </div>

                                        <div className="space-y-1 md:col-span-2">
                                            <label className="block text-sm font-semibold text-stone-700 mb-2">Product Image</label>
                                            <div className="flex items-center gap-4">
                                                <div className="w-24 h-24 rounded-2xl border-2 border-dashed border-stone-300 bg-stone-50 flex items-center justify-center overflow-hidden relative group">
                                                    {formData.image ? (
                                                        <img src={formData.image} className="w-full h-full object-cover" alt="Preview" />
                                                    ) : (
                                                        <i className="fa-solid fa-image text-stone-300 text-3xl"></i>
                                                    )}
                                                    <input type="file" accept="image/*" onChange={handleImageUpload} className="absolute inset-0 w-full h-full opacity-0 cursor-pointer" />
                                                </div>
                                                <div className="text-sm text-stone-500 flex-1">
                                                    <p className="font-medium text-stone-700">Upload a high-quality photo</p>
                                                    <p className="mt-1">Images are automatically resized for fast loading. Click the box to upload.</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    <div className="pt-4 border-t border-stone-100 flex justify-end gap-3 mt-6">
                                        <button type="button" onClick={() => setIsModalOpen(false)} className="px-5 py-2.5 rounded-xl font-medium text-stone-600 hover:bg-stone-100 transition">Cancel</button>
                                        <button type="submit" className="px-5 py-2.5 rounded-xl font-medium bg-stone-900 text-white hover:bg-stone-800 transition shadow-sm">Save Product</button>
                                    </div>
                                </form>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function CategoriesTab({ categories }) {
            const [newCat, setNewCat] = useState('');
            const [confirmDeleteId, setConfirmDeleteId] = useState(null);
            
            const handleAdd = async (e) => {
                e.preventDefault();
                if (!newCat.trim()) return;
                const { addDoc } = window.FirebaseApp;
                await addDoc(getColRef('categories'), { 
                    name: newCat.trim(), 
                    order: categories.length 
                });
                setNewCat('');
            };

            const handleDeleteClick = async (id) => {
                if (confirmDeleteId === id) {
                    const { doc, deleteDoc } = window.FirebaseApp;
                    await deleteDoc(doc(getColRef('categories'), id));
                    setConfirmDeleteId(null);
                } else {
                    setConfirmDeleteId(id);
                    setTimeout(() => setConfirmDeleteId(null), 3000); // reset after 3s
                }
            };

            return (
                <div className="max-w-4xl mx-auto">
                    <h2 className="text-2xl font-bold text-stone-800 mb-6">Manage Categories</h2>
                    
                    <div className="grid md:grid-cols-3 gap-8">
                        <div className="md:col-span-1">
                            <div className="bg-white p-6 rounded-3xl border border-stone-200 shadow-sm sticky top-4">
                                <h3 className="font-bold text-lg mb-4 text-stone-800">Add Category</h3>
                                <form onSubmit={handleAdd} className="space-y-4">
                                    <div>
                                        <input 
                                            type="text" required placeholder="e.g. Pastries"
                                            className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600"
                                            value={newCat} onChange={e => setNewCat(e.target.value)}
                                        />
                                    </div>
                                    <button type="submit" className="w-full bg-stone-900 text-white font-medium py-2.5 rounded-xl hover:bg-stone-800 transition flex justify-center items-center gap-2">
                                        <i className="fa-solid fa-plus text-lg"></i> Add
                                    </button>
                                </form>
                            </div>
                        </div>
                        
                        <div className="md:col-span-2">
                            <div className="bg-white rounded-3xl border border-stone-200 shadow-sm overflow-hidden">
                                <ul className="divide-y divide-stone-100">
                                    {categories.map((cat, idx) => (
                                        <li key={cat.id} className="p-4 flex items-center justify-between hover:bg-stone-50 transition">
                                            <div className="flex items-center gap-3">
                                                <span className="w-8 h-8 rounded-lg bg-amber-100 text-amber-700 flex items-center justify-center font-bold text-sm shrink-0">
                                                    {idx + 1}
                                                </span>
                                                <span className="font-semibold text-stone-800">{cat.name}</span>
                                            </div>
                                            <button onClick={() => handleDeleteClick(cat.id)} className={`p-2 rounded-lg transition ${confirmDeleteId === cat.id ? 'bg-red-600 text-white hover:bg-red-700' : 'text-stone-400 hover:text-red-600 hover:bg-red-50'}`}>
                                                <i className="fa-solid fa-trash text-lg"></i>
                                                {confirmDeleteId === cat.id && <span className="text-xs font-bold ml-2">Confirm</span>}
                                            </button>
                                        </li>
                                    ))}
                                    {categories.length === 0 && <li className="p-8 text-center text-stone-500">No categories found.</li>}
                                </ul>
                            </div>
                        </div>
                    </div>
                </div>
            );
        }

        function QRCodeTab() {
            const qrUrl = "https://jlw168.github.io/App-Center/solariscafe.html";
            const qrImageSrc = `https://api.qrserver.com/v1/create-qr-code/?size=500x500&data=${encodeURIComponent(qrUrl)}&margin=20`;
            const [errorMsg, setErrorMsg] = useState('');

            const downloadQR = async () => {
                try {
                    const response = await fetch(qrImageSrc);
                    const blob = await response.blob();
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.style.display = 'none';
                    a.href = url;
                    a.download = 'solaris-cafe-qr.png';
                    document.body.appendChild(a);
                    a.click();
                    window.URL.revokeObjectURL(url);
                } catch (error) {
                    console.error("Error downloading QR code:", error);
                    setErrorMsg("Download restricted by browser. Try right-clicking the image and saving.");
                    setTimeout(() => setErrorMsg(''), 4000);
                }
            };

            const printQR = () => {
                const printWindow = window.open('', '_blank');
                printWindow.document.write(`
                    <html>
                        <head><title>Print QR Code</title></head>
                        <body style="display:flex; flex-direction:column; justify-content:center; align-items:center; height:100vh; margin:0; font-family:sans-serif;">
                            <h1 style="margin-bottom: 20px;">Scan for Menu</h1>
                            <img src="${qrImageSrc}" alt="QR Code" style="width: 400px; height: 400px; border: 2px solid #000; padding: 10px; border-radius: 10px;" />
                            <p style="margin-top: 20px; font-size: 1.2rem; color: #555;">${qrUrl}</p>
                            <script>
                                window.onload = function() { setTimeout(function(){ window.print(); window.close(); }, 500); }
                            <\/script>
                        </body>
                    </html>
                `);
                printWindow.document.close();
            };

            return (
                <div className="max-w-3xl mx-auto text-center space-y-8 pt-8">
                    <div>
                        <h2 className="text-3xl font-bold text-stone-900 mb-2">Your Menu QR Code</h2>
                        <p className="text-stone-500">Print or download this code and place it on your cafe tables.</p>
                    </div>

                    <div className="bg-white p-12 rounded-[3rem] shadow-xl inline-block border border-stone-200 relative overflow-hidden">
                        <div className="absolute top-0 left-0 w-full h-4 bg-amber-600"></div>
                        <img src={qrImageSrc} alt="Menu QR Code" className="w-64 h-64 mx-auto drop-shadow-md" />
                        <p className="mt-6 font-mono text-sm text-stone-400 bg-stone-50 py-2 px-4 rounded-lg inline-block border border-stone-100">
                            {qrUrl}
                        </p>
                    </div>

                    {errorMsg && <p className="text-red-500 text-sm font-medium">{errorMsg}</p>}

                    <div className="flex justify-center gap-4 pt-4">
                        <button onClick={downloadQR} className="bg-stone-900 text-white px-8 py-3.5 rounded-2xl font-bold flex items-center gap-2 hover:bg-stone-800 transition shadow-md">
                            <i className="fa-solid fa-download text-xl"></i> Download PNG
                        </button>
                        <button onClick={printQR} className="bg-white text-stone-900 border-2 border-stone-200 px-8 py-3.5 rounded-2xl font-bold flex items-center gap-2 hover:bg-stone-50 transition shadow-sm">
                            <i className="fa-solid fa-print text-xl"></i> Print Code
                        </button>
                    </div>
                </div>
            );
        }

        // Initialize and Mount React Application
        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootApp />);
    </script>
</body>
</html>
