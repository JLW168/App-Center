<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Solaris Cafe - System</title>
    <meta name="application-name" content="Solaris Cafe System v1.0">
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        
        /* Print Styles for PDF Generation */
        @media print {
            body * { visibility: hidden; }
            #printable-area, #printable-area *, #qr-print-area, #qr-print-area * { visibility: visible; }
            #printable-area, #qr-print-area { position: absolute; left: 0; top: 0; width: 100%; text-align: center; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-stone-50 font-sans text-stone-900">
    <div id="root">
        <div style="display: flex; height: 100vh; align-items: center; justify-content: center; color: #78716c; font-weight: 500;">
            <i class="fa-solid fa-spinner fa-spin" style="margin-right: 10px;"></i> Loading Solaris System...
        </div>
    </div>

    <!-- Firebase Init -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, signInAnonymously } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-auth.js";
        import { getFirestore, collection, doc, setDoc, getDocs, onSnapshot, addDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

        window.FirebaseApp = {
            initializeApp, getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, 
            onAuthStateChanged, signOut, signInAnonymously,
            getFirestore, collection, doc, setDoc, getDocs, onSnapshot, 
            addDoc, updateDoc, deleteDoc
        };
        window.dispatchEvent(new Event('firebase-loaded'));
    </script>

    <!-- React App -->
    <script type="text/babel">
        const { useState, useEffect, useMemo, useRef } = React;

        const firebaseConfig = {
            apiKey: "AIzaSyADedJwnXvUv3bK_OBkzzbOw82L8QuAC8Q",
            authDomain: "solaris-1f4cb.firebaseapp.com",
            projectId: "solaris-1f4cb",
            storageBucket: "solaris-1f4cb.firebasestorage.app",
            messagingSenderId: "372761640969",
            appId: "1:372761640969:web:91f24d3f7a93babd6cf8d8",
            measurementId: "G-VR3L5HWHFD"
        };

        let app, auth, db, getColRef;

        function initializeFirebase() {
            if (app) return;
            const { initializeApp, getAuth, getFirestore, collection } = window.FirebaseApp;
            app = initializeApp(firebaseConfig);
            auth = getAuth(app);
            db = getFirestore(app);
            getColRef = (colName) => collection(db, colName);
        }

        const resizeImage = (file) => {
            return new Promise((resolve) => {
                const reader = new FileReader();
                reader.onload = (e) => {
                    const img = new Image();
                    img.onload = () => {
                        const canvas = document.createElement('canvas');
                        // Aggressive compression to save Firestore document size
                        const MAX_WIDTH = 300; 
                        const scaleSize = img.width > MAX_WIDTH ? (MAX_WIDTH / img.width) : 1;
                        canvas.width = img.width * scaleSize;
                        canvas.height = img.height * scaleSize;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
                        // Using webp format with 50% quality creates extremely small strings
                        resolve(canvas.toDataURL('image/webp', 0.5));
                    };
                    img.src = e.target.result;
                };
                reader.readAsDataURL(file);
            });
        };

        const getTodayString = () => new Date().toISOString().split('T')[0];

        // --- Root & Data Fetching ---
        function RootApp() {
            const [isReady, setIsReady] = useState(!!window.FirebaseApp);
            
            useEffect(() => {
                const handleReady = () => setIsReady(true);
                if (!isReady) window.addEventListener('firebase-loaded', handleReady);
                return () => window.removeEventListener('firebase-loaded', handleReady);
            }, [isReady]);

            if (!isReady) return <div className="flex h-screen items-center justify-center text-stone-500 font-medium"><i className="fa-solid fa-spinner fa-spin mr-2"></i> Connecting...</div>;

            initializeFirebase();
            return <MainApp />;
        }

        function MainApp() {
            const [view, setView] = useState('customer'); // customer, admin_login, admin_dashboard
            const [user, setUser] = useState(null);
            
            const [products, setProducts] = useState([]);
            const [categories, setCategories] = useState([]);
            const [tables, setTables] = useState([]);
            const [orders, setOrders] = useState([]);
            const [admins, setAdmins] = useState([]);
            const [loading, setLoading] = useState(true);

            // Auth
            useEffect(() => {
                const { signInAnonymously, onAuthStateChanged } = window.FirebaseApp;
                const initAuth = async () => { 
                    try { 
                        if (!auth.currentUser) await signInAnonymously(auth); 
                    } catch (err) {
                        console.error("Firebase Auth Error: Ensure 'Anonymous' sign-in provider is enabled in Firebase Console.", err);
                    } 
                };
                initAuth();
                const unsub = onAuthStateChanged(auth, setUser);
                return () => unsub();
            }, []);

            // Data Subscriptions
            useEffect(() => {
                if (!user) return;
                const { onSnapshot } = window.FirebaseApp;

                const unsubP = onSnapshot(getColRef('products'), snap => setProducts(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.updatedAt-a.updatedAt)));
                const unsubC = onSnapshot(getColRef('categories'), snap => setCategories(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>a.order-b.order)));
                const unsubT = onSnapshot(getColRef('tables'), snap => setTables(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubA = onSnapshot(getColRef('admins'), snap => setAdmins(snap.docs.map(d => ({ id: d.id, ...d.data() }))));
                const unsubO = onSnapshot(getColRef('orders'), snap => {
                    setOrders(snap.docs.map(d => ({ id: d.id, ...d.data() })).sort((a,b)=>b.createdAt-a.createdAt));
                    setLoading(false);
                });

                return () => { unsubP(); unsubC(); unsubT(); unsubO(); unsubA(); };
            }, [user]);

            return (
                <div className="min-h-screen">
                    {view === 'customer' && <CustomerPortal products={products} categories={categories} tables={tables} orders={orders} onAdminClick={() => setView(user && !user.isAnonymous ? 'admin_dashboard' : 'admin_login')} />}
                    {view === 'admin_login' && <AdminLogin onBack={() => setView('customer')} onLogin={() => setView('admin_dashboard')} />}
                    {view === 'admin_dashboard' && <AdminDashboard products={products} categories={categories} tables={tables} orders={orders} admins={admins} currentUser={user} onLogout={() => { window.FirebaseApp.signOut(auth).then(() => setView('customer')); }} onBack={() => setView('customer')} />}
                </div>
            );
        }

        // --- 1. Customer Portal (Self-Ordering) ---
        function CustomerPortal({ products, categories, tables, orders, onAdminClick }) {
            const [activeCategory, setActiveCategory] = useState('All');
            const [searchQuery, setSearchQuery] = useState('');
            const [cart, setCart] = useState([]);
            const [isCartOpen, setIsCartOpen] = useState(false);
            const [customerName, setCustomerName] = useState('');
            const [notes, setNotes] = useState('');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [submittedOrder, setSubmittedOrder] = useState(null);
            
            // Options Modal State
            const [selectedItemForOptions, setSelectedItemForOptions] = useState(null);

            // Table Detection via URL ?table=ID
            const queryParams = new URLSearchParams(window.location.search);
            const tableIdParam = queryParams.get('table');
            const currentTable = tables.find(t => t.id === tableIdParam) || tables.find(t => t.name === tableIdParam);

            const filteredProducts = useMemo(() => {
                return products.filter(p => {
                    const matchesSearch = p.name.toLowerCase().includes(searchQuery.toLowerCase());
                    const matchesCategory = activeCategory === 'All' || p.category === activeCategory;
                    return matchesSearch && matchesCategory && p.isAvailable;
                });
            }, [products, searchQuery, activeCategory]);

            const handleSizeClick = (product, size, price) => {
                if (product.hasSugarOption || product.hasIceOption) {
                    setSelectedItemForOptions({ 
                        product, 
                        size, 
                        price, 
                        sugar: product.hasSugarOption ? '100%' : null,
                        ice: product.hasIceOption ? 'Normal Ice' : null
                    });
                } else {
                    addToCart(product, size, price, null, null);
                }
            };

            const addToCart = (product, size, price, sugar, ice) => {
                setCart(prev => {
                    const existingIndex = prev.findIndex(item => item.productId === product.id && item.size === size && item.sugar === sugar && item.ice === ice);
                    if (existingIndex >= 0) {
                        const newCart = [...prev];
                        newCart[existingIndex].quantity += 1;
                        return newCart;
                    }
                    return [...prev, { productId: product.id, name: product.name, size, price, quantity: 1, image: product.image, sugar, ice }];
                });
            };

            const updateCartQty = (idx, delta) => {
                setCart(prev => {
                    const newCart = [...prev];
                    newCart[idx].quantity += delta;
                    if (newCart[idx].quantity <= 0) newCart.splice(idx, 1);
                    return newCart;
                });
            };

            const cartTotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            const handleCheckout = async (e) => {
                e.preventDefault();
                if (cart.length === 0 || !currentTable) return;
                setIsSubmitting(true);

                const { addDoc } = window.FirebaseApp;
                const today = getTodayString();
                
                // Generate Queue Number logic (client-side simple sequence)
                const todaysOrders = orders.filter(o => o.dateString === today);
                const highestQueue = todaysOrders.length > 0 
                    ? Math.max(...todaysOrders.map(o => parseInt(o.queueNo.split('-')[1]) || 0)) 
                    : 0;
                const nextQueueNum = highestQueue + 1;
                const queueString = `A-${nextQueueNum.toString().padStart(3, '0')}`;

                const orderData = {
                    queueNo: queueString,
                    tableId: currentTable.id,
                    tableName: currentTable.name,
                    customerName: customerName || 'Guest',
                    notes: notes,
                    items: cart,
                    totalAmount: cartTotal,
                    status: 'New', // New -> Preparing -> Ready -> Served -> Cancelled
                    dateString: today,
                    createdAt: Date.now()
                };

                try {
                    await addDoc(getColRef('orders'), orderData);
                    setSubmittedOrder(orderData);
                    setCart([]);
                    setIsCartOpen(false);
                } catch (err) {
                    console.error("Order submission failed:", err);
                    alert("Submission Blocked by Firebase!\n\nError: " + err.message + "\n\nFix: You must update your Firestore Security Rules to allow writes.");
                } finally {
                    setIsSubmitting(false);
                }
            };

            if (submittedOrder) {
                return (
                    <div className="min-h-screen bg-stone-50 flex items-center justify-center p-4">
                        <div className="bg-white p-8 rounded-3xl shadow-xl w-full max-w-md text-center">
                            <div className="w-20 h-20 bg-green-100 text-green-600 rounded-full flex items-center justify-center mx-auto mb-6">
                                <i className="fa-solid fa-check text-4xl"></i>
                            </div>
                            <h2 className="text-2xl font-bold text-stone-900 mb-2">Order Received!</h2>
                            <p className="text-stone-500 mb-8">Thank you for ordering. We're preparing it now.</p>
                            
                            <div className="bg-stone-50 rounded-2xl p-6 border border-stone-100 mb-8">
                                <p className="text-sm font-semibold text-stone-400 uppercase tracking-widest mb-1">Queue Number</p>
                                <p className="text-5xl font-black text-amber-600">{submittedOrder.queueNo}</p>
                                <p className="text-stone-500 mt-2 font-medium">Table {submittedOrder.tableName}</p>
                            </div>

                            <button onClick={() => setSubmittedOrder(null)} className="w-full bg-stone-900 text-white py-4 rounded-xl font-bold hover:bg-stone-800 transition">
                                New Order
                            </button>
                        </div>
                    </div>
                );
            }

            return (
                <div className="pb-28">
                    {/* Header Banner */}
                    <div className="relative h-48 sm:h-64 bg-stone-900 w-full overflow-hidden">
                        <img src="https://images.unsplash.com/photo-1554118811-1e0d58224f24?auto=format&fit=crop&q=80&w=2000" alt="Cafe" className="w-full h-full object-cover opacity-50" />
                        <div className="absolute inset-0 flex flex-col items-center justify-center text-white">
                            <h1 className="text-3xl sm:text-4xl font-bold tracking-tight drop-shadow-md">Solaris Cafe</h1>
                            {currentTable ? (
                                <div className="mt-3 bg-amber-600/90 backdrop-blur px-4 py-1.5 rounded-full text-sm font-bold shadow-lg">
                                    <i className="fa-solid fa-location-dot mr-2"></i> Table {currentTable.name}
                                </div>
                            ) : (
                                <div className="mt-3 bg-red-500/90 backdrop-blur px-4 py-1.5 rounded-full text-sm font-bold shadow-lg">
                                    View Only Menu - Scan Table QR to Order
                                </div>
                            )}
                        </div>
                    </div>

                    <div className="max-w-4xl mx-auto px-4 sm:px-6 -mt-6 relative z-10">
                        {/* Search & Filter */}
                        <div className="bg-white p-2 rounded-2xl shadow-lg flex items-center mb-6 border border-stone-100">
                            <i className="fa-solid fa-magnifying-glass text-stone-400 ml-3 mr-2"></i>
                            <input type="text" placeholder="Search menu..." className="flex-1 py-2 px-2 outline-none" value={searchQuery} onChange={(e) => setSearchQuery(e.target.value)} />
                        </div>

                        <div className="flex gap-3 overflow-x-auto no-scrollbar mb-6 pb-2">
                            <button onClick={() => setActiveCategory('All')} className={`whitespace-nowrap px-5 py-2 rounded-full text-sm font-semibold transition ${activeCategory === 'All' ? 'bg-stone-900 text-white' : 'bg-white text-stone-600 border border-stone-200'}`}>All</button>
                            {categories.map(cat => (
                                <button key={cat.id} onClick={() => setActiveCategory(cat.name)} className={`whitespace-nowrap px-5 py-2 rounded-full text-sm font-semibold transition ${activeCategory === cat.name ? 'bg-stone-900 text-white' : 'bg-white text-stone-600 border border-stone-200'}`}>{cat.name}</button>
                            ))}
                        </div>

                        {/* Product Grid */}
                        <div className="grid grid-cols-1 sm:grid-cols-2 gap-4">
                            {filteredProducts.map(product => (
                                <div key={product.id} className="bg-white rounded-2xl overflow-hidden shadow-sm border border-stone-100 flex p-3 gap-3">
                                    <div className="w-24 h-24 sm:w-28 sm:h-28 rounded-xl bg-stone-100 shrink-0 overflow-hidden">
                                        {product.image ? <img src={product.image} className="w-full h-full object-cover" alt={product.name}/> : <i className="fa-solid fa-image text-2xl text-stone-300 w-full h-full flex items-center justify-center"></i>}
                                    </div>
                                    <div className="flex-1 flex flex-col">
                                        <h3 className="font-bold text-stone-800 leading-tight">{product.name}</h3>
                                        <p className="text-xs text-stone-500 line-clamp-2 mt-1 flex-1">{product.description}</p>
                                        
                                        <div className="flex gap-2 mt-2">
                                            {product.priceSmall > 0 && (
                                                <button onClick={() => currentTable && handleSizeClick(product, 'S', product.priceSmall)} disabled={!currentTable} className={`flex-1 flex items-center justify-between px-2 py-1.5 rounded-lg border text-xs font-bold transition-colors ${currentTable ? 'border-amber-300 bg-amber-100 text-amber-900 hover:bg-amber-200 shadow-sm' : 'border-stone-300 bg-stone-100 text-stone-700'}`}>
                                                    <span>S</span><span>{product.priceSmall.toLocaleString()} ៛</span>
                                                </button>
                                            )}
                                            {product.priceLarge > 0 && (
                                                <button onClick={() => currentTable && handleSizeClick(product, 'L', product.priceLarge)} disabled={!currentTable} className={`flex-1 flex items-center justify-between px-2 py-1.5 rounded-lg border text-xs font-bold transition-colors ${currentTable ? 'border-amber-300 bg-amber-100 text-amber-900 hover:bg-amber-200 shadow-sm' : 'border-stone-300 bg-stone-100 text-stone-700'}`}>
                                                    <span>L</span><span>{product.priceLarge.toLocaleString()} ៛</span>
                                                </button>
                                            )}
                                        </div>
                                    </div>
                                </div>
                            ))}
                        </div>
                    </div>

                    {/* Admin Trigger */}
                    <div className="text-center mt-12 pb-8 text-stone-400 text-xs cursor-pointer select-none" onDoubleClick={onAdminClick}>
                        © {new Date().getFullYear()} Solaris System
                    </div>

                    {/* Floating Cart Button */}
                    {cart.length > 0 && (
                        <div className="fixed bottom-6 left-0 right-0 px-4 z-40 flex justify-center">
                            <button onClick={() => setIsCartOpen(true)} className="w-full max-w-md bg-stone-900 text-white rounded-2xl shadow-2xl p-4 flex justify-between items-center hover:bg-stone-800 transition">
                                <div className="flex items-center gap-3">
                                    <div className="bg-white/20 w-8 h-8 rounded-full flex items-center justify-center font-bold text-sm">{cart.reduce((s,i)=>s+i.quantity,0)}</div>
                                    <span className="font-semibold">View Cart</span>
                                </div>
                                <span className="font-bold text-lg">{cartTotal.toLocaleString()} ៛</span>
                            </button>
                        </div>
                    )}

                    {/* Customer Sugar Selection Modal */}
                    {selectedItemForOptions && (
                        <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-fade-in">
                                <div className="flex justify-between items-center mb-4">
                                    <h3 className="text-xl font-bold text-stone-900">Customize Item</h3>
                                    <button onClick={() => setSelectedItemForOptions(null)} className="text-stone-400 hover:text-stone-700"><i className="fa-solid fa-xmark text-xl"></i></button>
                                </div>
                                <div className="mb-6">
                                    <p className="font-bold text-stone-800">{selectedItemForOptions.product.name} ({selectedItemForOptions.size})</p>
                                    
                                    {selectedItemForOptions.sugar !== null && (
                                        <div className="mt-4">
                                            <p className="text-sm font-semibold text-stone-700 mb-2">Select Sugar Level</p>
                                            <div className="flex flex-wrap gap-2">
                                                {['0%', '30%', '50%', '70%', '100%'].map(level => (
                                                    <button 
                                                        key={level}
                                                        onClick={() => setSelectedItemForOptions({...selectedItemForOptions, sugar: level})}
                                                        className={`px-4 py-2 rounded-xl text-sm font-bold border transition ${selectedItemForOptions.sugar === level ? 'bg-amber-600 border-amber-600 text-white' : 'bg-white border-stone-300 text-stone-600 hover:border-amber-400'}`}
                                                    >
                                                        {level}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    {selectedItemForOptions.ice !== null && (
                                        <div className="mt-6">
                                            <p className="text-sm font-semibold text-stone-700 mb-2">Select Ice Level</p>
                                            <div className="flex flex-wrap gap-2">
                                                {['Normal Ice', 'Less Ice', 'No Ice', 'Hot'].map(level => (
                                                    <button 
                                                        key={level}
                                                        onClick={() => setSelectedItemForOptions({...selectedItemForOptions, ice: level})}
                                                        className={`px-4 py-2 rounded-xl text-sm font-bold border transition ${selectedItemForOptions.ice === level ? 'bg-blue-600 border-blue-600 text-white' : 'bg-white border-stone-300 text-stone-600 hover:border-blue-400'}`}
                                                    >
                                                        {level}
                                                    </button>
                                                ))}
                                            </div>
                                        </div>
                                    )}
                                </div>
                                <button 
                                    onClick={() => { 
                                        addToCart(selectedItemForOptions.product, selectedItemForOptions.size, selectedItemForOptions.price, selectedItemForOptions.sugar, selectedItemForOptions.ice); 
                                        setSelectedItemForOptions(null); 
                                    }} 
                                    className="w-full bg-stone-900 text-white py-3.5 rounded-xl font-bold hover:bg-stone-800 transition shadow-md"
                                >
                                    Add to Cart - {selectedItemForOptions.price.toLocaleString()} ៛
                                </button>
                            </div>
                        </div>
                    )}

                    {/* Cart/Checkout Modal */}
                    {isCartOpen && (
                        <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-50 flex justify-end">
                            <div className="bg-white w-full max-w-md h-full flex flex-col shadow-2xl animate-slide-in-right">
                                <div className="p-5 border-b border-stone-100 flex justify-between items-center bg-white">
                                    <h2 className="text-xl font-bold text-stone-900">Your Order</h2>
                                    <button onClick={() => setIsCartOpen(false)} className="w-8 h-8 rounded-full bg-stone-100 flex items-center justify-center text-stone-500 hover:bg-stone-200"><i className="fa-solid fa-xmark"></i></button>
                                </div>

                                <div className="flex-1 overflow-y-auto p-5 space-y-4">
                                    {cart.map((item, idx) => (
                                        <div key={idx} className="flex gap-4 items-center">
                                            <div className="w-16 h-16 bg-stone-100 rounded-xl overflow-hidden shrink-0">
                                                {item.image ? <img src={item.image} className="w-full h-full object-cover"/> : <i className="fa-solid fa-image flex items-center justify-center h-full text-stone-300"></i>}
                                            </div>
                                            <div className="flex-1">
                                                <h4 className="font-bold text-stone-800 text-sm leading-tight">{item.name}</h4>
                                                <span className="text-xs font-semibold text-stone-500 bg-stone-100 px-1.5 rounded mt-1 inline-block">
                                                    Size: {item.size} {item.sugar && `| Sugar: ${item.sugar}`} {item.ice && `| ${item.ice}`}
                                                </span>
                                                <p className="font-bold text-amber-600 text-sm mt-1">{(item.price * item.quantity).toLocaleString()} ៛</p>
                                            </div>
                                            <div className="flex items-center bg-stone-100 rounded-lg p-1 border border-stone-200">
                                                <button onClick={() => updateCartQty(idx, -1)} className="w-7 h-7 flex items-center justify-center text-stone-600"><i className="fa-solid fa-minus text-xs"></i></button>
                                                <span className="w-6 text-center font-semibold text-sm">{item.quantity}</span>
                                                <button onClick={() => updateCartQty(idx, 1)} className="w-7 h-7 flex items-center justify-center text-stone-600"><i className="fa-solid fa-plus text-xs"></i></button>
                                            </div>
                                        </div>
                                    ))}

                                    <div className="border-t border-stone-100 pt-4 mt-6">
                                        <label className="block text-sm font-semibold text-stone-700 mb-1">Name (Optional)</label>
                                        <input type="text" placeholder="For the order callout" className="w-full border border-stone-300 rounded-xl px-4 py-3 outline-none focus:border-amber-600 mb-3 bg-stone-50" value={customerName} onChange={e=>setCustomerName(e.target.value)} />
                                        
                                        <label className="block text-sm font-semibold text-stone-700 mb-1">Notes</label>
                                        <input type="text" placeholder="e.g. Extra ice..." className="w-full border border-stone-300 rounded-xl px-4 py-3 outline-none focus:border-amber-600 bg-stone-50" value={notes} onChange={e=>setNotes(e.target.value)} />
                                    </div>
                                </div>

                                <div className="p-5 bg-stone-50 border-t border-stone-200">
                                    <div className="flex justify-between items-center mb-4">
                                        <span className="text-stone-500 font-medium">Total Amount</span>
                                        <span className="text-2xl font-black text-stone-900">{cartTotal.toLocaleString()} ៛</span>
                                    </div>

        // A. POS / Order Management
        function POSView({ orders, products, categories }) {
            const [mode, setMode] = useState('manage'); // 'manage' or 'pos'
            
            // --- 1. Manage Orders State ---
            const today = getTodayString();
            const todayOrders = orders.filter(o => o.dateString === today);
            const activeOrders = todayOrders.filter(o => ['New', 'Preparing', 'Ready'].includes(o.status));
            
            const updateStatus = async (id, status) => {
                const { doc, updateDoc } = window.FirebaseApp;
                await updateDoc(doc(getColRef('orders'), id), { status });
            };

            const statusColors = {
                'New': 'bg-blue-100 text-blue-800',
                'Preparing': 'bg-amber-100 text-amber-800',
                'Ready': 'bg-green-100 text-green-800',
                'Served': 'bg-stone-100 text-stone-500',
                'Cancelled': 'bg-red-100 text-red-800'
            };

            // --- 2. Take Order (POS) State ---
            const [cart, setCart] = useState([]);
            const [customerName, setCustomerName] = useState('');
            const [activeCategory, setActiveCategory] = useState('All');
            const [isSubmitting, setIsSubmitting] = useState(false);
            const [selectedItemForOptions, setSelectedItemForOptions] = useState(null);

            const filteredProducts = useMemo(() => {
                if (!products) return [];
                return products.filter(p => (activeCategory === 'All' || p.category === activeCategory) && p.isAvailable);
            }, [products, activeCategory]);

            const handleSizeClick = (product, size, price) => {
                if (product.hasSugarOption || product.hasIceOption) {
                    setSelectedItemForOptions({ 
                        product, 
                        size, 
                        price, 
                        sugar: product.hasSugarOption ? '100%' : null,
                        ice: product.hasIceOption ? 'Normal Ice' : null
                    });
                } else {
                    addToCart(product, size, price, null, null);
                }
            };

            const addToCart = (product, size, price, sugar, ice) => {
                setCart(prev => {
                    const existingIndex = prev.findIndex(item => item.productId === product.id && item.size === size && item.sugar === sugar && item.ice === ice);
                    if (existingIndex >= 0) {
                        const newCart = [...prev];
                        newCart[existingIndex].quantity += 1;
                        return newCart;
                    }
                    return [...prev, { productId: product.id, name: product.name, size, price, quantity: 1, image: product.image, sugar, ice }];
                });
            };

            const updateCartQty = (idx, delta) => {
                setCart(prev => {
                    const newCart = [...prev];
                    newCart[idx].quantity += delta;
                    if (newCart[idx].quantity <= 0) newCart.splice(idx, 1);
                    return newCart;
                });
            };

            const cartTotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);

            const handleCheckout = async (targetStatus) => {
                if (cart.length === 0) return;
                setIsSubmitting(true);
                const { addDoc } = window.FirebaseApp;
                
                const highestQueue = todayOrders.length > 0 ? Math.max(...todayOrders.map(o => parseInt(o.queueNo.split('-')[1]) || 0)) : 0;
                const queueString = `A-${(highestQueue + 1).toString().padStart(3, '0')}`;

                const orderData = {
                    queueNo: queueString,
                    tableId: 'Walk-in',
                    tableName: 'Walk-in',
                    customerName: customerName || 'Walk-in',
                    notes: '',
                    items: cart,
                    totalAmount: cartTotal,
                    status: targetStatus, // 'Preparing' (goes to KDS) or 'Served' (skip KDS)
                    dateString: today,
                    createdAt: Date.now()
                };

                try {
                    await addDoc(getColRef('orders'), orderData);
                    setCart([]);
                    setCustomerName('');
                    setMode('manage');
                } catch (err) {
                    console.error("POS Checkout failed:", err);
                    alert("Checkout Blocked by Firebase!\n\nError: " + err.message + "\n\nFix: You must update your Firestore Security Rules to allow writes.");
                } finally {
                    setIsSubmitting(false);
                }
            };

                            </div>
                            <div className="p-3 flex gap-2 overflow-x-auto no-scrollbar border-b border-stone-100 shrink-0">
                                <button onClick={() => setActiveCategory('All')} className={`px-4 py-1.5 rounded-full text-sm font-semibold whitespace-nowrap transition ${activeCategory === 'All' ? 'bg-stone-900 text-white shadow-md' : 'bg-stone-100 text-stone-600 hover:bg-stone-200'}`}>All</button>
                                {categories?.map(c => (
                                    <button key={c.id} onClick={() => setActiveCategory(c.name)} className={`px-4 py-1.5 rounded-full text-sm font-semibold whitespace-nowrap transition ${activeCategory === c.name ? 'bg-stone-900 text-white shadow-md' : 'bg-stone-100 text-stone-600 hover:bg-stone-200'}`}>{c.name}</button>

                                    <div key={p.id} className="border border-stone-200 rounded-xl p-3 flex flex-col hover:border-amber-400 hover:shadow-md transition bg-white h-full">

                                        <div className="mt-auto flex flex-col gap-2">
                                            {p.priceSmall > 0 && <button onClick={()=>handleSizeClick(p, 'S', p.priceSmall)} className="w-full py-2 bg-amber-100 hover:bg-amber-200 text-amber-900 rounded-lg text-xs font-bold border border-amber-300 flex justify-between px-3 transition shadow-sm"><span>S</span><span>{p.priceSmall.toLocaleString()} ៛</span></button>}

                    <div className="flex justify-between mb-6">
                        <h2 className="text-2xl font-bold">Categories</h2>
                        <button onClick={()=>{setFormData({name: '', order: ''}); setEditingId(null); setIsModalOpen(true);}} className="bg-stone-900 text-white px-4 py-2 rounded-xl"><i className="fa-solid fa-plus"></i> Add Category</button>
                    </div>
                    <div className="bg-white rounded-2xl border shadow-sm p-4 overflow-x-auto">
                        <table className="w-full text-left text-sm">
                            <thead><tr className="border-b text-stone-500"><th className="pb-2">Name</th><th className="pb-2">Sort Order</th><th className="pb-2 text-right">Actions</th></tr></thead>
                            <tbody>
                                {categories.map(c => (
                                    <tr key={c.id} className="border-b">
                                        <td className="py-3 font-bold">{c.name}</td>
                                        <td className="py-3">{c.order}</td>
                                        <td className="py-3 text-right">
                                            <button onClick={()=>{setFormData({name: c.name, order: c.order || 0}); setEditingId(c.id); setIsModalOpen(true);}} className="p-2 text-blue-500"><i className="fa-solid fa-pen"></i></button>
                                            <button onClick={()=>del(c.id)} className="p-2 text-red-500"><i className="fa-solid fa-trash"></i></button>
                                        </td>
                                    </tr>
                                ))}
                                {categories.length === 0 && <tr><td colSpan="3" className="text-center py-4 text-stone-400">No categories found.</td></tr>}
                            </tbody>
                        </table>
                    </div>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-stone-900/60 backdrop-blur-sm z-50 flex items-center justify-center p-4">
                            <form onSubmit={handleSubmit} className="bg-white rounded-3xl w-full max-w-sm overflow-hidden shadow-2xl animate-fade-in">
                                <div className="p-6 border-b border-stone-100 flex justify-between items-center bg-stone-50">
                                    <h3 className="text-xl font-bold text-stone-900">{editingId ? 'Edit Category' : 'Add Category'}</h3>
                                    <button type="button" onClick={() => setIsModalOpen(false)} className="text-stone-400 hover:text-stone-900"><i className="fa-solid fa-xmark text-xl"></i></button>
                                </div>
                                <div className="p-6 space-y-4">
                                    <div>
                                        <label className="block text-sm font-semibold text-stone-700 mb-1">Category Name</label>
                                        <input type="text" required placeholder="e.g. Hot Coffee" className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50" value={formData.name} onChange={e=>setFormData({...formData, name: e.target.value})} />
                                    </div>
                                    <div>
                                        <label className="block text-sm font-semibold text-stone-700 mb-1">Sort Order</label>
                                        <input type="number" placeholder="0" className="w-full border border-stone-300 rounded-xl px-4 py-2.5 outline-none focus:border-amber-600 bg-stone-50" value={formData.order} onChange={e=>setFormData({...formData, order: e.target.value})} />
                                    </div>
                                </div>
                                <div className="p-6 border-t border-stone-100 flex justify-end gap-3 bg-stone-50">
                                    <button type="button" onClick={() => setIsModalOpen(false)} className="px-5 py-2.5 rounded-xl font-semibold text-stone-600 hover:bg-stone-200 transition">Cancel</button>
                                    <button type="submit" className="px-5 py-2.5 rounded-xl font-bold bg-stone-900 text-white hover:bg-stone-800 transition shadow-md">Save</button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        // D. Product Management
        function ProductsView({ products, categories }) {
            const [isModalOpen, setIsModalOpen] = useState(false);
            const [formData, setFormData] = useState({ name: '', category: '', costSmall: '', priceSmall: '', costLarge: '', priceLarge: '', image: '', isAvailable: true, description: '', hasSugarOption: false, hasIceOption: false });
            const [editingId, setEditingId] = useState(null);

            const handleUpload = async (e) => {
                if(e.target.files[0]) setFormData({...formData, image: await resizeImage(e.target.files[0])});
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                const { doc, updateDoc, addDoc } = window.FirebaseApp;
                const data = { ...formData, costSmall: Number(formData.costSmall || 0), priceSmall: Number(formData.priceSmall || 0), costLarge: Number(formData.costLarge || 0), priceLarge: Number(formData.priceLarge || 0), updatedAt: Date.now() };
                if (editingId) await updateDoc(doc(getColRef('products'), editingId), data);
                else await addDoc(getColRef('products'), { ...data, createdAt: Date.now() });
                setIsModalOpen(false);
            };

            const del = async (id) => { 
                if (confirm("Delete?")) {
                    try {
                        const { deleteDoc, doc } = window.FirebaseApp;
                        await deleteDoc(doc(db, 'products', id));
                    } catch (err) {
                        alert("Error deleting product: " + err.message);
                    }
                } 
            };

            return (
                <div>
                    <div className="flex justify-between mb-6">
                        <h2 className="text-2xl font-bold">Products</h2>
                        <button onClick={()=>{setFormData({name: '', category: categories[0]?.name||'', costSmall:'', priceSmall:'', costLarge:'', priceLarge:'', image:'', isAvailable:true, description:'', hasSugarOption: false}); setEditingId(null); setIsModalOpen(true);}} className="bg-stone-900 text-white px-4 py-2 rounded-xl"><i className="fa-solid fa-plus"></i> Add</button>
                    </div>
                    <div className="bg-white rounded-2xl border shadow-sm p-4 overflow-x-auto">
                        <table className="w-full text-left text-sm">
                            <thead><tr className="border-b text-stone-500"><th className="pb-2">Product</th><th className="pb-2">Cat</th><th className="pb-2">Prices</th><th className="pb-2">Customizations</th><th className="pb-2">Status</th><th className="pb-2"></th></tr></thead>
                            <tbody>
                                {products.map(p => (
                                    <tr key={p.id} className="border-b">
                                        <td className="py-2 flex items-center gap-2">
                                            <div className="w-10 h-10 bg-stone-100 rounded overflow-hidden">{p.image ? <img src={p.image} className="w-full h-full object-cover"/> : ''}</div>
                                            <span className="font-bold">{p.name}</span>
                                        </td>
                                        <td className="py-2">{p.category}</td>
                                        <td className="py-2">{p.priceSmall.toLocaleString()} ៛ / {p.priceLarge.toLocaleString()} ៛</td>
                                        <td className="py-2 text-xs">
                                            {p.hasSugarOption && <span className="bg-stone-100 px-1.5 py-0.5 rounded mr-1">Sugar</span>}
                                            {p.hasIceOption && <span className="bg-stone-100 px-1.5 py-0.5 rounded">Ice</span>}
                                            {!p.hasSugarOption && !p.hasIceOption && <span className="text-stone-400">None</span>}
                                        </td>
                                        <td className="py-2">{p.isAvailable ? '✅' : '❌'}</td>
                                        <td className="py-2 text-right">
                                            <button onClick={()=>{setFormData({costSmall: '', costLarge: '', ...p, hasSugarOption: !!p.hasSugarOption, hasIceOption: !!p.hasIceOption}); setEditingId(p.id); setIsModalOpen(true);}} className="p-2 text-blue-500"><i className="fa-solid fa-pen"></i></button>
                                            <button onClick={()=>del(p.id)} className="p-2 text-red-500"><i className="fa-solid fa-trash"></i></button>
                                        </td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>

                    {isModalOpen && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex items-center justify-center p-4">
                            <form onSubmit={handleSubmit} className="bg-white p-6 rounded-2xl w-full max-w-md space-y-3">
                                <h3 className="font-bold text-lg">Product</h3>
                                <input type="text" required placeholder="Name" className="w-full border rounded p-2" value={formData.name} onChange={e=>setFormData({...formData, name: e.target.value})}/>
                                <select className="w-full border rounded p-2" value={formData.category} onChange={e=>setFormData({...formData, category: e.target.value})}>
                                    <option value="" disabled>Select Category</option>
                                    {categories.map(c => <option key={c.id} value={c.name}>{c.name}</option>)}
                                </select>
                                
                                <div className="grid grid-cols-2 gap-3 bg-stone-50 p-3 rounded-lg border border-stone-200">
                                    <div className="space-y-2">
                                        <label className="text-xs font-bold text-stone-500 uppercase tracking-wider">Size S</label>
                                        <input type="number" step="100" placeholder="Cost" className="w-full border rounded p-2" value={formData.costSmall} onChange={e=>setFormData({...formData, costSmall: e.target.value})}/>
                                        <input type="number" step="100" placeholder="Price" className="w-full border rounded p-2" value={formData.priceSmall} onChange={e=>setFormData({...formData, priceSmall: e.target.value})}/>
                                    </div>
                                    <div className="space-y-2">
                                        <label className="text-xs font-bold text-stone-500 uppercase tracking-wider">Size L</label>
                                        <input type="number" step="100" placeholder="Cost" className="w-full border rounded p-2" value={formData.costLarge} onChange={e=>setFormData({...formData, costLarge: e.target.value})}/>
                                        <input type="number" step="100" placeholder="Price" className="w-full border rounded p-2" value={formData.priceLarge} onChange={e=>setFormData({...formData, priceLarge: e.target.value})}/>
                                    </div>
                                </div>

                                <textarea placeholder="Description" className="w-full border rounded p-2" value={formData.description} onChange={e=>setFormData({...formData, description: e.target.value})}></textarea>
                                
                                <div className="grid grid-cols-2 gap-3">
                                    <div className="space-y-1">
                                        <label className="block text-xs font-bold text-stone-700">Sugar Customization</label>
                                        <select className="w-full border rounded p-2 bg-stone-50 text-sm" value={formData.hasSugarOption ? 'true' : 'false'} onChange={e=>setFormData({...formData, hasSugarOption: e.target.value==='true'})}>
                                            <option value="false">Off</option>
                                            <option value="true">On (0%, 30%, etc)</option>
                                        </select>
                                    </div>
                                    <div className="space-y-1">
                                        <label className="block text-xs font-bold text-stone-700">Ice Customization</label>
                                        <select className="w-full border rounded p-2 bg-stone-50 text-sm" value={formData.hasIceOption ? 'true' : 'false'} onChange={e=>setFormData({...formData, hasIceOption: e.target.value==='true'})}>
                                            <option value="false">Off</option>
                                            <option value="true">On (Normal, Less, Hot)</option>
                                        </select>
                                    </div>
                                </div>

                                <input type="file" accept="image/*" onChange={handleUpload} className="w-full border rounded p-2 text-sm"/>
                                <select className="w-full border rounded p-2" value={formData.isAvailable?'true':'false'} onChange={e=>setFormData({...formData, isAvailable: e.target.value==='true'})}>
                                    <option value="true">Available</option><option value="false">Hidden</option>
                                </select>
                                <div className="flex justify-end gap-2 pt-2">
                                    <button type="button" onClick={()=>setIsModalOpen(false)} className="px-4 py-2 border rounded">Cancel</button>
                                    <button type="submit" className="px-4 py-2 bg-stone-900 text-white rounded">Save</button>
                                </div>
                            </form>
                        </div>
                    )}
                </div>
            );
        }

        // E. Sales Management & Export
        function SalesView({ orders }) {
            const [filter, setFilter] = useState('today'); // today, week, month
            
            const filteredOrders = useMemo(() => {
                const now = new Date();
                return orders.filter(o => {
                    const orderDate = new Date(o.createdAt);
                    if (filter === 'today') return orderDate.toDateString() === now.toDateString();
                    if (filter === 'week') {
                        const weekAgo = new Date(); weekAgo.setDate(now.getDate() - 7);
                        return orderDate >= weekAgo;
                    }
                    if (filter === 'month') return orderDate.getMonth() === now.getMonth() && orderDate.getFullYear() === now.getFullYear();
                    return true;
                });
            }, [orders, filter]);

            const completedOrders = filteredOrders.filter(o => o.status === 'Served');
            const totalRevenue = completedOrders.reduce((s,o) => s + o.totalAmount, 0);

            // CSV Export logic
            const exportCSV = () => {
                const headers = "Date,Queue,Table,Customer,Total,Status\n";
                const rows = filteredOrders.map(o => `${new Date(o.createdAt).toLocaleString()},${o.queueNo},${o.tableName},"${o.customerName}",${o.totalAmount},${o.status}`).join("\n");
                const blob = new Blob([headers + rows], { type: 'text/csv;charset=utf-8;' });
                const link = document.createElement("a");
                link.href = URL.createObjectURL(blob);
                link.download = `sales_report_${filter}.csv`;
                link.click();
            };

            return (
                <div id="printable-area">
                    <div className="flex justify-between items-center mb-6 no-print">
                        <h2 className="text-2xl font-bold">Sales Report</h2>
                        <div className="flex gap-2">
                            <select className="border rounded-lg px-3 py-2 bg-white outline-none" value={filter} onChange={e=>setFilter(e.target.value)}>
                                <option value="today">Today</option>
                                <option value="week">Last 7 Days</option>
                                <option value="month">This Month</option>
                            </select>
                            <button onClick={exportCSV} className="bg-green-600 text-white px-4 py-2 rounded-lg font-semibold"><i className="fa-solid fa-file-csv mr-2"></i> CSV</button>
                            <button onClick={() => window.print()} className="bg-stone-900 text-white px-4 py-2 rounded-lg font-semibold"><i className="fa-solid fa-file-pdf mr-2"></i> Print PDF</button>
                        </div>
                    </div>

                    <div className="grid grid-cols-2 gap-4 mb-6">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <p className="text-stone-500 font-medium">Total Orders</p>
                            <p className="text-3xl font-bold text-stone-900">{filteredOrders.length}</p>
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-stone-200">
                            <p className="text-stone-500 font-medium">Revenue (Completed)</p>
                            <p className="text-3xl font-bold text-green-600">{totalRevenue.toLocaleString()} ៛</p>
                        </div>
                    </div>

                    <div className="bg-white rounded-2xl border shadow-sm overflow-hidden">
                        <table className="w-full text-left text-sm">
                            <thead>
                                <tr className="bg-stone-50 border-b text-stone-600">
                                    <th className="p-3">Date</th>
                                    <th className="p-3">Queue</th>
                                    <th className="p-3">Total</th>
                                    <th className="p-3">Status</th>
                                </tr>
                            </thead>
                            <tbody>
                                {filteredOrders.map(o => (
                                    <tr key={o.id} className="border-b">
                                        <td className="p-3">{new Date(o.createdAt).toLocaleString()}</td>
                                        <td className="p-3 font-semibold">{o.queueNo}</td>
                                        <td className="p-3 font-bold">{o.totalAmount.toLocaleString()} ៛</td>
                                        <td className="p-3">{o.status}</td>
                                    </tr>
                                ))}
                            </tbody>
                        </table>
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<RootApp />);
    </script>
</body>
</html>
